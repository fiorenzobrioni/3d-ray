# ============================================================================
# Scene: 3D Ray
# ============================================================================

imports:
  - path: "libraries/objects/font-classic.yaml"

cameras:
  - name: promo_cam
    position: [0.0, 1.2, -6.0]
    look_at: [-0.3, 0.4, 0.0]
    fov: 45
    aperture: 0.1
    focal_dist: 6.0

world:
  sky:
    type: "gradient"
    zenith_color: [1.0, 1.0, 1.0]
    horizon_color: [1.0, 1.0, 1.0]
    ground_color: [1.0, 1.0, 1.0]

materials:
  - id: "pavimento"
    type: "disney"
    color: [0.05, 0.06, 0.08]
    roughness: 0.1
    specular: 0.9
    clearcoat: 1.0
    coat_roughness: 0.02

  - id: "font_material"
    type: "disney"
    color: [1.0, 0.84, 0.3]
    metallic: 1.0
    roughness: 0.15
    specular: 1.0
    clearcoat: 0.5
    coat_roughness: 0.1

  - id: "font_accent"
    type: "disney"
    color: [0.2, 0.6, 1.0]
    metallic: 0.9
    roughness: 0.05
    specular: 1.0
    clearcoat: 1.0

lights:
  - type: "directional"
    direction: [0.8, -0.6, 0.5]
    color: [1.0, 0.95, 0.9]
    intensity: 1.5
    angular_radius_deg: 0.5
    shadow_samples: 16

  - type: "point"
    position: [-4.0, 3.0, -3.0]
    color: [1.0, 0.7, 0.3]
    intensity: 20.0
    soft_radius: 0.5

  - type: "point"
    position: [4.0, 1.5, 2.0]
    color: [0.1, 0.4, 1.0]
    intensity: 30.0
    soft_radius: 0.5

  - type: "point"
    position: [0.0, 0.5, 3.0]
    color: [1.0, 0.2, 0.8]
    intensity: 150.0
    soft_radius: 1.0

entities:
  # "3D" in font_accent (Blue)
  - type: "instance"
    template: "numero_3"
    translate: [-2.2, 0.5, 0]
    rotate: [-90, 0, 0]
    material: "font_accent"

  - type: "instance"
    template: "lettera_d_maiusc"
    translate: [-1.3, 0.5, 0]
    rotate: [-90, 0, 0]
    material: "font_accent"

  # "RAY" in font_material (Gold)
  - type: "instance"
    template: "lettera_r_maiusc"
    translate: [0.0, 0.5, 0]
    rotate: [-90, 0, 0]
    material: "font_material"

  - type: "instance"
    template: "lettera_a_maiusc"
    translate: [1.0, 0.5, 0]
    rotate: [-90, 0, 0]
    material: "font_material"

  - type: "instance"
    template: "lettera_y_maiusc"
    translate: [1.9, 0.5, 0]
    rotate: [-90, 0, 0]
    material: "font_material"
