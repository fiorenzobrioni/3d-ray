world:
  sky:
    type: "flat"
    color: [0.001, 0.001, 0.0012]

camera:
  position: [0, 2.9, -7.8]
  look_at:  [0, 0.4, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.06, 0.06, 0.07]
    roughness: 0.88
    specular: 0.10

  - id: "backwall"
    type: "disney"
    color: [0.10, 0.10, 0.11]
    roughness: 0.92
    specular: 0.08

  - id: "dis_mogano_flame_studio"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.8
      grain_strength: 0.40
      latewood_width: 0.16
      ring_sharpness: 4.5
      ring_color_variation: 0.14
      ring_width_variation: 0.10
      warp_amplitude: 0.50
      figure_strength: 1.6
      figure_scale: 0.11
      figure_aspect: 6.0
      heartwood_radius: 1.2
      heartwood_blend: 0.12
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.20, 0.06, 0.03], interp: "smoothstep" }
        - { position: 0.50, color: [0.50, 0.18, 0.10], interp: "smoothstep" }
        - { position: 1.00, color: [0.74, 0.36, 0.22], interp: "linear" }
    roughness: 0.28
    specular: 0.52
    clearcoat: 0.78
    coat_roughness: 0.08

entities:

  # Pavimento
  - { name: "floor", type: "quad",
      q: [-11, 0, -2.5], u: [22, 0, 0], v: [0, 0, 6],
      material: "floor" }

  # Parete di fondo (z = 2.5)
  - { name: "backwall", type: "quad",
      q: [-11, 0, 2.5], u: [22, 0, 0], v: [0, 4, 0],
      material: "backwall" }

  - name: "mogano_flame"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [0, 0.7, 0]
    seed: 13
    material: "dis_mogano_flame_studio"

  - name: "mogano_flame"
    type: "box"
    scale: [14, 1.4, 1.4]
    translate: [0, 2.2, 0]
    seed: 13
    material: "dis_mogano_flame_studio"

lights:

  - type: "directional"
    direction: [-0.35, -0.82, 0.45]
    color: [1.0, 0.97, 0.92]
    intensity: 3.4
    angular_radius: 1.2     # bordi ombra morbidi

  - type: "point"
    position: [-8.5, 4.5, -5.0]
    color: [0.80, 0.86, 1.00]
    intensity: 28

  - type: "point"
    position: [6.5, 5.5, -4.5]
    color: [1.00, 0.82, 0.62]
    intensity: 18
