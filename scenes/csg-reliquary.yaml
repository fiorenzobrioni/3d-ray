# ═══════════════════════════════════════════════════════════════════════════
#  THE FORBIDDEN RELIQUARY — CSG Showcase
#
#  Una cripta sotterranea dove cinque artefatti impossibili fluttuano
#  sopra piedistalli di marmo nero, illuminati da luce emissiva e un
#  unico fascio dorato dall'alto. Ogni artefatto dimostra una diversa
#  combinazione di operazioni CSG.
#
#  Artefatti:
#    1. IL CUORE — Cubo di ossidiana con sfera cava interna luminescente
#    2. L'OCCHIO — Lente biconvessa (intersection di due sfere) in vetro
#    3. LA GABBIA — Cubo traforato con 3 fori cilindrici ortogonali
#    4. IL SIGILLO — Anello toroidale (cilindro − cilindro interno)
#    5. LA RELIQUIA — Sfera con cavità cubica interna + cilindro passante
#
#  Render consigliato:
#    Draft:   -w 960  -H 540  -s 32  -d 20
#    Medio:   -w 1600 -H 900  -s 128 -d 40
#    Finale:  -w 1920 -H 1080 -s 512 -d 60
# ═══════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.008, 0.006, 0.012]
  background: [0.0, 0.0, 0.0]
  ground:
    type: "infinite_plane"
    material: "pavimento_cripta"
    y: 0

cameras:
  - name: principale
    position: [0, 3.8, -9.5]
    look_at: [0, 2.0, 0]
    fov: 48
    aperture: 0.04
    focal_dist: 10.0

  - name: dettaglio_cuore
    position: [-4.5, 3.5, -4.0]
    look_at: [-3.0, 2.6, 0]
    fov: 35
    aperture: 0.03
    focal_dist: 5.0

  - name: panoramica_alta
    position: [0, 8.0, -7.0]
    look_at: [0, 1.8, 0.5]
    fov: 55

# ═══════════════════════════════════════════════════════════════════════════
#  LUCI — Setup drammatico: fascio zenitale + emissivi + accenti laterali
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # Fascio zenitale dorato — l'unica vera sorgente dall'alto
  - type: "area"
    corner: [-1.0, 8.0, -0.5]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 1.0]
    color: [1.0, 0.85, 0.55]
    intensity: 50.0
    shadow_samples: 24

  # Accento laterale sinistro — freddo, modella i volumi
  - type: "point"
    position: [-8, 5, -3]
    color: [0.4, 0.5, 0.9]
    intensity: 35

  # Accento laterale destro — caldo tenue, fill
  - type: "point"
    position: [8, 3, -2]
    color: [0.9, 0.6, 0.3]
    intensity: 20

  # Luce rasente posteriore — stacca i profili dal buio
  - type: "spot"
    position: [0, 6, 6]
    direction: [0, -0.5, -1]
    color: [0.6, 0.5, 0.8]
    intensity: 180
    inner_angle: 25
    outer_angle: 50

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ── Ambiente ───────────────────────────────────────────────────────────

  - id: "pavimento_cripta"
    type: "disney"
    texture:
      type: "checker"
      scale: 1.8
      colors: [[0.04, 0.03, 0.05], [0.08, 0.07, 0.09]]
    roughness: 0.25
    metallic: 0.0
    specular: 0.6

  - id: "marmo_nero"
    type: "disney"
    texture:
      type: "marble"
      scale: 6.0
      colors: [[0.03, 0.03, 0.04], [0.10, 0.09, 0.12]]
    roughness: 0.15
    metallic: 0.0
    specular: 0.7
    clearcoat: 0.4
    clearcoat_gloss: 0.9

  - id: "parete_fondo"
    type: "lambertian"
    color: [0.04, 0.03, 0.05]

  # ── Artefatto 1: IL CUORE ─────────────────────────────────────────────

  - id: "ossidiana"
    type: "disney"
    color: [0.02, 0.02, 0.03]
    roughness: 0.08
    metallic: 0.0
    specular: 0.9
    clearcoat: 1.0
    clearcoat_gloss: 1.0

  - id: "plasma_cuore"
    type: "emissive"
    color: [1.0, 0.15, 0.05]
    intensity: 12.0

  # ── Artefatto 2: L'OCCHIO ─────────────────────────────────────────────

  - id: "vetro_antico"
    type: "disney"
    color: [0.85, 0.92, 0.98]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.72

  # ── Artefatto 3: LA GABBIA ────────────────────────────────────────────

  - id: "bronzo_arcano"
    type: "disney"
    color: [0.65, 0.45, 0.18]
    metallic: 1.0
    roughness: 0.2
    clearcoat: 0.3
    clearcoat_gloss: 0.8

  # ── Artefatto 4: IL SIGILLO ───────────────────────────────────────────

  - id: "oro_antico"
    type: "disney"
    color: [0.95, 0.75, 0.25]
    metallic: 1.0
    roughness: 0.12

  - id: "smeraldo_glow"
    type: "emissive"
    color: [0.1, 1.0, 0.4]
    intensity: 6.0

  # ── Artefatto 5: LA RELIQUIA ──────────────────────────────────────────

  - id: "cromo_scuro"
    type: "disney"
    color: [0.30, 0.30, 0.33]
    metallic: 1.0
    roughness: 0.05

  - id: "nucleo_viola"
    type: "emissive"
    color: [0.6, 0.1, 1.0]
    intensity: 10.0

  # ── Decorazioni ────────────────────────────────────────────────────────

  - id: "cristallo_ambra"
    type: "disney"
    color: [1.0, 0.7, 0.2]
    roughness: 0.0
    spec_trans: 0.9
    ior: 1.55

  - id: "rune_emissive"
    type: "emissive"
    color: [0.3, 0.6, 1.0]
    intensity: 4.0

# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  SFONDO — Parete curva di fondo (approssimata con un grande box)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "parete_fondo"
    type: "box"
    scale: [20, 10, 0.3]
    translate: [0, 5, 5.5]
    material: "parete_fondo"

  # ─────────────────────────────────────────────────────────────────────────
  #  PIEDISTALLI — 5 colonne di marmo nero
  # ─────────────────────────────────────────────────────────────────────────
  - { name: "piedistallo_1", type: "cylinder", center: [-3.0, 0, 0], radius: 0.55, height: 1.8, material: "marmo_nero" }
  - { name: "piedistallo_2", type: "cylinder", center: [-1.5, 0, 1.2], radius: 0.50, height: 2.0, material: "marmo_nero" }
  - { name: "piedistallo_3", type: "cylinder", center: [ 0.0, 0, 0], radius: 0.60, height: 1.6, material: "marmo_nero" }
  - { name: "piedistallo_4", type: "cylinder", center: [ 1.5, 0, 1.2], radius: 0.50, height: 2.2, material: "marmo_nero" }
  - { name: "piedistallo_5", type: "cylinder", center: [ 3.0, 0, 0], radius: 0.55, height: 1.9, material: "marmo_nero" }

  # Cappelli dei piedistalli (dischi decorativi)
  - { name: "cap_1", type: "disk", center: [-3.0, 1.80, 0], normal: [0,1,0], radius: 0.65, material: "marmo_nero" }
  - { name: "cap_2", type: "disk", center: [-1.5, 2.00, 1.2], normal: [0,1,0], radius: 0.60, material: "marmo_nero" }
  - { name: "cap_3", type: "disk", center: [ 0.0, 1.60, 0], normal: [0,1,0], radius: 0.70, material: "marmo_nero" }
  - { name: "cap_4", type: "disk", center: [ 1.5, 2.20, 1.2], normal: [0,1,0], radius: 0.60, material: "marmo_nero" }
  - { name: "cap_5", type: "disk", center: [ 3.0, 1.90, 0], normal: [0,1,0], radius: 0.65, material: "marmo_nero" }

  # ═══════════════════════════════════════════════════════════════════════
  #  ARTEFATTO 1 — IL CUORE
  #  CSG: Cubo − Sfera (guscio con cavità sferica interna)
  #  + sfera emissiva interna separata (nucleo luminoso)
  #
  #  Il cubo di ossidiana ha una sfera vuota all'interno che rivela
  #  il plasma incandescente attraverso le 6 aperture circolari.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "cuore_guscio"
    type: "csg"
    operation: "subtraction"
    left:
      type: "box"
      scale: [1.4, 1.4, 1.4]
    right:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.82
    translate: [-3.0, 2.65, 0]
    rotate: [15, 30, 10]
    material: "ossidiana"

  # Nucleo incandescente (sfera emissiva indipendente dentro la cavità)
  - name: "cuore_nucleo"
    type: "sphere"
    center: [-3.0, 2.65, 0]
    radius: 0.45
    material: "plasma_cuore"

  # ═══════════════════════════════════════════════════════════════════════
  #  ARTEFATTO 2 — L'OCCHIO
  #  CSG: Sfera ∩ Sfera (lente biconvessa)
  #
  #  Due sfere sovrapposte con intersezione: il volume comune forma
  #  una lente ottica perfetta che rifrange la luce dell'ambiente.
  #  La distanza tra i centri controlla lo spessore della lente.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "occhio_lente"
    type: "csg"
    operation: "intersection"
    left:
      type: "sphere"
      center: [0, 0, -0.42]
      radius: 1.0
    right:
      type: "sphere"
      center: [0, 0, 0.42]
      radius: 1.0
    translate: [-1.5, 2.85, 1.2]
    rotate: [0, -20, 8]
    material: "vetro_antico"

  # ═══════════════════════════════════════════════════════════════════════
  #  ARTEFATTO 3 — LA GABBIA
  #  CSG: ((Box \ CylY) \ CylX) \ CylZ
  #
  #  Cubo con tre fori cilindrici ortogonali passanti. Tripla sottrazione
  #  ricorsiva — lo stress test per il nuovo multi-hit CSG engine.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "gabbia"
    type: "csg"
    operation: "subtraction"
    left:
      type: "csg"
      operation: "subtraction"
      left:
        type: "csg"
        operation: "subtraction"
        left:
          type: "box"
          scale: [1.6, 1.6, 1.6]
        right:
          # Foro verticale (asse Y)
          type: "cylinder"
          center: [0, -1.0, 0]
          radius: 0.42
          height: 2.0
      right:
        # Foro orizzontale (asse X, ruotato 90° su Z)
        type: "cylinder"
        center: [0, -1.0, 0]
        radius: 0.42
        height: 2.0
        rotate: [0, 0, 90]
    right:
      # Foro in profondità (asse Z, ruotato 90° su X)
      type: "cylinder"
      center: [0, -1.0, 0]
      radius: 0.42
      height: 2.0
      rotate: [90, 0, 0]
    translate: [0, 2.5, 0]
    rotate: [20, 45, 15]
    material: "bronzo_arcano"

  # Sfera emissiva al centro della gabbia (visibile attraverso i fori)
  - name: "gabbia_nucleo"
    type: "sphere"
    center: [0, 2.5, 0]
    radius: 0.25
    material: "rune_emissive"

  # ═══════════════════════════════════════════════════════════════════════
  #  ARTEFATTO 4 — IL SIGILLO
  #  CSG: Cilindro esterno − Cilindro interno (anello toroidale)
  #  + taglio decorativo con box per creare apertura
  #
  #  Un anello dorato spesso, ottenuto sottraendo un cilindro più
  #  stretto da uno più largo. Un box taglia una fessura laterale.
  #  Tripla operazione: (CylEsterno \ CylInterno) \ BoxTaglio
  # ═══════════════════════════════════════════════════════════════════════
  - name: "sigillo_anello"
    type: "csg"
    operation: "subtraction"
    left:
      type: "csg"
      operation: "subtraction"
      left:
        # Cilindro esterno (disco piatto e largo)
        type: "cylinder"
        center: [0, -0.2, 0]
        radius: 0.85
        height: 0.4
      right:
        # Cilindro interno (foro centrale)
        type: "cylinder"
        center: [0, -0.35, 0]
        radius: 0.50
        height: 0.7
    right:
      # Taglio decorativo — fessura che attraversa l'anello
      type: "box"
      scale: [2.0, 0.08, 0.15]
    translate: [1.5, 2.45, 1.2]
    rotate: [25, -15, 12]
    material: "oro_antico"

  # Gemma incastonata nel centro dell'anello
  - name: "sigillo_gemma"
    type: "sphere"
    center: [1.5, 2.45, 1.2]
    radius: 0.22
    material: "smeraldo_glow"

  # ═══════════════════════════════════════════════════════════════════════
  #  ARTEFATTO 5 — LA RELIQUIA
  #  CSG: (Sfera \ Box) \ Cilindro
  #
  #  Sfera metallica con una cavità cubica interna visibile attraverso
  #  un foro cilindrico passante. Il cubo interno espone facce piane
  #  a specchio dentro una forma sferica — contrasto organico/geometrico.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "reliquia"
    type: "csg"
    operation: "subtraction"
    left:
      type: "csg"
      operation: "subtraction"
      left:
        type: "sphere"
        center: [0, 0, 0]
        radius: 0.80
      right:
        # Cavità cubica interna
        type: "box"
        scale: [0.85, 0.85, 0.85]
    right:
      # Foro cilindrico passante diagonale
      type: "cylinder"
      center: [0, -1.0, 0]
      radius: 0.25
      height: 2.0
      rotate: [35, 0, 25]
    translate: [3.0, 2.75, 0]
    rotate: [10, -40, 5]
    material: "cromo_scuro"

  # Nucleo viola fluttuante dentro la cavità cubica
  - name: "reliquia_nucleo"
    type: "sphere"
    center: [3.0, 2.75, 0]
    radius: 0.18
    material: "nucleo_viola"

  # ═══════════════════════════════════════════════════════════════════════
  #  ELEMENTI DECORATIVI
  # ═══════════════════════════════════════════════════════════════════════

  # Cristalli ambrati sparsi alla base (accenti cromatici caldi)
  - name: "cristallo_1"
    type: "csg"
    operation: "intersection"
    left:
      type: "box"
      scale: [0.6, 1.2, 0.6]
    right:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.52
    translate: [-4.5, 0.35, -1.5]
    rotate: [0, 35, 12]
    material: "cristallo_ambra"

  - name: "cristallo_2"
    type: "csg"
    operation: "intersection"
    left:
      type: "box"
      scale: [0.4, 0.9, 0.4]
    right:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.38
    translate: [4.2, 0.28, -1.8]
    rotate: [5, -20, -8]
    material: "cristallo_ambra"

  - name: "cristallo_3"
    type: "csg"
    operation: "intersection"
    left:
      type: "box"
      scale: [0.35, 0.75, 0.35]
    right:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.32
    translate: [1.8, 0.22, -2.2]
    rotate: [8, 55, -5]
    material: "cristallo_ambra"

  # Rune luminose sul pavimento (dischi emissivi incassati)
  - name: "runa_1"
    type: "disk"
    center: [-3.0, 0.005, 0]
    normal: [0, 1, 0]
    radius: 0.70
    material: "rune_emissive"

  - name: "runa_2"
    type: "disk"
    center: [0, 0.005, 0]
    normal: [0, 1, 0]
    radius: 0.75
    material: "rune_emissive"

  - name: "runa_3"
    type: "disk"
    center: [3.0, 0.005, 0]
    normal: [0, 1, 0]
    radius: 0.70
    material: "rune_emissive"

  # Sfera specchiante di contorno — cattura riflessi dell'intera scena
  - name: "sfera_specchio"
    type: "sphere"
    center: [0, 0.45, -3.5]
    radius: 0.45
    material: "cromo_scuro"
