# 3D-Ray terrain preview scene — generated by TerrainGen --with-cameras
#
# Render with:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/heightfield-strata-test-preview.yaml -o renders/preview-heightfield-strata-test.png \
#     -w 1280 -H 720 -s 256 -d 6 -S 2 -c wide
#
# Cameras: wide | aerial | ground | sunrise | topdown
# List them with --list-cameras.

imports:
  - path: "libraries/terrain/heightfield-strata-test.yaml"

world:
  sky:
    type: "gradient"
    zenith_color:  [0.180, 0.380, 0.780]
    horizon_color: [0.850, 0.900, 0.960]
    ground_color:  [0.360, 0.340, 0.200]
    sun:
      direction: [-0.497, -0.845, -0.199]
      color: [1.000, 0.960, 0.860]
      intensity: 18.000
      size: 2.000
      falloff: 32.0
  medium:
    type: "height_fog"
    sigma_a: [0.001, 0.001, 0.0012]
    sigma_s: [0.010, 0.012, 0.016]
    y0: 0.0
    scale_height: 5.000
    phase: "hg"
    g: 0.6

lights:
  - type: "directional"
    direction: [0.729, -0.620, 0.292]
    color: [0.850, 0.900, 0.960]
    intensity: 1.800

cameras:
  - name: "wide"
    position: [100.000, 50.000, 90.000]
    look_at:  [0.000, 10.346, 0.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "aerial"
    position: [0.000, 92.500, 90.000]
    look_at:  [0.000, 0.000, 0.000]
    fov:      55.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "ground"
    position: [-30.000, 14.346, 30.000]
    look_at:  [30.000, 10.346, -30.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "sunrise"
    position: [-60.000, 16.346, -10.000]
    look_at:  [40.000, 10.346, 10.000]
    fov:      55.000
    aperture: 0.050
    focal_dist: 80.000

  - name: "topdown"
    position: [0.000, 150.000, 0.001]
    look_at:  [0.000, 0.000, 0.000]
    fov:      70.000
    aperture: 0.000
    focal_dist: 1.000

entities:
  - name: "terrain"
    type: "instance"
    template: "heightfield_strata_test"
    translate: [0.000, 0.000, 0.000]
