  # ═══════════════════════════════════════════════════════════════════════════
  #  STUDIO-QUALITY — VFX production-grade (step 5/7 textures roadmap)
  #
  #  Materiali che sfruttano i nuovi controlli `figure_strength`,
  #  `radial_anisotropy`, `knot_density`, `ring_sharpness` e `color_ramp` per
  #  pareggiare il look dei renderer pro (Arnold knots, RenderMan PxrWoodKnot,
  #  Cycles Wood node con figure). Tutti hanno il prefisso `_studio` per
  #  distinguerli dai materiali legacy con stesso nome.
  #
  #  Linee guida di tuning (testate sul showcase marble-wood-studio):
  #   - `ring_sharpness` 3.5-5.0 dà bande crisp (latewood sottile).
  #   - `figure_strength` 0.8-1.8 con `figure_scale` 0.10-0.20 produce
  #     ondulazioni larghe ben visibili. Lower `noise_strength` (0.3-0.8)
  #     per dare risalto alla figure rispetto al grain.
  #   - `radial_anisotropy` 2-4 stretcha le fibre lungo il radiale.
  #   - `knot_density` 0.7-1.0 con `scale` ≥ 5 fa nodi grandi con anelli
  #     concentrici visibili al loro interno. Combinare con `color_ramp` a
  #     4 stop dove position 0 = cuore nodo (nero/marrone scuro).
  # ═══════════════════════════════════════════════════════════════════════════

  # ── ACERO CURLY — figure band ondulata (curly maple, fiddleback) ───────
  # Caratteristica: strisce ondulate trasversali ben visibili sopra il grain
  # naturale dell'acero. La banda figure a bassa frequenza domina la
  # perturbazione, mentre il grain è quasi-spento.

  - id: "dis_acero_curly_studio"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 5.0
      noise_strength: 0.25
      octaves: 4
      grain_scale: 1.8
      figure_scale: 0.10
      figure_strength: 1.8
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.55, 0.38, 0.20], interp: "smoothstep" }
        - { position: 0.45, color: [0.85, 0.72, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.92, 0.76], interp: "linear"     }
    roughness: 0.42
    specular: 0.45
    sheen: 0.08
    sheen_tint: 0.6

  - id: "cls_acero_curly_studio"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 5.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 5.0
      noise_strength: 0.25
      octaves: 4
      grain_scale: 1.8
      figure_scale: 0.10
      figure_strength: 1.8
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.55, 0.38, 0.20], interp: "smoothstep" }
        - { position: 0.45, color: [0.85, 0.72, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.92, 0.76], interp: "linear"     }

  # ── MOGANO FLAME — figure intensa su mogano (flame mahogany) ──────────
  # Ondulazioni larghe rosso scuro: classica figure del mogano "ribbon" o
  # "flame", uno dei pattern più pregiati nel mondo del legno.

  - id: "dis_mogano_flame_studio"
