      color_ramp:
        - { position: 0.00, color: [0.30, 0.18, 0.08], interp: "smoothstep" }   # latewood sottile
        - { position: 0.55, color: [0.82, 0.62, 0.38], interp: "smoothstep" }   # earlywood
        - { position: 1.00, color: [0.95, 0.82, 0.62], interp: "linear"     }   # earlywood chiaro
