      octaves: 5
      figure_scale: 0.13
      figure_strength: 1.5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.06, 0.03], interp: "smoothstep" }   # scuro intenso
        - { position: 0.50, color: [0.48, 0.18, 0.08], interp: "smoothstep" }   # mogano caldo
        - { position: 1.00, color: [0.72, 0.36, 0.20], interp: "linear"     }   # highlight aranciato
    roughness: 0.30
    specular: 0.50
    clearcoat: 0.75
    coat_roughness: 0.10

  # ── ROVERE QUARTATO — radial_anisotropy (quartersawn oak) ──────────────
  # Tagliato perpendicolare agli anelli: le fibre del grain appaiono
  # stretched lungo la direzione radiale. Pattern apprezzato in falegnameria
  # di pregio (Stickley, mission style, mobili Arts & Crafts).

