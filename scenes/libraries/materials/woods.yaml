# ============================================================================
# Libreria Materiali — Legni (Pro-grade rewrite)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/woods.yaml" }]
#
# Tutti i materiali usano la NUOVA texture procedurale "wood" production-grade:
# profilo annuale asimmetrico (earlywood + latewood), variazione random per
# anello (larghezza + colore — la singola feature che separa il "look CG" dal
# "look reale"), recursive IQ domain warp, fold anisotropico, multi-banda
# noise (grain + figure orientata perpendicolare alla venatura), vasi di poro
# (Worley anisotropico per quercia/frassino/noce), gradiente sapwood/heartwood
# e knot 3D-cone. Stesso livello di Arnold `wood`/`knots`, Cycles Wave
# Texture in modalità Rings, RenderMan PxrWoodKnot, Substance Wood.
#
# ── Convenzioni ─────────────────────────────────────────────────────────
#
#   dis_  (Disney BSDF) — Per oggetti protagonisti. Supporta clearcoat,
#         sheen, subsurface. Per finiture lucide (laccato, verniciato)
#         abbassare roughness e alzare clearcoat. Usare con ≥128 spp.
#
#   cls_  (Classic) — Lambertian con texture wood. Per pavimenti, tavoli,
#         oggetti di sfondo. Zero rumore Disney.
#
# ── Finiture ─────────────────────────────────────────────────────────────
#
#   _grezzo      Poro aperto, nessuna finitura. Roughness 0.85-0.90,
#                sheen alto, pore_density max per essenze open-pore.
#   _olio        Olio penetrante (tung, lino). Esalta venatura, roughness
#                0.65-0.75, pori ancora visibili.
#   _cera        Cera d'api / paste wax. Satinata, clearcoat basso (0.20-0.30).
#   _verniciato  Poliuretano satinato. Clearcoat 0.55-0.70, roughness 0.28-0.34.
#   _laccato     Lacca a specchio (pianoforte). Clearcoat 0.90+, roughness <0.15,
#                pori chiusi (PoreDensity 0).
#
# ── Parametri texture "wood" — guida pratica ─────────────────────────────
#
#   scale                  Frequenza anelli: 3-4 = anelli larghi (legno vecchio),
#                          5-6 = anelli stretti (crescita rapida).
#   grain_strength         Ampiezza grain band (alias: noise_strength). 0.8-2.0.
#   latewood_width         Spessore latewood (0.15-0.30). 0.30 per conifere
#                          (legno tenero a crescita rapida), 0.15-0.20 per
#                          latifoglie (legno duro a crescita lenta).
#   ring_sharpness         Crispness della transizione latewood (1-6). 3-4 per
#                          quercia/noce/mogano (banda netta); 1.5-2 per acero
#                          (transizione morbida).
#   ring_color_variation   Anello-su-anello: 0.10-0.25 è il range naturale.
#                          0 = legno CG perfetto (NON usare); 0.15 = default
#                          consigliato; 0.25 = anni climaticamente variabili.
#   ring_width_variation   Spaziatura non uniforme (0.05-0.20).
#   warp_amplitude         Curvatura organica anelli (0.3-0.8). 0 = anelli
#                          perfettamente circolari (innaturale).
#   warp_iterations        1=warp singolo, 2=ricetta IQ canonica, 3=flow caotico.
#   fold_amplitude         Bending macro del tronco. Per axis=Y, default
#                          [0.3, 0.1, 0.3] è bilanciato.
#   figure_strength        Banda figure bassa frequenza (curly, flame, ribbon).
#                          0 default; 0.4-1.5 per look pregiati.
#   figure_aspect          Stira figure perpendicolare alla venatura (1=isotropic,
#                          3-5 = strisce trasversali nette).
#   pore_density           Vasi di poro per essenze open-pore (0.30-0.55 per
#                          quercia/frassino/noce). 0 per essenze close-pore
#                          (acero, faggio, ciliegio).
#   pore_aspect            Elongazione assiale dei pori (4-6 = vasi allungati
#                          lungo la venatura).
#   knot_density           Probabilità nodi (0-1). 0 default; 0.5-1.0 per pino,
#                          abete, cedro.
#   heartwood_radius       Raggio transizione sapwood/heartwood (in unità
#                          texture). 0 = disabilitato.
#   heartwood_blend        Shift colore (-1..1). Positivo = scurisce verso il
#                          centro (cuore). Naturale per noce, ciliegio, ipe.
#   color_ramp             Sostituisce `colors:` con gradiente multi-stop.
#                          Convenzione: position 0 = latewood scuro, 1 = earlywood
#                          chiaro/sapwood.
#   randomize_offset/rotation  Sempre true per decorrelare istanze adiacenti.
#
# ── Mask output per Disney roughness/sheen texture-driven ───────────────
#
#   Come per il marble, è possibile usare il MASK del wood (output: "mask")
#   per pilotare parametri Disney scalari: il latewood scuro = roughness più
#   bassa (più lucido), o sheen più alto sul earlywood (poro aperto).
#   Esempio nel "dis_quercia_pro" sotto.
#
# ============================================================================

