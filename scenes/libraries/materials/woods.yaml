# ============================================================================
# Libreria Materiali — Legni
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/woods.yaml" }]
#
# Raccolta completa di essenze lignee con finiture differenziate, dal legno
# grezzo non trattato alla lacca a specchio. Ogni materiale usa la texture
# procedurale "wood" del motore con parametri calibrati per essenza.
#
#   dis_  (Disney BSDF) — Per oggetti protagonisti. Supporta clearcoat
#         (vernice/lacca), sheen (poro aperto, oliatura), subsurface
#         (traslucenza delle essenze chiare). Usare con ≥128 spp.
#
#   cls_  (Classic) — Lambertian con texture wood. Perfetto per
#         pavimenti, tavoli, superfici di sfondo. Zero rumore Disney.
#         Per essenze verniciate, usa metal+fuzz con texture wood.
#
# ── Finiture ─────────────────────────────────────────────────────────────
#
#   Ogni essenza viene proposta in più finiture dove appropriato:
#
#   _grezzo    Nessun trattamento. Roughness altissima, sheen da poro
#              aperto, nessun clearcoat. Aspetto opaco e naturale.
#
#   _olio      Olio penetrante (tung, lino, danese). Esalta la venatura,
#              leggero sheen al radente, roughness medio-alta.
#
#   _cera      Finitura a cera d'api. Satinata, calore morbido.
#              Clearcoat basso con gloss medio.
#
#   _verniciato  Vernice trasparente (poliuretano, gommalacca).
#                Clearcoat medio-alto, venatura visibile sotto.
#
#   _laccato   Lacca piena (pianoforte, mobili orientali). Clearcoat
#              massimo, superficie quasi a specchio.
#
# ── Parametri texture "wood" ─────────────────────────────────────────────
#
#   scale          Frequenza degli anelli: basso = anelli larghi (legno
#                  vecchio), alto = anelli stretti (crescita rapida).
#   noise_strength Irregolarità della venatura (= alias `grain_strength`):
#                  basso = anelli regolari (essenze coltivate), alto = nodi e figure.
#   colors         [colore_chiaro, colore_scuro]: il legno precoce e
#                  tardivo che forma gli anelli. Il contrasto tra i due
#                  definisce la "personalità" dell'essenza.
#   randomize_offset/rotation  Sempre true per evitare pattern ripetitivi
#                  quando la stessa essenza è usata su più oggetti.
#
# ── Parametri "studio quality" (opt-in, step 5/7 VFX textures) ──────────
#
#   Il motore supporta cinque controlli aggiuntivi per produzioni VFX —
#   tutti hanno default no-op e non rompono le scene legacy:
#
#   ring_sharpness    Esponente del triangle-wave sugli anelli. 1 = legacy
#                     soft, 3-6 = legno tardivo (latewood) sottile e netto
#                     come in rovere/noce reali.
#
#   grain_scale       Moltiplicatore freq. sul grain (alta freq, fibra
#                     interna agli anelli). Default 1.0.
#
#   figure_scale      Moltiplicatore freq. sulla "figure" (bassa freq,
#                     ondulazione plank-wide). Default 0.25.
#   figure_strength   Peso della figure. 0 = disattivata (default). Tra
#                     0.4-1.8 produce il look "curly maple" / "flame
#                     mahogany" / "bird's-eye".
#
#   radial_anisotropy Comprime la coordinata radiale del noise sample
#                     point. 0 = piano-sawn isotropo (default). Tra 2-4
#                     produce il look quartersawn-oak con fibre stirate
#                     lungo la direzione radiale.
#
#   knot_density      Probabilità di spawn di nodi via Voronoi piccolo-
#                     scala. 0 = nessun nodo (default). Tra 0.5-1.0
#                     produce pino/abete nodoso con dark heart al centro
#                     del nodo. Combinabile con `color_ramp` 4-stop dove
#                     position 0 = cuore nodo nero, 0.2 = latewood, 0.65 =
#                     earlywood, 1.0 = sapwood.
#
#   color_ramp        Lista di stop multi-colore al posto del `colors:`
#                     a 2 colori. Sblocca gradienti sapwood/heartwood/
#                     knot a 3+ stop, con interp `linear` / `smoothstep`
#                     / `constant` / `ease` per segmento.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   LATIFOGLIE CHIARE     Acero, Betulla, Frassino, Faggio.
#                         Toni bianchi/crema/miele, venatura delicata.
#
#   LATIFOGLIE MEDIE      Quercia, Ciliegio, Teak, Iroko.
#                         Toni dorati/ambrati, venatura pronunciata.
#
#   LATIFOGLIE SCURE      Noce, Mogano, Wengé, Palissandro.
#                         Toni bruni/cioccolato, venatura ricca.
#
#   LEGNI NERI            Ebano, Ebano Macassar, Grenadilla.
#                         Toni quasi neri, estrema durezza.
#
#   CONIFERE              Pino, Abete, Cedro, Larice.
#                         Toni chiari/rosati, nodi prominenti.
#
#   LEGNI ESOTICI         Zebrano, Padouk, Amaranto, Bocote.
#                         Figure eccezionali, colori vivaci.
#
#   LEGNI TRATTATI        Legno sbiancato, carbonizzato (Shou Sugi Ban),
#                         invecchiato (barnwood), tinto.
#
#   STUDIO QUALITY        Variants con `figure_strength`, `radial_anisotropy`,
#                         `knot_density` e `color_ramp` per look VFX
#                         production-grade: curly maple, oak quartersawn,
#                         knotty pine, ecc.
#
# ============================================================================


