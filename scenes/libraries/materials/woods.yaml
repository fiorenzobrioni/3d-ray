  # ── PRO MASK SHOWCASE — quercia con roughness pilotata dal mask wood ───
  # Latewood scuro = pori chiusi dalla cera = roughness più bassa (più
  # lucido); earlywood chiaro = pori aperti = roughness più alta. Lo stesso
  # texture block è duplicato sotto `roughness_texture` con `output: "mask"`
  # e una rampa 2-stop che mappa [0,1] → [0.32, 0.78].

  - id: "dis_quercia_pro_mask"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.5
      grain_strength: 1.8
      latewood_width: 0.24
      ring_sharpness: 4.0
      ring_color_variation: 0.22
      ring_width_variation: 0.18
      warp_amplitude: 0.55
      figure_strength: 0.30
      figure_scale: 0.18
      figure_aspect: 4.0
      pore_density: 0.48
      pore_scale: 18.0
      pore_aspect: 6.0
      pore_strength: 0.55
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.26, 0.14, 0.05], interp: "smoothstep" }
        - { position: 0.55, color: [0.76, 0.55, 0.28], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.78, 0.50], interp: "linear" }
    roughness: 0.55
    roughness_texture:
      type: "wood"
      scale: 4.5
      grain_strength: 1.8
      latewood_width: 0.24
      ring_sharpness: 4.0
      ring_color_variation: 0.22
      ring_width_variation: 0.18
      warp_amplitude: 0.55
      pore_density: 0.48
      pore_scale: 18.0
      pore_aspect: 6.0
      pore_strength: 0.55
      output: "mask"
      randomize_offset: true
      randomize_rotation: true
      # CONVENZIONE mask wood: t=1 al picco di earlywood (bande chiare in
      # plateau), t=0 nel latewood scuro a fine anello e nei pori. La cera
      # chiude i pori del latewood e li lucida → roughness BASSA dove t=0,
      # ALTA sull'earlywood a poro aperto.
      color_ramp:
        - { position: 0.0, color: [0.32, 0.32, 0.32] }    # t=0 (latewood/poro) → lucido
        - { position: 1.0, color: [0.78, 0.78, 0.78] }    # t=1 (earlywood)     → ruvido
    specular: 0.32
    clearcoat: 0.20
    coat_roughness: 0.30
