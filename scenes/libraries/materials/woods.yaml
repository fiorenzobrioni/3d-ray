# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — WOODS
# ───────────────────────────────────────────────────────────────────────────
#  File:     woods.yaml
#  Disney:   60
#  Classic:  27      (lambertian: 27 · metal: 0 · dielectric: 0)
#  Total:    87
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: acero, betulla, frassino, faggio, quercia, ciliegio, teak,
#             iroko, noce, mogano, wengé, palissandro, ebano, macassar,
#             pino, abete, cedro, larice, zebrano, padouk, amaranto, bocote,
#             trattati (sbiancato, shou-sugi-ban, barnwood, tinto), studio
#             showcases (curly, flame, bird's eye, burl, quartersawn, mask).
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/woods.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: texture procedurale "wood" production-grade con
#            earlywood/latewood asimmetrico, IQ domain warp, pori anisotropi
#            (open-pore: quercia/frassino/noce/wenge), nodi 3D (conifere),
#            heartwood/sapwood gradient, figure (curly/flame/burl) e
#            radial_anisotropy (quartersawn). Clearcoat per verniciati,
#            sheen per grezzi, subsurface leggero per conifere chiare.
#   cls_*  — Classic: type `lambertian` con un singolo `color` RGB medio
#            rappresentativo dell'essenza. La texture wood procedurale,
#            il clearcoat e gli effetti speculari sono persi — è il prezzo
#            del Classic. Una sola variante per essenza (il colore medio
#            non cambia abbastanza tra grezzo/olio/cera per giustificare
#            duplicati). Per scene di sfondo e render rapidi.
#
# ── Finiture Disney ───────────────────────────────────────────────────────
#   _grezzo      Pori aperti, nessuna finitura. roughness 0.80-0.90, sheen alto.
#   _olio        Olio penetrante (tung, lino). roughness 0.55-0.70, pori visibili.
#   _cera        Cera d'api / paste wax. Satinata, clearcoat 0.20-0.30.
#   _verniciato  Poliuretano satinato. clearcoat 0.55-0.75, roughness 0.26-0.32.
#   _laccato     Lacca a specchio. clearcoat ≥ 0.90, roughness < 0.15.
#
# ── Materiali "solo Disney" (nessun cls_) ────────────────────────────────
#   Tutti gli studio con figure dominante (curly, flame, bird's eye, burl,
#   medullary rays) e mask-driven roughness: la firma del materiale è nei
#   lobi avanzati che il lambertian non può replicare.
#
# ── Categorie ─────────────────────────────────────────────────────────────
#   LATIFOGLIE CHIARE   Acero, betulla, frassino, faggio.
#   LATIFOGLIE MEDIE    Quercia, ciliegio, teak, iroko.
#   LATIFOGLIE SCURE    Noce, mogano, wengé, palissandro.
#   LEGNI NERI          Ebano, ebano macassar.
#   CONIFERE            Pino, abete, cedro, larice.
#   LEGNI ESOTICI       Zebrano, padouk, amaranto/purpleheart, bocote.
#   LEGNI TRATTATI      Sbiancato, shou-sugi-ban, barnwood, tinto nero/grigio.
#   STUDIO              Curly, flame, bird's eye, burl, quartersawn, mask.


