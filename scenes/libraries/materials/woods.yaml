  # (Rolls-Royce, Bentley) e calci di fucili pregiati.

  - id: "dis_noce_burl_studio"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.5
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.0
      noise_strength: 0.5
      octaves: 5
      figure_scale: 0.20
      figure_strength: 1.4
      knot_density: 0.6
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.10, 0.05, 0.02], interp: "smoothstep" }   # cuore nodo
