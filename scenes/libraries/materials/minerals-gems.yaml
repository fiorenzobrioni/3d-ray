# ============================================================================
# Libreria Materiali — Minerali e Gemme Grezze
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/minerals-gems.yaml" }]
#
# Cristalli grezzi, geodi, druse, minerali da collezione. Distinta da
# `glasses.yaml` (gemme tagliate e lucidate) per la presenza di:
#
#   • Faccette naturali asimmetriche → vector displacement tangent-space
#     con texture noise ridged.
#   • Inclusioni e zonature interne → subsurface_color modulato + thin_film.
#   • Adularescenza, asterismo, opalescenza → thin_film 400-700nm + color
#     ramp gradiente.
#   • Bordi cristallini netti → smooth voronoi smoothness ~0 (hard).
#   • Birifrangenza approssimata via materiali "doppi" mixati.
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF con spec_trans + ior per i cristalli trasparenti,
#         clearcoat per superfici lucide naturali (calcite),
#         thin_film per gemme iridescenti (opale, pietra di luna).
#
#   cls_  Solo per draft di campioni minerali di sfondo. Lambertian.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   QUARZI              Trasparente, fumè, citrino, rosa, ametista.
#                       Trasmissione ricca, dispersione visibile.
#
#   GEODI               Sezione di geode con base esterna ruvida e
#                       interno cristallino. Usare via composizione.
#
#   DRUSE               Aggregati di cristalli con bordi netti.
#                       Vector displacement essenziale.
#
#   CRISTALLI CUBICI    Pirite, sale halite, galena. Forme geometriche
#                       quasi perfette. Bump map regolare.
#
#   CALCITE             Birifrangente, lucentezza vitrea sui piani di
#                       sfaldatura.
#
#   FLUORITE            Multicolore stratificata. Color ramp 4+ stop.
#
#   MALACHITE           Bande verdi concentriche, marble studio
#                       (vein_axis radiale, secondary_wave).
#
#   LAPISLAZZULI        Blu profondo con pirite dorata. Mix material.
#
#   PIETRA DI LUNA      Adularescenza azzurra. Thin_film + subsurface.
#
#   OPALE               Gioco di colori. Thin_film + voronoi cell.
#
#   CRISTALLI RARI      Selenite, kyanite, tormalina, granato grezzo.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# Le gemme TAGLIATE (smeraldo brillante, rubino faccettato, zaffiro) stanno
# in `glasses.yaml` perché la fisica dominante è la pura rifrazione.
# Qui ci sono solo cristalli NATURALI con superfici imperfette o sezioni
# strutturali (druse, geodi).
#
# Per i geodi REALI a livello scena: usa un Group con due figli che
# hanno materiale base esterno (es. `dis_geode_base_ruvido`) e interno
# cristallino (es. `dis_ametista_geode_interno`). La sezione planare di
# taglio fa da divisore.
#
# Render hint:
#   Draft:  -s 128 -d 8 -S 1   (sample alti per le trasmissioni)
#   Final:  -s 2048 -d 12 -S 4
# ============================================================================

materials:

  # ══════════════════════════════════════════════════════════════════════
  # QUARZI
  # ══════════════════════════════════════════════════════════════════════

  # Quarzo cristallo trasparente: il classico, prisma esagonale.
  # Trasparente con leggere inclusioni. Spec_trans 1.0, ior 1.544.
  - id: "dis_quarzo_trasparente"
    type: "disney"
    color: [0.98, 0.98, 0.98]
    roughness: 0.05
    specular: 0.55
    spec_trans: 1.0
    ior: 1.544
    transmission_color: [0.98, 0.98, 0.99]
    transmission_depth: 1.5

  # Quarzo fumè: dal grigio chiaro al marrone scuro. Inclusioni radioattive
  # naturali. Transmission_color tinto, transmission_depth bassa.
  - id: "dis_quarzo_fume"
    type: "disney"
    color: [0.45, 0.38, 0.32]
    roughness: 0.08
    specular: 0.55
    spec_trans: 1.0
    ior: 1.544
    transmission_color: [0.32, 0.22, 0.14]
    transmission_depth: 0.8

  # Quarzo citrino: giallo dorato per Cr/Fe inclusi.
  - id: "dis_quarzo_citrino"
    type: "disney"
    color: [0.95, 0.78, 0.32]
    roughness: 0.05
    specular: 0.55
    spec_trans: 1.0
    ior: 1.544
    transmission_color: [0.92, 0.62, 0.20]
    transmission_depth: 1.0

  # Quarzo rosa: rosa pastello traslucido. Schiume di rutilo
  # microscopiche → cono di asterismo (qui semplificato come pure
  # transmission con leggero subsurface).
  - id: "dis_quarzo_rosa"
    type: "disney"
    color: [0.95, 0.78, 0.78]
    roughness: 0.08
    specular: 0.50
    spec_trans: 0.85
    ior: 1.544
    transmission_color: [0.92, 0.70, 0.72]
    transmission_depth: 0.8
    subsurface: 0.15
    subsurface_color: [0.98, 0.85, 0.85]

  # Ametista grezza: violetto saturo dalle inclusioni di Fe. Color ramp
  # 3-stop per simulare zonature naturali.
  - id: "dis_ametista_grezza"
    type: "disney"
    color: [0.55, 0.32, 0.78]
    roughness: 0.08
    specular: 0.55
    spec_trans: 0.95
    ior: 1.544
    transmission_color: [0.40, 0.18, 0.65]
    transmission_depth: 0.7
    texture:
      type: "noise"
      scale: 2.5
      noise_type: "fbm"
      octaves: 4
      noise_strength: 0.3
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.28, 0.12, 0.45], interp: "smoothstep" }
        - { position: 0.50, color: [0.55, 0.32, 0.78], interp: "smoothstep" }
        - { position: 1.00, color: [0.78, 0.55, 0.92], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # GEODI (sezioni)
  # ══════════════════════════════════════════════════════════════════════

  # Base esterna ruvida del geode: corteccia minerale grigia con
  # inclusioni cristalline microscopiche.
  - id: "dis_geode_base_ruvido"
    type: "disney"
    color: [0.55, 0.52, 0.48]
    roughness: 0.92
    specular: 0.28
    texture:
      type: "voronoi"
      scale: 8.0
      output: "cell"
      smoothness: 0.1
      colors: [[0.32, 0.30, 0.26], [0.68, 0.65, 0.60]]
    bump_map:
      texture:
        type: "voronoi"
        scale: 12.0
        output: "f2_minus_f1"
        colors: [[0.30, 0.30, 0.30], [0.70, 0.70, 0.70]]
      strength: 1.8

  # Interno geode ametistato: parete cristallina della cavità interna.
  # Stesso colore dell'ametista grezza ma con superficie cristallina
  # via vector displacement.
  - id: "dis_ametista_geode_interno"
    type: "disney"
    color: [0.55, 0.32, 0.78]
    roughness: 0.08
    specular: 0.55
    spec_trans: 0.6
    ior: 1.544
    transmission_color: [0.45, 0.20, 0.68]
    transmission_depth: 0.6
    displacement:
      mode: "vector"
      space: "tangent"
      texture:
        type: "noise"
        scale: 18.0
        noise_type: "ridged"
        octaves: 4
        colors: [[0.3, 0.3, 0.35], [0.7, 0.7, 0.65]]
      scale: 0.012
      midlevel: 0.5
      bound: 0.020
      autobump: true
      autobump_strength: 1.4
      displacement_method: "bump_only"

  # Interno geode agata: bande concentriche colorate (chalcedonio).
  - id: "dis_agata_geode_interno"
    type: "disney"
    color: [0.78, 0.62, 0.42]
    roughness: 0.18
    specular: 0.50
    texture:
      type: "marble"
      scale: 4.0
      vein_axis: [0, 1, 0]
      vein_frequency: 2.5
      vein_sharpness: 3.0
      noise_strength: 4.0
      octaves: 6
      color_ramp:
        - { position: 0.00, color: [0.32, 0.18, 0.08], interp: "smoothstep" }
        - { position: 0.30, color: [0.62, 0.42, 0.22], interp: "smoothstep" }
        - { position: 0.65, color: [0.85, 0.70, 0.52], interp: "smoothstep" }
        - { position: 1.00, color: [0.96, 0.90, 0.78], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # DRUSE
  # ══════════════════════════════════════════════════════════════════════

  # Drusa di quarzo bianco: tappeto di cristalli appuntiti. Vector
  # displacement per le faccette naturali asimmetriche.
  - id: "dis_drusa_quarzo"
    type: "disney"
    color: [0.92, 0.92, 0.95]
    roughness: 0.05
    specular: 0.55
    spec_trans: 0.4
    ior: 1.544
    transmission_color: [0.95, 0.95, 0.97]
    transmission_depth: 0.5
    displacement:
      mode: "vector"
      space: "tangent"
      texture:
        type: "voronoi"
        scale: 24.0
        output: "position"
        randomness: 1.0
        colors: [[0.2, 0.2, 0.3], [0.8, 0.8, 0.7]]
      scale: 0.025
      midlevel: 0.5
      bound: 0.040
      autobump: true
      autobump_strength: 1.6
      displacement_method: "bump_only"

  - id: "dis_drusa_ametista"
    type: "disney"
    color: [0.62, 0.42, 0.82]
    roughness: 0.05
    specular: 0.55
    spec_trans: 0.4
    ior: 1.544
    transmission_color: [0.50, 0.28, 0.70]
    transmission_depth: 0.5
    displacement:
      mode: "vector"
      space: "tangent"
      texture:
        type: "voronoi"
        scale: 24.0
        output: "position"
        randomness: 1.0
        colors: [[0.2, 0.2, 0.3], [0.8, 0.8, 0.7]]
      scale: 0.025
      midlevel: 0.5
      bound: 0.040
      autobump: true
      autobump_strength: 1.6
      displacement_method: "bump_only"

  # ══════════════════════════════════════════════════════════════════════
  # CRISTALLI CUBICI (pirite, halite, galena)
  # ══════════════════════════════════════════════════════════════════════

  # Pirite cubica: oro degli sciocchi, cubi metallici dorati pseudo-perfetti.
  # Riflesso quasi-metallico (pirite ha lucentezza metallica).
  - id: "dis_pirite_cubica"
    type: "disney"
    metallic: 0.85
    color: [0.85, 0.72, 0.32]
    roughness: 0.28
    specular: 0.55
    texture:
      type: "noise"
      scale: 5.0
      noise_strength: 0.10
      colors: [[0.78, 0.65, 0.28], [0.92, 0.78, 0.36]]
      randomize_offset: true
    bump_map:
      texture:
        type: "noise"
        scale: 25.0
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.5

  # Sale halite cubico: cristalli trasparenti incolori, perfetti cubi.
  - id: "dis_halite_cubica"
    type: "disney"
    color: [0.98, 0.98, 0.98]
    roughness: 0.10
    specular: 0.50
    spec_trans: 1.0
    ior: 1.544
    transmission_color: [0.98, 0.98, 0.99]
    transmission_depth: 1.2

  # Sale halite rosa Himalayano: con tracce di ferro.
  - id: "dis_halite_rosa"
    type: "disney"
    color: [0.95, 0.78, 0.72]
    roughness: 0.12
    specular: 0.45
    spec_trans: 0.85
    ior: 1.544
    transmission_color: [0.92, 0.65, 0.58]
    transmission_depth: 0.6
    subsurface: 0.15

  # Galena: solfuro di piombo, cubi metallici grigio scuro.
  - id: "dis_galena_cubica"
    type: "disney"
    metallic: 0.95
    color: [0.42, 0.42, 0.45]
    roughness: 0.18
    specular: 0.55
    texture:
      type: "noise"
      scale: 5.0
      noise_strength: 0.10
      colors: [[0.38, 0.38, 0.42], [0.48, 0.48, 0.50]]
      randomize_offset: true

  # ══════════════════════════════════════════════════════════════════════
  # CALCITE (lucentezza vitrea sui piani di sfaldatura)
  # ══════════════════════════════════════════════════════════════════════

  # Calcite trasparente islandese: birifrangenza. La doppia rifrazione
  # vera richiederebbe geometria a 2 cristalli sovrapposti; qui
  # approssimiamo con clearcoat + ior leggermente diverso dal main.
  - id: "dis_calcite_islandese"
    type: "disney"
    color: [0.98, 0.98, 0.96]
    roughness: 0.05
    specular: 0.50
    spec_trans: 0.95
    ior: 1.486
    transmission_color: [0.98, 0.98, 0.97]
    transmission_depth: 2.0
    clearcoat: 0.4
    coat_ior: 1.658
    coat_roughness: 0.05

  # Calcite gialla: variante più comune con tracce minerali.
  - id: "dis_calcite_gialla"
    type: "disney"
    color: [0.95, 0.88, 0.62]
    roughness: 0.08
    specular: 0.50
    spec_trans: 0.85
    ior: 1.486
    transmission_color: [0.90, 0.78, 0.40]
    transmission_depth: 1.5

  # ══════════════════════════════════════════════════════════════════════
  # FLUORITE (multicolore stratificata)
  # ══════════════════════════════════════════════════════════════════════

  # Fluorite viola: la più classica, ottaedrica.
  - id: "dis_fluorite_viola"
    type: "disney"
    color: [0.48, 0.28, 0.62]
    roughness: 0.10
    specular: 0.50
    spec_trans: 0.92
    ior: 1.434
    transmission_color: [0.42, 0.18, 0.58]
    transmission_depth: 0.8

  # Fluorite arcobaleno (rainbow): bande di colore stratificate. Color
  # ramp 5-stop per riprodurre gradiente naturale.
  - id: "dis_fluorite_rainbow"
    type: "disney"
    color: [0.65, 0.55, 0.78]
    roughness: 0.10
    specular: 0.50
    spec_trans: 0.85
    ior: 1.434
    transmission_color: [0.55, 0.42, 0.70]
    transmission_depth: 0.7
    texture:
      type: "noise"
      scale: 1.8
      noise_type: "fbm"
      octaves: 4
      noise_strength: 0.4
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.30, 0.18, 0.55], interp: "smoothstep" }
        - { position: 0.30, color: [0.45, 0.62, 0.30], interp: "smoothstep" }
        - { position: 0.55, color: [0.85, 0.78, 0.32], interp: "smoothstep" }
        - { position: 0.80, color: [0.78, 0.42, 0.50], interp: "smoothstep" }
        - { position: 1.00, color: [0.45, 0.32, 0.78], interp: "linear" }

  # Fluorite verde: tonalità smeraldo.
  - id: "dis_fluorite_verde"
    type: "disney"
    color: [0.42, 0.75, 0.55]
    roughness: 0.10
    specular: 0.50
    spec_trans: 0.92
    ior: 1.434
    transmission_color: [0.32, 0.72, 0.50]
    transmission_depth: 0.8

  # ══════════════════════════════════════════════════════════════════════
  # MALACHITE
  # ══════════════════════════════════════════════════════════════════════

  # Malachite a bande concentriche: marble studio con vein_axis radiale
  # e secondary_wave per concentricità.
  - id: "dis_malachite"
    type: "disney"
    color: [0.18, 0.45, 0.28]
    roughness: 0.18
    specular: 0.45
    clearcoat: 0.55
    coat_roughness: 0.10
    texture:
      type: "marble"
      scale: 3.0
      vein_axis: [0, 1, 0]
      vein_frequency: 3.0
      vein_sharpness: 4.0
      noise_strength: 3.5
      octaves: 7
      distortion: 0.18
      secondary_wave:
        axis: [1, 0, 0]
        frequency: 2.2
        strength: 0.5
      color_ramp:
        - { position: 0.00, color: [0.04, 0.18, 0.08], interp: "smoothstep" }
        - { position: 0.40, color: [0.18, 0.42, 0.22], interp: "smoothstep" }
        - { position: 0.70, color: [0.32, 0.62, 0.36], interp: "smoothstep" }
        - { position: 1.00, color: [0.62, 0.85, 0.50], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # LAPISLAZZULI
  # ══════════════════════════════════════════════════════════════════════

  # Lapislazzuli base: blu profondo con inclusioni dorate di pirite.
  # In una scena reale combinare via mix con `dis_pirite_cubica` come
  # material_b per le venature dorate.
  - id: "dis_lapislazzuli"
    type: "disney"
    color: [0.12, 0.22, 0.55]
    roughness: 0.35
    specular: 0.42
    clearcoat: 0.3
    coat_roughness: 0.18
    texture:
      type: "noise"
      scale: 2.5
      noise_type: "fbm"
      octaves: 5
      noise_strength: 0.8
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.04, 0.10, 0.32], interp: "smoothstep" }
        - { position: 0.50, color: [0.10, 0.22, 0.58], interp: "smoothstep" }
        - { position: 0.85, color: [0.18, 0.35, 0.72], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.78, 0.32], interp: "linear" }   # pirite

  # ══════════════════════════════════════════════════════════════════════
  # PIETRA DI LUNA (adularescenza)
  # ══════════════════════════════════════════════════════════════════════

  # Pietra di luna bianca con adularescenza azzurra: il classico
  # feldspato adulare. Thin_film 450-550nm per il glow azzurro.
  - id: "dis_pietra_di_luna"
    type: "disney"
    color: [0.92, 0.93, 0.96]
    roughness: 0.15
    specular: 0.50
    spec_trans: 0.45
    ior: 1.522
    transmission_color: [0.92, 0.94, 0.98]
    transmission_depth: 1.0
    subsurface: 0.40
    subsurface_color: [0.75, 0.85, 1.00]
    thin_film_thickness: 480
    thin_film_ior: 1.55

  # Pietra di luna pesca: variante caratteristica, glow arancione-rosa.
  - id: "dis_pietra_di_luna_pesca"
    type: "disney"
    color: [0.95, 0.78, 0.62]
    roughness: 0.18
    specular: 0.50
    spec_trans: 0.40
    ior: 1.522
    subsurface: 0.40
    subsurface_color: [0.98, 0.72, 0.55]
    thin_film_thickness: 620
    thin_film_ior: 1.55

  # ══════════════════════════════════════════════════════════════════════
  # OPALE (gioco di colori)
  # ══════════════════════════════════════════════════════════════════════

  # Opale bianco: bianco con flash colorati. Thin_film 350-450nm per
  # iridescenza primaria + voronoi cell modulato.
  - id: "dis_opale_bianco"
    type: "disney"
    color: [0.94, 0.92, 0.88]
    roughness: 0.12
    specular: 0.50
    subsurface: 0.32
    subsurface_color: [0.95, 0.93, 0.90]
    thin_film_thickness: 380
    thin_film_ior: 1.45
    texture:
      type: "voronoi"
      scale: 12.0
      output: "cell"
      smoothness: 0.4
      randomness: 1.0
      colors: [[0.85, 0.85, 0.82], [0.98, 0.96, 0.92]]

  # Opale nero: il più pregiato, base scura per esaltare i colori.
  - id: "dis_opale_nero"
    type: "disney"
    color: [0.08, 0.08, 0.10]
    roughness: 0.10
    specular: 0.55
    subsurface: 0.18
    subsurface_color: [0.10, 0.10, 0.12]
    thin_film_thickness: 420
    thin_film_ior: 1.45
    texture:
      type: "voronoi"
      scale: 12.0
      output: "cell"
      smoothness: 0.3
      colors: [[0.04, 0.04, 0.05], [0.16, 0.14, 0.18]]

  # Opale di fuoco: rosso-arancio infuocato, lavorabile a sfera.
  - id: "dis_opale_fuoco"
    type: "disney"
    color: [0.92, 0.42, 0.18]
    roughness: 0.10
    specular: 0.55
    spec_trans: 0.55
    ior: 1.450
    transmission_color: [0.85, 0.32, 0.10]
    transmission_depth: 0.6
    subsurface: 0.30
    subsurface_color: [0.98, 0.55, 0.22]
    thin_film_thickness: 560
    thin_film_ior: 1.45

  # ══════════════════════════════════════════════════════════════════════
  # CRISTALLI RARI
  # ══════════════════════════════════════════════════════════════════════

  # Selenite: gesso fibroso trasparente, raggi paralleli.
  - id: "dis_selenite"
    type: "disney"
    color: [0.95, 0.94, 0.92]
    roughness: 0.12
    specular: 0.42
    spec_trans: 0.75
    ior: 1.520
    transmission_color: [0.94, 0.93, 0.90]
    transmission_depth: 1.0
    subsurface: 0.25
    texture:
      type: "noise"
      scale: 0.8
      noise_type: "fbm"
      octaves: 3
      noise_strength: 0.15
      colors: [[0.88, 0.87, 0.84], [0.96, 0.95, 0.92]]
      randomize_offset: true

  # Kyanite: cianite, azzurro intenso a bande longitudinali. Anisotropia
  # bidirezionale tipica del cristallo.
  - id: "dis_kyanite"
    type: "disney"
    color: [0.18, 0.42, 0.78]
    roughness: 0.15
    specular: 0.55
    spec_trans: 0.40
    ior: 1.715
    transmission_color: [0.12, 0.35, 0.72]
    transmission_depth: 0.5
    anisotropic: 0.65
    anisotropic_rotation: 0.0
    texture:
      type: "noise"
      scale: 8.0
      noise_type: "fbm"
      octaves: 3
      noise_strength: 0.25
      colors: [[0.10, 0.30, 0.65], [0.28, 0.52, 0.85]]
      randomize_offset: true

  # Tormalina watermelon: bicolore rosa/verde, sezione assiale.
