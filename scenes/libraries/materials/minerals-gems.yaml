# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — MINERALS & GEMS (rough)
# ───────────────────────────────────────────────────────────────────────────
#  File:     minerals-gems.yaml
#  Disney:   30
#  Classic:  0       (lambertian: 0 · metal: 0 · dielectric: 0)
#  Total:    30
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: quarzi (trasparente/fumè/citrino/rosa/ametista), geodi,
#             druse vector-displaced, cristalli cubici (pirite/halite/galena),
#             calcite, fluorite, malachite, lapislazzuli, pietra di luna,
#             opale (bianco/nero/fuoco), cristalli rari (selenite/kyanite/
#             tormalina/granato).
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/minerals-gems.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF. Tutti i minerali e gemme grezze qui sfruttano
#            feature Disney irrinunciabili (thin_film 350-700nm per
#            adularescenza/opalescenza, vector displacement per druse e
#            faccette cristalline, subsurface per traslucenze, marble
#            production-grade per bande agata/malachite, clearcoat dual-path
#            per calcite birifrangente). NON esiste variante Classic: la
#            perdita di queste feature snaturerebbe il materiale.
#
# ── Distinzione dalle gemme TAGLIATE ──
#   Le gemme lucidate e faccettate (smeraldo brillante, rubino, zaffiro)
#   sono in `glasses.yaml` perché la fisica dominante è la pura rifrazione
#   con dispersione. Qui ci sono solo cristalli NATURALI con superfici
#   imperfette o sezioni strutturali (druse, geodi).
#
# ── Geodi a livello scena ──
#   Componi un Group con due figli: materiale `dis_geode_base_ruvido` per
#   la corteccia esterna + materiale `dis_*_geode_interno` per la cavità
#   cristallina. La sezione planare di taglio fa da divisore.
#
# ── Categorie ──
#   QUARZI              Trasparente, fumè, citrino, rosa, ametista grezza.
#   GEODI               Base esterna ruvida + interni ametista/agata.
#   DRUSE               Aggregati cristallini con vector displacement.
#   CRISTALLI CUBICI    Pirite, halite, halite rosa Himalayano, galena.
#   CALCITE             Islandese birifrangente, calcite gialla.
#   FLUORITE            Viola, rainbow stratificata, verde smeraldo.
#   MALACHITE           Bande verdi concentriche (marble 3-layer + warp).
#   LAPISLAZZULI        Blu profondo con inclusioni dorate.
#   PIETRA DI LUNA      Adularescenza azzurra/pesca (thin_film + SSS).
#   OPALE               Bianco, nero, fuoco (thin_film + voronoi cell).
#   CRISTALLI RARI      Selenite, kyanite, tormalina watermelon, granato.


materials:

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║  DISNEY                                                               ║
  # ╚═══════════════════════════════════════════════════════════════════════╝

  # ── QUARZI ───────────────────────────────────────────────────────────────

  # Quarzo cristallo trasparente — classico prisma esagonale; ior 1.544,
  # spec_trans 1.0, leggere inclusioni
  - id: "dis_quarzo_trasparente"
    type: "disney"
    color: [0.98, 0.98, 0.98]
    roughness: 0.05
    specular: 0.55
    spec_trans: 1.0
    ior: 1.544
    transmission_color: [0.98, 0.98, 0.99]
    transmission_depth: 1.5

  # Quarzo fumè — dal grigio chiaro al marrone scuro, Beer-Lambert tinto
