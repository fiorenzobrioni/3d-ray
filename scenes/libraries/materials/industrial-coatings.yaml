  # Gloss white perlato: bianco brillante quasi puro.
  - id: "dis_chassis_gloss_bianco"
    type: "disney"
    color: [0.94, 0.94, 0.94]
    roughness: 0.15
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.04

  # Gloss rosso Ferrari: rosso saturo intenso.
  - id: "dis_chassis_gloss_rosso"
    type: "disney"
    color: [0.78, 0.04, 0.06]
    roughness: 0.15
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.04

  # Gloss blu metallizzato: con flake metallici. Metallic 0.5 + alta
  # spec per glitter.
  - id: "dis_chassis_gloss_blu_metallic"
    type: "disney"
    metallic: 0.5
    color: [0.08, 0.18, 0.45]
    roughness: 0.20
    specular: 0.60
    clearcoat: 1.0
    coat_roughness: 0.04

  # ══════════════════════════════════════════════════════════════════════
  # ANTI-GRAFFIO
  # ══════════════════════════════════════════════════════════════════════

  # Clear coat industriale: incolore lucido protettivo. Da sovrapporre
  # via mix a base color metalliche/decorative.
  - id: "dis_clearcoat_protettivo"
    type: "disney"
    color: [0.96, 0.96, 0.96]
    roughness: 0.05
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.04
    spec_trans: 0.85
    ior: 1.50

  # Matte anti-glare nero: pannelli cruscotti, attrezzature ottiche.
  - id: "dis_matte_antiglare_nero"
    type: "disney"
    color: [0.04, 0.04, 0.04]
    roughness: 0.92
    specular: 0.18

  # ══════════════════════════════════════════════════════════════════════
