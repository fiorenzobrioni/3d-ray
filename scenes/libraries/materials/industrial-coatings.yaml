  # blu→viola→rosa→giallo (riscaldamento progressivo).
  - id: "dis_termocromica"
    type: "disney"
    color: [0.42, 0.55, 0.72]
    roughness: 0.32
    specular: 0.42
    clearcoat: 0.55
    coat_roughness: 0.15
    coat_ior: 1.5
