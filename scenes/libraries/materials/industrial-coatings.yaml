# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — INDUSTRIAL COATINGS
# ───────────────────────────────────────────────────────────────────────────
#  File:     industrial-coatings.yaml
#  Disney:   43
#  Classic:  0       (lambertian: 0 · metal: 0 · dielectric: 0)
#  Total:    43
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: chassis auto matte/gloss, anti-graffio, polveri elettrostatiche
#             RAL, anodizzazioni alluminio/titanio (thin_film), zincature,
#             cromature, smalti a fuoco, gel coat marini, termocromiche,
#             retroreflettenti, anti-corrosive, fluorescenti safety.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/industrial-coatings.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF. SOLO Disney: anche i rivestimenti industriali
#            "matte" hanno componente speculare/clearcoat irrinunciabile,
#            e le anodizzazioni dipendono da thin_film_thickness — niente
#            di tutto questo è rappresentabile in Classic.
#
# Distinta da `paints.yaml` (vernici artistiche, murali, decorative).
#
# Feature usate:
#   • thin_film_thickness + thin_film_ior per anodizzazione alluminio/
#     titanio con interferenza colorata reale.
#   • clearcoat 1.0 + coat_roughness 0.04 + coat_ior 1.5 per gel coat
#     marini e chassis auto gloss; bump_map voronoi smooth a scala 80+
#     per "orange peel" automotive (la pellicola coat trasmette il
#     micro-rilievo della normale base in shading).
#   • flake noise (voronoi cell scale alta) per polveri metallizzate.
#   • color_ramp 4-stop evolutivo (gradient) per termocromiche.
#   • anisotropic + anisotropic_rotation per cromo satinato spazzolato.
#
# ── Note d'uso ──
#   Anodizzazione: i colori derivano UNICAMENTE da thin_film_thickness.
#   Il `color` base è grigio neutro (alluminio nudo); lo spessore in
#   nanometri determina lo shift cromatico:
#     - Naturale:  0       (nessun thin_film, alluminio nudo)
#     - Oro:       350-450 nm
#     - Rosso:     300-350 nm
#     - Viola:     400-450 nm
#     - Blu:       500-600 nm
#     - Verde:     600-700 nm
#
# ── Categorie ──
#   CHASSIS AUTO MATTE     Matte black/grey/cement. Roughness 0.6-0.8.
#   CHASSIS AUTO GLOSS     Gloss black/white/red + metallizzate. Clearcoat 1.0.
#   ANTI-GRAFFIO           Clear coat protettivo, matte anti-glare.
#   POLVERI RAL            9005 nero, 9010 bianco, 3020 rosso, 5015 blu,
#                          1023 giallo, 6018 verde, 7035 grigio + metallizzate.
#   ANODIZZAZIONE AL/TI    Alluminio anodizzato (oro/blu/rosso/viola/verde)
#                          + titanio anodizzato (thin_film).
#   ZINCATURA              Lucida, opaca, invecchiata.
#   CROMATURA              Specchio, satinata, nichelatura.
#   SMALTO A FUOCO         Bianco, rosso, blu cobalto.
#   GEL COAT MARINO        Bianco, blu marino, antracite.
#   SPECIALI               Termocromiche, retroreflettenti, anti-corrosive,
#                          fluorescenti safety.


materials:

