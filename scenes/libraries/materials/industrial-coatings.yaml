# ============================================================================
# Libreria Materiali — Vernici e Rivestimenti Industriali
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/industrial-coatings.yaml" }]
#
# Verniciature tecniche e rivestimenti funzionali per applicazioni
# industriali, automotive e nautiche. Distinta da `paints.yaml` (vernici
# artistiche, murali, decorative).
#
# Sfrutta:
#
#   • Thin_film 200-500nm per anodizzazioni con interferenza colorata reale
#     (alluminio anodizzato cambia colore con spessore strato).
#   • Coat_normal_map procedurale per "orange peel" automotive (microbump
#     sotto il clearcoat tipico delle vernici a spruzzo).
#   • Color_ramp 4-stop per termocromiche (color shift per temperatura).
#   • Voronoi smooth per finiture a polvere elettrostatica (granulometria
#     molto fine).
#   • Anisotropic per spazzolato cromato/zincato.
#   • Clearcoat 1.0 + coat_roughness ultra-bassa per gel coat marini.
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF. Sempre. Anche le verniciature industriali "matte"
#         hanno componenti speculari significative.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   CHASSIS AUTO OPACO  Matte black, matte grey, matte cement.
#                       Roughness 0.6-0.8, coat moderato.
#
#   CHASSIS AUTO LUCIDO Gloss black, gloss white, premium colors.
#                       Clearcoat 1.0 + coat_roughness 0.04.
#
#   ANTI-GRAFFIO        Clear coat industriale, matte anti-glare.
#                       Trasparente o pigmentato leggero.
#
#   POLVERI ELETTROSTAT. RAL standard: 9005 nero, 9010 bianco, 3020 rosso
#                       segnaletico, 5015 blu cielo, 1023 giallo traffico,
#                       6018 verde mela, 7035 grigio luce.
#
#   ANODIZZAZIONE       Alluminio anodizzato: oro, nero, blu, rosso, viola,
#                       naturale. Thin_film per colorazione interferenza.
#
#   ZINCATURA           Zinco a caldo: lucida fresca, opaca, invecchiata.
#
#   CROMATURA INDUSTR.  Lucida specchio, satinata, nichelata.
#
#   SMALTO A FUOCO      Vetrosa cotta sopra metallo. Roughness ultra-bassa.
#
#   GEL COAT MARINO     Verniciatura nautica resistente UV/sale.
#                       Bianco, blu, grigio.
#
#   SPECIALI            Termocromiche, retroreflettenti, anti-corrosive,
#                       fluorescenti safety.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# Coat_normal_map "orange peel": per il classico difetto di vernice a
# spruzzo automotive, applica al `coat_normal_map`:
#   coat_normal_map:
#     path: "<procedurale-via-bump>"   # in alternativa usa bump_map
#     strength: 0.4
# In assenza di mappe orange peel pre-renderizzate, qui forniamo bump_map
# voronoi smooth con scale 80+ per simulare la microstruttura.
#
# Anodizzazione: i colori derivano UNICAMENTE da thin_film_thickness. Il
# `color` base è grigio neutro (alluminio nudo). Lo spessore in nanometri
# determina lo shift cromatico:
#   - Naturale:  0    (nessun thin_film, alluminio nudo)
#   - Oro:       350-450 nm
#   - Rosso:     300-350 nm
#   - Viola:     400-450 nm
#   - Blu:       500-600 nm
#   - Verde:     600-700 nm
#
# Render hint:
#   Draft:  -s 64  -d 5  -S 1
#   Final:  -s 1024 -d 8 -S 4
# ============================================================================

materials:

  # ══════════════════════════════════════════════════════════════════════
  # CHASSIS AUTO OPACO (matte)
  # ══════════════════════════════════════════════════════════════════════

  # Matte black professionale: ruvido ma uniforme. Roughness 0.65 +
  # clearcoat moderato per quel "satin matte" tipico delle finizioni
  # nuove.
  - id: "dis_chassis_matte_nero"
    type: "disney"
    color: [0.04, 0.04, 0.04]
    roughness: 0.65
    specular: 0.32
    clearcoat: 0.20
    coat_roughness: 0.55
    bump_map:
      texture:
        type: "voronoi"
        scale: 80.0
        smoothness: 0.5
        colors: [[0.45, 0.45, 0.45], [0.55, 0.55, 0.55]]
      strength: 0.3

  # Matte grey: chassis sportivi neutri.
  - id: "dis_chassis_matte_grigio"
    type: "disney"
    color: [0.22, 0.22, 0.23]
    roughness: 0.65
    specular: 0.32
    clearcoat: 0.20
    coat_roughness: 0.55
    bump_map:
      texture:
        type: "voronoi"
        scale: 80.0
        smoothness: 0.5
        colors: [[0.45, 0.45, 0.45], [0.55, 0.55, 0.55]]
      strength: 0.3

  # Matte cement: grigio cemento freddo, look "stealth".
  - id: "dis_chassis_matte_cemento"
    type: "disney"
    color: [0.45, 0.45, 0.43]
    roughness: 0.62
    specular: 0.32
    clearcoat: 0.20
    coat_roughness: 0.55

