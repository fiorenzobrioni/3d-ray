    clearcoat: 0.50
    coat_roughness: 0.18

  # RAL 5015 blu cielo.
  - id: "dis_ral5015_blu_cielo"
    type: "disney"
    color: [0.10, 0.42, 0.65]
    roughness: 0.42
    specular: 0.40
    clearcoat: 0.50
    coat_roughness: 0.18

  # RAL 1023 giallo traffico.
  - id: "dis_ral1023_giallo_traffico"
    type: "disney"
    color: [0.95, 0.78, 0.08]
    roughness: 0.42
    specular: 0.40
    clearcoat: 0.50
    coat_roughness: 0.18

  # RAL 6018 verde mela.
  - id: "dis_ral6018_verde_mela"
    type: "disney"
    color: [0.32, 0.65, 0.18]
    roughness: 0.42
    specular: 0.40
    clearcoat: 0.50
    coat_roughness: 0.18

  # RAL 7035 grigio luce.
  - id: "dis_ral7035_grigio_luce"
    type: "disney"
    color: [0.78, 0.78, 0.76]
    roughness: 0.45
