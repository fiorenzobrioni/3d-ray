  # ══════════════════════════════════════════════════════════════════════
  # ANODIZZAZIONE ALLUMINIO
  # ══════════════════════════════════════════════════════════════════════

  # Alluminio anodizzato naturale: nudo, argento.
  - id: "dis_anodizzato_naturale"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.30
    specular: 0.55
    anisotropic: 0.40

  # Anodizzato oro: thin_film 380nm dà tinge dorato all'alluminio.
  - id: "dis_anodizzato_oro"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.25
    specular: 0.55
    anisotropic: 0.40
    thin_film_thickness: 380
    thin_film_ior: 1.55

  # Anodizzato nero: stesso processo ma con coloranti organici aggiunti.
  - id: "dis_anodizzato_nero"
    type: "disney"
    metallic: 1.0
    color: [0.08, 0.08, 0.08]
    roughness: 0.28
    specular: 0.55
    anisotropic: 0.40

  # Anodizzato blu: thin_film 540nm.
  - id: "dis_anodizzato_blu"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.25
    specular: 0.55
    anisotropic: 0.40
    thin_film_thickness: 540
    thin_film_ior: 1.55

  # Anodizzato rosso: thin_film 320nm.
  - id: "dis_anodizzato_rosso"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.25
    specular: 0.55
    anisotropic: 0.40
    thin_film_thickness: 320
    thin_film_ior: 1.55

  # Anodizzato viola: thin_film 420nm.
  - id: "dis_anodizzato_viola"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.25
    specular: 0.55
    anisotropic: 0.40
    thin_film_thickness: 420
    thin_film_ior: 1.55

  # Anodizzato verde: thin_film 640nm.
  - id: "dis_anodizzato_verde"
    type: "disney"
    metallic: 1.0
    color: [0.91, 0.91, 0.92]
    roughness: 0.25
    specular: 0.55
    anisotropic: 0.40
    thin_film_thickness: 640
    thin_film_ior: 1.55

  # ══════════════════════════════════════════════════════════════════════
  # ZINCATURA
  # ══════════════════════════════════════════════════════════════════════

  # Zinco a caldo lucido: fresco, riflessi argento opaco con tinte azzurre.
  - id: "dis_zinco_lucido"
    type: "disney"
    metallic: 1.0
    color: [0.85, 0.86, 0.88]
    roughness: 0.32
    specular: 0.55

  # Zinco opaco: dopo qualche mese di esposizione, ossido di zinco.
  - id: "dis_zinco_opaco"
    type: "disney"
    metallic: 0.85
    color: [0.75, 0.75, 0.76]
    roughness: 0.55
    specular: 0.45

  # Zinco invecchiato: completamente opaco, grigio scuro.
  - id: "dis_zinco_invecchiato"
    type: "disney"
    metallic: 0.55
    color: [0.55, 0.55, 0.55]
    roughness: 0.78
    specular: 0.30
    texture:
      type: "noise"
      scale: 3.0
      noise_strength: 0.18
      colors: [[0.45, 0.45, 0.45], [0.62, 0.62, 0.62]]
      randomize_offset: true

  # ══════════════════════════════════════════════════════════════════════
  # CROMATURA INDUSTRIALE
  # ══════════════════════════════════════════════════════════════════════

  # Cromo specchio industriale: riflesso perfetto, manopole, cromi auto.
  - id: "dis_cromo_industriale"
    type: "disney"
    metallic: 1.0
    color: [0.95, 0.95, 0.97]
    roughness: 0.05
    specular: 0.60
    clearcoat: 0.9
    coat_roughness: 0.04

  # Cromo satinato: spazzolato direzionale.
  - id: "dis_cromo_satinato"
    type: "disney"
    metallic: 1.0
    color: [0.92, 0.92, 0.94]
    roughness: 0.20
    specular: 0.55
    anisotropic: 0.85
    anisotropic_rotation: 0.0
    bump_map:
      texture:
        type: "noise"
        scale: 200.0
        noise_type: "ridged"
        colors: [[0.42, 0.42, 0.42], [0.58, 0.58, 0.58]]
      strength: 0.3

  # Nichelatura industriale: caldo argento-oro pallido.
  - id: "dis_nichelatura"
    type: "disney"
    metallic: 1.0
    color: [0.88, 0.87, 0.78]
    roughness: 0.15
    specular: 0.55

  # ══════════════════════════════════════════════════════════════════════
  # SMALTO A FUOCO (porcellanato)
  # ══════════════════════════════════════════════════════════════════════

  # Smalto bianco lucido: targhe smaltate, segnaletica vintage.
  - id: "dis_smalto_fuoco_bianco"
    type: "disney"
    color: [0.96, 0.96, 0.94]
    roughness: 0.05
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.03

  # Smalto rosso lucido: idranti, cabine telefoniche.
  - id: "dis_smalto_fuoco_rosso"
    type: "disney"
    color: [0.75, 0.05, 0.06]
    roughness: 0.05
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.03

  # Smalto blu cobalto: ceramiche industriali.
  - id: "dis_smalto_fuoco_blu"
    type: "disney"
    color: [0.05, 0.18, 0.55]
    roughness: 0.05
    specular: 0.55
    clearcoat: 1.0
    coat_roughness: 0.03

  # ══════════════════════════════════════════════════════════════════════
  # GEL COAT MARINO
  # ══════════════════════════════════════════════════════════════════════

  # Gel coat bianco: scafi imbarcazioni, jet-ski.
  - id: "dis_gelcoat_bianco"
    type: "disney"
    color: [0.94, 0.94, 0.92]
    roughness: 0.10
    specular: 0.55
    clearcoat: 0.90
    coat_roughness: 0.06

  # Gel coat blu marino.
  - id: "dis_gelcoat_blu_marino"
    type: "disney"
    color: [0.05, 0.10, 0.32]
    roughness: 0.10
    specular: 0.55
    clearcoat: 0.90
    coat_roughness: 0.06

  # Gel coat grigio antracite: yacht moderni.
  - id: "dis_gelcoat_antracite"
    type: "disney"
    color: [0.12, 0.12, 0.14]
    roughness: 0.10
    specular: 0.55
    clearcoat: 0.90
    coat_roughness: 0.06

  # ══════════════════════════════════════════════════════════════════════
  # SPECIALI
  # ══════════════════════════════════════════════════════════════════════

  # Termocromica: cambia colore con la temperatura. Color ramp simula
  # transizione blu→rosa→giallo (riscaldamento progressivo).
  - id: "dis_termocromica"
    type: "disney"
    color: [0.42, 0.55, 0.72]
    roughness: 0.32
    specular: 0.42
    clearcoat: 0.55
    coat_roughness: 0.15
    texture:
      type: "gradient"
      mode: "linear"
      axis: [0, 1, 0]
      color_ramp:
        - { position: 0.00, color: [0.08, 0.22, 0.55], interp: "smoothstep" }  # cold
        - { position: 0.40, color: [0.55, 0.32, 0.62], interp: "smoothstep" }
        - { position: 0.65, color: [0.92, 0.42, 0.55], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.85, 0.18], interp: "linear" }      # hot

  # Vernice retroreflettente: micro-sfere riflettenti per segnaletica.
  # Approssimata come metallica con clearcoat alto.
  - id: "dis_retroreflettente"
    type: "disney"
    metallic: 0.65
    color: [0.92, 0.92, 0.92]
    roughness: 0.42
    specular: 0.55
    clearcoat: 0.85
    coat_roughness: 0.10
    bump_map:
      texture:
        type: "voronoi"
        scale: 80.0
        output: "f1"
        smoothness: 0.4
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.6

  # Anti-corrosiva grigia (zincante a freddo): aspetto grigio polveroso.
  - id: "dis_anticorrosiva"
    type: "disney"
    color: [0.55, 0.55, 0.55]
    roughness: 0.85
    specular: 0.25
    texture:
      type: "noise"
      scale: 4.0
      noise_strength: 0.15
      colors: [[0.48, 0.48, 0.48], [0.62, 0.62, 0.62]]
      randomize_offset: true

  # Fluorescente arancione safety: alta saturazione, look "neon" diurno.
  # Emissive leggero per simulare la fluorescenza UV-attivata (approssimato).
  - id: "dis_fluo_arancio_safety"
    type: "disney"
    color: [0.98, 0.42, 0.10]
    roughness: 0.55
    specular: 0.32
    emission: [0.18, 0.06, 0.0]
    clearcoat: 0.40
    coat_roughness: 0.18

  # Fluorescente verde lime safety.
  - id: "dis_fluo_verde_safety"
    type: "disney"
    color: [0.55, 0.98, 0.18]
    roughness: 0.55
    specular: 0.32
    emission: [0.08, 0.18, 0.04]
    clearcoat: 0.40
    coat_roughness: 0.18
