# ============================================================================
# Libreria Materiali — Liquidi
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/liquids.yaml" }]
#
# Liquidi quotidiani, alimentari, industriali. Tutti i materiali assumono
# che il rendering avvenga sulla SUPERFICIE del liquido (non sul volume
# interno). Per render volumetrici realistici (es. raggio in profondità in
# uno scotch invecchiato) servirebbe combinare questi materiali con un
# `globalMedium` o un `medium` per-entità.
#
# Sfrutta:
#
#   • spec_trans 1.0 + ior + transmission_color/depth (Beer-Lambert) per
#     tutti i liquidi trasparenti.
#   • Subsurface per latticini e sangue (scattering interno).
#   • Thin_film 200-500nm per pellicole su superfici oleose (iridescenza
#     benzina/olio motore sopra acqua).
#   • Bump map procedurale leggero per onde di superficie.
#   • Color ramp per gradienti di concentrazione (caffè diluito/concentrato).
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF con spec_trans + ior. Liquido protagonista in
#         bicchieri, fontane, primi piani.
#   cls_  Lambertian colorato. Pavimenti bagnati astratti, draft.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   ACQUA               Piscina, mare costiero, mare profondo, torbida,
#                       torrente, fontana, oceano tropicale.
#
#   LATTE               Intero, scremato, montato, condensato.
#                       Subsurface alto per il "milky look".
#
#   SANGUE              Arterioso (rosso vivo), venoso (scuro), secco
#                       (marrone), coagulato (gel scuro).
#
#   OLI                 Motore (nero iridescente), oliva (giallo verde),
#                       semi (chiaro), vegetali alimentari.
#
#   BEVANDE ALCOLICHE   Vino rosso/bianco/rosé, birra (chiara/scura),
#                       whisky, vodka, gin, rum.
#
#   SCIROPPI            Acero, miele, caramello, melassa.
#                       Trasmissione satura, profondità medio-alta.
#
#   BEVANDE CALDE       Caffè (espresso/americano), tè (nero/verde/matcha),
#                       cioccolata calda.
#
#   SUCCHI              Arancia, pomodoro, frutti rossi, frullati.
#
#   LIQUIDI INDUSTRIALI Refrigerante (verde), ammoniaca pulizia,
#                       benzina/diesel.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# Per il classico look "olio motore sulla pozzanghera": combina
# `dis_acqua_piscina` come material_a e `dis_olio_motore` come material_b
# in un mix con mask noise distortion alto.
#
# Per ghiaccio cristallino in bicchieri di liquidi: usa `dis_ghiaccio_*` da
# `glasses.yaml` (più adatto per cristalli faceted). Qui c'è solo
# `dis_ghiaccio_acqueo` come superficie d'acqua congelata.
#
# I valori di IOR seguono i riferimenti fisici reali:
#   - Acqua: 1.33
#   - Latte: 1.35
#   - Oli: 1.45-1.48
#   - Alcol etilico: 1.36
#   - Vetro (per confronto): 1.50
#
# Render hint:
#   Draft:  -s 128 -d 10 -S 1   (caustiche richiedono d alto)
#   Final:  -s 2048 -d 14 -S 4
# ============================================================================

