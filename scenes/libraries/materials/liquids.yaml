# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — LIQUIDS
# ───────────────────────────────────────────────────────────────────────────
#  File:     liquids.yaml
#  Disney:   44
#  Classic:  9       (lambertian: 0 · metal: 0 · dielectric: 9)
#  Total:    53
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: acque (piscina/mare/torbida/torrente/fontana/tropicale),
#             ghiaccio, latte (intero/scremato/panna/condensato),
#             sangue (arterioso/venoso/secco/coagulato),
#             oli (motore iridescente/oliva/semi/benzina),
#             alcolici (vino rosso/bianco/rosé, birra chiara/stout, whisky,
#             vodka, rum), sciroppi (miele/acero/caramello/melassa),
#             bevande calde (caffè/tè/cioccolata), succhi, industriali.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/liquids.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: spec_trans 1.0 + ior + transmission_color +
#            transmission_depth (Beer-Lambert reale) per liquidi
#            trasparenti; subsurface per latticini e sangue;
#            thin_film 200-500nm per pellicole iridescenti su oli motore
#            / benzina.
#   cls_*  — Classic: type `dielectric` (refraction_index + color tint)
#            SOLO per liquidi otticamente puliti dove un singolo tint
#            piatto rende ancora il materiale riconoscibile: acque pulite,
#            oli chiari, vodka, alcol pulizia. Tutto ciò che richiede
#            Beer-Lambert profondo (vino rosso scuro, birra stout, miele,
#            melassa) o SSS (latte, panna, sangue, succhi opachi,
#            cioccolata) resta solo Disney.
#
# ── Note di rendering ──
# Tutti i materiali assumono il rendering sulla SUPERFICIE del liquido. Per
# render volumetrici realistici (profondità in uno scotch invecchiato)
# combina con un `globalMedium` o `medium` per-entità.
#
# Per il classico "olio motore sulla pozzanghera": combina
# `dis_acqua_piscina` come material_a e `dis_olio_motore` come material_b
# in un mix con mask noise distortion alto.
#
# Per ghiaccio cristallino in bicchieri: usa `dis_ghiaccio_*` da
# `glasses.yaml` (più adatto per cristalli faceted). Qui c'è solo
# `dis_ghiaccio_acqueo` come superficie d'acqua congelata.
#
# ── IOR di riferimento ──
#   Acqua: 1.33 · Latte: 1.35 · Oli: 1.45–1.48 ·
#   Alcol etilico: 1.36 · Vetro (per confronto): 1.50
#
# ── Categorie ──
#   ACQUA              Piscina, mare costiero/profondo, torbida, torrente,
#                      fontana, oceano tropicale, ghiaccio acqueo.
#   LATTE              Intero, scremato, panna montata, condensato.
#   SANGUE             Arterioso, venoso, secco, coagulato.
#   OLI                Motore (iridescente), oliva, semi, benzina.
#   ALCOLICI           Vino rosso/bianco/rosé, birra chiara/stout, whisky,
#                      vodka, rum scuro.
#   SCIROPPI           Miele, acero, caramello, melassa.
#   BEVANDE CALDE      Caffè espresso/americano, tè nero/verde, matcha,
#                      cioccolata calda.
#   SUCCHI             Arancia, pomodoro, frutti rossi.
#   INDUSTRIALI        Refrigerante verde/rosso, ammoniaca pulizia.


