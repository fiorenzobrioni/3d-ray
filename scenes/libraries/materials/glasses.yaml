  # Vetro acidato fumé — separatori arredo design
  - id: "dis_vetro_acidato_fume"
    type: "disney"
    color: [0.30, 0.30, 0.32]
    roughness: 0.40
    metallic: 0.0
    spec_trans: 0.92
    ior: 1.52
