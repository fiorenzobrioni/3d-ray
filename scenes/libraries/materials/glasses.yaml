  # ║  CLASSIC                                                              ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  #
  # Solo `dielectric` (refraction_index + color tint opzionale). Disponibile
  # per i materiali puliti e lisci. NON disponibile per:
  #   • Smerigliati / frosted / opalini (servono roughness + diffusione).
  #   • Iridescenti / favrile / bolla (servono thin_film).
  #   • Vetri colorati con assorbimento profondo (Beer-Lambert).
  #   • Liquidi scuri (vino rosso, birra scura, miele, olio, latte).
  #   • Ghiaccio sporco / torbido / brina / neve (subsurface alto).
  #   • Opale (subsurface + thin_film).

