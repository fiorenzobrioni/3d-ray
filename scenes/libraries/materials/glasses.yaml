# ============================================================================
# Libreria Materiali — Vetri e Trasparenti
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/glasses.yaml" }]
#
# Raccolta completa di materiali trasparenti e traslucenti: vetri tecnici,
# cristalli, gemme, ghiacci, liquidi, resine e plastiche trasparenti.
#
#   dis_  (Disney BSDF) — Usa spec_trans + ior. Supporta roughness
#         (vetro smerigliato), subsurface (traslucenza), clearcoat
#         e tinta del colore. Più versatile ma più rumoroso.
#
#   cls_  (Classic Dielectric) — Usa refraction_index + color opzionale.
#         Rifrazione/riflessione Fresnel analitiche, pulite e veloci.
#         Ideale per vetri chiari o leggermente tintati. Non supporta
#         roughness (solo perfettamente liscio) né subsurface.
#
# ── Nota sugli IOR (indici di rifrazione) ────────────────────────────────
#
#   I valori di IOR sono misurati dalla letteratura ottica. Per i vetri
#   industriali la variazione è minima; per le gemme è caratteristica
#   e contribuisce alla "personalità" della pietra (fuoco, brillantezza).
#
#     Aria         1.000     Acqua        1.333     Ghiaccio     1.309
#     Vetro float  1.52      Borosilicato 1.47      Crown        1.52
#     Flint        1.62      Cristallo Pb 1.65      Zaffiro      1.77
#     Diamante     2.42      Rubino       1.77      Smeraldo     1.57
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   VETRI INDUSTRIALI   Soda-lime (finestre), borosilicato (Pyrex),
#                       float, temperato. I vetri più comuni.
#
#   VETRI OTTICI        Crown e Flint per lenti e prismi.
#                       IOR calibrati per applicazioni ottiche.
#
#   CRISTALLO           Cristallo al piombo (Swarovski, Waterford).
#                       IOR alto (1.65), dispersione elevata.
#
#   VETRI COLORATI      Cattedrale, Murano, bottiglia, farmacia.
#                       Tinta forte con trasmissione.
#
#   VETRI SMERIGLIATI   Satinati, sabbiati, acidati, opalini.
#                       Solo Disney (roughness > 0 o spec_trans < 1).
#
#   GEMME PREZIOSE      Diamante, rubino, smeraldo, zaffiro.
#                       IOR specifici, colori saturi.
#
#   GEMME SEMIPREZIOSE  Ametista, topazio, acquamarina, tormalina,
#                       granato, citrino, peridoto.
#
#   GHIACCIO E NEVE     Ghiaccio chiaro, ghiaccio sporco, brina,
#                       neve compatta traslucente.
#
#   LIQUIDI             Acqua, acqua di mare, miele, olio, vino,
#                       birra, latte (traslucente), glicerina.
#
#   RESINE E SINTETICI  Epossidica, poliestere, plexiglass (PMMA),
#                       policarbonato, silicone trasparente.
#
# ============================================================================


