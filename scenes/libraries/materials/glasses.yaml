# ═══════════════════════════════════════════════════════════════════════════
#  SMERIGLIATO / FROSTED — vetri con superficie diffondente
# ═══════════════════════════════════════════════════════════════════════════
#
#  Vetri smerigliati (sandblasted, etched, frosted): la superficie è
#  micro-rugosa e diffonde la luce in trasmissione, dando l'aspetto
#  bianco-lattiginoso tipico delle docce, dei diffusori per lampadine
#  e dei vasi smerigliati. Implementati con Disney `spec_trans` + roughness
#  medio-alto: la combinazione produce sia una rifrazione "blurry" sia
#  una luce trasmessa diffusa, equivalente fisico del vetro acidato.
#
#  Per evitare firefly sulle scene con questi materiali:
#   - usa shadow_samples >= 9 sulle aree retroilluminanti;
#   - tieni roughness >= 0.20 (sotto, le caustiche generano fireflies);
#   - aggiungi `--indirect-clamp-factor 0.25` da CLI per scene con luci
#     dietro al vetro smerigliato.
#

  # ── Disney — vetri smerigliati / acidati ──────────────────────────────────

  # Vetro smerigliato neutro — docce, separatori bagno, plafoniere
  - id: "dis_vetro_smerigliato"
    type: "disney"
    color: [0.96, 0.97, 0.98]
    roughness: 0.32
    metallic: 0.0
    spec_trans: 1.0
    ior: 1.52
    transmission_color: [0.98, 0.98, 0.98]
    specular: 0.5

  # Vetro acidato fine — diffusore per LED, lampadario opale
  - id: "dis_vetro_acidato"
    type: "disney"
    color: [0.98, 0.97, 0.95]
    roughness: 0.45
    metallic: 0.0
    spec_trans: 0.95
    ior: 1.50
    transmission_color: [0.96, 0.96, 0.94]
    specular: 0.4

  # Vetro sabbiato verde bottiglia — bottiglie deluxe, vasi
  - id: "dis_vetro_sabbiato_verde"
    type: "disney"
    color: [0.55, 0.78, 0.62]
    roughness: 0.30
    metallic: 0.0
    spec_trans: 0.92
    ior: 1.52
    transmission_color: [0.55, 0.78, 0.62]
    transmission_depth: 6.0

  # Vetro sabbiato ambra — bottiglie whisky / birra opacizzate
  - id: "dis_vetro_sabbiato_ambra"
    type: "disney"
    color: [0.78, 0.50, 0.20]
