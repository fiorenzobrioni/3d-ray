# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — GLASSES
# ───────────────────────────────────────────────────────────────────────────
#  File:     glasses.yaml
#  Disney:   74
#  Classic:  27      (lambertian: 0 · metal: 0 · dielectric: 27)
#  Total:    101
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: vetri industriali, ottici, cristallo, vetri colorati, vetri
#             smerigliati / frosted / iridescenti, gemme preziose e
#             semipreziose, ghiaccio e neve, liquidi (acqua, vino, birra,
#             miele, olio, latte), resine e sintetici trasparenti.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/glasses.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: `spec_trans` + `ior` + `transmission_color` +
#            `transmission_depth` per assorbimento volumetrico Beer-Lambert
#            reale; `thin_film_thickness` per iridescenze e bolle di sapone;
#            `subsurface` per ghiaccio sporco / neve / opali / latte.
#   cls_*  — Versione Classic: type `dielectric` con `refraction_index`
#            (+ `color` tint dove serve). Disponibile solo per i materiali
#            "puliti e lisci": vetri industriali e ottici, cristallo lucido,
#            gemme trasparenti, ghiaccio chiaro, acqua/liquidi leggeri,
#            plexiglass e policarbonato chiari. Tutto ciò che richiede
#            roughness in trasmissione, thin_film o assorbimento volumetrico
#            profondo esiste SOLO in Disney.
#
# ── Nota sugli IOR ───────────────────────────────────────────────────────
#   Aria         1.000     Acqua        1.333     Ghiaccio     1.31
#   Vetro float  1.52      Borosilicato 1.47      Crown        1.52
#   Flint        1.62      Cristallo Pb 1.65      Zaffiro      1.77
#   Diamante     2.42      Rubino       1.77      Smeraldo     1.58
#
# ── Tip rendering ────────────────────────────────────────────────────────
#   Vetri/gemme con spec_trans alto possono generare fireflies in scene
#   retroilluminate: usa `shadow_samples >= 9` + `--indirect-clamp-factor 0.25`.
#   Per frosted/satinati tieni `roughness >= 0.20`.
#
# ── Categorie ────────────────────────────────────────────────────────────
#   INDUSTRIALI       Soda-lime, float, borosilicato, temperato.
#   OTTICI            Crown, flint, dense flint per lenti/prismi.
#   CRISTALLO         Piombo (24% PbO), Swarovski, fumé, rosa.
#   COLORATI          Cattedrale, Murano, bottiglia, farmacia.
#   SMERIGLIATI       Satinati, sabbiati, acidati, opalini, frosted.
#   IRIDESCENTI       Thin-film, favrile, bolla di sapone.
#   GEMME PREZIOSE    Diamante, rubino, smeraldo, zaffiro.
#   GEMME SEMIPREZ.   Ametista, citrino, acquamarina, topazio, tormalina,
#                     granato, peridoto, opale.
#   GHIACCIO E NEVE   Chiaro, torbido, blu, fratturato, brina, neve.
#   LIQUIDI           Acqua, mare, vino, birra, miele, olio, latte, glicerina.
#   RESINE            PMMA (plexiglass), policarbonato, epossidiche, silicone,
#                     nylon trasparente.


