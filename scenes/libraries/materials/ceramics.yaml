# ============================================================================
# Libreria Materiali — Ceramiche
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/ceramics.yaml" }]
#
# Raccolta completa di materiali ceramici, dalle terrecotte rustiche alle
# porcellane da esposizione. Ogni materiale esiste in due varianti:
#
#   dis_  (Disney BSDF) — Per oggetti protagonisti. Supporta clearcoat
#         (smaltatura), subsurface (traslucenza porcellana), sheen e
#         specular tint. Richiede ~4× più campioni dei classici.
#
#   cls_  (Classic) — Per superfici di sfondo o render rapidi. Usa
#         lambertian (opaco puro) o metal con fuzz (riflesso smaltato).
#         Più veloce e silenzioso a parità di campioni.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   PORCELLANA        Ceramica fine, corpo bianco vitrificato.
#                     Traslucente, superficie liscia e lucida.
#                     Usi: stoviglie eleganti, statuine, sanitari.
#
#   BONE CHINA        Variante inglese con cenere d'ossa. Ancora più
#                     traslucente e sottile della porcellana classica.
#
#   MAIOLICA          Ceramica a corpo poroso con smalto stannifero
#                     (bianco opaco) e decorazioni colorate sopra smalto.
#                     Usi: piastrelle decorative, piatti da parete.
#
#   TERRACOTTA        Argilla cotta a basse temperature (900-1100°C).
#                     Corpo poroso, colore caldo dal rosso all'ocra.
#                     Può essere grezza o invetriata.
#                     Usi: vasi, tegole, sculture da giardino.
#
#   GRÈS / STONEWARE  Ceramica ad alta temperatura (1200-1300°C).
#                     Corpo denso e impermeabile, toni neutri/scuri.
#                     Usi: tazze da tè, ciotole, brocche artigianali.
#
#   RAKU              Tecnica giapponese con raffreddamento rapido.
#                     Superficie irregolare con riflessi metallici,
#                     craquelure e macchie di riduzione.
#                     Usi: ciotole per cerimonia del tè, arte.
#
#   CELADON           Smalto verde-giada tipico della ceramica cinese
#                     e coreana. Trasparente, profondo, con sfumature
#                     che variano dal verde salvia al verde acqua.
#                     Usi: vasi, tazze, oggetti da collezione.
#
#   BISCOTTO / BISQUE Ceramica cotta una sola volta, senza smalto.
#                     Superficie opaca, porosa, vellutata al tatto.
#                     Usi: statuine, stampi, basi per smaltatura.
#
#   SMALTATA          Ceramica con smalto vetroso colorato. Superficie
#                     lucida e impermeabile. Ampia gamma cromatica.
#                     Usi: stoviglie quotidiane, piastrelle, vasi.
#
#   TERRA SIGILLATA   Antica tecnica romana. Superficie levigata e
#                     satinata senza smalto, ottenuta con slip di
#                     argilla finissima. Lucentezza naturale.
#                     Usi: riproduzioni archeologiche, arte.
#
# ============================================================================


