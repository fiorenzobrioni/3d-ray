# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — CERAMICS
# ───────────────────────────────────────────────────────────────────────────
#  File:     ceramics.yaml
#  Disney:   58
#  Classic:  54      (lambertian: 22 · metal: 32 · dielectric: 0)
#  Total:    112
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: porcellana, bone china, maiolica, terracotta, grès, raku,
#             celadon, biscotto, smaltata, terra sigillata, finiture satin.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/ceramics.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: clearcoat (smaltatura), subsurface (traslucenza
#            porcellana/bone china), texture voronoi/noise per craquelure
#            e gradienti smaltati. Richiede ~4× più campioni della Classic.
#   cls_*  — Versione Classic: tipo `lambertian` per superfici opache
#            (bisque, terracotta grezza, grès non smaltato, satin, sigillata)
#            e `metal`+fuzz per smaltate / lucide. Approssimazione per scene
#            di sfondo o render rapidi: la smaltatura e la traslucenza non
#            esistono in Classic, ma il color base è preservato.
#
# ── Categorie ──
#   PORCELLANA        Ceramica fine, corpo bianco vitrificato. Traslucente.
#   BONE CHINA        Variante inglese con cenere d'ossa. Massima traslucenza.
#   MAIOLICA          Smalto stannifero bianco opaco, decori colorati sopra.
#   TERRACOTTA        Argilla bassa temperatura (900-1100°C), corpo poroso.
#   GRÈS / STONEWARE  Alta temperatura (1200-1300°C), corpo denso.
#   RAKU              Tecnica giapponese, riflessi metallici, craquelure.
#   CELADON           Smalto verde-giada cinese/coreano. Trasparente, profondo.
#   BISCOTTO / BISQUE Cottura unica senza smalto. Vellutato, poroso.
#   SMALTATA          Smalto vetroso colorato, ampia gamma cromatica.
#   TERRA SIGILLATA   Tecnica romana: slip levigato senza smalto.
#   SATIN             Finitura semilucida tra opaco e smaltato.


