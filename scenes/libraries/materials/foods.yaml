# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — FOODS
# ───────────────────────────────────────────────────────────────────────────
#  File:     foods.yaml
#  Disney:   72
#  Classic:  28      (lambertian: 24 · metal: 0 · dielectric: 4)
#  Total:    100
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: cioccolato, frutta, verdura, formaggi, pane/pasta, dolci e
#             zucchero, burro/grassi, liquidi (acqua, vino, birra, latte,
#             olio, miele, caffè), condimenti, carne e pesce, gelati.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/foods.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: clearcoat + coat_ior 1.5 per frutta lucida e
#            glasse; subsurface + subsurface_color per polpa/cioccolato/
#            formaggi morbidi; spec_trans + ior + transmission_color/depth
#            per liquidi (Beer-Lambert reale, non sqrt(baseColor)); sheen
#            per pesca/prosciutto; voronoi/wood texture per croste e
#            stagionature.
#   cls_*  — Versione Classic: solo `lambertian` per cibi opachi (pane,
#            crosta, formaggi a pasta dura, carne secca/affumicata, verdura
#            matte, cacao in polvere, marzapane); `dielectric` per i pochi
#            liquidi davvero trasparenti (acqua, olio, vino bianco, aceto).
#            Frutta lucida (mele rosse, ciliegie, uva), cioccolato fondente/
#            latte/bianco, dolci con SSS, miele/vino rosso scuro/birra/latte
#            (Beer-Lambert serio o SSS marcato) restano SOLO Disney.
#
# ── Fisica degli alimenti ────────────────────────────────────────────────
#
#   Frutta: buccia cerosa (clearcoat IOR 1.5) sopra polpa traslucente
#           (subsurface). Il colore viene dal bulk, non dalla superficie.
#
#   Liquidi: spec_trans 1.0 + IOR specifico. Beer-Lambert via
#            transmission_color + transmission_depth (in metri) per
#            assorbimento volumetrico reale: vino rosso ≈ 0.02 m,
#            birra chiara ≈ 0.05 m, miele ≈ 0.01 m, caffè ≈ 0.005 m.
#
#   Cioccolato: fondente = roughness basso (snap lucido dopo tempera),
#               al latte = roughness medio, bianco = subsurface alto.
#
#   Pane/pasta: crosta opaca (roughness alto), mollica traslucente
#               (subsurface) con colore chiaro.
#
#   Formaggio: dalla cera rossa (Edam) al cristallino (Parmigiano),
#              subsurface variabile, roughness da basso a molto alto.
#
# ── Categorie ────────────────────────────────────────────────────────────
#   CIOCCOLATO          Fondente, latte, bianco, ganache, cacao.
#   FRUTTA              Mela, arancia, limone, uva, pesca, ciliegia,
#                       banana, fragola.
#   VERDURA             Pomodoro, peperoni, melanzana, zucca, zucchina.
#   FORMAGGI            Parmigiano, Cheddar, Brie, Gouda, mozzarella,
#                       Gorgonzola, Edam (cera rossa).
#   PANE E PASTA        Crosta dorata, mollica chiara, pasta cruda/cotta,
#                       pizza, focaccia.
#   DOLCI E ZUCCHERO    Zucchero, caramello, marzapane, glassa, meringa,
#                       gelatine, marmellate.
#   BURRO E GRASSI      Burro, margarina, strutto.
#   LIQUIDI             Acqua, latte, vino, birra, olio, miele, caffè,
#                       succo. Spec_trans + Beer-Lambert.
#   CONDIMENTI          Senape, ketchup, salsa soia, aceto, maionese.
#   CARNE E PESCE       Cruda, cotta, salmone, prosciutto.
#   GELATI              Crema, cioccolato, frutta.


