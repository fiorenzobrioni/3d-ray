# ============================================================================
# Libreria Materiali — Alimenti e Bevande
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/foods.yaml" }]
#
# Raccolta di materiali alimentari per still life fotorealistiche.
# Cioccolato, frutta, formaggi, pane, dolci, liquidi e condimenti.
#
#   dis_  (Disney BSDF) — Essenziale: la quasi totalità degli alimenti
#         è traslucente (subsurface) e/o ha una superficie umida/cerosa
#         (specular, clearcoat). Frutta e verdura usano subsurface per
#         la luce che penetra nella polpa. I liquidi usano spec_trans.
#
#   cls_  (Classic) — Lambertian per alimenti opachi (pane, crosta,
#         formaggio stagionato). Dielectric per liquidi trasparenti
#         (acqua, vino, olio). Metal+fuzz per superfici lucide (mela,
#         cioccolato temperato). Nessun subsurface: meno fotorealistico
#         ma molto più veloce.
#
# ── Fisica degli alimenti ────────────────────────────────────────────────
#
#   Gli alimenti sono tra i materiali più complessi in natura:
#
#   Frutta: buccia cerosa (clearcoat) sopra polpa traslucente
#           (subsurface). Il colore viene dal bulk, non dalla superficie.
#
#   Liquidi: spec_trans per trasparenza, IOR ~1.33–1.50.
#            Il colore determina l'assorbimento per spessore.
#
#   Cioccolato: fondente = roughness basso (snap lucido dopo tempera),
#               al latte = roughness medio, bianco = subsurface alto.
#
#   Pane/pasta: crosta opaca (roughness alto), mollica traslucente
#               (subsurface) con colore chiaro.
#
#   Formaggio: dalla cera rossa (Edam) al cristallino (Parmigiano),
#              subsurface variabile, roughness da basso a molto alto.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   CIOCCOLATO          Fondente, latte, bianco, cacao in polvere.
#                       Temperato = lucido, fuso = roughness alto.
#
#   FRUTTA              Mela, arancia, limone, uva, pesca, ciliegia,
#                       banana, fragola. Buccia cerosa + polpa SSS.
#
#   VERDURA             Pomodoro, peperone, melanzana, zucca.
#                       Buccia lucida + polpa traslucente.
#
#   FORMAGGI            Parmigiano, Cheddar, Brie, Gouda, mozzarella,
#                       Gorgonzola. Dal cristallino al cremoso.
#
#   PANE E PASTA        Crosta dorata, mollica chiara, pasta cruda,
#                       pasta cotta. Subsurface per la mollica.
#
#   DOLCI E ZUCCHERO    Zucchero, caramello, marzapane, glassa,
#                       meringhe. Traslucenza e lucentezza.
#
#   BURRO E GRASSI      Burro, margarina, strutto, olio solidificato.
#                       Subsurface alto, colori giallo-crema.
#
#   LIQUIDI             Acqua, latte, vino, birra, olio, miele,
#                       succo, caffè. Spec_trans + IOR specifici.
#                       (Integra glasses.yaml con liquidi alimentari)
#
#   CONDIMENTI          Senape, ketchup, salsa di soia, aceto.
#                       Liquidi densi, subsurface variabile.
#
#   CARNE E PESCE       Cruda, cotta, affumicata. Subsurface per
#                       la traslucenza del tessuto muscolare.
#
# ============================================================================


