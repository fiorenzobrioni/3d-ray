# ============================================================================
# Libreria Materiali — Pelli
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/leathers.yaml" }]
#
# Pelli animali conciate, sintetiche e decorative. Sfrutta:
#
#   • Subsurface_color per pelli morbide (nappa, suede) per il caratteristico
#     "warm glow" della pelle vera.
#   • Sheen + sheen_roughness ALTO (0.6-0.9) per scamosciato e velluto-finish
#     (Charlie BSDF lobe per il look "fuzzy backlit").
#   • Bump_map procedurale Voronoi (output: cell, smoothness > 0) per grana
#     fine della pelle.
#   • Bump_map Voronoi output: f2_minus_f1 per scaglie di rettili (pitone,
#     coccodrillo) — pattern cellulare con bordi netti.
#   • Displacement scalare leggero per pelle goffrata.
#   • Color ramp 3-stop per pelli invecchiate e patine multiple.
#   • Clearcoat per pelle verniciata (patent leather).
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF. Sedute protagoniste, oggetti close-up, sellerie auto.
#         Subsurface attivo, sheen attivo dove serve.
#
#   cls_  Classic. Per fondali e draft. Lambertian + texture grana.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   PELLE BOVINA        Pelle pieno fiore, semianilina, anilina. Sedie,
#                       divani, valigeria classica.
#
#   NAPPA               Pelle ovina/bovina morbidissima. Subsurface alto.
#                       Sedute lusso, abbigliamento.
#
#   SUEDE / SCAMOSCIATO Fiore rovesciato. Sheen alto + sheen_roughness 0.8+.
#                       Scarpe, abbigliamento, accessori.
#
#   VINTAGE INVECCHIATA Color ramp 3-stop, patine multiple, segni d'uso.
#                       Pelle "lived-in".
#
#   VERNICIATA          Patent leather. Clearcoat 1.0, coat_roughness 0.05.
#                       Lucentezza a specchio.
#
#   ESOTICI             Pitone, coccodrillo, struzzo, lucertola. Bump map
#                       Voronoi per pattern di scaglie / punti.
#
#   SCARPE              Box calf, cordovan, lucidata militare.
#
#   SINTETICI           Eco-leather, vinile pelle, finta nabuk.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# Per pelle UMANA (epidermide, derma vivente) → biological.yaml. Questa
# libreria contiene solo pelli CONCIATE (animali → manufatto).
#
# Per pelle USURATA con macchie/sporco: mix con `over_dust_light` o
# `over_grease_light` da weathering.yaml.
#
# Per pelle ROVINATA con sgualciture profonde: aggiungi displacement
# vector tangent-space a livello scena con texture noise ridged.
#
# Render hint:
#   Draft:  -s 64  -d 5  -S 1
#   Final:  -s 1024 -d 8 -S 4
# ============================================================================

