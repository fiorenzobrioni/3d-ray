# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — LEATHERS
# ───────────────────────────────────────────────────────────────────────────
#  File:     leathers.yaml
#  Disney:   37
#  Classic:  9       (lambertian: 9 · metal: 0 · dielectric: 0)
#  Total:    46
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: pieno fiore, nappa, suede/nabuk, vintage invecchiata,
#             verniciata (patent), esotici (pitone/coccodrillo/struzzo/
#             lucertola), scarpe (box calf/cordovan/militare), sintetici
#             (eco-leather/vinile).
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/leathers.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: subsurface_color per il "warm glow" della pelle
#            vera; sheen Charlie + sheen_roughness alto per suede/nabuk;
#            clearcoat 1.0 + coat_ior 1.5 per patent leather; voronoi cell
#            (output: random/f1) per scaglie di rettili/struzzo e bump map
#            voronoi f2_minus_f1 per i bordi netti tra scaglie; bump map
#            voronoi a scala 80+ per la grana fine; displacement scalare
#            per pelli invecchiate o coccodrillo.
#   cls_*  — Classic: tipo `lambertian`. Le varianti tenute in Classic
#            sono solo quelle dove il lobo dominante è diffuso (cuoio
#            grezzo, anilina opaca, militare matte, ecoleather matte,
#            vintage cuoio). Le pelli a clearcoat alto (patent, box calf,
#            cordovan), gli esotici con scaglie procedurali, e i suede/
#            nabuk con sheen Charlie esistono SOLO in Disney — l'identità
#            del materiale dipende da lobi non-base irrinunciabili.
#
# ── Note d'uso ──
#   Per pelle USURATA con macchie/sporco: mix con `over_dust_light` o
#   `over_grease_light` da weathering.yaml.
#   Per pelle ROVINATA con sgualciture profonde: aggiungi displacement
#   vector tangent-space a livello scena con texture noise ridged.
#
# ── Categorie ──
#   PIENO FIORE / ANILINA  Pelle bovina classica, fiore integro, grana
#                          naturale visibile. Subsurface medio per warmth.
#   NAPPA                  Pelle ovina/bovina morbidissima. Subsurface alto +
#                          sheen leggero per il glow tipico.
#   SUEDE / NABUK          Fiore rovesciato / abraso. Sheen Charlie alto,
#                          sheen_roughness 0.7-0.85.
#   VINTAGE                Color ramp 3-4 stop, patine multiple, segni d'uso.
#   PATENT (VERNICIATA)    Clearcoat 1.0, coat_roughness 0.04, coat_ior 1.5.
#   ESOTICI                Pitone, coccodrillo, struzzo, lucertola. Voronoi
#                          cell + bump f2_minus_f1.
#   SCARPE                 Box calf, cordovan, militare parade.
#   SINTETICI              Eco-leather, vinile pelle.


