# ============================================================================
# Libreria Materiali — Organici e Naturali
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/organics.yaml" }]
#
# Raccolta completa di materiali di origine naturale, animale, vegetale
# e minerale organica. Dalla cera d'api alla madreperla, dal sughero
# alla pergamena.
#
#   dis_  (Disney BSDF) — Essenziale per questa categoria: subsurface
#         è il parametro protagonista. La maggior parte dei materiali
#         organici è traslucente — la luce penetra, rimbalza nel bulk
#         e riemerge attenuata. Clearcoat simula superfici lucidate
#         (avorio lavorato, ambra, corno). Sheen per peluria/fibra.
#
#   cls_  (Classic) — Lambertian per materiali opachi (carta, cartone,
#         sughero, osso grezzo). Metal+fuzz per materiali lucidati
#         (avorio, ambra, corno). Nessun effetto subsurface: la
#         traslucenza è il compromesso principale.
#
# ── Fisica dei materiali organici ────────────────────────────────────────
#
#   I materiali organici condividono una proprietà: la traslucenza.
#   A differenza dei metalli (dove tutta la luce viene riflessa dalla
#   superficie) e delle plastiche (dove il pigmento è concentrato),
#   nei materiali organici la luce viaggia attraverso strati di fibre,
#   cellule, cristalli o polimeri naturali prima di essere riassorbita.
#
#   Subsurface nel Disney BSDF interpola tra il diffuse Lambertiano
#   standard (subsurface=0, ombre nette) e un profilo piatto
#   (subsurface=1, luce che "avvolge" l'oggetto). Valori tipici:
#     0.10–0.20  Legno, osso, avorio (leggera morbidezza)
#     0.25–0.40  Cera, candela, sapone (traslucenza evidente)
#     0.45–0.65  Pelle umana, cera sottile (forte traslucenza)
#     0.70–0.90  Latte, miele denso (quasi trasparente)
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   CERA E CANDELA      Cera d'api, paraffina, stearica.
#                       Subsurface alto, colori caldi.
#
#   AMBRA               Resina fossile, giallo-arancio, traslucente.
#                       IOR 1.54, subsurface + spec_trans leggero.
#
#   AVORIO E OSSO       Tessuto osseo, bianco-crema.
#                       Avorio lucidato vs osso grezzo.
#
#   CORNO E TARTARUGA   Cheratina animale, toni bruni striati.
#                       Semi-traslucente, lucidabile.
#
#   GUSCIO D'UOVO       Calcite porosa, bianco opaco delicato.
#                       Roughness alto, fragilità visiva.
#
#   CORALLO             Carbonato di calcio marino. Rosso, rosa,
#                       bianco. Leggermente poroso.
#
#   MADREPERLA          Nacre — strati di aragonite iridescenti.
#                       Specular tint per iridescenza, clearcoat.
#
#   CONCHIGLIA          Guscio esterno, opaco o lucido.
#                       Toni crema, rosa, marroni.
#
#   SUGHERO             Corteccia di quercia da sughero, porosa.
#                       Roughness altissimo, toni caldi.
#
#   CARTA               Fibre di cellulosa pressate. Bianca, kraft,
#                       da pacchi, riso. Subsurface per retroillum.
#
#   CARTONE             Più spesso e scuro della carta. Ondulato,
#                       grigio, kraft. Opaco.
#
#   PERGAMENA           Pelle animale trattata, tono caldo antico.
#                       Subsurface per traslucenza.
#
#   SAPONE              Solido traslucente, colori tenui.
#                       Subsurface alto, roughness medio.
#
#   BAMBÙ               Graminacea lignificata, toni giallo-verdi.
#                       Nodi visibili, finitura naturale o laccata.
#
#   CUOIO VEGETALE      Materiali biodegradabili, cellulosa compressa.
#                       Simile a carta densa, toni naturali.
#
# ============================================================================


