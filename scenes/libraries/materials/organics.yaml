# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — ORGANICS
# ───────────────────────────────────────────────────────────────────────────
#  File:     organics.yaml
#  Disney:   70
#  Classic:  28      (lambertian: 28 · metal: 0 · dielectric: 0)
#  Total:    98
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: cera, candele, ambra, avorio, osso, corno, tartaruga, guscio
#             d'uovo, corallo, madreperla, perla, opale, conchiglia, sughero,
#             carta (incl. velina/riso), cartone, pergamena, sapone, bambù,
#             foglie, petali, muschio.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/organics.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: subsurface + subsurface_color per traslucenza
#            (cera, ambra, sapone, madreperla, perla), thin_film per
#            iridescenza (opale, perla, abalone), diff_trans + thin_walled
#            per foglie/petali/carta velina in controluce, sheen Charlie
#            per pelosi/muschio, clearcoat + coat_ior 1.5 per superfici
#            lucidate.
#   cls_*  — Versione Classic: solo `lambertian` per materiali opachi
#            (carta, cartone, sughero, pergamena, osso, conchiglia opaca,
#            foglia secca). I materiali con SSS/thin_film/diff_trans
#            irrinunciabili (cera, sapone, ambra, madreperla, opale, perla,
#            foglie verdi controluce, petali) restano SOLO Disney —
#            il Classic perderebbe l'identità del materiale.
#
# ── Fisica dei materiali organici ────────────────────────────────────────
#
#   I materiali organici condividono la traslucenza. La luce viaggia
#   attraverso strati di fibre/cellule/cristalli/polimeri prima di
#   essere riassorbita. `subsurface` interpola tra diffuse Lambertiano
#   (0 = ombre nette) e profilo piatto "wrap" (1 = luce avvolgente):
#     0.10–0.20  Legno, osso, avorio, carta spessa
#     0.25–0.40  Cera, candela, sapone, polpa frutta
#     0.45–0.65  Sapone glicerina, ambra sottile, latte
#     0.70–0.90  Liquidi densi, alabastro
#
# ── Categorie ────────────────────────────────────────────────────────────
#   CERA E CANDELA      Cera d'api, paraffina, soia, stearica.
#   AMBRA               Resina fossile, IOR 1.54, subsurface marcato.
#   AVORIO E OSSO       Tessuto osseo, bianco-crema. Lucidato vs grezzo.
#   CORNO E TARTARUGA   Cheratina, toni bruni striati.
#   GUSCIO D'UOVO       Calcite porosa, bianco opaco delicato.
#   CORALLO             CaCO3 marino. Rosso, rosa, bianco, nero.
#   MADREPERLA / PERLA  Nacre — strati di aragonite iridescenti.
#   OPALE               Microsfere silice — gioco di colore vivo.
#   CONCHIGLIA          Guscio esterno: crema, rosa, rugosa.
#   SUGHERO             Corteccia quercia, porosa, calda.
#   CARTA               Bianca, kraft, riso, giornale, patinata, velina.
#   CARTONE             Ondulato, grigio, nero premium.
#   PERGAMENA           Pelle animale trattata, tono caldo antico.
#   SAPONE              Solido traslucente, glicerina, Marsiglia.
#   BAMBÙ               Graminacea lignificata, toni giallo-verdi.
#   FOGLIE E PETALI     Diff_trans + thin_walled per controluce verde/colore.
#   MUSCHIO             Sheen Charlie polveroso.


