# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — FABRICS
# ───────────────────────────────────────────────────────────────────────────
#  File:     fabrics.yaml
#  Disney:   73
#  Classic:  28      (lambertian: 28 · metal: 0 · dielectric: 0)
#  Total:    101
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: velluto, seta, raso/satin, cotone, lino, lana, denim, tweed,
#             feltro, pelle vacchetta/nera/cognac, scamosciata/suede,
#             pelle verniciata, cuoio, neoprene, canvas, organza/tulle/garza.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/fabrics.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: sheen Charlie (sheen + sheen_tint + sheen_roughness)
#            per il bagliore radente delle fibre, subsurface per la
#            traslucenza dei tessuti sottili, anisotropic per raso/seta
#            (riflesso direzionale lungo il twist), diff_trans + thin_walled
#            per tessuti sottilissimi in controluce, clearcoat per patent
#            leather, color_ramp per filati melange.
#   cls_*  — Solo `lambertian` (color base). Per tessuti "piatti"
#            (cotone, lino, feltro, denim, canvas, tweed, lana grossa,
#            cuoio grezzo, pelle vacchetta opaca, neoprene). Velluto,
#            seta, raso, organza, scamosciata/suede e patent leather
#            sono SOLO Disney perché lo sheen Charlie / clearcoat /
#            diff_trans è la firma del materiale e l'approssimazione
#            metal+fuzz li trasformerebbe in plastica.
#
# ── Fisica dei tessuti ──
#   Un tessuto è un reticolo di fibre che scattera la luce: nessuna
#   superficie liscia. Il Disney BSDF lo approssima con tre lobi
#   simultanei — diffuso (color × roughness alto), sheen Charlie ai
#   bordi e diff_trans per il sottile retroilluminato.
#
#   sheen 0.0-0.2 = cotone/lino opaco, 0.4-0.6 = lana/suede,
#   0.85-1.0 = velluto/peluche.
#   sheen_roughness 0.2-0.4 = grazing fine (raso, organza),
#   0.6-0.85 = polveroso (velluto deep-pile, tweed).
#
# ── Categorie ──
#   VELLUTO          Sheen Charlie altissimo, deep-pile. Solo Disney.
#   SETA             Sheen + subsurface + anisotropic. Solo Disney.
#   RASO/SATIN       Sheen + specular alto. Solo Disney.
#   COTONE           Opaco, sheen minimo. Disney + Classic.
#   LINO             Subsurface leggero, sheen leggero. Disney + Classic.
#   LANA             Roughness altissimo, sheen da peluria. Disney + Classic.
#   DENIM            Cotone twill blu, opaco. Disney + Classic.
#   TWEED/SPIGATO    Lana intrecciata, melange. Disney + Classic.
#   FELTRO           Fibre pressate, opacissimo. Disney + Classic.
#   PELLE            Vacchetta, conciata: Disney + Classic (lambertian).
#   SCAMOSCIATA      Suede/nubuck, sheen Charlie. Solo Disney.
#   VERNICIATA       Patent leather, clearcoat alto. Solo Disney.
#   CUOIO            Conciatura vegetale, rustico. Disney + Classic.
#   NEOPRENE         Gomma sintetica, mute. Disney + Classic.
#   CANVAS           Cotone pesante, opaco. Disney + Classic.
#   ORGANZA/TULLE    Tessuti sottilissimi, diff_trans. Solo Disney.


