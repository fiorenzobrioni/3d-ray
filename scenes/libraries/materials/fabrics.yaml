# ============================================================================
# Libreria Materiali — Tessuti, Fibre e Pelli
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/fabrics.yaml" }]
#
# Raccolta completa di tessuti naturali, sintetici e pelli. Dal velluto
# alla seta, dal denim alla pelle verniciata.
#
#   dis_  (Disney BSDF) — Indispensabile per i tessuti: sheen simula
#         il bagliore radente delle fibre (velluto, seta), subsurface
#         la traslucenza dei tessuti sottili (seta, lino, organza),
#         clearcoat il lucido della pelle verniciata. Richiede ≥128 spp.
#
#   cls_  (Classic) — Lambertian per tessuti opachi (cotone, lino,
#         feltro). Metal+fuzz per tessuti lucidi (seta, raso, pelle).
#         Nessun effetto sheen/subsurface, ma veloce e silenzioso.
#
# ── Fisica dei tessuti ───────────────────────────────────────────────────
#
#   Un tessuto non è una superficie liscia: è un reticolo di fibre
#   che scattrano la luce in modo complesso. Il Disney BSDF approssima
#   gli effetti principali:
#
#   Sheen: bagliore al radente. Le fibre ai bordi riflettono la luce
#     lateralmente. Effetto forte su velluto (sheen ~1.0), debole su
#     cotone (sheen ~0.1). sheen_tint colora il bagliore verso il
#     colore base (0 = bianco, 1 = tinta completa).
#
#   Roughness: diffusione. Tessuti opachi (cotone, lino) hanno
#     roughness ~0.90. Tessuti lucidi (seta, raso) ~0.45–0.55.
#
#   Subsurface: traslucenza. Tessuti sottili retroilluminati mostrano
#     il colore della luce che li attraversa. Seta e lino: ~0.15–0.25.
#
#   Specular: riflesso Fresnel superficiale. Basso (~0.1–0.2) per
#     tessuti opachi, medio (~0.3–0.5) per seta e raso.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   VELLUTO             Sheen altissimo (0.8–1.0), roughness alto.
#                       Effetto "alone luminoso" ai bordi.
#                       Usi: divani, tende, abiti da sera.
#
#   SETA                Sheen medio, roughness medio-basso, subsurface.
#                       Lucentezza morbida, cangiante al movimento.
#                       Usi: cravatte, foulard, biancheria, abiti.
#
#   RASO / SATIN        Simile alla seta ma più liscio e specchiante.
#                       Specular più alto, roughness più basso.
#                       Usi: lenzuola, nastri, abiti da sposa.
#
#   COTONE              Opaco, roughness alto, sheen minimo.
#                       Il tessuto più comune, neutro e diffuso.
#                       Usi: magliette, lenzuola, tende leggere.
#
#   LINO                Leggermente più lucido del cotone, subsurface.
#                       Texture "grinzosa" naturale.
#                       Usi: tovaglie, camicie estive, tende.
#
#   LANA                Roughness altissimo, sheen medio (peluria).
#                       Calda, grossa, effetto morbido.
#                       Usi: maglioni, coperte, tappeti.
#
#   DENIM               Cotone twill, roughness alto, toni blu.
#                       Il tessuto dei jeans.
#
#   TWEED / SPIGATO     Lana intrecciata, roughness molto alto.
#                       Giacche, cappotti, arredamento.
#
#   FELTRO              Fibre pressate (non tessute), opacissimo.
#                       Roughness ~0.95, nessun riflesso.
#                       Usi: cappelli, tappetini, artigianato.
#
#   PELLE VACCHETTA     Pelle bovina conciata, semi-lucida.
#                       Specular medio, sheen per la grana.
#                       Usi: borse, cinture, scarpe, divani.
#
#   PELLE SCAMOSCIATA   Nubuck/suede, superficie vellutata.
#                       Sheen alto, roughness altissimo.
#                       Usi: scarpe, giacche, borse.
#
#   PELLE VERNICIATA    Patent leather, superficie a specchio.
#                       Clearcoat alto, roughness bassissimo.
#                       Usi: scarpe eleganti, borse, cinture.
#
#   CUOIO               Pelle conciata al vegetale, rustica.
#                       Roughness alto, toni caldi marroni.
#                       Usi: selle, cinghie, valigeria, rilegature.
#
#   NEOPRENE            Gomma sintetica, muta subacquea.
#                       Roughness medio, sheen leggero.
#
#   CANVAS / TELA       Cotone pesante, sacchi, tende militari.
#                       Opacissimo, roughness alto.
#
#   ORGANZA / TULLE     Tessuto leggero semi-trasparente.
#                       Solo Disney (spec_trans + subsurface).
#
# ============================================================================


