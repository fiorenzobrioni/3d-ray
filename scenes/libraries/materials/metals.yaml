# ============================================================================
# Libreria Materiali — Metalli
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/metals.yaml" }]
#
# Raccolta completa di metalli, dalle leghe preziose ai ferrosi industriali.
# Ogni materiale esiste in due varianti:
#
#   dis_  (Disney BSDF) — metallic=1.0 con GGX importance sampling.
#         Un solo lobo attivo → stesso rumore del classic, ma con accesso
#         a clearcoat (vernice protettiva), specular_tint (tinta Fresnel)
#         e sheen (patina al radente). Usabile su qualsiasi superficie.
#
#   cls_  (Classic Metal) — type: "metal" con fuzz. Leggero, predicibile,
#         nessun overhead da lobi multipli. Ideale per superfici grandi
#         (muri metallici, pavimenti, sfondo) e render draft veloci.
#
# ── Nota sulla rugosità ──────────────────────────────────────────────────
#
#   Disney roughness e Classic fuzz non sono 1:1 ma approssimano lo stesso
#   effetto visivo. Questa libreria calibra i valori per risultati simili:
#     roughness 0.02 ≈ fuzz 0.02  (specchio)
#     roughness 0.15 ≈ fuzz 0.12  (satinato)
#     roughness 0.35 ≈ fuzz 0.30  (spazzolato)
#     roughness 0.60 ≈ fuzz 0.50  (opaco/battuto)
#
# ── Colori metallici (valori di riflettanza misurati) ────────────────────
#
#   I colori RGB dei metalli corrispondono alla riflettanza spettrale
#   reale. Non sono albedo diffusi — sono la tinta della riflessione
#   speculare. Metalli puri (Au, Ag, Cu) hanno colori ben definiti;
#   leghe (acciaio, bronzo, ottone) variano con la composizione.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   ORO               Metallo prezioso. Riflettanza giallo-calda,
#                     morbido e duttile. Varianti: 24K puro, rosa,
#                     bianco, antico (ossidato/patinato).
#
#   ARGENTO           Massima riflettanza di tutti i metalli.
#                     Tono freddo, leggermente bluastro.
#                     Varianti: sterling, ossidato, brunito.
#
#   RAME              Riflettanza rossastra calda, unico metallo
#                     (con l'oro) ad avere un colore non grigio.
#                     Varianti: lucido, antico, ossidato (verderame).
#
#   BRONZO            Lega Cu-Sn. Tono caldo dorato-bruno.
#                     Varianti: lucido, rinascimentale, patinato.
#
#   OTTONE            Lega Cu-Zn. Tono giallo più chiaro del bronzo.
#                     Varianti: lucido, satinato, antico.
#
#   ACCIAIO           Lega Fe-C. Tono grigio neutro freddo.
#                     Varianti: inox lucido, spazzolato, satinato,
#                     carbonioso, damasco.
#
#   FERRO             Puro o quasi. Tono grigio scuro, rugosità
#                     naturale più alta dell'acciaio.
#                     Varianti: battuto, ghisa, forgiato.
#
#   ALLUMINIO         Leggero, riflettanza alta con tono neutro.
#                     Varianti: lucido, anodizzato (colori), satinato.
#
#   TITANIO           Leggero e resistente. Tono grigio con sfumatura
#                     calda. L'anodizzazione produce colori vivaci.
#                     Varianti: naturale, anodizzato (blu, viola, oro).
#
#   CROMO             Riflettanza altissima, tono blu-freddo.
#                     Varianti: specchio, satinato, nero (PVD).
#
#   PLATINO           Metallo prezioso, tono grigio-bianco caldo.
#                     Più scuro dell'argento, più caldo del cromo.
#
#   NICHEL            Tono grigio-giallastro. Resistente alla corrosione.
#                     Varianti: lucido, spazzolato, nero galvanico.
#
#   ZINCO             Tono grigio-azzurro. Opacizza rapidamente.
#                     Varianti: lucido, patinato, galvanizzato.
#
#   STAGNO / PELTRO   Lega morbida (Sn + Pb/Cu/Sb). Tono grigio
#                     caldo, superficie satinata naturale.
#
#   CORTEN            Acciaio patinabile. La ruggine controllata
#                     forma una crosta protettiva arancio-bruna.
#
# ============================================================================


