# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — METALS
# ───────────────────────────────────────────────────────────────────────────
#  File:     metals.yaml
#  Disney:   70
#  Classic:  61      (lambertian: 4 · metal: 57 · dielectric: 0)
#  Total:    131
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: oro, argento, rame, bronzo, ottone, acciaio, ferro, ghisa,
#             alluminio, titanio, cromo, platino, nichel, zinco, peltro,
#             corten, mercurio, niobio olografico.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/metals.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: metallic=1.0 con GGX importance sampling;
#            specular_tint per Fresnel colorato, anisotropic per spazzolature
#            direzionali, thin_film per anodizzazioni e iridescenze, voronoi
#            f3-f1 per damasco, color_ramp per patine evolutive.
#   cls_*  — Classic: type `metal` con fuzz per quasi tutti (la
#            metallicità è speculare-dominante). `lambertian` solo per
#            corten patinato e acciaio arrugginito (lobo metallic <0.5).
#            Anodizzazioni alluminio/titanio, niobio olografico, ottone
#            e rame patinati con color_ramp esistono SOLO in Disney.
#
# ── Mappatura rugosità ──
#   roughness 0.02 ≈ fuzz 0.02  (specchio)
#   roughness 0.15 ≈ fuzz 0.12  (satinato)
#   roughness 0.35 ≈ fuzz 0.30  (spazzolato)
#   roughness 0.60 ≈ fuzz 0.50  (opaco/battuto)
#
# ── Colori metallici ──
#   I valori RGB sono riflettanze spettrali misurate, non albedo diffusi:
#   tinta della riflessione speculare. Metalli puri (Au, Ag, Cu) hanno
#   colori ben definiti; leghe (acciaio, bronzo, ottone) variano con la
#   composizione.
#
# ── Categorie ──
#   ORO, ARGENTO, RAME, BRONZO, OTTONE, ACCIAIO, FERRO/GHISA, ALLUMINIO,
#   TITANIO, CROMO, PLATINO, NICHEL, ZINCO, STAGNO/PELTRO, CORTEN, SPECIALI.


