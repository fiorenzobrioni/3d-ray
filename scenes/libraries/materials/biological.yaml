# ============================================================================
# Libreria Materiali — Tessuti Biologici Viventi
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/biological.yaml" }]
#
# Materiali di tessuto VIVENTE (pelle umana, muscolo, scaglie, piume, occhio).
# Distinta da `organics.yaml` (materiali biologici INERTI: osso, avorio,
# cera, sughero, paper) e da `leathers.yaml` (pelle CONCIATA, manufatti).
#
# Sfrutta:
#
#   • Subsurface 0.4-0.7 + subsurface_color rossastro tipico per la
#     skin (multi-layer approssimato via single Disney + scattering tint).
#   • Diff_trans per parti sottili (orecchie, ali pipistrello, palmo mani).
#   • Color_ramp 4-5 stop per gradienti dermici (sebo, melanina, eritema).
#   • Voronoi cell + bump per scaglie pesce/rettile.
#   • Thin_film 400-600nm per scaglie iridescenti di pesce.
#   • Anisotropic per piume (direzione fibre).
#   • Displacement scalare per pori e micro-rilievi della pelle.
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF (sempre). Tessuti viventi richiedono subsurface.
#         Niente cls_ per questa libreria — i materiali sono inerentemente
#         multi-lobe.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   PELLE UMANA         Caucasica chiara/scura, mediterranea, asiatica,
#                       africana, bambino, anziana, abbronzata.
#                       Multi-layer skin tone via SSS + ramp.
#
#   MUSCOLO / CARNE     Crudo (rosso vivo, fibrato), organi (fegato/cuore),
#                       lingua bovina (rosa puntinato).
#
#   PELLE ANIMALE       Pelle elefante (grigia spessa), pelle squalo
#                       (denticolati), pelle iguana (squamosa).
#
#   SCAGLIE PESCE       Carpa, salmone, trota, scaglie dorate koi.
#                       Thin_film per iridescenza.
#
#   SCAGLIE RETTILE     Geco verde, iguana, drago barbuto, serpente vivo.
#
#   PIUME               Copertura (fine), soffice piumino, primaria
#                       rigida, struzzo decorativa.
#
#   OCCHIO              Iride colorata + sclera bianca + cornea trasparente.
#                       Strato multiplo via mix material a livello scena.
#
#   MEMBRANE SOTTILI    Ala pipistrello, palmo rana, foglia carnosa.
#                       Diff_trans alto + thin_walled.
#
#   TESSUTI SOFT        Gengiva rosa, labbra, lingua umana.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# PELLE UMANA — Multi-layer skin tone:
#   La nostra approssimazione è single-layer Disney. Per skin "production"
#   serve compositing a livello scena con:
#     1) layer profondo: subsurface_color rosso-arancio profondo
#     2) layer epidermide: base color + leggero subsurface giallastro
#     3) sebum gloss: clearcoat 0.2 + coat_roughness 0.3
#   Qui forniamo single-Disney già calibrato per uso diretto.
#
# OCCHIO — Composizione consigliata:
#   - Sfera principale: `dis_eye_sclera` (bianco con vene rosse leggere)
#   - Sfera interna iride: `dis_iride_*`
#   - Sfera cornea trasparente: `dis_eye_cornea` (clearcoat puro)
#
# Render hint:
#   Draft:  -s 64 -d 8 -S 1   (SSS richiede d alto)
#   Final:  -s 1024 -d 12 -S 4
# ============================================================================

materials:

