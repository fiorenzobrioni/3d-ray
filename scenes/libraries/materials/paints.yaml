# ============================================================================
# Libreria Materiali — Vernici e Finiture
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/paints.yaml" }]
#
# Raccolta completa di vernici, lacche, smalti e pitture. Dalla vernice
# auto metallizzata alla chalk paint shabby chic.
#
#   dis_  (Disney BSDF) — Essenziale per le vernici: clearcoat è il
#         parametro protagonista, simula lo strato trasparente lucido
#         sopra il colore base. Combinato con metallic (flake metallico),
#         roughness (finitura opaca/satinata/lucida) e specular_tint.
#
#   cls_  (Classic) — Metal+fuzz per vernici lucide (approssima il
#         riflesso speculare). Lambertian per vernici opache (chalk,
#         primer, pittura murale). Non supporta clearcoat né flake
#         metallico — solo un'approssimazione della lucentezza.
#
# ── Fisica delle vernici ─────────────────────────────────────────────────
#
#   Una vernice auto ha tipicamente 3 strati:
#     1. Primer — fondo aggrappante, grigio opaco
#     2. Basecoat — colore + eventuale flake metallico/perlato
#     3. Clearcoat — vernice trasparente lucida protettiva
#
#   Nel Disney BSDF:
#     - Il colore base è il basecoat
#     - metallic > 0 simula i flake metallici nel basecoat
#     - clearcoat + coat_roughness simulano il terzo strato (coat_ior
#       tunabile per lacche automotive; coat_roughness sostituisce il
#       legacy clearcoat_gloss con la convenzione "0 = a specchio")
#     - specular_tint colora i riflessi Fresnel del basecoat
#
#   Le vernici NON metallizzate (smalto, lacca) hanno metallic = 0
#   e usano solo clearcoat per la lucentezza.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   VERNICE AUTO          Metallizzata con clearcoat. Flake nel basecoat
#   METALLIZZATA          creano effetto "scintillante" al sole.
#                         Usi: carrozzeria, moto, biciclette.
#
#   VERNICE AUTO          Colore pieno senza flake, clearcoat lucido.
#   PASTELLO              Tinta unita, finitura a specchio.
#                         Usi: auto d'epoca, Fiat 500, Vespa.
#
#   VERNICE AUTO          Pigmenti interferenziali (mica + ossidi) che
#   PERLATA               cambiano tono con l'angolo di osservazione.
#                         Usi: auto premium, bianco perla, champagne.
#
#   LACCA                 Finitura a specchio profonda, senza flake.
#                         Clearcoat massimo, roughness minima.
#                         Usi: pianoforte, mobili orientali, chitarre.
#
#   SMALTO LUCIDO         Vernice domestica/industriale lucida.
#                         Clearcoat medio, superficie liscia.
#                         Usi: porte, ringhiere, mobili.
#
#   SMALTO SATINATO       Finitura semi-lucida, il compromesso.
#                         Clearcoat basso, roughness medio.
#                         Usi: pareti bagno, mobili, legno.
#
#   SMALTO OPACO          Finitura matt, nessun riflesso speculare.
#                         Zero clearcoat, roughness alto.
#                         Usi: mobili moderni, pareti design.
#
#   PRIMER / FONDO        Strato preparatorio, grigio/bianco/rosso.
#                         Roughness altissimo, specular minimo.
#
#   CHALK PAINT           Pittura a gesso, finish ultra-opaco vellutato.
#                         Roughness massimo, sheen leggerissimo.
#                         Usi: shabby chic, restauro mobili.
#
#   PITTURA MURALE        Idropittura da interni/esterni, opaca o lavabile.
#                         Roughness alto, superfici grandi → classic.
#
#   VERNICE SPRAY         Bomboletta, finitura uniforme sottile.
#                         Varianti opaca, satinata, lucida.
#
#   VERNICE EPOSSIDICA    Bicomponente, resistentissima, lucida.
#                         Pavimenti garage, barche, industria.
#
#   VERNICE A POLVERE     Verniciatura elettrostatica, finitura densa.
#                         Goffrata, liscia o bucciata.
#                         Usi: componenti metallici, mobili da ufficio.
#
# ============================================================================


