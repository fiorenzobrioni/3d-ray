# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — PAINTS
# ───────────────────────────────────────────────────────────────────────────
#  File:     paints.yaml
#  Disney:   68
#  Classic:  25      (lambertian: 25 · metal: 0 · dielectric: 0)
#  Total:    93
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: vernici auto (metallizzate, pastello, perlate cangianti),
#             lacche (pianoforte, urushi), smalti lucidi/satinati/opachi,
#             primer, chalk paint, pitture murali, vernici spray,
#             epossidiche, vernici a polvere, orange-peel automotive.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/paints.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: clearcoat dual-path (coat_roughness + coat_ior 1.5)
#            è il parametro protagonista; coat_normal_map con voronoi per
#            l'orange-peel automotive; thin_film 400-800 nm per perlate
#            cangianti e flip-flop; metallic > 0 per flake metallici;
#            color_ramp per chalk paint sfumato shabby chic.
#   cls_*  — Solo `lambertian` per: pitture murali, chalk paint, primer,
#            smalti satinati/opachi, spray opachi, polveri goffrate. Vernici
#            auto, lacche, perlate, smalti lucidi (clearcoat ≥ 0.6),
#            epossidiche e perlate sono SOLO Disney perché il clearcoat
#            (lo strato trasparente speculare protettivo) è la firma
#            ottica della vernice: senza non è più vernice, è pigmento.
#
# ── Fisica delle vernici ──
#   Una vernice auto ha 3 strati:
#     1. Primer — fondo aggrappante grigio opaco
#     2. Basecoat — colore (eventuale flake metallico/perlato)
#     3. Clearcoat — vernice trasparente lucida protettiva
#
#   Nel Disney BSDF:
#     - color è il basecoat
#     - metallic > 0 simula flake metallici nel basecoat
#     - clearcoat + coat_roughness + coat_ior 1.5 simulano il terzo strato
#     - thin_film_thickness 400-700 nm = pigmenti perlati interferenziali
#     - coat_normal_map (voronoi smooth scale 40-80) = orange-peel
#
# ── Categorie ──
#   AUTO METALLIZZATA   Clearcoat ≥ 0.9 + flake. Solo Disney.
#   AUTO PASTELLO       Tinta unita + clearcoat ≥ 0.8. Solo Disney.
#   AUTO PERLATA        Thin-film + clearcoat 1.0. Solo Disney.
#   LACCA               Clearcoat 1.0 a specchio. Solo Disney.
#   SMALTO LUCIDO       Clearcoat 0.6-0.7. Solo Disney.
#   SMALTO SATINATO     Clearcoat ≤ 0.3. Disney + Classic.
#   SMALTO OPACO        Zero clearcoat. Disney + Classic.
#   PRIMER              Roughness alto, specular minimo. Disney + Classic.
#   CHALK PAINT         Ultra-opaco vellutato. Disney + Classic.
#   PITTURA MURALE      Idropittura, superfici grandi. Disney + Classic.
#   VERNICE SPRAY       Opaca (Classic) o lucida/metal (solo Disney).
#   EPOSSIDICA          Clearcoat alto, lucida. Solo Disney.
#   POLVERE             Goffrata (Classic) o lucida (solo Disney).


