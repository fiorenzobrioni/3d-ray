# ============================================================================
# Libreria Materiali — Intonaci e Stucchi
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/plasters.yaml" }]
#
# Intonaci murali decorativi e finiture a calce/gesso. Sfrutta:
#
#   • Marble texture in modalità "veneziano": vein_thickness moderata +
#     softness alta + color_ramp 3-stop per il classico look mosso.
#   • Color ramp multi-stop per stucco antico con patine.
#   • Subsurface per finiture a calce (sottile traslucenza pigmentaria).
#   • Bump_map procedurale per microstruttura granulometrica fine.
#   • Displacement scalare leggero per graffiati e raschiati.
#   • Voronoi smooth per finiture spatolate irregolari.
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF. Pareti protagoniste, dettaglio ravvicinato, finiture
#         decorative pregiate (veneziano, marmorino, tadelakt).
#
#   cls_  Classic. Lambertian per pareti di sfondo. Bump map opzionale.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   RASATO CIVILE       Intonaco base liscio, finitura piatta uniforme.
#                       Pareti interne standard.
#
#   GRAFFIATO           Effetto "scratch" con texture rigata. Esterni
#                       residenziali italiani. Displacement scalare.
#
#   VENEZIANO           Stucco lucidato a specchio con venature. Marble
#                       studio: thickness 0.30 + softness 0.22 = marezzato sfumato.
#
#   MARMORINO           Cugino opaco del veneziano, look più materico.
#                       Marble con clearcoat off, roughness alta.
#
#   TADELAKT            Stucco marocchino lucido a sapone nero. Subsurface
#                       leggero, clearcoat satinato.
#
#   STUCCO ANTICO       Pareti vissute di palazzi storici. Color ramp
#                       gradiente patina, fbm a bassa frequenza.
#
#   CALCE               Imbiancatura tradizionale a calce viva. Bianco
#                       caldo opaco, subsurface alto.
#
#   GESSO               Finitura interna ultraliscia per cartongesso.
#                       Bianco quasi puro, mat.
#
#   COLORATI MODERNI    Intonaci pigmentati saturi: terre, ocra, pastelli.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# Veneziano e marmorino sono direzionali: imposta `vein_axis` parallelo
# alla parete (es. [1, 0, 0] per parete sull'asse X) per il pattern
# tipico orizzontale dello spatolato.
#
# Per intonaci VECCHI con muffe, distacchi: mix con `over_moss_sparse` o
# `over_paint_flake` da weathering.yaml.
#
# Render hint:
#   Draft:  -s 64  -d 5  -S 1
#   Final:  -s 1024 -d 8 -S 4
# ============================================================================

materials:

  # ══════════════════════════════════════════════════════════════════════
  # RASATO CIVILE
  # ══════════════════════════════════════════════════════════════════════

  # Rasato bianco: parete interna standard, finitura piatta uniforme.
  # Roughness alta uniforme, leggera variazione di tono per evitare flat.
  - id: "dis_rasato_bianco"
    type: "disney"
    color: [0.92, 0.91, 0.88]
    roughness: 0.88
    specular: 0.25
    subsurface: 0.08
    subsurface_color: [0.95, 0.93, 0.88]
    texture:
      type: "noise"
      scale: 2.0
      noise_strength: 0.08
      colors: [[0.90, 0.89, 0.86], [0.94, 0.93, 0.90]]
      randomize_offset: true
    bump_map:
      texture:
        type: "noise"
        scale: 80.0
        colors: [[0.48, 0.48, 0.48], [0.52, 0.52, 0.52]]
      strength: 0.2

  # Rasato avorio: tono caldo, classico delle case mediterranee.
  - id: "dis_rasato_avorio"
    type: "disney"
    color: [0.92, 0.86, 0.74]
    roughness: 0.88
    specular: 0.26
    subsurface: 0.1
    subsurface_color: [0.95, 0.88, 0.75]
    texture:
      type: "noise"
      scale: 2.0
      noise_strength: 0.10
      colors: [[0.88, 0.82, 0.70], [0.95, 0.90, 0.78]]
      randomize_offset: true

  # Rasato grigio chiaro: pareti contemporanee minimaliste.
  - id: "dis_rasato_grigio_chiaro"
    type: "disney"
    color: [0.78, 0.78, 0.76]
    roughness: 0.86
    specular: 0.28
    texture:
      type: "noise"
      scale: 2.0
      noise_strength: 0.08
      colors: [[0.74, 0.74, 0.72], [0.82, 0.82, 0.80]]
      randomize_offset: true

  # ══════════════════════════════════════════════════════════════════════
  # GRAFFIATO (esterni residenziali)
  # ══════════════════════════════════════════════════════════════════════

  # Graffiato classico esterno: superficie scalfita meccanicamente,
  # microsolchi orientati. Displacement scalare leggero + bump ridged.
  - id: "dis_graffiato_esterno"
    type: "disney"
    color: [0.82, 0.78, 0.70]
    roughness: 0.92
    specular: 0.24
    texture:
      type: "noise"
      scale: 2.5
      noise_strength: 0.20
      colors: [[0.74, 0.70, 0.62], [0.88, 0.84, 0.76]]
      randomize_offset: true
    bump_map:
      texture:
        type: "noise"
        scale: 12.0
        noise_type: "ridged"
        octaves: 3
        colors: [[0.35, 0.35, 0.35], [0.65, 0.65, 0.65]]
      strength: 1.5
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        scale: 10.0
        noise_type: "ridged"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.004
      midlevel: 0.5
      bound: 0.008
      autobump: true
      autobump_strength: 1.5
      displacement_method: "bump_only"

  # Graffiato fine: graffi più sottili, look elegante.
  - id: "dis_graffiato_fine"
    type: "disney"
    color: [0.85, 0.82, 0.76]
    roughness: 0.88
    specular: 0.28
    texture:
      type: "noise"
      scale: 2.5
      noise_strength: 0.12
      colors: [[0.80, 0.77, 0.70], [0.90, 0.87, 0.80]]
      randomize_offset: true
    bump_map:
      texture:
        type: "noise"
        scale: 20.0
        noise_type: "ridged"
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.9

  # ══════════════════════════════════════════════════════════════════════
  # VENEZIANO (stucco lucidato a marmo)
  # ══════════════════════════════════════════════════════════════════════

  # Veneziano avorio: il classico, base crema con venature dorate sottili.
  # Il "marezzato" del veneziano = thickness moderata + softness alta per
  # un effetto stucco sfumato non geometrico. Clearcoat alto = lucido a cera.
  - id: "dis_veneziano_avorio"
    type: "disney"
    color: [0.92, 0.86, 0.74]
    roughness: 0.18
    specular: 0.45
    clearcoat: 0.85
    coat_roughness: 0.08
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.85
      warp_iterations: 2
      fold_amplitude: [0.75, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.30
      vein_softness: 0.20
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.96, 0.92, 0.84], interp: "linear" }
        - { position: 0.55, color: [0.85, 0.75, 0.55], interp: "smoothstep" }
        - { position: 1.00, color: [0.60, 0.45, 0.22], interp: "linear" }

  # Veneziano blu profondo: tono saturo per ambienti eleganti moderni.
  - id: "dis_veneziano_blu"
    type: "disney"
    color: [0.18, 0.28, 0.45]
    roughness: 0.18
    specular: 0.48
    clearcoat: 0.85
    coat_roughness: 0.08
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.8
      warp_iterations: 2
      fold_amplitude: [0.7, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.32
      vein_softness: 0.22
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.30, 0.42, 0.62], interp: "linear" }
        - { position: 0.55, color: [0.15, 0.25, 0.42], interp: "smoothstep" }
        - { position: 1.00, color: [0.05, 0.10, 0.20], interp: "linear" }

  # Veneziano rosso pompeiano: storico romano, terre rosse.
  - id: "dis_veneziano_pompeiano"
    type: "disney"
    color: [0.55, 0.20, 0.16]
    roughness: 0.20
    specular: 0.45
    clearcoat: 0.80
    coat_roughness: 0.10
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.85
      warp_iterations: 2
      fold_amplitude: [0.75, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.55]
      vein_thickness: 0.30
      vein_softness: 0.20
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.70, 0.35, 0.28], interp: "linear" }
        - { position: 0.50, color: [0.50, 0.18, 0.14], interp: "smoothstep" }
        - { position: 1.00, color: [0.20, 0.06, 0.04], interp: "linear" }

  # Veneziano verde salvia: sage chic contemporaneo.
  - id: "dis_veneziano_salvia"
    type: "disney"
    color: [0.55, 0.62, 0.50]
    roughness: 0.18
    specular: 0.45
    clearcoat: 0.85
    coat_roughness: 0.08
    texture:
      type: "marble"
      scale: 1.5
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.8
      warp_iterations: 2
      fold_amplitude: [0.7, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.30
      vein_softness: 0.22
      color_variation: 0.08
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.75, 0.80, 0.70], interp: "linear" }
        - { position: 0.50, color: [0.55, 0.62, 0.50], interp: "smoothstep" }
        - { position: 1.00, color: [0.30, 0.38, 0.25], interp: "linear" }

  # Veneziano antracite: lucentezza scura drammatica.
  - id: "dis_veneziano_antracite"
    type: "disney"
    color: [0.16, 0.16, 0.18]
    roughness: 0.16
    specular: 0.50
    clearcoat: 0.90
    coat_roughness: 0.06
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.85
      warp_iterations: 2
      fold_amplitude: [0.7, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.30
      vein_softness: 0.20
      color_variation: 0.08
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.32, 0.32, 0.34], interp: "linear" }
        - { position: 0.50, color: [0.16, 0.16, 0.18], interp: "smoothstep" }
        - { position: 1.00, color: [0.05, 0.05, 0.07], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # MARMORINO (opaco)
  # ══════════════════════════════════════════════════════════════════════

  # Marmorino bianco: cugino opaco del veneziano. Stessa marezzatura ma
