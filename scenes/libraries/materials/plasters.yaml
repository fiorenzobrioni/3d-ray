  # ══════════════════════════════════════════════════════════════════════
  # GESSO (finitura interna ultraliscia)
  # ══════════════════════════════════════════════════════════════════════

  # Gesso ultraliscio: cartongesso finito a stucco, bianco puro,
  # superficie quasi perfetta. Per pareti new build.
  - id: "dis_gesso_liscio"
    type: "disney"
    color: [0.96, 0.95, 0.94]
    roughness: 0.78
    specular: 0.28
    subsurface: 0.05
