    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.8
      warp_iterations: 2
      fold_amplitude: [0.7, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.32
      vein_softness: 0.22
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.95, 0.93, 0.88], interp: "linear" }
        - { position: 0.50, color: [0.86, 0.83, 0.76], interp: "smoothstep" }
        - { position: 1.00, color: [0.70, 0.65, 0.55], interp: "linear" }

  # Marmorino blu polvere: tinte pastello tipiche delle abitazioni
