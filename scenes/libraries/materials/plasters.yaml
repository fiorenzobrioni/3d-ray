  - id: "dis_calce_bianca"
    type: "disney"
    color: [0.94, 0.92, 0.86]
    roughness: 0.95
    specular: 0.20
    subsurface: 0.22
    subsurface_color: [0.96, 0.94, 0.88]
    flatness: 0.4
    texture:
      type: "noise"
      scale: 2.0
      noise_strength: 0.10
      colors: [[0.90, 0.88, 0.82], [0.96, 0.94, 0.90]]
      randomize_offset: true

  # Calce avorio caldo: pareti rustiche di case di campagna.
  - id: "dis_calce_avorio"
    type: "disney"
    color: [0.92, 0.86, 0.72]
    roughness: 0.95
    specular: 0.20
    subsurface: 0.22
    subsurface_color: [0.94, 0.88, 0.74]
