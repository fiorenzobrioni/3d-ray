  - id: "dis_marmorino_blu_polvere"
    type: "disney"
    color: [0.62, 0.72, 0.78]
    roughness: 0.65
    specular: 0.35
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.75
      warp_iterations: 2
      fold_amplitude: [0.65, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.32
      vein_softness: 0.22
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.80, 0.88, 0.92], interp: "linear" }
        - { position: 0.50, color: [0.62, 0.72, 0.78], interp: "smoothstep" }
        - { position: 1.00, color: [0.40, 0.50, 0.58], interp: "linear" }

  # Marmorino terracotta: tonalità calde mediterranee.
  - id: "dis_marmorino_terracotta"
    type: "disney"
    color: [0.72, 0.45, 0.32]
    roughness: 0.68
    specular: 0.34
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.8
      warp_iterations: 2
      fold_amplitude: [0.7, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.32
      vein_softness: 0.22
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.86, 0.62, 0.48], interp: "linear" }
        - { position: 0.50, color: [0.72, 0.45, 0.32], interp: "smoothstep" }
        - { position: 1.00, color: [0.40, 0.22, 0.16], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # TADELAKT (marocchino lucido a sapone)
  # ══════════════════════════════════════════════════════════════════════

  # Tadelakt rosa: tonalità tipica marocchina. Lucido satinato dal sapone
  # nero, sottile traslucenza per la calce viva sottostante.
  - id: "dis_tadelakt_rosa"
    type: "disney"
    color: [0.88, 0.66, 0.58]
    roughness: 0.28
    specular: 0.42
    clearcoat: 0.45
    coat_roughness: 0.18
    subsurface: 0.15
    subsurface_color: [0.92, 0.70, 0.60]
    texture:
      type: "noise"
      scale: 2.2
      noise_type: "fbm"
      octaves: 4
      noise_strength: 0.18
      colors: [[0.82, 0.60, 0.52], [0.92, 0.72, 0.64]]
      randomize_offset: true

  # Tadelakt ocra: classico Marrakech.
  - id: "dis_tadelakt_ocra"
    type: "disney"
    color: [0.80, 0.55, 0.30]
    roughness: 0.28
    specular: 0.42
    clearcoat: 0.45
    coat_roughness: 0.18
    subsurface: 0.12
    subsurface_color: [0.85, 0.60, 0.35]
    texture:
      type: "noise"
      scale: 2.2
      noise_type: "fbm"
      octaves: 4
      noise_strength: 0.20
      colors: [[0.72, 0.46, 0.22], [0.86, 0.62, 0.38]]
