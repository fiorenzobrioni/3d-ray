      noise_strength: 0.15
      colors: [[0.86, 0.80, 0.66], [0.95, 0.90, 0.78]]
      randomize_offset: true

  # Calce azzurra mediterranea: tipica delle case greche (Santorini blue).
  - id: "dis_calce_azzurra"
    type: "disney"
    color: [0.62, 0.78, 0.86]
    roughness: 0.95
    specular: 0.20
    subsurface: 0.20
    subsurface_color: [0.65, 0.80, 0.88]
    flatness: 0.4
    texture:
      type: "noise"
      scale: 1.8
      noise_strength: 0.12
      colors: [[0.55, 0.72, 0.82], [0.68, 0.82, 0.90]]
