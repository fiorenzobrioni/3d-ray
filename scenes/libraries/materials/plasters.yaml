    roughness: 0.28
    specular: 0.42
    clearcoat: 0.45
    coat_roughness: 0.18
    subsurface: 0.12
    subsurface_color: [0.65, 0.85, 0.75]
    texture:
      type: "noise"
      scale: 2.2
      noise_strength: 0.15
      colors: [[0.55, 0.76, 0.66], [0.68, 0.86, 0.78]]
      randomize_offset: true

  # ══════════════════════════════════════════════════════════════════════
  # STUCCO ANTICO
  # ══════════════════════════════════════════════════════════════════════

  # Stucco antico crepato: pareti di palazzi storici, patine multiple
  # accumulate. Color ramp 4-stop con macchie umidità + base + alone.
  - id: "dis_stucco_antico_crepato"
    type: "disney"
    color: [0.82, 0.76, 0.62]
    roughness: 0.92
    specular: 0.22
    texture:
      type: "noise"
      scale: 1.2
      noise_type: "fbm"
      octaves: 6
      noise_strength: 1.5
      distortion: 0.3
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.42, 0.36, 0.26], interp: "smoothstep" }
        - { position: 0.30, color: [0.62, 0.54, 0.42], interp: "smoothstep" }
        - { position: 0.65, color: [0.78, 0.72, 0.58], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.86, 0.72], interp: "linear" }
    bump_map:
      texture:
        type: "voronoi"
        scale: 4.0
        output: "f2_minus_f1"
        colors: [[0.30, 0.30, 0.30], [0.70, 0.70, 0.70]]
      strength: 0.8

  # Stucco antico patina umidità: aloni dalle infiltrazioni.
  - id: "dis_stucco_antico_umido"
    type: "disney"
    color: [0.75, 0.72, 0.66]
    roughness: 0.92
    specular: 0.22
    texture:
      type: "noise"
      scale: 0.8
      noise_type: "fbm"
      octaves: 6
      noise_strength: 1.8
      distortion: 0.4
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.35, 0.35, 0.32], interp: "smoothstep" }
        - { position: 0.40, color: [0.58, 0.55, 0.50], interp: "smoothstep" }
        - { position: 0.80, color: [0.78, 0.74, 0.68], interp: "smoothstep" }
        - { position: 1.00, color: [0.88, 0.84, 0.78], interp: "linear" }

  # Stucco antico patina rosa: tipico dei palazzi veneziani.
  - id: "dis_stucco_antico_rosa"
    type: "disney"
    color: [0.85, 0.68, 0.60]
    roughness: 0.92
    specular: 0.22
    texture:
      type: "noise"
      scale: 1.0
      noise_type: "fbm"
      octaves: 6
      noise_strength: 1.4
      distortion: 0.3
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.55, 0.35, 0.32], interp: "smoothstep" }
        - { position: 0.40, color: [0.72, 0.55, 0.50], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.80, 0.72], interp: "linear" }

  # ══════════════════════════════════════════════════════════════════════
  # CALCE (imbiancatura tradizionale)
  # ══════════════════════════════════════════════════════════════════════

  # Calce bianca tradizionale: imbiancatura a calce viva, bianco caldo
  # con leggera traslucenza. Subsurface alto per il look "polveroso"
