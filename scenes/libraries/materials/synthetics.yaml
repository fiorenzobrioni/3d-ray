# ============================================================================
# Libreria Materiali — Sintetici Tecnici Avanzati
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/materials/synthetics.yaml" }]
#
# Compositi tecnici, materiali high-tech, polimeri avanzati. Distinta da
# `plastics.yaml` (plastiche da iniezione comuni: ABS, PVC, PP, PE).
# Qui ci sono i materiali "speciali" che sfruttano:
#
#   • Anisotropic + anisotropic_rotation per pattern weave (carbonio twill,
#     kevlar plain). Roughness anisotropico simula la direzionalità.
#   • Bump_map procedurale con scale alto direzionale per pattern di
#     tessitura tecnica.
#   • Thin_film 200-700nm per vinile auto olografico (color shift).
#   • Subsurface alto per silicone medicale traslucido.
#   • Clearcoat saturo per vinile auto wrap gloss.
#
# ── Naming ───────────────────────────────────────────────────────────────
#
#   dis_  Disney BSDF con anisotropic + anisotropic_rotation per pattern.
#   cls_  Lambertian (solo per draft/sfondo, raro).
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   FIBRA DI CARBONIO   Twill 2/2, plain weave, satin. Pattern anisotropici
#                       a 45° per twill, 0° per plain. Sotto resina (clearcoat).
#
#   KEVLAR              Giallo aramidico, plain weave. Hybrid carbon+kevlar.
#
#   FIBRA DI VETRO      Pannelli sandwich, gel coat. Bianco/grigio opaco.
#
#   NEOPRENE            Mute da sub, guanti. Liscio o foderato.
#
#   PTFE / TEFLON       Pentole, supporti scivolosi. Bianco opaco.
#
#   GOMMA EPDM          Guarnizioni, isolanti elettrici. Nero opaco.
#
#   SILICONE MEDICALE   Traslucido bio-compatibile. Subsurface alto.
#
#   POLIURETANO         Schiuma rigida (isolante), schiuma flessibile.
#
#   VINILE AUTO WRAP    Matte, gloss, satin, chrome, olografico.
#                       Settori automotive customization.
#
#   TESSUTI TECNICI     Ripstop nylon, cordura, gore-tex laminato.
#
#   AEROGEL             "Frozen smoke", il solido più leggero. Esotico.
#
# ── Note d'uso ───────────────────────────────────────────────────────────
#
# I pattern di tessitura (twill, plain, satin) sono direzionali. Il
# parametro `anisotropic_rotation` ruota la direzione di anisotropia:
#   - twill 2/2:        anisotropic_rotation: 0.125 (45°/360°)
#   - plain weave:      anisotropic_rotation: 0.0 o 0.25
#   - satin:            anisotropic_rotation: 0.0625 (22.5°)
#
# Per pattern weave VISIBILE (non solo riflesso anisotropico), serve un
# bump_map con voronoi o noise direzionale.
#
# Render hint:
#   Draft:  -s 64 -d 5 -S 1
#   Final:  -s 1024 -d 8 -S 4
# ============================================================================

materials:

  # ══════════════════════════════════════════════════════════════════════
  # FIBRA DI CARBONIO
  # ══════════════════════════════════════════════════════════════════════

  # Carbonio twill 2/2 sotto resina: il classico look "F1". Pattern a 45°,
  # clearcoat lucido per la resina, anisotropia per la direzionalità del
  # fascio.
  - id: "dis_carbonio_twill"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.20
    specular: 0.50
    anisotropic: 0.85
    anisotropic_rotation: 0.125
    clearcoat: 0.95
    coat_roughness: 0.05
    bump_map:
      texture:
        type: "voronoi"
        scale: 60.0
        output: "cell"
        smoothness: 0.05
        randomness: 0.4
        colors: [[0.35, 0.35, 0.35], [0.65, 0.65, 0.65]]
      strength: 0.6

