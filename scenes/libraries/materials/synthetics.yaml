# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — SYNTHETICS
# ───────────────────────────────────────────────────────────────────────────
#  File:     synthetics.yaml
#  Disney:   34
#  Classic:  0       (lambertian: 0 · metal: 0 · dielectric: 0)
#  Total:    34
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: fibra di carbonio (twill/plain/satin/3D/matte/tinto), kevlar,
#             vetroresina, neoprene, PTFE, EPDM, silicone medicale,
#             poliuretano, vinile auto wrap, ripstop/cordura/gore-tex,
#             aerogel.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/synthetics.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF. Tutti i materiali sintetici tecnici qui sfruttano
#            feature Disney irrinunciabili (anisotropic + rotation per i
#            tessuti weave direzionali, thin_film per vinile olografico,
#            subsurface alto per silicone medicale e aerogel, sheen
#            Charlie per tessuti tecnici). NON esiste variante Classic:
#            la perdita di queste feature snaturerebbe il materiale.
#
# ── Anisotropic rotation per pattern weave ──
#   twill 2/2:        anisotropic_rotation: 0.125 (45°/360°)
#   plain weave:      anisotropic_rotation: 0.0 o 0.25
#   satin:            anisotropic_rotation: 0.0625 (22.5°)
#
# ── Categorie ──
#   FIBRA DI CARBONIO   Twill 2/2, plain weave, satin, 3D, matte, tinto.
#                       Anisotropic + bump map voronoi per tessitura.
#   KEVLAR              Giallo aramidico, nero tattico, hybrid carbon+kevlar.
#   FIBRA DI VETRO      Gel coat lucido, grezza, trasparente serre.
#   NEOPRENE            Mute, accessori sub. Nero/blu/foderato nylon.
#   PTFE / TEFLON       Bianco antiaderente, nero con grafite.
#   GOMMA EPDM          Industriale opaca, goffrata palestra.
#   SILICONE MEDICALE   Traslucido bio-compatibile (subsurface alto).
#   POLIURETANO         Schiuma isolante rigida, schiuma flessibile.
#   VINILE AUTO WRAP    Matte, gloss, satin, chrome, chrome rosa, olografico.
#   TESSUTI TECNICI     Ripstop nylon, cordura, gore-tex laminato.
#   AEROGEL             "Frozen smoke", traslucido azzurrino (Rayleigh).


materials:

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║  DISNEY                                                               ║
  # ╚═══════════════════════════════════════════════════════════════════════╝

  # ── FIBRA DI CARBONIO ────────────────────────────────────────────────────

  # Carbonio twill 2/2 sotto resina — il classico look "F1"; pattern a 45°,
  # clearcoat lucido per la resina, anisotropia per la direzionalità del fascio
  - id: "dis_carbonio_twill"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.20
    specular: 0.50
    anisotropic: 0.85
    anisotropic_rotation: 0.125
    clearcoat: 0.95
    coat_roughness: 0.05
    coat_ior: 1.5
    bump_map:
      texture:
        type: "voronoi"
        scale: 60.0
        output: "random"
        smoothness: 0.05
        randomness: 0.4
        colors: [[0.35, 0.35, 0.35], [0.65, 0.65, 0.65]]
      strength: 0.6

  # Carbonio plain weave — pattern a quadrettino regolare 0°/90°
  - id: "dis_carbonio_plain"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.20
    specular: 0.50
    anisotropic: 0.85
    anisotropic_rotation: 0.0
    clearcoat: 0.95
    coat_roughness: 0.05
    coat_ior: 1.5
