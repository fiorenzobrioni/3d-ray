# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — GROUNDS
# ───────────────────────────────────────────────────────────────────────────
#  File:     grounds.yaml
#  Disney:   20
#  Classic:  55      (lambertian: 51 · metal: 2 · dielectric: 2)
#  Total:    75
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: checker, parquet, piastrelle/gres, marmi pavimento, cemento,
#             asfalto, terra/fango, sabbia, ghiaia, erba, neve, moquette,
#             foglie cadute, acque/pozzanghere.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/grounds.yaml" }]
#
# ── PREVALENZA CLASSIC ───────────────────────────────────────────────────
#
#   Questa libreria privilegia i materiali Classic. Pavimenti e terreni
#   coprono la maggior parte dei pixel: il rumore Disney su queste aree
#   domina il rumore totale della scena. Regola d'oro:
#
#     → Pavimenti e terreni: SEMPRE Classic (lambertian o metal+fuzz)
#     → Disney solo se il pavimento è protagonista della scena
#       (close-up su marmo lucido / parquet laccato / acqua piscina)
#       e si hanno almeno 512 spp.
#
# Convenzione:
#   dis_*  — Disney BSDF: parquet laccato/invecchiato (clearcoat IOR 1.5
#            + wood texture), marmi lucidi (marble + clearcoat), gres
#            lucido, asfalto bagnato, acqua piscina/mossa (spec_trans +
#            Beer-Lambert leggero), neve fresca/compatta (subsurface +
#            sheen), moquette (sheen Charlie), erba (sheen + diff_trans).
#            Quando appropriato usano `displacement_method: bump_only`
#            (sfere) o displacement scalare per ghiaia/sabbia.
#   cls_*  — `lambertian` per la stragrande maggioranza: terra, sabbia,
#            asfalto asciutto, ghiaia, erba, neve sporca, moquette,
#            foglie cadute, parquet grezzo, marmi opachi, checker, gres
#            opaco, cotto. `metal` + fuzz per asfalto bagnato e
#            pozzanghera (riflesso speculare dominante). `dielectric`
#            per acque pulite (lago/piscina) e ghiaccio.
#
# ── Categorie ────────────────────────────────────────────────────────────
#   CHECKER             Scacchiera bicolore, il pattern iconico.
#   PARQUET             Legno per interni, wood texture.
#   PIASTRELLE          Ceramica, gres, cotto.
#   MARMO PAVIMENTO     Marmi lucidati per interni (marble texture).
#   CEMENTO E ASFALTO   Industriale, stradale.
#   TERRA E FANGO       Terreni naturali (noise + displacement).
#   SABBIA              Spiaggia, deserto, dune (musgrave + displacement).
#   GHIAIA              Vialetti, giardini zen (voronoi + displacement).
#   ERBA E MUSCHIO      Prato, campo sportivo, sottobosco.
#   NEVE                Fresca, compatta, sporca.
#   MOQUETTE            Tessuto a pavimento (sheen Charlie).
#   FOGLIE CADUTE       Tappeto autunnale.
#   ACQUA / GHIACCIO    Laghi, pozzanghere, piscine, ghiaccio.


materials:

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║  DISNEY                                                               ║
  # ╚═══════════════════════════════════════════════════════════════════════╝

  # ── CHECKER ──────────────────────────────────────────────────────────────

  # Checker marmo lucido — clearcoat IOR 1.5 sopra checker bn
  - id: "dis_checker_marmo"
    type: "disney"
    roughness: 0.10
    specular: 0.65
    clearcoat: 0.70
    coat_roughness: 0.10
    coat_ior: 1.5
    texture: { type: "checker", colors: [[0.90, 0.88, 0.85], [0.06, 0.06, 0.07]], scale: 1.5 }


  # ── PARQUET ──────────────────────────────────────────────────────────────

  # Parquet laccato — clearcoat lucido protettivo
  - id: "dis_parquet_laccato"
    type: "disney"
    roughness: 0.18
    specular: 0.48
    clearcoat: 0.65
    coat_roughness: 0.12
    coat_ior: 1.5
    texture:
      type: "wood"
      scale: 5.0
      noise_strength: 2.5
      colors: [[0.55, 0.38, 0.18], [0.38, 0.24, 0.10]]
      randomize_offset: true
      randomize_rotation: true

  # Parquet rovere invecchiato — wood 4-stop color_ramp + clearcoat tenue
  - id: "dis_parquet_invecchiato"
    type: "disney"
    color: [0.62, 0.45, 0.22]
    roughness: 0.45
    specular: 0.40
    clearcoat: 0.30
    coat_roughness: 0.18
    coat_ior: 1.5
    texture:
      type: "wood"
      scale: 5.5
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.0
      noise_strength: 1.5
      octaves: 5
      grain_scale: 1.5
      figure_scale: 0.20
      figure_strength: 0.4
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.10, 0.04], interp: "smoothstep" }
        - { position: 0.30, color: [0.42, 0.25, 0.10], interp: "smoothstep" }
        - { position: 0.65, color: [0.72, 0.52, 0.28], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.78, 0.55], interp: "linear" }


  # ── PIASTRELLE ───────────────────────────────────────────────────────────

  # Gres lucido bianco — clearcoat IOR 1.5
  - id: "dis_gres_lucido_bianco"
    type: "disney"
    color: [0.88, 0.86, 0.82]
    roughness: 0.10
    specular: 0.60
    clearcoat: 0.55
    coat_roughness: 0.12
    coat_ior: 1.5

  # Gres lucido antracite — superficie a specchio
  - id: "dis_gres_lucido_antracite"
    type: "disney"
    color: [0.18, 0.17, 0.16]
    roughness: 0.08
    specular: 0.68
    clearcoat: 0.60
    coat_roughness: 0.10
    coat_ior: 1.5

  # Piastrelle sconnesse — voronoi + displacement scalare sui giunti
  - id: "dis_piastrelle_sconnesse"
    type: "disney"
    color: [0.78, 0.72, 0.62]
    roughness: 0.32
    specular: 0.45
    clearcoat: 0.40
    coat_roughness: 0.18
    coat_ior: 1.5
    texture:
      type: "voronoi"
      scale: 4.0
      output: "random"
      smoothness: 0.05
      randomness: 0.5
      colors: [[0.55, 0.48, 0.32], [0.92, 0.85, 0.72]]
    displacement:
      mode: "scalar"
      texture:
        type: "voronoi"
        scale: 4.0
        output: "f2_minus_f1"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.005
      midlevel: 0.5
      bound: 0.010
      autobump: true
      displacement_method: "bump_only"


  # ── MARMO PAVIMENTO ──────────────────────────────────────────────────────

  # Carrara lucido — clearcoat IOR 1.5 sopra marble production-grade
  - id: "dis_pavimento_carrara"
