    roughness: 0.88
    specular: 0.25
    texture:
      type: "voronoi"
      scale: 8.0
      output: "random"
      smoothness: 0.05
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.18, 0.14, 0.10], interp: "constant" }
        - { position: 0.25, color: [0.42, 0.36, 0.28], interp: "constant" }
        - { position: 0.50, color: [0.62, 0.55, 0.45], interp: "constant" }
        - { position: 0.80, color: [0.82, 0.72, 0.55], interp: "constant" }
        - { position: 1.00, color: [0.94, 0.88, 0.72], interp: "linear" }
