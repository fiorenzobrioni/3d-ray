# ============================================================================
# Libreria Materiali — Pavimenti e Terreni
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/grounds.yaml" }]
#
# Raccolta di materiali per superfici grandi: pavimenti, terreni, strade.
# Pensata per infinite_plane e ground plane nelle scene.
#
# ── PREVALENZA CLASSIC ───────────────────────────────────────────────────
#
#   Questa libreria privilegia i materiali classici. Le superfici grandi
#   coprono la maggior parte dei pixel: il rumore Disney su queste aree
#   domina il rumore totale della scena. La regola d'oro:
#
#     → Pavimenti e terreni: SEMPRE classic (lambertian o metal+fuzz)
#     → Usare Disney solo se il pavimento è protagonista della scena
#       (close-up su marmo lucido) e si hanno almeno 512 spp
#
#   cls_  (Classic) — Lambertian con texture checker/noise/marble.
#         Metal+fuzz per superfici lucide. SCELTA RACCOMANDATA.
#
#   dis_  (Disney BSDF) — Solo per close-up. Clearcoat per parquet
#         laccato, subsurface per neve, sheen per moquette/erba.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   CHECKER             Scacchiera bicolore, il pattern iconico.
#   PARQUET             Legno per interni, texture wood.
#   PIASTRELLE          Ceramica, gres, cotto.
#   MARMO PAVIMENTO     Marmi lucidati per interni.
#   CEMENTO E ASFALTO   Industriale, stradale.
#   TERRA E FANGO       Terreni naturali.
#   SABBIA              Spiaggia, deserto, dune.
#   GHIAIA              Vialetti, giardini zen.
#   ERBA                Prato, campo sportivo.
#   NEVE                Fresca, compatta, sporca.
#   MOQUETTE            Tessuto a pavimento.
#   ACQUA               Laghi, pozzanghere.
#
# ============================================================================


