  # ════════════════════════════════════════════════════════════════════════
  # EXTENDED VFX MATERIALS (v2)
  # ════════════════════════════════════════════════════════════════════════
  #
  # Estensione con feature avanzate per pavimentazioni e suoli:
  #   • Musgrave hetero_terrain per sabbia (granulometria stratificata).
  #   • Voronoi cell per ghiaia (variazione colore per sasso).
  #   • Smooth voronoi per neve compatta.
  #   • Color_ramp 4-stop per parquet con invecchiamento.
  #   • Displacement scalare per piastrelle sconnesse.
  # ════════════════════════════════════════════════════════════════════════

  # Sabbia desertica musgrave: granulometria con dune e ripples.
  - id: "dis_sabbia_desertica_v2"
    type: "disney"
    color: [0.92, 0.75, 0.45]
    roughness: 0.92
    specular: 0.18
    subsurface: 0.18
    texture:
      type: "noise"
      scale: 1.5
      noise_type: "hetero_terrain"
      octaves: 6
      lacunarity: 2.0
      gain: 0.5
      fractal_increment: 0.6
      fractal_offset: 0.7
      noise_strength: 1.0
      color_ramp:
        - { position: 0.00, color: [0.55, 0.35, 0.12], interp: "smoothstep" }
        - { position: 0.45, color: [0.82, 0.62, 0.28], interp: "smoothstep" }
        - { position: 0.80, color: [0.92, 0.78, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.88, 0.62], interp: "linear" }
    bump_map:
      texture:
        type: "noise"
        scale: 20.0
        noise_type: "fbm"
        colors: [[0.45, 0.45, 0.45], [0.55, 0.55, 0.55]]
      strength: 0.5

  # Ghiaia mista: voronoi cell con color_ramp constant per sassi distinti.
  - id: "dis_ghiaia_mista"
    type: "disney"
    color: [0.55, 0.50, 0.42]
    roughness: 0.88
    specular: 0.25
    texture:
      type: "voronoi"
      scale: 8.0
      output: "random"
      smoothness: 0.05
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.18, 0.14, 0.10], interp: "constant" }
        - { position: 0.25, color: [0.42, 0.36, 0.28], interp: "constant" }
        - { position: 0.50, color: [0.62, 0.55, 0.45], interp: "constant" }
        - { position: 0.80, color: [0.82, 0.72, 0.55], interp: "constant" }
        - { position: 1.00, color: [0.94, 0.88, 0.72], interp: "linear" }
    displacement:
      mode: "scalar"
      texture:
        type: "voronoi"
        scale: 8.0
        output: "f1"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.008
      midlevel: 0.5
      bound: 0.014
      autobump: true
      autobump_strength: 1.5
      displacement_method: "bump_only"

  # Neve compatta: smooth voronoi smoothness 0.5 per superficie liscia ma
  # con leggere variazioni del manto.
  - id: "dis_neve_compatta"
    type: "disney"
    color: [0.96, 0.97, 0.99]
    roughness: 0.72
    specular: 0.32
    subsurface: 0.45
    subsurface_color: [0.96, 0.98, 1.00]
    flatness: 0.3
    texture:
