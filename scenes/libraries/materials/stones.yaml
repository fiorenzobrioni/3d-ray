# ============================================================================
# Libreria Materiali — Pietre e Minerali
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/stones.yaml" }]
#
# Raccolta completa di pietre naturali, rocce e materiali cementizi. Usa
# le texture procedurali "marble" (per venature) e "noise" (per grana
# irregolare) per simulare la struttura interna della pietra.
#
#   dis_  (Disney BSDF) — Per pietre protagoniste. Clearcoat simula
#         la lucidatura a specchio dei marmi lavorati. Subsurface dona
#         profondità alle pietre traslucenti (onice, alabastro).
#         Specular_tint colora i riflessi delle pietre scure.
#
#   cls_  (Classic) — Lambertian con texture marble/noise. Perfetto
#         per pavimenti, muri, sfondo. Zero rumore Disney. Per pietre
#         lucidate, usa metal+fuzz con texture.
#
# ── Finiture ─────────────────────────────────────────────────────────────
#
#   _lucido     Lucidatura a specchio. Clearcoat alto, roughness bassa.
#               Pavimenti di marmo, top cucina, sculture finite.
#
#   _levigato   Levigatura fine senza lucidatura. Superficie liscia
#               ma opaca, niente riflessi speculari.
#
#   _spacco     Faccia naturale di spacco. Roughness altissima,
#               superficie irregolare, nessuna lavorazione.
#
#   _bocciardato Martellatura a punte. Grana grossa uniforme,
#                roughness alta, aspetto architettonico.
#
# ── Parametri texture ────────────────────────────────────────────────────
#
#   Texture "marble":
#     scale          Frequenza venature: basso = ampie, alto = fitte.
#     noise_strength Intensità: basso = appena visibili, alto = drammatiche.
#     colors         [colore_base, colore_venatura].
#
#   Texture "noise":
#     scale          Frequenza grana: basso = macchie grandi, alto = fine.
#     noise_strength Intensità: basso = uniforme, alto = variato.
#     colors         [colore_chiaro, colore_scuro] della grana.
#
#   randomize_offset è sempre true per evitare pattern identici tra
#   più oggetti con lo stesso materiale.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   MARMI BIANCHI       Carrara, Calacatta, Statuario, Thassos.
#                       Le pietre più nobili, venature su fondo bianco.
#
#   MARMI SCURI         Nero Marquinia, Nero Belgio, Port Laurent.
#                       Fondi neri con venature chiare o dorate.
#
#   MARMI COLORATI      Verde Guatemala, Rosso Levanto, Rosa Portogallo,
#                       Blu Sodalite, Giallo Siena, Arabescato Orobico.
#
#   GRANITI             Grigio, rosa, nero assoluto, bianco cristallo.
#                       Grana puntinata (noise), molto duri.
#
#   TRAVERTINO          Pietra calcarea porosa, toni caldi crema/noce.
#                       Fori naturali, finiture levigata o spacco.
#
#   ARDESIA / SLATE     Pietra metamorfica a strati, toni grigio-blu.
#                       Superfici sfogliate, tegole, pavimenti.
#
#   ONICE               Calcite traslucente con bande colorate.
#                       Retroilluminabile, subsurface alto.
#
#   ALABASTRO           Gesso traslucente, bianco-miele.
#                       Sculture, lampade, subsurface marcato.
#
#   ARENARIA            Roccia sedimentaria, grana sabbiosa.
#                       Toni caldi, superficie ruvida naturale.
#
#   BASALTO E LAVA      Rocce ignee scure. Basalto compatto e liscio,
#                       lava porosa e irregolare.
#
#   CALCESTRUZZO        Cemento industriale, béton brut, microcemento.
#                       Texture noise fine, toni grigi neutri.
#
#   MATTONI E LATERIZI  Terracotta strutturale. Toni rossi e ocra,
#                       superfici rugose.
#
# ============================================================================


