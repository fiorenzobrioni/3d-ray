  # ═══════════════════════════════════════════════════════════════════════════
  #  MARMI STUDIO-QUALITY — VFX production-grade
  #
  #  Versione "ricca" dei marmi storici: 3 layer ridged invece di 2, warp e
  #  fold spinti, ramp multi-stop per gradienti realistici. Equivalente del
  #  look prodotto da Arnold marble2 / RenderMan PxrMarble / Cycles Marble in
  #  configurazione cinematic.
  #
  #  Linee guida di tuning:
  #   - vein_thickness 0.12-0.20: Carrara/Statuario (vene sottili). 0.22-0.30:
  #     Calacatta/Port Laurent (vene medie). 0.30-0.40: Arabescato (caos).
  #     0.40+: onice/alabastro (zone diffuse anziché vene).
  #   - vein_layers 3 + warp_iterations 3: massima organicità ma costa il
  #     doppio della Carrara base. Usare solo dove le vene sono protagoniste.
  #   - color_ramp con stop 0 = base, stop finale = vena (smoothstep all'80%
  #     del range, linear sull'ultimo segmento per scurire la punta).
  #   - Roughness 0.30-0.34 + clearcoat 0.0 = marmo levigato vivente.
  #     Roughness 0.08 + clearcoat 0.9 = marmo lucido a specchio.
  # ═══════════════════════════════════════════════════════════════════════════

  # ── CARRARA STUDIO — base bianca con vena scura sottile ────────────────
  # Sharpness 4 + colori scuro/chiaro stretti producono il look canonico
  # del Carrara moderno: superficie bianco-crema dominante con vene scure
  # filiformi che ricordano il marmo Bianco P di Apuane.

  - id: "dis_carrara_studio"
    type: "disney"
    # Carrara studio — versione più drammatica del Carrara base, vene quasi
    # nere su bianco crema. Color ramp esplicito per la gradazione.
    texture:
