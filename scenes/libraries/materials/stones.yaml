  # ── CALACATTA STUDIO — vena dorata cross-direzionale + ramp 4-stop ─────
  # Il Calacatta autentico ha venature dorate/grigie che corrono in due
  # direzioni. ramp 4-stop (vena → oro → cream → avorio)
  # produce il caratteristico look "Calacatta Gold" delle cave Apuane.

  - id: "dis_calacatta_studio"
    type: "disney"
    # Calacatta studio — la versione ricca del Calacatta. Ramp 4-stop dalla
    # vena scura attraverso l'oro fino al cream/avorio. Warp e fold spinti
    # producono la flow geologica caratteristica del Calacatta Gold.
    texture:
      type: "marble"
      scale: 2.0
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.1
      warp_iterations: 2
      fold_amplitude: [0.95, 0.35, 0.55]
      vein_layers: 3
      vein_scale:  [0.65, 1.5, 3.4]
      vein_weight: [1.0, 0.70, 0.40]
      vein_thickness: 0.22
      vein_softness: 0.09
      color_variation: 0.08
      cracks_density: 0.35
      cracks_scale: 3.5
      cracks_softness: 0.040
      cracks_weight: 0.70
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.97, 0.95, 0.90], interp: "linear"     }   # base avorio
        - { position: 0.30, color: [0.92, 0.85, 0.72], interp: "smoothstep" }   # cream
        - { position: 0.65, color: [0.85, 0.65, 0.30], interp: "smoothstep" }   # oro
        - { position: 1.00, color: [0.10, 0.08, 0.08], interp: "linear"     }   # vena scura
    roughness: 0.30
    specular: 0.50
    subsurface: 0.06

  - id: "dis_calacatta_studio_lucido"
    type: "disney"
    # Variante "lucido a vita" del Calacatta studio. La roughness_texture
    # in modalità mask sposta dinamicamente la roughness: 0.18 sulla base
    # avorio, 0.06 sulla vena oro/scura → l'oro riflette quasi a specchio
    # mentre la base resta levigata ma non specchio. È il salto da
    # "marmo dipinto" a "marmo lavorato" indistinguibile da quello reale.
    texture:
      type: "marble"
      scale: 2.0
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.1
      warp_iterations: 2
      fold_amplitude: [0.95, 0.35, 0.55]
      vein_layers: 3
