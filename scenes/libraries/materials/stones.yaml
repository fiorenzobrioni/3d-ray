# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — STONES
# ───────────────────────────────────────────────────────────────────────────
#  File:     stones.yaml
#  Disney:   65
#  Classic:  23      (lambertian: 23 · metal: 0 · dielectric: 0)
#  Total:    88
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: marmi bianchi, scuri, colorati e studio production-grade,
#             graniti, brecce, travertino, ardesia, onice, alabastro,
#             arenaria, basalto/lava/pomice, calcestruzzo, microcemento,
#             mattoni e laterizi, pietra spaccata.
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/stones.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: texture procedurale `marble` production-grade
#            (vein_layers 1-3, IQ warp, fold anisotropo, impurities,
#            color_ramp multi-stop), `noise` per grana cristallina di
#            graniti/arenarie/calcestruzzi, `voronoi` per brecce e
#            granito brecciato. Clearcoat per pietre lucidate. Subsurface
#            + spec_trans + transmission_color per onice e alabastro.
#   cls_*  — Versione Classic: type `lambertian` con texture. Disponibile
#            solo per le pietre opache (arenaria, ardesia, granito non
#            lucido, calcestruzzo, mattoni, basalto, pomice, microcemento,
#            travertino non lucido). I marmi e gli onici sono SOLO Disney
#            (servono clearcoat su texture marble production-grade per
#            il look lucido, subsurface + spec_trans per la traslucenza).
#
# ── Finiture (suffisso) ──────────────────────────────────────────────────
#   _lucido      Lucidatura a specchio. Clearcoat ≥ 0.7, roughness ≤ 0.14.
#   _levigato    Levigatura fine senza lucidatura. Niente clearcoat,
#                roughness 0.30–0.45.
#   _spacco      Faccia naturale di spacco, roughness ≥ 0.8.
#   _fiammato    Finitura termica antiscivolo, roughness alta, grana aperta.
#
# ── Categorie ────────────────────────────────────────────────────────────
#   MARMI BIANCHI       Carrara, Calacatta, Statuario, Thassos.
#   MARMI SCURI         Nero Marquinia, Nero Belgio, Port Laurent.
#   MARMI COLORATI      Verde Guatemala, Rosso Levanto, Rosa Portogallo,
#                       Blu Sodalite, Giallo Siena, Arabescato.
#   MARMI STUDIO        Versioni production-grade (3 layer, warp aggressivo,
#                       ramp multi-stop, cracks Worley).
#   GRANITI             Grigio, rosa baveno, nero assoluto, bianco cristallo,
#                       brecciati (voronoi cell).
#   BRECCE              Aurora, damascata (voronoi position output).
#   TRAVERTINO          Chiaro, noce, spacco, musgrave hybrid_multifractal.
#   ARDESIA             Grigia, nera, verde.
#   ONICE               Bianco, miele, verde, musgrave miele (SSS + Beer).
#   ALABASTRO           Bianco, miele (SSS alto + spec_trans).
#   ARENARIA            Dorata, rossa, grigia.
#   BASALTO / LAVA      Lucido, grezzo, pietra lavica, pomice.
#   CALCESTRUZZO        Grezzo, liscio, ocra, microcemento grigio/antracite.
#   MATTONI             Rosso, arancio, giallo, scuro clinker, sbiancato.
#   PIETRA SPACCATA     Vector displacement per faccette di rottura.


