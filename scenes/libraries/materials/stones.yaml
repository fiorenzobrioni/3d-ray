  # ════════════════════════════════════════════════════════════════════════
  #
  # Aggiunte successive che sfruttano feature non disponibili nel resto
  # della libreria:
  #   • Voronoi extended outputs (position, f3_minus_f1, cell) per pattern
  #     macchie complessi (breccia, granito brecciato).
  #   • Musgrave hybrid_multifractal per superfici stratificate sedimentarie
