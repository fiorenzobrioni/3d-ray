      vein_weight: [1.0, 0.70, 0.40]
      vein_thickness: 0.22
      vein_softness: 0.09
      color_variation: 0.08
      cracks_density: 0.35
      cracks_scale: 3.5
      cracks_softness: 0.040
      cracks_weight: 0.70
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.97, 0.95, 0.90], interp: "linear"     }
        - { position: 0.30, color: [0.92, 0.85, 0.72], interp: "smoothstep" }
        - { position: 0.65, color: [0.85, 0.65, 0.30], interp: "smoothstep" }
        - { position: 1.00, color: [0.10, 0.08, 0.08], interp: "linear"     }
    roughness: 0.22
    roughness_texture:
      type: "marble"
      output: "mask"
      scale: 2.0
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.1
      warp_iterations: 2
      fold_amplitude: [0.95, 0.35, 0.55]
      vein_layers: 3
      vein_scale:  [0.65, 1.5, 3.4]
      vein_weight: [1.0, 0.70, 0.40]
      vein_thickness: 0.22
      vein_softness: 0.09
      cracks_density: 0.35
      cracks_scale: 3.5
      cracks_softness: 0.040
      cracks_weight: 0.70
      randomize_offset: true
      color_ramp:
        - { position: 0.0, color: [0.22, 0.22, 0.22] }   # base: roughness 0.22
        - { position: 1.0, color: [0.12, 0.12, 0.12] }   # vena: roughness 0.12 (glossier, non specchio)
    clearcoat: 0.92
    coat_roughness: 0.05
    specular: 0.75
    subsurface: 0.06

