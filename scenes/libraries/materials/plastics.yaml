# ============================================================================
# Libreria Materiali — Plastiche e Polimeri
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/plastics.yaml" }]
#
# Raccolta completa di plastiche, gomme, siliconi e polimeri tecnici.
# Dalla plastica lucida da giocattolo alla gomma industriale.
#
#   dis_  (Disney BSDF) — Per oggetti protagonisti. Specular controlla
#         il riflesso Fresnel dielettrico (tipico delle plastiche lucide),
#         clearcoat simula una lacca protettiva, sheen dona il bagliore
#         radente delle gomme e dei siliconi. Richiede ≥128 spp.
#
#   cls_  (Classic) — Lambertian per plastiche opache (massima pulizia),
#         metal+fuzz per plastiche lucide (riflesso speculare semplice).
#         Ideale per superfici grandi e render veloci.
#
# ── Fisica delle plastiche ───────────────────────────────────────────────
#
#   Le plastiche sono dielettrici: riflesso Fresnel dal salto di IOR
#   (tipicamente 1.45–1.60) che produce un highlight bianco sulla
#   superficie, indipendente dal colore del materiale. Questo è il
#   parametro "specular" del Disney (default 0.5 ≈ IOR 1.5).
#
#   A differenza dei metalli, il colore della plastica viene dal bulk:
#   la luce penetra, rimbalza sui pigmenti e riemerge colorata. Per
#   questo il parametro "metallic" è sempre 0.0 nelle plastiche.
#
#   Roughness controlla la finitura: 0.0 = stampaggio a specchio,
#   0.5 = stampaggio standard, 0.9 = gomma/silicone.
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   ABS / STAMPAGGIO    Il polimero da iniezione più comune. Lucido,
#                       opaco o satinato. LEGO, elettrodomestici,
#                       cruscotti, cover telefoni.
#
#   POLICARBONATO       Trasparente e resistente agli urti. Visiere,
#                       occhiali, CD, fari auto. IOR 1.586.
#                       (varianti trasparenti in glasses.yaml)
#
#   ACRILICO / PMMA     Plexiglass opaco, colorato, stampato.
#                       Insegne, display, arredamento.
#                       (varianti trasparenti in glasses.yaml)
#
#   PVC                 Rigido o morbido. Tubi, infissi, cavi,
#                       pavimenti vinilici. Toni grigi/bianchi.
#
#   NYLON / PA          Ingranaggi, cerniere, tessuto tecnico.
#                       Leggermente ceroso, semi-traslucente.
#
#   PLA / STAMPA 3D     Filamento per FDM. Superficie con leggere
#                       rigature di layer. Colori vivaci.
#
#   TEFLON / PTFE       Bianco, ceroso, bassissimo attrito.
#                       Superfici ultra-lisce, anti-aderente.
#
#   POLIETILENE / PE    HD-PE e LD-PE. Bottiglie, contenitori,
#                       sacchetti. Ceroso, semi-traslucente.
#
#   POLIPROPILENE / PP  Cerniere viventi, contenitori alimentari.
#                       Simile al PE ma più rigido.
#
#   BACHELITE           Prima plastica sintetica (1907). Scura,
#                       termoindurente, lucida. Interruttori,
#                       telefoni vintage, manici.
#
#   GOMMA NATURALE      Elastomero, alta roughness, sheen al
#                       radente. Pneumatici, guarnizioni.
#
#   GOMMA SILICONICA    Morbida, traslucente, medicale/alimentare.
#                       Subsurface per la traslucenza.
#
#   GOMMAPIUMA / EVA    Schiuma morbida, opacissima. Tappetini,
#                       ciabatte, imballaggio.
#
#   VINILE / ECOPELLE   Finta pelle, sedili, borse. Sheen per
#                       l'effetto lucido/grinzoso superficiale.
#
# ============================================================================


