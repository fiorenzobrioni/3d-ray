# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Material Library — PLASTICS
# ───────────────────────────────────────────────────────────────────────────
#  File:     plastics.yaml
#  Disney:   66
#  Classic:  39      (lambertian: 39 · metal: 0 · dielectric: 0)
#  Total:    105
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: ABS, policarbonato, acrilico/PMMA, PVC, nylon, PLA stampa 3D,
#             teflon/PTFE, polietilene, polipropilene, bachelite,
#             gomma naturale, silicone, EVA, vinile/ecopelle, plastiche
#             speciali (olografica, smerigliata, UV-degradata).
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/materials/plastics.yaml" }]
#
# Convenzione:
#   dis_*  — Disney BSDF: specular Fresnel dielettrico (default ≈ IOR 1.5),
#            clearcoat dual-path (coat_roughness + coat_ior 1.5) per lacche
#            e plastiche lucide, subsurface + subsurface_color per siliconi
#            traslucenti, thin_film per olografiche, spec_trans Beer-Lambert
#            per LDPE/PP traslucenti e smerigliate, sheen Charlie soft-touch.
#   cls_*  — Solo `lambertian` (color base). Le plastiche sono dielettriche
#            opache: il loro lobo dominante è diffuso, il Fresnel speculare
#            è perso ma il colore è preservato. Approssimazione per scene
#            di sfondo o render rapidi. Plastiche lucide ABS/policarbonato
#            con clearcoat irrinunciabile, siliconi con subsurface, vinili
#            iridescenti, smerigliate e olografiche → SOLO Disney.
#
# ── Fisica delle plastiche ──
#   Dielettrici opachi: IOR 1.45-1.60. metallic=0 sempre. Il colore viene
#   dal pigmento nel bulk (scattering interno), il riflesso bianco è solo
#   Fresnel superficiale. roughness: 0.0=stampaggio a specchio, 0.5=standard,
#   0.9=gomma/silicone.
#
# ── Categorie ──
#   ABS              Polimero iniezione, LEGO, elettrodomestici, cover.
#   POLICARBONATO    Resistente, opaco/satinato (trasparente in glasses).
#   ACRILICO/PMMA    Plexiglass colorato (trasparente in glasses).
#   PVC              Rigido (tubi, infissi) e morbido (cavi, pavimenti).
#   NYLON/PA         Ingranaggi, SLS stampa, semi-ceroso.
#   PLA              Filamento stampa 3D FDM con layer lines.
#   TEFLON/PTFE      Bianco ceroso, antiaderente.
#   POLIETILENE      HDPE/LDPE, bottiglie, contenitori, semi-traslucenti.
#   POLIPROPILENE    PP, contenitori alimentari, sedie da giardino.
#   BACHELITE        Termoindurente vintage (telefoni, manopole).
#   GOMMA NATURALE   Pneumatici, guarnizioni, alta roughness.
#   SILICONE         Morbido, traslucente (subsurface). Solo Disney.
#   EVA/GOMMAPIUMA   Schiuma opacissima (tappetini, suole).
#   VINILE/ECOPELLE  Sedili, borse, soft-touch, olografico.
#   SPECIALI         Olografica thin_film, smerigliata spec_trans.


