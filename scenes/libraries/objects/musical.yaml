  # Rame invecchiato — tromba grammofono
  - id: "mus_rame_vintage"
    type: "disney"
    color: [0.65, 0.42, 0.25]
    metallic: 0.90
    roughness: 0.35
    specular: 0.48


# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  CAMPANA — Campana in bronzo con batacchio
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.30 × 0.30 m
  #  Struttura:  Corpo: CSG (sfera cava tagliata → profilo a campana,
  #              poi unione con cilindro per la corona), batacchio
  #              (cilindro + sfera). Anello di sospensione in cima.
  #
  - name: "campana"
    material: "mus_bronzo"
    children:

      # Corpo della campana: sfera cava tagliata a profilo
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "subtraction"
          left:
            # Esterno: sfera schiacciata in alto
            type: "sphere"
            center: [0, 0.16, 0]
            radius: 0.15
            scale: [1.0, 1.10, 1.0]
          right:
            # Interno
            type: "sphere"
            center: [0, 0.16, 0]
            radius: 0.14
            scale: [1.0, 1.10, 1.0]
        right:
          # Box di taglio: solo la metà inferiore + corona
          type: "box"
          scale: [0.35, 0.25, 0.35]
          translate: [0, 0.12, 0]

      # Labbro inferiore (bordo spesso)
      - type: "torus"
        center: [0, 0.04, 0]
        major_radius: 0.145
        minor_radius: 0.012

      # Corona superiore (cilindro)
      - type: "cylinder"
        center: [0, 0.26, 0]
        radius: 0.035
        height: 0.025

      - type: "torus"
        center: [0, 0.285, 0]
        major_radius: 0.033
        minor_radius: 0.006

      # Anello di sospensione
      - type: "torus"
        center: [0, 0.30, 0]
        major_radius: 0.018
        minor_radius: 0.005

      # ── Batacchio ──────────────────────────────────────────────────────
      # Gancio (cilindro corto orizzontale dentro la corona)
      - type: "cylinder"
        center: [0, 0.25, 0]
        radius: 0.003
        height: 0.016
        rotate: [0, 0, 90]

      # Asta
      - type: "cylinder"
        center: [0, 0.12, 0]
        radius: 0.004
        height: 0.13

      # Massa (sfera)
      - type: "sphere"
        center: [0, 0.08, 0]
        radius: 0.018


  # ═══════════════════════════════════════════════════════════════════════
  #  TAMBURO_RULLANTE — Rullante con fusto, pelli e tiranti
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.36 × 0.18 m
  #  Struttura:  Fusto cilindrico cavo (CSG), pelle battente (disco)
  #              e pelle risonante (disco), 2 cerchi (torus), 8
  #              tiranti (cilindri verticali), chiavette (sfere).
  #
  - name: "tamburo_rullante"
    material: "mus_acero"
    children:

      # Fusto cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.178
          height: 0.15
        right:
          type: "cylinder"
          center: [0, -0.005, 0]
          radius: 0.174
          height: 0.16

      # Pelle battente (superiore)
      - type: "disk"
        center: [0, 0.15, 0]
        normal: [0, 1, 0]
        radius: 0.176
        material: "mus_pelle"

      # Pelle risonante (inferiore)
      - type: "disk"
        center: [0, 0.0, 0]
        normal: [0, -1, 0]
        radius: 0.176
        material: "mus_pelle"

      # Cerchio superiore
      - type: "torus"
        center: [0, 0.152, 0]
        major_radius: 0.178
        minor_radius: 0.006
        material: "mus_cromo"

      # Cerchio inferiore
      - type: "torus"
        center: [0, -0.002, 0]
        major_radius: 0.178
        minor_radius: 0.006
        material: "mus_cromo"

      # 8 tiranti a 45° + chiavette
      - type: "cylinder"
        center: [0.182, 0.0, 0]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0.182, 0.075, 0]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [0.1287, 0.0, 0.1287]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0.1287, 0.075, 0.1287]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [0, 0.0, 0.182]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0, 0.075, 0.182]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [-0.1287, 0.0, 0.1287]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [-0.1287, 0.075, 0.1287]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [-0.182, 0.0, 0]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [-0.182, 0.075, 0]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [-0.1287, 0.0, -0.1287]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [-0.1287, 0.075, -0.1287]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [0, 0.0, -0.182]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0, 0.075, -0.182]
        radius: 0.008
        material: "mus_cromo"

      - type: "cylinder"
        center: [0.1287, 0.0, -0.1287]
        radius: 0.003
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0.1287, 0.075, -0.1287]
        radius: 0.008
        material: "mus_cromo"

      # Sfiatatoio (foro suggerito con torus piccolo)
      - type: "torus"
        center: [0.178, 0.08, 0]
        major_radius: 0.008
        minor_radius: 0.002
        rotate: [0, 0, 90]
        material: "mus_cromo"


  # ═══════════════════════════════════════════════════════════════════════
  #  TIMPANO — Timpano orchestrale
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.65 × 0.50 m
  #  Struttura:  Caldaia emisferica in rame (CSG sfera cava ∩ cilindro),
  #              pelle, cerchio, pedale (semplificato).
  #
  - name: "timpano"
    material: "mus_rame_vintage"
    children:

      # Caldaia emisferica cava
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "subtraction"
          left:
            type: "sphere"
            center: [0, 0.32, 0]
            radius: 0.32
          right:
            type: "sphere"
            center: [0, 0.32, 0]
            radius: 0.31
        right:
          # Solo la metà inferiore + orlo
          type: "cylinder"
          center: [0, 0.10, 0]
          radius: 0.34
          height: 0.30

      # Pelle
      - type: "disk"
        center: [0, 0.40, 0]
        normal: [0, 1, 0]
        radius: 0.31
        material: "mus_pelle"

      # Cerchio di tensione
      - type: "torus"
        center: [0, 0.40, 0]
        major_radius: 0.32
        minor_radius: 0.010
        material: "mus_cromo"

      # 3 gambe
      - type: "cylinder"
        center: [0.28, 0, 0]
        radius: 0.012
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [0.28, 0, 0]
        radius: 0.015
        scale: [1.2, 0.4, 1.2]
        material: "mus_gomma"

      - type: "cylinder"
        center: [-0.14, 0, 0.2425]
        radius: 0.012
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [-0.14, 0, 0.2425]
        radius: 0.015
        scale: [1.2, 0.4, 1.2]
        material: "mus_gomma"

      - type: "cylinder"
        center: [-0.14, 0, -0.2425]
        radius: 0.012
        height: 0.15
        material: "mus_cromo"
      - type: "sphere"
        center: [-0.14, 0, -0.2425]
        radius: 0.015
        scale: [1.2, 0.4, 1.2]
        material: "mus_gomma"

      # Pedale (semplificato)
      - type: "box"
        scale: [0.06, 0.005, 0.15]
        translate: [0, 0.003, -0.26]
        material: "mus_cromo"


  # ═══════════════════════════════════════════════════════════════════════
  #  DIAPASON — Diapason in acciaio
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.025 × 0.12 m
  #
  - name: "diapason"
    material: "mus_acciaio"
    children:

      # Manico
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.004
        height: 0.045

      # Nodo (sferico alla biforcazione)
      - type: "sphere"
        center: [0, 0.048, 0]
        radius: 0.006

      # Rebbio sinistro
      - type: "capsule"
        center: [-0.008, 0.048, 0]
        radius: 0.003
        height: 0.065

      # Rebbio destro
      - type: "capsule"
        center: [0.008, 0.048, 0]
        radius: 0.003
        height: 0.065

      # Base piatta (per appoggio)
      - type: "sphere"
        center: [0, 0, 0]
        radius: 0.006
        scale: [1.2, 0.4, 1.2]


  # ═══════════════════════════════════════════════════════════════════════
  #  METRONOMO — Metronomo meccanico a piramide
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.12 × 0.22 × 0.11 m
  #  Struttura:  Corpo a tronco di piramide (CSG: box ∩ 2 box
  #              inclinati), pannello frontale, scala (disco),
  #              pendolo (cilindro + peso mobile), molla.
  #
  - name: "metronomo"
    material: "mus_mogano"
    children:

      # Corpo piramidale tronco (approssimato con box rastremato via CSG)
      - type: "csg"
        operation: "intersection"
        left:
          type: "box"
          scale: [0.12, 0.22, 0.11]
          translate: [0, 0.11, 0]
        right:
          type: "csg"
          operation: "intersection"
          left:
            # Falda frontale
            type: "box"
            scale: [0.20, 0.30, 0.20]
            translate: [0, 0.14, -0.04]
            rotate: [-8, 0, 0]
          right:
            type: "csg"
            operation: "intersection"
            left:
              # Falda posteriore
              type: "box"
              scale: [0.20, 0.30, 0.20]
              translate: [0, 0.14, 0.04]
              rotate: [8, 0, 0]
            right:
              type: "csg"
              operation: "intersection"
              left:
                # Falda sinistra
                type: "box"
                scale: [0.20, 0.30, 0.20]
                translate: [-0.04, 0.14, 0]
                rotate: [0, 0, 8]
              right:
                # Falda destra
                type: "box"
                scale: [0.20, 0.30, 0.20]
                translate: [0.04, 0.14, 0]
                rotate: [0, 0, -8]

      # Pannello frontale (leggermente rientrato)
      - type: "box"
        scale: [0.08, 0.14, 0.003]
        translate: [0, 0.10, -0.048]
        material: "mus_avorio"

      # Scala graduata (cilindro piatto inciso)
      - type: "disk"
        center: [0, 0.16, -0.046]
        normal: [0, 0, -1]
        radius: 0.025
        material: "mus_avorio"

      # Pendolo (asta sottile)
      - type: "cylinder"
        center: [0, 0.06, -0.046]
        radius: 0.002
        height: 0.14
        material: "mus_acciaio"

      # Peso mobile sul pendolo (box piccolo)
      - type: "box"
        scale: [0.015, 0.012, 0.008]
        translate: [0, 0.14, -0.046]
        material: "mus_ottone"

      # Fulcro (sfera)
      - type: "sphere"
        center: [0, 0.06, -0.046]
        radius: 0.004
        material: "mus_ottone"

      # Piedini
      - type: "sphere"
        center: [-0.04, 0, -0.035]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
        material: "mus_gomma"
      - type: "sphere"
        center: [0.04, 0, -0.035]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
        material: "mus_gomma"
      - type: "sphere"
        center: [-0.04, 0, 0.035]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
        material: "mus_gomma"
      - type: "sphere"
        center: [0.04, 0, 0.035]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
        material: "mus_gomma"


  # ═══════════════════════════════════════════════════════════════════════
  #  GONG — Gong su telaio
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.60 × 0.80 m (con telaio)
  #  Struttura:  Disco leggermente convesso (CSG sfera ∩ cilindro),
  #              boss centrale (sfera), bordo ripiegato (torus),
  #              telaio a portale con traversa e ganci.
  #
  - name: "gong"
    material: "mus_ottone_spaz"
    children:

      # ── Disco del gong ─────────────────────────────────────────────────
      # Leggermente convesso (fetta di sfera)
      - type: "csg"
        operation: "intersection"
        left:
          type: "sphere"
          center: [0, 0.50, 1.20]
          radius: 1.22
        right:
          type: "cylinder"
          center: [0, 0.50, -0.002]
          radius: 0.28
          height: 0.020
          rotate: [90, 0, 0]

      # Boss centrale (cupola)
      - type: "sphere"
        center: [0, 0.50, -0.008]
        radius: 0.05
        scale: [1.0, 1.0, 0.40]

      # Bordo ripiegato
      - type: "torus"
        center: [0, 0.50, 0]
