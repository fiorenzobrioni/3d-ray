        radius: 0.008
        material: "mus_nickel"

      # ── Pompa di intonazione (semicerchio tubo) ────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "torus"
          center: [0, -0.02, 0.14]
          major_radius: 0.030
          minor_radius: 0.005
          rotate: [0, 90, 0]
        right:
          type: "box"
          scale: [0.08, 0.04, 0.08]
          translate: [0, -0.04, 0.14]

      # ── Bocchino ───────────────────────────────────────────────────────
      - type: "cone"
        center: [0, 0, 0.20]
        radius: 0.005
        top_radius: 0.012
        height: 0.03
        rotate: [90, 0, 0]

      # Bordo bocchino (torus)
      - type: "torus"
        center: [0, 0, 0.23]
        major_radius: 0.011
        minor_radius: 0.003
        rotate: [90, 0, 0]
        material: "mus_nickel"


  # ═══════════════════════════════════════════════════════════════════════
  #  GRAMMOFONO — Grammofono vintage con tromba
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.40 × 0.35 × 0.40 m
  #  Struttura:  Base in legno (box), piatto giradischi (cilindro),
  #              braccio (cilindri + sfere snodo), tromba conica
  #              cava (CSG), manovella.
  #
  - name: "grammofono"
    material: "mus_mogano"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.30, 0.06, 0.30]
        translate: [0, 0.03, 0]

      # Bordo decorativo
      - type: "torus"
        center: [0, 0.06, 0]
        major_radius: 0.14
        minor_radius: 0.006
        scale: [1.07, 1.0, 1.07]

      # ── Piatto giradischi ──────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.06, 0]
        radius: 0.12
        height: 0.008
        material: "mus_feltro"

      # Asse centrale
      - type: "cylinder"
        center: [0, 0.06, 0]
        radius: 0.004
        height: 0.015
        material: "mus_ottone"

      # ── Braccio fonografico ────────────────────────────────────────────
      # Base braccio
      - type: "cylinder"
        center: [0.10, 0.068, 0.10]
        radius: 0.008
        height: 0.020
        material: "mus_ottone"

      # Snodo sferico
      - type: "sphere"
        center: [0.10, 0.092, 0.10]
        radius: 0.010
        material: "mus_ottone"

      # Braccio orizzontale
      - type: "cylinder"
        center: [0.05, 0.10, 0.05]
        radius: 0.004
        height: 0.14
        rotate: [35, 45, 0]
        material: "mus_ottone"

      # Puntina (cono)
      - type: "cone"
        center: [0.02, 0.08, 0.02]
        radius: 0.003
        top_radius: 0.0
        height: 0.015
        material: "mus_acciaio"

      # ── Tromba conica cava (CSG) ───────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        material: "mus_rame_vintage"
        left:
          type: "cone"
          center: [-0.02, 0.10, -0.02]
          radius: 0.005
          top_radius: 0.16
          height: 0.26
          rotate: [-30, 20, 0]
        right:
          type: "cone"
          center: [-0.02, 0.10, -0.02]
          radius: 0.004
          top_radius: 0.155
          height: 0.27
          rotate: [-30, 20, 0]

      # Bordo tromba
      - type: "torus"
        center: [-0.11, 0.32, -0.09]
        major_radius: 0.155
        minor_radius: 0.008
        rotate: [-30, 20, 0]
        material: "mus_rame_vintage"

      # ── Manovella laterale ─────────────────────────────────────────────
      - type: "cylinder"
        center: [0.155, 0.03, 0]
        radius: 0.004
        height: 0.030
        rotate: [0, 0, 90]
        material: "mus_ottone"

      - type: "cylinder"
        center: [0.185, 0.03, 0]
        radius: 0.004
        height: 0.030
        material: "mus_ottone"

      - type: "sphere"
        center: [0.185, 0.06, 0]
        radius: 0.008
        material: "mus_ebano"


  # ═══════════════════════════════════════════════════════════════════════
  #  MARACAS — Coppia di maracas
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.07 × 0.25 m cadauna
  #  Struttura:  Corpo sferico (sfera), manico cilindrico, cappello
  #              decorativo (torus), puntale. Due maracas affiancate.
  #
  - name: "maracas"
    material: "mus_mogano"
    children:

      # ── Maraca sinistra ────────────────────────────────────────────────
      # Corpo sferico
      - type: "sphere"
        center: [-0.05, 0.20, 0]
        radius: 0.035
        material: "mus_lacca_rossa"

      # Manico
      - type: "cylinder"
        center: [-0.05, 0.04, 0]
        radius: 0.008
        height: 0.14

      # Cappello (torus alla base del corpo)
      - type: "torus"
        center: [-0.05, 0.165, 0]
        major_radius: 0.018
        minor_radius: 0.004

      # Puntale inferiore
      - type: "sphere"
        center: [-0.05, 0.0, 0]
        radius: 0.010
        scale: [1.0, 0.60, 1.0]

      # ── Maraca destra ──────────────────────────────────────────────────
      - type: "sphere"
        center: [0.05, 0.20, 0]
        radius: 0.035
        material: "mus_lacca_rossa"

      - type: "cylinder"
        center: [0.05, 0.04, 0]
        radius: 0.008
        height: 0.14

      - type: "torus"
        center: [0.05, 0.165, 0]
        major_radius: 0.018
        minor_radius: 0.004

      - type: "sphere"
        center: [0.05, 0.0, 0]
        radius: 0.010
        scale: [1.0, 0.60, 1.0]


  # ═══════════════════════════════════════════════════════════════════════
  #  TRIANGOLO — Triangolo in acciaio con battente
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.18 × 0.20 m
  #  Struttura:  Triangolo equilatero (3 cilindri uniti con sfere ai
  #              vertici, angolo aperto in basso), clip di sospensione,
  #              battente (cilindro sottile con sfera).
  #
  - name: "triangolo"
    material: "mus_acciaio"
    children:

      # Lato superiore (orizzontale)
      - type: "cylinder"
        center: [0, 0.18, 0]
        radius: 0.004
        height: 0.16
        rotate: [0, 0, 90]

      # Lato sinistro (diagonale)
      - type: "cylinder"
        center: [-0.04, 0.09, 0]
        radius: 0.004
        height: 0.20
        rotate: [0, 0, 30]

      # Lato destro (diagonale, aperto in basso)
      - type: "cylinder"
        center: [0.04, 0.09, 0]
        radius: 0.004
        height: 0.18
        rotate: [0, 0, -30]

      # Vertice superiore sinistro
      - type: "sphere"
        center: [-0.08, 0.18, 0]
        radius: 0.006

      # Vertice superiore destro
      - type: "sphere"
        center: [0.08, 0.18, 0]
        radius: 0.006

      # Clip di sospensione (anello)
      - type: "torus"
        center: [0, 0.20, 0]
        major_radius: 0.008
        minor_radius: 0.002

      # ── Battente ───────────────────────────────────────────────────────
      # Asta
      - type: "cylinder"
        center: [0.12, 0.12, 0]
        radius: 0.003
        height: 0.12

      # Impugnatura (sfera)
      - type: "sphere"
        center: [0.12, 0.18, 0]
        radius: 0.008
        material: "mus_gomma"

      # Punta di battuta
      - type: "sphere"
        center: [0.12, 0.06, 0]
        radius: 0.005
