# ============================================================================
# Libreria Oggetti — Strumenti Musicali (Musical Instruments)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/musical.yaml" }]
#
# Strumenti a percussione, a corda, a fiato e accessori musicali.
# Le forme organiche degli strumenti sono approssimate con CSG e
# sfere scalate; le superfici laccate usano Disney clearcoat.
#
# ── Convenzioni ──────────────────────────────────────────────────────────
#
#   ORIGINE       Base/appoggio a Y=0, centrato in XZ.
#   SCALA         Unità = metri. Un violino è ~0.60 m lungo,
#                 un tamburo ~0.35 m di diametro.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   CAMPANA                 Campana in bronzo con batacchio.
#                           ~Ø 0.30 × 0.30 m.
#
#   TAMBURO_RULLANTE        Rullante con fusto, pelli, cerchi e tiranti.
#                           ~Ø 0.36 × 0.18 m.
#
#   TIMPANO                 Timpano orchestrale (caldaia emisferica
#                           + pelle + cerchio). ~Ø 0.65 × 0.50 m.
#
#   DIAPASON                Diapason in acciaio con 2 rebbi e manico.
#                           ~0.025 × 0.12 m.
#
#   METRONOMO               Metronomo meccanico a piramide con
#                           pendolo e scala. ~0.12 × 0.22 × 0.11 m.
#
#   GONG                    Gong su telaio con battente, boss
#                           centrale. ~Ø 0.60 × 0.80 m.
#
#   PIATTO_BATTERIA         Piatto su asta con inclinazione,
#                           dado e feltri. ~Ø 0.40 × 0.90 m.
#
#   XILOFONO                Xilofono a 8 lame su telaio con
#                           risuonatori tubolari. ~0.60 × 0.20 × 0.12 m.
#
#   VIOLINO                 Violino semplificato con cassa, manico,
#                           riccio, ponte, cordiera e 4 corde.
#                           ~0.14 × 0.06 × 0.60 m.
#
#   CHITARRA_ACUSTICA       Chitarra acustica con cassa bombata, buca,
#                           rosetta, manico, paletta e 6 corde.
#                           ~0.38 × 0.10 × 1.00 m.
#
#   TROMBA                  Tromba semplificata con campana, canneggio,
#                           3 pistoni e bocchino. ~0.14 × 0.14 × 0.50 m.
#
#   GRAMMOFONO              Grammofono vintage con base, piatto,
#                           braccio e tromba conica.
#                           ~0.40 × 0.35 × 0.40 m.
#
#   MARACAS                 Coppia di maracas con corpo sferico e
#                           manico. ~Ø 0.07 × 0.25 m cad.
#
#   TRIANGOLO               Triangolo in acciaio con battente e
#                           clip di sospensione. ~0.18 × 0.20 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Metalli ────────────────────────────────────────────────────────────

  # Bronzo da campana — lega Cu-Sn ad alta risonanza
  - id: "mus_bronzo"
    type: "disney"
    color: [0.72, 0.48, 0.20]
    metallic: 1.0
    roughness: 0.28
    specular: 0.55

  # Ottone lucido — fiati, hardware
  - id: "mus_ottone"
    type: "disney"
    color: [0.90, 0.72, 0.24]
    metallic: 1.0
    roughness: 0.08
    specular: 0.80

  # Ottone spazzolato — piatti, gong
  - id: "mus_ottone_spaz"
    type: "disney"
    color: [0.85, 0.68, 0.20]
    metallic: 1.0
    roughness: 0.32
    specular: 0.55

  # Acciaio lucido — diapason, triangolo, corde
  - id: "mus_acciaio"
    type: "disney"
    color: [0.58, 0.57, 0.55]
    metallic: 1.0
    roughness: 0.08
    specular: 0.82

  # Cromo — aste, hardware batteria
  - id: "mus_cromo"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    metallic: 1.0
    roughness: 0.04
    specular: 0.92

  # Nickel argentato — meccaniche chitarra
  - id: "mus_nickel"
    type: "disney"
    color: [0.78, 0.76, 0.72]
    metallic: 1.0
    roughness: 0.15
    specular: 0.70

  # ── Legni strumenti ────────────────────────────────────────────────────

  # Abete — tavola armonica violino, chitarra
  - id: "mus_abete"
    type: "disney"
    color: [0.82, 0.72, 0.52]
    roughness: 0.30
    metallic: 0.0
    specular: 0.42
    clearcoat: 0.50
    coat_roughness: 0.20

  # Acero — fondo e fasce violino, manico chitarra
  - id: "mus_acero"
    type: "disney"
    color: [0.75, 0.60, 0.38]
    roughness: 0.25
    metallic: 0.0
    specular: 0.48
    clearcoat: 0.55
    coat_roughness: 0.15

  # Ebano — tastiere, piroli, mentoniera
  - id: "mus_ebano"
    type: "disney"
    color: [0.04, 0.03, 0.03]
    roughness: 0.18
    metallic: 0.0
    specular: 0.55
    clearcoat: 0.45
    coat_roughness: 0.12

  # Mogano — corpo chitarra, base metronomo
  - id: "mus_mogano"
    type: "disney"
    color: [0.38, 0.16, 0.08]
    roughness: 0.25
    metallic: 0.0
    specular: 0.50
    clearcoat: 0.45
    coat_roughness: 0.18

  # Palissandro — tastiere, ponti chitarra
  - id: "mus_palissandro"
    type: "disney"
    color: [0.28, 0.14, 0.10]
    roughness: 0.28
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.35
    coat_roughness: 0.25

  # Vernice laccata rossa — violino, finiture
  - id: "mus_lacca_rossa"
    type: "disney"
    color: [0.55, 0.12, 0.06]
    roughness: 0.10
    metallic: 0.0
    specular: 0.60
    clearcoat: 0.70
    coat_roughness: 0.08

  # Vernice burst (sunburst chitarra) — arancio scuro
  - id: "mus_sunburst"
    type: "disney"
    color: [0.62, 0.32, 0.08]
    roughness: 0.12
    metallic: 0.0
    specular: 0.55
    clearcoat: 0.65
    coat_roughness: 0.10

  # ── Pelle e feltro ─────────────────────────────────────────────────────

  # Pelle tamburo — membrana tesa
  - id: "mus_pelle"
    type: "disney"
    color: [0.88, 0.82, 0.72]
    roughness: 0.65
    metallic: 0.0
    specular: 0.20
    sheen: 0.10

  # Feltro — smorzatori, cuscinetti
  - id: "mus_feltro"
    type: "disney"
    color: [0.20, 0.20, 0.22]
    roughness: 0.95
    metallic: 0.0
    sheen: 0.20

  # ── Vari ───────────────────────────────────────────────────────────────

  # Gomma — piedini, puntali
  - id: "mus_gomma"
    type: "disney"
    color: [0.03, 0.03, 0.03]
    roughness: 0.90
    metallic: 0.0
