    metallic: 1.0
    roughness: 0.03
    specular: 0.95

  # Ottone — boccole, raccordi, manometri
  - id: "mec_ottone"
    type: "disney"
    color: [0.85, 0.68, 0.20]
    metallic: 1.0
    roughness: 0.20
    specular: 0.65

  # Bronzo per cuscinetti — lega Cu-Sn antifrizione
  - id: "mec_bronzo_cusc"
    type: "disney"
    color: [0.70, 0.48, 0.22]
    metallic: 1.0
