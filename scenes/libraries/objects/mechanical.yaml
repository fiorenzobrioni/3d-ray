  # Acciaio satinato — bulloni, dadi, gambi
  - id: "mec_acciaio_sat"
    type: "disney"
    color: [0.54, 0.53, 0.51]
    metallic: 1.0
    roughness: 0.30
    specular: 0.60

  # Acciaio brunito / ossido nero — viti brugola
  - id: "mec_ossido_nero"
    type: "disney"
    color: [0.08, 0.08, 0.10]
    metallic: 0.92
    roughness: 0.28
    specular: 0.55

  # Ghisa — corpi valvola, carter, supporti
  - id: "mec_ghisa"
