    specular: 0.50

  # Alluminio anodizzato — coperchi, pulegge, corpi leggeri
  - id: "mec_alluminio"
    type: "disney"
    color: [0.88, 0.88, 0.90]
    metallic: 1.0
    roughness: 0.18
    specular: 0.72

  # Gomma nera — guarnizioni, o-ring, paraoli
  - id: "mec_gomma"
    type: "disney"
    color: [0.04, 0.04, 0.04]
    roughness: 0.90
    metallic: 0.0
    specular: 0.15

  # Rosso segnaletico — volantini, leve, sicurezze
  - id: "mec_rosso"
    type: "disney"
