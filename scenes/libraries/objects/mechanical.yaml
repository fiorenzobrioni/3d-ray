# ============================================================================
# Libreria Oggetti — Meccanica e Industria (Mechanical)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/mechanical.yaml" }]
#
# Componenti meccanici, organi di trasmissione, viteria e strumentazione
# industriale. Uso intensivo di CSG per fori, smussi, scanalature e
# profili esagonali.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Prefisso ID:  mec_   (mechanical)
#
#   Metalli calibrati su riflettanze reali: acciaio, ghisa, ottone,
#   cromo, alluminio, bronzo, gomma, ossido nero.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Asse di simmetria su Y, base/centro a Y=0.
#   SCALA         Unità = metri. Un bullone M10 ha raggio gambo 0.005,
#                 un ingranaggio ~Ø 0.12. Scalare le istanze per
#                 adattare alla scena.
#   ASSE          Tutti i pezzi rotanti usano Y come asse di rotazione.
#                 Per montaggio orizzontale, ruotare l'istanza di 90°.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   INGRANAGGIO             Ruota dentata a 8 denti con mozzo, foro
#                           e smusso. ~Ø 0.12 × 0.025 m.
#
#   DADO_ESAGONALE          Dado M10 con profilo esagonale (CSG 3
#                           box intersecati) e foro filettato.
#                           ~Ø 0.019 × 0.008 m.
#
#   BULLONE                 Bullone a testa esagonale con gambo liscio
#                           e punta conica. ~Ø 0.019 × 0.045 m.
#
#   VITE_BRUGOLA            Vite a testa cilindrica con incavo
#                           esagonale (CSG). ~Ø 0.016 × 0.035 m.
#
#   CUSCINETTO              Cuscinetto a sfere con anello esterno,
#                           interno e 8 sfere. ~Ø 0.06 × 0.016 m.
#
#   PISTONE                 Pistone con corona, gonna, spinotto e
#                           3 sedi per fasce elastiche (CSG).
#                           ~Ø 0.08 × 0.07 m.
#
#   VALVOLA                 Valvola a saracinesca con corpo, flange,
#                           bonnet, stelo e volantino. ~0.18 × 0.30 m.
#
#   FLANGIA                 Flangia cieca con 6 fori passanti disposti
#                           sul cerchio delle viti (CSG).
#                           ~Ø 0.16 × 0.022 m.
#
#   PULEGGIA                Puleggia a gola trapezoidale con mozzo,
#                           foro e chiavetta (CSG). ~Ø 0.12 × 0.030 m.
#
#   MOLLA                   Molla elicoidale a compressione approssimata
#                           con 6 torus sfalsati. ~Ø 0.04 × 0.10 m.
#
#   BIELLA                  Biella con testa grande, fusto a sezione
#                           I e occhio piccolo. ~0.02 × 0.16 m.
#
#   MANOMETRO               Manometro industriale con cassa, vetro,
#                           quadrante, lancetta e attacco filettato.
#                           ~Ø 0.10 × 0.08 m.
#
#   CILINDRO_IDRAULICO      Cilindro a doppio effetto con camicia,
#                           stelo cromato, testata e attacco a
#                           forcella. ~Ø 0.06 × 0.32 m.
#
#   GIUNTO_FLANGIATO        Giunto rigido a flange con 4 bulloni
#                           e foro passante. ~Ø 0.10 × 0.06 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI — Metalli e gomme industriali
# ═══════════════════════════════════════════════════════════════════════════

materials:

