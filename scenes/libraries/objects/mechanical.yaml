    color: [0.95, 0.95, 0.93]

  # Nero opaco — lancette, indicazioni
  - id: "mec_nero_opaco"
    type: "lambertian"
    color: [0.03, 0.03, 0.03]

  # Giallo sicurezza — segnaletica industriale
  - id: "mec_giallo"
    type: "disney"
