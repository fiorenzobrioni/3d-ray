  # ── Metallo architettonico ─────────────────────────────────────────────

  # Bronzo scuro — decorazioni, grate
  - id: "arc_bronzo"
    type: "disney"
    color: [0.35, 0.25, 0.14]
    metallic: 0.85
    roughness: 0.45
    specular: 0.40

  # Ferro battuto — cancelli, ringhiere
  - id: "arc_ferro"
    type: "disney"
    color: [0.10, 0.10, 0.10]
    metallic: 0.85
    roughness: 0.60
    specular: 0.35

  # Rame ossidato — cupole, coperture
  - id: "arc_rame_patina"
    type: "disney"
    color: [0.32, 0.55, 0.42]
    metallic: 0.50
    roughness: 0.65
    specular: 0.28

  # Oro foglia — decorazioni, croci
  - id: "arc_oro"
    type: "disney"
    color: [0.95, 0.70, 0.22]
    metallic: 1.0
    roughness: 0.12
    specular: 0.75

  # Piombo — coperture, giunti
  - id: "arc_piombo"
    type: "disney"
