  # ── Intonaco e stucco ──────────────────────────────────────────────────

  # Intonaco bianco — facciate, interni
  - id: "arc_intonaco"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 40.0
      noise_strength: 1.5
      colors: [[0.92, 0.90, 0.87], [0.88, 0.86, 0.83]]

  # Stucco invecchiato — effetto patinato
  - id: "arc_stucco_antico"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 15.0
      noise_strength: 6.0
      colors: [[0.82, 0.78, 0.68], [0.65, 0.60, 0.50]]
      randomize_offset: true

  # ── Mattone ────────────────────────────────────────────────────────────

  # Mattone rosso
  - id: "arc_mattone"
    type: "lambertian"
