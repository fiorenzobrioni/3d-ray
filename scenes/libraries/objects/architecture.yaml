# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — Elementi architettonici
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  COLONNA_DORICA — Fusto scanalato, capitello dorico
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.46 × 3.00 m
  #  Struttura:  Stilobate (gradino), fusto scanalato rastremato (CSG:
  #              cono tronco − 12 cilindri disposti radialmente),
  #              collarino (torus), echino (cono tronco espanso),
  #              abaco (box quadrato).
  #
  #  Materiale default: arc_marmo
  #
  - name: "colonna_dorica"
    material: "arc_marmo"
    children:

      # ── Stilobate (gradino di base) ────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.28
        height: 0.08

      - type: "torus"
        center: [0, 0.08, 0]
        major_radius: 0.275
        minor_radius: 0.012

      # ── Fusto scanalato rastremato (CSG) ───────────────────────────────
      # Cono tronco (rastremato da 0.23 a 0.19) meno 12 scanalature
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 0.08, 0]
          radius: 0.23
          top_radius: 0.19
          height: 2.55
        right:
          # 12 scanalature disposte a 30° l'una dall'altra
          # Albero CSG bilanciato: ((1∪2)∪(3∪4)) ∪ ((5∪6)∪(7∪8)) ecc.
          type: "csg"
          operation: "union"
          left:
            type: "csg"
            operation: "union"
            left:
              type: "csg"
              operation: "union"
              left:
                type: "csg"
                operation: "union"
                left:
                  type: "csg"
                  operation: "union"
                  left:
                    # 0°
                    type: "cylinder"
                    center: [0.215, 0.06, 0]
                    radius: 0.045
                    height: 2.60
                  right:
                    # 30°
                    type: "cylinder"
                    center: [0.1862, 0.06, 0.1075]
                    radius: 0.045
                    height: 2.60
                right:
                  type: "csg"
                  operation: "union"
                  left:
                    # 60°
                    type: "cylinder"
                    center: [0.1075, 0.06, 0.1862]
                    radius: 0.045
                    height: 2.60
                  right:
                    # 90°
                    type: "cylinder"
                    center: [0, 0.06, 0.215]
                    radius: 0.045
                    height: 2.60
              right:
                type: "csg"
                operation: "union"
                left:
                  type: "csg"
                  operation: "union"
                  left:
                    # 120°
                    type: "cylinder"
                    center: [-0.1075, 0.06, 0.1862]
                    radius: 0.045
                    height: 2.60
                  right:
                    # 150°
                    type: "cylinder"
                    center: [-0.1862, 0.06, 0.1075]
                    radius: 0.045
                    height: 2.60
                right:
                  type: "csg"
                  operation: "union"
                  left:
                    # 180°
                    type: "cylinder"
                    center: [-0.215, 0.06, 0]
                    radius: 0.045
                    height: 2.60
                  right:
                    # 210°
                    type: "cylinder"
                    center: [-0.1862, 0.06, -0.1075]
                    radius: 0.045
                    height: 2.60
            right:
              type: "csg"
              operation: "union"
              left:
                type: "csg"
                operation: "union"
                left:
                  # 240°
                  type: "cylinder"
                  center: [-0.1075, 0.06, -0.1862]
                  radius: 0.045
                  height: 2.60
                right:
                  # 270°
                  type: "cylinder"
                  center: [0, 0.06, -0.215]
                  radius: 0.045
                  height: 2.60
              right:
                type: "csg"
                operation: "union"
                left:
                  # 300°
                  type: "cylinder"
                  center: [0.1075, 0.06, -0.1862]
                  radius: 0.045
                  height: 2.60
                right:
                  # 330°
                  type: "cylinder"
                  center: [0.1862, 0.06, -0.1075]
                  radius: 0.045
                  height: 2.60

      # ── Collarini (anelli in cima al fusto) ────────────────────────────
      - type: "torus"
        center: [0, 2.60, 0]
        major_radius: 0.185
        minor_radius: 0.008
      - type: "torus"
        center: [0, 2.62, 0]
        major_radius: 0.188
        minor_radius: 0.006

      # ── Echino (cono tronco espanso) ───────────────────────────────────
      - type: "cone"
        center: [0, 2.63, 0]
        radius: 0.19
        top_radius: 0.23
        height: 0.10

      # ── Abaco (lastra quadrata) ────────────────────────────────────────
      - type: "box"
        scale: [0.50, 0.06, 0.50]
        translate: [0, 2.76, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  COLONNA_IONICA — Fusto scanalato con base attica e volute
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.44 × 3.20 m
  #  Struttura:  Base attica (plinto box + 2 torus scotia + torus),
  #              fusto scanalato (CSG 12 scanalature come la dorica),
  #              capitello con echino sottile, 2 volute laterali
  #              (torus schiacciati + spirale approssimata con sfere
  #              decrescenti), abaco modanato.
  #
  #  Materiale default: arc_marmo
  #
  - name: "colonna_ionica"
    material: "arc_marmo"
    children:

      # ── Base attica ────────────────────────────────────────────────────
      # Plinto quadrato
      - type: "box"
        scale: [0.40, 0.05, 0.40]
        translate: [0, 0.025, 0]

      # Toro inferiore (torus grande)
      - type: "torus"
        center: [0, 0.06, 0]
        major_radius: 0.175
        minor_radius: 0.022

      # Scotia (rientranza concava) — approssimata con cilindro stretto
      - type: "cylinder"
        center: [0, 0.08, 0]
        radius: 0.155
        height: 0.03

      # Toro superiore (più piccolo)
      - type: "torus"
        center: [0, 0.115, 0]
        major_radius: 0.165
        minor_radius: 0.018

      # Collarino base
      - type: "torus"
        center: [0, 0.14, 0]
        major_radius: 0.155
        minor_radius: 0.008

      # ── Fusto scanalato rastremato (CSG) ───────────────────────────────
      # Stessa tecnica della dorica: cono - 12 cilindri
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 0.14, 0]
          radius: 0.20
          top_radius: 0.17
          height: 2.50
        right:
          type: "csg"
          operation: "union"
          left:
            type: "csg"
            operation: "union"
            left:
              type: "csg"
              operation: "union"
              left:
                type: "csg"
                operation: "union"
                left:
                  type: "csg"
                  operation: "union"
                  left:
                    type: "cylinder"
                    center: [0.19, 0.12, 0]
                    radius: 0.038
                    height: 2.56
                  right:
                    type: "cylinder"
                    center: [0.1645, 0.12, 0.095]
                    radius: 0.038
                    height: 2.56
                right:
                  type: "csg"
                  operation: "union"
                  left:
                    type: "cylinder"
                    center: [0.095, 0.12, 0.1645]
                    radius: 0.038
                    height: 2.56
                  right:
                    type: "cylinder"
                    center: [0, 0.12, 0.19]
                    radius: 0.038
                    height: 2.56
              right:
                type: "csg"
                operation: "union"
                left:
                  type: "csg"
                  operation: "union"
                  left:
                    type: "cylinder"
                    center: [-0.095, 0.12, 0.1645]
                    radius: 0.038
                    height: 2.56
                  right:
                    type: "cylinder"
                    center: [-0.1645, 0.12, 0.095]
                    radius: 0.038
                    height: 2.56
                right:
                  type: "csg"
                  operation: "union"
                  left:
                    type: "cylinder"
                    center: [-0.19, 0.12, 0]
                    radius: 0.038
                    height: 2.56
                  right:
                    type: "cylinder"
                    center: [-0.1645, 0.12, -0.095]
                    radius: 0.038
                    height: 2.56
            right:
              type: "csg"
              operation: "union"
              left:
                type: "csg"
                operation: "union"
                left:
                  type: "cylinder"
                  center: [-0.095, 0.12, -0.1645]
                  radius: 0.038
                  height: 2.56
                right:
                  type: "cylinder"
                  center: [0, 0.12, -0.19]
                  radius: 0.038
                  height: 2.56
              right:
                type: "csg"
                operation: "union"
                left:
                  type: "cylinder"
                  center: [0.095, 0.12, -0.1645]
                  radius: 0.038
                  height: 2.56
                right:
                  type: "cylinder"
                  center: [0.1645, 0.12, -0.095]
                  radius: 0.038
                  height: 2.56

      # ── Capitello ionico ───────────────────────────────────────────────
      # Collarini sommitali
      - type: "torus"
        center: [0, 2.62, 0]
        major_radius: 0.166
        minor_radius: 0.006
      - type: "torus"
        center: [0, 2.64, 0]
        major_radius: 0.170
        minor_radius: 0.008

      # Echino (ovolo) — basso e arrotondato
      - type: "cone"
        center: [0, 2.65, 0]
        radius: 0.17
        top_radius: 0.19
        height: 0.04

      # Canale delle volute (cilindro orizzontale largo)
      - type: "cylinder"
        center: [0, 2.70, 0]
        radius: 0.025
        height: 0.50
        rotate: [0, 0, 90]

      # Voluta sinistra (torus schiacciato + spirale di sfere)
      - type: "torus"
        center: [-0.22, 2.70, 0]
        major_radius: 0.050
        minor_radius: 0.018
        scale: [1.0, 0.60, 1.0]
      # Spirale: sfere concentriche decrescenti
      - type: "sphere"
        center: [-0.22, 2.70, 0]
        radius: 0.035
        scale: [1.0, 0.50, 1.0]
      - type: "sphere"
        center: [-0.22, 2.70, 0]
        radius: 0.020

      # Voluta destra
      - type: "torus"
        center: [0.22, 2.70, 0]
        major_radius: 0.050
        minor_radius: 0.018
        scale: [1.0, 0.60, 1.0]
      - type: "sphere"
        center: [0.22, 2.70, 0]
        radius: 0.035
        scale: [1.0, 0.50, 1.0]
      - type: "sphere"
        center: [0.22, 2.70, 0]
        radius: 0.020

      # ── Abaco ──────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.52, 0.04, 0.36]
        translate: [0, 2.74, 0]

      - type: "torus"
        center: [0, 2.76, 0]
        major_radius: 0.24
        minor_radius: 0.008


  # ═══════════════════════════════════════════════════════════════════════
  #  COLONNA_LISCIA — Colonna toscana semplificata (no scanalature)
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.40 × 3.00 m
  #  Struttura:  Base con plinto e toro, fusto conico liscio
  #              (senza CSG), collarino, echino, abaco.
  #              Più leggera sul render — ideale per colonnati.
  #
  #  Materiale default: arc_travertino
  #
  - name: "colonna_liscia"
    material: "arc_travertino"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.36, 0.05, 0.36]
        translate: [0, 0.025, 0]

      - type: "torus"
        center: [0, 0.06, 0]
        major_radius: 0.160
        minor_radius: 0.020

      - type: "cylinder"
        center: [0, 0.06, 0]
        radius: 0.145
        height: 0.025

      - type: "torus"
        center: [0, 0.09, 0]
        major_radius: 0.150
        minor_radius: 0.015

      # ── Fusto conico liscio (rastremato) ───────────────────────────────
      - type: "cone"
        center: [0, 0.10, 0]
        radius: 0.19
        top_radius: 0.16
        height: 2.50

      # ── Collarino ─────────────────────────────────────────────────────
      - type: "torus"
        center: [0, 2.58, 0]
        major_radius: 0.158
        minor_radius: 0.008
      - type: "torus"
        center: [0, 2.60, 0]
        major_radius: 0.162
        minor_radius: 0.006

      # ── Echino ─────────────────────────────────────────────────────────
      - type: "cone"
        center: [0, 2.61, 0]
        radius: 0.163
        top_radius: 0.20
        height: 0.08

      # ── Abaco ──────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.44, 0.05, 0.44]
        translate: [0, 2.72, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  ARCO_TUTTO_SESTO — Arco semicircolare con pilastri
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.40 × 2.80 × 0.40 m (luce ~1.00 m)
  #  Struttura:  2 pilastri con base e imposta (capitello semplice),
  #              arco semicircolare (CSG: cilindro grande − cilindro
  #              più piccolo → anello, ∩ box per metà superiore),
  #              chiave di volta (box sporgente).
  #
  #  Materiale default: arc_travertino
  #
  - name: "arco_tutto_sesto"
    material: "arc_travertino"
    children:

      # ── Pilastro sinistro ──────────────────────────────────────────────
      - type: "box"
        scale: [0.20, 1.80, 0.40]
        translate: [-0.60, 0.90, 0]

      # Base del pilastro sinistro
      - type: "box"
        scale: [0.26, 0.06, 0.44]
        translate: [-0.60, 0.03, 0]

      # Imposta (capitello semplice) sinistra
      - type: "box"
        scale: [0.24, 0.06, 0.42]
        translate: [-0.60, 1.83, 0]

      - type: "torus"
        center: [-0.60, 1.80, 0]
        major_radius: 0.11
        minor_radius: 0.010
        scale: [1.0, 1.0, 1.8]

      # ── Pilastro destro ────────────────────────────────────────────────
      - type: "box"
        scale: [0.20, 1.80, 0.40]
        translate: [0.60, 0.90, 0]

      - type: "box"
        scale: [0.26, 0.06, 0.44]
        translate: [0.60, 0.03, 0]

      - type: "box"
        scale: [0.24, 0.06, 0.42]
        translate: [0.60, 1.83, 0]

      - type: "torus"
        center: [0.60, 1.80, 0]
        major_radius: 0.11
        minor_radius: 0.010
        scale: [1.0, 1.0, 1.8]

      # ── Arco semicircolare (CSG) ──────────────────────────────────────
      # Anello = cilindro grande − cilindro piccolo,
      # poi ∩ box per tenere solo la metà superiore + solo lo spessore Z
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "subtraction"
          left:
            # Cilindro esterno (diametro = luce + spessore pilastri)
            type: "cylinder"
            center: [0, 1.86, 0]
            radius: 0.60
            height: 0.40
            rotate: [90, 0, 0]
          right:
            # Cilindro interno (luce dell'arco)
            type: "cylinder"
            center: [0, 1.86, 0]
            radius: 0.50
            height: 0.44
            rotate: [90, 0, 0]
        right:
          # Box di taglio: solo metà superiore e spessore corretto
          type: "box"
          scale: [1.30, 0.65, 0.40]
          translate: [0, 2.18, 0]

      # ── Chiave di volta ────────────────────────────────────────────────
      - type: "box"
        scale: [0.08, 0.14, 0.42]
        translate: [0, 2.39, 0]

      # Decorazione a cuneo della chiave
      - type: "cone"
        center: [0, 2.46, 0]
        radius: 0.05
        top_radius: 0.035
        height: 0.06

      # ── Cornice superiore ──────────────────────────────────────────────
      - type: "box"
        scale: [1.40, 0.06, 0.42]
        translate: [0, 2.53, 0]

      - type: "torus"
        center: [0, 2.56, 0]
        major_radius: 0.68
        minor_radius: 0.010
        scale: [1.0, 1.0, 0.20]


  # ═══════════════════════════════════════════════════════════════════════
  #  ARCO_GOTICO — Arco a sesto acuto
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.30 × 3.20 × 0.40 m
  #  Struttura:  2 pilastri stretti e alti, arco ogivale (CSG:
  #              intersezione di 2 cilindri orizzontali decentrati
  #              → forma a ogiva, poi − cilindri interni più piccoli
  #              → ghiera cava), pinnacolo sommitale.
  #
  #  Materiale default: arc_pietra_grigia
  #
  - name: "arco_gotico"
    material: "arc_pietra_grigia"
    children:

      # ── Pilastro sinistro ──────────────────────────────────────────────
      - type: "box"
        scale: [0.18, 2.00, 0.38]
        translate: [-0.56, 1.00, 0]

      # Base
      - type: "box"
        scale: [0.24, 0.06, 0.42]
        translate: [-0.56, 0.03, 0]

      # ── Pilastro destro ────────────────────────────────────────────────
      - type: "box"
        scale: [0.18, 2.00, 0.38]
        translate: [0.56, 1.00, 0]

      - type: "box"
        scale: [0.24, 0.06, 0.42]
        translate: [0.56, 0.03, 0]

      # ── Arco ogivale (CSG) ────────────────────────────────────────────
      # Intersezione di 2 cilindri decentrati → profilo a ogiva
      # Ghiera esterna − ghiera interna → arco cavo
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "subtraction"
          left:
            # Ghiera esterna = intersezione dei 2 cilindri
            type: "csg"
            operation: "intersection"
            left:
              type: "cylinder"
              center: [-0.30, 2.00, 0]
              radius: 0.90
              height: 0.38
              rotate: [90, 0, 0]
            right:
              type: "cylinder"
              center: [0.30, 2.00, 0]
              radius: 0.90
              height: 0.38
              rotate: [90, 0, 0]
          right:
            # Ghiera interna (luce dell'arco)
            type: "csg"
            operation: "intersection"
            left:
              type: "cylinder"
              center: [-0.30, 2.00, 0]
              radius: 0.80
              height: 0.42
              rotate: [90, 0, 0]
            right:
              type: "cylinder"
              center: [0.30, 2.00, 0]
              radius: 0.80
              height: 0.42
              rotate: [90, 0, 0]
        right:
          # Box di taglio: solo la parte sopra l'imposta
          type: "box"
          scale: [1.20, 1.40, 0.38]
          translate: [0, 2.70, 0]

      # ── Pinnacolo sommitale ────────────────────────────────────────────
      - type: "cone"
        center: [0, 3.05, 0]
        radius: 0.05
        top_radius: 0.0
        height: 0.12

      - type: "sphere"
        center: [0, 3.17, 0]
        radius: 0.025


  # ═══════════════════════════════════════════════════════════════════════
  #  SCALINATA — 7 gradini con pedata e alzata realistiche
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.40 × 1.19 × 2.10 m
  #  Struttura:  7 gradini (box sovrapposti sfalsati), ciascuno con
  #              bordo anteriore arrotondato (cilindro), pedana
