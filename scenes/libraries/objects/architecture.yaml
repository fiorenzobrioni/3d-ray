        rotate: [0, 0, 90]

      # Gradino 2
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 0.255, -0.60]
      - type: "cylinder"
        center: [0, 0.34, -0.75]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Gradino 3
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 0.425, -0.30]
      - type: "cylinder"
        center: [0, 0.51, -0.45]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Gradino 4
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 0.595, 0]
      - type: "cylinder"
        center: [0, 0.68, -0.15]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Gradino 5
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 0.765, 0.30]
      - type: "cylinder"
        center: [0, 0.85, 0.15]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Gradino 6
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 0.935, 0.60]
      - type: "cylinder"
        center: [0, 1.02, 0.45]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Gradino 7
      - type: "box"
        scale: [1.40, 0.17, 0.30]
        translate: [0, 1.105, 0.90]
      - type: "cylinder"
        center: [0, 1.19, 0.75]
        radius: 0.012
        height: 1.40
        rotate: [0, 0, 90]

      # Pedana d'arrivo (pianerottolo)
      - type: "box"
        scale: [1.40, 0.17, 0.60]
        translate: [0, 1.105, 1.35]


  # ═══════════════════════════════════════════════════════════════════════
  #  BALAUSTRO — Balaustro singolo tornito
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.10 × 0.70 m
  #  Struttura:  Base quadrata, piede a bulbo (sfera schiacciata),
  #              ventre (ellissoide grande), collo rastremato, colletto
  #              con anello, pomo superiore.
  #
  #  Materiale default: arc_marmo
  #
  - name: "balaustro"
    material: "arc_marmo"
    children:

      # Base quadrata
      - type: "box"
        scale: [0.08, 0.035, 0.08]
        translate: [0, 0.018, 0]

      # Piede (torus)
      - type: "torus"
        center: [0, 0.04, 0]
        major_radius: 0.035
        minor_radius: 0.008

      # Segmento inferiore
      - type: "cylinder"
        center: [0, 0.04, 0]
        radius: 0.025
        height: 0.06

      # Anello sotto il ventre
      - type: "torus"
        center: [0, 0.10, 0]
        major_radius: 0.030
        minor_radius: 0.006

      # Ventre (ellissoide — la parte più larga)
      - type: "sphere"
        center: [0, 0.22, 0]
        radius: 0.048
        scale: [1.0, 2.0, 1.0]

      # Anello sopra il ventre
      - type: "torus"
        center: [0, 0.34, 0]
        major_radius: 0.030
        minor_radius: 0.006

      # Collo rastremato
      - type: "cone"
        center: [0, 0.34, 0]
        radius: 0.028
        top_radius: 0.020
        height: 0.24

      # Colletto superiore
      - type: "torus"
        center: [0, 0.58, 0]
        major_radius: 0.025
        minor_radius: 0.006

      # Segmento finale
      - type: "cylinder"
        center: [0, 0.58, 0]
        radius: 0.022
        height: 0.06

      # Piattino superiore (dove appoggia il corrimano)
      - type: "box"
        scale: [0.07, 0.030, 0.07]
        translate: [0, 0.655, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  BALAUSTRA — Sezione completa con 5 balaustri e corrimano
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.20 × 0.90 × 0.14 m
  #  Struttura:  Zoccolatura continua (box lungo), 5 balaustri
  #              equidistanti (cilindro+sfere semplificati per
  #              non esplodere il conteggio primitive), corrimano
  #              superiore (box con bordo arrotondato).
  #
  #  Materiale default: arc_marmo
  #
  - name: "balaustra"
    material: "arc_marmo"
    children:

      # ── Zoccolatura (base continua) ────────────────────────────────────
      - type: "box"
        scale: [1.20, 0.08, 0.12]
        translate: [0, 0.04, 0]

      - type: "torus"
        center: [0, 0.08, 0]
        major_radius: 0.06
        minor_radius: 0.006
        scale: [10.0, 1.0, 1.0]

      # ── Balaustro 1 (X = -0.48) ───────────────────────────────────────
      - type: "cylinder"
        center: [-0.48, 0.08, 0]
        radius: 0.022
        height: 0.58
      - type: "sphere"
        center: [-0.48, 0.26, 0]
        radius: 0.038
        scale: [1.0, 1.8, 1.0]
      - type: "torus"
        center: [-0.48, 0.14, 0]
        major_radius: 0.026
        minor_radius: 0.005
      - type: "torus"
        center: [-0.48, 0.42, 0]
        major_radius: 0.026
        minor_radius: 0.005

      # ── Balaustro 2 (X = -0.24) ───────────────────────────────────────
      - type: "cylinder"
        center: [-0.24, 0.08, 0]
        radius: 0.022
        height: 0.58
      - type: "sphere"
        center: [-0.24, 0.26, 0]
        radius: 0.038
        scale: [1.0, 1.8, 1.0]
      - type: "torus"
        center: [-0.24, 0.14, 0]
        major_radius: 0.026
        minor_radius: 0.005
      - type: "torus"
        center: [-0.24, 0.42, 0]
        major_radius: 0.026
        minor_radius: 0.005

      # ── Balaustro 3 (X = 0) ───────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.08, 0]
        radius: 0.022
        height: 0.58
      - type: "sphere"
        center: [0, 0.26, 0]
        radius: 0.038
        scale: [1.0, 1.8, 1.0]
      - type: "torus"
        center: [0, 0.14, 0]
        major_radius: 0.026
        minor_radius: 0.005
      - type: "torus"
        center: [0, 0.42, 0]
        major_radius: 0.026
        minor_radius: 0.005

      # ── Balaustro 4 (X = 0.24) ────────────────────────────────────────
      - type: "cylinder"
        center: [0.24, 0.08, 0]
        radius: 0.022
        height: 0.58
      - type: "sphere"
        center: [0.24, 0.26, 0]
        radius: 0.038
        scale: [1.0, 1.8, 1.0]
      - type: "torus"
        center: [0.24, 0.14, 0]
        major_radius: 0.026
        minor_radius: 0.005
      - type: "torus"
        center: [0.24, 0.42, 0]
        major_radius: 0.026
        minor_radius: 0.005

      # ── Balaustro 5 (X = 0.48) ────────────────────────────────────────
      - type: "cylinder"
        center: [0.48, 0.08, 0]
        radius: 0.022
        height: 0.58
      - type: "sphere"
        center: [0.48, 0.26, 0]
        radius: 0.038
        scale: [1.0, 1.8, 1.0]
      - type: "torus"
        center: [0.48, 0.14, 0]
        major_radius: 0.026
        minor_radius: 0.005
      - type: "torus"
        center: [0.48, 0.42, 0]
        major_radius: 0.026
        minor_radius: 0.005

      # ── Corrimano ─────────────────────────────────────────────────────
      - type: "box"
        scale: [1.20, 0.06, 0.13]
        translate: [0, 0.69, 0]

      # Bordo arrotondato del corrimano
      - type: "cylinder"
        center: [0, 0.72, -0.065]
        radius: 0.030
        height: 1.20
        rotate: [0, 0, 90]


  # ═══════════════════════════════════════════════════════════════════════
  #  PILASTRO — Pilastro rettangolare con base e capitello
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.30 × 3.00 × 0.08 m (a ridosso di un muro)
  #  Struttura:  Base con plinto e modanature, fusto rettangolare
  #              liscio, capitello con echino e abaco.
  #
  #  Materiale default: arc_intonaco
  #
  - name: "pilastro"
    material: "arc_intonaco"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.34, 0.05, 0.10]
        translate: [0, 0.025, 0]

      - type: "box"
        scale: [0.32, 0.03, 0.09]
        translate: [0, 0.065, 0]

      # Modanatura base (cilindro orizzontale)
      - type: "cylinder"
        center: [0, 0.08, -0.04]
        radius: 0.010
        height: 0.32
        rotate: [0, 0, 90]

      # ── Fusto ──────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.28, 2.55, 0.07]
        translate: [0, 1.36, 0]

      # ── Capitello ─────────────────────────────────────────────────────
      # Modanatura sotto il capitello
      - type: "cylinder"
        center: [0, 2.64, -0.04]
        radius: 0.010
        height: 0.30
        rotate: [0, 0, 90]

      - type: "box"
        scale: [0.32, 0.03, 0.09]
        translate: [0, 2.665, 0]

      # Echino
      - type: "box"
        scale: [0.34, 0.04, 0.10]
        translate: [0, 2.70, 0]

      # Abaco
      - type: "box"
        scale: [0.36, 0.05, 0.11]
        translate: [0, 2.745, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  FRONTONE — Timpano triangolare su trabeazione
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~2.40 × 0.70 × 0.40 m
  #  Struttura:  Architrave (box), fregio (box), cornice con gocciolatoio
  #              (box + torus), timpano triangolare (CSG: box ∩ 2 box
  #              inclinati per creare la forma a V rovesciata).
  #
  #  Materiale default: arc_marmo
  #
  - name: "frontone"
    material: "arc_marmo"
    children:

      # ── Architrave ─────────────────────────────────────────────────────
      - type: "box"
        scale: [2.40, 0.08, 0.40]
        translate: [0, 0.04, 0]

      # ── Fregio ─────────────────────────────────────────────────────────
      - type: "box"
        scale: [2.40, 0.10, 0.38]
        translate: [0, 0.13, 0]

      # ── Cornice (con gocciolatoio) ─────────────────────────────────────
      - type: "box"
        scale: [2.50, 0.05, 0.42]
        translate: [0, 0.205, 0]

      # Gocciolatoio (torus lungo il bordo frontale)
      - type: "cylinder"
        center: [0, 0.23, -0.21]
        radius: 0.012
        height: 2.50
        rotate: [0, 0, 90]

      # ── Timpano triangolare (CSG) ─────────────────────────────────────
      # Box ∩ (box inclinato sinistro ∩ box inclinato destro) → triangolo
      - type: "csg"
        operation: "intersection"
        left:
          # Box alto che limita l'altezza del timpano
          type: "box"
          scale: [2.30, 0.50, 0.36]
          translate: [0, 0.48, 0]
        right:
          type: "csg"
          operation: "intersection"
          left:
            # Falda sinistra (box grande ruotato)
            type: "box"
            scale: [3.0, 3.0, 0.36]
            translate: [-1.15, 0.23, 0]
            rotate: [0, 0, 25]
          right:
            # Falda destra (box grande ruotato)
            type: "box"
            scale: [3.0, 3.0, 0.36]
            translate: [1.15, 0.23, 0]
            rotate: [0, 0, -25]

      # ── Cornice rampante (bordi del timpano) ───────────────────────────
      # Bordo sinistro
      - type: "cylinder"
        center: [-0.55, 0.47, -0.18]
        radius: 0.015
        height: 1.28
        rotate: [0, 0, 25]

      # Bordo destro
      - type: "cylinder"
        center: [0.55, 0.47, -0.18]
        radius: 0.015
        height: 1.28
        rotate: [0, 0, -25]


  # ═══════════════════════════════════════════════════════════════════════
  #  CUPOLA — Cupola emisferica su tamburo con lanterna
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 2.00 × 2.40 m
  #  Struttura:  Tamburo cilindrico con cornice e finestre (CSG),
  #              cupola emisferica (CSG: sfera ∩ cilindro), costoloni
  #              decorativi (torus verticali), lanterna sommitale
  #              (cilindro + cupoletta + croce/sfera).
  #
  #  Materiale default: arc_intonaco (tamburo)
  #  Materiale esplicito: arc_rame_patina (cupola), arc_oro (croce)
  #
  - name: "cupola"
    material: "arc_intonaco"
    children:

      # ── Tamburo cilindrico ─────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 1.00
        height: 0.80

      # Cornice base del tamburo
      - type: "torus"
        center: [0, 0.0, 0]
        major_radius: 1.01
        minor_radius: 0.025

      # Cornice superiore del tamburo
      - type: "torus"
        center: [0, 0.80, 0]
        major_radius: 1.01
        minor_radius: 0.025

      # ── Cupola emisferica (CSG) ────────────────────────────────────────
      - type: "csg"
        operation: "intersection"
        material: "arc_rame_patina"
        left:
          type: "sphere"
          center: [0, 0.80, 0]
          radius: 1.00
        right:
          type: "cylinder"
          center: [0, 0.80, 0]
          radius: 1.05
          height: 1.10

      # ── Anello alla base della lanterna ────────────────────────────────
      - type: "torus"
        center: [0, 1.78, 0]
        major_radius: 0.22
        minor_radius: 0.030

      # ── Lanterna ──────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 1.78, 0]
        radius: 0.20
        height: 0.30

      # Colonnine della lanterna (8 cilindri sottili)
      - type: "cylinder"
        center: [0.18, 1.78, 0]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [-0.18, 1.78, 0]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [0, 1.78, 0.18]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [0, 1.78, -0.18]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [0.127, 1.78, 0.127]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [-0.127, 1.78, 0.127]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [0.127, 1.78, -0.127]
        radius: 0.015
        height: 0.30
      - type: "cylinder"
        center: [-0.127, 1.78, -0.127]
        radius: 0.015
        height: 0.30

      # Cornicetta della lanterna
      - type: "torus"
        center: [0, 2.08, 0]
        major_radius: 0.21
        minor_radius: 0.020

      # Cupoletta della lanterna (emisfera piccola)
      - type: "csg"
        operation: "intersection"
        material: "arc_rame_patina"
        left:
          type: "sphere"
          center: [0, 2.08, 0]
          radius: 0.20
        right:
          type: "cylinder"
          center: [0, 2.08, 0]
          radius: 0.22
          height: 0.22

      # ── Sfera e croce sommitale ────────────────────────────────────────
      - type: "sphere"
        center: [0, 2.30, 0]
        radius: 0.04
        material: "arc_oro"

      # Croce (2 cilindri incrociati)
      - type: "cylinder"
        center: [0, 2.34, 0]
        radius: 0.010
        height: 0.10
        material: "arc_oro"

      - type: "cylinder"
        center: [0, 2.40, 0]
        radius: 0.010
        height: 0.06
        rotate: [0, 0, 90]
        material: "arc_oro"


  # ═══════════════════════════════════════════════════════════════════════
  #  NICCHIA — Nicchia murale con volta
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.60 × 1.60 × 0.35 m
  #  Struttura:  Incasso rettangolare (pannello di fondo), volta a
  #              semicilindro in cima (CSG: cilindro ∩ box per
  #              l'emiciclo), cornice perimetrale (box e cilindri),
  #              piedistallo interno per esporre oggetti.
  #
  #  Materiale default: arc_stucco_antico
  #
  - name: "nicchia"
    material: "arc_stucco_antico"
    children:

      # ── Pannello di fondo (incasso) ────────────────────────────────────
      - type: "box"
        scale: [0.50, 1.20, 0.04]
        translate: [0, 0.60, 0.16]

      # ── Volta a semicilindro (CSG) ────────────────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "cylinder"
          center: [0, 1.20, 0.16]
          radius: 0.25
          height: 0.04
          rotate: [90, 0, 0]
        right:
          # Solo la metà superiore
          type: "box"
          scale: [0.52, 0.28, 0.06]
          translate: [0, 1.34, 0.16]

      # ── Cornice esterna ────────────────────────────────────────────────
      # Stipite sinistro
      - type: "box"
        scale: [0.04, 1.20, 0.06]
        translate: [-0.27, 0.60, 0.13]

      # Stipite destro
      - type: "box"
        scale: [0.04, 1.20, 0.06]
        translate: [0.27, 0.60, 0.13]

      # Architrave (sopra la volta)
      - type: "box"
        scale: [0.58, 0.04, 0.06]
        translate: [0, 1.48, 0.13]

      # Soglia
      - type: "box"
        scale: [0.58, 0.04, 0.08]
        translate: [0, 0.02, 0.12]

      # Conchiglia decorativa (torus schiacciato nella volta)
      - type: "torus"
        center: [0, 1.30, 0.15]
        major_radius: 0.18
        minor_radius: 0.010
        scale: [1.0, 0.50, 0.20]

      # ── Piedistallo interno ────────────────────────────────────────────
      - type: "box"
        scale: [0.30, 0.06, 0.18]
        translate: [0, 0.07, 0.07]

      - type: "cylinder"
        center: [0, 0.10, 0.07]
        radius: 0.08
        height: 0.02


  # ═══════════════════════════════════════════════════════════════════════
  #  PORTALE_CLASSICO — Portale con stipiti, trabeazione, cornice
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.80 × 2.80 × 0.40 m (luce porta ~1.00 × 2.20)
  #  Struttura:  2 stipiti a pilastro con base e capitellino,
  #              architrave, fregio con dentelli (piccoli box),
  #              cornice con gocciolatoio.
  #
  #  Materiale default: arc_arenaria
  #
  - name: "portale_classico"
    material: "arc_arenaria"
    children:

      # ── Stipite sinistro ───────────────────────────────────────────────
      # Base
      - type: "box"
        scale: [0.30, 0.08, 0.40]
        translate: [-0.75, 0.04, 0]

      # Fusto
      - type: "box"
        scale: [0.24, 2.02, 0.36]
        translate: [-0.75, 1.09, 0]

      # Capitellino
      - type: "box"
        scale: [0.28, 0.06, 0.38]
        translate: [-0.75, 2.13, 0]

      - type: "torus"
        center: [-0.75, 2.10, 0]
        major_radius: 0.13
        minor_radius: 0.008
        scale: [1.0, 1.0, 1.5]

      # ── Stipite destro ─────────────────────────────────────────────────
      - type: "box"
        scale: [0.30, 0.08, 0.40]
        translate: [0.75, 0.04, 0]

      - type: "box"
        scale: [0.24, 2.02, 0.36]
        translate: [0.75, 1.09, 0]

      - type: "box"
        scale: [0.28, 0.06, 0.38]
        translate: [0.75, 2.13, 0]

      - type: "torus"
        center: [0.75, 2.10, 0]
        major_radius: 0.13
        minor_radius: 0.008
        scale: [1.0, 1.0, 1.5]

      # ── Architrave ─────────────────────────────────────────────────────
      - type: "box"
        scale: [1.80, 0.10, 0.38]
        translate: [0, 2.21, 0]

      # ── Fregio con dentelli ────────────────────────────────────────────
      - type: "box"
        scale: [1.80, 0.12, 0.36]
        translate: [0, 2.32, 0]

      # Dentelli (15 piccoli box equidistanti)
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.77, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.66, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.55, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.44, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.33, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.22, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [-0.11, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.0, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.11, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.22, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.33, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.44, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.55, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.66, 2.35, -0.17]
      - type: "box"
        scale: [0.04, 0.06, 0.04]
        translate: [0.77, 2.35, -0.17]

      # ── Cornice superiore ──────────────────────────────────────────────
      - type: "box"
        scale: [1.88, 0.06, 0.42]
        translate: [0, 2.41, 0]

      # Gocciolatoio
      - type: "cylinder"
        center: [0, 2.44, -0.21]
        radius: 0.015
        height: 1.88
        rotate: [0, 0, 90]


  # ═══════════════════════════════════════════════════════════════════════
  #  CORNICIONE — Sezione di cornicione classico
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.00 × 0.30 × 0.35 m (sezione modulare)
  #  Struttura:  Cyma recta (gola superiore), corona (gocciolatoio),
  #              dentelli, ovolo (torus), fascia liscia.
  #              Componibile: affiancare più sezioni per coprire la
  #              lunghezza desiderata.
  #
  #  Materiale default: arc_marmo
  #
  - name: "cornicione"
    material: "arc_marmo"
    children:

      # ── Fascia liscia (base) ───────────────────────────────────────────
      - type: "box"
        scale: [1.00, 0.06, 0.20]
        translate: [0, 0.03, 0]

      # ── Ovolo (torus orizzontale) ──────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.07, -0.10]
        radius: 0.014
        height: 1.00
        rotate: [0, 0, 90]

      # ── Fascia dentelli ────────────────────────────────────────────────
      - type: "box"
        scale: [1.00, 0.06, 0.24]
        translate: [0, 0.10, -0.02]

      # Dentelli (10 per sezione da 1 m)
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [-0.45, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [-0.35, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [-0.25, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [-0.15, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [-0.05, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [0.05, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [0.15, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [0.25, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [0.35, 0.12, -0.14]
      - type: "box"
        scale: [0.03, 0.04, 0.03]
        translate: [0.45, 0.12, -0.14]

      # ── Corona (gocciolatoio) ──────────────────────────────────────────
      - type: "box"
        scale: [1.02, 0.04, 0.30]
        translate: [0, 0.15, -0.05]

      # Bordo del gocciolatoio
      - type: "cylinder"
        center: [0, 0.17, -0.20]
        radius: 0.012
        height: 1.02
        rotate: [0, 0, 90]

      # ── Cyma recta (gola superiore — profilo a S) ─────────────────────
      # Approssimata con un cono tronco + torus
      - type: "cone"
        center: [0, 0.17, -0.04]
        radius: 0.14
        top_radius: 0.12
        height: 0.06
        scale: [3.6, 1.0, 1.0]

      - type: "box"
        scale: [1.02, 0.04, 0.28]
        translate: [0, 0.25, -0.04]

      # Listello finale in cima
      - type: "cylinder"
        center: [0, 0.27, -0.18]
        radius: 0.008
        height: 1.02
        rotate: [0, 0, 90]
