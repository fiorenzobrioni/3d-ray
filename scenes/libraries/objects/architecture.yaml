# ============================================================================
# Libreria Oggetti — Architettura (Architecture)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/architecture.yaml" }]
#
# Elementi architettonici classici e strutturali: colonne, archi, scale,
# balaustre, cupole, portali. Ogni pezzo è dimensionato in scala reale
# (unità ≈ metri) e progettato per la composizione modulare.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Prefisso ID:  arc_   (architecture)
#
#   Pietre con texture procedurali (marble, noise) per variazione
#   naturale. I materiali strutturali usano randomize_offset: true
#   per evitare che colonne identiche appaiano come cloni esatti.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità = metri. Una colonna è ~3.0 m alta,
#                 un arco ~2.8 m, uno scalino ~0.17 m.
#   MODULARITÀ    I pezzi sono progettati per comporsi: una balaustra
#                 può essere messa sopra una scalinata, un frontone
#                 sopra un portale, una cupola sopra un tamburo.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   COLONNA_DORICA          Colonna dorica con fusto scanalato (CSG
#                           12 scanalature), echino e abaco.
#                           ~Ø 0.46 × 3.00 m.
#
#   COLONNA_IONICA          Colonna ionica con fusto scanalato,
#                           volute a spirale e base attica.
#                           ~Ø 0.44 × 3.20 m.
#
#   COLONNA_LISCIA          Colonna liscia semplificata (senza
#                           scanalature) con base e capitello
#                           toscano. Meno primitivi, più veloce.
#                           ~Ø 0.40 × 3.00 m.
#
#   ARCO_TUTTO_SESTO        Arco a tutto sesto con pilastri,
#                           imposta, ghiera e chiave di volta.
#                           ~1.40 × 2.80 × 0.40 m.
#
#   ARCO_GOTICO             Arco a sesto acuto con pilastri
#                           ottagonali e profilo ogivale.
#                           ~1.30 × 3.20 × 0.40 m.
#
#   SCALINATA               Scalinata a 7 gradini con alzata e
#                           pedata realistiche. ~1.40 × 1.19 × 2.10 m.
#
#   BALAUSTRO               Balaustro singolo tornito con profilo
#                           classico. ~Ø 0.10 × 0.70 m.
#
#   BALAUSTRA               Sezione completa di balaustra con 5
#                           balaustri, corrimano e zoccolatura.
#                           ~1.20 × 0.90 × 0.14 m.
#
#   PILASTRO                Pilastro rettangolare con base attica,
#                           fusto e capitello a modanature.
#                           ~0.30 × 3.00 × 0.08 m.
#
#   FRONTONE                Frontone triangolare (timpano) su
#                           trabeazione con cornice dentellata.
#                           ~2.40 × 0.70 × 0.40 m.
#
#   CUPOLA                  Cupola emisferica su tamburo cilindrico
#                           con lanterna e croce sommitale.
#                           ~Ø 2.00 × 2.40 m.
#
#   NICCHIA                 Nicchia murale con volta a conchiglia
#                           (semicilindro), cornice e piedistallo.
#                           ~0.60 × 1.60 × 0.35 m.
#
#   PORTALE_CLASSICO        Portale con stipiti, architrave,
#                           fregio e cornice con dentelli.
#                           ~1.80 × 2.80 × 0.40 m.
#
#   CORNICIONE              Sezione di cornicione classico con
#                           gola, dentelli, gocciolatoio e
#                           modanatura corona. ~1.00 × 0.30 × 0.35 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI — Pietre, intonaci e metalli architettonici
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Marmo ──────────────────────────────────────────────────────────────

  # Marmo bianco di Carrara — colonne, capitelli
  - id: "arc_marmo"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 14.0
      noise_strength: 7.0
      colors: [[0.95, 0.94, 0.92], [0.62, 0.60, 0.58]]
      randomize_offset: true

  # Marmo travertino — archi, facciate (tono caldo)
  - id: "arc_travertino"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 10.0
      noise_strength: 12.0
      colors: [[0.88, 0.82, 0.70], [0.68, 0.60, 0.48]]
      randomize_offset: true

  # ── Pietra ─────────────────────────────────────────────────────────────

  # Arenaria — muri, scalini, balaustre
  - id: "arc_arenaria"
    type: "lambertian"
