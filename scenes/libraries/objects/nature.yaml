# ============================================================================
# Libreria Oggetti — Natura (Nature)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/nature.yaml" }]
#
# Piante, fiori, alberi, rocce e composizioni naturali. Le forme
# organiche sono costruite con sfere scalate, capsule e CSG.
# Le chiome usano subsurface scattering per traslucenza fogliare.
#
# ── Convenzioni ──────────────────────────────────────────────────────────
#
#   ORIGINE       Base/radice a Y=0, centrato in XZ.
#   SCALA         Unità = metri. Un albero è ~3 m, un fiore ~0.35 m.
#   VARIAZIONE    Usa scale e rotate sull'istanza per variare le
#                 dimensioni. I materiali con randomize_offset: true
#                 generano corteccia e fogliame diverso per ogni
#                 istanza (grazie al seed automatico).
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   ALBERO_LATIFOGLIA       Albero deciduo con tronco ramificato e
#                           chioma a nuvola (cluster di sfere).
#                           ~Ø 2.50 × 3.50 m.
#
#   ABETE                   Abete/pino conico con tronco dritto e
#                           palchi di rami (coni impilati).
#                           ~Ø 1.40 × 3.20 m.
#
#   PALMA                   Palma con tronco curvo segmentato e
#                           8 fronde a ventaglio. ~Ø 2.00 × 3.80 m.
#
#   CACTUS_SAGUARO          Saguaro con fusto scanalato e 2 bracci.
#                           ~Ø 0.80 × 2.20 m.
#
#   BONSAI                  Bonsai in vaso con tronco contorto,
#                           chioma e radici aeree. ~Ø 0.30 × 0.35 m.
#
#   FUNGO_PORCINO           Porcino con gambo robusto e cappello
#                           bombato. ~Ø 0.12 × 0.12 m.
#
#   FUNGO_AMANITA           Amanita muscaria rossa con macchie
#                           bianche e anello. ~Ø 0.10 × 0.14 m.
#
#   ROSA                    Rosa aperta con petali stratificati,
#                           stelo e foglie. ~Ø 0.10 × 0.35 m.
#
#   TULIPANO                Tulipano in vaso con 3 fiori, foglie
#                           e bulbo. ~Ø 0.12 × 0.38 m.
#
#   GIRASOLE                Girasole con disco grande, petali
#                           a corona e stelo alto. ~Ø 0.22 × 0.90 m.
#
#   NINFEA                  Ninfea con foglia galleggiante e fiore
#                           aperto. ~Ø 0.30 × 0.08 m.
#
#   PIANTA_GRASSA           Pianta grassa (echeveria) in vaso di
#                           terracotta. ~Ø 0.14 × 0.18 m.
#
#   MASSO                   Formazione rocciosa naturale con 5
#                           pietre sovrapposte. ~Ø 0.80 × 0.55 m.
#
#   TRONCO                  Ceppo d'albero con radici esposte e
#                           anelli di crescita. ~Ø 0.40 × 0.35 m.
#
#   PIETRE_ZEN              Pietre zen impilate (cairn) in equilibrio
#                           con base di ghiaia. ~Ø 0.15 × 0.25 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Corteccia e legno ──────────────────────────────────────────────────

  # Corteccia scura — alberi decidui, quercia
  - id: "nat_corteccia"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 15.0
      noise_strength: 6.0
      colors: [[0.25, 0.18, 0.10], [0.15, 0.10, 0.05]]
      randomize_offset: true

  # Corteccia chiara — betulla, pino giovane
  - id: "nat_corteccia_chiara"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 12.0
      noise_strength: 4.0
      colors: [[0.55, 0.45, 0.32], [0.38, 0.28, 0.18]]
      randomize_offset: true

  # Corteccia palma — fibrosa, segmentata
  - id: "nat_corteccia_palma"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 8.0
      noise_strength: 8.0
      colors: [[0.40, 0.30, 0.18], [0.28, 0.20, 0.12]]
      randomize_offset: true

  # Legno tagliato — sezione ceppo con anelli
  - id: "nat_legno_taglio"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 8.0
      noise_strength: 3.0
      colors: [[0.65, 0.50, 0.32], [0.45, 0.32, 0.18]]
      randomize_offset: true

  # ── Fogliame ───────────────────────────────────────────────────────────

  # Fogliame verde scuro — latifoglie mature
  - id: "nat_foglie_scuro"
    type: "disney"
    color: [0.12, 0.28, 0.08]
    roughness: 0.75
    metallic: 0.0
    specular: 0.20
    subsurface: 0.35

  # Fogliame verde chiaro — primaverile, tenero
  - id: "nat_foglie_chiaro"
    type: "disney"
    color: [0.22, 0.42, 0.12]
    roughness: 0.70
    metallic: 0.0
    specular: 0.22
    subsurface: 0.40

  # Aghi di conifera — verde blu-grigio
  - id: "nat_aghi"
    type: "disney"
    color: [0.10, 0.22, 0.10]
    roughness: 0.80
    metallic: 0.0
    specular: 0.15
    subsurface: 0.25

  # Fronda di palma — verde saturo
  - id: "nat_fronda"
    type: "disney"
    color: [0.14, 0.35, 0.10]
    roughness: 0.60
    metallic: 0.0
    specular: 0.30
    subsurface: 0.30
    sheen: 0.10

  # ── Fiori ──────────────────────────────────────────────────────────────

  # Petali rosso — rosa
  - id: "nat_petali_rosso"
    type: "disney"
    color: [0.72, 0.06, 0.10]
    roughness: 0.55
    metallic: 0.0
    specular: 0.35
    subsurface: 0.45
    sheen: 0.20
    sheen_tint: 0.70

  # Petali giallo — girasole, tulipano
  - id: "nat_petali_giallo"
    type: "disney"
    color: [0.92, 0.78, 0.08]
    roughness: 0.55
    metallic: 0.0
    specular: 0.30
    subsurface: 0.40

  # Petali bianco — ninfea, margherita
  - id: "nat_petali_bianco"
    type: "disney"
    color: [0.95, 0.92, 0.88]
    roughness: 0.50
    metallic: 0.0
    specular: 0.30
    subsurface: 0.50

  # Petali rosa — tulipano, rosa
  - id: "nat_petali_rosa"
    type: "disney"
    color: [0.88, 0.40, 0.52]
    roughness: 0.55
    metallic: 0.0
    specular: 0.32
    subsurface: 0.45

  # Pistillo / centro fiore — giallo-bruno
  - id: "nat_pistillo"
    type: "disney"
    color: [0.72, 0.58, 0.12]
    roughness: 0.85
    metallic: 0.0

  # Centro girasole — disco marrone scuro
  - id: "nat_disco_girasole"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 40.0
      noise_strength: 3.0
      colors: [[0.22, 0.14, 0.06], [0.35, 0.22, 0.08]]

  # ── Cactus ─────────────────────────────────────────────────────────────

  # Verde cactus — ceroso, lucido
  - id: "nat_cactus"
    type: "disney"
    color: [0.18, 0.38, 0.15]
    roughness: 0.40
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.25
    clearcoat_gloss: 0.70

  # Spine — bianco-giallo
  - id: "nat_spine"
