  # ── Funghi ─────────────────────────────────────────────────────────────

  # Cappello porcino — marrone caldo
  - id: "nat_fungo_marrone"
    type: "disney"
    color: [0.42, 0.25, 0.12]
    roughness: 0.55
    metallic: 0.0
    specular: 0.30
    subsurface: 0.20

  # Cappello amanita — rosso vivo
  - id: "nat_fungo_rosso"
    type: "disney"
    color: [0.82, 0.08, 0.06]
    roughness: 0.35
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.30
    clearcoat_gloss: 0.80

  # Gambo fungo — bianco crema
  - id: "nat_fungo_gambo"
    type: "disney"
    color: [0.92, 0.88, 0.80]
    roughness: 0.60
    metallic: 0.0
    specular: 0.22
    subsurface: 0.30

  # ── Roccia e terra ─────────────────────────────────────────────────────

  # Roccia grigia
  - id: "nat_roccia"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 8.0
      noise_strength: 5.0
      colors: [[0.48, 0.46, 0.42], [0.32, 0.30, 0.28]]
      randomize_offset: true

  # Roccia muschiosa
  - id: "nat_roccia_muschio"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 7.0
      colors: [[0.22, 0.30, 0.15], [0.40, 0.38, 0.32]]
      randomize_offset: true

  # Pietra levigata — zen, fiume
  - id: "nat_pietra_liscia"
    type: "disney"
    color: [0.42, 0.40, 0.38]
    roughness: 0.25
    metallic: 0.0
    specular: 0.40

  # Terra / humus
  - id: "nat_terra"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 12.0
      noise_strength: 4.0
      colors: [[0.22, 0.16, 0.10], [0.14, 0.10, 0.06]]

  # ── Ceramica e acqua ───────────────────────────────────────────────────

  # Terracotta vaso
  - id: "nat_terracotta"
    type: "disney"
    color: [0.68, 0.38, 0.20]
    roughness: 0.70
    metallic: 0.0
    specular: 0.20

  # Ceramica smaltata — vaso bonsai
  - id: "nat_ceramica_blu"
    type: "disney"
    color: [0.10, 0.18, 0.42]
    roughness: 0.10
    metallic: 0.0
    specular: 0.60
    clearcoat: 0.55
    clearcoat_gloss: 0.90

  # Stelo verde — gambo fiori
  - id: "nat_stelo"
    type: "disney"
    color: [0.15, 0.32, 0.08]
    roughness: 0.65
    metallic: 0.0
    specular: 0.20
    subsurface: 0.20

  # Acqua — ninfea
  - id: "nat_acqua"
    type: "disney"
    color: [0.75, 0.85, 0.90]
    roughness: 0.02
    spec_trans: 0.88
    ior: 1.333
    specular: 0.60

  # Foglia ninfea — verde scuro ceroso
  - id: "nat_foglia_ninfea"
    type: "disney"
    color: [0.10, 0.28, 0.08]
    roughness: 0.35
    metallic: 0.0
    specular: 0.40
    clearcoat: 0.30
    clearcoat_gloss: 0.75

  # Ghiaia — base zen
  - id: "nat_ghiaia"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 30.0
      noise_strength: 4.0
      colors: [[0.78, 0.75, 0.68], [0.62, 0.60, 0.55]]

  # Pianta grassa — verde glauco ceroso
  - id: "nat_succulenta"
    type: "disney"
    color: [0.35, 0.52, 0.32]
    roughness: 0.30
    metallic: 0.0
    specular: 0.42
    clearcoat: 0.20
    clearcoat_gloss: 0.65
    subsurface: 0.20


# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  ALBERO_LATIFOGLIA — Albero deciduo con chioma a nuvola
  # ═══════════════════════════════════════════════════════════════════════
  - name: "albero_latifoglia"
    material: "nat_corteccia"
    children:

      # ── Tronco principale ──────────────────────────────────────────────
      - type: "cone"
        center: [0, 0, 0]
        radius: 0.15
        top_radius: 0.10
        height: 1.60

      # Biforcazione (2 rami principali)
      # Ramo sinistro
      - type: "cone"
        center: [-0.15, 1.50, 0]
        radius: 0.07
        top_radius: 0.04
        height: 0.80
        rotate: [0, 0, -20]

      # Ramo destro
      - type: "cone"
        center: [0.12, 1.50, 0.05]
        radius: 0.06
        top_radius: 0.035
        height: 0.75
        rotate: [5, 0, 18]

      # Ramo frontale
      - type: "cone"
        center: [0, 1.30, -0.10]
        radius: 0.05
        top_radius: 0.025
        height: 0.60
        rotate: [20, 0, 5]

      # Rametti secondari (capsule sottili)
      - type: "capsule"
        center: [-0.40, 2.10, 0.10]
        radius: 0.018
        height: 0.40
        rotate: [-10, 0, -30]

      - type: "capsule"
        center: [0.35, 2.05, -0.08]
        radius: 0.016
        height: 0.35
        rotate: [15, 0, 25]

      # ── Chioma (cluster di sfere traslucenti) ──────────────────────────
      # Cluster centrale (il più grande)
      - type: "sphere"
        center: [0, 2.40, 0]
        radius: 0.65
        scale: [1.10, 0.85, 1.05]
        material: "nat_foglie_scuro"

      # Cluster sinistro
      - type: "sphere"
        center: [-0.50, 2.30, 0.15]
        radius: 0.50
        scale: [1.05, 0.80, 0.95]
        material: "nat_foglie_chiaro"

      # Cluster destro
      - type: "sphere"
        center: [0.45, 2.25, -0.10]
        radius: 0.48
        scale: [0.95, 0.82, 1.00]
        material: "nat_foglie_scuro"

      # Cluster frontale basso
      - type: "sphere"
        center: [0.10, 1.90, -0.40]
        radius: 0.42
        scale: [1.0, 0.78, 0.90]
        material: "nat_foglie_chiaro"

      # Cluster superiore
      - type: "sphere"
        center: [-0.10, 2.80, 0.05]
        radius: 0.45
        scale: [1.0, 0.90, 1.0]
        material: "nat_foglie_chiaro"

      # Cluster posteriore
      - type: "sphere"
        center: [0, 2.20, 0.40]
        radius: 0.40
        scale: [0.90, 0.75, 1.0]
        material: "nat_foglie_scuro"

      # Base: radici esposte
      - type: "sphere"
        center: [-0.12, 0.02, 0.10]
        radius: 0.06
        scale: [2.0, 0.40, 1.0]
      - type: "sphere"
        center: [0.10, 0.02, -0.08]
        radius: 0.05
        scale: [1.5, 0.40, 1.8]


  # ═══════════════════════════════════════════════════════════════════════
  #  ABETE — Conifera con palchi conici
  # ═══════════════════════════════════════════════════════════════════════
  - name: "abete"
    material: "nat_corteccia_chiara"
    children:

      # Tronco
      - type: "cone"
        center: [0, 0, 0]
        radius: 0.10
        top_radius: 0.04
        height: 3.00

      # 5 palchi di rami (coni sovrapposti di raggio decrescente)
      - type: "cone"
        center: [0, 0.60, 0]
        radius: 0.70
        top_radius: 0.05
        height: 0.55
        material: "nat_aghi"
      - type: "cone"
        center: [0, 1.05, 0]
        radius: 0.58
        top_radius: 0.04
        height: 0.50
        material: "nat_aghi"
      - type: "cone"
        center: [0, 1.45, 0]
        radius: 0.48
        top_radius: 0.03
        height: 0.48
        material: "nat_aghi"
      - type: "cone"
        center: [0, 1.85, 0]
        radius: 0.38
        top_radius: 0.02
        height: 0.45
        material: "nat_aghi"
      - type: "cone"
        center: [0, 2.22, 0]
        radius: 0.28
        top_radius: 0.0
        height: 0.80
        material: "nat_aghi"


  # ═══════════════════════════════════════════════════════════════════════
  #  PALMA — Palma con tronco segmentato e fronde
  # ═══════════════════════════════════════════════════════════════════════
  - name: "palma"
    material: "nat_corteccia_palma"
    children:

      # Tronco segmentato (coni impilati con torus di giuntura)
      - type: "cone"
        center: [0, 0, 0]
        radius: 0.14
        top_radius: 0.11
        height: 0.80
      - type: "torus"
        center: [0, 0.80, 0]
        major_radius: 0.11
        minor_radius: 0.015

      - type: "cone"
        center: [0, 0.80, 0]
        radius: 0.11
        top_radius: 0.09
        height: 0.80
      - type: "torus"
        center: [0, 1.60, 0]
        major_radius: 0.09
        minor_radius: 0.012

      - type: "cone"
        center: [0, 1.60, 0]
        radius: 0.09
        top_radius: 0.08
        height: 0.80
      - type: "torus"
        center: [0, 2.40, 0]
        major_radius: 0.08
        minor_radius: 0.010

      - type: "cylinder"
        center: [0, 2.40, 0]
        radius: 0.08
        height: 0.60

      # Corona (sfera da cui partono le fronde)
      - type: "sphere"
        center: [0, 3.05, 0]
        radius: 0.12
        material: "nat_corteccia_palma"

      # 8 fronde (sfere allungatissime, inclinate verso il basso)
      - type: "sphere"
        center: [0.50, 2.90, 0]
        radius: 0.10
        scale: [5.5, 0.15, 0.80]
        rotate: [0, 0, -25]
        material: "nat_fronda"

      - type: "sphere"
        center: [-0.50, 2.90, 0]
        radius: 0.10
        scale: [5.5, 0.15, 0.80]
        rotate: [0, 0, 25]
        material: "nat_fronda"

      - type: "sphere"
        center: [0, 2.90, 0.50]
        radius: 0.10
        scale: [0.80, 0.15, 5.5]
        rotate: [25, 0, 0]
        material: "nat_fronda"

      - type: "sphere"
        center: [0, 2.90, -0.50]
        radius: 0.10
        scale: [0.80, 0.15, 5.5]
        rotate: [-25, 0, 0]
        material: "nat_fronda"

      - type: "sphere"
        center: [0.36, 2.90, 0.36]
        radius: 0.10
        scale: [4.0, 0.15, 4.0]
        rotate: [18, -45, -18]
        material: "nat_fronda"

      - type: "sphere"
        center: [-0.36, 2.90, 0.36]
        radius: 0.10
        scale: [4.0, 0.15, 4.0]
        rotate: [18, 45, 18]
        material: "nat_fronda"

      - type: "sphere"
        center: [-0.36, 2.90, -0.36]
        radius: 0.10
        scale: [4.0, 0.15, 4.0]
        rotate: [-18, -45, 18]
        material: "nat_fronda"

      - type: "sphere"
        center: [0.36, 2.90, -0.36]
        radius: 0.10
        scale: [4.0, 0.15, 4.0]
        rotate: [-18, 45, -18]
        material: "nat_fronda"


  # ═══════════════════════════════════════════════════════════════════════
  #  CACTUS_SAGUARO — Saguaro con bracci
  # ═══════════════════════════════════════════════════════════════════════
  - name: "cactus_saguaro"
    material: "nat_cactus"
    children:

      # Fusto principale (cilindro con costolature → torus impilati)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.12
        height: 2.00

      # Costolature (torus lungo il fusto, 8 segmenti)
      - type: "torus"
        center: [0, 0.25, 0]
        major_radius: 0.125
        minor_radius: 0.010
      - type: "torus"
        center: [0, 0.50, 0]
        major_radius: 0.123
        minor_radius: 0.010
      - type: "torus"
        center: [0, 0.75, 0]
        major_radius: 0.122
        minor_radius: 0.010
      - type: "torus"
        center: [0, 1.00, 0]
        major_radius: 0.120
        minor_radius: 0.010
      - type: "torus"
        center: [0, 1.25, 0]
        major_radius: 0.118
        minor_radius: 0.010
      - type: "torus"
        center: [0, 1.50, 0]
        major_radius: 0.116
        minor_radius: 0.010
      - type: "torus"
        center: [0, 1.75, 0]
        major_radius: 0.114
        minor_radius: 0.010

      # Cupola sommitale
      - type: "sphere"
        center: [0, 2.00, 0]
        radius: 0.12
        scale: [1.0, 0.50, 1.0]

      # ── Braccio sinistro ───────────────────────────────────────────────
      # Gomito (sfera raccordo orizzontale)
      - type: "sphere"
        center: [-0.20, 1.10, 0]
        radius: 0.08
      # Segmento orizzontale
      - type: "capsule"
        center: [-0.18, 1.10, 0]
        radius: 0.08
        height: 0.15
        rotate: [0, 0, -90]
      # Segmento verticale
      - type: "cylinder"
        center: [-0.28, 1.10, 0]
        radius: 0.075
        height: 0.70
      # Cupola braccio
      - type: "sphere"
        center: [-0.28, 1.80, 0]
        radius: 0.075
        scale: [1.0, 0.50, 1.0]

      # ── Braccio destro (più basso) ────────────────────────────────────
      - type: "sphere"
        center: [0.20, 0.80, 0]
        radius: 0.07
      - type: "capsule"
        center: [0.18, 0.80, 0]
        radius: 0.07
        height: 0.12
        rotate: [0, 0, 90]
      - type: "cylinder"
        center: [0.25, 0.80, 0]
        radius: 0.065
        height: 0.55
      - type: "sphere"
        center: [0.25, 1.35, 0]
        radius: 0.065
        scale: [1.0, 0.50, 1.0]


  # ═══════════════════════════════════════════════════════════════════════
  #  BONSAI — Bonsai in vaso ceramica
  # ═══════════════════════════════════════════════════════════════════════
  - name: "bonsai"
    material: "nat_corteccia"
    children:

      # ── Vaso (CSG cavo) ────────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
