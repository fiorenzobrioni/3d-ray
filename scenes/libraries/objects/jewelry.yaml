# ============================================================================
# Libreria Oggetti — Gioielleria (Jewelry)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/jewelry.yaml" }]
#
# Gioielli, gemme e accessori da esposizione. Ogni pezzo sfrutta al
# massimo i materiali dielettrici ad alto IOR per le gemme, i metalli
# Disney con clearcoat per le finitura lucide, e la CSG per castoni,
# tagli sfaccettati e profili cavi.
#
# ── Scala ────────────────────────────────────────────────────────────────
#
#   Gli oggetti sono in scala "da vetrina": ~5× la dimensione reale,
#   così un anello è ~Ø 0.09 m e una gemma ~0.03 m. Questo rende i
#   pezzi visibili in scene con mobili e altri oggetti.
#   Per close-up di prodotto, usare scale: 2.0–4.0 sull'istanza.
#   Per scala reale (1:1), usare scale: 0.2 sull'istanza.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   GEMMA_BRILLANTE         Gemma taglio brillante (57 facce
#                           approssimate: corona + tavola + padiglione).
#                           ~Ø 0.030 × 0.020 m.
#
#   GEMMA_CABOCHON          Gemma taglio cabochon (cupola liscia su
#                           base piatta). ~Ø 0.025 × 0.014 m.
#
#   ANELLO_SOLITARIO        Anello con gemma brillante in castone
#                           a 6 griffe. ~Ø 0.09 × 0.055 m.
#
#   ANELLO_FASCIA           Fede nuziale con bordi milgrain e
#                           canale centrale inciso. ~Ø 0.09 × 0.03 m.
#
#   ANELLO_TRILOGY           Anello con 3 gemme in fila su castone
#                           a griffe. ~Ø 0.09 × 0.05 m.
#
#   ANELLO_SIGILLO          Anello con piatto ovale inciso.
#                           ~Ø 0.09 × 0.04 m.
#
#   PENDENTE_GOCCIA         Pendente a goccia con gemma, cornice
#                           e bale (anello di aggancio).
#                           ~0.025 × 0.065 m.
#
#   PENDENTE_CROCE          Croce latina con gemma centrale e
#                           bale. ~0.035 × 0.070 m.
#
#   ORECCHINO_CERCHIO       Cerchio (creola) con chiusura a
#                           perno. ~Ø 0.04 × 0.003 m.
#
#   ORECCHINO_GOCCIA        Orecchino pendente con gemma a goccia,
#                           montatura e gancio. ~0.02 × 0.065 m.
#
#   BRACCIALE_RIGIDO        Bangle con sezione a D e chiusura
#                           decorata. ~Ø 0.070 × 0.012 m.
#
#   COLLANA_PERLE           Filo di 15 perle graduate con
#                           chiusura a moschettone. ~0.30 × 0.04 m.
#
#   TIARA                   Diadema con arco, punte e gemme.
#                           ~0.14 × 0.06 m.
#
#   PORTAGIOIE              Cofanetto aperto con cuscino in
#                           velluto e bordo dorato.
#                           ~0.08 × 0.05 × 0.06 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI — Metalli preziosi, gemme e supporti
# ═══════════════════════════════════════════════════════════════════════════

