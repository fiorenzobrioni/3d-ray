# ============================================================================
# Libreria Oggetti — Decorativi (Decorative Objects)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/decorative-objects.yaml" }]
#
# Oggetti ornamentali, da esposizione e da tavolo. Ogni pezzo è pensato
# per essere il protagonista di una scena o un complemento di lusso in
# ambienti interni. Ampio uso di CSG per volumi cavi, sfere scalate per
# ellissoidi organici, torus per anelli e raccordi, coni tronchi per
# profili sagomati.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Prefisso ID:  dec_   (decorative)
#
#   La libreria include materiali specifici per ogni categoria di oggetto.
#   Sovrascrivibili definendo nella scena un materiale con lo stesso id.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità ≈ metri. Gli oggetti da tavolo misurano 0.15–0.50 m.
#   DETTAGLIO     Livello professionale: ogni pezzo usa 15–60+ primitive,
#                 CSG multipli, dettagli torniti, raccordi sferici.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   OBELISCO                Obelisco classico egizio su basamento a
#                           tre gradini con pyramidion appuntito.
#                           ~0.14 × 0.65 m.
#
#   SFERA_PIEDISTALLO       Sfera lucida su piedistallo classico
#                           tornito con base modanata.
#                           ~Ø 0.26 × 0.50 m.
#
#   CLESSIDRA               Clessidra con bulbi in vetro (CSG),
#                           telaio in legno con montanti e dischi,
#                           sabbia interna. ~0.14 × 0.32 m.
#
#   GLOBO                   Globo sferico su supporto con anello
#                           meridiano inclinato e base pesante.
#                           ~Ø 0.30 × 0.42 m.
#
#   COPPA_TROFEO            Coppa su piedistallo con corpo cavo
#                           (CSG), manici ad anello e base a
#                           gradini. ~Ø 0.22 × 0.40 m.
#
#   UOVO_ORNAMENTALE        Uovo stile Fabergé su treppiede dorato,
#                           fascia equatoriale, finial superiore.
#                           ~Ø 0.12 × 0.22 m.
#
#   SFERA_ARMILLARE         Sfera armillare con 3 anelli orbitali
#                           annidati, asse polare e globo centrale
#                           su colonna classica. ~Ø 0.34 × 0.50 m.
#
#   FERMACARTE              Cupola di vetro emisferica su base in
#                           legno con sfera decorativa interna.
#                           ~Ø 0.10 × 0.09 m.
#
#   PIRAMIDE_CRISTALLO      Piramide in cristallo trasparente su
#                           base di velluto nero, con luce interna.
#                           ~0.12 × 0.18 m.
#
#   COLONNINA               Colonnina decorativa bassa con fusto
#                           scanalato (CSG), capitello modanato e
#                           base a plinto. ~Ø 0.18 × 0.55 m.
#
# ============================================================================


