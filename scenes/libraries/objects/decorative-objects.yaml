# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — Oggetti decorativi riutilizzabili
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  OBELISCO — Obelisco classico su basamento a gradini
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.14 × 0.65 m
  #  Struttura:  Basamento a 3 gradini degradanti (box sovrapposti),
  #              fusto rastremato (cono tronco a sezione quadrata via
  #              CSG intersection di cone + box), torus decorativo alla
  #              base del fusto, pyramidion conico in cima.
  #
  #  Materiale default: dec_granito
  #
  - name: "obelisco"
    material: "dec_granito"
    children:

      # ── Basamento a 3 gradini ──────────────────────────────────────────
      # Gradino 1 (base più larga)
      - type: "box"
        scale: [0.14, 0.020, 0.14]
        translate: [0, 0.010, 0]

      # Gradino 2
      - type: "box"
        scale: [0.12, 0.020, 0.12]
        translate: [0, 0.030, 0]

      # Gradino 3
      - type: "box"
        scale: [0.10, 0.020, 0.10]
        translate: [0, 0.050, 0]

      # Torus decorativo alla transizione base-fusto
      - type: "torus"
        center: [0, 0.062, 0]
        major_radius: 0.048
        minor_radius: 0.005

      # ── Fusto rastremato ───────────────────────────────────────────────
      # CSG: cono tronco ∩ box → fusto a sezione quadrata rastremata
      - type: "csg"
        operation: "intersection"
        left:
          type: "cone"
          center: [0, 0.06, 0]
          radius: 0.06
          top_radius: 0.035
          height: 0.50
        right:
          type: "box"
          scale: [0.085, 0.52, 0.085]
          translate: [0, 0.31, 0]

      # Torus decorativo sotto il pyramidion
      - type: "torus"
        center: [0, 0.56, 0]
        major_radius: 0.032
        minor_radius: 0.004

      # ── Pyramidion (punta piramidale) ──────────────────────────────────
      # CSG: cono ∩ box → piramide a base quadrata
      - type: "csg"
        operation: "intersection"
        material: "dec_oro_antico"
        left:
          type: "cone"
          center: [0, 0.56, 0]
          radius: 0.040
          top_radius: 0.0
          height: 0.08
        right:
          type: "box"
          scale: [0.058, 0.10, 0.058]
          translate: [0, 0.61, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  SFERA_PIEDISTALLO — Sfera decorativa su piedistallo classico
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.26 × 0.50 m
  #  Struttura:  Base quadrata modanata (box + torus), plinto
  #              intermedio, colonna tornita (cilindro + sfere +
  #              anelli torus), capitello espanso (cono tronco
  #              invertito + torus), piattino, sfera grande.
  #
  #  Materiale default: dec_marmo_statuario (piedistallo)
  #  Materiale esplicito: dec_bronzo (sfera)
  #
  - name: "sfera_piedistallo"
    material: "dec_marmo_statuario"
    children:

      # ── Base quadrata modanata ─────────────────────────────────────────
      # Plinto inferiore
      - type: "box"
        scale: [0.16, 0.018, 0.16]
        translate: [0, 0.009, 0]

      # Modanatura (torus schiacciato attorno alla base)
      - type: "torus"
        center: [0, 0.018, 0]
        major_radius: 0.075
        minor_radius: 0.008

      # Dado sopra la base
      - type: "box"
        scale: [0.13, 0.025, 0.13]
        translate: [0, 0.031, 0]

      # ── Colonna tornita ────────────────────────────────────────────────
      # Cono tronco di transizione base-colonna
      - type: "cone"
        center: [0, 0.044, 0]
        radius: 0.050
        top_radius: 0.032
        height: 0.025

      # Fusto principale
      - type: "cylinder"
        center: [0, 0.069, 0]
        radius: 0.030
        height: 0.20

      # Anello decorativo inferiore
      - type: "torus"
        center: [0, 0.12, 0]
        major_radius: 0.034
        minor_radius: 0.006

      # Nodo sferico centrale
      - type: "sphere"
        center: [0, 0.17, 0]
        radius: 0.038
        scale: [1.0, 0.70, 1.0]

      # Anello decorativo superiore
      - type: "torus"
        center: [0, 0.22, 0]
        major_radius: 0.034
        minor_radius: 0.006

      # ── Capitello ─────────────────────────────────────────────────────
      # Cono tronco espanso verso l'alto
      - type: "cone"
        center: [0, 0.269, 0]
        radius: 0.032
        top_radius: 0.055
        height: 0.03

      # Torus di coronamento del capitello
      - type: "torus"
        center: [0, 0.30, 0]
        major_radius: 0.052
        minor_radius: 0.008

      # ── Piattino d'appoggio ────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.30, 0]
        radius: 0.048
        height: 0.008

      # ── Sfera decorativa ───────────────────────────────────────────────
      - type: "sphere"
        center: [0, 0.41, 0]
        radius: 0.098
        material: "dec_bronzo"


  # ═══════════════════════════════════════════════════════════════════════
  #  CLESSIDRA — Clessidra con bulbi in vetro e telaio
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.14 × 0.32 m
  #  Struttura:  2 dischi di chiusura (sopra e sotto) con bordo torus,
  #              4 montanti verticali cilindrici, corpo in vetro a
  #              doppio bulbo (2 sfere CSG unite da un cilindro stretto
  #              per il collo, scavate internamente), sabbia interna
  #              (2 sfere schiacciate: una in basso piena, una in alto
  #              quasi vuota).
  #
  #  Materiale default: dec_ebano (telaio)
  #  Materiali espliciti: dec_vetro_soffiato (bulbi), dec_sabbia,
  #                       dec_ottone (raccordi)
  #
  - name: "clessidra"
    material: "dec_ebano"
    children:

      # ── Disco inferiore (base) ─────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.065
        height: 0.014

      - type: "torus"
        center: [0, 0.014, 0]
        major_radius: 0.060
        minor_radius: 0.007

      # Piedini (3 sfere schiacciate)
      - type: "sphere"
        center: [0.055, 0.0, 0]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        center: [-0.0275, 0.0, 0.0476]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        center: [-0.0275, 0.0, -0.0476]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]

      # ── Disco superiore (tappo) ────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.296, 0]
        radius: 0.065
        height: 0.014

      - type: "torus"
        center: [0, 0.296, 0]
        major_radius: 0.060
        minor_radius: 0.007

      # Pomello superiore decorativo
      - type: "sphere"
        center: [0, 0.318, 0]
        radius: 0.014
        material: "dec_ottone"

      # ── 4 montanti verticali ──────────────────────────────────────────
      - type: "cylinder"
        center: [0.045, 0.014, 0.045]
        radius: 0.005
        height: 0.282

      - type: "cylinder"
        center: [-0.045, 0.014, 0.045]
        radius: 0.005
        height: 0.282

      - type: "cylinder"
        center: [0.045, 0.014, -0.045]
        radius: 0.005
        height: 0.282

      - type: "cylinder"
        center: [-0.045, 0.014, -0.045]
        radius: 0.005
        height: 0.282

      # Raccordi in ottone alla base dei montanti (4 anelli)
      - type: "torus"
        center: [0.045, 0.022, 0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [-0.045, 0.022, 0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [0.045, 0.022, -0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [-0.045, 0.022, -0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"

      # Raccordi in ottone in cima ai montanti (4 anelli)
      - type: "torus"
        center: [0.045, 0.290, 0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [-0.045, 0.290, 0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [0.045, 0.290, -0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"
      - type: "torus"
        center: [-0.045, 0.290, -0.045]
        major_radius: 0.007
        minor_radius: 0.003
        material: "dec_ottone"

      # Anello decorativo al centro (collo della clessidra)
      - type: "torus"
        center: [0, 0.155, 0]
        major_radius: 0.020
        minor_radius: 0.004
        material: "dec_ottone"

      # ── Corpo in vetro (doppio bulbo cavo via CSG) ─────────────────────
      # Guscio esterno: 2 sfere unite da collo, meno interno
      - type: "csg"
        operation: "subtraction"
        material: "dec_vetro_soffiato"
        left:
          # Guscio esterno: unione di bulbo inferiore + collo + bulbo superiore
          type: "csg"
          operation: "union"
          left:
            type: "csg"
            operation: "union"
            left:
              # Bulbo inferiore (ellissoide leggermente schiacciato)
              type: "sphere"
              center: [0, 0.08, 0]
              radius: 0.042
              scale: [1.0, 1.35, 1.0]
            right:
              # Collo (cilindro stretto)
              type: "cylinder"
              center: [0, 0.12, 0]
              radius: 0.008
              height: 0.07
          right:
            # Bulbo superiore
            type: "sphere"
            center: [0, 0.23, 0]
            radius: 0.042
            scale: [1.0, 1.35, 1.0]
        right:
          # Cavità interna (stesso profilo leggermente più piccolo)
          type: "csg"
          operation: "union"
          left:
            type: "csg"
            operation: "union"
            left:
              type: "sphere"
              center: [0, 0.08, 0]
              radius: 0.038
              scale: [1.0, 1.35, 1.0]
            right:
              type: "cylinder"
              center: [0, 0.12, 0]
              radius: 0.006
              height: 0.07
          right:
            type: "sphere"
            center: [0, 0.23, 0]
            radius: 0.038
            scale: [1.0, 1.35, 1.0]

      # ── Sabbia nel bulbo inferiore ─────────────────────────────────────
      # Ellissoide schiacciato che simula il cumulo di sabbia
      - type: "sphere"
        center: [0, 0.06, 0]
        radius: 0.032
        scale: [1.0, 0.65, 1.0]
        material: "dec_sabbia"


  # ═══════════════════════════════════════════════════════════════════════
  #  GLOBO — Globo sferico su supporto inclinato
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.30 × 0.42 m
  #  Struttura:  Base circolare pesante con bordo, colonna corta con
  #              nodo decorativo, forcella a U (2 montanti + arco in
  #              alto), anello meridiano (torus inclinato 23.5°),
  #              globo sferico, asse polare (cilindro sottile).
  #
  #  Materiale default: dec_ottone (supporto)
  #  Materiali espliciti: dec_oceano (globo)
  #
  - name: "globo"
    material: "dec_ottone"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.10
        height: 0.015

      - type: "torus"
        center: [0, 0.015, 0]
        major_radius: 0.095
        minor_radius: 0.008

      # ── Colonna ────────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.015, 0]
        radius: 0.016
        height: 0.10

      # Nodo sferico decorativo
      - type: "sphere"
        center: [0, 0.07, 0]
        radius: 0.022

      # ── Forcella di sostegno ───────────────────────────────────────────
      # Montante sinistro
      - type: "cylinder"
        center: [-0.08, 0.115, 0]
        radius: 0.006
        height: 0.22

      # Montante destro
      - type: "cylinder"
        center: [0.08, 0.115, 0]
        radius: 0.006
        height: 0.22

      # Arco superiore (cilindro orizzontale che collega i montanti)
      - type: "cylinder"
        center: [0, 0.335, 0]
        radius: 0.006
        height: 0.16
        rotate: [0, 0, 90]

      # Raccordi sferici alla sommità dei montanti
      - type: "sphere"
        center: [-0.08, 0.335, 0]
        radius: 0.008
      - type: "sphere"
        center: [0.08, 0.335, 0]
        radius: 0.008

      # ── Anello meridiano ───────────────────────────────────────────────
      # Torus grande inclinato di 23.5° (obliquità terrestre)
      - type: "torus"
        center: [0, 0.25, 0]
        major_radius: 0.118
        minor_radius: 0.004
        rotate: [0, 0, 23.5]

      # ── Globo ──────────────────────────────────────────────────────────
      - type: "sphere"
        center: [0, 0.25, 0]
        radius: 0.11
        material: "dec_oceano"

      # ── Asse polare ────────────────────────────────────────────────────
      # Cilindro sottile che attraversa il globo
      - type: "cylinder"
        center: [0, 0.13, 0]
        radius: 0.003
        height: 0.24

      # Puntale superiore asse
      - type: "sphere"
        center: [0, 0.37, 0]
        radius: 0.006

      # Puntale inferiore asse
      - type: "sphere"
        center: [0, 0.13, 0]
        radius: 0.006


  # ═══════════════════════════════════════════════════════════════════════
  #  COPPA_TROFEO — Coppa con manici su piedistallo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.22 × 0.40 m
  #  Struttura:  Base quadrata a gradini, colonna tornita con anelli,
  #              coppa cava (CSG: sfera cava intersecata con cilindro
  #              per ottenere la forma a calice), bordo torus,
  #              2 manici laterali (torus tagliati a metà via CSG).
  #
  #  Materiale default: dec_argento
  #  Materiale esplicito: dec_marmo_nero (base)
  #
  - name: "coppa_trofeo"
    material: "dec_argento"
    children:

      # ── Base a gradini in marmo nero ───────────────────────────────────
      # Gradino 1 (largo)
      - type: "box"
        scale: [0.14, 0.016, 0.10]
        translate: [0, 0.008, 0]
        material: "dec_marmo_nero"

      # Gradino 2
      - type: "box"
        scale: [0.12, 0.016, 0.08]
        translate: [0, 0.024, 0]
        material: "dec_marmo_nero"

      # ── Colonna tornita ────────────────────────────────────────────────
      # Cono tronco di transizione
      - type: "cone"
        center: [0, 0.032, 0]
        radius: 0.035
        top_radius: 0.018
        height: 0.025

      # Fusto
      - type: "cylinder"
        center: [0, 0.057, 0]
        radius: 0.016
        height: 0.12

      # Anello inferiore
      - type: "torus"
        center: [0, 0.08, 0]
        major_radius: 0.020
        minor_radius: 0.005

      # Nodo sferico
      - type: "sphere"
        center: [0, 0.12, 0]
        radius: 0.024

      # Anello superiore
      - type: "torus"
        center: [0, 0.15, 0]
        major_radius: 0.020
        minor_radius: 0.005

      # Cono di raccordo verso la coppa
      - type: "cone"
        center: [0, 0.177, 0]
        radius: 0.018
        top_radius: 0.045
        height: 0.04

      # ── Coppa cava (CSG) ───────────────────────────────────────────────
      # Forma: sfera cava intersecata con cilindro → calice
      - type: "csg"
        operation: "intersection"
        left:
          # Sfera cava
          type: "csg"
          operation: "subtraction"
          left:
            type: "sphere"
            center: [0, 0.28, 0]
            radius: 0.10
          right:
            type: "sphere"
            center: [0, 0.28, 0]
            radius: 0.092
        right:
          # Cilindro che taglia la metà superiore → forma calice
          type: "cylinder"
          center: [0, 0.22, 0]
          radius: 0.12
          height: 0.18

      # Bordo superiore della coppa
      - type: "torus"
        center: [0, 0.355, 0]
        major_radius: 0.085
        minor_radius: 0.007

      # ── Manico sinistro (mezzo torus via CSG) ──────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "torus"
          center: [-0.09, 0.28, 0]
          major_radius: 0.045
          minor_radius: 0.008
          rotate: [0, 0, 90]
        right:
          # Box che tiene solo la metà esterna
          type: "box"
          scale: [0.10, 0.14, 0.10]
          translate: [-0.12, 0.28, 0]

      # ── Manico destro (mezzo torus via CSG) ────────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "torus"
          center: [0.09, 0.28, 0]
          major_radius: 0.045
          minor_radius: 0.008
          rotate: [0, 0, 90]
        right:
          type: "box"
          scale: [0.10, 0.14, 0.10]
          translate: [0.12, 0.28, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  UOVO_ORNAMENTALE — Uovo Fabergé su treppiede
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.12 × 0.22 m
  #  Struttura:  Treppiede (3 gambe curve in ottone con piedini sferici),
  #              anello di sostegno (torus), uovo (sfera scalata in
  #              ellissoide verticale) in smalto blu, fascia equatoriale
  #              dorata (torus), finial superiore (sfera + cono), gemma
  #              incastonata in cima (sfera piccola cristallo).
  #
  #  Materiale default: dec_smalto_blu (corpo uovo)
  #  Materiali espliciti: dec_oro, dec_cristallo
  #
  - name: "uovo_ornamentale"
    material: "dec_smalto_blu"
    children:

      # ── Treppiede in oro ───────────────────────────────────────────────
      # 3 gambe disposte a 120°, ciascuna un cilindro inclinato + piedino
      # Gamba 1 (X+)
      - type: "cylinder"
        center: [0.038, 0.0, 0]
        radius: 0.004
        height: 0.065
        rotate: [0, 0, 15]
        material: "dec_oro"
      - type: "sphere"
        center: [0.055, 0.0, 0]
        radius: 0.006
        scale: [1.3, 0.5, 1.3]
        material: "dec_oro"

      # Gamba 2 (120°)
      - type: "cylinder"
        center: [-0.019, 0.0, 0.033]
        radius: 0.004
        height: 0.065
        rotate: [-8, 0, -13]
        material: "dec_oro"
      - type: "sphere"
        center: [-0.0275, 0.0, 0.0476]
        radius: 0.006
        scale: [1.3, 0.5, 1.3]
        material: "dec_oro"

      # Gamba 3 (240°)
      - type: "cylinder"
        center: [-0.019, 0.0, -0.033]
        radius: 0.004
        height: 0.065
        rotate: [8, 0, -13]
        material: "dec_oro"
      - type: "sphere"
        center: [-0.0275, 0.0, -0.0476]
        radius: 0.006
        scale: [1.3, 0.5, 1.3]
        material: "dec_oro"

      # Anello di appoggio del treppiede
      - type: "torus"
        center: [0, 0.055, 0]
        major_radius: 0.032
        minor_radius: 0.004
        material: "dec_oro"

      # ── Uovo (ellissoide) ──────────────────────────────────────────────
      # Sfera scalata: più alto che largo → forma ovoidale
      - type: "sphere"
        center: [0, 0.13, 0]
        radius: 0.048
        scale: [1.0, 1.40, 1.0]

      # ── Fascia equatoriale dorata ──────────────────────────────────────
      - type: "torus"
        center: [0, 0.13, 0]
        major_radius: 0.048
        minor_radius: 0.004
        material: "dec_oro"

      # Decorazione: 4 piccole sfere sulla fascia (punti cardinali)
      - type: "sphere"
        center: [0.052, 0.13, 0]
        radius: 0.005
        material: "dec_oro"
      - type: "sphere"
        center: [-0.052, 0.13, 0]
        radius: 0.005
        material: "dec_oro"
      - type: "sphere"
        center: [0, 0.13, 0.052]
        radius: 0.005
        material: "dec_oro"
      - type: "sphere"
        center: [0, 0.13, -0.052]
        radius: 0.005
        material: "dec_oro"

      # ── Finial superiore ───────────────────────────────────────────────
      # Base cono dorato
      - type: "cone"
        center: [0, 0.195, 0]
        radius: 0.012
        top_radius: 0.005
        height: 0.012
        material: "dec_oro"

      # Gemma in cristallo (piccola sfera)
      - type: "sphere"
        center: [0, 0.212, 0]
        radius: 0.007
        material: "dec_cristallo"


  # ═══════════════════════════════════════════════════════════════════════
  #  SFERA_ARMILLARE — Sfera armillare con anelli annidati
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.34 × 0.50 m
  #  Struttura:  Base circolare modanata, colonna corta, supporto
  #              a forcella, 3 anelli orbitali (equatoriale, meridiano,
  #              eclittica inclinata 23.5°) come torus, asse polare
  #              (cilindro), globo centrale piccolo.
  #
  #  Materiale default: dec_ottone
  #  Materiale esplicito: dec_bronzo (globo centrale)
  #
  - name: "sfera_armillare"
    material: "dec_ottone"
    children:

      # ── Base modanata ──────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.10
        height: 0.012

      - type: "torus"
        center: [0, 0.012, 0]
        major_radius: 0.095
        minor_radius: 0.007

      - type: "cone"
        center: [0, 0.012, 0]
        radius: 0.085
        top_radius: 0.06
        height: 0.015

      # ── Colonna ────────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.027, 0]
        radius: 0.018
        height: 0.10

      # Nodo sferico
      - type: "sphere"
        center: [0, 0.08, 0]
        radius: 0.025

      # Anello base colonna
      - type: "torus"
        center: [0, 0.035, 0]
        major_radius: 0.022
        minor_radius: 0.005

      # ── Piatto di sostegno ─────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.127, 0]
        radius: 0.055
        height: 0.008

      # ── Supporto a forcella ────────────────────────────────────────────
      # Montante sinistro
      - type: "cylinder"
        center: [-0.065, 0.135, 0]
        radius: 0.005
        height: 0.20

      # Montante destro
      - type: "cylinder"
        center: [0.065, 0.135, 0]
        radius: 0.005
        height: 0.20

      # Arco superiore
      - type: "cylinder"
        center: [0, 0.335, 0]
        radius: 0.005
        height: 0.13
        rotate: [0, 0, 90]

      # Raccordi
      - type: "sphere"
        center: [-0.065, 0.335, 0]
        radius: 0.007
      - type: "sphere"
        center: [0.065, 0.335, 0]
        radius: 0.007

      # ── Anello equatoriale (orizzontale) ───────────────────────────────
      - type: "torus"
        center: [0, 0.27, 0]
        major_radius: 0.12
        minor_radius: 0.005

      # ── Anello meridiano (verticale, piano XY) ────────────────────────
      - type: "torus"
        center: [0, 0.27, 0]
        major_radius: 0.115
        minor_radius: 0.004
        rotate: [90, 0, 0]

      # ── Anello eclittica (inclinato 23.5°) ────────────────────────────
      - type: "torus"
        center: [0, 0.27, 0]
        major_radius: 0.108
        minor_radius: 0.004
        rotate: [90, 0, 23.5]

      # ── Anello terzo meridiano (90° dal primo) ────────────────────────
      - type: "torus"
        center: [0, 0.27, 0]
        major_radius: 0.105
        minor_radius: 0.003
        rotate: [0, 0, 90]

      # ── Asse polare ────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.14, 0]
        radius: 0.003
        height: 0.26

      # Puntali dell'asse
      - type: "sphere"
        center: [0, 0.40, 0]
        radius: 0.006
      - type: "sphere"
        center: [0, 0.14, 0]
        radius: 0.006

      # ── Globo centrale ─────────────────────────────────────────────────
      - type: "sphere"
        center: [0, 0.27, 0]
        radius: 0.035
        material: "dec_bronzo"


  # ═══════════════════════════════════════════════════════════════════════
  #  FERMACARTE — Cupola di vetro con sfera interna
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.10 × 0.09 m
  #  Struttura:  Base in legno scuro (cilindro con torus), cupola
  #              emisferica in cristallo (CSG: sfera ∩ cilindro per
  #              ottenere solo la metà superiore), sfera decorativa
  #              colorata all'interno.
  #
  #  Materiale default: dec_palissandro (base)
  #  Materiali espliciti: dec_cristallo (cupola), dec_glow (sfera interna)
  #
  - name: "fermacarte"
    material: "dec_palissandro"
    children:

      # ── Base in legno ──────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.050
        height: 0.015

      - type: "torus"
        center: [0, 0.015, 0]
        major_radius: 0.047
        minor_radius: 0.006

      # Incavo circolare per la cupola (effetto incastro)
      - type: "cylinder"
        center: [0, 0.015, 0]
        radius: 0.042
        height: 0.004

      # ── Cupola emisferica in cristallo (CSG) ───────────────────────────
      # Sfera ∩ cilindro alto → solo la metà superiore
      - type: "csg"
        operation: "intersection"
        material: "dec_cristallo"
        left:
          type: "sphere"
          center: [0, 0.019, 0]
          radius: 0.045
        right:
          type: "cylinder"
          center: [0, 0.019, 0]
          radius: 0.050
          height: 0.060

      # ── Sfera decorativa interna (emissiva tenue) ──────────────────────
      - type: "sphere"
        center: [0, 0.035, 0]
        radius: 0.016
        material: "dec_glow"


  # ═══════════════════════════════════════════════════════════════════════
  #  PIRAMIDE_CRISTALLO — Piramide trasparente su base
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.12 × 0.18 m
  #  Struttura:  Base rettangolare in velluto nero, piramide in
  #              cristallo (CSG: cono ∩ box → piramide a base
  #              quadrata), piccola sfera emissiva interna per
  #              effetto glow attraverso il cristallo.
  #
  #  Materiale default: dec_cristallo (piramide)
  #  Materiali espliciti: dec_velluto_nero (base), dec_glow
  #
  - name: "piramide_cristallo"
    material: "dec_cristallo"
    children:

      # ── Base in velluto nero ───────────────────────────────────────────
      - type: "box"
        scale: [0.12, 0.012, 0.12]
        translate: [0, 0.006, 0]
        material: "dec_velluto_nero"

      # Bordo dorato della base
      - type: "torus"
        center: [0, 0.012, 0]
        major_radius: 0.058
        minor_radius: 0.003
        material: "dec_oro"

      # ── Piramide in cristallo (CSG: cono ∩ box) ───────────────────────
      # L'intersezione di un cono con un box produce una piramide
      # a base quadrata con spigoli netti.
      - type: "csg"
        operation: "intersection"
        left:
          type: "cone"
          center: [0, 0.012, 0]
          radius: 0.075
          top_radius: 0.0
          height: 0.15
        right:
          type: "box"
          scale: [0.10, 0.18, 0.10]
          translate: [0, 0.09, 0]

      # ── Glow interno ──────────────────────────────────────────────────
      - type: "sphere"
        center: [0, 0.06, 0]
        radius: 0.015
        material: "dec_glow"


  # ═══════════════════════════════════════════════════════════════════════
  #  COLONNINA — Colonnina decorativa con fusto scanalato
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.18 × 0.55 m
  #  Struttura:  Base a plinto quadrato con modanatura torus, fusto
  #              scanalato (cilindro principale - 8 cilindri verticali
  #              per le scanalature via CSG), capitello con echino
  #              (cono tronco invertito), abaco (box piatto), torus
  #              di coronamento.
  #
  #  Materiale default: dec_marmo_statuario
  #
  - name: "colonnina"
    material: "dec_marmo_statuario"
    children:

      # ── Base (plinto) ──────────────────────────────────────────────────
      # Dado quadrato inferiore
      - type: "box"
        scale: [0.16, 0.022, 0.16]
        translate: [0, 0.011, 0]

      # Modanatura base (torus)
      - type: "torus"
        center: [0, 0.022, 0]
        major_radius: 0.070
        minor_radius: 0.008

      # Dado superiore
      - type: "box"
        scale: [0.14, 0.018, 0.14]
        translate: [0, 0.031, 0]

      # Torus di transizione base-fusto
      - type: "torus"
        center: [0, 0.042, 0]
        major_radius: 0.058
        minor_radius: 0.006

      # ── Fusto scanalato (CSG) ─────────────────────────────────────────
      # Cilindro principale meno 8 scanalature cilindriche
      - type: "csg"
        operation: "subtraction"
        left:
          # Cilindro del fusto, leggermente rastremato via cone
          type: "cone"
          center: [0, 0.042, 0]
          radius: 0.055
          top_radius: 0.048
          height: 0.38
        right:
          # 8 scanalature (cilindri sottili rimossi lungo il perimetro)
          # Raggruppati in CSG union per sottrarli tutti insieme
          type: "csg"
          operation: "union"
          left:
            type: "csg"
            operation: "union"
            left:
              type: "csg"
              operation: "union"
              left:
                # Scanalatura 1 (0°)
                type: "cylinder"
                center: [0.050, 0.04, 0]
                radius: 0.012
                height: 0.40
              right:
                # Scanalatura 2 (45°)
                type: "cylinder"
                center: [0.0354, 0.04, 0.0354]
                radius: 0.012
                height: 0.40
            right:
              type: "csg"
              operation: "union"
              left:
                # Scanalatura 3 (90°)
                type: "cylinder"
                center: [0, 0.04, 0.050]
                radius: 0.012
                height: 0.40
              right:
                # Scanalatura 4 (135°)
                type: "cylinder"
                center: [-0.0354, 0.04, 0.0354]
                radius: 0.012
                height: 0.40
          right:
            type: "csg"
            operation: "union"
            left:
              type: "csg"
              operation: "union"
              left:
                # Scanalatura 5 (180°)
                type: "cylinder"
                center: [-0.050, 0.04, 0]
                radius: 0.012
                height: 0.40
              right:
                # Scanalatura 6 (225°)
                type: "cylinder"
                center: [-0.0354, 0.04, -0.0354]
                radius: 0.012
                height: 0.40
            right:
              type: "csg"
              operation: "union"
              left:
                # Scanalatura 7 (270°)
                type: "cylinder"
                center: [0, 0.04, -0.050]
                radius: 0.012
                height: 0.40
              right:
                # Scanalatura 8 (315°)
                type: "cylinder"
                center: [0.0354, 0.04, -0.0354]
                radius: 0.012
                height: 0.40

      # ── Collarini (anelli alla base e cima del fusto) ──────────────────
      # Anellino alla base del fusto
      - type: "torus"
        center: [0, 0.065, 0]
        major_radius: 0.050
        minor_radius: 0.004

      # Anellino alla cima del fusto
      - type: "torus"
        center: [0, 0.40, 0]
        major_radius: 0.046
        minor_radius: 0.004

      # ── Capitello ─────────────────────────────────────────────────────
      # Echino (cono tronco espanso verso l'alto)
      - type: "cone"
        center: [0, 0.42, 0]
        radius: 0.048
        top_radius: 0.068
        height: 0.03

      # Torus di coronamento
      - type: "torus"
        center: [0, 0.45, 0]
        major_radius: 0.065
        minor_radius: 0.008

      # Abaco (piattino quadrato in cima)
      - type: "box"
        scale: [0.15, 0.016, 0.15]
        translate: [0, 0.458, 0]
