# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  PROVETTA — Tubo da saggio con fondo emisferico
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.018 × 0.15 m
  #  Struttura:  Tubo cilindrico cavo (CSG) + fondo emisferico cavo
  #              (CSG sfera − sfera), bordo superiore (torus),
  #              collarino per presa (torus).
  #
  - name: "provetta"
    material: "lab_pyrex"
    children:

      # Corpo cavo: cilindro − cilindro + fondo emisferico
      - type: "csg"
        operation: "subtraction"
        left:
          type: "group"
          children:
            # Tubo esterno
            - type: "cylinder"
              center: [0, 0.018, 0]
              radius: 0.009
              height: 0.130

            # Fondo emisferico esterno
            - type: "csg"
              operation: "intersection"
              left:
                type: "sphere"
                center: [0, 0.018, 0]
                radius: 0.009
              right:
                type: "cylinder"
                center: [0, 0.005, 0]
                radius: 0.010
                height: 0.014

        right:
          type: "group"
          children:
            # Tubo interno
            - type: "cylinder"
              center: [0, 0.020, 0]
              radius: 0.008
              height: 0.135

            # Fondo emisferico interno
            - type: "csg"
              operation: "intersection"
              left:
                type: "sphere"
                center: [0, 0.018, 0]
                radius: 0.008
              right:
                type: "cylinder"
                center: [0, 0.008, 0]
                radius: 0.009
                height: 0.012

      # Bordo superiore (labbro arrotondato)
      - type: "torus"
        center: [0, 0.148, 0]
        major_radius: 0.0088
        minor_radius: 0.0012

      # Collarino di presa
      - type: "torus"
        center: [0, 0.135, 0]
        major_radius: 0.0095
        minor_radius: 0.0008


  # ═══════════════════════════════════════════════════════════════════════
  #  BEUTA_ERLENMEYER — Beuta conica con collo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.10 × 0.18 m
  #  Struttura:  Corpo conico cavo (CSG cono − cono), collo cilindrico
  #              cavo, raccordo sferico alla transizione, bordo, fondo
  #              piatto.
  #
  - name: "beuta_erlenmeyer"
    material: "lab_pyrex"
    children:

      - type: "csg"
        operation: "subtraction"
        left:
          type: "group"
          children:
            # Corpo conico esterno
            - type: "cone"
              center: [0, 0, 0]
              radius: 0.050
              top_radius: 0.016
              height: 0.12

            # Raccordo collo (sfera schiacciata)
            - type: "sphere"
              center: [0, 0.12, 0]
              radius: 0.018
              scale: [1.0, 0.50, 1.0]

            # Collo cilindrico esterno
            - type: "cylinder"
              center: [0, 0.12, 0]
              radius: 0.016
              height: 0.055

        right:
          type: "group"
          children:
            # Corpo conico interno
            - type: "cone"
              center: [0, 0.003, 0]
              radius: 0.047
              top_radius: 0.014
              height: 0.118

            # Collo interno
            - type: "cylinder"
              center: [0, 0.115, 0]
              radius: 0.014
              height: 0.065

      # Bordo (labbro)
      - type: "torus"
        center: [0, 0.175, 0]
        major_radius: 0.0155
        minor_radius: 0.0015

      # Fondo piatto (disco sottile)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.050
        height: 0.003


  # ═══════════════════════════════════════════════════════════════════════
  #  PALLONE_DISTILLAZIONE — Pallone sferico con collo e raccordo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.12 × 0.22 m
  #  Struttura:  Corpo sferico cavo (CSG), collo cilindrico cavo,
  #              raccordo laterale inclinato (cilindro per il tubo
  #              di distillazione), bordo con torus.
  #
  - name: "pallone_distillazione"
    material: "lab_pyrex"
    children:

      # Corpo sferico cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "sphere"
          center: [0, 0.065, 0]
          radius: 0.060
        right:
          type: "sphere"
          center: [0, 0.065, 0]
          radius: 0.057

      # Collo cilindrico cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.125, 0]
          radius: 0.016
          height: 0.08
        right:
          type: "cylinder"
          center: [0, 0.122, 0]
          radius: 0.014
          height: 0.09

      # Bordo superiore
      - type: "torus"
        center: [0, 0.205, 0]
        major_radius: 0.0155
        minor_radius: 0.0015

      # Raccordo laterale (tubo di distillazione)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0.03, 0.16, 0]
          radius: 0.008
          height: 0.06
          rotate: [0, 0, 50]
        right:
          type: "cylinder"
          center: [0.03, 0.16, 0]
          radius: 0.006
          height: 0.07
          rotate: [0, 0, 50]

      # Sfera di raccordo alla giunzione
      - type: "sphere"
        center: [0.015, 0.155, 0]
        radius: 0.010

      # Fondo piatto (stabilità)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.025
        height: 0.005


  # ═══════════════════════════════════════════════════════════════════════
  #  MATRACCIO — Matraccio tarato con collo lungo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.10 × 0.26 m
  #  Struttura:  Corpo sferico cavo, fondo piatto (CSG sfera ∩
  #              cilindro → taglio base), collo lungo e stretto cavo,
  #              linea di taratura (torus sottilissimo), bordo,
  #              tappo in vetro smerigliato.
  #
  - name: "matraccio"
    material: "lab_pyrex"
    children:

      # Corpo sferico cavo con fondo piatto
      - type: "csg"
        operation: "subtraction"
        left:
          # Sfera tagliata sotto (fondo piatto)
          type: "csg"
          operation: "intersection"
          left:
            type: "sphere"
            center: [0, 0.060, 0]
            radius: 0.055
          right:
            type: "cylinder"
            center: [0, 0.040, 0]
            radius: 0.060
            height: 0.10
        right:
          # Cavità interna
          type: "csg"
          operation: "intersection"
          left:
            type: "sphere"
            center: [0, 0.060, 0]
            radius: 0.052
          right:
            type: "cylinder"
            center: [0, 0.042, 0]
            radius: 0.055
            height: 0.10

      # Collo lungo cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.115, 0]
          radius: 0.010
          height: 0.13
        right:
          type: "cylinder"
          center: [0, 0.112, 0]
          radius: 0.008
          height: 0.14

      # Bordo
      - type: "torus"
        center: [0, 0.245, 0]
        major_radius: 0.0098
        minor_radius: 0.0012

      # Linea di taratura (anello sottilissimo a metà collo)
      - type: "torus"
        center: [0, 0.18, 0]
        major_radius: 0.0105
        minor_radius: 0.0004

      # Tappo in vetro smerigliato
      - type: "cone"
        center: [0, 0.245, 0]
        radius: 0.0085
        top_radius: 0.006
        height: 0.015
        material: "lab_sughero"

      - type: "sphere"
        center: [0, 0.262, 0]
        radius: 0.008
        scale: [1.0, 0.55, 1.0]
        material: "lab_sughero"


  # ═══════════════════════════════════════════════════════════════════════
  #  BECHER — Becher cilindrico con beccuccio
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.08 × 0.11 m
  #  Struttura:  Cilindro cavo leggermente conico (CSG), beccuccio
  #              (deformazione suggerita con sfera sporgente), bordo,
  #              fondo spesso.
  #
  - name: "becher"
    material: "lab_pyrex"
    children:

      # Corpo cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 0, 0]
          radius: 0.038
          top_radius: 0.042
          height: 0.105
        right:
          type: "cone"
          center: [0, 0.004, 0]
          radius: 0.036
          top_radius: 0.040
          height: 0.106

      # Fondo spesso
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.038
        height: 0.004

      # Bordo
      - type: "torus"
        center: [0, 0.105, 0]
        major_radius: 0.041
        minor_radius: 0.0012

      # Beccuccio (protuberanza semicircolare al bordo)
      - type: "sphere"
        center: [0, 0.105, -0.041]
        radius: 0.008
        scale: [0.80, 0.40, 1.20]

      # Graduazioni suggerite (3 anelli sottili)
      - type: "torus"
        center: [0, 0.03, 0]
        major_radius: 0.0395
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.055, 0]
        major_radius: 0.040
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.08, 0]
        major_radius: 0.0410
        minor_radius: 0.0003


  # ═══════════════════════════════════════════════════════════════════════
  #  CILINDRO_GRADUATO — Cilindro alto con base esagonale
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.04 × 0.30 m
  #  Struttura:  Tubo cavo alto (CSG), base esagonale per stabilità
  #              (CSG cilindro ∩ 3 box), bordo con beccuccio, fondo
  #              spesso, graduazioni.
  #
  - name: "cilindro_graduato"
    material: "lab_pyrex"
    children:

      # ── Base esagonale (CSG) ───────────────────────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "intersection"
          left:
            type: "cylinder"
            center: [0, 0, 0]
            radius: 0.028
            height: 0.012
          right:
            type: "box"
            scale: [0.060, 0.014, 0.048]
            translate: [0, 0.006, 0]
        right:
          type: "csg"
          operation: "intersection"
          left:
            type: "box"
            scale: [0.060, 0.014, 0.048]
            translate: [0, 0.006, 0]
            rotate: [0, 60, 0]
          right:
            type: "box"
            scale: [0.060, 0.014, 0.048]
            translate: [0, 0.006, 0]
            rotate: [0, -60, 0]

      # ── Tubo cavo ─────────────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.012, 0]
          radius: 0.018
          height: 0.28
        right:
          type: "cylinder"
          center: [0, 0.016, 0]
          radius: 0.016
          height: 0.28

      # Fondo spesso
      - type: "cylinder"
        center: [0, 0.012, 0]
        radius: 0.018
        height: 0.004

      # Bordo superiore
      - type: "torus"
        center: [0, 0.292, 0]
        major_radius: 0.0175
        minor_radius: 0.0012

      # Beccuccio
      - type: "sphere"
        center: [0, 0.292, -0.018]
        radius: 0.005
        scale: [0.70, 0.40, 1.20]

      # Graduazioni (6 anelli)
      - type: "torus"
        center: [0, 0.06, 0]
        major_radius: 0.0185
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.105, 0]
        major_radius: 0.0185
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.15, 0]
        major_radius: 0.0185
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.195, 0]
        major_radius: 0.0185
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.24, 0]
        major_radius: 0.0185
        minor_radius: 0.0003
      - type: "torus"
        center: [0, 0.275, 0]
        major_radius: 0.0185
        minor_radius: 0.0003


  # ═══════════════════════════════════════════════════════════════════════
  #  IMBUTO — Imbuto conico con gambo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.10 × 0.16 m
  #  Struttura:  Cono cavo (CSG), gambo cilindrico cavo, raccordo,
  #              bordo arrotondato.
  #
  - name: "imbuto"
    material: "lab_pyrex"
    children:

      # Imbuto cavo
      - type: "csg"
        operation: "subtraction"
        left:
          type: "group"
          children:
            # Cono esterno (rovesciato: largo in alto)
            - type: "cone"
              center: [0, 0.06, 0]
              radius: 0.010
              top_radius: 0.050
              height: 0.08

            # Gambo esterno
            - type: "cylinder"
              center: [0, 0, 0]
              radius: 0.006
              height: 0.06

        right:
          type: "group"
          children:
            # Cono interno
            - type: "cone"
              center: [0, 0.062, 0]
              radius: 0.008
              top_radius: 0.048
              height: 0.08

            # Gambo interno
            - type: "cylinder"
              center: [0, -0.004, 0]
              radius: 0.005
              height: 0.07

      # Bordo superiore
      - type: "torus"
        center: [0, 0.14, 0]
        major_radius: 0.049
        minor_radius: 0.0015

      # Anello di rinforzo
      - type: "torus"
        center: [0, 0.10, 0]
        major_radius: 0.030
        minor_radius: 0.0010


  # ═══════════════════════════════════════════════════════════════════════
  #  MORTAIO_PESTELLO — Mortaio con pestello
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.12 × 0.10 m (mortaio), ~0.16 m (pestello)
  #  Struttura:  Mortaio: ciotola emisferica cava (CSG sfera − sfera,
  #              ∩ cilindro), base piatta, piede, beccuccio.
  #              Pestello: clava (cilindro manico + sfera punta).
  #
  #  Materiale default: lab_porcellana
  #
  - name: "mortaio_pestello"
    material: "lab_porcellana"
    children:

      # ── Mortaio (ciotola emisferica cava) ──────────────────────────────
      - type: "csg"
        operation: "intersection"
        left:
          type: "csg"
          operation: "subtraction"
          left:
            type: "sphere"
            center: [0, 0.02, 0]
            radius: 0.060
          right:
            type: "sphere"
            center: [0, 0.02, 0]
            radius: 0.054
        right:
          type: "cylinder"
          center: [0, 0.02, 0]
          radius: 0.065
          height: 0.08

      # Base piatta
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.035
        height: 0.005

      # Piede anulare
      - type: "torus"
        center: [0, 0.0, 0]
        major_radius: 0.032
        minor_radius: 0.004

      # Bordo superiore
      - type: "torus"
        center: [0, 0.075, 0]
        major_radius: 0.054
        minor_radius: 0.005

      # Beccuccio (piccola protuberanza)
      - type: "sphere"
        center: [0, 0.075, -0.058]
        radius: 0.008
        scale: [0.60, 0.45, 1.30]

      # ── Pestello (appoggiato nel mortaio, inclinato) ───────────────────
      # Manico
      - type: "cylinder"
        center: [0.02, 0.08, 0]
        radius: 0.010
        height: 0.11
        rotate: [0, 0, -20]

      # Punta a clava (sfera)
      - type: "sphere"
        center: [0.005, 0.06, 0]
        radius: 0.016

      # Impugnatura (sfera schiacciata in cima)
      - type: "sphere"
        center: [0.04, 0.18, 0]
        radius: 0.014
        scale: [1.0, 0.65, 1.0]


  # ═══════════════════════════════════════════════════════════════════════
  #  BUNSEN — Becco Bunsen con fiamma
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.05 × 0.20 m (con fiamma ~0.28 m)
  #  Struttura:  Base pesante (cilindro), presa gas laterale (cilindro
  #              + raccordo), camino (cilindro con fori d'aria → torus),
  #              collare regolatore (cilindro), fiamma doppia conica
  #              (cono esterno blu + cono interno luminoso).
  #
  #  Materiale default: lab_alluminio (base, camino)
  #
  - name: "bunsen"
    material: "lab_alluminio"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.050
        height: 0.015

      - type: "torus"
        center: [0, 0.015, 0]
        major_radius: 0.048
        minor_radius: 0.005

      # ── Presa gas laterale ─────────────────────────────────────────────
      - type: "cylinder"
        center: [0.03, 0.025, 0]
        radius: 0.006
        height: 0.030
        rotate: [0, 0, 90]
        material: "lab_ottone"

      # Raccordo (torus)
      - type: "torus"
        center: [0.048, 0.025, 0]
        major_radius: 0.007
        minor_radius: 0.003
        rotate: [90, 0, 0]
        material: "lab_ottone"

      # Tubo gomma (cilindro che scende)
      - type: "cylinder"
        center: [0.055, 0.012, 0]
        radius: 0.005
        height: 0.025
        material: "lab_gomma"

      # ── Camino ─────────────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.015, 0]
        radius: 0.014
        height: 0.12

      # Fori d'aria (2 torus ai lati, simulano aperture)
      - type: "torus"
        center: [0.014, 0.045, 0]
        major_radius: 0.006
        minor_radius: 0.002
        rotate: [0, 0, 90]
      - type: "torus"
        center: [-0.014, 0.045, 0]
        major_radius: 0.006
        minor_radius: 0.002
        rotate: [0, 0, 90]

      # ── Collare regolatore aria ────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.035, 0]
        radius: 0.018
        height: 0.020
        material: "lab_nero"

      - type: "torus"
        center: [0, 0.035, 0]
        major_radius: 0.019
        minor_radius: 0.003
        material: "lab_nero"

      # Bordo superiore camino
      - type: "torus"
        center: [0, 0.135, 0]
        major_radius: 0.013
        minor_radius: 0.003

      # ── Fiamma (doppio cono emissivo) ──────────────────────────────────
      # Cono esterno (blu)
      - type: "cone"
        center: [0, 0.135, 0]
        radius: 0.012
        top_radius: 0.0
        height: 0.07
        material: "lab_fiamma_blu"

      # Cono interno (più luminoso, più piccolo)
      - type: "cone"
        center: [0, 0.140, 0]
        radius: 0.006
        top_radius: 0.0
        height: 0.04
        material: "lab_fiamma_nucleo"


  # ═══════════════════════════════════════════════════════════════════════
  #  PORTAPROVETTE — Rack in legno per 6 provette
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.22 × 0.10 × 0.06 m
  #  Struttura:  2 pannelli paralleli con 6 fori passanti (CSG), 2
  #              pioli laterali di connessione, base d'appoggio.
  #
  #  Materiale default: lab_legno
  #
  - name: "portaprovette"
    material: "lab_legno"
    children:

      # ── Pannello superiore (con fori) ──────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "box"
          scale: [0.20, 0.010, 0.05]
          translate: [0, 0.090, 0]
        right:
          type: "group"
          children:
            - type: "cylinder"
              center: [-0.075, 0.082, 0]
              radius: 0.010
              height: 0.020
            - type: "cylinder"
              center: [-0.045, 0.082, 0]
              radius: 0.010
              height: 0.020
            - type: "cylinder"
              center: [-0.015, 0.082, 0]
              radius: 0.010
              height: 0.020
            - type: "cylinder"
              center: [0.015, 0.082, 0]
              radius: 0.010
              height: 0.020
            - type: "cylinder"
              center: [0.045, 0.082, 0]
              radius: 0.010
              height: 0.020
            - type: "cylinder"
              center: [0.075, 0.082, 0]
              radius: 0.010
              height: 0.020

      # ── Pannello inferiore (con fori più piccoli → appoggio) ───────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "box"
          scale: [0.20, 0.010, 0.05]
          translate: [0, 0.035, 0]
        right:
          type: "group"
          children:
            - type: "cylinder"
              center: [-0.075, 0.028, 0]
              radius: 0.006
              height: 0.020
            - type: "cylinder"
              center: [-0.045, 0.028, 0]
              radius: 0.006
              height: 0.020
            - type: "cylinder"
              center: [-0.015, 0.028, 0]
              radius: 0.006
              height: 0.020
            - type: "cylinder"
              center: [0.015, 0.028, 0]
              radius: 0.006
              height: 0.020
            - type: "cylinder"
              center: [0.045, 0.028, 0]
              radius: 0.006
              height: 0.020
            - type: "cylinder"
              center: [0.075, 0.028, 0]
              radius: 0.006
              height: 0.020

      # ── 2 pioli di connessione ─────────────────────────────────────────
      - type: "cylinder"
        center: [-0.095, 0.035, 0]
        radius: 0.006
        height: 0.060
      - type: "cylinder"
        center: [0.095, 0.035, 0]
        radius: 0.006
        height: 0.060

      # ── Base / piedini ─────────────────────────────────────────────────
      - type: "box"
        scale: [0.20, 0.008, 0.05]
        translate: [0, 0.004, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  MICROSCOPIO — Microscopio ottico semplificato
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.15 × 0.35 × 0.10 m
  #  Struttura:  Base pesante con piedini, stativo verticale (braccio),
  #              tavolino portaoggetti con foro, revolver porta-obiettivi
  #              (cilindro + 3 obiettivi cilindrici), tubo oculare,
  #              oculare (cilindro + lente).
  #
  #  Materiale default: lab_nero (corpo)
  #  Materiali espliciti: lab_cromo, lab_inox, lab_lente
  #
  - name: "microscopio"
    material: "lab_nero"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.12, 0.015, 0.08]
        translate: [0, 0.008, 0]

      # 4 piedini in gomma
      - type: "sphere"
        center: [-0.05, 0, -0.03]
        radius: 0.006
        scale: [1.2, 0.4, 1.2]
        material: "lab_gomma"
      - type: "sphere"
        center: [0.05, 0, -0.03]
        radius: 0.006
        scale: [1.2, 0.4, 1.2]
        material: "lab_gomma"
      - type: "sphere"
        center: [-0.05, 0, 0.03]
        radius: 0.006
        scale: [1.2, 0.4, 1.2]
        material: "lab_gomma"
      - type: "sphere"
        center: [0.05, 0, 0.03]
        radius: 0.006
        scale: [1.2, 0.4, 1.2]
        material: "lab_gomma"

      # ── Stativo (braccio verticale curvo) ──────────────────────────────
      - type: "box"
        scale: [0.030, 0.26, 0.025]
        translate: [0, 0.145, 0.025]

      # Curva alla sommità
      - type: "sphere"
        center: [0, 0.275, 0.020]
        radius: 0.020
        scale: [0.75, 0.80, 1.0]

      # ── Tavolino portaoggetti (con foro passante) ──────────────────────
      - type: "csg"
        operation: "subtraction"
        material: "lab_inox"
        left:
          type: "cylinder"
          center: [0, 0.12, -0.015]
          radius: 0.045
          height: 0.005
        right:
          type: "cylinder"
          center: [0, 0.115, -0.015]
          radius: 0.008
          height: 0.015

      # Pinze portavetrino (2 cilindri piatti)
      - type: "box"
        scale: [0.035, 0.003, 0.006]
        translate: [-0.025, 0.126, -0.015]
        material: "lab_inox"
      - type: "box"
        scale: [0.035, 0.003, 0.006]
        translate: [0.025, 0.126, -0.015]
        material: "lab_inox"

      # ── Condensatore sotto il tavolino ─────────────────────────────────
      - type: "cylinder"
        center: [0, 0.08, -0.015]
        radius: 0.018
        height: 0.035
        material: "lab_cromo"

      # Lente condensatore
      - type: "sphere"
        center: [0, 0.115, -0.015]
        radius: 0.012
        scale: [1.0, 0.35, 1.0]
        material: "lab_lente"

      # ── Revolver porta-obiettivi ───────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.20, -0.015]
        radius: 0.022
        height: 0.008
        material: "lab_cromo"

      # 3 obiettivi a ~120°
      # Obiettivo 1 (puntato verso il basso, attivo)
      - type: "cylinder"
        center: [0, 0.15, -0.015]
        radius: 0.008
        height: 0.05
        material: "lab_cromo"
      - type: "torus"
        center: [0, 0.155, -0.015]
        major_radius: 0.009
        minor_radius: 0.002
        material: "lab_cromo"

      # Obiettivo 2 (laterale destro)
      - type: "cylinder"
        center: [0.018, 0.17, -0.015]
        radius: 0.006
        height: 0.035
        rotate: [0, 0, 25]
        material: "lab_cromo"

      # Obiettivo 3 (laterale sinistro)
      - type: "cylinder"
        center: [-0.018, 0.17, -0.015]
        radius: 0.006
        height: 0.035
        rotate: [0, 0, -25]
        material: "lab_cromo"

      # ── Tubo oculare ──────────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.22, -0.015]
        radius: 0.016
        height: 0.10

      # Oculare
      - type: "cylinder"
        center: [0, 0.32, -0.015]
        radius: 0.018
        height: 0.020

      - type: "torus"
        center: [0, 0.34, -0.015]
        major_radius: 0.017
        minor_radius: 0.004
        material: "lab_gomma"

      # Lente oculare
      - type: "disk"
        center: [0, 0.34, -0.015]
        normal: [0, 1, 0]
        radius: 0.014
        material: "lab_lente"

      # ── Manopole di messa a fuoco ──────────────────────────────────────
      # Manopola macro (grande, destra)
      - type: "cylinder"
        center: [0.025, 0.18, 0.025]
        radius: 0.014
        height: 0.008
        rotate: [0, 0, 90]
        material: "lab_cromo"

      # Manopola micro (piccola, coassiale)
      - type: "cylinder"
        center: [0.035, 0.18, 0.025]
        radius: 0.010
        height: 0.006
        rotate: [0, 0, 90]
        material: "lab_cromo"


  # ═══════════════════════════════════════════════════════════════════════
  #  CONDENSATORE — Condensatore a riflusso (tubo in tubo)
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.04 × 0.30 m
  #  Struttura:  Tubo interno cavo (dove passano i vapori), camicia
  #              esterna cava (dove scorre l'acqua), 2 raccordi
  #              laterali per ingresso/uscita acqua, giunti conici
  #              (torus) alle estremità.
  #
  - name: "condensatore"
    material: "lab_pyrex"
    children:

      # ── Tubo interno cavo ──────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.008
          height: 0.30
        right:
          type: "cylinder"
          center: [0, -0.005, 0]
          radius: 0.006
          height: 0.32

      # ── Camicia esterna cava ───────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.04, 0]
          radius: 0.020
          height: 0.22
        right:
          type: "cylinder"
          center: [0, 0.035, 0]
          radius: 0.018
          height: 0.23

      # ── Raccordo inferiore acqua (ingresso) ────────────────────────────
      - type: "cylinder"
        center: [0.018, 0.06, 0]
        radius: 0.005
        height: 0.020
        rotate: [0, 0, 90]

      - type: "torus"
        center: [0.030, 0.06, 0]
        major_radius: 0.006
        minor_radius: 0.002
        rotate: [90, 0, 0]

      # ── Raccordo superiore acqua (uscita) ──────────────────────────────
      - type: "cylinder"
        center: [0.018, 0.24, 0]
        radius: 0.005
        height: 0.020
        rotate: [0, 0, 90]

      - type: "torus"
        center: [0.030, 0.24, 0]
        major_radius: 0.006
        minor_radius: 0.002
        rotate: [90, 0, 0]

      # ── Giunti conici alle estremità ───────────────────────────────────
      # Giunto inferiore
      - type: "cone"
        center: [0, -0.005, 0]
        radius: 0.012
        top_radius: 0.008
        height: 0.015

      - type: "torus"
        center: [0, -0.005, 0]
        major_radius: 0.011
        minor_radius: 0.002

      # Giunto superiore
      - type: "cone"
        center: [0, 0.30, 0]
        radius: 0.008
        top_radius: 0.012
        height: 0.015

      - type: "torus"
        center: [0, 0.315, 0]
        major_radius: 0.011
        minor_radius: 0.002


  # ═══════════════════════════════════════════════════════════════════════
  #  STORTA — Storta alchemica (pallone con collo curvo)
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.12 × 0.18 × 0.12 m
  #  Struttura:  Pallone sferico cavo, collo che sale e poi curva
  #              verso il basso (2 segmenti cilindrici + sfera di
  #              raccordo), punta aperta del becco.
  #
  - name: "storta"
    material: "lab_pyrex"
    children:

      # ── Pallone sferico cavo ───────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "sphere"
          center: [0, 0.055, 0]
          radius: 0.055
        right:
          type: "sphere"
          center: [0, 0.055, 0]
          radius: 0.052

      # Fondo piatto
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.030
        height: 0.004

      # ── Collo ascendente ───────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0.02, 0.10, 0]
          radius: 0.012
          height: 0.06
          rotate: [0, 0, 30]
        right:
          type: "cylinder"
          center: [0.02, 0.10, 0]
          radius: 0.010
          height: 0.07
          rotate: [0, 0, 30]

      # Raccordo sferico alla curva
      - type: "sphere"
        center: [0.050, 0.148, 0]
        radius: 0.014

      # ── Becco discendente ──────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0.07, 0.12, 0]
          radius: 0.010
          height: 0.08
          rotate: [0, 0, -40]
        right:
          type: "cylinder"
          center: [0.07, 0.12, 0]
          radius: 0.008
          height: 0.09
          rotate: [0, 0, -40]

      # Punta del becco (bordo)
      - type: "torus"
        center: [0.12, 0.07, 0]
        major_radius: 0.009
        minor_radius: 0.0012
        rotate: [0, 0, -40]


  # ═══════════════════════════════════════════════════════════════════════
  #  BILANCIA_ANALITICA — Bilancia a bracci
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~0.30 × 0.30 × 0.08 m
  #  Struttura:  Base con piedini regolabili, colonna centrale,
  #              fulcro (prisma a coltello → box sottile + sfera),
  #              braccio orizzontale (box sottile), 2 piatti sospesi
  #              (disco + 3 catenelle ciascuno), ago indicatore.
  #
  #  Materiale default: lab_ottone (braccio, piatti)
  #  Materiali espliciti: lab_nero, lab_inox, lab_cromo
  #
  - name: "bilancia_analitica"
    material: "lab_ottone"
    children:

      # ── Base ───────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.20, 0.012, 0.08]
        translate: [0, 0.006, 0]
        material: "lab_nero"

      # 4 piedini regolabili
      - type: "sphere"
        center: [-0.08, 0, -0.03]
        radius: 0.005
        scale: [1.0, 0.5, 1.0]
        material: "lab_inox"
      - type: "sphere"
        center: [0.08, 0, -0.03]
        radius: 0.005
        scale: [1.0, 0.5, 1.0]
        material: "lab_inox"
      - type: "sphere"
        center: [-0.08, 0, 0.03]
        radius: 0.005
        scale: [1.0, 0.5, 1.0]
        material: "lab_inox"
      - type: "sphere"
        center: [0.08, 0, 0.03]
        radius: 0.005
        scale: [1.0, 0.5, 1.0]
        material: "lab_inox"

      # ── Colonna centrale ───────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.012, 0]
        radius: 0.010
        height: 0.14
        material: "lab_cromo"

      # Decorazione colonna
      - type: "torus"
        center: [0, 0.02, 0]
        major_radius: 0.012
        minor_radius: 0.003
        material: "lab_cromo"

      # ── Fulcro (prisma a coltello) ─────────────────────────────────────
      - type: "sphere"
        center: [0, 0.155, 0]
        radius: 0.008
        material: "lab_cromo"

      # ── Braccio ────────────────────────────────────────────────────────
      - type: "box"
        scale: [0.28, 0.004, 0.008]
        translate: [0, 0.158, 0]

      # ── Ago indicatore (sottile, punta in basso) ───────────────────────
      - type: "box"
        scale: [0.002, 0.06, 0.001]
        translate: [0, 0.125, -0.006]
        material: "lab_cromo"

      # Scala graduata semicircolare (disco piccolo sulla colonna)
      - type: "disk"
        center: [0, 0.10, -0.012]
        normal: [0, 0, -1]
        radius: 0.018
        material: "lab_nero"

      # ── Piatto sinistro ────────────────────────────────────────────────
      # 3 catenelle
      - type: "cylinder"
        center: [-0.12, 0.135, 0.008]
        radius: 0.001
        height: 0.025
      - type: "cylinder"
        center: [-0.12, 0.135, -0.008]
        radius: 0.001
        height: 0.025
      - type: "cylinder"
        center: [-0.135, 0.135, 0]
        radius: 0.001
        height: 0.025

      # Piatto (disco)
      - type: "cylinder"
        center: [-0.125, 0.11, 0]
        radius: 0.035
        height: 0.002

      - type: "torus"
        center: [-0.125, 0.112, 0]
        major_radius: 0.034
        minor_radius: 0.002

      # ── Piatto destro ──────────────────────────────────────────────────
      - type: "cylinder"
        center: [0.12, 0.135, 0.008]
        radius: 0.001
        height: 0.025
      - type: "cylinder"
        center: [0.12, 0.135, -0.008]
        radius: 0.001
        height: 0.025
      - type: "cylinder"
        center: [0.135, 0.135, 0]
        radius: 0.001
        height: 0.025

      - type: "cylinder"
        center: [0.125, 0.11, 0]
        radius: 0.035
        height: 0.002

      - type: "torus"
        center: [0.125, 0.112, 0]
        major_radius: 0.034
        minor_radius: 0.002
