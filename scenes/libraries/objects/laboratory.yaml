# ============================================================================
# Libreria Oggetti — Laboratorio (Laboratory Equipment)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/laboratory.yaml" }]
#
# Vetreria, strumentazione e accessori da laboratorio chimico/fisico.
# Il vetro borosilicato (Pyrex) è il protagonista: trasparenza Disney
# spec_trans, IOR 1.47.
#
# ── Costruzione ──────────────────────────────────────────────────────────
#
#   La vetreria assi-simmetrica (beute, palloni, imbuti, matracci) è
#   generata con la primitiva `lathe`. I palloni di distillazione usano
#   un profilo Catmull-Rom che descrive in un'unica curva il bulbo
#   sferico e il collo cilindrico con raccordo C¹; beute e imbuti usano
#   un profilo Linear "andata-ritorno" per ottenere pareti sottili e
#   costanti in una sola primitiva, senza CSG. Solido vetro chiaro:
#   dato l'IOR del Pyrex (1.47), la trasparenza produce naturalmente
#   l'effetto ottico delle pareti sottili.
#
# ── Convenzioni ──────────────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità = metri. Una beuta è ~0.18 m alta.
#   VETRERIA      Pezzi assi-simmetrici: lathe a singolo profilo (solid
#                 se vetro trasparente, o guscio lathe+CSG se necessario).
#                 Per riempirli con un liquido, aggiungere un cilindro
#                 o sfera con materiale liquido all'interno, nella scena
#                 (non nel template, così il livello è libero).
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   PROVETTA                       Provetta con fondo emisferico cavo.
#                                  ~Ø 0.018 × 0.15 m.
#
#   BEUTA_ERLENMEYER       (lathe) Beuta conica: lathe Linear andata-
#                                  ritorno a parete sottile, collo e
#                                  labbro inclusi. ~Ø 0.10 × 0.18 m.
#
#   PALLONE_DISTILLAZIONE  (lathe) Pallone sferico: lathe Catmull-Rom
#                                  unico (bulbo + collo + labbro con
#                                  raccordo C¹). ~Ø 0.12 × 0.22 m.
#
#   MATRACCIO                      Matraccio tarato con corpo sferico,
#                                  fondo piatto e collo lungo e stretto.
#                                  ~Ø 0.10 × 0.26 m.
#
#   BECHER                         Becher cilindrico cavo con beccuccio
#                                  e graduazioni suggerite. ~Ø 0.08 × 0.11 m.
#
#   CILINDRO_GRADUATO              Cilindro graduato alto e stretto con
#                                  base esagonale. ~Ø 0.04 × 0.30 m.
#
#   IMBUTO                 (lathe) Imbuto conico: lathe Linear andata-
#                                  ritorno con gambo lungo rastremato.
#                                  ~Ø 0.10 × 0.16 m.
#
#   MORTAIO_PESTELLO               Mortaio emisferico in ceramica con
#                                  pestello a clava. ~Ø 0.12 × 0.10 m.
#
#   BUNSEN                         Becco Bunsen con base, camino, presa
#                                  d'aria e fiamma emissiva.
#                                  ~Ø 0.05 × 0.20 m.
#
#   PORTAPROVETTE                  Portaprovette in legno per 6 provette,
#                                  con pioli e base. ~0.22 × 0.10 × 0.06 m.
#
#   MICROSCOPIO                    Microscopio ottico semplificato con
#                                  base, stativo, tavolino, revolver,
#                                  obiettivi e oculare. ~0.15 × 0.35 × 0.10 m.
#
#   CONDENSATORE                   Condensatore a riflusso (tubo in tubo)
#                                  con raccordi laterali per acqua.
#                                  ~Ø 0.04 × 0.30 m.
#
#   STORTA                         Storta alchemica: pallone con collo
#                                  curvo discendente. ~0.12 × 0.18 × 0.12 m.
#
#   BILANCIA_ANALITICA             Bilancia a bracci con fulcro, piatti
#                                  sospesi e base con piedini.
#                                  ~0.30 × 0.30 × 0.08 m.
#
# ============================================================================


