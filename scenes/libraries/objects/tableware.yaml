  # Terracotta smaltata — piatti rustici
  - id: "tbw_terracotta"
    type: "disney"
    color: [0.65, 0.35, 0.18]
    roughness: 0.55
    metallic: 0.0
    specular: 0.30
    clearcoat: 0.15
    coat_roughness: 0.50

  # ── Metalli da tavola ──────────────────────────────────────────────────

  # Argento sterling — posate formali
  - id: "tbw_argento"
    type: "disney"
    color: [0.97, 0.96, 0.92]
    metallic: 1.0
    roughness: 0.05
    specular: 0.90

  # Acciaio inox — posate moderne
  - id: "tbw_inox"
    type: "disney"
    color: [0.58, 0.57, 0.55]
    metallic: 1.0
