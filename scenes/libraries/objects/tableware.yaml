    specular: 0.75

  # Oro (bordo decorativo)
  - id: "tbw_oro"
    type: "disney"
    color: [1.0, 0.71, 0.29]
    metallic: 1.0
    roughness: 0.08
    specular: 0.80

  # Rame — caffettiera, pentole
  - id: "tbw_rame"
    type: "disney"
    color: [0.95, 0.64, 0.54]
    metallic: 1.0
    roughness: 0.10
    specular: 0.75

  # Ghisa smaltata — teiera giapponese
  - id: "tbw_ghisa"
    type: "disney"
    color: [0.06, 0.06, 0.07]
    metallic: 0.80
    roughness: 0.65
    specular: 0.35

  # ── Legno ──────────────────────────────────────────────────────────────

  # Bambù — sottobicchieri, manici
  - id: "tbw_bambu"
    type: "disney"
    color: [0.70, 0.58, 0.35]
    roughness: 0.42
    metallic: 0.0
    specular: 0.30
    clearcoat: 0.10
    coat_roughness: 0.55

  # ── Tessuto ────────────────────────────────────────────────────────────

  # Lino bianco — tovagliolo, tovaglia
  - id: "tbw_lino"
    type: "disney"
