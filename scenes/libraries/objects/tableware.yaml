# ============================================================================
# Libreria Oggetti — Stoviglie e Tavola (Tableware)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/tableware.yaml" }]
#
# Oggetti per la tavola e la cucina: bicchieri, calici, tazze, piatti,
# bottiglie, caraffe, teiere, posate.
#
# ── Costruzione ──────────────────────────────────────────────────────────
#
#   I corpi assi-simmetrici (calici, bottiglie, decanter) sono generati
#   con la primitiva `lathe` a profilo Catmull-Rom: un singolo profilo 2D
#   `(r, y)` produce una silhouette C¹ continua che stacchi di sfere/coni/
#   torus non possono ottenere (niente discontinuità di normale al
#   raccordo fra segmenti). Gli elementi non-simmetrici (manici, bordi
#   decorati, beccucci, manici cucchiaio) restano in CSG / torus / mezzo-
#   torus. Vedi Capitolo 11 del tutorial per le basi del lathe.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Prefisso ID:  tbw_   (tableware)
#
#   Per vetri, cristalli e liquidi più specifici, importa anche
#   libraries/glasses.yaml e libraries/foods.yaml nella scena.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità ≈ metri. Un bicchiere da vino è ~0.22 m alto,
#                 un piatto ~0.26 m di diametro.
#   DETTAGLIO     Livello professionale: profili lathe per i corpi torniti,
#                 torus per bordi e filetti, CSG per manici e beccucci.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   BICCHIERE_VINO   (lathe)  Calice da vino elegante generato da un
#                             unico profilo Catmull-Rom: piede, stelo con
#                             nodo tornito, coppa ovoidale aperta.
#                             ~Ø 0.08 × 0.22 m.
#
#   CALICE_CRISTALLO (lathe)  Calice solenne a coppa profonda con doppio
#                             nodo sullo stelo, bordo dorato (torus).
#                             ~Ø 0.09 × 0.20 m.
#
#   TUMBLER                   Bicchiere basso conico da whisky con
#                             fondo spesso e pareti rastremate.
#                             ~Ø 0.08 × 0.10 m.
#
#   TAZZA_CAFFE               Tazza da caffè con manico ad orecchio,
#                             corpo cilindrico cavo e piattino.
#                             ~Ø 0.12 × 0.10 m (con piattino).
#
#   PIATTO_PIANO              Piatto da portata con tesa, cavetto e
#                             specchio, tutto cavo tramite CSG.
#                             ~Ø 0.26 × 0.025 m.
#
#   BOTTIGLIA_VINO   (lathe)  Bordolese classica (corpo + spalla + collo
#                             + labbro) generata da un unico profilo
#                             Catmull-Rom; punt sottrattivo CSG separato.
#                             ~Ø 0.08 × 0.32 m.
#
#   DECANTER         (lathe)  Decanter in cristallo con pancia bombata e
#                             collo alto svasato, profilo Catmull-Rom.
#                             ~Ø 0.18 × 0.28 m.
#
#   CARAFFA                   Caraffa in vetro con corpo bombato,
#                             collo stretto, beccuccio e manico.
#                             ~Ø 0.14 × 0.28 m.
#
#   TEIERA                    Teiera classica con corpo sferico cavo,
#                             beccuccio, manico e coperchio con pomello.
#                             ~Ø 0.22 × 0.16 m.
#
#   ZUCCHERIERA               Ciotola con coperchio a cupola e pomello,
#                             due manici laterali ad orecchio.
#                             ~Ø 0.12 × 0.12 m.
#
#   CUCCHIAIO                 Cucchiaio da tavola con manico sagomato
#                             e paletta emisferica concava.
#                             ~0.04 × 0.005 × 0.19 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI — Default per stoviglie
# ═══════════════════════════════════════════════════════════════════════════

