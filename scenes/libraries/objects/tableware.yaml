# ============================================================================
# Libreria Oggetti — Stoviglie e Tavola (Tableware)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/tableware.yaml" }]
#
# Oggetti per la tavola e la cucina: bicchieri, calici, tazze, piatti,
# bottiglie, caraffe, teiere, posate. Ogni pezzo sfrutta al massimo
# la CSG per i volumi cavi, i torus per i bordi e i raccordi, gli
# ellissoidi per le forme organiche.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Prefisso ID:  tbw_   (tableware)
#
#   Per vetri, cristalli e liquidi più specifici, importa anche
#   libraries/glasses.yaml e libraries/foods.yaml nella scena.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità ≈ metri. Un bicchiere da vino è ~0.22 m alto,
#                 un piatto ~0.26 m di diametro.
#   DETTAGLIO     Livello professionale: pareti sottili (CSG), steli
#                 torniti, manici sagomati (mezzo-torus), beccucci.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   BICCHIERE_VINO          Calice da vino con piede, stelo tornito
#                           e coppa cava a profilo ellissoidale.
#                           ~Ø 0.08 × 0.22 m.
#
#   CALICE_CRISTALLO        Calice solenne con coppa profonda, stelo
#                           decorato e piede sfaccettato.
#                           ~Ø 0.09 × 0.20 m.
#
#   TUMBLER                 Bicchiere basso conico da whisky con
#                           fondo spesso e pareti rastremate.
#                           ~Ø 0.08 × 0.10 m.
#
#   TAZZA_CAFFE             Tazza da caffè con manico ad orecchio,
#                           corpo cilindrico cavo e piattino.
#                           ~Ø 0.12 × 0.10 m (con piattino).
#
#   PIATTO_PIANO            Piatto da portata con tesa, cavetto e
#                           specchio, tutto cavo tramite CSG.
#                           ~Ø 0.26 × 0.025 m.
#
#   BOTTIGLIA_VINO          Bottiglia bordolese classica con corpo,
#                           spalla conica, collo cilindrico e labbro.
#                           ~Ø 0.08 × 0.32 m.
#
#   CARAFFA                 Caraffa in vetro con corpo bombato,
#                           collo stretto, beccuccio e manico.
#                           ~Ø 0.14 × 0.28 m.
#
#   TEIERA                  Teiera classica con corpo sferico cavo,
#                           beccuccio, manico e coperchio con pomello.
#                           ~Ø 0.22 × 0.16 m.
#
#   ZUCCHERIERA             Ciotola con coperchio a cupola e pomello,
#                           due manici laterali ad orecchio.
#                           ~Ø 0.12 × 0.12 m.
#
#   CUCCHIAIO               Cucchiaio da tavola con manico sagomato
#                           e paletta emisferica concava.
#                           ~0.04 × 0.005 × 0.19 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI — Default per stoviglie
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Vetro e cristallo ──────────────────────────────────────────────────

  # Cristallo da tavola — alto IOR per fuoco e brillantezza
  - id: "tbw_cristallo"
    type: "disney"
    color: [0.97, 0.97, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.62
    specular: 0.90

  # Vetro soda-lime — bicchieri comuni
  - id: "tbw_vetro"
    type: "dielectric"
    refraction_index: 1.52

  # Vetro verde bottiglia
  - id: "tbw_vetro_verde"
    type: "disney"
    color: [0.18, 0.52, 0.20]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52
    specular: 0.78

  # ── Ceramica e porcellana ──────────────────────────────────────────────

  # Porcellana bianca — bone china
  - id: "tbw_porcellana"
    type: "disney"
    color: [0.96, 0.94, 0.90]
    roughness: 0.10
    metallic: 0.0
    specular: 0.60
    clearcoat: 0.50
    coat_roughness: 0.10

  # Porcellana avorio — tono più caldo
  - id: "tbw_porcellana_avorio"
