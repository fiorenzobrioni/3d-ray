        rotate: [0, 0, 90]
        material: "chs_ottone"
      - type: "cylinder"
        center: [0.08, 0.06, 0.10]
        radius: 0.004
        height: 0.025
        rotate: [0, 0, 90]
        material: "chs_ottone"

      # ── Chiusura frontale ──────────────────────────────────────────────
      - type: "box"
        scale: [0.025, 0.015, 0.005]
