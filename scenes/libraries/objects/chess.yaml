# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — Pezzi Staunton
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  PEDONE — Il più semplice, profilo classico tornito (lathe)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "pedone_staunton"
    material: "chs_legno_chiaro"
    children:

      # Feltro base
      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.014
        material: "chs_feltro"

      # ── Corpo tornito: base + collarino + stelo + collo + testa ────────
      # Un unico lathe Catmull-Rom descrive l'intero pezzo Staunton
      # standard con silhouette C¹ continua dall'appoggio fino al pomo.
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.014, 0.000]   # bordo esterno della base
          - [0.014, 0.005]
          - [0.0135, 0.009]  # collarino base (toro)
          - [0.012, 0.011]
          - [0.009, 0.015]
          - [0.006, 0.019]   # inizio stelo
          - [0.005, 0.025]   # stelo sottile
          - [0.005, 0.030]
          - [0.007, 0.033]   # collarino sotto la testa
          - [0.006, 0.036]
          - [0.010, 0.040]   # equatore testa
          - [0.009, 0.045]
          - [0.005, 0.048]
          - [0.000, 0.050]   # chiusura sull'asse (apice testa)


  # ═══════════════════════════════════════════════════════════════════════
  #  TORRE — Torrione con merlatura (lathe + CSG)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "torre_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # ── Corpo tornito fino alla base del torrione (lathe Catmull-Rom) ──
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.016, 0.000]   # bordo base
          - [0.016, 0.006]
          - [0.0155, 0.009]  # collarino base
          - [0.014, 0.012]
          - [0.011, 0.016]   # cono di transizione
          - [0.008, 0.019]
          - [0.007, 0.024]   # stelo
          - [0.007, 0.032]
          - [0.009, 0.035]   # collarino sotto il torrione
          - [0.008, 0.038]
          - [0.010, 0.040]
          - [0.013, 0.052]   # torrione che si allarga verso l'alto
          - [0.013, 0.055]   # base della merlatura

      # ── Merlatura (CSG: cilindro pieno − 4 tacche) ────────────────────
      # Il right child è una CSG union dei due box a croce: la CSG
      # subtraction non accetta un `group` come figlio (CreateEntity
      # riconosce solo primitive o CSG annidate), quindi si compone
      # l'unione esplicitamente.
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.059, 0]
          radius: 0.013
          height: 0.008
        right:
          # Unione delle 2 tacche rettangolari a 90° → croce passante
          type: "csg"
          operation: "union"
          left:
            type: "box"
            scale: [0.030, 0.006, 0.006]
            translate: [0, 0.063, 0]
          right:
            type: "box"
            scale: [0.006, 0.006, 0.030]
            translate: [0, 0.063, 0]

      # Cavità interna del torrione (CSG)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.058, 0]
          radius: 0.011
          height: 0.005
        right:
          type: "cylinder"
          center: [0, 0.056, 0]
          radius: 0.009
          height: 0.005


  # ═══════════════════════════════════════════════════════════════════════
  #  ALFIERE — Mitra con fenditura e pomo (lathe + CSG)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "alfiere_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # ── Corpo tornito: base + stelo + raccordo alla mitra (lathe) ──────
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.016, 0.000]   # bordo base
          - [0.016, 0.006]
          - [0.0155, 0.009]  # collarino base
          - [0.014, 0.012]
          - [0.010, 0.016]
          - [0.007, 0.021]   # inizio stelo (raggio più piccolo)
          - [0.006, 0.030]   # stelo sottile
          - [0.006, 0.039]
          - [0.008, 0.042]   # collarino sotto la mitra
          - [0.007, 0.045]
          - [0.008, 0.046]   # attacco alla mitra

      # ── Mitra (ellissoide allungato con fenditura diagonale, CSG) ──────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "sphere"
          translate: [0, 0.058, 0]
          radius: 0.012
          scale: [1.0, 1.40, 1.0]
        right:
          # Fenditura diagonale (box sottile inclinato)
          type: "box"
          scale: [0.030, 0.002, 0.030]
          translate: [0.0066, 0.066, 0]
          rotate: [0, 0, 35]

      # Pomo sferico in cima
      - type: "sphere"
        center: [0, 0.076, 0]
        radius: 0.004


  # ═══════════════════════════════════════════════════════════════════════
  #  CAVALLO — Testa di cavallo stilizzata
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  La forma del cavallo è la più complessa: collo ellissoidale,
  #  testa allungata, orecchie, muso. Uso di sfere scalate e CSG
  #  per scolpire la silhouette.
  #
  - name: "cavallo_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.016
        height: 0.006
      - type: "torus"
        center: [0, 0.006, 0]
        major_radius: 0.0155
        minor_radius: 0.003

      # Cono transizione
      - type: "cone"
        center: [0, 0.009, 0]
        radius: 0.014
        top_radius: 0.008
        height: 0.010

      # Collare
      - type: "torus"
        center: [0, 0.019, 0]
        major_radius: 0.010
        minor_radius: 0.003

      # ── Collo (ellissoide inclinato in avanti) ─────────────────────────
      - type: "sphere"
        translate: [0, 0.035, -0.004]
        radius: 0.012
        scale: [0.75, 1.80, 0.90]
        rotate: [10, 0, 0]

      # ── Testa (ellissoide allungato in Z, inclinato) ───────────────────
      - type: "sphere"
        translate: [0, 0.052, -0.012]
        radius: 0.010
        scale: [0.70, 0.65, 1.40]
        rotate: [30, 0, 0]

      # ── Muso (sfera schiacciata sporgente) ─────────────────────────────
      - type: "sphere"
        translate: [0, 0.046, -0.024]
        radius: 0.007
        scale: [0.70, 0.55, 1.10]

      # ── Orecchie (2 sfere piccole allungate) ──────────────────────────
      - type: "sphere"
        translate: [-0.004, 0.060, -0.006]
        radius: 0.003
        scale: [0.60, 1.80, 0.70]
      - type: "sphere"
        translate: [0.004, 0.060, -0.006]
        radius: 0.003
        scale: [0.60, 1.80, 0.70]

      # ── Criniera (cresta lungo il collo) ───────────────────────────────
      - type: "sphere"
        translate: [0, 0.048, 0.004]
        radius: 0.005
        scale: [0.30, 1.60, 0.80]

      # ── Occhi (2 sfere minuscole scure) ────────────────────────────────
      - type: "sphere"
        translate: [-0.007, 0.052, -0.016]
        radius: 0.0015
        material: "chs_ebano"
      - type: "sphere"
        translate: [0.007, 0.052, -0.016]
        radius: 0.0015
        material: "chs_ebano"


  # ═══════════════════════════════════════════════════════════════════════
  #  REGINA — Corona con coronet e globo (lathe + CSG)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "regina_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.017
        material: "chs_feltro"

      # ── Corpo tornito (lathe): base + stelo + coppa corona svasata ─────
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.017, 0.000]   # bordo base
          - [0.017, 0.007]
          - [0.0165, 0.011]  # collarino base
          - [0.015, 0.014]
          - [0.011, 0.018]
          - [0.008, 0.024]   # inizio stelo
          - [0.006, 0.035]   # stelo sottile
          - [0.006, 0.046]
          - [0.008, 0.050]   # collarino inferiore corona
          - [0.007, 0.053]
          - [0.010, 0.055]   # base coppa corona
          - [0.014, 0.068]   # svasatura superiore (bordo su cui posa il coronet)
          - [0.014, 0.072]   # faccia piana superiore
          - [0.013, 0.072]   # collarino superiore (raccordo)
          - [0.013, 0.074]

      # ── Coronet (8 punte — sfere piccole sul bordo) ────────────────────
      - type: "sphere"
        center: [0.013, 0.074, 0]
        radius: 0.003
      - type: "sphere"
        center: [-0.013, 0.074, 0]
        radius: 0.003
      - type: "sphere"
        center: [0, 0.074, 0.013]
        radius: 0.003
      - type: "sphere"
        center: [0, 0.074, -0.013]
        radius: 0.003
      - type: "sphere"
        center: [0.0092, 0.074, 0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [-0.0092, 0.074, 0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [0.0092, 0.074, -0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [-0.0092, 0.074, -0.0092]
        radius: 0.0025

      # Globo sommitale
      - type: "sphere"
        center: [0, 0.082, 0]
        radius: 0.005


  # ═══════════════════════════════════════════════════════════════════════
  #  RE — Il più alto, corona con croce (lathe + CSG)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "re_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.018
        material: "chs_feltro"

      # ── Corpo tornito fino al cuscino (lathe Catmull-Rom) ──────────────
      # Profilo completo: base, stelo lungo, corpo corona svasato,
      # collarino superiore, fascia della corona, cuscino appiattito.
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.018, 0.000]   # bordo base (la più larga)
          - [0.018, 0.007]
          - [0.0175, 0.011]  # collarino base
          - [0.016, 0.014]
          - [0.012, 0.018]
          - [0.009, 0.024]   # inizio stelo
          - [0.007, 0.034]   # stelo lungo
          - [0.007, 0.048]
          - [0.009, 0.052]   # collarino sotto la corona
          - [0.008, 0.055]
          - [0.011, 0.057]   # base della coppa corona
          - [0.015, 0.072]   # svasatura verso l'alto
          - [0.014, 0.078]   # collarino superiore
          - [0.013, 0.081]
          - [0.011, 0.085]   # inizio cuscino
          - [0.010, 0.087]   # cuscino schiacciato (semi-ellissoide)
          - [0.005, 0.089]
          - [0.000, 0.090]   # chiusura sull'asse (apice cuscino)

      # ── Croce pattée ──────────────────────────────────────────────────
      # Stelo verticale
      - type: "cylinder"
        center: [0, 0.085, 0]
        radius: 0.002
        height: 0.012

      # Braccio orizzontale
      - type: "cylinder"
        center: [0, 0.093, 0]
        radius: 0.002
        height: 0.010
        rotate: [0, 0, 90]

      # Sfera al centro della croce
      - type: "sphere"
        center: [0, 0.093, 0]
        radius: 0.003


  # ═══════════════════════════════════════════════════════════════════════
  #  SCACCHIERA_LEGNO — Scacchiera classica in legno
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Piano 8×8 con texture checker, cornice in mogano.
  #  Le case sono 0.05 × 0.05 m, piano totale 0.40 m.
  #  Checker scale=4.0 su un box 0.40 m → 8×8 case.
  #
  - name: "scacchiera_legno"
    material: "chs_mogano"
    children:

      # ── Cornice esterna ────────────────────────────────────────────────
      - type: "box"
        scale: [0.46, 0.025, 0.46]
        translate: [0, 0.0125, 0]

      # Bordo arrotondato
      - type: "-torus"
        center: [0, 0.025, 0]
        major_radius: 0.225
        minor_radius: 0.006
        scale: [1.02, 1.0, 1.02]

      # ── Piano di gioco (checker) ───────────────────────────────────────
      # Box 0.40 × 0.40, centrato, con checker scale=4.0
      # (4 periodi checker = 8 strisce per lato)
      - type: "box"
        scale: [0.40, 0.006, 0.40]
        translate: [0, 0.028, 0]
        material: "chs_checker_legno"

      # Filetto (torus sottile al bordo del piano)
      - type: "-torus"
        center: [0, 0.031, 0]
        major_radius: 0.198
        minor_radius: 0.002
        scale: [1.01, 1.0, 1.01]

      # Piedini (4 sfere schiacciate)
      - type: "sphere"
        translate: [-0.20, 0, -0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        translate: [0.20, 0, -0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        translate: [-0.20, 0, 0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        translate: [0.20, 0, 0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]


