    specular: 0.70

  # Checker vetro moderno (chiaro/scuro)
  - id: "chs_checker_vetro"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 4.0
      colors: [[0.90, 0.90, 0.92], [0.15, 0.15, 0.18]]

  # ── Cornici e scatole ──────────────────────────────────────────────────

  # Mogano — cornice scacchiera, scatola
  - id: "chs_mogano"
    type: "disney"
    color: [0.35, 0.14, 0.07]
    roughness: 0.25
    metallic: 0.0
    specular: 0.50
    clearcoat: 0.40
    coat_roughness: 0.18

  # Noce — cornice alternativa
  - id: "chs_noce"
    type: "disney"
    color: [0.30, 0.18, 0.10]
    roughness: 0.30
