        height: 0.003


  # ═══════════════════════════════════════════════════════════════════════
  #  SCATOLA_SCACCHI — Scatola porta-pezzi classica
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Scatola rettangolare in mogano con coperchio incernierato aperto,
  #  interno in velluto verde con separatore centrale, cerniere e
  #  chiusura in ottone.
  #
  - name: "scatola_scacchi"
    material: "chs_mogano"
    children:

      # ── Base (box cavo) ────────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "box"
          scale: [0.28, 0.06, 0.20]
          translate: [0, 0.03, 0]
        right:
          type: "box"
          scale: [0.27, 0.055, 0.19]
          translate: [0, 0.033, 0]

      # Interno velluto
      - type: "box"
        scale: [0.268, 0.002, 0.188]
        translate: [0, 0.006, 0]
        material: "chs_velluto"

      # Separatore centrale
      - type: "box"
        scale: [0.005, 0.048, 0.186]
        translate: [0, 0.030, 0]
        material: "chs_velluto"

      # Bordo superiore
      - type: "torus"
        center: [0, 0.06, 0]
        major_radius: 0.135
        minor_radius: 0.004
        scale: [1.04, 1.0, 0.74]

      # ── Coperchio aperto (inclinato all'indietro) ──────────────────────
      - type: "box"
        scale: [0.28, 0.008, 0.20]
        translate: [0, 0.082, 0.086]
        rotate: [-25, 0, 0]

      # Interno coperchio
      - type: "box"
        scale: [0.27, 0.003, 0.188]
        translate: [0, 0.080, 0.085]
        rotate: [-25, 0, 0]
        material: "chs_velluto"

      # ── Cerniere (2 cilindri in ottone) ────────────────────────────────
      - type: "cylinder"
        center: [-0.08, 0.06, 0.10]
        radius: 0.004
        height: 0.025
        rotate: [0, 0, 90]
        material: "chs_ottone"
      - type: "cylinder"
        center: [0.08, 0.06, 0.10]
        radius: 0.004
        height: 0.025
        rotate: [0, 0, 90]
        material: "chs_ottone"

      # ── Chiusura frontale ──────────────────────────────────────────────
      - type: "box"
        scale: [0.025, 0.015, 0.005]
        translate: [0, 0.052, -0.102]
        material: "chs_ottone"
      - type: "sphere"
        center: [0, 0.052, -0.108]
        radius: 0.004
        material: "chs_ottone"

      # Piedini
      - type: "sphere"
        center: [-0.12, 0, -0.08]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
      - type: "sphere"
        center: [0.12, 0, -0.08]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
      - type: "sphere"
        center: [-0.12, 0, 0.08]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]
      - type: "sphere"
        center: [0.12, 0, 0.08]
        radius: 0.006
        scale: [1.0, 0.4, 1.0]


  # ═══════════════════════════════════════════════════════════════════════
  #  SCATOLA_SCACCHI_LUSSO — Cofanetto rivestito in pelle
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Cofanetto più grande rivestito in pelle con angolari dorati,
  #  interno in velluto con 2 vaschette e separatori.
  #
  - name: "scatola_scacchi_lusso"
    material: "chs_pelle"
    children:

      # ── Base (box cavo) ────────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "box"
          scale: [0.32, 0.07, 0.22]
          translate: [0, 0.035, 0]
        right:
          type: "box"
          scale: [0.31, 0.065, 0.21]
          translate: [0, 0.038, 0]

      # Interno velluto
      - type: "box"
        scale: [0.308, 0.002, 0.208]
        translate: [0, 0.008, 0]
        material: "chs_velluto"

      # Separatore centrale
      - type: "box"
        scale: [0.005, 0.058, 0.206]
        translate: [0, 0.035, 0]
        material: "chs_velluto"

      # 2 separatori trasversali per lato
      - type: "box"
        scale: [0.148, 0.005, 0.050]
        translate: [-0.078, 0.035, -0.05]
        material: "chs_velluto"
      - type: "box"
        scale: [0.148, 0.005, 0.050]
        translate: [-0.078, 0.035, 0.05]
        material: "chs_velluto"
      - type: "box"
        scale: [0.148, 0.005, 0.050]
        translate: [0.078, 0.035, -0.05]
        material: "chs_velluto"
      - type: "box"
        scale: [0.148, 0.005, 0.050]
        translate: [0.078, 0.035, 0.05]
        material: "chs_velluto"

      # ── Angolari dorati (8 sfere agli angoli) ──────────────────────────
      - type: "sphere"
        center: [-0.16, 0.005, -0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [0.16, 0.005, -0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [-0.16, 0.005, 0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [0.16, 0.005, 0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [-0.16, 0.07, -0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [0.16, 0.07, -0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [-0.16, 0.07, 0.11]
        radius: 0.008
        material: "chs_ottone"
      - type: "sphere"
        center: [0.16, 0.07, 0.11]
        radius: 0.008
        material: "chs_ottone"

      # ── Coperchio aperto ───────────────────────────────────────────────
      - type: "box"
        scale: [0.32, 0.010, 0.22]
        translate: [0, 0.098, 0.094]
        rotate: [-22, 0, 0]

      # Interno coperchio (seta/velluto)
      - type: "box"
        scale: [0.31, 0.003, 0.208]
        translate: [0, 0.096, 0.093]
        rotate: [-22, 0, 0]
        material: "chs_velluto"

      # ── Cerniere dorate ────────────────────────────────────────────────
      - type: "cylinder"
