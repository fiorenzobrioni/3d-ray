# ============================================================================
# Libreria Oggetti — Scacchi (Chess)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/chess.yaml" }]
#
# Set Staunton completo (6 pezzi), 3 scacchiere e 2 scatole porta-pezzi.
# I pezzi sono progettati per funzionare con il material override:
# istanzia con material: "chs_legno_chiaro" per i bianchi e
# "chs_ebano" per i neri.
#
# ── Costruzione ──────────────────────────────────────────────────────────
#
#   I pezzi Staunton sono nati come oggetti tornio-canonici (sono
#   letteralmente "turned" al tornio nella fabbricazione reale), per
#   questo tutto il corpo centrale è generato da un singolo `lathe`
#   Catmull-Rom che descrive in un'unica curva C¹ la base modanata, il
#   collarino, lo stelo, il collo e il nodo/testa. Gli ornamenti
#   non-simmetrici (merlatura della torre, mitra fessa dell'alfiere,
#   coronet a 8 punte della regina, corona + croce pattée del re)
#   restano in CSG. Il cavallo non è tornito ed è tenuto in sfere
#   scalate come da versione originale.
#
# ── Scala ────────────────────────────────────────────────────────────────
#
#   Pezzi proporzionati allo standard Staunton:
#     Re ~0.095 m, Regina ~0.085 m, Alfiere ~0.072 m,
#     Cavallo ~0.062 m, Torre ~0.048 m, Pedone ~0.046 m.
#   Le scacchiere hanno case da 0.05 m → lato 0.40 m.
#
# ── Uso tipico ───────────────────────────────────────────────────────────
#
#   imports:
#     - path: "libraries/chess.yaml"
#   entities:
#     - type: "instance"
#       template: "scacchiera_legno"
#       translate: [0, 0.80, 0]             # su un tavolo
#     - type: "instance"
#       template: "re_staunton"
#       material: "chs_legno_chiaro"
#       translate: [-0.025, 0.835, -0.175]  # casella e1
#     - type: "instance"
#       template: "re_staunton"
#       material: "chs_ebano"
#       translate: [-0.025, 0.835, 0.175]   # casella e8
#
# ── Catalogo ─────────────────────────────────────────────────────────────
#
#   PEDONE_STAUNTON   (lathe) ~Ø 0.028 × 0.046 m
#   TORRE_STAUNTON    (lathe) ~Ø 0.030 × 0.048 m   (+ merlatura CSG)
#   ALFIERE_STAUNTON  (lathe) ~Ø 0.030 × 0.072 m   (+ mitra fessa CSG)
#   CAVALLO_STAUNTON          ~0.032 × 0.062 × 0.028 m
#   REGINA_STAUNTON   (lathe) ~Ø 0.032 × 0.085 m   (+ coronet 8 punte)
#   RE_STAUNTON       (lathe) ~Ø 0.032 × 0.095 m   (+ corona, croce pattée)
#   SCACCHIERA_LEGNO          ~0.46 × 0.035 × 0.46 m
#   SCACCHIERA_MARMO          ~0.48 × 0.030 × 0.48 m
#   SCACCHIERA_MODERNA        ~0.44 × 0.020 × 0.44 m
#   SCATOLA_SCACCHI           ~0.30 × 0.10 × 0.22 m
#   SCATOLA_SCACCHI_LUSSO     ~0.34 × 0.12 × 0.24 m
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Pezzi ──────────────────────────────────────────────────────────────

  # Bosso naturale (bianchi) — caldo, grana fine
  - id: "chs_legno_chiaro"
    type: "disney"
    color: [0.82, 0.72, 0.52]
    roughness: 0.28
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.35
    coat_roughness: 0.22

  # Ebano (neri) — nero profondo, lucido
  - id: "chs_ebano"
    type: "disney"
    color: [0.05, 0.04, 0.04]
    roughness: 0.20
    metallic: 0.0
    specular: 0.55
    clearcoat: 0.50
    coat_roughness: 0.12

  # Feltro verde — fondo pezzi
  - id: "chs_feltro"
    type: "disney"
