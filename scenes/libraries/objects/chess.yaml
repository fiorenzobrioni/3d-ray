  # Checker marmo (B/N)
  - id: "chs_checker_marmo"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 4.0
      colors: [[0.93, 0.92, 0.90], [0.08, 0.08, 0.09]]

  # Vetro scuro fumé — scacchiera moderna
  - id: "chs_vetro_fume"
    type: "disney"
    color: [0.12, 0.12, 0.14]
    roughness: 0.02
    metallic: 0.0
    spec_trans: 0.80
    ior: 1.52
