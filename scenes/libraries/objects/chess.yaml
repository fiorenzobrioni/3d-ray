# ============================================================================
# Libreria Oggetti — Scacchi (Chess)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/chess.yaml" }]
#
# Set Staunton completo (6 pezzi), 3 scacchiere e 2 scatole porta-pezzi.
# I pezzi sono progettati per funzionare con il material override:
# istanzia con material: "chs_legno_chiaro" per i bianchi e
# "chs_ebano" per i neri.
#
# ── Scala ────────────────────────────────────────────────────────────────
#
#   Pezzi proporzionati allo standard Staunton:
#     Re ~0.095 m, Regina ~0.085 m, Alfiere ~0.072 m,
#     Cavallo ~0.062 m, Torre ~0.048 m, Pedone ~0.046 m.
#   Le scacchiere hanno case da 0.05 m → lato 0.40 m.
#
# ── Uso tipico ───────────────────────────────────────────────────────────
#
#   imports:
#     - path: "libraries/chess.yaml"
#   entities:
#     - type: "instance"
#       template: "scacchiera_legno"
#       translate: [0, 0.80, 0]             # su un tavolo
#     - type: "instance"
#       template: "re_staunton"
#       material: "chs_legno_chiaro"
#       translate: [-0.025, 0.835, -0.175]  # casella e1
#     - type: "instance"
#       template: "re_staunton"
#       material: "chs_ebano"
#       translate: [-0.025, 0.835, 0.175]   # casella e8
#
# ── Catalogo ─────────────────────────────────────────────────────────────
#
#   PEDONE_STAUNTON         ~Ø 0.028 × 0.046 m
#   TORRE_STAUNTON          ~Ø 0.030 × 0.048 m
#   ALFIERE_STAUNTON        ~Ø 0.030 × 0.072 m
#   CAVALLO_STAUNTON        ~0.032 × 0.062 × 0.028 m
#   REGINA_STAUNTON         ~Ø 0.032 × 0.085 m
#   RE_STAUNTON             ~Ø 0.032 × 0.095 m
#   SCACCHIERA_LEGNO        ~0.46 × 0.035 × 0.46 m
#   SCACCHIERA_MARMO        ~0.48 × 0.030 × 0.48 m
#   SCACCHIERA_MODERNA      ~0.44 × 0.020 × 0.44 m
#   SCATOLA_SCACCHI         ~0.30 × 0.10 × 0.22 m
#   SCATOLA_SCACCHI_LUSSO   ~0.34 × 0.12 × 0.24 m
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Pezzi ──────────────────────────────────────────────────────────────

  # Bosso naturale (bianchi) — caldo, grana fine
  - id: "chs_legno_chiaro"
    type: "disney"
    color: [0.82, 0.72, 0.52]
    roughness: 0.28
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.35
    clearcoat_gloss: 0.78

  # Ebano (neri) — nero profondo, lucido
  - id: "chs_ebano"
    type: "disney"
    color: [0.05, 0.04, 0.04]
    roughness: 0.20
    metallic: 0.0
    specular: 0.55
    clearcoat: 0.50
    clearcoat_gloss: 0.88

  # Feltro verde — fondo pezzi
  - id: "chs_feltro"
    type: "disney"
    color: [0.10, 0.28, 0.10]
    roughness: 0.95
    metallic: 0.0
    sheen: 0.15

  # ── Scacchiere ─────────────────────────────────────────────────────────

  # Case chiare (acero)
  - id: "chs_casa_chiara"
    type: "disney"
    color: [0.85, 0.76, 0.58]
    roughness: 0.30
    metallic: 0.0
    specular: 0.40
    clearcoat: 0.30
    clearcoat_gloss: 0.72

  # Case scure (noce)
  - id: "chs_casa_scura"
    type: "disney"
    color: [0.32, 0.18, 0.10]
    roughness: 0.30
    metallic: 0.0
    specular: 0.40
    clearcoat: 0.30
    clearcoat_gloss: 0.72

  # Scacchiera checker (texture procedurale)
  - id: "chs_checker_legno"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 4.0
      colors: [[0.85, 0.76, 0.58], [0.32, 0.18, 0.10]]

  # Marmo bianco venato
  - id: "chs_marmo_bianco"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 25.0
      noise_strength: 5.0
      colors: [[0.96, 0.95, 0.93], [0.75, 0.73, 0.70]]
      randomize_offset: true

  # Marmo nero venato
  - id: "chs_marmo_nero"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 20.0
      noise_strength: 6.0
      colors: [[0.06, 0.06, 0.07], [0.25, 0.24, 0.26]]
      randomize_offset: true

  # Checker marmo (B/N)
  - id: "chs_checker_marmo"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 4.0
      colors: [[0.93, 0.92, 0.90], [0.08, 0.08, 0.09]]

  # Vetro scuro fumé — scacchiera moderna
  - id: "chs_vetro_fume"
    type: "disney"
    color: [0.12, 0.12, 0.14]
    roughness: 0.02
    metallic: 0.0
    spec_trans: 0.80
    ior: 1.52
    specular: 0.75

  # Alluminio spazzolato — frame moderna
  - id: "chs_alluminio"
    type: "disney"
    color: [0.88, 0.88, 0.90]
    metallic: 1.0
    roughness: 0.22
    specular: 0.70

  # Checker vetro moderno (chiaro/scuro)
  - id: "chs_checker_vetro"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 4.0
      colors: [[0.90, 0.90, 0.92], [0.15, 0.15, 0.18]]

  # ── Cornici e scatole ──────────────────────────────────────────────────

  # Mogano — cornice scacchiera, scatola
  - id: "chs_mogano"
    type: "disney"
    color: [0.35, 0.14, 0.07]
    roughness: 0.25
    metallic: 0.0
    specular: 0.50
    clearcoat: 0.40
    clearcoat_gloss: 0.82

  # Noce — cornice alternativa
  - id: "chs_noce"
    type: "disney"
    color: [0.30, 0.18, 0.10]
    roughness: 0.30
    metallic: 0.0
    specular: 0.42
    clearcoat: 0.30
    clearcoat_gloss: 0.75

  # Ottone — cerniere, chiusure
  - id: "chs_ottone"
    type: "disney"
    color: [0.82, 0.65, 0.18]
    metallic: 1.0
    roughness: 0.22
    specular: 0.60

  # Velluto verde — interno scatola
  - id: "chs_velluto"
    type: "disney"
    color: [0.06, 0.20, 0.06]
    roughness: 0.95
    metallic: 0.0
    sheen: 0.40
    sheen_tint: 0.50

  # Pelle — scatola lusso
  - id: "chs_pelle"
    type: "disney"
    color: [0.25, 0.12, 0.06]
    roughness: 0.48
    metallic: 0.0
    specular: 0.38
    sheen: 0.20
    sheen_tint: 0.55


# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — Pezzi Staunton
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  PEDONE — Il più semplice, profilo classico a sfera
  # ═══════════════════════════════════════════════════════════════════════
  - name: "pedone_staunton"
    material: "chs_legno_chiaro"
    children:

      # Feltro base
      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.014
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.014
        height: 0.006
      - type: "torus"
        center: [0, 0.006, 0]
        major_radius: 0.0135
        minor_radius: 0.003

      # Cono di transizione
      - type: "cone"
        center: [0, 0.009, 0]
        radius: 0.012
        top_radius: 0.006
        height: 0.010

      # Stelo
      - type: "cylinder"
        center: [0, 0.019, 0]
        radius: 0.005
        height: 0.015

      # Collare
      - type: "torus"
        center: [0, 0.034, 0]
        major_radius: 0.007
        minor_radius: 0.003

      # Testa (sfera)
      - type: "sphere"
        center: [0, 0.040, 0]
        radius: 0.010


  # ═══════════════════════════════════════════════════════════════════════
  #  TORRE — Torrione con merlatura
  # ═══════════════════════════════════════════════════════════════════════
  - name: "torre_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.016
        height: 0.006
      - type: "torus"
        center: [0, 0.006, 0]
        major_radius: 0.0155
        minor_radius: 0.003

      # Cono transizione
      - type: "cone"
        center: [0, 0.009, 0]
        radius: 0.014
        top_radius: 0.008
        height: 0.010

      # Stelo (più grosso)
      - type: "cylinder"
        center: [0, 0.019, 0]
        radius: 0.007
        height: 0.015

      # Collare
      - type: "torus"
        center: [0, 0.034, 0]
        major_radius: 0.009
        minor_radius: 0.003

      # Torrione (cilindro che si allarga)
      - type: "cone"
        center: [0, 0.037, 0]
        radius: 0.010
        top_radius: 0.013
        height: 0.015

      # ── Merlatura (CSG: cilindro pieno − 4 tacche) ────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.052, 0]
          radius: 0.013
          height: 0.008
        right:
          type: "group"
          children:
            # 4 tacche rettangolari a 90°
            - type: "box"
              scale: [0.030, 0.006, 0.006]
              translate: [0, 0.058, 0]
            - type: "box"
              scale: [0.006, 0.006, 0.030]
              translate: [0, 0.058, 0]

      # Cavità interna (CSG)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.052, 0]
          radius: 0.011
          height: 0.005
        right:
          type: "cylinder"
          center: [0, 0.050, 0]
          radius: 0.009
          height: 0.005


  # ═══════════════════════════════════════════════════════════════════════
  #  ALFIERE — Mitra con fenditura e pomo
  # ═══════════════════════════════════════════════════════════════════════
  - name: "alfiere_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.016
        height: 0.006
      - type: "torus"
        center: [0, 0.006, 0]
        major_radius: 0.0155
        minor_radius: 0.003

      # Cono transizione
      - type: "cone"
        center: [0, 0.009, 0]
        radius: 0.014
        top_radius: 0.007
        height: 0.012

      # Stelo
      - type: "cylinder"
        center: [0, 0.021, 0]
        radius: 0.006
        height: 0.020

      # Collare
      - type: "torus"
        center: [0, 0.041, 0]
        major_radius: 0.008
        minor_radius: 0.003

      # Mitra (ellissoide allungato con fenditura CSG)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "sphere"
          center: [0, 0.054, 0]
          radius: 0.012
          scale: [1.0, 1.40, 1.0]
        right:
          # Fenditura diagonale (box sottile inclinato)
          type: "box"
          scale: [0.030, 0.002, 0.030]
          translate: [0, 0.062, 0]
          rotate: [0, 0, 35]

      # Pomo sferico in cima
      - type: "sphere"
        center: [0, 0.072, 0]
        radius: 0.004


  # ═══════════════════════════════════════════════════════════════════════
  #  CAVALLO — Testa di cavallo stilizzata
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  La forma del cavallo è la più complessa: collo ellissoidale,
  #  testa allungata, orecchie, muso. Uso di sfere scalate e CSG
  #  per scolpire la silhouette.
  #
  - name: "cavallo_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.016
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.016
        height: 0.006
      - type: "torus"
        center: [0, 0.006, 0]
        major_radius: 0.0155
        minor_radius: 0.003

      # Cono transizione
      - type: "cone"
        center: [0, 0.009, 0]
        radius: 0.014
        top_radius: 0.008
        height: 0.010

      # Collare
      - type: "torus"
        center: [0, 0.019, 0]
        major_radius: 0.010
        minor_radius: 0.003

      # ── Collo (ellissoide inclinato in avanti) ─────────────────────────
      - type: "sphere"
        center: [0, 0.035, -0.004]
        radius: 0.012
        scale: [0.75, 1.80, 0.90]
        rotate: [10, 0, 0]

      # ── Testa (ellissoide allungato in Z, inclinato) ───────────────────
      - type: "sphere"
        center: [0, 0.052, -0.012]
        radius: 0.010
        scale: [0.70, 0.65, 1.40]
        rotate: [30, 0, 0]

      # ── Muso (sfera schiacciata sporgente) ─────────────────────────────
      - type: "sphere"
        center: [0, 0.046, -0.024]
        radius: 0.007
        scale: [0.70, 0.55, 1.10]

      # ── Orecchie (2 sfere piccole allungate) ──────────────────────────
      - type: "sphere"
        center: [-0.004, 0.060, -0.006]
        radius: 0.003
        scale: [0.60, 1.80, 0.70]
      - type: "sphere"
        center: [0.004, 0.060, -0.006]
        radius: 0.003
        scale: [0.60, 1.80, 0.70]

      # ── Criniera (cresta lungo il collo) ───────────────────────────────
      - type: "sphere"
        center: [0, 0.048, 0.004]
        radius: 0.005
        scale: [0.30, 1.60, 0.80]

      # ── Occhi (2 sfere minuscole scure) ────────────────────────────────
      - type: "sphere"
        center: [-0.007, 0.052, -0.016]
        radius: 0.0015
        material: "chs_ebano"
      - type: "sphere"
        center: [0.007, 0.052, -0.016]
        radius: 0.0015
        material: "chs_ebano"


  # ═══════════════════════════════════════════════════════════════════════
  #  REGINA — Corona con coronet e globo
  # ═══════════════════════════════════════════════════════════════════════
  - name: "regina_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.017
        material: "chs_feltro"

      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.017
        height: 0.007
      - type: "torus"
        center: [0, 0.007, 0]
        major_radius: 0.0165
        minor_radius: 0.0035

      # Cono transizione
      - type: "cone"
        center: [0, 0.010, 0]
        radius: 0.015
        top_radius: 0.007
        height: 0.014

      # Stelo
      - type: "cylinder"
        center: [0, 0.024, 0]
        radius: 0.006
        height: 0.025

      # Collare inferiore
      - type: "torus"
        center: [0, 0.049, 0]
        major_radius: 0.008
        minor_radius: 0.003

      # Corpo corona (cono che si allarga)
      - type: "cone"
        center: [0, 0.052, 0]
        radius: 0.010
        top_radius: 0.014
        height: 0.018

      # Collare superiore
      - type: "torus"
        center: [0, 0.070, 0]
        major_radius: 0.013
        minor_radius: 0.003

      # ── Coronet (8 punte — sfere piccole sul bordo) ────────────────────
      - type: "sphere"
        center: [0.013, 0.074, 0]
        radius: 0.003
      - type: "sphere"
        center: [-0.013, 0.074, 0]
        radius: 0.003
      - type: "sphere"
        center: [0, 0.074, 0.013]
        radius: 0.003
      - type: "sphere"
        center: [0, 0.074, -0.013]
        radius: 0.003
      - type: "sphere"
        center: [0.0092, 0.074, 0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [-0.0092, 0.074, 0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [0.0092, 0.074, -0.0092]
        radius: 0.0025
      - type: "sphere"
        center: [-0.0092, 0.074, -0.0092]
        radius: 0.0025

      # Globo sommitale
      - type: "sphere"
        center: [0, 0.082, 0]
        radius: 0.005


  # ═══════════════════════════════════════════════════════════════════════
  #  RE — Il più alto, corona con croce
  # ═══════════════════════════════════════════════════════════════════════
  - name: "re_staunton"
    material: "chs_legno_chiaro"
    children:

      - type: "disk"
        center: [0, 0.0005, 0]
        normal: [0, -1, 0]
        radius: 0.018
        material: "chs_feltro"

      # Base (la più larga)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.018
        height: 0.007
      - type: "torus"
        center: [0, 0.007, 0]
        major_radius: 0.0175
        minor_radius: 0.004

      # Cono transizione
      - type: "cone"
        center: [0, 0.011, 0]
        radius: 0.016
        top_radius: 0.008
        height: 0.015

      # Stelo (il più alto)
      - type: "cylinder"
        center: [0, 0.026, 0]
        radius: 0.007
        height: 0.028

      # Collare inferiore
      - type: "torus"
        center: [0, 0.054, 0]
        major_radius: 0.009
        minor_radius: 0.003

      # Corpo corona (cono espanso)
      - type: "cone"
        center: [0, 0.057, 0]
        radius: 0.011
        top_radius: 0.015
        height: 0.018

      # Collare superiore (coronet)
      - type: "torus"
        center: [0, 0.075, 0]
        major_radius: 0.014
        minor_radius: 0.003

      # Fascia corona
      - type: "cylinder"
        center: [0, 0.075, 0]
        radius: 0.013
        height: 0.006

      # Cuscino (sfera schiacciata sopra la corona)
      - type: "sphere"
        center: [0, 0.082, 0]
        radius: 0.011
        scale: [1.0, 0.40, 1.0]

      # ── Croce pattée ──────────────────────────────────────────────────
      # Stelo verticale
      - type: "cylinder"
        center: [0, 0.085, 0]
        radius: 0.002
        height: 0.012

      # Braccio orizzontale
      - type: "cylinder"
        center: [0, 0.093, 0]
        radius: 0.002
        height: 0.010
        rotate: [0, 0, 90]

      # Sfera al centro della croce
      - type: "sphere"
        center: [0, 0.093, 0]
        radius: 0.003


  # ═══════════════════════════════════════════════════════════════════════
  #  SCACCHIERA_LEGNO — Scacchiera classica in legno
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Piano 8×8 con texture checker, cornice in mogano.
  #  Le case sono 0.05 × 0.05 m, piano totale 0.40 m.
  #  Checker scale=4.0 su un box 0.40 m → 8×8 case.
  #
  - name: "scacchiera_legno"
    material: "chs_mogano"
    children:

      # ── Cornice esterna ────────────────────────────────────────────────
      - type: "box"
        scale: [0.46, 0.025, 0.46]
        translate: [0, 0.0125, 0]

      # Bordo arrotondato
      - type: "torus"
        center: [0, 0.025, 0]
        major_radius: 0.225
        minor_radius: 0.006
        scale: [1.02, 1.0, 1.02]

      # ── Piano di gioco (checker) ───────────────────────────────────────
      # Box 0.40 × 0.40, centrato, con checker scale=4.0
      # (4 periodi checker = 8 strisce per lato)
      - type: "box"
        scale: [0.40, 0.006, 0.40]
        translate: [0, 0.028, 0]
        material: "chs_checker_legno"

      # Filetto (torus sottile al bordo del piano)
      - type: "torus"
        center: [0, 0.031, 0]
        major_radius: 0.198
        minor_radius: 0.002
        scale: [1.01, 1.0, 1.01]

      # Piedini (4 sfere schiacciate)
      - type: "sphere"
        center: [-0.20, 0, -0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        center: [0.20, 0, -0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        center: [-0.20, 0, 0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]
      - type: "sphere"
        center: [0.20, 0, 0.20]
        radius: 0.010
        scale: [1.2, 0.4, 1.2]


  # ═══════════════════════════════════════════════════════════════════════
  #  SCACCHIERA_MARMO — Scacchiera in marmo bianco e nero
  # ═══════════════════════════════════════════════════════════════════════
  - name: "scacchiera_marmo"
    material: "chs_marmo_bianco"
    children:

      # ── Lastra di base ─────────────────────────────────────────────────
      - type: "box"
        scale: [0.48, 0.020, 0.48]
        translate: [0, 0.010, 0]

      # Modanatura perimetrale (torus)
