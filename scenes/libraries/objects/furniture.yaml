        radius: 0.008
        scale: [0.6, 1.5, 0.6]
        material: "frn_fiamma"

      # ── Braccio 3 (angolo 240°) ───────────────────────────────────────
      # Segmento orizzontale
      - type: "cylinder"
        center: [-0.030, 0.24, -0.052]
        radius: 0.008
        height: 0.10
        rotate: [-30, 0, 90]
      # Raccordo sferico
      - type: "sphere"
        center: [-0.055, 0.24, -0.095]
        radius: 0.010
      # Segmento verticale
      - type: "cylinder"
        center: [-0.070, 0.24, -0.121]
        radius: 0.008
        height: 0.06
      # Piattino
      - type: "cylinder"
        center: [-0.070, 0.30, -0.121]
        radius: 0.022
