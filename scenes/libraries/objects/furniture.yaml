# ============================================================================
# Libreria Oggetti — Arredamento (Furniture)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/furniture.yaml" }]
#
# Raccolta di mobili e complementi d'arredo come template riutilizzabili.
# Ogni template è progettato per poggiare a Y=0 (base a terra) e può
# essere istanziato con translate, rotate, scale e material override.
#
# ── Materiali inclusi ────────────────────────────────────────────────────
#
#   Questa libreria include materiali di default ottimizzati per ogni
#   oggetto. L'istanza può sovrascrivere il materiale globale, ma i
#   figli con materiale esplicito (es. la lampadina emissiva) mantengono
#   il proprio — vedi regole di override nella doc (sez. 11.2).
#
#   Prefisso ID:  frn_   (furniture)
#
#   Per sostituire i materiali di default, definisci nella tua scena
#   materiali con lo stesso id: il merge locale sovrascrive l'importato.
#
# ── Convenzioni di design ────────────────────────────────────────────────
#
#   ORIGINE       Tutti i template hanno la base a Y=0, centrati in XZ.
#                 Istanziare con translate: [x, 0, z] li appoggia al
#                 pavimento senza offset manuali.
#
#   SCALA         Dimensioni in unità ≈ metri. Un tavolo è ~1.4 largo,
#                 una sedia ~0.90 alta. Scala 1:1 per scene realistiche.
#
#   DETTAGLIO     Ogni pezzo usa la geometria più ricca disponibile:
#                 torus per bordi arrotondati, sfere scalate asimmetriche
#                 per ellissoidi, coni tronchi per gambe rastremate,
#                 CSG per volumi cavi e incassi.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   TAVOLO_CLASSICO         Tavolo da pranzo con gambe tornite e
#                           fascia sottopiano. ~1.40 × 0.76 × 0.80 m.
#
#   SEDIA_CLASSICA          Sedia da pranzo con schienale a stecche,
#                           seduta e gambe coniche. ~0.44 × 0.90 × 0.44 m.
#
#   TAVOLINO_CAFFE          Tavolino rotondo con colonna centrale,
#                           base pesante e anello decorativo.
#                           Ø 0.80 × 0.45 m.
#
#   LAMPADA_TAVOLO          Lampada da tavolo con base, stelo,
#                           paralume conico cavo (CSG) e lampadina
#                           emissiva. ~Ø 0.28 × 0.48 m.
#
#   LAMPADA_TERRA           Lampada da terra alta con base pesante,
#                           stelo sottile, paralume conico cavo e
#                           lampadina emissiva. ~Ø 0.38 × 1.65 m.
#
#   SCAFFALE                Libreria a 5 ripiani con fiancate,
#                           schienale e bordo frontale arrotondato.
#                           0.80 × 1.80 × 0.30 m.
#
#   SGABELLO_BAR            Sgabello alto con seduta rotonda imbottita,
#                           4 gambe rastremate e poggiapiedi ad anello.
#                           Ø 0.36 × 0.75 m.
#
#   COMODINO                Comodino con cassetto, pomello sferico,
#                           gambe tornite e piano d'appoggio.
#                           0.45 × 0.55 × 0.40 m.
#
#   CANDELABRO              Candeliere a 3 bracci con base decorata,
#                           stelo centrale e candele con fiamma
#                           emissiva. ~Ø 0.40 × 0.50 m.
#
#   VASO_DECORATIVO         Vaso a profilo classico con collo stretto,
#                           corpo bombato e piede sagomato.
#                           ~Ø 0.24 × 0.35 m.
#
# ============================================================================


