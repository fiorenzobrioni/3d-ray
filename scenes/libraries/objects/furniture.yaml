      # Fiamma
      - type: "sphere"
        center: [-0.070, 0.43, -0.121]
        radius: 0.008
        scale: [0.6, 1.5, 0.6]
        material: "frn_fiamma"


  # ═══════════════════════════════════════════════════════════════════════
  #  VASO_DECORATIVO — Vaso classico a profilo sagomato
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.24 × 0.35 m
  #  Struttura:  Profilo a "urna" classico costruito impilando sezioni
  #              di geometria diversa: piede (cono tronco), peduncolo
  #              (cilindro stretto), corpo bombato (sfera scalata →
  #              ellissoide), spalla (cono tronco invertito), collo
  #              (cilindro), labbro (torus). Interno cavo via CSG.
  #
  #  Materiale default: frn_marmo_bianco
  #
  - name: "vaso_decorativo"
    material: "frn_marmo_bianco"
    children:

      # Per ottenere un vaso cavo usiamo CSG: il profilo esterno
      # completo meno un cilindro interno.
      - type: "csg"
        operation: "subtraction"
        left:
          # ── Profilo esterno (group) ────────────────────────────────────
          type: "group"
          children:
            # Piede — cono tronco basso e largo
            - type: "cone"
              center: [0, 0, 0]
              radius: 0.08
              top_radius: 0.05
              height: 0.025

            # Peduncolo — cilindro stretto
            - type: "cylinder"
              center: [0, 0.025, 0]
              radius: 0.042
              height: 0.04

            # Anello decorativo alla base del corpo
            - type: "torus"
              center: [0, 0.065, 0]
              major_radius: 0.055
              minor_radius: 0.012

            # Corpo bombato — ellissoide (sfera scalata asimmetrica)
            - type: "sphere"
              center: [0, 0.16, 0]
              radius: 0.12
              scale: [1.0, 1.15, 1.0]

            # Spalla — cono tronco (dal corpo largo al collo stretto)
            - type: "cone"
              center: [0, 0.24, 0]
              radius: 0.095
              top_radius: 0.050
              height: 0.05

            # Collo — cilindro stretto
            - type: "cylinder"
              center: [0, 0.29, 0]
              radius: 0.045
              height: 0.04

            # Labbro — torus sporgente in cima
            - type: "torus"
              center: [0, 0.33, 0]
              major_radius: 0.052
              minor_radius: 0.012

        right:
          # ── Cavità interna ─────────────────────────────────────────────
          # Cilindro che scava l'interno dal labbro fino quasi alla base
          type: "cylinder"
          center: [0, 0.04, 0]
          radius: 0.038
          height: 0.32
