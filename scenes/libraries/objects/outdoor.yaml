# ============================================================================
# Libreria Oggetti — Arredo Esterno e Giardino (Outdoor)
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/outdoor.yaml" }]
#
# Arredi urbani, elementi da giardino, strutture da esterno.
# Pezzi modulari: sezioni di staccionata e pergolato affiancabili,
# fontane e pozzi come centrotavola di scene all'aperto.
#
# ── Convenzioni ──────────────────────────────────────────────────────────
#
#   ORIGINE       Base a Y=0, centrato in XZ.
#   SCALA         Unità = metri. Una panchina è ~1.50 m, una fontana
#                 ~1.20 m alta.
#
# ── Catalogo template ────────────────────────────────────────────────────
#
#   PANCHINA                Panchina da parco con doghe in legno e
#                           struttura in ghisa. ~1.50 × 0.80 × 0.60 m.
#
#   TAVOLO_PICNIC           Tavolo da picnic con 2 panche integrate.
#                           ~1.60 × 0.75 × 0.75 m.
#
#   FONTANA                 Fontana a 3 vasche impilate con zampillo
#                           e bacino di raccolta. ~Ø 1.20 × 1.50 m.
#
#   FIORIERA                Vaso da esterno in terracotta con bordo
#                           e piede modanato. ~Ø 0.40 × 0.38 m.
#
#   STACCIONATA             Sezione di staccionata (5 picchetti +
#                           2 traverse). ~1.20 × 1.00 × 0.08 m.
#
#   PERGOLATO               Sezione di pergolato con 2 colonne e
#                           4 travetti. ~2.00 × 2.50 × 0.30 m.
#
#   POZZO                   Pozzo medievale con parapetto, tetto a
#                           2 falde, argano e secchio. ~Ø 1.00 × 2.20 m.
#
#   IDRANTE                 Idrante antincendio a colonna con
#                           attacchi e cappello. ~Ø 0.20 × 0.70 m.
#
#   CESTINO                 Cestino portarifiuti cilindrico con
#                           coperchio a cupola. ~Ø 0.40 × 0.90 m.
#
#   CASSETTA_POSTALE        Cassetta postale americana su palo con
#                           bandierina. ~0.20 × 1.20 × 0.22 m.
#
#   BIRDBATH                Bagno per uccelli con colonna tornita
#                           e vasca. ~Ø 0.50 × 0.75 m.
#
#   MERIDIANA               Meridiana su piedistallo con gnomone.
#                           ~Ø 0.30 × 0.80 m.
#
#   GAZEBO                  Gazebo esagonale con 6 colonne, tetto
#                           a padiglione e balaustra. ~Ø 3.00 × 3.20 m.
#
#   BARBECUE                Barbecue sferico su treppiede con
#                           coperchio e griglia. ~Ø 0.55 × 0.90 m.
#
# ============================================================================


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═══════════════════════════════════════════════════════════════════════════

materials:

  # ── Metalli ────────────────────────────────────────────────────────────

  # Ghisa verniciata verde — panchine, staccionate
  - id: "out_ghisa_verde"
    type: "disney"
    color: [0.06, 0.14, 0.06]
    metallic: 0.78
    roughness: 0.60
    specular: 0.32

  # Ghisa nera — ringhiere, lampioni
  - id: "out_ghisa_nera"
    type: "disney"
    color: [0.05, 0.05, 0.05]
    metallic: 0.80
    roughness: 0.55
    specular: 0.35

  # Ferro zincato — staccionate, barbecue
  - id: "out_zincato"
    type: "disney"
    color: [0.62, 0.62, 0.64]
    metallic: 0.90
    roughness: 0.40
    specular: 0.50

  # Acciaio inox — cestini, idranti moderni
  - id: "out_inox"
    type: "disney"
    color: [0.55, 0.54, 0.52]
    metallic: 1.0
    roughness: 0.20
    specular: 0.72

  # Rosso idrante — segnaletica antincendio
  - id: "out_rosso"
    type: "disney"
    color: [0.78, 0.08, 0.06]
    roughness: 0.45
    metallic: 0.65
    specular: 0.40

  # Ottone — rubinetti, dettagli fontana
  - id: "out_ottone"
    type: "disney"
    color: [0.82, 0.65, 0.18]
    metallic: 1.0
    roughness: 0.22
    specular: 0.60

  # Rame patinato — coperture, tetti
  - id: "out_rame_patina"
    type: "disney"
    color: [0.30, 0.52, 0.40]
    metallic: 0.50
    roughness: 0.62
    specular: 0.28

  # ── Legno ──────────────────────────────────────────────────────────────

  # Legno da esterno (teak trattato)
  - id: "out_teak"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 2.5
      colors: [[0.52, 0.38, 0.22], [0.38, 0.26, 0.14]]
      randomize_offset: true

  # Legno grezzo invecchiato — staccionate, pozzi
  - id: "out_legno_grezzo"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 5.0
      noise_strength: 3.5
      colors: [[0.42, 0.35, 0.26], [0.30, 0.24, 0.16]]
      randomize_offset: true

  # Legno verniciato bianco — gazebo, staccionate americane
  - id: "out_legno_bianco"
    type: "disney"
    color: [0.90, 0.88, 0.84]
    roughness: 0.35
    metallic: 0.0
    specular: 0.40
    clearcoat: 0.20
    clearcoat_gloss: 0.60

  # ── Pietra e mattone ───────────────────────────────────────────────────

  # Pietra da fontana — grigio chiaro con texture
  - id: "out_pietra"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 12.0
      noise_strength: 5.0
      colors: [[0.68, 0.65, 0.60], [0.52, 0.50, 0.46]]
      randomize_offset: true

  # Mattone — pozzi, muretti
  - id: "out_mattone"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 20.0
      noise_strength: 3.0
      colors: [[0.58, 0.28, 0.16], [0.48, 0.22, 0.12]]
      randomize_offset: true

  # Marmo da giardino — meridiana, birdbath
  - id: "out_marmo"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 14.0
      noise_strength: 7.0
      colors: [[0.92, 0.90, 0.86], [0.62, 0.60, 0.56]]
      randomize_offset: true

  # Cemento — panchine moderne, fioriere
  - id: "out_cemento"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 30.0
      noise_strength: 2.0
      colors: [[0.60, 0.58, 0.56], [0.52, 0.50, 0.48]]

  # ── Ceramica e terracotta ──────────────────────────────────────────────

  # Terracotta — fioriere
  - id: "out_terracotta"
    type: "disney"
    color: [0.68, 0.38, 0.20]
    roughness: 0.70
    metallic: 0.0
    specular: 0.20

  # ── Acqua ──────────────────────────────────────────────────────────────

  # Acqua di fontana
  - id: "out_acqua"
    type: "disney"
    color: [0.80, 0.88, 0.95]
    roughness: 0.02
    spec_trans: 0.90
    ior: 1.333
    specular: 0.65

  # Blu cassetta postale USA
  - id: "out_blu_posta"
    type: "disney"
    color: [0.10, 0.18, 0.52]
    roughness: 0.45
    metallic: 0.60
    specular: 0.38

  # Nero opaco — griglia barbecue
  - id: "out_nero_opaco"
    type: "disney"
    color: [0.04, 0.04, 0.04]
    metallic: 0.75
    roughness: 0.65
    specular: 0.28


# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════

templates:

  # ═══════════════════════════════════════════════════════════════════════
  #  PANCHINA — Panchina da parco con ghisa e doghe
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.50 × 0.80 × 0.60 m
  #
  - name: "panchina"
    material: "out_teak"
    children:

      # ── Fiancata sinistra in ghisa ─────────────────────────────────────
      # Gamba anteriore
      - type: "cylinder"
        center: [-0.65, 0, -0.22]
        radius: 0.020
        height: 0.42
        material: "out_ghisa_verde"
      # Gamba posteriore (più alta per lo schienale)
      - type: "cylinder"
        center: [-0.65, 0, 0.18]
        radius: 0.020
        height: 0.78
        material: "out_ghisa_verde"
      # Traversa seduta
      - type: "cylinder"
        center: [-0.65, 0.40, 0]
        radius: 0.014
        height: 0.40
        rotate: [90, 0, 0]
        material: "out_ghisa_verde"
      # Arco decorativo sotto seduta
      - type: "csg"
        operation: "intersection"
        material: "out_ghisa_verde"
        left:
          type: "torus"
          center: [-0.65, 0.32, -0.02]
          major_radius: 0.18
          minor_radius: 0.010
          rotate: [90, 0, 0]
        right:
          type: "box"
          scale: [0.05, 0.20, 0.38]
          translate: [-0.65, 0.22, -0.02]

      # ── Fiancata destra in ghisa ───────────────────────────────────────
      - type: "cylinder"
        center: [0.65, 0, -0.22]
        radius: 0.020
        height: 0.42
        material: "out_ghisa_verde"
      - type: "cylinder"
        center: [0.65, 0, 0.18]
        radius: 0.020
        height: 0.78
        material: "out_ghisa_verde"
      - type: "cylinder"
        center: [0.65, 0.40, 0]
        radius: 0.014
        height: 0.40
        rotate: [90, 0, 0]
        material: "out_ghisa_verde"
      - type: "csg"
        operation: "intersection"
        material: "out_ghisa_verde"
        left:
          type: "torus"
          center: [0.65, 0.32, -0.02]
          major_radius: 0.18
          minor_radius: 0.010
          rotate: [90, 0, 0]
        right:
          type: "box"
          scale: [0.05, 0.20, 0.38]
          translate: [0.65, 0.22, -0.02]

      # ── 5 doghe seduta ─────────────────────────────────────────────────
      - type: "box"
        scale: [1.30, 0.022, 0.06]
        translate: [0, 0.43, -0.16]
      - type: "box"
        scale: [1.30, 0.022, 0.06]
        translate: [0, 0.43, -0.06]
      - type: "box"
        scale: [1.30, 0.022, 0.06]
        translate: [0, 0.43, 0.04]
      - type: "box"
        scale: [1.30, 0.022, 0.06]
        translate: [0, 0.43, 0.14]

      # ── 3 doghe schienale ──────────────────────────────────────────────
      - type: "box"
        scale: [1.30, 0.06, 0.018]
        translate: [0, 0.54, 0.19]
      - type: "box"
        scale: [1.30, 0.06, 0.018]
        translate: [0, 0.64, 0.19]
      - type: "box"
        scale: [1.30, 0.06, 0.018]
        translate: [0, 0.74, 0.19]


  # ═══════════════════════════════════════════════════════════════════════
  #  TAVOLO_PICNIC — Tavolo con panche integrate
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.60 × 0.75 × 0.75 m
  #
  - name: "tavolo_picnic"
    material: "out_teak"
    children:

      # Piano tavolo (3 assi)
      - type: "box"
        scale: [1.50, 0.03, 0.20]
        translate: [0, 0.73, -0.10]
      - type: "box"
        scale: [1.50, 0.03, 0.20]
        translate: [0, 0.73, 0.10]

      # Panca sinistra
      - type: "box"
        scale: [1.50, 0.03, 0.25]
        translate: [0, 0.42, -0.48]

      # Panca destra
      - type: "box"
        scale: [1.50, 0.03, 0.25]
        translate: [0, 0.42, 0.48]

      # ── Struttura ad A (2 cavalletti) ──────────────────────────────────
      # Cavalletto sinistro — gamba ant
      - type: "box"
        scale: [0.06, 0.80, 0.04]
        translate: [-0.55, 0.38, -0.32]
        rotate: [15, 0, 0]
      # Cavalletto sinistro — gamba post
      - type: "box"
        scale: [0.06, 0.80, 0.04]
        translate: [-0.55, 0.38, 0.32]
        rotate: [-15, 0, 0]
      # Traversa cavalletto sinistro
      - type: "box"
        scale: [0.06, 0.04, 0.60]
        translate: [-0.55, 0.30, 0]

      # Cavalletto destro
      - type: "box"
        scale: [0.06, 0.80, 0.04]
        translate: [0.55, 0.38, -0.32]
        rotate: [15, 0, 0]
      - type: "box"
        scale: [0.06, 0.80, 0.04]
        translate: [0.55, 0.38, 0.32]
        rotate: [-15, 0, 0]
      - type: "box"
        scale: [0.06, 0.04, 0.60]
        translate: [0.55, 0.30, 0]

      # Traversa longitudinale sotto il piano
      - type: "box"
        scale: [1.40, 0.04, 0.06]
        translate: [0, 0.68, 0]


  # ═══════════════════════════════════════════════════════════════════════
  #  FONTANA — Fontana a 3 vasche con zampillo
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 1.20 × 1.50 m
  #
  - name: "fontana"
    material: "out_pietra"
    children:

      # ── Bacino di raccolta (vasca grande) ──────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.60
          height: 0.30
        right:
          type: "cylinder"
          center: [0, 0.05, 0]
          radius: 0.55
          height: 0.30

      - type: "torus"
        center: [0, 0.30, 0]
        major_radius: 0.58
        minor_radius: 0.025

      # Acqua nel bacino
      - type: "cylinder"
        center: [0, 0.04, 0]
        radius: 0.54
        height: 0.22
        material: "out_acqua"

      # ── Colonna centrale ───────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.30, 0]
        radius: 0.08
        height: 0.35

      - type: "torus"
        center: [0, 0.32, 0]
        major_radius: 0.085
        minor_radius: 0.012

      # Nodo decorativo
      - type: "sphere"
        center: [0, 0.50, 0]
        radius: 0.065

      # ── Vasca media ────────────────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.58, 0]
          radius: 0.28
          height: 0.12
        right:
          type: "cylinder"
          center: [0, 0.60, 0]
          radius: 0.25
          height: 0.12

      - type: "torus"
        center: [0, 0.70, 0]
        major_radius: 0.27
        minor_radius: 0.015

      # Acqua vasca media
      - type: "cylinder"
        center: [0, 0.59, 0]
        radius: 0.24
        height: 0.08
        material: "out_acqua"

      # ── Colonnina superiore ────────────────────────────────────────────
      - type: "cylinder"
        center: [0, 0.70, 0]
        radius: 0.04
        height: 0.25

      - type: "torus"
        center: [0, 0.72, 0]
        major_radius: 0.045
        minor_radius: 0.008

      # ── Vasca piccola (coppa) ──────────────────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0.95, 0]
          radius: 0.15
          height: 0.08
        right:
          type: "cylinder"
          center: [0, 0.97, 0]
          radius: 0.13
          height: 0.08

      - type: "torus"
        center: [0, 1.03, 0]
        major_radius: 0.14
        minor_radius: 0.012

      # ── Pinnacolo con zampillo ─────────────────────────────────────────
      - type: "cone"
        center: [0, 1.03, 0]
        radius: 0.04
        top_radius: 0.015
        height: 0.06

      # Zampillo (cilindro sottile di acqua)
      - type: "cylinder"
        center: [0, 1.09, 0]
        radius: 0.005
        height: 0.15
        material: "out_acqua"

      # Goccia in cima allo zampillo
      - type: "sphere"
        center: [0, 1.24, 0]
        radius: 0.010
        material: "out_acqua"


  # ═══════════════════════════════════════════════════════════════════════
  #  FIORIERA — Vaso da esterno in terracotta
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 0.40 × 0.38 m
  #
  - name: "fioriera"
    material: "out_terracotta"
    children:

      # Corpo cavo (cono tronco)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 0.03, 0]
          radius: 0.14
          top_radius: 0.20
          height: 0.32
        right:
          type: "cone"
          center: [0, 0.05, 0]
          radius: 0.12
          top_radius: 0.18
          height: 0.32

      # Bordo superiore (labbro arrotondato)
      - type: "torus"
        center: [0, 0.35, 0]
        major_radius: 0.195
        minor_radius: 0.015

      # Piede
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.12
        height: 0.03

      - type: "torus"
        center: [0, 0.03, 0]
        major_radius: 0.13
        minor_radius: 0.010

      # Anello decorativo a metà altezza
      - type: "torus"
        center: [0, 0.18, 0]
        major_radius: 0.172
        minor_radius: 0.008


  # ═══════════════════════════════════════════════════════════════════════
  #  STACCIONATA — Sezione con 5 picchetti
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~1.20 × 1.00 × 0.08 m
  #
  - name: "staccionata"
    material: "out_legno_bianco"
    children:

      # 2 traverse orizzontali
      - type: "box"
        scale: [1.20, 0.06, 0.025]
        translate: [0, 0.30, 0]
      - type: "box"
        scale: [1.20, 0.06, 0.025]
        translate: [0, 0.65, 0]

      # 5 picchetti con punta
      # Picchetto 1
      - type: "box"
        scale: [0.07, 0.85, 0.020]
        translate: [-0.48, 0.425, 0]
      - type: "cone"
        center: [-0.48, 0.85, 0]
        radius: 0.035
        top_radius: 0.0
        height: 0.06
        scale: [1.0, 1.0, 0.28]

      # Picchetto 2
      - type: "box"
        scale: [0.07, 0.85, 0.020]
        translate: [-0.24, 0.425, 0]
      - type: "cone"
        center: [-0.24, 0.85, 0]
        radius: 0.035
        top_radius: 0.0
        height: 0.06
        scale: [1.0, 1.0, 0.28]

      # Picchetto 3 (centro)
      - type: "box"
        scale: [0.07, 0.85, 0.020]
        translate: [0, 0.425, 0]
      - type: "cone"
        center: [0, 0.85, 0]
        radius: 0.035
        top_radius: 0.0
        height: 0.06
        scale: [1.0, 1.0, 0.28]

      # Picchetto 4
      - type: "box"
        scale: [0.07, 0.85, 0.020]
        translate: [0.24, 0.425, 0]
      - type: "cone"
        center: [0.24, 0.85, 0]
        radius: 0.035
        top_radius: 0.0
        height: 0.06
        scale: [1.0, 1.0, 0.28]

      # Picchetto 5
      - type: "box"
        scale: [0.07, 0.85, 0.020]
        translate: [0.48, 0.425, 0]
      - type: "cone"
        center: [0.48, 0.85, 0]
        radius: 0.035
        top_radius: 0.0
        height: 0.06
        scale: [1.0, 1.0, 0.28]


  # ═══════════════════════════════════════════════════════════════════════
  #  PERGOLATO — Sezione con 2 colonne e 4 travetti
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~2.00 × 2.50 × 0.30 m
  #
  - name: "pergolato"
    material: "out_legno_grezzo"
    children:

      # 2 colonne
      - type: "box"
        scale: [0.12, 2.30, 0.12]
        translate: [-0.94, 1.15, 0]
      - type: "box"
        scale: [0.12, 2.30, 0.12]
        translate: [0.94, 1.15, 0]

      # Trave principale (architrave)
      - type: "box"
        scale: [2.00, 0.10, 0.14]
        translate: [0, 2.35, 0]

      # 4 travetti trasversali
      - type: "box"
        scale: [0.08, 0.08, 1.20]
        translate: [-0.65, 2.44, 0]
      - type: "box"
        scale: [0.08, 0.08, 1.20]
        translate: [-0.20, 2.44, 0]
      - type: "box"
        scale: [0.08, 0.08, 1.20]
        translate: [0.20, 2.44, 0]
      - type: "box"
        scale: [0.08, 0.08, 1.20]
        translate: [0.65, 2.44, 0]

      # Capitellini (sfere schiacciate alla sommità delle colonne)
      - type: "sphere"
        center: [-0.94, 2.30, 0]
        radius: 0.08
        scale: [1.0, 0.35, 1.0]
      - type: "sphere"
        center: [0.94, 2.30, 0]
        radius: 0.08
        scale: [1.0, 0.35, 1.0]


  # ═══════════════════════════════════════════════════════════════════════
  #  POZZO — Pozzo medievale con tetto e argano
  # ═══════════════════════════════════════════════════════════════════════
  #
  #  Dimensioni: ~Ø 1.00 × 2.20 m
  #
  - name: "pozzo"
    material: "out_mattone"
    children:

      # ── Parapetto circolare (cilindro cavo) ────────────────────────────
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cylinder"
          center: [0, 0, 0]
