# =============================================================================
#  LIBRERIA LUCI — Product Shot / Gioielleria
#  scenes/libraries/lights/studio-product.yaml
# =============================================================================
#
#  Setup specializzato per still life di precisione: gioielli, orologi,
#  profumi, elettronica, oggetti con materiali misti (metallo + vetro +
#  plastica). L'obiettivo è far brillare le superfici lucide e rivelare
#  la texture di quelle opache, con catchlight nitidi e controllati.
#
#  SCHEMA:
#    Top Sphere    — Sphere light zenitale      → luce principale morbida e isotropa
#    Side Left     — Area laterale sinistra     → modella il volume, highlight dx
#    Side Right    — Area laterale destra       → controbilanciamento, fill caldo
#    Rim Spot      — Spot stretto dal retro     → catchlight di contorno, separazione
#    Ground Bounce — Point dal basso            → elimina ombre dure sotto il soggetto
#
#  LUCI USATE:  sphere · area · area · spot · point
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/studio-product.yaml"
#
#  WORLD ABBINATO (studio neutro, fondo grigio scuro):
#    world:
#      ambient_light: [0.04, 0.04, 0.05]
#      background: [0.06, 0.06, 0.08]
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 400  -H 225 -s 64   -d 4  -S 1
#    Preview: -w 800  -H 450 -s 256  -d 12
#    Final  : -w 1920 -H 1080 -s 1024 -d 16 -S 4
#
#  NOTE:
#    - La sphere light zenitale produce catchlight circolari (l'"occhio"
#      riflesso nei metalli e gemme) — classico della fotografia di gioielli.
#    - Le due area laterali creano gradients luminosi sui fianchi dell'oggetto
#      che rivelano la curvatura senza creare zone bruciate.
#    - Per soggetti molto piccoli (<0.2 u) avvicina tutte le sorgenti del 40%.
#    - Il rim spot crea una sottile riga brillante sul bordo superiore —
#      aumenta l'inner_angle se preferisci un alone più morbido.
# =============================================================================

lights:

  # ── TOP SPHERE LIGHT (KEY PRINCIPALE) ────────────────────────────────────
  #  Sphere light dall'alto centrata sull'origine. Il solid-angle sampling
  #  la rende molto più efficiente di un'area equivalente per soggetti
  #  piccoli. Produce un catchlight circolare uniforme — il marker visivo
  #  più riconoscibile della fotografia di gioielleria professionale.
  #  Colore bianco leggerissimamente caldo: simula uno studio con luce
  #  diurna filtrata (5500 K circa).
  - type: "sphere"
    position: [0.0, 5.0, 0.0]
    radius: 0.8
    color: [1.0, 0.97, 0.93]
    intensity: 32.0
    shadow_samples: 16

  # ── SIDE AREA SINISTRA ────────────────────────────────────────────────────
  #  Area rettangolare (1.5×2 u) sul lato sinistro, inclinata verso il centro.
  #  Crea un gradiente luminoso sul fianco sinistro del soggetto che rivela
  #  la forma senza schiacciare il volume. Colore leggermente freddo:
  #  il contrasto caldo/freddo laterale dà profondità anche a oggetti piatti.
  - type: "area"
    corner: [-5.0, 2.5, -1.5]
    u: [0.0, 0.0, 1.5]
    v: [0.0, 2.0, 0.0]
    color: [0.82, 0.90, 1.0]
    intensity: 18.0
    shadow_samples: 9

  # ── SIDE AREA DESTRA ──────────────────────────────────────────────────────
  #  Simmetrica alla sinistra ma leggermente più calda e meno intensa.
  #  Serve a non lasciare il fianco destro nel buio preservando il contrasto
  #  con il lato illuminato. Il colore caldo contrasta il fill freddo sinistro
  #  creando una tensione cromatica che ravviva i materiali neutri.
  - type: "area"
    corner: [3.5, 2.5, -1.5]
    u: [0.0, 0.0, 1.5]
    v: [0.0, 2.0, 0.0]
    color: [1.0, 0.92, 0.80]
    intensity: 12.0
    shadow_samples: 9

  # ── RIM SPOT (CATCHLIGHT DI CONTORNO) ─────────────────────────────────────
  #  Spot stretto dal retro-alto. Traccia una riga brillante lungo il bordo
  #  superiore del soggetto che lo stacca dal fondo e fa "brillare" metalli
  #  e gemme sul contorno. Inner/outer strettissimi = riga netta e precisa.
  #  Colore bianco freddo: il rim deve essere il punto più luminoso e puro.
  - type: "spot"
    position: [0.5, 5.5, 4.5]
    direction: [-0.05, -0.70, -0.72]
    color: [0.92, 0.96, 1.0]
    intensity: 65.0
    inner_angle: 6
    outer_angle: 14

  # ── GROUND BOUNCE ─────────────────────────────────────────────────────────
  #  Point dal basso, simula il rimbalzo della luce dal piano dello studio.
  #  Elimina le ombre taglienti sotto l'oggetto e aggiunge un accenno di
  #  luce calda nella zona inferiore (soprattutto utile per anelli e ciondoli
  #  posati su superfici riflettenti). Intensità bassa: deve essere un
  #  "suggerimento" di luce, non una sorgente percepibile.
  - type: "point"
    position: [0.0, -2.0, -0.5]
    color: [1.0, 0.94, 0.82]
    intensity: 8.0
