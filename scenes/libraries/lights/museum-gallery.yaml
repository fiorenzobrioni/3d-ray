# =============================================================================
#  LIBRERIA LUCI — Galleria / Museo
#  scenes/libraries/lights/museum-gallery.yaml
# =============================================================================
#
#  Illuminazione museale professionale: spot individuali molto precisi puntati
#  su ogni opera o exhibit, con un wash ambientale neutro e debolissimo come
#  "base". I musei d'arte contemporanei usano faretti LED a 3500–4000 K
#  (bianco neutro-caldo) con beam molto stretto per concentrare la luce
#  sull'oggetto senza illuminare lo spazio vuoto. Le ombre sono nette e
#  definite — marcano i volumi scultorei.
#
#  SCHEMA:
#    Exhibit 1-3  — Spot stretti individuali      → ogni exhibit illuminato
#    Ceiling Wash — Area soffitto larga e debole  → fill ambientale neutro
#    Accent Rx    — Spot radente per texture       → enfatizza rilievi e superficie
#
#  LUCI USATE:  spot · spot · spot · area · spot
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/museum-gallery.yaml"
#
#  WORLD ABBINATO (galleria, pareti bianche, ambiente controllato):
#    world:
#      sky:
#        type: "flat"
#        color: [0.025, 0.025, 0.028]
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 400  -H 225 -s 64   -d 4  -S 1
#    Preview: -w 800  -H 450 -s 256  -d 6
#    Final  : -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
#  NOTE:
#    - Questo setup è pensato per 3 exhibit disposti lungo un asse centrale.
#      Adatta le posizioni degli spot agli exhibit nella tua scena specifica.
#    - I musei moderni usano binari elettrificati sul soffitto con spot
#      orientabili: ogni spot serve UN oggetto. La precisione è tutto.
#    - Il colore 3500 K ([1.0, 0.92, 0.78]) è il bianco neutro-caldo preferito
#      dai musei d'arte: non altera i colori dei dipinti come il tungsteno
#      ma è più "vivo" del freddo LED puro.
#    - Il "grazing light" (accent_rx) è usato sui rilievi scultorei:
#      una luce radente a basso angolo esalta le microgeometrie superficiali.
#      Posizionalo vicino alla scultura principale.
# =============================================================================

lights:

  # ── SPOT EXHIBIT 1 (SINISTRA) ─────────────────────────────────────────────
  #  Faretto LED stretto puntato sull'exhibit di sinistra (piedistallo/scultura).
  #  Il colore 3500 K è il bianco caldo-neutro standard museale: non distorce
  #  i materiali ma li avvolge di una luce "seria" e professionale.
  #  Inner/outer stretti: il beam deve rimanere sull'oggetto, non sul pavimento.
  #  Posizione: graticcio soffitto, leggermente di lato per creare ombra scultorea.
  - type: "spot"
    position: [-3.5, 5.8, -2.5]
    direction: [0.28, -0.88, 0.38]
    color: [1.0, 0.92, 0.78]
    intensity: 85.0
    inner_angle: 8
    outer_angle: 18
    soft_radius: 0.08
    shadow_samples: 6

  # ── SPOT EXHIBIT 2 (CENTRO) ───────────────────────────────────────────────
  #  Faretto per l'exhibit centrale — di solito l'opera principale della sala.
  #  Leggermente più intenso degli altri due: il pezzo centrale merita
  #  di essere il più luminoso, attraendo lo sguardo del visitatore.
  #  Posizione: quasi verticale, solo leggera inclinazione frontale
  #  per non creare ombre troppo marcate direttamente sotto l'oggetto.
  - type: "spot"
    position: [0.2, 6.0, -2.0]
    direction: [-0.05, -0.90, 0.43]
    color: [1.0, 0.93, 0.80]
    intensity: 95.0
    inner_angle: 10
    outer_angle: 22
    soft_radius: 0.08
    shadow_samples: 8

  # ── SPOT EXHIBIT 3 (DESTRA) ───────────────────────────────────────────────
  #  Faretto per l'exhibit di destra. Simmetrico all'exhibit 1 nella
  #  posizione relativa ma speculare: viene dall'alto-destra per creare
  #  un'ombra verso sinistra — la stessa direzione dell'exhibit 1 crea
  #  coerenza visiva nella sala (tutte le ombre vanno nella stessa direzione).
  - type: "spot"
    position: [3.8, 5.8, -2.5]
    direction: [-0.32, -0.88, 0.35]
    color: [1.0, 0.92, 0.78]
    intensity: 82.0
    inner_angle: 8
    outer_angle: 18
    soft_radius: 0.08
    shadow_samples: 6

  # ── CEILING WASH (FILL AMBIENTALE) ────────────────────────────────────────
  #  Area light grande e debolissima sul soffitto che simula la luce diffusa
  #  del plafone o dei downlight di servizio. Non deve attirare l'attenzione
  #  ma garantire che le zone non coperte dagli spot (pareti, pavimento lontano)
  #  non siano completamente nere. I musei chiamano questa "ambient fill":
  #  la sua intensità è il 5–10% della luce degli spot sui pezzi esposti.
  - type: "area"
    corner: [-5.5, 6.5, -4.0]
    u: [11.0, 0.0, 0.0]
    v: [0.0, 0.0, 8.0]
    color: [0.90, 0.92, 1.0]
    intensity: 4.5
    shadow_samples: 8

  # ── ACCENT GRAZING LIGHT (TEXTURE RADENTE) ────────────────────────────────
  #  Faretto radente a basso angolo, quasi orizzontale, puntato sull'exhibit
  #  centrale. La luce rasante enfatizza ogni micro-rilievo della superficie:
  #  essenziale per sculture in marmo, bronzo, ceramica, dove la texture è
  #  parte integrante dell'opera. Il bordo dell'angolo è stretto (beam netto)
  #  e il colore è leggermente più freddo degli altri spot per differenziarsi.
  - type: "spot"
    position: [-5.5, 2.5, -1.5]
    direction: [0.88, -0.20, 0.43]
    color: [0.92, 0.95, 1.0]
    intensity: 30.0
    inner_angle: 5
    outer_angle: 12
    soft_radius: 0.05
    shadow_samples: 4
