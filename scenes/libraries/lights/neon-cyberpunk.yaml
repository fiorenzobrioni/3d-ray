# =============================================================================
#  LIBRERIA LUCI — Neon / Cyberpunk
#  scenes/libraries/lights/neon-cyberpunk.yaml
# =============================================================================
#
#  Illuminazione con luci al neon colorate in stile cyberpunk/sci-fi urbano:
#  pool di luce magenta, ciano e viola che si sovrappongono creando zone
#  di colore misto. Le ombre sono colorate (non grigie), i materiali metallici
#  riflettono le tinte neon, le superfici lucide diventano specchi cromatici.
#  Atmosfera: distopica, rave, sci-fi, noir futuro, discoteca, arcade.
#
#  SCHEMA:
#    Neon Magenta — Point magenta-rosa da sinistra  → dominante fredda-calda
#    Neon Cyan    — Point ciano da destra            → dominante fredda-verde
#    Neon Violet  — Spot viola dall'alto-retro       → rim colorato, profondità
#    Floor Strip  — Point lilla dal basso            → strip LED pavimento (uplight)
#
#  LUCI USATE:  point · point · spot · point
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/neon-cyberpunk.yaml"
#
#  WORLD ABBINATO (interno buio, sfondo nero):
#    world:
#      ambient_light: [0.01, 0.0, 0.02]
#      background: [0.0, 0.0, 0.0]
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 400  -H 225 -s 64   -d 4  -S 1
#    Preview: -w 800  -H 450 -s 256  -d 6
#    Final  : -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
#  NOTE:
#    - L'ambient_light con tinta viola [0.01, 0.0, 0.02] tinge l'aria
#      della scena — evita il nero assoluto mantenendo l'atmosfera notturna.
#    - Le intensità sono alte (60–90): le luci neon reali sono sorgenti
#      molto luminose in ambienti molto scuri. Il contrasto è estremo.
#    - Con materiali metallic=1.0 e roughness bassa (0.05–0.15) i riflessi
#      dei neon creano effetti spettacolari. Ideale per chrome, acciaio.
#    - Per un look più "club" (più luci, meno direzione): duplica le point
#      con colori complementari e riduci l'intensità del 40%.
#    - Variante con soli due colori (più elegante):
#      commenta neon_violet e floor_strip, usa solo magenta + cyan.
# =============================================================================

lights:

  # ── NEON MAGENTA (KEY SINISTRA) ───────────────────────────────────────────
  #  Point light magenta-rosa da sinistra, la sorgente dominante della scena.
  #  Il magenta è il colore neon più iconico del cyberpunk: evoca insegne
  #  al neon giapponesi, segnali al plasma, schermi bruciati. L'alta
  #  intensità crea pool luminosi netti sul lato sinistro degli oggetti.
  #  Posizione relativamente vicina al soggetto per massimizzare il contrasto
  #  con il lato ciano (ombra colorata, non grigia).
  - type: "point"
    position: [-4.5, 2.5, -1.5]
    color: [1.0, 0.08, 0.55]
    intensity: 72.0

  # ── NEON CIANO (KEY DESTRA) ───────────────────────────────────────────────
  #  Point light ciano dal lato opposto. Il ciano è il complementare del
  #  rosso/magenta: insieme creano il classico split-lighting bicolore del
  #  cinema cyberpunk (Blade Runner, Ghost in the Shell, Tron).
  #  Le zone illuminate dal magenta sono in ombra ciano e viceversa —
  #  le due luci si "contrastano" senza annullarsi a vicenda.
  - type: "point"
    position: [4.5, 2.0, -2.0]
    color: [0.05, 0.80, 1.0]
    intensity: 65.0

  # ── NEON VIOLA (RIM DALL'ALTO-RETRO) ─────────────────────────────────────
  #  Spot viola dal retro-alto che crea un bordo luminoso colorato sul
  #  profilo superiore del soggetto. Il viola è il colore "mistico" del
  #  cyberpunk — a metà tra il magenta e il ciano, appartiene a entrambi
  #  i lati della scena e funziona come raccordo armonico.
  #  Lo spot stretto evita che inonde la scena: solo un bordo preciso.
  - type: "spot"
    position: [0.5, 6.5, 4.0]
    direction: [-0.05, -0.75, -0.65]
    color: [0.55, 0.05, 1.0]
    intensity: 55.0
    inner_angle: 12
    outer_angle: 28

  # ── FLOOR STRIP LED (UPLIGHT DAL BASSO) ──────────────────────────────────
  #  Point lilla/viola dal basso che simula un strip LED sotto il soggetto
  #  o incorporato nel pavimento (effetto molto comune nell'arredamento
  #  cyberpunk e nei club). L'uplight colora le parti inferiori con un
  #  colore che non appartiene a nessuna delle due sorgenti principali,
  #  aggiungendo una terza dimensione cromatica. Intensità moderata:
  #  deve essere percepibile ma non dominare le due sorgenti laterali.
  - type: "point"
    position: [0.0, -0.8, 0.0]
    color: [0.65, 0.10, 1.0]
    intensity: 18.0
