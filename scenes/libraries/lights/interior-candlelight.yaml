# =============================================================================
#  LIBRERIA LUCI — Luce di Candele
#  scenes/libraries/lights/interior-candlelight.yaml
# =============================================================================
#
#  Illuminazione a candela: la sorgente più antica e romantica. La fiamma
#  è piccola (~1800 K), vicina al soggetto, altamente direzionale e calda
#  all'estremo. L'ambiente circostante è quasi completamente buio con
#  le ombre che si perdono nell'oscurità. Atmosfera: medievale, romantica,
#  horror gotico, fantasy, cena a lume di candela.
#
#  SCHEMA:
#    Candle 1    — Point arancio-fuoco da sinistra  → fiamma primaria
#    Candle 2    — Point arancio-fuoco da destra    → seconda candela, asimmetrica
#    Candle 3    — Point caldo-ambra dal centro     → candela centrale/sfondo (opzionale)
#    Ember Glow  — Directional fuoco dal basso      → brace/luce calda radente
#
#  LUCI USATE:  point · point · point · directional
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/interior-candlelight.yaml"
#
#  WORLD ABBINATO (stanza buia, nessuna luce ambiente):
#    world:
#      ambient_light: [0.004, 0.002, 0.001]
#      background: [0.0, 0.0, 0.0]
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 800  -H 450 -s 64  -d 25
#    Preview: -w 1280 -H 720 -s 256 -d 40
#    Final  : -w 1920 -H 1080 -s 512 -d 60
#
#  NOTE:
#    - Le candele sono molto vicine al soggetto (1–3 u): l'attenuazione
#      quadratica della point light crea il tipico decadimento rapido della
#      luce di candela — brillante vicino, buio poco dopo.
#    - Con ambient_light quasi zero le zone non raggiunte dalle candele
#      sono nere: questo è l'effetto cercato. Non alzare l'ambient.
#    - Per un effetto "flickering" nella scena finale: usa più render
#      con posizioni leggermente diverse e componi un'animazione.
#    - Per aggiungere la sfera emissiva fiamma visibile: abbina una sfera
#      emissiva piccola (radius 0.03) alla posizione di ogni point light.
#    - spp alto raccomandato (256+): le scene con poche luci puntiformi
#      vicine tendono al rumore nelle zone di transizione luce/ombra.
# =============================================================================

lights:

  # ── CANDELA PRIMARIA (SINISTRA) ───────────────────────────────────────────
  #  La candela principale, posizionata vicino-sinistra al soggetto.
  #  Il colore [1.0, 0.48, 0.08] corrisponde a ~1800 K (temperatura di
  #  fiamma di candela misurata fotometricamente): arancio-fuoco intenso,
  #  quasi rosso ai margini. L'intensità è calibrata per illuminare
  #  efficacemente un soggetto a ~1.5 u di distanza.
  - type: "point"
    position: [-1.2, 1.4, -0.8]
    color: [1.0, 0.48, 0.08]
    intensity: 8.0

  # ── CANDELA SECONDARIA (DESTRA) ───────────────────────────────────────────
  #  Seconda candela asimmetrica: leggermente più lontana e meno intensa
  #  della primaria. L'asimmetria è fondamentale — due candele identiche
  #  creerebbero una luce troppo uniforme, perdendo il fascino irregolare
  #  della luce di candela. Il colore è leggermente più ambrato (candela
  #  diversa, cera diversa, fiamma più piccola = temperatura colore minore).
  - type: "point"
    position: [1.5, 1.2, -0.5]
    color: [1.0, 0.42, 0.06]
    intensity: 5.5

  # ── CANDELA SFONDO (CENTRO-RETRO — OPZIONALE) ─────────────────────────────
  #  Terza candela in profondità, simula un candelabro o un lumino lontano.
  #  La distanza maggiore la rende molto meno efficace sull'illuminazione
  #  del soggetto principale ma contribuisce con un fondo luminoso caldo
  #  dietro la scena — evita che lo sfondo sia completamente nero piatto.
  #  Commenta questa se preferisci il buio totale in profondità.
  - type: "point"
    position: [0.3, 1.6, 2.8]
    color: [1.0, 0.52, 0.10]
    intensity: 6.0

  # ── EMBER GLOW (BRACE / LUCE DAL BASSO) ──────────────────────────────────
  #  Directional molto bassa con direzione quasi orizzontale verso l'alto,
  #  che simula il bagliore di un camino o di braci a livello del pavimento.
  #  Colore rosso-fuoco: la brace è ancora più calda (1500 K) della fiamma.
  #  Intensità debolissima: solo per tingere leggermente le superfici
  #  inferiori con un riflesso rosso che amplia la narrativa della fonte di calore.
  - type: "directional"
    direction: [0.30, -0.15, -0.95]
    color: [1.0, 0.28, 0.02]
    intensity: 0.012
