# =============================================================================
#  LIBRERIA LUCI — Interni Caldi (3000 K — Incandescenza / Warm LED)
#  scenes/libraries/lights/interior-warm.yaml
# =============================================================================
#
#  Illuminazione domestica serale: una o più lampade a incandescenza o LED
#  warm white (2700–3000 K) che creano un ambiente accogliente, intimo e
#  caldo. Le ombre sono morbide, i colori virano all'ambra, i materiali
#  scuri sembrano vellutati. Ideale per salotti, cucine, camere da letto,
#  ristoranti intimi.
#
#  SCHEMA:
#    Main Bulb   — Sphere light calda dall'alto   → sorgente principale visibile
#    Table Lamp  — Point calda laterale           → luce d'accento da lampada da tavolo
#    Window Moon — Directional fredda debole      → finestra notturna (contrasto)
#    Floor Bounce— Point da terra tenue           → rimbalzo pavimento caldo
#
#  LUCI USATE:  sphere · point · directional · point
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/interior-warm.yaml"
#
#  WORLD ABBINATO (interno scuro, notte fuori):
#    world:
#      ambient_light: [0.02, 0.015, 0.008]
#      background: [0.01, 0.01, 0.02]
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 400  -H 225 -s 64   -d 4  -S 1
#    Preview: -w 800  -H 450 -s 256  -d 6
#    Final  : -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
#  NOTE:
#    - La sphere light simula una lampadina da soffitto con globo smerigliato.
#      Il raggio 0.15 crea ombre morbide senza sembrare una point light pura.
#    - La directional finestra è molto debole (luce lunare da fuori):
#      crea il contrasto caldo/freddo necessario a non far sembrare la scena
#      dentro una "bolla" di luce senza ambiente esterno.
#    - Adatta le posizioni alla geometria della tua stanza specifica:
#      la main bulb va al centro del soffitto, la table lamp su un comodino.
#    - Per una stanza con più lampade aggiungi sphere light extra con la
#      stessa temperatura di colore ma intensità diversa.
# =============================================================================

lights:

  # ── LAMPADINA PRINCIPALE (MAIN BULB — KEY) ───────────────────────────────
  #  Sphere light a soffitto che simula una lampadina da 60W con globo
  #  smerigliato (o un plafoniere LED warm white 3000 K). Il raggio 0.15
  #  produce ombre morbide realistiche per una fonte di 15 cm di diametro.
  #  Il colore [1.0, 0.78, 0.42] corrisponde a ~2900 K (tungsteno classico):
  #  arancio-ambra intenso, il tono della luce domestica più riconoscibile.
  - type: "sphere"
    position: [0.0, 3.2, 0.0]
    radius: 0.15
    color: [1.0, 0.78, 0.42]
    intensity: 28.0
    shadow_samples: 16

  # ── LAMPADA DA TAVOLO (ACCENT LATERALE) ──────────────────────────────────
  #  Point light che simula una lampada da comodino o tavolo con paralume.
  #  Il paralume direziona la luce verso il basso e sui lati: la point
  #  approssima bene questo comportamento per una lampada laterale.
  #  Colore leggermente più caldo della lampadina principale (bulbo più
  #  piccolo con filamento più concentrato = temperatura di colore minore).
  #  Posizione: laterale-bassa, fuori dal campo visivo tipico.
  - type: "point"
    position: [-2.5, 1.2, -1.0]
    color: [1.0, 0.68, 0.30]
    intensity: 12.0

  # ── LUCE FINESTRA NOTTURNA (CONTRASTO FREDDO) ─────────────────────────────
  #  Directional che simula la luce lunare o del cielo notturno che filtra
  #  da una finestra fuori campo. Intensità molto bassa: non deve illuminare
  #  la scena ma introdurre un accenno di azzurro-freddo che contrasta con
  #  il calore delle lampade. Il contrasto caldo/freddo è ciò che rende
  #  una scena d'interno serale visivamente credibile e cinematografica.
  - type: "directional"
    direction: [0.60, -0.55, -0.55]
    color: [0.55, 0.65, 1.0]
    intensity: 0.018

  # ── FLOOR BOUNCE (RIMBALZO PAVIMENTO) ─────────────────────────────────────
  #  Point dal basso che simula la luce rimbalzata dalla pavimentazione
  #  calda (parquet, moquette, tappeto). Illumina la parte inferiore dei
  #  mobili e delle gambe delle sedie che altrimenti cadrebbero nel buio.
  #  Colore molto caldo: il parquet filtra ulteriormente la luce verso
  #  i toni del legno. Intensità minima — solo un "respiro" di calore dal basso.
  - type: "point"
    position: [0.0, -0.5, 0.0]
    color: [1.0, 0.72, 0.38]
    intensity: 4.0
