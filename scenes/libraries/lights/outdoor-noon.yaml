# =============================================================================
#  LIBRERIA LUCI — Esterno a Mezzogiorno
#  scenes/libraries/lights/outdoor-noon.yaml
# =============================================================================
#
#  Luce solare di piena estate a mezzogiorno: sole quasi zenitale, ombre
#  corte e nette, luce bianca e dura. Il fill del cielo è azzurro e diffuso.
#  Classico della visualizzazione architettonica e dei render outdoor estivi.
#
#  SCHEMA:
#    Sun Direct  — Directional quasi zenitale      → luce primaria dura, ombre corte
#    Sky Diffuse — Directional dall'alto morbida   → fill del cielo azzurro
#    Ground Ref  — Directional dal basso           → luce riflessa dal terreno (GI fake)
#
#  LUCI USATE:  directional · directional · directional
#
#  USO CONSIGLIATO:
#    imports:
#      - path: "libraries/lights/outdoor-noon.yaml"
#
#  WORLD ABBINATO (cielo diurno procedurale):
#    world:
#      ambient_light: [0.06, 0.08, 0.12]
#      sky:
#        type: "gradient"
#        zenith_color:  [0.10, 0.30, 0.80]
#        horizon_color: [0.62, 0.78, 1.00]
#        ground_color:  [0.28, 0.25, 0.18]
#        sun:
#          direction: [-0.25, -1.0, -0.20]
#          color: [1.0, 0.98, 0.92]
#          intensity: 14.0
#          size: 2.0
#          falloff: 50.0
#
#  RENDER CONSIGLIATO:
#    Draft  : -w 400  -H 225 -s 64   -d 4  -S 1
#    Preview: -w 800  -H 450 -s 256  -d 6
#    Final  : -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
#  NOTE:
#    - La directional sole e il sun disk devono avere la stessa direction
#      per coerenza visiva: il disco nel cielo e le ombre puntano uguale.
#    - L'intensità della directional (0.08–0.12) è bassa rispetto allo studio
#      perché il cielo contribuisce già con molta GI tramite l'ambient e i bounce.
#    - Per scene con pavimento chiaro (cemento, sabbia) il ground reflect è
#      più importante: aumenta la sua intensità a 0.025.
# =============================================================================

lights:

  # ── SOLE DIRETTO (KEY) ────────────────────────────────────────────────────
  #  Directional con direzione quasi zenitale (85° rispetto all'orizzonte).
  #  Simula il sole di mezzogiorno in estate a latitudini mediterranee.
  #  La luce è bianca con una leggera punta calda (l'atmosfera filtra
  #  meno i blu allo zenit rispetto al tramonto, ma non è perfettamente neutra).
  #  Deve avere la stessa direction del sun disk nel world.sky per coerenza.
  - type: "directional"
    direction: [-0.25, -1.0, -0.20]
    color: [1.0, 0.98, 0.92]
    intensity: 0.10

  # ── FILL CIELO (SKY DIFFUSE) ──────────────────────────────────────────────
  #  Seconda directional che simula la luce diffusa del cielo azzurro
  #  su tutto l'emisfero superiore. In un path tracer reale questo emergerebbe
  #  dai bounce multipli con gradient sky; questa luce lo approssima in modo
  #  deterministico per un risultato coerente anche con pochi sample.
  #  La direzione è una media dell'emisfero superiore (approssimativamente
  #  "dall'alto obliquo"), il colore azzurro cielo, l'intensità molto bassa.
  - type: "directional"
    direction: [0.20, -0.85, 0.10]
    color: [0.55, 0.72, 1.0]
    intensity: 0.04

  # ── GROUND REFLECT (BOUNCE TERRENO) ──────────────────────────────────────
  #  Simula la luce riflessa dal terreno (GI fake dal basso).
  #  Anche su terreno opaco una piccola percentuale di luce solare rimbalza
  #  verso l'alto, schiarendo le zone in ombra nella parte inferiore degli
  #  oggetti. Il colore è leggermente terroso (riflesso del colore del suolo).
  #  Direzione verso l'alto, intensità minima: solo un accenno.
  - type: "directional"
    direction: [0.0, 1.0, 0.0]
    color: [0.90, 0.85, 0.72]
    intensity: 0.012
