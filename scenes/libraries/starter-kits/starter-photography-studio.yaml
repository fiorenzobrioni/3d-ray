# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Photography Studio
#
#  Studio fotografico professionale con fondale infinito (cyclorama wall),
#  softbox (area light), luci di fill e rim, pavimento riflettente.
#  Un piedistallo al centro ospita il soggetto della composizione.
#  Setup 3-point lighting classico con varianti per mood diversi.
#
#  AMBIENTAZIONE: Indoor — studio fotografico, ambiente controllato
#  STILE: Product shot, portrait, catalogo
#
#  Render consigliato:
#    Draft:    -w 800  -H 600  -s 16  -d 15 -S 4
#    Preview:  -w 1280 -H 960  -s 64  -d 25 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 40 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


# ─── WORLD ATTIVO ★ Studio nero — sfondo scuro controllato ──────────────────
world:
  ambient_light: [0.02, 0.02, 0.02]
  background: [0.03, 0.03, 0.03]

# ─── WORLD ALT-1: Studio bianco — high key ──────────────────────────────────
# world:
#   ambient_light: [0.12, 0.12, 0.12]
#   background: [0.90, 0.90, 0.90]

# ─── WORLD ALT-2: Studio grigio neutro ──────────────────────────────────────
# world:
#   ambient_light: [0.05, 0.05, 0.05]
#   background: [0.35, 0.35, 0.35]


# ═══════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════════
cameras:

  # ── Product shot frontale standard ─────────────────────────────────────────
  - name: "frontale"
    position: [0, 1.5, -6]
    look_at:  [0, 1.0, 0]
    fov: 38
    aperture: 0.0
    focal_dist: 6.0

  # ── 3/4 dall'alto — angolo editoriale ──────────────────────────────────────
  - name: "editoriale"
    position: [3, 2.5, -5]
    look_at:  [0, 0.8, 0]
    fov: 42
    aperture: 0.0
    focal_dist: 6.5

  # ── Macro con DOF — focus sul soggetto ─────────────────────────────────────
  - name: "macro"
    position: [0.5, 1.2, -3.5]
    look_at:  [0, 1.0, 0]
    fov: 32
    aperture: 0.10
    focal_dist: 3.6

  # ── Low angle — drammatica dal basso ───────────────────────────────────────
  - name: "low_angle"
    position: [0, 0.3, -5]
    look_at:  [0, 1.2, 0]
    fov: 45
    aperture: 0.0
    focal_dist: 5.5

  # ── Top down — vista dall'alto ─────────────────────────────────────────────
  - name: "zenitale"
    position: [0, 8, 0]
    look_at:  [0, 0, 0]
    vup: [0, 0, 1]
    fov: 40
    aperture: 0.0
    focal_dist: 8.0


# ═══════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════════
materials:

  # ── Fondale studio — grigio neutro opaco ───────────────────────────────────
  - id: "fondale_grigio"
    type: "lambertian"
    color: [0.40, 0.40, 0.40]

  # ── Fondale bianco (per high key) ─────────────────────────────────────────
  - id: "fondale_bianco"
    type: "lambertian"
    color: [0.92, 0.92, 0.92]

  # ── Pavimento studio — grigio scuro lucido ─────────────────────────────────
  - id: "pavimento_studio"
    type: "disney"
    color: [0.08, 0.08, 0.08]
    roughness: 0.15
    metallic: 0.0
    specular: 0.8
    clearcoat: 0.6
    clearcoat_gloss: 0.9

  # ── Piedistallo — bianco opaco ─────────────────────────────────────────────
  - id: "piedistallo_bianco"
    type: "disney"
    color: [0.92, 0.92, 0.92]
    roughness: 0.30
    metallic: 0.0
    specular: 0.4

  # ── Metallo struttura studio ───────────────────────────────────────────────
  - id: "alluminio_studio"
    type: "disney"
    color: [0.70, 0.70, 0.72]
    roughness: 0.35
    metallic: 0.90
    specular: 0.7

  # ── Pannello softbox (retro) ───────────────────────────────────────────────
  - id: "nero_opaco"
    type: "lambertian"
    color: [0.02, 0.02, 0.02]

  # ── Pannello diffusore softbox (emissivo) ──────────────────────────────────
  - id: "softbox_panel"
    type: "emissive"
    color: [1.0, 0.97, 0.92]
    intensity: 12.0


# ═══════════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════════
templates:

  # ── Softbox su stativo (semplificato) ──────────────────────────────────────
  - name: "softbox"
    children:
      # Stativo (asta verticale)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.03
        height: 2.0
        material: "alluminio_studio"
      # Braccio (asta obliqua)
      - type: "cylinder"
        center: [0, 2.0, 0]
        radius: 0.02
        height: 0.5
        rotate: [0, 0, -30]
        material: "alluminio_studio"
      # Box (retro nero)
      - type: "box"
        scale: [1.2, 0.8, 0.15]
        translate: [0.3, 2.6, 0]
        material: "nero_opaco"
      # Pannello emissivo (fronte)
      - type: "quad"
        q: [-0.3, 2.2, -0.08]
        u: [1.2, 0, 0]
        v: [0, 0.8, 0]
        material: "softbox_panel"


# ═══════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  PAVIMENTO — Piano lucido scuro
  # ─────────────────────────────────────────────────────────────────────────
  - name: "pavimento"
    type: "plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento_studio"

  # ─────────────────────────────────────────────────────────────────────────
  #  CYCLORAMA WALL — Fondale curvo (simulato con quad + cilindro)
  # ─────────────────────────────────────────────────────────────────────────

  # Parete di fondo (quad grande)
  - name: "fondale_parete"
    type: "quad"
    q: [-6, 0, 5]
    u: [12, 0, 0]
    v: [0, 6, 0]
    material: "fondale_grigio"

  # Curva fondale-pavimento (cilindro orizzontale con solo il quarto visibile)
  - name: "fondale_curva"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 1.5
    height: 12.0
    rotate: [0, 0, 90]
    translate: [0, 0, 3.5]
    material: "fondale_grigio"

  # Pareti laterali (per contenere la luce)
  - name: "parete_sx"
    type: "quad"
    q: [-6, 0, -4]
    u: [0, 0, 9]
    v: [0, 6, 0]
    material: "nero_opaco"

  - name: "parete_dx"
    type: "quad"
    q: [6, 0, -4]
    u: [0, 0, 9]
    v: [0, 6, 0]
    material: "nero_opaco"

  # Soffitto
  - name: "soffitto"
    type: "quad"
    q: [-6, 5.5, -4]
    u: [12, 0, 0]
    v: [0, 0, 9]
    material: "nero_opaco"

  # ─────────────────────────────────────────────────────────────────────────
  #  PIEDISTALLO — Dove posizionare il soggetto
  # ─────────────────────────────────────────────────────────────────────────

  # Base circolare (cylinder piatto)
  - name: "piedistallo_base"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 1.0
    height: 0.08
    material: "piedistallo_bianco"

  # Colonna
  - name: "piedistallo_colonna"
    type: "cylinder"
    center: [0, 0.08, 0]
    radius: 0.50
    height: 0.55
    material: "piedistallo_bianco"

  # Piano d'appoggio
  - name: "piedistallo_top"
    type: "cylinder"
    center: [0, 0.63, 0]
    radius: 0.65
    height: 0.05
    material: "piedistallo_bianco"

  # ─────────────────────────────────────────────────────────────────────────
  #  SOFTBOX — 2 strutture posizionate
  # ─────────────────────────────────────────────────────────────────────────
  - { type: "instance", template: "softbox", translate: [-3, 0, -2], rotate: [0, 25, 0] }
  - { type: "instance", template: "softbox", translate: [3.5, 0, -1], rotate: [0, -30, 0] }


# ═══════════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════════

# ─── LUCI ATTIVE ★ 3-Point Lighting classico ────────────────────────────────
lights:
  # Key light — area light grande da sinistra-alto
  - type: "area"
    corner: [-3.5, 3.0, -2.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 1.5, 0.0]
    color: [1.0, 0.97, 0.92]
    intensity: 40.0
    shadow_samples: 16

  # Fill light — più debole da destra
  - type: "point"
    position: [4, 2.5, -3]
    color: [0.85, 0.88, 1.0]
    intensity: 25.0

  # Rim/back light — da dietro per separare dal fondale
  - type: "spot"
    position: [0, 4.5, 3]
    direction: [0, -0.7, -1.0]
    color: [1.0, 0.98, 0.95]
    intensity: 30
    inner_angle: 18
    outer_angle: 35

