# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Chess Set
#
#  Scacchiera completa con pedine stilizzate costruite interamente con template
#  e istanze. Due set di materiali (marmo bianco e legno scuro). Ogni tipo di
#  pezzo è un template riutilizzabile. Dimostra il sistema template/instance
#  al massimo delle sue possibilità.
#
#  AMBIENTAZIONE: Indoor — tavolo da gioco, luce da studio
#  STILE: Elegante, product shot, DOF cinematografico
#
#  Render consigliato:
#    Draft:    -w 800  -H 600  -s 16  -d 15 -S 4
#    Preview:  -w 1280 -H 960  -s 64  -d 25 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 40 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


world:
  ambient_light: [0.04, 0.04, 0.05]
  background: [0.08, 0.08, 0.10]
  ground:
    type: "infinite_plane"
    material: "tavolo"
    y: 0


cameras:

  - name: "partita"
    position: [0, 5, -6]
    look_at:  [0, 0.5, 0]
    fov: 42
    aperture: 0.05
    focal_dist: 8.0

  - name: "prospettiva_re"
    position: [-3, 2, -4]
    look_at:  [0, 0.5, 0]
    fov: 48
    aperture: 0.04
    focal_dist: 5.5

  - name: "macro_pezzo"
    position: [0.5, 1.0, -2.5]
    look_at:  [0.5, 0.6, -0.5]
    fov: 35
    aperture: 0.08
    focal_dist: 2.5

  - name: "zenitale"
    position: [0, 10, 0]
    look_at:  [0, 0, 0]
    vup: [0, 0, 1]
    fov: 38
    aperture: 0.0
    focal_dist: 10.0


lights:

  - type: "area"
    corner: [-2, 4.5, -2]
    u: [4, 0, 0]
    v: [0, 0, 4]
    color: [1.0, 0.97, 0.92]
    intensity: 30.0
    shadow_samples: 16

  - type: "spot"
    position: [2.5, 3, -2.5]
    direction: [-0.4, -0.8, 0.4]
    color: [1.0, 0.92, 0.80]
    intensity: 15
    inner_angle: 15
    outer_angle: 35


materials:

  - id: "tavolo"
    type: "disney"
    texture:
      type: "wood"
      scale: 3.0
      colors: [[0.30, 0.18, 0.08], [0.22, 0.12, 0.04]]
      randomize_offset: true
    roughness: 0.35
    metallic: 0.0
    specular: 0.4
    clearcoat: 0.5
    clearcoat_gloss: 0.8

  - id: "casa_chiara"
    type: "disney"
    texture:
      type: "marble"
      scale: 25.0
      noise_strength: 3.0
      colors: [[0.90, 0.88, 0.82], [0.78, 0.75, 0.70]]
      randomize_offset: true
    roughness: 0.20
    specular: 0.5

  - id: "casa_scura"
    type: "disney"
    color: [0.08, 0.06, 0.04]
    roughness: 0.25
    specular: 0.6
    clearcoat: 0.3
    clearcoat_gloss: 0.7

  - id: "bordo_scacchiera"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.0
      colors: [[0.35, 0.20, 0.08], [0.25, 0.14, 0.05]]
      randomize_offset: true
    roughness: 0.30
    specular: 0.5
    clearcoat: 0.4
    clearcoat_gloss: 0.8

  # ── Pezzi bianchi: marmo ───────────────────────────────────────────────────
  - id: "pezzo_bianco"
    type: "disney"
    texture:
      type: "marble"
      scale: 15.0
      noise_strength: 5.0
      colors: [[0.95, 0.93, 0.90], [0.80, 0.78, 0.74]]
      randomize_offset: true
    roughness: 0.18
    specular: 0.6
    clearcoat: 0.5
    clearcoat_gloss: 0.9

  # ── Pezzi neri: legno d'ebano lucido ───────────────────────────────────────
  - id: "pezzo_nero"
    type: "disney"
    color: [0.04, 0.03, 0.03]
    roughness: 0.15
    specular: 0.7
    clearcoat: 0.6
    clearcoat_gloss: 0.92


templates:

  # ── Pedone (cilindro base + sfera testa) ───────────────────────────────────
  - name: "pedone"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.14
        height: 0.04
      - type: "cylinder"
        center: [0, 0.04, 0]
        radius: 0.08
        height: 0.22
      - type: "sphere"
        center: [0, 0.32, 0]
        radius: 0.10

  # ── Torre (cilindro + toro merlatura) ──────────────────────────────────────
  - name: "torre"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.16
        height: 0.05
      - type: "cylinder"
        center: [0, 0.05, 0]
        radius: 0.11
        height: 0.35
      - type: "cylinder"
        center: [0, 0.40, 0]
        radius: 0.14
        height: 0.06
      - type: "torus"
        major_radius: 0.12
        minor_radius: 0.02
        translate: [0, 0.46, 0]

  # ── Cavallo (capsule + sfera testa inclinata) ──────────────────────────────
  - name: "cavallo"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.15
        height: 0.05
      - type: "cylinder"
        center: [0, 0.05, 0]
        radius: 0.09
        height: 0.20
      # Collo inclinato
      - type: "capsule"
        center: [0, 0.25, 0]
        radius: 0.07
        height: 0.22
        rotate: [20, 0, 0]
      # Testa (ellissoide)
      - type: "sphere"
        center: [0.03, 0.48, -0.06]
        radius: 0.09
        scale: [0.8, 1.0, 1.3]

  # ── Alfiere (cilindro + cono + sferetta) ───────────────────────────────────
  - name: "alfiere"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.15
        height: 0.05
      - type: "cone"
        center: [0, 0.05, 0]
        radius: 0.10
        top_radius: 0.04
        height: 0.38
      - type: "sphere"
        center: [0, 0.46, 0]
        radius: 0.05

  # ── Regina (cilindro + cono + toro corona) ─────────────────────────────────
  - name: "regina"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.17
        height: 0.05
      - type: "cone"
        center: [0, 0.05, 0]
        radius: 0.12
        top_radius: 0.05
        height: 0.42
      - type: "torus"
        major_radius: 0.06
        minor_radius: 0.015
        translate: [0, 0.47, 0]
      - type: "sphere"
        center: [0, 0.52, 0]
        radius: 0.03

  # ── Re (come regina ma più alto + croce in cima) ──────────────────────────
  - name: "re"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.17
        height: 0.05
      - type: "cone"
        center: [0, 0.05, 0]
        radius: 0.12
        top_radius: 0.06
        height: 0.48
      - type: "torus"
        major_radius: 0.07
        minor_radius: 0.015
        translate: [0, 0.53, 0]
      # Croce (due box incrociati)
      - type: "box"
        scale: [0.025, 0.10, 0.025]
        translate: [0, 0.60, 0]
      - type: "box"
        scale: [0.06, 0.025, 0.025]
        translate: [0, 0.63, 0]


entities:

  # ── SCACCHIERA ─────────────────────────────────────────────────────────────
  # Bordo esterno
  - name: "bordo"
    type: "box"
    scale: [3.5, 0.12, 3.5]
    translate: [0, 0.06, 0]
    material: "bordo_scacchiera"
    seed: 10

  # Caselle 8×8 (box piatti alternati) — solo le prime 2 file per ogni lato
  # Fila 1 (Z = -1.3125) ... le caselle coprono da -1.5 a 1.5 con step 0.375
  # Per brevità, usiamo un box per le caselle chiare e uno per le scure sovrapposti

  # Piano scacchiera chiaro (base)
  - name: "piano_chiaro"
    type: "box"
    scale: [3.0, 0.02, 3.0]
    translate: [0, 0.125, 0]
    material: "casa_chiara"

  # Caselle scure (checker pattern simulato)
  # Nota: si usa direttamente il checker texture sulla superficie
  - name: "piano_scacchi"
    type: "box"
    scale: [3.01, 0.001, 3.01]
    translate: [0, 0.136, 0]
    material: "casa_scura"

  # In alternativa, l'utente può usare un material checker:
  # - id: "scacchiera_tex"
  #   type: "lambertian"
  #   texture:
  #     type: "checker"
  #     scale: 0.375
  #     colors: [[0.90, 0.88, 0.82], [0.08, 0.06, 0.04]]

  # ── PEZZI BIANCHI (lato Z negativo) ───────────────────────────────────────
  # Centro casella = -1.3125 + n*0.375  (n=0..7)
  # Pedoni (fila 2: Z ≈ -0.94)
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [-1.31, 0.14, -0.94], seed: 2001 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [-0.94, 0.14, -0.94], seed: 2002 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [-0.56, 0.14, -0.94], seed: 2003 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [-0.19, 0.14, -0.94], seed: 2004 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [0.19, 0.14, -0.94], seed: 2005 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [0.56, 0.14, -0.94], seed: 2006 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [0.94, 0.14, -0.94], seed: 2007 }
  - { type: "instance", template: "pedone", material: "pezzo_bianco", translate: [1.31, 0.14, -0.94], seed: 2008 }

  # Pezzi speciali (fila 1: Z ≈ -1.31)
  - { type: "instance", template: "torre",   material: "pezzo_bianco", translate: [-1.31, 0.14, -1.31], seed: 2010 }
  - { type: "instance", template: "cavallo", material: "pezzo_bianco", translate: [-0.94, 0.14, -1.31], seed: 2011 }
  - { type: "instance", template: "alfiere", material: "pezzo_bianco", translate: [-0.56, 0.14, -1.31], seed: 2012 }
  - { type: "instance", template: "regina",  material: "pezzo_bianco", translate: [-0.19, 0.14, -1.31], seed: 2013 }
  - { type: "instance", template: "re",      material: "pezzo_bianco", translate: [0.19, 0.14, -1.31], seed: 2014 }
  - { type: "instance", template: "alfiere", material: "pezzo_bianco", translate: [0.56, 0.14, -1.31], seed: 2015 }
  - { type: "instance", template: "cavallo", material: "pezzo_bianco", translate: [0.94, 0.14, -1.31], seed: 2016 }
  - { type: "instance", template: "torre",   material: "pezzo_bianco", translate: [1.31, 0.14, -1.31], seed: 2017 }

  # ── PEZZI NERI (lato Z positivo) ──────────────────────────────────────────
  # Pedoni (fila 7: Z ≈ 0.94)
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [-1.31, 0.14, 0.94], seed: 3001 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [-0.94, 0.14, 0.94], seed: 3002 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [-0.56, 0.14, 0.94], seed: 3003 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [-0.19, 0.14, 0.94], seed: 3004 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [0.19, 0.14, 0.94], seed: 3005 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [0.56, 0.14, 0.94], seed: 3006 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [0.94, 0.14, 0.94], seed: 3007 }
  - { type: "instance", template: "pedone", material: "pezzo_nero", translate: [1.31, 0.14, 0.94], seed: 3008 }

  # Pezzi speciali (fila 8: Z ≈ 1.31)
  - { type: "instance", template: "torre",   material: "pezzo_nero", translate: [-1.31, 0.14, 1.31], seed: 3010 }
  - { type: "instance", template: "cavallo", material: "pezzo_nero", translate: [-0.94, 0.14, 1.31], seed: 3011, rotate: [0, 180, 0] }
  - { type: "instance", template: "alfiere", material: "pezzo_nero", translate: [-0.56, 0.14, 1.31], seed: 3012 }
  - { type: "instance", template: "regina",  material: "pezzo_nero", translate: [-0.19, 0.14, 1.31], seed: 3013 }
  - { type: "instance", template: "re",      material: "pezzo_nero", translate: [0.19, 0.14, 1.31], seed: 3014 }
  - { type: "instance", template: "alfiere", material: "pezzo_nero", translate: [0.56, 0.14, 1.31], seed: 3015 }
  - { type: "instance", template: "cavallo", material: "pezzo_nero", translate: [0.94, 0.14, 1.31], seed: 3016, rotate: [0, 180, 0] }
  - { type: "instance", template: "torre",   material: "pezzo_nero", translate: [1.31, 0.14, 1.31], seed: 3017 }

