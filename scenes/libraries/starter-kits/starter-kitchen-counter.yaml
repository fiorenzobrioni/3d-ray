# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Kitchen Counter
#
#  Piano cucina in marmo con oggetti quotidiani: bicchiere di vetro (CSG sfera
#  cava), ciotola con frutta stilizzata (sfere colorate, ellissoidi), bottiglia
#  (cilindro + cono + sfera), tagliere in legno, tazza di ceramica. Luce da
#  finestra laterale che crea ombre morbide e caustiche attraverso il vetro.
#
#  AMBIENTAZIONE: Indoor — cucina moderna, still life
#  STILE: Fotorealistico, domestico, luce naturale da finestra
#
#  Render consigliato:
#    Draft:    -w 800  -H 600  -s 16  -d 20 -S 4
#    Preview:  -w 1280 -H 960  -s 64  -d 30 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 50 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


world:
  ambient_light: [0.05, 0.05, 0.06]
  background: [0.0, 0.0, 0.0]


cameras:

  - name: "still_life"
    position: [0, 1.4, -2.5]
    look_at:  [0, 0.95, 0]
    fov: 45
    aperture: 0.03
    focal_dist: 3.0

  - name: "alto"
    position: [0.5, 2.2, -2]
    look_at:  [0, 0.90, 0.2]
    fov: 42
    aperture: 0.0
    focal_dist: 3.0

  - name: "dettaglio_bicchiere"
    position: [-0.5, 1.1, -1.5]
    look_at:  [-0.4, 1.0, 0]
    fov: 32
    aperture: 0.06
    focal_dist: 1.8

  - name: "laterale"
    position: [-2.5, 1.3, 0]
    look_at:  [0, 0.95, 0]
    fov: 48
    aperture: 0.0
    focal_dist: 3.0


materials:

  # ── Piano cucina: marmo di Carrara ─────────────────────────────────────────
  - id: "marmo_cucina"
    type: "disney"
    texture:
      type: "marble"
      scale: 6.0
      noise_strength: 7.0
      colors: [[0.95, 0.93, 0.90], [0.65, 0.62, 0.58]]
      randomize_offset: true
    roughness: 0.15
    metallic: 0.0
    specular: 0.6
    clearcoat: 0.4
    clearcoat_gloss: 0.85

  - id: "parete_cucina"
    type: "lambertian"
    color: [0.90, 0.88, 0.85]

  - id: "credenza"
    type: "disney"
    color: [0.20, 0.18, 0.16]
    roughness: 0.40
    metallic: 0.0
    specular: 0.3

  # ── Vetro cristallo ────────────────────────────────────────────────────────
  - id: "cristallo"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.98, 0.99, 1.0]

  # ── Vetro bottiglia verde ──────────────────────────────────────────────────
  - id: "vetro_verde"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.25, 0.45, 0.22]

  # ── Ceramica bianca (tazza) ────────────────────────────────────────────────
  - id: "ceramica_tazza"
    type: "disney"
    color: [0.92, 0.90, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.7
    clearcoat: 0.8
    clearcoat_gloss: 0.95

  # ── Legno tagliere ─────────────────────────────────────────────────────────
  - id: "legno_tagliere"
    type: "disney"
    texture:
      type: "wood"
      scale: 10.0
      colors: [[0.60, 0.42, 0.22], [0.48, 0.32, 0.15]]
      randomize_offset: true
    roughness: 0.55
    metallic: 0.0

  # ── Frutta ─────────────────────────────────────────────────────────────────
  - id: "mela_rossa"
    type: "disney"
    color: [0.72, 0.08, 0.05]
    roughness: 0.35
    metallic: 0.0
    specular: 0.5
    clearcoat: 0.6
    clearcoat_gloss: 0.8

  - id: "mela_verde"
    type: "disney"
    color: [0.30, 0.55, 0.12]
    roughness: 0.40
    metallic: 0.0
    specular: 0.4
    clearcoat: 0.5
    clearcoat_gloss: 0.7

  - id: "arancia"
    type: "disney"
    color: [0.90, 0.50, 0.05]
    roughness: 0.65
    metallic: 0.0
    specular: 0.2
    subsurface: 0.3

  - id: "limone"
    type: "disney"
    color: [0.92, 0.85, 0.15]
    roughness: 0.55
    metallic: 0.0
    specular: 0.3
    subsurface: 0.2

  - id: "ciotola_ceramica"
    type: "disney"
    color: [0.85, 0.82, 0.78]
    roughness: 0.20
    metallic: 0.0
    specular: 0.5
    clearcoat: 0.6
    clearcoat_gloss: 0.85

  - id: "acqua"
    type: "dielectric"
    refraction_index: 1.33
    color: [0.92, 0.95, 0.98]


templates:

  # ── Bottiglia di vino (cilindro + collo conico + sfera tappo) ──────────────
  - name: "bottiglia"
    material: "vetro_verde"
    children:
      # Corpo
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.12
        height: 0.50
      # Spalla (cono di transizione)
      - type: "cone"
        center: [0, 0.50, 0]
        radius: 0.12
        top_radius: 0.04
        height: 0.10
      # Collo
      - type: "cylinder"
        center: [0, 0.60, 0]
        radius: 0.04
        height: 0.18
      # Tappo (sferetta scura)
      - type: "sphere"
        center: [0, 0.80, 0]
        radius: 0.045
        material: "credenza"


entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  STRUTTURA CUCINA — Piano, parete, credenza
  # ─────────────────────────────────────────────────────────────────────────

  # Parete di fondo
  - name: "parete"
    type: "quad"
    q: [-3, 0, 2]
    u: [6, 0, 0]
    v: [0, 3, 0]
    material: "parete_cucina"

  # Credenza (corpo sotto il piano)
  - name: "corpo_credenza"
    type: "box"
    scale: [3.5, 0.76, 1.2]
    translate: [0, 0.38, 0.6]
    material: "credenza"

  # Piano in marmo
  - name: "piano_marmo"
    type: "box"
    scale: [3.8, 0.06, 1.3]
    translate: [0, 0.79, 0.55]
    material: "marmo_cucina"
    seed: 50

  # ─────────────────────────────────────────────────────────────────────────
  #  BICCHIERE D'ACQUA — CSG sfera cava per la coppa
  # ─────────────────────────────────────────────────────────────────────────

  # Base del bicchiere
  - name: "bicchiere_base"
    type: "cylinder"
    center: [-0.4, 0.82, 0.3]
    radius: 0.08
    height: 0.01
    material: "cristallo"

  # Stelo
  - name: "bicchiere_stelo"
    type: "cylinder"
    center: [-0.4, 0.83, 0.3]
    radius: 0.015
    height: 0.15
    material: "cristallo"

  # Coppa (CSG: sfera grande - sfera interna - box taglio top)
  - name: "bicchiere_coppa"
    type: "csg"
    operation: "subtraction"
    translate: [-0.4, 1.10, 0.3]
    material: "cristallo"
    left:
      type: "csg"
      operation: "subtraction"
      left:
        type: "sphere"
        center: [0, 0, 0]
        radius: 0.12
      right:
        type: "sphere"
        center: [0, 0.01, 0]
        radius: 0.11
    right:
      type: "box"
      scale: [0.30, 0.12, 0.30]
      translate: [0, 0.12, 0]

  # Acqua nel bicchiere
  - name: "acqua_bicchiere"
    type: "disk"
    center: [-0.4, 1.10, 0.3]
    normal: [0, 1, 0]
    radius: 0.10
    material: "acqua"

  # ─────────────────────────────────────────────────────────────────────────
  #  CIOTOLA CON FRUTTA
  # ─────────────────────────────────────────────────────────────────────────

  # Ciotola (CSG)
  - name: "ciotola"
    type: "csg"
    operation: "subtraction"
    translate: [0.3, 0.90, 0.2]
    material: "ciotola_ceramica"
    left:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.25
      scale: [1.0, 0.6, 1.0]
    right:
      type: "sphere"
      center: [0, 0.03, 0]
      radius: 0.22
      scale: [1.0, 0.6, 1.0]

  # Frutta nella ciotola
  - { name: "mela_r", type: "sphere", center: [0.25, 0.98, 0.15], radius: 0.07, material: "mela_rossa", scale: [1.0, 0.9, 1.0] }
  - { name: "mela_v", type: "sphere", center: [0.35, 0.97, 0.25], radius: 0.065, material: "mela_verde", scale: [1.0, 0.88, 1.0] }
  - { name: "arancia_1", type: "sphere", center: [0.28, 0.96, 0.30], radius: 0.06, material: "arancia" }
  - { name: "limone_1", type: "sphere", center: [0.38, 0.97, 0.12], radius: 0.055, material: "limone", scale: [1.2, 0.85, 1.0] }

  # ─────────────────────────────────────────────────────────────────────────
  #  BOTTIGLIA DI VINO
  # ─────────────────────────────────────────────────────────────────────────
  - type: "instance"
    template: "bottiglia"
    translate: [0.9, 0.82, 0.5]

  # ─────────────────────────────────────────────────────────────────────────
  #  TAGLIERE IN LEGNO
  # ─────────────────────────────────────────────────────────────────────────
  - name: "tagliere"
    type: "box"
    scale: [0.50, 0.025, 0.30]
    rotate: [0, -12, 0]
    translate: [-0.8, 0.835, 0.4]
    material: "legno_tagliere"
    seed: 77

  # ─────────────────────────────────────────────────────────────────────────
  #  TAZZA DI CERAMICA
  # ─────────────────────────────────────────────────────────────────────────
  - name: "tazza"
    type: "csg"
    operation: "subtraction"
    translate: [-0.9, 0.86, 0.15]
    material: "ceramica_tazza"
    left:
      type: "cylinder"
      center: [0, 0, 0]
      radius: 0.06
      height: 0.08
    right:
      type: "cylinder"
      center: [0, 0.015, 0]
      radius: 0.052
      height: 0.08

  # Manico della tazza (toro parziale simulato con piccolo toro)
  - name: "tazza_manico"
    type: "torus"
    major_radius: 0.045
    minor_radius: 0.008
    rotate: [0, 0, 90]
    translate: [-0.96, 0.90, 0.15]
    material: "ceramica_tazza"


lights:

  # ─── LUCI ATTIVE ★ Finestra laterale + fill ───────────────────────────────
  # Luce da finestra (area light laterale, simula luce solare)
  - type: "area"
    corner: [-3.0, 1.5, -1.5]
    u: [0.0, 0.0, 3.0]
    v: [0.0, 1.5, 0.0]
    color: [1.0, 0.95, 0.85]
    intensity: 35.0
    shadow_samples: 16

  # Fill morbida dall'alto
  - type: "area"
    corner: [-1.5, 2.8, -0.5]
    u: [3.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
    color: [0.85, 0.88, 1.0]
    intensity: 8.0
    shadow_samples: 8

# ─── LUCI ALT-1: Sera — luce calda artificiale dall'alto ────────────────────
