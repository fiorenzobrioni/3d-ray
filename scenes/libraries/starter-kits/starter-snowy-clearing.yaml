#     color: [1.0, 0.90, 0.70]
#     intensity: 0.9
#   - type: "directional"
#     direction: [0.4, -0.6, 0.3]
#     color: [0.55, 0.60, 0.78]
#     intensity: 0.06

# ─── LUCI ALT-2: Notte di luna — luce bluastra fredda ───────────────────────
#   Abbina a WORLD ALT-2
# lights:
#   - type: "directional"
