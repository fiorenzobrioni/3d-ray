# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Snowy Clearing
#
#  Una radura invernale in un bosco di conifere. Neve fresca al suolo,
#  alberi stilizzati (coni verdi + tronchi cilindrici), un lago ghiacciato
#  (disco dielectric), rocce coperte di neve (sfere con cap bianche) e
#  un tronco caduto. L'atmosfera è silenziosa e luminosa.
#
#  AMBIENTAZIONE: Outdoor — radura innevata, bosco nordico
#  STILE: Paesaggio invernale, luce fredda diffusa
#
#  Render consigliato:
#    Draft:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Preview:  -w 800  -H 450  -s 256  -d 6
#    Finale:   -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════════
#  WORLD
# ═══════════════════════════════════════════════════════════════════════════════

# ─── WORLD ATTIVO ★ Giornata invernale coperta — cielo grigio luminoso ───────
world:
  ambient_light: [0.12, 0.13, 0.15]
  sky:
    type: "gradient"
    zenith_color:  [0.55, 0.58, 0.65]
    horizon_color: [0.78, 0.80, 0.84]
    ground_color:  [0.60, 0.62, 0.65]
  ground:
    type: "infinite_plane"
    material: "neve"
    y: 0

