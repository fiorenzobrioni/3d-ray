# ═══════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════════
cameras:

  - name: "panorama"
    position: [0, 2.0, -10]
    look_at:  [0, 0.8, 3]
    fov: 55
    aperture: 0.0
    focal_dist: 12.0

  - name: "lago"
    position: [-4, 1.2, -4]
    look_at:  [-2, 0.1, 2]
    fov: 45
    aperture: 0.05
    focal_dist: 7.0

  - name: "tra_gli_alberi"
    position: [6, 1.5, 0]
    look_at:  [0, 1.0, 3]
    fov: 50
    aperture: 0.0
    focal_dist: 8.0

  - name: "dettaglio"
    position: [1, 0.8, -2]
    look_at:  [0, 0.5, 1]
    fov: 38
    aperture: 0.06
    focal_dist: 4.0

  - name: "zenitale"
    position: [0, 18, 2]
    look_at:  [0, 0, 2]
    vup: [0, 0, 1]
    fov: 55
    aperture: 0.0
    focal_dist: 18.0


# ═══════════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════════

# ─── LUCI ATTIVE ★ Cielo coperto — luce diffusa uniforme ────────────────────
lights:
  - type: "directional"
    direction: [-0.3, -1.0, -0.2]
    color: [0.85, 0.88, 0.95]
    intensity: 0.6

  - type: "directional"
    direction: [0.5, -0.5, 0.4]
    color: [0.70, 0.72, 0.80]
    intensity: 0.15

# ─── LUCI ALT-1: Mattina soleggiata — sole basso + fill cielo ───────────────
#   Abbina a WORLD ALT-1
# lights:
#   - type: "directional"
