# ═══════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════════
materials:

  # ── Neve fresca — bianco luminoso, leggermente subsurface ──────────────────
  - id: "neve"
    type: "disney"
    color: [0.90, 0.91, 0.95]
    roughness: 0.85
    metallic: 0.0
    subsurface: 0.5
    specular: 0.15

  # ── Ghiaccio del lago — dielectric con leggera tinta blu ──────────────────
  - id: "ghiaccio"
    type: "dielectric"
    refraction_index: 1.31
    color: [0.85, 0.90, 0.98]

  # ── Corteccia degli alberi — marrone scuro ruvido ──────────────────────────
  - id: "corteccia"
    type: "disney"
    texture:
      type: "wood"
      scale: 15.0
      colors: [[0.25, 0.15, 0.08], [0.18, 0.10, 0.05]]
      randomize_offset: true
    roughness: 0.92
    metallic: 0.0

  # ── Fogliame conifere — verde scuro ────────────────────────────────────────
  - id: "conifere"
    type: "disney"
    color: [0.08, 0.20, 0.06]
    roughness: 0.80
    metallic: 0.0
    subsurface: 0.15

  # ── Neve sugli alberi — cap bianca ─────────────────────────────────────────
  - id: "neve_ramo"
    type: "disney"
    color: [0.92, 0.93, 0.97]
    roughness: 0.80
    subsurface: 0.4

  # ── Roccia esposta — grigio scuro ──────────────────────────────────────────
  - id: "roccia"
    type: "disney"
    texture:
      type: "noise"
      scale: 4.0
      noise_strength: 0.5
      colors: [[0.35, 0.33, 0.30], [0.25, 0.24, 0.22]]
      randomize_offset: true
    roughness: 0.88
    metallic: 0.0

  # ── Legno tronco caduto ────────────────────────────────────────────────────
  - id: "legno_caduto"
    type: "disney"
    texture:
      type: "wood"
      scale: 6.0
      colors: [[0.30, 0.20, 0.10], [0.22, 0.14, 0.06]]
      randomize_offset: true
    roughness: 0.85
    metallic: 0.0


# ═══════════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════════
templates:

  # ── Abete stilizzato: 3 coni sovrapposti + tronco ─────────────────────────
  - name: "abete"
    children:
      # Tronco
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.12
        height: 1.0
        material: "corteccia"
      # Chioma bassa (cono largo)
      - type: "cone"
        center: [0, 0.8, 0]
        radius: 1.0
        top_radius: 0.05
        height: 1.5
        material: "conifere"
      # Chioma media
      - type: "cone"
        center: [0, 1.6, 0]
        radius: 0.75
        top_radius: 0.04
        height: 1.3
        material: "conifere"
      # Chioma alta (punta)
      - type: "cone"
        center: [0, 2.4, 0]
        radius: 0.50
        top_radius: 0.0
        height: 1.0
        material: "conifere"
      # Neve sulla chioma (disco piatto sopra ogni livello)
      - type: "disk"
        center: [0, 2.3, 0]
        normal: [0, 1, 0]
        radius: 0.72
        material: "neve_ramo"
      - type: "disk"
        center: [0, 2.9, 0]
        normal: [0, 1, 0]
        radius: 0.48
        material: "neve_ramo"
      - type: "disk"
        center: [0, 3.4, 0]
        normal: [0, 1, 0]
        radius: 0.20
        material: "neve_ramo"

  # ── Abete piccolo (giovane) ────────────────────────────────────────────────
  - name: "abete_piccolo"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.06
        height: 0.4
        material: "corteccia"
      - type: "cone"
        center: [0, 0.3, 0]
        radius: 0.45
        top_radius: 0.0
        height: 0.9
        material: "conifere"
      - type: "disk"
        center: [0, 0.75, 0]
        normal: [0, 1, 0]
        radius: 0.35
        material: "neve_ramo"

  # ── Roccia con neve sopra ──────────────────────────────────────────────────
  - name: "roccia_innevata"
    children:
      # Corpo della roccia (ellissoide)
      - type: "sphere"
        center: [0, 0.25, 0]
        radius: 0.50
        scale: [1.2, 0.6, 1.0]
        material: "roccia"
      # Cap di neve sopra
      - type: "sphere"
        center: [0, 0.38, 0]
        radius: 0.48
        scale: [1.15, 0.2, 0.95]
        material: "neve_ramo"


# ═══════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  LAGO GHIACCIATO — disco piatto di ghiaccio
  # ─────────────────────────────────────────────────────────────────────────
  - name: "lago_ghiacciato"
    type: "disk"
    center: [-2, 0.01, 3]
    normal: [0, 1, 0]
    radius: 3.5
    material: "ghiaccio"

  # ─────────────────────────────────────────────────────────────────────────
  #  ALBERI — Corona di abeti intorno alla radura
  # ─────────────────────────────────────────────────────────────────────────

  # Fila posteriore (lontani)
  - { type: "instance", template: "abete", translate: [-6, 0, 12],  scale: [1.2, 1.3, 1.2], seed: 1001 }
  - { type: "instance", template: "abete", translate: [-3, 0, 14],  scale: [1.0, 1.1, 1.0], seed: 1002 }
  - { type: "instance", template: "abete", translate: [0, 0, 15],   scale: [1.3, 1.4, 1.3], seed: 1003 }
  - { type: "instance", template: "abete", translate: [3, 0, 13],   scale: [0.9, 1.0, 0.9], seed: 1004 }
  - { type: "instance", template: "abete", translate: [6, 0, 12],   scale: [1.1, 1.2, 1.1], seed: 1005 }
  - { type: "instance", template: "abete", translate: [9, 0, 11],   scale: [1.0, 1.15, 1.0], seed: 1006 }

  # Lato sinistro
  - { type: "instance", template: "abete", translate: [-8, 0, 5],   scale: [1.1, 1.2, 1.1], seed: 1010 }
  - { type: "instance", template: "abete", translate: [-9, 0, 8],   scale: [1.3, 1.5, 1.3], seed: 1011 }
  - { type: "instance", template: "abete", translate: [-7, 0, 0],   scale: [0.9, 1.0, 0.9], seed: 1012 }

  # Lato destro
  - { type: "instance", template: "abete", translate: [8, 0, 4],    scale: [1.0, 1.1, 1.0], seed: 1020 }
  - { type: "instance", template: "abete", translate: [9, 0, 7],    scale: [1.2, 1.3, 1.2], seed: 1021 }
  - { type: "instance", template: "abete", translate: [7, 0, 1],    scale: [1.1, 1.2, 1.1], seed: 1022 }

  # Alberelli giovani sparsi nella radura
  - { type: "instance", template: "abete_piccolo", translate: [2, 0, 1],   seed: 1030 }
  - { type: "instance", template: "abete_piccolo", translate: [-1, 0, -1],  seed: 1031 }
  - { type: "instance", template: "abete_piccolo", translate: [4, 0, 6],    seed: 1032, scale: [0.8, 0.7, 0.8] }

  # ─────────────────────────────────────────────────────────────────────────
  #  ROCCE INNEVATE
  # ─────────────────────────────────────────────────────────────────────────
  - { type: "instance", template: "roccia_innevata", translate: [3, 0, 2],   scale: [1.5, 1.2, 1.3], seed: 2001 }
  - { type: "instance", template: "roccia_innevata", translate: [-4, 0, 0],  scale: [1.0, 0.8, 1.1], seed: 2002 }
  - { type: "instance", template: "roccia_innevata", translate: [1, 0, 7],   scale: [1.8, 1.0, 1.5], seed: 2003 }
  - { type: "instance", template: "roccia_innevata", translate: [5, 0, 9],   scale: [0.8, 0.6, 0.9], seed: 2004 }

  # ─────────────────────────────────────────────────────────────────────────
  #  TRONCO CADUTO — cilindro lungo con rami spezzati
  # ─────────────────────────────────────────────────────────────────────────
  - name: "tronco_caduto"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 0.18
    height: 4.0
    rotate: [0, 0, 88]
    translate: [1, 0.18, -1]
    material: "legno_caduto"
    seed: 3001

  # Ramo spezzato
  - name: "ramo_spezzato"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 0.06
    height: 0.8
    rotate: [0, 0, 45]
    translate: [0.5, 0.25, -0.9]
    material: "legno_caduto"

  # Neve accumulata sul tronco
  - name: "neve_tronco"
    type: "sphere"
    center: [1, 0.30, -1]
    radius: 2.2
    scale: [1.0, 0.05, 0.15]
    material: "neve_ramo"

