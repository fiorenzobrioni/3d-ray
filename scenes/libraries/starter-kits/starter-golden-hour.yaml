# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Golden Hour
#
#  Cielo procedurale a gradiente con disco solare basso sull'orizzonte.
#  Luce calda direzionale che arriva da angolo radente, ideale per paesaggi
#  e architettura esterna. Il suolo è intercambiabile: prato, oceano o terreno
#  a scacchi (cambia il campo `material` sotto `ground`).
#
#  AMBIENTAZIONE: Outdoor — paesaggio naturale, alba/tramonto
#  STILE: Cinematografico, caldo, luce dell'ora d'oro
#
#  Render consigliato:
#    Draft:    -w 800  -H 450  -s 16  -d 15 -S 4
#    Preview:  -w 1280 -H 720  -s 64  -d 25 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 40 -S 16
# ═══════════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.04, 0.03, 0.02]
  sky:
    type: "gradient"
    zenith_color:  [0.15, 0.25, 0.55]
    horizon_color: [0.85, 0.55, 0.25]
    ground_color:  [0.20, 0.15, 0.10]
    sun:
      direction: [-0.8, -0.25, -0.5]
      color: [1.0, 0.85, 0.5]
      intensity: 20.0
      size: 4.0
      falloff: 24.0
  ground: { type: "infinite_plane", material: "terreno", y: 0 }
  # Sostituisci material per cambiare terreno: prato_1, prato_2, prato_3, oceano, terreno

cameras:
  - name: "main"
    position: [0, 1.8, -8]
    look_at: [0, 0.8, 0]
    fov: 55

lights:
  - type: "directional"
    direction: [-0.8, -0.25, -0.5]
    color: [1.0, 0.88, 0.55]
    intensity: 0.12

materials:
  - id: "prato_1" # Verde Erba Naturale (Vivace), per un prato in piena salute
    type: "lambertian"
    color: [0.20, 0.50, 0.15]

  - id: "prato_2" # Prato Primaverile (Chiaro/Luminoso), se cerchi un effetto "fresco" o un prato illuminato dal sole
    type: "lambertian"
    color: [0.50, 0.85, 0.30]

  - id: "prato_3" # Prato "Wild" (Più desaturato/Salvia), per un effetto più naturale, simile alle erbe spontanee di un campo
    type: "lambertian"
    color: [0.45, 0.55, 0.35]

  - id: "oceano"
    type: "metal"
    color: [0.1, 0.2, 0.4]
    fuzz: 0.1

  - id: "terreno"
    type: "lambertian"
    texture: { type: "checker", scale: 1.5, colors: [[0.25, 0.22, 0.18], [0.35, 0.32, 0.26]] }

