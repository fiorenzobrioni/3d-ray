# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Zen Garden
#
#  Giardino giapponese contemplativo. Ghiaia rastrellata bianca (checker fine),
#  rocce lisce disposte asimmetricamente (ellissoidi in arenaria scura),
#  lanterna in pietra (template CSG), ciotola d'acqua (CSG sfera cava con
#  dielectric), ponticello ad arco in legno e bambù stilizzato.
#
#  AMBIENTAZIONE: Outdoor — giardino zen, luce dorata naturale
#  STILE: Minimalista, meditativo, composizione asimmetrica wabi-sabi
#
#  Render consigliato:
#    Draft:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Preview:  -w 800  -H 450  -s 256  -d 6
#    Finale:   -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════════
#  WORLD
# ═══════════════════════════════════════════════════════════════════════════════

# ─── WORLD ATTIVO ★ Golden hour — luce dorata morbida ────────────────────────
world:
  sky:
    type: "gradient"
    zenith_color:  [0.18, 0.30, 0.62]
    horizon_color: [0.80, 0.60, 0.35]
    ground_color:  [0.25, 0.20, 0.14]
    sun:
      direction: [-0.75, -0.30, -0.5]
      color: [1.0, 0.85, 0.55]
      intensity: 18.0
      size: 3.5
      falloff: 22.0
  ground:
    type: "infinite_plane"
    material: "ghiaia"
    y: 0

# ─── WORLD ALT-1: Mattina nebbiosa — luce diffusa morbida ───────────────────
# world:
#   sky:
#     type: "gradient"
