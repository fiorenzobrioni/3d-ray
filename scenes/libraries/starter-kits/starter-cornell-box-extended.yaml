# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Cornell Box Extended
#
#  La classica Cornell Box arricchita: pavimento a scacchi, pareti colorate
#  (rosso/verde), oggetti diversificati (sfera vetro, toro metallico,
#  box in legno), pannello emissivo a soffitto. Il benchmark per eccellenza
#  del ray tracing, perfetto per testare GI, color bleeding e materiali.
#
#  AMBIENTAZIONE: Indoor — stanza chiusa, illuminazione controllata
#  STILE: Tecnico/artistico, test di GI e materiali
#
#  Render consigliato (scena quadrata):
#    Draft:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Preview:  -w 800  -H 450  -s 256  -d 16
#    Finale:   -w 1920 -H 1080 -s 1024 -d 20 -S 4
#    Ultra:    -w 3840 -H 2160 -s 1600 -d 20 -S 4
# ═══════════════════════════════════════════════════════════════════════════════


# ─── WORLD ATTIVO ★ Chiuso — nessuna luce esterna ───────────────────────────
world:
  ambient_light: [0.0, 0.0, 0.0]
  background: [0.0, 0.0, 0.0]

# ─── WORLD ALT-1: Fill minima per draft veloci ──────────────────────────────
# world:
#   ambient_light: [0.015, 0.015, 0.02]
#   background: [0.0, 0.0, 0.0]


# ═══════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════════
cameras:

  - name: "canonica"
    position: [0, 1.0, -3.8]
    look_at:  [0, 1.0, 1.0]
    fov: 39
    aperture: 0.0
    focal_dist: 4.8

  - name: "tre_quarti"
    position: [1.6, 2.4, -3.5]
    look_at:  [-0.05, 0.7, 1.0]
    fov: 46
    aperture: 0.0
    focal_dist: 5.0

  - name: "macro"
    position: [0.1, 1.0, -2.4]
    look_at:  [0, 0.8, 0.8]
    fov: 34
    aperture: 0.12
    focal_dist: 3.3

  - name: "zenitale"
    position: [0, 5.5, 1.0]
    look_at:  [0, 0, 1.0]
    vup: [0, 0, 1]
    fov: 36
    aperture: 0.0
    focal_dist: 5.5

  - name: "dutch"
    position: [0.8, 1.3, -3.8]
    look_at:  [-0.1, 0.85, 1.0]
    vup: [0.22, 0.975, 0]
    fov: 42
    aperture: 0.0
    focal_dist: 5.0


# ═══════════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════════

# ─── LUCI ATTIVE ★ Solo pannello emissivo (la Cornell Box classica) ──────────
lights: []

# ─── LUCI ALT-1: Spot laterale + emissivo (galleria) ────────────────────────
