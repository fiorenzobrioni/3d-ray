# ═══════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════════
materials:

  # ── Pareti Cornell classiche (valori calibrati dal paper 1984) ─────────────
  - id: "bianco"
    type: "lambertian"
    color: [0.73, 0.73, 0.73]

  - id: "rosso"
    type: "lambertian"
    color: [0.65, 0.05, 0.05]

  - id: "verde"
    type: "lambertian"
    color: [0.12, 0.45, 0.15]

  # ── Pavimento a scacchi ────────────────────────────────────────────────────
  - id: "pavimento_scacchi"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 0.5
      colors: [[0.70, 0.70, 0.70], [0.25, 0.25, 0.25]]

  # ── Pannello emissivo soffitto ─────────────────────────────────────────────
  - id: "pannello_luce"
    type: "emissive"
    color: [1.0, 0.95, 0.85]
    intensity: 15.0

  # ── Vetro ──────────────────────────────────────────────────────────────────
  - id: "vetro"
    type: "dielectric"
    refraction_index: 1.52
    color: [1.0, 1.0, 1.0]

  # ── Oro metallico ──────────────────────────────────────────────────────────
  - id: "oro"
    type: "disney"
    color: [1.0, 0.76, 0.33]
    metallic: 1.0
    roughness: 0.15
    specular: 1.0

  # ── Legno noce ─────────────────────────────────────────────────────────────
  - id: "legno_noce"
    type: "disney"
    texture:
      type: "wood"
      scale: 8.0
      colors: [[0.40, 0.22, 0.10], [0.28, 0.14, 0.05]]
      randomize_offset: true
    roughness: 0.45
    metallic: 0.0
    specular: 0.4

  # ── Marmo bianco (variante parete fondo) ───────────────────────────────────
  - id: "marmo_bianco"
    type: "disney"
    texture:
      type: "marble"
      scale: 8.0
      noise_strength: 6.0
      colors: [[0.92, 0.90, 0.86], [0.60, 0.58, 0.54]]
      randomize_offset: true
    roughness: 0.28
    metallic: 0.0
    specular: 0.5
    clearcoat: 0.5
    coat_roughness: 0.20

  # ── Cromo specchio ─────────────────────────────────────────────────────────
  - id: "cromo"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.0


# ═══════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  STANZA — 5 quad (pavimento, soffitto, fondo, sinistra, destra)
  # ─────────────────────────────────────────────────────────────────────────

  - name: "pavimento"
    type: "quad"
    q: [-1.0, 0.0, 0.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
    material: "pavimento_scacchi"

  - name: "soffitto"
    type: "quad"
    q: [-1.0, 2.0, 0.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
    material: "bianco"

  - name: "parete_fondo"
    type: "quad"
    q: [-1.0, 0.0, 2.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 2.0, 0.0]
    material: "bianco"

  - name: "parete_sinistra"
    type: "quad"
    q: [-1.0, 0.0, 0.0]
    u: [0.0, 0.0, 2.0]
    v: [0.0, 2.0, 0.0]
    material: "rosso"

  - name: "parete_destra"
    type: "quad"
    q: [1.0, 0.0, 0.0]
    u: [0.0, 0.0, 2.0]
    v: [0.0, 2.0, 0.0]
    material: "verde"

  # ─────────────────────────────────────────────────────────────────────────
  #  PANNELLO EMISSIVO A SOFFITTO
  # ─────────────────────────────────────────────────────────────────────────
  - name: "pannello_emissivo"
    type: "quad"
    q: [-0.30, 1.98, 0.70]
    u: [0.60, 0.0, 0.0]
    v: [0.0, 0.0, 0.60]
    material: "pannello_luce"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGGETTI — Sfera vetro + Toro oro + Box legno
  # ─────────────────────────────────────────────────────────────────────────

  # Sfera di vetro (centro-sinistra)
  - name: "sfera_vetro"
    type: "sphere"
    center: [-0.35, 0.35, 0.8]
    radius: 0.35
    material: "vetro"

  # Toro d'oro (centro-destra, su piedistallo)
  - name: "piedistallo_toro"
    type: "box"
    scale: [0.50, 0.30, 0.50]
    translate: [0.35, 0.15, 1.2]
    material: "bianco"

  - name: "toro_oro"
    type: "torus"
    major_radius: 0.22
    minor_radius: 0.07
    rotate: [20, -15, 0]
    translate: [0.35, 0.42, 1.2]
    material: "oro"

  # Box in legno (fondo, ruotato)
  - name: "box_legno"
    type: "box"
    scale: [0.55, 1.0, 0.55]
    rotate: [0, 22, 0]
    translate: [0.33, 0.50, 1.55]
    material: "legno_noce"
    seed: 42

