# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Museum Gallery
#
#  Sala di museo minimalista con pareti chiare, pavimento in marmo lucido,
#  piedistalli con sculture astratte (CSG, tori, capsule), spot light su ogni
#  opera e illuminazione ambiente morbida. Atmosfera da galleria contemporanea.
#
#  AMBIENTAZIONE: Indoor — galleria d'arte, spazio espositivo
#  STILE: Minimalista, elegante, illuminazione museale
#
#  Render consigliato:
#    Draft:    -w 800  -H 450  -s 16  -d 15 -S 4
#    Preview:  -w 1280 -H 720  -s 64  -d 25 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 40 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


# ─── WORLD ATTIVO ★ Interno museo — chiuso, luce controllata ────────────────
world:
  ambient_light: [0.04, 0.04, 0.05]
  background: [0.0, 0.0, 0.0]

# ─── WORLD ALT-1: Galleria con luce naturale da lucernario ──────────────────
# world:
#   ambient_light: [0.08, 0.08, 0.09]
#   background: [0.15, 0.15, 0.18]


# ═══════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════════
cameras:

  - name: "galleria"
    position: [0, 1.7, -8]
    look_at:  [0, 1.5, 0]
    fov: 50
    aperture: 0.0
    focal_dist: 8.0

  - name: "scultura_csg"
    position: [-3.5, 1.6, -3]
    look_at:  [-3, 1.8, 0]
    fov: 40
    aperture: 0.05
    focal_dist: 4.0

  - name: "passeggiata"
    position: [5, 1.7, -2]
    look_at:  [0, 1.5, 2]
    fov: 55
    aperture: 0.0
    focal_dist: 7.0

  - name: "dettaglio_vetro"
    position: [0, 1.4, -4]
    look_at:  [0, 1.6, 0]
    fov: 35
    aperture: 0.06
    focal_dist: 4.5


# ═══════════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════════

# ─── LUCI ATTIVE ★ Spot museali individuali + area generale ──────────────────
lights:
  # Luce ambiente soffitto (area light larga)
  - type: "area"
    corner: [-5, 4.4, -1]
    u: [10, 0, 0]
    v: [0, 0, 8]
    color: [1.0, 0.98, 0.95]
    intensity: 12.0
    shadow_samples: 12

  # Spot su sfera vetro
  - type: "spot"
    position: [-3, 4.2, 0]
    direction: [0, -1, 0]
    color: [1.0, 0.97, 0.92]
    intensity: 25
    inner_angle: 10
    outer_angle: 22

  # Spot su scultura CSG
  - type: "spot"
    position: [0, 4.2, 1]
    direction: [0, -1, 0]
    color: [1.0, 0.97, 0.92]
    intensity: 25
    inner_angle: 10
    outer_angle: 22

  # Spot su toro bronzo
  - type: "spot"
    position: [3, 4.2, 0]
    direction: [0, -1, 0]
    color: [1.0, 0.97, 0.92]
    intensity: 25
    inner_angle: 10
    outer_angle: 22

  # Spot su capsule corten
  - type: "spot"
    position: [-4.5, 4.2, 4]
    direction: [0, -1, 0]
    color: [1.0, 0.97, 0.92]
    intensity: 25
    inner_angle: 10
    outer_angle: 22

  # Spot su ceramica
  - type: "spot"
    position: [4.5, 4.2, 4]
    direction: [0, -1, 0]
    color: [1.0, 0.97, 0.92]
    intensity: 25
    inner_angle: 10
    outer_angle: 22

# ─── LUCI ALT-1: Solo luce naturale da lucernario ───────────────────────────
# lights:
#   - type: "area"
#     corner: [-3, 4.4, 0]
#     u: [6, 0, 0]
