# ═══════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════════
materials:

  - id: "parete_museo"
    type: "lambertian"
    color: [0.88, 0.87, 0.85]

  - id: "soffitto_museo"
    type: "lambertian"
    color: [0.92, 0.91, 0.90]

  - id: "marmo_pavimento"
    type: "disney"
    texture:
      type: "marble"
      scale: 4.0
      noise_strength: 5.0
      colors: [[0.90, 0.88, 0.84], [0.60, 0.58, 0.55]]
      randomize_offset: true
    roughness: 0.18
    metallic: 0.0
    specular: 0.6
    clearcoat: 0.5
    clearcoat_gloss: 0.8

  - id: "piedistallo_marmo"
    type: "disney"
    color: [0.94, 0.93, 0.91]
    roughness: 0.22
    metallic: 0.0
    specular: 0.5

  - id: "bronzo"
    type: "disney"
    color: [0.55, 0.40, 0.22]
    roughness: 0.30
    metallic: 0.85
    specular: 0.7

  - id: "ceramica_bianca"
    type: "disney"
    color: [0.95, 0.94, 0.92]
    roughness: 0.15
    metallic: 0.0
    specular: 0.7
    clearcoat: 0.8
    clearcoat_gloss: 0.95

  - id: "vetro_museo"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.95, 0.97, 1.0]

  - id: "titanio_blu"
    type: "disney"
    color: [0.20, 0.28, 0.55]
    roughness: 0.25
    metallic: 0.92
    specular: 0.8

  - id: "acciaio_corten"
    type: "disney"
    texture:
      type: "noise"
      scale: 8.0
      noise_strength: 0.5
      colors: [[0.50, 0.28, 0.12], [0.38, 0.20, 0.08]]
      randomize_offset: true
    roughness: 0.70
    metallic: 0.6
    specular: 0.3

  - id: "battiscopa"
    type: "disney"
    color: [0.70, 0.68, 0.65]
    roughness: 0.30
    metallic: 0.0


# ═══════════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════════
templates:

  # ── Piedistallo espositivo ─────────────────────────────────────────────────
  - name: "piedistallo"
    material: "piedistallo_marmo"
    children:
      - type: "box"
        scale: [0.80, 1.0, 0.80]
        translate: [0, 0.50, 0]
      - type: "box"
        scale: [0.85, 0.05, 0.85]
        translate: [0, 1.025, 0]


# ═══════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  STANZA — Galleria rettangolare
  # ─────────────────────────────────────────────────────────────────────────

  - name: "pavimento"
    type: "quad"
    q: [-7, 0, -3]
    u: [14, 0, 0]
    v: [0, 0, 10]
    material: "marmo_pavimento"
    seed: 10

  - name: "soffitto"
    type: "quad"
    q: [-7, 4.5, -3]
    u: [14, 0, 0]
    v: [0, 0, 10]
    material: "soffitto_museo"

  - name: "parete_fondo"
    type: "quad"
    q: [-7, 0, 7]
    u: [14, 0, 0]
    v: [0, 4.5, 0]
    material: "parete_museo"

  - name: "parete_sx"
    type: "quad"
    q: [-7, 0, -3]
    u: [0, 0, 10]
    v: [0, 4.5, 0]
    material: "parete_museo"

  - name: "parete_dx"
    type: "quad"
    q: [7, 0, -3]
    u: [0, 0, 10]
    v: [0, 4.5, 0]
    material: "parete_museo"

  # Battiscopa
  - { name: "batt_fondo", type: "box", scale: [14, 0.12, 0.04], translate: [0, 0.06, 6.98], material: "battiscopa" }
  - { name: "batt_sx",    type: "box", scale: [0.04, 0.12, 10], translate: [-6.98, 0.06, 2], material: "battiscopa" }
  - { name: "batt_dx",    type: "box", scale: [0.04, 0.12, 10], translate: [6.98, 0.06, 2], material: "battiscopa" }

  # ─────────────────────────────────────────────────────────────────────────
  #  PIEDISTALLI CON SCULTURE
  # ─────────────────────────────────────────────────────────────────────────

  # Scultura 1: Sfera di vetro su piedistallo (sinistra)
  - { type: "instance", template: "piedistallo", translate: [-3, 0, 0] }
  - name: "sfera_vetro"
    type: "sphere"
    center: [-3, 1.35, 0]
    radius: 0.40
    material: "vetro_museo"

  # Scultura 2: CSG — sfera con cavità cubica (centro)
  - { type: "instance", template: "piedistallo", translate: [0, 0, 1] }
  - name: "scultura_csg"
    type: "csg"
    operation: "subtraction"
    translate: [0, 1.55, 1]
    material: "titanio_blu"
    left:
      type: "sphere"
      center: [0, 0, 0]
      radius: 0.45
    right:
      type: "box"
      scale: [0.55, 0.55, 0.55]
      rotate: [30, 45, 20]

  # Scultura 3: Toro di bronzo inclinato (destra)
  - { type: "instance", template: "piedistallo", translate: [3, 0, 0] }
  - name: "toro_bronzo"
    type: "torus"
    major_radius: 0.35
    minor_radius: 0.10
    rotate: [25, -15, 10]
    translate: [3, 1.45, 0]
    material: "bronzo"

  # Scultura 4: Capsule intrecciate — acciaio corten (fondo-sinistra)
  - { type: "instance", template: "piedistallo", translate: [-4.5, 0, 4] }
  - name: "capsula_1"
    type: "capsule"
    center: [0, 0, 0]
    radius: 0.12
    height: 0.8
    rotate: [30, 0, 45]
    translate: [-4.5, 1.5, 4]
    material: "acciaio_corten"
    seed: 501
  - name: "capsula_2"
    type: "capsule"
    center: [0, 0, 0]
    radius: 0.12
    height: 0.8
    rotate: [-30, 90, 45]
    translate: [-4.5, 1.5, 4]
    material: "acciaio_corten"
    seed: 502

  # Scultura 5: Ceramica bianca liscia — forma organica (fondo-destra)
  - { type: "instance", template: "piedistallo", translate: [4.5, 0, 4] }
  - name: "ceramica_organica"
    type: "sphere"
    center: [4.5, 1.45, 4]
    radius: 0.38
    scale: [1.0, 1.5, 0.8]
    material: "ceramica_bianca"

