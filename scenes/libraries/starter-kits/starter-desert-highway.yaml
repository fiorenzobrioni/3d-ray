# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Desert Highway
#
#  Una strada rettilinea nel deserto americano. Asfalto crepato, guard rail
#  metallici, massi erosi dal vento (ellissoidi con scale differenziale),
#  cactus stilizzati (cilindri + sfere) e cespugli secchi. L'orizzonte è
#  vasto e il cielo domina la composizione.
#
#  AMBIENTAZIONE: Outdoor — deserto arido, orizzonte aperto
#  STILE: Fotorealistico, cinematografico (stile road movie)
#
#  COME USARE QUESTO STARTER KIT:
#    1. Copia questo file nella cartella scenes/
#    2. Scegli un world (attivo o commentato) per l'atmosfera desiderata
#    3. Scegli un set di luci (attivo o commentato)
#    4. Seleziona la camera con --camera <nome> sulla CLI
#    5. Aggiungi i tuoi oggetti nella sezione entities
#
#  Render consigliato:
#    Draft:    -w 800  -H 450  -s 16  -d 15 -S 4
#    Preview:  -w 1280 -H 720  -s 64  -d 25 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 40 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════════
#  WORLD
# ═══════════════════════════════════════════════════════════════════════════════

# ─── WORLD ATTIVO ★ Mezzogiorno torrido — sole alto, cielo lavato ────────────
world:
  ambient_light: [0.06, 0.05, 0.04]
  sky:
    type: "gradient"
    zenith_color:  [0.18, 0.35, 0.78]
    horizon_color: [0.75, 0.82, 0.90]
    ground_color:  [0.45, 0.38, 0.28]
    sun:
      direction: [-0.2, -1.0, -0.3]
      color: [1.0, 0.97, 0.90]
      intensity: 18.0
      size: 2.0
      falloff: 48.0
  ground:
    type: "infinite_plane"
    material: "sabbia_deserto"
    y: 0

# ─── WORLD ALT-1: Golden Hour — sole basso, luce calda dorata ───────────────
# world:
#   ambient_light: [0.05, 0.04, 0.03]
