# ═══════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════════
materials:

  - id: "erba_secca"
    type: "disney"
    texture:
      type: "noise"
      scale: 2.0
      noise_strength: 0.4
      colors: [[0.35, 0.30, 0.15], [0.28, 0.24, 0.12]]
      randomize_offset: true
    roughness: 0.95
    metallic: 0.0

  - id: "marmo_antico"
    type: "disney"
    texture:
      type: "marble"
      scale: 8.0
      noise_strength: 6.0
      colors: [[0.85, 0.82, 0.75], [0.55, 0.50, 0.42]]
      randomize_offset: true
    roughness: 0.55
    metallic: 0.0
    specular: 0.4

  - id: "marmo_pavimento"
    type: "disney"
    texture:
      type: "marble"
      scale: 3.0
      noise_strength: 8.0
      colors: [[0.75, 0.72, 0.65], [0.45, 0.40, 0.35]]
      randomize_offset: true
    roughness: 0.65
    metallic: 0.0

  - id: "pietra_grezza"
    type: "disney"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 0.5
      colors: [[0.50, 0.48, 0.42], [0.38, 0.35, 0.30]]
      randomize_offset: true
    roughness: 0.82
    metallic: 0.0

  - id: "bronzo_patinato"
    type: "disney"
    color: [0.35, 0.45, 0.30]
    roughness: 0.50
    metallic: 0.75
    specular: 0.6

  - id: "edera"
    type: "disney"
    color: [0.10, 0.25, 0.06]
    roughness: 0.85
    metallic: 0.0
    subsurface: 0.2


# ═══════════════════════════════════════════════════════════════════════════════
#  TEMPLATES
# ═══════════════════════════════════════════════════════════════════════════════
templates:

  # ── Colonna dorica intera ──────────────────────────────────────────────────
  - name: "colonna_intera"
    material: "marmo_antico"
    children:
      # Base (toro piatto)
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.55
        height: 0.15
      # Fusto scanalato (approssimato con cilindro liscio)
      - type: "cylinder"
        center: [0, 0.15, 0]
        radius: 0.40
        height: 4.0
      # Capitello (cilindro più largo)
      - type: "cylinder"
        center: [0, 4.15, 0]
        radius: 0.55
        height: 0.25
      # Abaco (box piatto in cima)
      - type: "box"
        scale: [1.2, 0.12, 1.2]
        translate: [0, 4.46, 0]

  # ── Colonna spezzata (rotta a metà) ────────────────────────────────────────
  - name: "colonna_spezzata"
    material: "marmo_antico"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.55
        height: 0.15
      - type: "cylinder"
        center: [0, 0.15, 0]
        radius: 0.40
        height: 2.2
      # Rottura in cima (sfera che simula la frattura)
      - type: "sphere"
        center: [0, 2.35, 0]
        radius: 0.40
        scale: [1.0, 0.3, 1.0]

  # ── Piedistallo con sfera decorativa ───────────────────────────────────────
  - name: "piedistallo_sferico"
    material: "pietra_grezza"
    children:
      - type: "box"
        scale: [0.80, 0.60, 0.80]
        translate: [0, 0.30, 0]
      - type: "box"
        scale: [0.65, 0.08, 0.65]
        translate: [0, 0.64, 0]
      - type: "sphere"
        center: [0, 0.95, 0]
        radius: 0.30
        material: "bronzo_patinato"


# ═══════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  PAVIMENTO — Lastroni di marmo
  # ─────────────────────────────────────────────────────────────────────────
  - name: "pavimento"
    type: "box"
    scale: [12, 0.15, 16]
    translate: [0, 0.075, 4]
    material: "marmo_pavimento"
    seed: 50

  # ─────────────────────────────────────────────────────────────────────────
  #  COLONNATO — 4 colonne intere + 2 spezzate
  # ─────────────────────────────────────────────────────────────────────────

  # Colonne integre (lato sinistro)
  - { type: "instance", template: "colonna_intera", translate: [-3, 0.15, 2], seed: 1001 }
  - { type: "instance", template: "colonna_intera", translate: [-3, 0.15, 5], seed: 1002 }

  # Colonne integre (lato destro)
  - { type: "instance", template: "colonna_intera", translate: [3, 0.15, 2], seed: 1003 }
  - { type: "instance", template: "colonna_intera", translate: [3, 0.15, 5], seed: 1004 }

  # Colonne spezzate
  - { type: "instance", template: "colonna_spezzata", translate: [-3, 0.15, 8], seed: 1005 }
  - { type: "instance", template: "colonna_spezzata", translate: [3, 0.15, 8], seed: 1006, scale: [1.0, 0.8, 1.0] }

  # ─────────────────────────────────────────────────────────────────────────
  #  ARCHITRAVE — Trave sopra le colonne integre
  # ─────────────────────────────────────────────────────────────────────────
  - name: "architrave_sx"
    type: "box"
    scale: [1.0, 0.40, 3.8]
    translate: [-3, 4.78, 3.5]
    material: "marmo_antico"
    seed: 60

  - name: "architrave_dx"
    type: "box"
    scale: [1.0, 0.40, 3.8]
    translate: [3, 4.78, 3.5]
    material: "marmo_antico"
    seed: 61

  # Trave trasversale frontale
  - name: "architrave_front"
    type: "box"
    scale: [7.2, 0.35, 0.60]
    translate: [0, 4.76, 2]
    material: "marmo_antico"
    seed: 62

  # ─────────────────────────────────────────────────────────────────────────
  #  ARCO — CSG intersection per creare un arco semicircolare
  # ─────────────────────────────────────────────────────────────────────────
  - name: "arco"
    type: "csg"
    operation: "subtraction"
    translate: [0, 0.15, 9]
    material: "pietra_grezza"
    left:
      # Muro pieno con apertura
      type: "box"
      scale: [5.0, 4.5, 0.8]
      translate: [0, 2.25, 0]
    right:
      # Foro ad arco (cilindro + box per la parte bassa)
      type: "csg"
      operation: "union"
      left:
        type: "cylinder"
        center: [0, 2.0, 0]
        radius: 1.5
        height: 1.2
        rotate: [90, 0, 0]
      right:
        type: "box"
        scale: [3.0, 2.0, 1.2]
        translate: [0, 1.0, 0]

  # ─────────────────────────────────────────────────────────────────────────
  #  PIEDISTALLI con sfere decorative
  # ─────────────────────────────────────────────────────────────────────────
  - { type: "instance", template: "piedistallo_sferico", translate: [-1.5, 0.15, 1], seed: 2001 }
  - { type: "instance", template: "piedistallo_sferico", translate: [1.5, 0.15, 1], seed: 2002 }

  # ─────────────────────────────────────────────────────────────────────────
  #  MACERIE — Frammenti sparsi (box piccoli e sfere)
  # ─────────────────────────────────────────────────────────────────────────
  - { name: "maceria_1", type: "box", scale: [0.6, 0.3, 0.5], rotate: [10, 35, 5], translate: [1.5, 0.15, 7], material: "marmo_antico", seed: 3001 }
  - { name: "maceria_2", type: "box", scale: [0.4, 0.25, 0.35], rotate: [-5, 60, 12], translate: [-2, 0.12, 6.5], material: "marmo_antico", seed: 3002 }
  - { name: "maceria_3", type: "cylinder", center: [2.5, 0.15, 6], radius: 0.40, height: 0.9, rotate: [0, 0, 85], material: "marmo_antico", seed: 3003 }
  - { name: "maceria_4", type: "box", scale: [0.8, 0.2, 0.3], rotate: [0, 22, 0], translate: [-1, 0.10, 9.5], material: "pietra_grezza", seed: 3004 }

  # ─────────────────────────────────────────────────────────────────────────
  #  EDERA — Macchie di vegetazione sulle colonne
  # ─────────────────────────────────────────────────────────────────────────
  - { name: "edera_1", type: "sphere", center: [-3, 1.5, 2], radius: 0.55, scale: [0.4, 1.5, 0.4], material: "edera" }
  - { name: "edera_2", type: "sphere", center: [3, 2.0, 5], radius: 0.50, scale: [0.35, 1.8, 0.35], material: "edera" }
  - { name: "edera_3", type: "sphere", center: [0.5, 2.5, 9], radius: 0.60, scale: [1.0, 0.8, 0.3], material: "edera" }

