# ═══════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════════
cameras:

  - name: "epica"
    position: [0, 2.0, -10]
    look_at:  [0, 2.5, 3]
    fov: 50
    aperture: 0.0
    focal_dist: 12.0

  - name: "arco"
    position: [-5, 1.8, -2]
    look_at:  [0, 3.0, 2]
    fov: 55
    aperture: 0.0
    focal_dist: 7.0

  - name: "dettaglio_colonna"
    position: [2, 1.2, -1]
    look_at:  [3, 2.5, 1]
    fov: 40
    aperture: 0.06
    focal_dist: 4.0

  - name: "passeggiata"
    position: [0, 1.6, 0]
    look_at:  [0, 2.0, 8]
    fov: 60
    aperture: 0.0
    focal_dist: 8.0

  - name: "zenitale"
    position: [0, 20, 3]
    look_at:  [0, 0, 3]
    vup: [0, 0, 1]
    fov: 50
    aperture: 0.0
    focal_dist: 20.0


# ═══════════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════════

# ─── LUCI ATTIVE ★ Tramonto drammatico ───────────────────────────────────────
lights:
  - type: "directional"
    direction: [-0.95, -0.12, -0.3]
    color: [1.0, 0.48, 0.12]
    intensity: 0.9

  - type: "directional"
    direction: [0.5, -0.5, 0.4]
    color: [0.30, 0.25, 0.45]
    intensity: 0.04

