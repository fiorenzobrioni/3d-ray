# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Ancient Ruins
#
#  Rovine di un tempio classico al tramonto. Colonne doriche spezzate
#  (cilindri + CSG subtraction per i danni), arco in pietra, piedistalli
#  con sfere decorative, pavimento in marmo frantumato, edera stilizzata.
#  L'atmosfera è epica e nostalgica con luce drammatica.
#
#  AMBIENTAZIONE: Outdoor — rovine classiche, paesaggio mediterraneo
#  STILE: Epico, fotografico, luce cinematografica
#
#  Render consigliato:
#    Draft:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Preview:  -w 800  -H 450  -s 256  -d 6
#    Finale:   -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════════


# ─── WORLD ATTIVO ★ Tramonto drammatico ──────────────────────────────────────
world:
  sky:
    type: "gradient"
    zenith_color:  [0.08, 0.06, 0.22]
    horizon_color: [0.90, 0.35, 0.10]
    ground_color:  [0.15, 0.10, 0.06]
    sun:
      direction: [-0.95, -0.12, -0.3]
      color: [1.0, 0.45, 0.10]
      intensity: 28.0
      size: 6.0
      falloff: 12.0
  ground:
    type: "infinite_plane"
    material: "erba_secca"
    y: 0

