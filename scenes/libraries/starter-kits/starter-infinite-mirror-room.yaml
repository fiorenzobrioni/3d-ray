# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Infinite Mirror Room
#
#  Due grandi quad-specchio paralleli con sfere luminose emissive sospese
#  tra di loro. L'effetto tunnel infinito si ripete nei riflessi. Ideale per
#  testare profondità di ricorsione, riflessioni multiple e materiali emissivi.
#  Pavimento riflettente scuro, soffitto nero.
#
#  AMBIENTAZIONE: Indoor — installazione artistica, spazio surreale
#  STILE: Minimalista, ipnotico, high contrast
#
#  NOTA: usare -d 40+ per apprezzare i riflessi profondi
#
#  Render consigliato:
#    Draft:    -w 800  -H 600  -s 16  -d 30 -S 4
#    Preview:  -w 1280 -H 960  -s 64  -d 45 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 60 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


world:
  ambient_light: [0.005, 0.005, 0.008]
  background: [0.0, 0.0, 0.0]


cameras:

  - name: "tunnel"
    position: [0.3, 1.2, -0.5]
    look_at:  [0, 1.2, 5]
    fov: 60
    aperture: 0.0
    focal_dist: 5.0

  - name: "angolare"
    position: [1.5, 1.5, -1]
    look_at:  [0, 1.0, 3]
    fov: 55
    aperture: 0.0
    focal_dist: 5.0

  - name: "basso"
    position: [0, 0.2, 0]
    look_at:  [0, 0.8, 5]
    fov: 65
    aperture: 0.0
    focal_dist: 5.0

  - name: "dettaglio"
    position: [0, 1.2, 1]
    look_at:  [0, 1.2, 3.5]
    fov: 40
    aperture: 0.04
    focal_dist: 3.0


materials:

  - id: "specchio"
    type: "metal"
    color: [0.97, 0.97, 0.98]
    fuzz: 0.0

  - id: "pavimento_scuro"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.08
    metallic: 0.0
    specular: 0.9
    clearcoat: 0.8
    clearcoat_gloss: 0.95

  - id: "nero"
    type: "lambertian"
    color: [0.01, 0.01, 0.01]

  - id: "emissivo_bianco"
    type: "emissive"
    color: [1.0, 0.98, 0.95]
    intensity: 10.0

  - id: "emissivo_caldo"
    type: "emissive"
    color: [1.0, 0.70, 0.30]
    intensity: 12.0

  - id: "emissivo_freddo"
    type: "emissive"
    color: [0.30, 0.60, 1.0]
    intensity: 12.0

  - id: "emissivo_rosa"
    type: "emissive"
    color: [1.0, 0.30, 0.60]
    intensity: 10.0

  - id: "emissivo_verde"
    type: "emissive"
    color: [0.20, 1.0, 0.40]
    intensity: 8.0

  - id: "vetro"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.95, 0.95, 1.0]

  - id: "cromo"
    type: "metal"
    color: [0.90, 0.90, 0.92]
    fuzz: 0.02


entities:

  # ── SPECCHI PARALLELI ──────────────────────────────────────────────────────
  - name: "specchio_sx"
    type: "quad"
    q: [-2.5, 0, -1]
    u: [0, 0, 8]
    v: [0, 3, 0]
    material: "specchio"

  - name: "specchio_dx"
    type: "quad"
    q: [2.5, 0, -1]
    u: [0, 0, 8]
    v: [0, 3, 0]
    material: "specchio"

  # Pavimento e soffitto
  - name: "pavimento"
    type: "quad"
    q: [-2.5, 0, -1]
    u: [5, 0, 0]
    v: [0, 0, 8]
    material: "pavimento_scuro"

  - name: "soffitto"
    type: "quad"
    q: [-2.5, 3, -1]
    u: [5, 0, 0]
    v: [0, 0, 8]
    material: "nero"

  - name: "parete_fondo"
    type: "quad"
    q: [-2.5, 0, 7]
    u: [5, 0, 0]
    v: [0, 3, 0]
    material: "nero"

  # ── SFERE LUMINOSE — distribuite nello spazio tra gli specchi ──────────────

  # Fila centrale sospesa
  - { name: "luce_1", type: "sphere", center: [0, 1.8, 1],   radius: 0.15, material: "emissivo_bianco" }
  - { name: "luce_2", type: "sphere", center: [0, 1.2, 3],   radius: 0.12, material: "emissivo_caldo" }
  - { name: "luce_3", type: "sphere", center: [0, 2.0, 5],   radius: 0.18, material: "emissivo_freddo" }

  # Sfere decentrate (creano asimmetria nei riflessi)
  - { name: "luce_4", type: "sphere", center: [-1.0, 0.8, 2],  radius: 0.10, material: "emissivo_rosa" }
  - { name: "luce_5", type: "sphere", center: [1.2, 1.5, 4],   radius: 0.10, material: "emissivo_verde" }
  - { name: "luce_6", type: "sphere", center: [-0.5, 2.2, 5.5], radius: 0.08, material: "emissivo_caldo" }

  # Sfera di vetro (rifrazioni + riflessi infiniti)
  - name: "sfera_vetro"
    type: "sphere"
    center: [0, 0.40, 3]
    radius: 0.40
    material: "vetro"

  # Sfera cromata (riflessi multipli tra gli specchi)
  - name: "sfera_cromo"
    type: "sphere"
    center: [0.8, 0.25, 1.5]
    radius: 0.25
    material: "cromo"


lights:
  # Luce ambiente dal soffitto (molto bassa)
  - type: "area"
    corner: [-1, 2.98, 1]
    u: [2, 0, 0]
    v: [0, 0, 4]
    color: [0.80, 0.82, 0.90]
    intensity: 3.0
    shadow_samples: 8
