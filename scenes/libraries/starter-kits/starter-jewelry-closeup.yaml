# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Jewelry Close-Up
#
#  Macro di un anello con gemma centrale e due piccole laterali su piedistallo
#  di velluto. Lo studio è quello canonico per gioielleria (sphere top + side
#  area + rim + ground bounce) per produrre catchlight circolari sui metalli e
#  caustiche sulle gemme. Tutte le sorgenti sono già hardenate (soft_radius,
#  shadow_samples) per minimizzare i firefly tipici delle gemme close-up.
#
#  AMBIENTAZIONE : Indoor — studio gioielleria, macro lens
#  STILE         : Editoriale, alta resa speculare, catchlight
#
#  FEATURES MOSTRATE:
#    • Disney `metallic: 1.0` + `anisotropic` per metalli graffiati
#    • Gemma con `spec_trans: 1.0` + IOR alti (diamante 2.42, smeraldo 1.57)
#    • `thin_film_thickness` su anello opale per l'iridescenza
#    • Velluto del piedistallo con `sheen` + `sheen_roughness` (Charlie NDF)
#    • Studio-product lighting già hardenato (vedi lights/studio-product.yaml)
#
#  RENDER:
#    Draft   : -w 400  -H 225  -s 64   -d 4  -S 1
#    Standard: -w 800  -H 450  -s 256  -d 8
#    Final   : -w 1920 -H 1080 -s 1024 -d 12 -S 4 -C 25
#  Per le caustiche del diamante: -d 16 nel Final, -C 25 per controllare i
#  firefly delle gemme. Considera anche --indirect-clamp-factor 0.25.
# ═══════════════════════════════════════════════════════════════════════════════

imports:
  - path: "libraries/materials/metals.yaml"
  - path: "libraries/materials/glasses.yaml"
  - path: "libraries/materials/fabrics.yaml"
  - path: "libraries/lights/studio-product.yaml"

world:
  ambient_light: [0.005, 0.005, 0.008]
  background: [0.0, 0.0, 0.0]

cameras:
  # Macro frontale leggermente angolata (3/4)
  - name: "macro"
    position: [0.10, 0.090, -0.20]
    look_at:  [0.0, 0.045, 0.0]
    fov: 28
    aperture: 0.005
    focal_dist: 0.22

  # Vista laterale per apprezzare l'altezza della gemma
  - name: "laterale"
    position: [0.20, 0.060, -0.04]
    look_at:  [0.0, 0.052, 0.0]
    fov: 26
    aperture: 0.004
    focal_dist: 0.22

  # Vista zenitale (catchlight ring)
  - name: "zenitale"
    position: [0.0, 0.18, -0.02]
    look_at:  [0.0, 0.0, 0.0]
    fov: 32
    aperture: 0.0
    focal_dist: 0.18

  # Tre quarti per la gemma laterale destra
  - name: "tre_quarti"
    position: [-0.18, 0.080, -0.12]
    look_at:  [0.0, 0.045, 0.0]
    fov: 26
    aperture: 0.005
    focal_dist: 0.22

# Le luci arrivano da `lights/studio-product.yaml`. Tutte le sorgenti sono già
# calibrate alla scala dello studio (5 m). Per la macro a 0.20 m servono
# intensità più alte: aggiungiamo un sphere-light vicino a complemento.

lights:
  # Sphere light vicina (ravvicinata al soggetto: 0.4 m sopra)
  # Solid-angle sampling è ideale per close-up specular.
  - type: "sphere"
    position: [0.0, 0.40, -0.10]
    radius: 0.10
    color: [1.0, 0.98, 0.96]
    intensity: 80.0

materials:
  # Velluto rosso bordeaux per il piedistallo (sheen high)
  - id: "velluto_bordeaux"
    type: "disney"
    color: [0.32, 0.04, 0.06]
    roughness: 0.85
    metallic: 0.0
    sheen: 1.0
    sheen_tint: 0.50
    sheen_roughness: 0.20

  # Oro 18k giallo (override locale per scala close-up)
  - id: "oro_18k"
    type: "disney"
    color: [1.0, 0.78, 0.32]
    roughness: 0.08
    metallic: 1.0
    specular: 0.85

  # Oro bianco / platino — per la struttura attorno alle gemme laterali
  - id: "platino"
    type: "disney"
    color: [0.92, 0.92, 0.94]
    roughness: 0.05
    metallic: 1.0
    specular: 0.95
    anisotropic: 0.20

  # Diamante (gemma centrale)
  - id: "diamante"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    roughness: 0.0
    metallic: 0.0
    spec_trans: 1.0
    ior: 2.42
    transmission_color: [1.0, 1.0, 1.0]

  # Smeraldo (gemme laterali)
  - id: "smeraldo"
    type: "disney"
    color: [0.10, 0.78, 0.30]
    roughness: 0.0
    metallic: 0.0
    spec_trans: 1.0
    ior: 1.57
    transmission_color: [0.05, 0.45, 0.18]
    transmission_depth: 0.005

  # Opale — usa thin_film per l'iridescenza
  - id: "opale_iridescente"
    type: "disney"
    color: [0.95, 0.92, 0.95]
    roughness: 0.20
    metallic: 0.0
    spec_trans: 0.40
    ior: 1.45
    thin_film_thickness: 480.0   # nm — vicino al massimo del verde-rosso
    thin_film_ior: 1.40

templates:
  # ── Anello principale ─────────────────────────────────────────────────────
  # Fascia: torus principale; 4 prong (denti) per fissare la gemma centrale;
  # 2 alloggi laterali (mezzi tori) per le gemme secondarie.
  - name: "anello_solitario"
    material: "oro_18k"
    children:
      # Fascia principale (toro orizzontale)
      - type: "torus"
        major_radius: 0.040
        minor_radius: 0.0035
        translate: [0, 0.040, 0]

      # Castone (cilindro corto sul punto più alto della fascia,
      # rialzato per ospitare la gemma)
      - type: "cylinder"
        radius: 0.012
        height: 0.008
        translate: [0, 0.041, -0.040]
        material: "platino"

      # 4 prong (denti porta-gemma): cilindri verticali piccoli
      - { type: "cylinder", radius: 0.0012, height: 0.014,
          translate: [0.0095, 0.045, -0.030], material: "platino" }
      - { type: "cylinder", radius: 0.0012, height: 0.014,
          translate: [-0.0095, 0.045, -0.030], material: "platino" }
      - { type: "cylinder", radius: 0.0012, height: 0.014,
          translate: [0.0095, 0.045, -0.050], material: "platino" }
      - { type: "cylinder", radius: 0.0012, height: 0.014,
          translate: [-0.0095, 0.045, -0.050], material: "platino" }

      # Spalle laterali (incavi sulla fascia per le gemme secondarie):
      # piccoli mezzi tori con materiale platino
      - type: "torus"
        major_radius: 0.040
        minor_radius: 0.0028
        translate: [0, 0.040, 0]
        scale: [1.05, 1.0, 1.05]
        material: "platino"

  # ── Gemma centrale (round brilliant approx via cono ∩ cono) ──────────────
  # Una taglio brillante stilizzato: cono superiore (corona) + cono inferiore
  # (padiglione, capovolto). Il diamante usa CSG intersection per il
  # silhouette caratteristico.
  - name: "gemma_brilliant"
    material: "diamante"
    children:
      - type: "csg"
        operation: "union"
        left:
          # Corona (cono dritto, taglio in alto)
          type: "cone"
          radius: 0.011
          top_radius: 0.008
          height: 0.005
          translate: [0, 0.005, 0]
        right:
          # Padiglione (cono inverso, vertice verso il basso)
          type: "cone"
          radius: 0.011
          top_radius: 0.0015
          height: 0.008
          rotate: [180, 0, 0]
          translate: [0, 0.005, 0]

  # ── Gemma laterale (cabochon: mezza sfera) ────────────────────────────────
  - name: "gemma_cabochon"
    material: "smeraldo"
    children:
      - { type: "sphere", radius: 0.005, scale: [1.0, 0.55, 1.0], translate: [0, 0.0028, 0] }

  # ── Piedistallo in velluto (cilindro tozzo) ───────────────────────────────
  - name: "piedistallo_velluto"
    material: "velluto_bordeaux"
    children:
      - { type: "cylinder", radius: 0.060, height: 0.008, translate: [0, 0, 0] }
      # Bordo arrotondato (toro decorativo sul perimetro inferiore)
      - { type: "torus", major_radius: 0.060, minor_radius: 0.002, translate: [0, 0, 0] }

entities:
  # Piedistallo
  - { type: "instance", template: "piedistallo_velluto", translate: [0, 0, 0] }

  # Anello posato sul piedistallo (fascia parallela al piano del tavolo)
  - { type: "instance", template: "anello_solitario", translate: [0, 0.008, 0] }

  # Gemma centrale (sopra il castone)
  - { type: "instance", template: "gemma_brilliant", translate: [0, 0.057, -0.040] }

  # Due gemme cabochon laterali sulla fascia
  - { type: "instance", template: "gemma_cabochon", translate: [0.029, 0.046, -0.028],
      material: "smeraldo" }
  - { type: "instance", template: "gemma_cabochon", translate: [-0.029, 0.046, -0.028],
      material: "smeraldo" }

  # ── Anello secondario in oro bianco con opale (decentrato, posato di lato)
  - name: "fascetta_opale"
    type: "torus"
    major_radius: 0.030
    minor_radius: 0.0025
    rotate: [82, 0, 0]
    translate: [0.080, 0.030, 0.020]
    material: "platino"

  # Opale incastonato (sfera schiacciata) sull'anello secondario
  - name: "opale"
    type: "sphere"
    radius: 0.005
    scale: [1.4, 0.5, 1.4]
    translate: [0.080, 0.060, 0.020]
    material: "opale_iridescente"
