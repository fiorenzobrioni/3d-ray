# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Still Life with Fruit
#
#  Natura morta in stile fiammingo: tavolo in legno scuro, drappo in lino bianco
#  morbido, ciotola in ceramica satin con frutta (mele, arance, uva, pera).
#  Bicchiere di vino rosso (Disney spec_trans + transmission_color/depth) e una
#  bottiglia opacizzata. Luce singola laterale da finestra (area light) per il
#  classico contrasto chiaroscuro tipico dei dipinti di Caravaggio/Velázquez.
#
#  AMBIENTAZIONE : Indoor — natura morta, mostra Disney BSDF
#  STILE         : Fiammingo, chiaroscuro, dipinto a olio
#
#  FEATURES MOSTRATE:
#    • Frutta con `subsurface` + `subsurface_color` (mele, arance, pera)
#    • Vino rosso con `spec_trans` + `transmission_color` + `transmission_depth`
#    • Vetro smerigliato (bottiglia) con il nuovo `dis_vetro_sabbiato_ambra`
#    • Ceramica satin (la nuova famiglia satin nei materials/ceramics.yaml)
#    • Lino con `sheen` + `sheen_roughness`
#    • Area light con soft_radius per fotorealismo senza firefly
#
#  RENDER:
#    Draft   : -w 400  -H 225  -s 64   -d 4  -S 1
#    Standard: -w 800  -H 450  -s 256  -d 8
#    Final   : -w 1920 -H 1080 -s 1024 -d 10 -S 4
#  Per il vetro/vino: -d 12 nel profilo Final per i bounce di rifrazione.
# ═══════════════════════════════════════════════════════════════════════════════

imports:
  - path: "libraries/materials/woods.yaml"
  - path: "libraries/materials/ceramics.yaml"
  - path: "libraries/materials/glasses.yaml"
  - path: "libraries/materials/foods.yaml"
  - path: "libraries/materials/fabrics.yaml"

world:
  ambient_light: [0.012, 0.012, 0.014]
  background: [0.0, 0.0, 0.0]

cameras:
  - name: "tavola"
    position: [0.0, 0.95, -1.5]
    look_at:  [0.0, 0.78, 0.0]
    fov: 45
    aperture: 0.04
    focal_dist: 1.6

  - name: "ciotola"
    position: [-0.30, 0.92, -0.85]
    look_at:  [-0.05, 0.83, 0.05]
    fov: 32
    aperture: 0.05
    focal_dist: 0.95

  - name: "bicchiere"
    position: [0.55, 0.88, -0.70]
    look_at:  [0.30, 0.84, 0.0]
    fov: 28
    aperture: 0.04
    focal_dist: 0.85

  - name: "panoramica"
    position: [1.4, 1.4, -2.2]
    look_at:  [0.0, 0.78, 0.0]
    fov: 42
    aperture: 0.0
    focal_dist: 3.0

lights:
  # ── Luce da finestra laterale (key) ──────────────────────────────────────
  # Area larga 0.9 × 1.4 m a sinistra, leggermente sopra il tavolo, color
  # leggermente caldo (luce diurna filtrata dalla tenda). soft_radius floored
  # per niente fireflies sui materiali speculari.
  - type: "area"
    corner: [-2.8, 0.6, -0.6]
    u: [0.0, 0.0, 1.4]
    v: [0.0, 0.9, 0.0]
    color: [1.0, 0.94, 0.86]
    intensity: 18.0
    soft_radius: 0.10

  # ── Bounce caldo del muro destro (fill discreto) ─────────────────────────
  # Point molto debole simulando la luce rimbalzata dalla parete a destra
  # tinta marrone scuro: la natura morta fiamminga ha sempre questo "respiro"
  # caldo nei toni scuri. soft_radius alto per ammorbidire ulteriormente.
  - type: "point"
    position: [2.2, 0.95, -0.4]
    color: [1.0, 0.62, 0.32]
    intensity: 4.0
    soft_radius: 0.20

materials:
  # ── Drappo in lino bianco (override per maggiore sheen) ──────────────────
  - id: "drappo_lino"
    type: "disney"
    color: [0.94, 0.92, 0.86]
    roughness: 0.78
    metallic: 0.0
    sheen: 0.55
    sheen_tint: 0.30
    sheen_roughness: 0.35

  # ── Vino rosso intenso (Beer-Lambert) ────────────────────────────────────
  # transmission_depth: a 5 unità di scena (5 cm di liquido nel bicchiere)
  # il colore raggiunge la saturazione bordeaux profonda. Realistico.
  - id: "vino_rosso"
    type: "disney"
    color: [0.45, 0.06, 0.06]
    roughness: 0.0
    metallic: 0.0
    spec_trans: 1.0
    ior: 1.345
    transmission_color: [0.25, 0.02, 0.02]
    transmission_depth: 0.05

  # ── Ombra sotto frutta (placeholder material per i piccoli pickli) ──────
  - id: "picciolo"
    type: "lambertian"
    color: [0.18, 0.12, 0.06]

  # ── Buccia di pera (giallo-verde con leggero subsurface) ─────────────────
  # `dis_pera` non esiste in foods.yaml: definito qui nello starter.
  - id: "pera_buccia"
    type: "disney"
    color: [0.78, 0.72, 0.32]
    roughness: 0.55
    metallic: 0.0
    subsurface: 0.20
    subsurface_color: [0.85, 0.78, 0.40]
    specular: 0.30

templates:
  # ── Mela rossa + picciolo ────────────────────────────────────────────────
  - name: "mela_rossa"
    material: "dis_mela_rossa"
    children:
      - { type: "sphere", radius: 0.045, scale: [1.0, 0.92, 1.0], translate: [0, 0.040, 0] }
      # Picciolo (cilindro sottile). center [0,0,0] + rotate piccolo + translate.
      - { type: "cylinder", radius: 0.0025, height: 0.018,
          rotate: [5, 0, 5], translate: [0, 0.082, 0], material: "picciolo" }

  # ── Arancia (sfera leggermente schiacciata, buccia satin food) ───────────
  - name: "arancia"
    material: "dis_arancia"
    children:
      - { type: "sphere", radius: 0.040, scale: [1.0, 0.95, 1.0], translate: [0, 0.038, 0] }

  # ── Pera (lathe Catmull-Rom: profilo a doppia curva) ─────────────────────
  - name: "pera"
    material: "pera_buccia"
    children:
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]
          - [0.030, 0.000]
          - [0.038, 0.020]
          - [0.040, 0.045]   # corpo basso
          - [0.032, 0.075]
          - [0.024, 0.090]   # vita stretta
          - [0.026, 0.105]
          - [0.020, 0.115]
          - [0.000, 0.125]   # apice
      - { type: "cylinder", radius: 0.0025, height: 0.020,
          rotate: [10, 0, 0], translate: [0, 0.125, 0], material: "picciolo" }

  # ── Acino d'uva (sfera piccola con subsurface) ───────────────────────────
  - name: "acino_uva"
    material: "dis_uva_nera"
    children:
      - { type: "sphere", radius: 0.012, scale: [1.0, 1.15, 1.0], translate: [0, 0.012, 0] }

  # ── Ciotola in ceramica satin (CSG: sfera grande − sfera interna) ────────
  - name: "ciotola_ceramica"
    material: "dis_satin_porcellana"
    children:
      - type: "csg"
        operation: "subtraction"
        left:
          type: "sphere"
          radius: 0.115
          scale: [1.0, 0.50, 1.0]
          translate: [0, 0.058, 0]
        right:
          type: "sphere"
          radius: 0.108
          scale: [1.0, 0.55, 1.0]
          translate: [0, 0.072, 0]

entities:
  # ── Tavolo (box di legno scuro Disney) ───────────────────────────────────
  - name: "piano_tavolo"
    type: "box"
    scale: [3.5, 0.04, 1.8]
    translate: [0, 0.74, 0]
    material: "dis_noce_cera"

  # ── Drappo (quad piatto con sheen) ───────────────────────────────────────
  # Posizionato sopra il tavolo con due piccole pieghe simulate da box molto
  # sottili. Per uno still life "vero" andrebbe modellato con cloth, ma per
  # uno starter due piani sovrapposti con sheen alto bastano.
  - name: "drappo_principale"
    type: "quad"
    q: [-0.85, 0.762, -0.55]
    u: [1.7, 0.0, 0.0]
    v: [0.0, 0.0, 1.10]
    material: "drappo_lino"

  - name: "piega_drappo"
    type: "box"
    scale: [0.28, 0.012, 0.10]
    rotate: [0, 14, 0]
    translate: [-0.42, 0.770, 0.18]
    material: "drappo_lino"

  # ── Ciotola di frutta ────────────────────────────────────────────────────
  - { type: "instance", template: "ciotola_ceramica", translate: [-0.18, 0.766, 0.05] }

  # Frutta nella ciotola
  - { type: "instance", template: "mela_rossa",  translate: [-0.21, 0.825, 0.04] }
  - { type: "instance", template: "mela_rossa",  translate: [-0.13, 0.830, 0.10],
      rotate: [0, 35, 0], material: "dis_mela_verde" }
  - { type: "instance", template: "arancia",     translate: [-0.18, 0.835, -0.02] }
  - { type: "instance", template: "arancia",     translate: [-0.10, 0.825, 0.0],
      rotate: [0, 60, 0] }

  # Frutta sul tavolo (fuori dalla ciotola)
  - { type: "instance", template: "pera",        translate: [0.06, 0.762, 0.10],
      rotate: [0, 0, 8] }
  - { type: "instance", template: "mela_rossa",  translate: [0.18, 0.762, -0.05],
      material: "dis_mela_verde" }
  - { type: "instance", template: "arancia",     translate: [0.16, 0.762, 0.16] }

  # Grappolo d'uva (cluster manuale di acini)
  # Disposti compatti formando un grappolo tridimensionale. Niente center
  # con scale: ogni istanza è solo translate.
  - { type: "instance", template: "acino_uva", translate: [0.30, 0.770, 0.08] }
  - { type: "instance", template: "acino_uva", translate: [0.318, 0.768, 0.095] }
  - { type: "instance", template: "acino_uva", translate: [0.292, 0.770, 0.100] }
  - { type: "instance", template: "acino_uva", translate: [0.310, 0.766, 0.062] }
  - { type: "instance", template: "acino_uva", translate: [0.328, 0.768, 0.078] }
  - { type: "instance", template: "acino_uva", translate: [0.300, 0.785, 0.085] }
  - { type: "instance", template: "acino_uva", translate: [0.320, 0.785, 0.100] }
  - { type: "instance", template: "acino_uva", translate: [0.340, 0.770, 0.090] }

  # ── Bicchiere di vino (lathe limpido) e contenuto (lathe con vino) ──────
  # Bicchiere — corpo del calice + stelo + base. Catmull-Rom monotonico.
  - name: "bicchiere_vino"
    type: "lathe"
    profile_type: "catmull_rom"
    profile:
      - [0.000, 0.000]
      - [0.040, 0.000]
      - [0.040, 0.005]
      - [0.005, 0.012]   # base superiore
      - [0.005, 0.060]   # stelo
      - [0.012, 0.065]
      - [0.030, 0.075]   # spalla coppa
      - [0.038, 0.090]   # equatore coppa
      - [0.036, 0.108]
      - [0.034, 0.122]   # bordo superiore
      - [0.0335, 0.123]
    translate: [0.32, 0.762, -0.18]
    material: "dis_vetro_sodalime"

  # Vino dentro al bicchiere (lathe leggermente più piccolo)
  - name: "vino_nel_bicchiere"
    type: "lathe"
    profile_type: "catmull_rom"
    profile:
      - [0.000, 0.000]
      - [0.029, 0.000]   # superficie del vino, ellisse al fondo della coppa
      - [0.030, 0.005]
      - [0.034, 0.015]
      - [0.034, 0.022]
      - [0.000, 0.022]   # superficie superiore (livello del vino)
    translate: [0.32, 0.836, -0.18]
    material: "vino_rosso"

  # ── Bottiglia ambra smerigliata (lathe + transmission_color) ────────────
  - name: "bottiglia"
    type: "lathe"
    profile_type: "catmull_rom"
    profile:
      - [0.000, 0.000]
      - [0.038, 0.000]
      - [0.038, 0.155]   # corpo cilindrico
      - [0.038, 0.165]
      - [0.030, 0.175]   # spalla
      - [0.012, 0.220]   # collo
      - [0.012, 0.285]
      - [0.014, 0.295]   # labbro
      - [0.012, 0.300]
    translate: [-0.55, 0.762, -0.10]
    material: "dis_vetro_sabbiato_ambra"

  # ── Coltello (manico in legno, lama metal — sotto il drappo, decorativo)
  - name: "manico_coltello"
    type: "box"
    scale: [0.085, 0.012, 0.022]
    translate: [0.10, 0.769, -0.32]
    rotate: [0, 22, 0]
    material: "dis_noce_cera"

  - name: "lama_coltello"
    type: "box"
    scale: [0.18, 0.002, 0.022]
    translate: [0.245, 0.764, -0.275]
    rotate: [0, 22, 0]
    material: "dis_acciaio_lucido"

  # ── Quad muro di fondo (tinta scura) ────────────────────────────────────
  - name: "muro_fondo"
    type: "quad"
    q: [-3.0, 0.0, 1.4]
    u: [6.0, 0.0, 0.0]
    v: [0.0, 3.0, 0.0]
    material: "dis_lino_naturale"
