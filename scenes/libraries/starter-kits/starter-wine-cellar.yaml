# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Wine Cellar
#
#  Cantina con muri scuri in pietra, scaffali in legno con bottiglie, una botte
#  grande (cilindro con cerchi toroidali), tavolo d'assaggio, bicchiere di vino.
#  Illuminazione calda e intima da lanterna a sfera e candele emissive.
#
#  AMBIENTAZIONE: Indoor — cantina, atmosfera intima e calda
#  STILE: Chiaroscuro, drammatico, luce calda puntuale
#
#  Render consigliato:
#    Draft:    -w 800  -H 600  -s 16  -d 20 -S 4
#    Preview:  -w 1280 -H 960  -s 64  -d 30 -S 8
#    Finale:   -w 1920 -H 1080 -s 256 -d 50 -S 16
# ═══════════════════════════════════════════════════════════════════════════════


world:
  ambient_light: [0.01, 0.008, 0.005]
  background: [0.0, 0.0, 0.0]


cameras:

  - name: "atmosfera"
    position: [0, 1.5, -4]
    look_at:  [0, 1.0, 2]
    fov: 55
    aperture: 0.0
    focal_dist: 6.0

  - name: "botte"
    position: [-2.5, 1.2, -1]
    look_at:  [-1.5, 0.8, 2]
    fov: 48
    aperture: 0.04
    focal_dist: 4.0

  - name: "tavolo"
    position: [1, 1.3, -2]
    look_at:  [1, 0.85, 1]
    fov: 42
    aperture: 0.05
    focal_dist: 3.5

  - name: "scaffali"
    position: [3.5, 1.6, 0]
    look_at:  [2.5, 1.0, 3]
    fov: 50
    aperture: 0.0
    focal_dist: 4.0


materials:

  - id: "pietra_cantina"
    type: "disney"
    texture:
      type: "noise"
      scale: 5.0
      noise_strength: 0.5
      colors: [[0.18, 0.15, 0.12], [0.12, 0.10, 0.08]]
      randomize_offset: true
    roughness: 0.92
    metallic: 0.0

  - id: "pavimento_cantina"
    type: "disney"
    texture:
      type: "noise"
      scale: 3.0
      noise_strength: 0.4
      colors: [[0.15, 0.12, 0.10], [0.10, 0.08, 0.06]]
      randomize_offset: true
    roughness: 0.88
    metallic: 0.0

  - id: "legno_botte"
    type: "disney"
    texture:
      type: "wood"
      scale: 6.0
      colors: [[0.35, 0.20, 0.08], [0.25, 0.12, 0.04]]
      randomize_offset: true
    roughness: 0.60
    metallic: 0.0
    specular: 0.2

  - id: "ferro_botte"
    type: "disney"
    color: [0.20, 0.18, 0.16]
    roughness: 0.50
    metallic: 0.80
    specular: 0.4

  - id: "legno_scaffale"
    type: "disney"
    texture:
      type: "wood"
      scale: 8.0
      colors: [[0.28, 0.16, 0.06], [0.20, 0.10, 0.03]]
      randomize_offset: true
    roughness: 0.65
    metallic: 0.0

  - id: "vetro_bottiglia"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.20, 0.35, 0.18]

  - id: "vetro_bicchiere"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.95, 0.96, 0.98]

  - id: "vino_rosso"
    type: "disney"
    color: [0.35, 0.02, 0.03]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.34

  - id: "legno_tavolo"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.0
      colors: [[0.40, 0.25, 0.10], [0.30, 0.18, 0.06]]
      randomize_offset: true
    roughness: 0.45
    metallic: 0.0
    specular: 0.3
    clearcoat: 0.3
    clearcoat_gloss: 0.6

  - id: "candela_cera"
    type: "disney"
    color: [0.90, 0.85, 0.70]
    roughness: 0.75
    subsurface: 0.5

  - id: "fiamma"
    type: "emissive"
    color: [1.0, 0.70, 0.25]
    intensity: 12.0


templates:

  # ── Bottiglia di vino coricata ─────────────────────────────────────────────
  - name: "bottiglia_coricata"
    material: "vetro_bottiglia"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.05
        height: 0.40
        rotate: [0, 0, 90]
      - type: "sphere"
        center: [-0.22, 0, 0]
        radius: 0.05

  # ── Botte grande con cerchi in ferro ───────────────────────────────────────
  - name: "botte"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.60
        height: 0.90
        material: "legno_botte"
      # Cerchi in ferro
      - type: "torus"
        major_radius: 0.61
        minor_radius: 0.02
        translate: [0, 0.10, 0]
        material: "ferro_botte"
      - type: "torus"
        major_radius: 0.61
        minor_radius: 0.02
        translate: [0, 0.45, 0]
        material: "ferro_botte"
      - type: "torus"
        major_radius: 0.61
        minor_radius: 0.02
        translate: [0, 0.80, 0]
        material: "ferro_botte"

  # ── Candela con fiamma ─────────────────────────────────────────────────────
  - name: "candela"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.02
        height: 0.12
        material: "candela_cera"
      - type: "sphere"
        center: [0, 0.13, 0]
        radius: 0.015
        scale: [0.8, 1.5, 0.8]
        material: "fiamma"


entities:

  # ── STANZA ─────────────────────────────────────────────────────────────────
  - { name: "pavimento", type: "quad", q: [-4, 0, -2], u: [8, 0, 0], v: [0, 0, 8], material: "pavimento_cantina", seed: 10 }
  - { name: "soffitto", type: "quad", q: [-4, 3, -2], u: [8, 0, 0], v: [0, 0, 8], material: "pietra_cantina" }
  - { name: "muro_fondo", type: "quad", q: [-4, 0, 6], u: [8, 0, 0], v: [0, 3, 0], material: "pietra_cantina", seed: 11 }
  - { name: "muro_sx", type: "quad", q: [-4, 0, -2], u: [0, 0, 8], v: [0, 3, 0], material: "pietra_cantina", seed: 12 }
  - { name: "muro_dx", type: "quad", q: [4, 0, -2], u: [0, 0, 8], v: [0, 3, 0], material: "pietra_cantina", seed: 13 }

  # ── BOTTI ──────────────────────────────────────────────────────────────────
  - { type: "instance", template: "botte", translate: [-2, 0, 4], seed: 100 }
  - { type: "instance", template: "botte", translate: [-0.8, 0, 4.5], seed: 101 }
  - { type: "instance", template: "botte", translate: [-2, 0.92, 4], seed: 102 }

  # ── SCAFFALE CON BOTTIGLIE ─────────────────────────────────────────────────
  # Montanti
  - { name: "montante_sx", type: "box", scale: [0.08, 2.2, 0.30], translate: [2.2, 1.1, 4.8], material: "legno_scaffale" }
  - { name: "montante_dx", type: "box", scale: [0.08, 2.2, 0.30], translate: [3.5, 1.1, 4.8], material: "legno_scaffale" }
  # Ripiani
  - { name: "ripiano_1", type: "box", scale: [1.4, 0.03, 0.30], translate: [2.85, 0.50, 4.8], material: "legno_scaffale" }
  - { name: "ripiano_2", type: "box", scale: [1.4, 0.03, 0.30], translate: [2.85, 1.10, 4.8], material: "legno_scaffale" }
  - { name: "ripiano_3", type: "box", scale: [1.4, 0.03, 0.30], translate: [2.85, 1.70, 4.8], material: "legno_scaffale" }

  # Bottiglie sugli scaffali
  - { type: "instance", template: "bottiglia_coricata", translate: [2.5, 0.55, 4.8], seed: 201 }
  - { type: "instance", template: "bottiglia_coricata", translate: [2.8, 0.55, 4.8], seed: 202 }
  - { type: "instance", template: "bottiglia_coricata", translate: [3.1, 0.55, 4.8], seed: 203 }
  - { type: "instance", template: "bottiglia_coricata", translate: [2.5, 1.15, 4.8], seed: 204 }
  - { type: "instance", template: "bottiglia_coricata", translate: [2.8, 1.15, 4.8], seed: 205 }
  - { type: "instance", template: "bottiglia_coricata", translate: [3.1, 1.15, 4.8], seed: 206 }
  - { type: "instance", template: "bottiglia_coricata", translate: [2.5, 1.75, 4.8], seed: 207 }
  - { type: "instance", template: "bottiglia_coricata", translate: [2.8, 1.75, 4.8], seed: 208 }

  # ── TAVOLO D'ASSAGGIO ──────────────────────────────────────────────────────
  - name: "tavolo_top"
    type: "box"
    scale: [1.2, 0.04, 0.6]
    translate: [1, 0.78, 1]
    material: "legno_tavolo"
    seed: 50

  - { name: "gamba_1", type: "cylinder", center: [0.5, 0, 0.75], radius: 0.04, height: 0.76, material: "legno_tavolo" }
  - { name: "gamba_2", type: "cylinder", center: [1.5, 0, 0.75], radius: 0.04, height: 0.76, material: "legno_tavolo" }
  - { name: "gamba_3", type: "cylinder", center: [0.5, 0, 1.25], radius: 0.04, height: 0.76, material: "legno_tavolo" }
  - { name: "gamba_4", type: "cylinder", center: [1.5, 0, 1.25], radius: 0.04, height: 0.76, material: "legno_tavolo" }

  # Bicchiere di vino sul tavolo
  - name: "calice_base"
    type: "cylinder"
    center: [1.1, 0.80, 1.0]
    radius: 0.04
    height: 0.01
    material: "vetro_bicchiere"

  - name: "calice_stelo"
    type: "cylinder"
    center: [1.1, 0.81, 1.0]
    radius: 0.008
    height: 0.08
    material: "vetro_bicchiere"

  - name: "calice_coppa"
    type: "sphere"
    center: [1.1, 0.93, 1.0]
    radius: 0.05
    material: "vetro_bicchiere"

  # ── CANDELE ────────────────────────────────────────────────────────────────
  - { type: "instance", template: "candela", translate: [0.8, 0.80, 0.85] }
  - { type: "instance", template: "candela", translate: [-2.5, 0.92, 3.5] }


lights:

  # ─── LUCI ATTIVE ★ Lanterna calda + candele ───────────────────────────────
  - type: "sphere"
    position: [0, 2.2, 1]
    radius: 0.15
    color: [1.0, 0.75, 0.40]
    intensity: 35.0
    shadow_samples: 8

  - type: "point"
    position: [0.8, 0.95, 0.85]
    color: [1.0, 0.65, 0.25]
    intensity: 5.0

  - type: "point"
    position: [-2.5, 1.05, 3.5]
    color: [1.0, 0.65, 0.25]
    intensity: 5.0

# ─── LUCI ALT-1: Solo candele (più buio e drammatico) ───────────────────────
