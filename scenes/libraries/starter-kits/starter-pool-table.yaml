# ═══════════════════════════════════════════════════════════════════════════════
#  STARTER KIT — Pool Table
#
#  Tavolo da biliardo classico: panno verde, sponde in legno di noce con
#  profilo in gomma, bilie colorate posizionate a triangolo, lampada
#  a sospensione con sphere light. Stecca appoggiata al bordo.
#  Classica scena da ray tracer per sfere riflettenti e caustiche.
#
#  AMBIENTAZIONE: Indoor — sala biliardo, atmosfera da pub/club
#  STILE: Classico, caldo, luce focalizzata sul tavolo
#
#  Render consigliato:
#    Draft:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Preview:  -w 800  -H 450  -s 256  -d 6
#    Finale:   -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════════


world:
  sky:
    type: "flat"
    color: [0.0, 0.0, 0.0]


cameras:

  - name: "classica"
    position: [0, 2.8, -3.5]
    look_at:  [0, 0.85, 0]
    fov: 48
    aperture: 0.0
    focal_dist: 5.0

  - name: "giocatore"
    position: [-2.5, 1.2, -2]
    look_at:  [0, 0.85, 0.5]
    fov: 52
    aperture: 0.04
    focal_dist: 4.0

  - name: "macro_bilie"
    position: [0.5, 1.1, -1.5]
    look_at:  [0.3, 0.88, 0]
    fov: 35
    aperture: 0.06
    focal_dist: 2.0

  - name: "lampada"
    position: [0, 3.5, -2]
    look_at:  [0, 0.85, 0]
    fov: 55
    aperture: 0.0
    focal_dist: 3.5


lights:

  # ─── LUCI ATTIVE ★ Lampada da biliardo + ambient ──────────────────────────
  - type: "sphere"
    position: [0, 2.0, 0]
    radius: 0.15
    color: [1.0, 0.85, 0.55]
    intensity: 60.0
    shadow_samples: 12

  - type: "point"
    position: [0, 2.0, 0]
    color: [1.0, 0.82, 0.50]
    intensity: 10.0

# ─── LUCI ALT-1: Ambiente pub — luce più diffusa ────────────────────────────
# lights:
#   - type: "sphere"
#     position: [0, 2.0, 0]
#     radius: 0.20
#     color: [1.0, 0.80, 0.50]
#     intensity: 45.0
#     shadow_samples: 8
#   - type: "point"
#     position: [3, 2.5, -2]
#     color: [1.0, 0.70, 0.35]
#     intensity: 15.0


materials:

  - id: "panno_verde"
    type: "disney"
    color: [0.05, 0.28, 0.08]
    roughness: 0.88
    metallic: 0.0
    subsurface: 0.1

  - id: "legno_sponda"
    type: "disney"
    texture:
      type: "wood"
      scale: 6.0
      colors: [[0.38, 0.22, 0.10], [0.28, 0.15, 0.06]]
      randomize_offset: true
    roughness: 0.30
    specular: 0.5
    clearcoat: 0.6
    coat_roughness: 0.15

  - id: "gomma_sponda"
    type: "disney"
    color: [0.08, 0.20, 0.06]
    roughness: 0.75
    metallic: 0.0

  - id: "pavimento_scuro"
    type: "disney"
    texture:
      type: "wood"
      scale: 2.0
      colors: [[0.12, 0.08, 0.04], [0.08, 0.05, 0.02]]
      randomize_offset: true
    roughness: 0.50

  - id: "paralume"
    type: "disney"
    color: [0.15, 0.35, 0.10]
    roughness: 0.50
    metallic: 0.3

  - id: "catena_ottone"
    type: "disney"
    color: [0.75, 0.60, 0.22]
    roughness: 0.30
    metallic: 0.9

  - id: "gamba_tavolo"
    type: "disney"
    texture:
      type: "wood"
      scale: 8.0
      colors: [[0.32, 0.18, 0.08], [0.22, 0.12, 0.04]]
      randomize_offset: true
    roughness: 0.35
    specular: 0.4

  # ── Bilie — plastica lucida con clearcoat ──────────────────────────────────
  - { id: "bilia_bianca",  type: "disney", color: [0.95, 0.93, 0.88], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_gialla",  type: "disney", color: [0.90, 0.80, 0.10], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_blu",     type: "disney", color: [0.05, 0.10, 0.65], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_rossa",   type: "disney", color: [0.75, 0.06, 0.06], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_viola",   type: "disney", color: [0.30, 0.05, 0.40], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_arancio", type: "disney", color: [0.90, 0.45, 0.05], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_verde",   type: "disney", color: [0.05, 0.45, 0.10], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_marrone",  type: "disney", color: [0.45, 0.20, 0.05], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }
  - { id: "bilia_nera",    type: "disney", color: [0.03, 0.03, 0.03], roughness: 0.08, specular: 0.7, clearcoat: 0.9, coat_roughness: 0.05 }

  - id: "stecca"
    type: "disney"
    texture:
      type: "wood"
      scale: 12.0
      colors: [[0.65, 0.50, 0.28], [0.55, 0.40, 0.20]]
    roughness: 0.35
    clearcoat: 0.5
    coat_roughness: 0.20


entities:

  # ── PAVIMENTO ──────────────────────────────────────────────────────────────
  - name: "pavimento"
    type: "plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento_scuro"

  # ── TAVOLO — Piano panno + sponde legno + gambe ────────────────────────────
  # Piano (panno verde)
  - name: "panno"
    type: "box"
    scale: [2.4, 0.04, 1.3]
    translate: [0, 0.82, 0]
    material: "panno_verde"

  # Sponde in legno (4 bordi)
  - { name: "sponda_N", type: "box", scale: [2.6, 0.12, 0.10], translate: [0, 0.88, -0.70], material: "legno_sponda", seed: 51 }
  - { name: "sponda_S", type: "box", scale: [2.6, 0.12, 0.10], translate: [0, 0.88, 0.70], material: "legno_sponda", seed: 52 }
  - { name: "sponda_E", type: "box", scale: [0.10, 0.12, 1.5], translate: [1.25, 0.88, 0], material: "legno_sponda", seed: 53 }
  - { name: "sponda_W", type: "box", scale: [0.10, 0.12, 1.5], translate: [-1.25, 0.88, 0], material: "legno_sponda", seed: 54 }

  # Profilo gomma (box sottili interni)
  - { name: "gomma_N", type: "box", scale: [2.38, 0.04, 0.04], translate: [0, 0.86, -0.63], material: "gomma_sponda" }
  - { name: "gomma_S", type: "box", scale: [2.38, 0.04, 0.04], translate: [0, 0.86, 0.63], material: "gomma_sponda" }
  - { name: "gomma_E", type: "box", scale: [0.04, 0.04, 1.28], translate: [1.18, 0.86, 0], material: "gomma_sponda" }
  - { name: "gomma_W", type: "box", scale: [0.04, 0.04, 1.28], translate: [-1.18, 0.86, 0], material: "gomma_sponda" }

  # Gambe (4 cilindri)
  - { name: "gamba_1", type: "cylinder", center: [-1.10, 0, -0.55], radius: 0.06, height: 0.80, material: "gamba_tavolo" }
  - { name: "gamba_2", type: "cylinder", center: [1.10, 0, -0.55], radius: 0.06, height: 0.80, material: "gamba_tavolo" }
  - { name: "gamba_3", type: "cylinder", center: [-1.10, 0, 0.55], radius: 0.06, height: 0.80, material: "gamba_tavolo" }
  - { name: "gamba_4", type: "cylinder", center: [1.10, 0, 0.55], radius: 0.06, height: 0.80, material: "gamba_tavolo" }

  # ── BILIE — Formazione a triangolo + bilia bianca ──────────────────────────
  # R = 0.028 (bilia da pool)  Y = 0.84 + 0.028 = 0.868
  # Triangolo centrato su Z=0.2, spacing ≈ 0.06

  # Bilia battente bianca
  - { name: "b_bianca", type: "sphere", center: [0, 0.868, -0.35], radius: 0.028, material: "bilia_bianca" }

  # Fila 1 (1 bilia)
  - { name: "b1", type: "sphere", center: [0, 0.868, 0.15], radius: 0.028, material: "bilia_gialla" }
  # Fila 2
  - { name: "b2", type: "sphere", center: [-0.03, 0.868, 0.21], radius: 0.028, material: "bilia_blu" }
  - { name: "b3", type: "sphere", center: [0.03, 0.868, 0.21], radius: 0.028, material: "bilia_rossa" }
  # Fila 3
  - { name: "b4", type: "sphere", center: [-0.06, 0.868, 0.27], radius: 0.028, material: "bilia_viola" }
  - { name: "b5", type: "sphere", center: [0, 0.868, 0.27], radius: 0.028, material: "bilia_nera" }
  - { name: "b6", type: "sphere", center: [0.06, 0.868, 0.27], radius: 0.028, material: "bilia_arancio" }
  # Fila 4
  - { name: "b7", type: "sphere", center: [-0.09, 0.868, 0.33], radius: 0.028, material: "bilia_verde" }
  - { name: "b8", type: "sphere", center: [-0.03, 0.868, 0.33], radius: 0.028, material: "bilia_marrone" }
  - { name: "b9", type: "sphere", center: [0.03, 0.868, 0.33], radius: 0.028, material: "bilia_gialla" }
  - { name: "b10", type: "sphere", center: [0.09, 0.868, 0.33], radius: 0.028, material: "bilia_blu" }

  # ── LAMPADA A SOSPENSIONE ──────────────────────────────────────────────────
  # Paralume (cono rovesciato)
  - name: "paralume"
    type: "cone"
    center: [0, 2.0, 0]
    radius: 0.60
    top_radius: 0.20
    height: 0.25
    material: "paralume"

  # Catena
  - name: "catena"
    type: "cylinder"
    center: [0, 2.25, 0]
    radius: 0.01
    height: 1.0
    material: "catena_ottone"

  # ── STECCA appoggiata al bordo ─────────────────────────────────────────────
  - name: "stecca"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 0.012
    height: 1.5
    rotate: [8, 15, 75]
    translate: [-1.4, 0.60, -0.2]
    material: "stecca"

