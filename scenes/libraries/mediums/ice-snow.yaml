# ─────────────────────────────────────────────────────────────────────────────
# Libreria Medium — Ghiaccio e Neve
# 3D-Ray · scenes/libraries/mediums/ice-snow.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# Materiali criosferici: neve, ghiaccio, grandine, brina e fenomeni misti.
# Scala: 1 world-unit ≈ 5–20 cm (oggetti SSS / dettaglio criosfera).
#
# Fisica:
#   NEVE  — alta densità di bordi cristallini → σ_s molto alto (12–14 /wu),
#           σ_a quasi zero. Phase HG con g=0.82–0.90 (forward scattering
#           dominante per cristalli di ghiaccio, Bohren & Barkstrom 1974).
#           Risultato: bianco diffuso quasi perfetto (albedo 0.90–0.98).
#
#   GHIACCIO — σ_s basso (cristallo compatto, pochi bordi di grano).
#              σ_a selettivo: il ghiaccio assorbe il rosso più del blu
#              (banda di assorbimento dell'acqua liquida/solida a 600–750 nm).
#              Risultato: trasmissione blu nel ghiaccio glaciale profondo.
#              Dati: Warren & Brandt 2008 "Optical constants of ice from UV to MW".
#
#   GHIACCIAIO — Pressione elimina bolle d'aria → σ_s bassissimo, colore blu
#               intenso (assorbimento selettivo del rosso amplificato dalla
#               lunghissima free path).
#
# Canali RGB ≈ 700 nm (R), 550 nm (G), 450 nm (B).
# sigma_a: assorbimento per world-unit  [R, G, B]
# sigma_s: scattering per world-unit    [R, G, B]
#
# Importa con:
#   imports: [{ path: "libraries/mediums/ice-snow.yaml" }]
#
# ─────────────────────────────────────────────────────────────────────────────

mediums:

  # ── Neve ───────────────────────────────────────────────────────────────────

  - id: "med_neve_fresca"
    # Neve fresca caduta (dendritici, colonne, aghi): cristalli grandi,
    # superficie riflettente massima. Fonte: Bohren & Barkstrom 1974.
    # σ_s altissimo uniforme (bianco perfetto), σ_a quasi zero eccetto
    # lieve eccesso nel blu (acqua assorbe leggermente il rosso).
    # Effetto: bianco brillante accecante, SSS quasi impercettibile.
    type: homogeneous
    sigma_a: [0.001, 0.001, 0.002]
    sigma_s: [12.000, 13.000, 14.000]
    phase:   hg
    g:       0.87

  - id: "med_neve_compatta"
    # Neve compattata dal calpestio o dal vento: cristalli frammentati,
    # superficie ridotta ma ancora molto riflettente.
    # σ_s ridotto rispetto alla fresca, σ_a leggermente più alto.
    # Effetto: manto compatto, meno brillante, cammini e piste.
    type: homogeneous
    sigma_a: [0.002, 0.002, 0.004]
    sigma_s: [8.000, 8.500, 9.500]
    phase:   hg
    g:       0.82

  - id: "med_neve_bagnata"
    # Neve primaverile / bagnata: acqua liquida riempie gli spazi tra cristalli.
    # L'acqua riduce il contrasto degli indici → σ_s cala significativamente.
    # σ_a cresce (acqua liquida assorbe più del ghiaccio nel rosso).
    # Effetto: manto grigiastro e pesante, bolide da valanga.
    type: homogeneous
    sigma_a: [0.005, 0.005, 0.008]
    sigma_s: [5.500, 6.000, 6.500]
    phase:   hg
    g:       0.78

  - id: "med_neve_vecchia"
    # Neve invecchiata (metamorfismo della neve): cristalli arrotondati,
    # parzialmente sciolta e rigelata. Grigia, con σ_s ridotto e σ_a aumentato.
    # Effetto: manto tardo-invernale, grigio opaco con rilievo modesto.
    type: homogeneous
    sigma_a: [0.008, 0.009, 0.012]
    sigma_s: [4.500, 4.800, 5.200]
    phase:   hg
    g:       0.75

  - id: "med_neve_sporca"
    # Neve sporca / urbana: particolato (fuliggine, sabbia, pneumatici).
    # σ_a su tutti i canali sensibilmente aumentato → grigio-marrone.
    # Effetto: marciapiedi invernali, neve accumulata ai bordi strada.
    type: homogeneous
    sigma_a: [0.045, 0.055, 0.072]
    sigma_s: [3.200, 3.400, 3.600]
    phase:   hg
    g:       0.72

  - id: "med_neve_polverosa_sci"
    # Powder snow (polvere da sci): neve secca leggerissima, cristalli
    # ancora intatti, densità 50–100 kg/m³. Massimo σ_s per area superficiale
    # cristallina, quasi pura. Ideale per slope di alta quota.
    # Effetto: sci nella powder, bianco abbagliante e soffice.
    type: homogeneous
    sigma_a: [0.001, 0.001, 0.001]
    sigma_s: [14.500, 15.500, 17.000]
    phase:   hg
    g:       0.88

  - id: "med_neve_crosta"
    # Crosta superficiale (wind crust / sun crust): strato duro rigelato.
    # σ_s medio-alto (ancora neve ma con struttura più compatta della
    # neve compattata), σ_a basso.
    # Effetto: superficie dura e riflettente, suono crocchiante.
    type: homogeneous
    sigma_a: [0.003, 0.003, 0.005]
    sigma_s: [6.800, 7.200, 8.000]
    phase:   hg
    g:       0.80

  # ── Ghiaccio ───────────────────────────────────────────────────────────────

  - id: "med_ghiaccio_chiaro"
    # Ghiaccio trasparente comune (pozzanghere, vetrine ghiacciate, cubetti).
    # σ_s basso (pochi bordi di grano), σ_a selettivo: il ghiaccio assorbe
    # il rosso più del blu. Fonte: Warren & Brandt 2008.
    # Effetto: trasparente con tono leggermente azzurrino.
    type: homogeneous
    sigma_a: [0.008, 0.006, 0.005]
    sigma_s: [0.600, 0.700, 0.800]
    phase:   hg
    g:       0.90

  - id: "med_ghiaccio_blu_glaciale"
    # Ghiaccio di ghiacciaio profondo (blue ice): pressione secolare elimina
    # le bolle d'aria → σ_s molto basso. L'assorbimento selettivo del rosso
    # (Warren 2008) diventa dominante → blu intenso e saturo.
    # Effetto: cuore di ghiacciaio, crepacci interni, seracchi.
    type: homogeneous
    sigma_a: [0.180, 0.040, 0.010]
    sigma_s: [0.300, 0.550, 0.800]
    phase:   hg
    g:       0.92

  - id: "med_ghiaccio_verde_acqua"
    # Ghiaccio con acqua intrappolata o alghe glaciali: tono verde-acqua.
    # σ_a blu ridotto rispetto al blu glaciale, verde aumentato
    # (alghe cyanobatteri o acqua di fusione ricca di DOC).
    # Effetto: ghiaccio tropicale o laghetti glaciali, tono turchese.
    type: homogeneous
    sigma_a: [0.120, 0.018, 0.032]
    sigma_s: [0.350, 0.620, 0.750]
    phase:   hg
    g:       0.90

  - id: "med_ghiaccio_opaco"
    # Ghiaccio con bolle d'aria intrappolate (ghiaccio "milk ice").
    # Bolle diffondono la luce → σ_s alto come neve compatta.
    # Effetto: ghiaccio bianco-latte, tipico del freezer domestico.
    type: homogeneous
    sigma_a: [0.004, 0.004, 0.006]
    sigma_s: [7.500, 8.000, 9.000]
    phase:   hg
    g:       0.85

  - id: "med_ghiaccio_sporco"
    # Ghiaccio con detrito (sabbia, roccia, terriccio): zone basali
    # di ghiacciaio o ghiaccio di spiaggia. σ_a aumentato su tutti i
    # canali (carbonaceo + minerali). σ_s ridotto rispetto al chiaro.
    # Effetto: grigio-brunastro semitrasparente, moraine glaciale.
    type: homogeneous
    sigma_a: [0.055, 0.075, 0.095]
    sigma_s: [0.280, 0.320, 0.380]
    phase:   hg
    g:       0.82

  - id: "med_ghiaccio_artico"
    # Ghiaccio artico purissimo (pack millenni): pochissime impurità,
    # zero bolle a questa profondità. σ_s bassissimo, σ_a molto selettivo.
    # Corrisponde alle misure di laboratorio su ghiaccio ultra-puro.
    # Effetto: praticamente vetro blu pallido, traslucenza estrema.
    type: homogeneous
    sigma_a: [0.005, 0.003, 0.001]
    sigma_s: [0.200, 0.300, 0.450]
    phase:   hg
    g:       0.92

  - id: "med_ghiaccio_pressione"
    # Ghiaccio glaciale compresso (fase polimorfismo + pressione > 300 atm):
    # blu intensissimo, σ_s quasi zero (cristallo denso perfetto).
    # Usato per fondali di iceberg o sezioni di calotta polare.
    # Effetto: blu cobalto profondo, quasi opaco per assorbimento rosso.
    type: homogeneous
    sigma_a: [0.380, 0.055, 0.008]
    sigma_s: [0.120, 0.250, 0.420]
    phase:   hg
    g:       0.93

  # ── Grandine e fenomeni misti ──────────────────────────────────────────────

  - id: "med_brina"
    # Brina (hoar frost): cristalli di ghiaccio dendritici su superfici
    # fredde, struttura simile alla neve fresca ma più fine.
    # σ_s alto (superficie cristallina elevata), σ_a basso.
    # Effetto: superficie bianco-ghiaccio opalescente, foglie gelate.
    type: homogeneous
    sigma_a: [0.003, 0.003, 0.005]
    sigma_s: [4.000, 4.500, 5.000]
    phase:   hg
    g:       0.83

  - id: "med_nevischio"
    # Nevischio (sleet / freezing rain): mix neve bagnata e pioggia gelata.
    # Intermedio tra neve bagnata e acqua liquida: σ_s ridotto (acqua
    # liquida riduce la diffusione), σ_a più alto della neve bagnata.
    # Effetto: grigio opaco traslucente, aspetto vetro smerigliato sporco.
    type: homogeneous
    sigma_a: [0.012, 0.013, 0.016]
    sigma_s: [2.800, 3.000, 3.200]
    phase:   hg
    g:       0.72

  - id: "med_vetro_ghiacciato"
    # Frost su vetro (frozen condensation): cristalli 2D su superficie,
    # simulati come volume sottile. σ_s moderato (cristalli fini),
    # σ_a basso → aspetto latte bluastro.
    # Effetto: finestrino d'auto gelato, vetro di cantina invernale.
    type: homogeneous
    sigma_a: [0.006, 0.005, 0.004]
    sigma_s: [2.200, 2.500, 2.800]
    phase:   hg
    g:       0.80
