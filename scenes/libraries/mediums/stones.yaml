# ═══════════════════════════════════════════════════════════════════════════
#  3D-Ray Medium Library — STONES
# ───────────────────────────────────────────────────────────────────────────
#  File:     mediums/stones.yaml
#  Entries:  29
#  Updated:  2026-05
# ───────────────────────────────────────────────────────────────────────────
#  Contenuto: marmi bianchi (Carrara, Statuario, Calacatta, Thassos),
#             marmi colorati (Rosso Verona, Rosa Portogallo, Giallo Siena,
#             Verde Guatemala, Blu Sodalite, Nero Marquinia, Port Laurent),
#             alabastro e onice (bianchi, rosa, miele, verde, nero),
#             pietre preziose e semiprezioso (giada, quarzo, ametista,
#             citrino, opale, calcedonio),
#             travertino e pietre calcaree (travertino, pietra leccese,
#             alabastro egiziano).
# ═══════════════════════════════════════════════════════════════════════════
#
# Importa con:  imports: [{ path: "libraries/mediums/stones.yaml" }]
#
# ── Scala ───────────────────────────────────────────────────────────────────
#   1 world-unit ≈ 10-30 cm nelle scene tipiche 3D-Ray.
#   σ_a e σ_s sono in unità per world-unit.
#   Valori calibrati: marmo Carrara da Jensen et al. 2001 come riferimento
#   primario; altri marmi scalati coerentemente per la stessa scala.
#
# ── Fonti ────────────────────────────────────────────────────────────────────
#   Jensen, H.W. et al. (2001) "A Practical Model for Subsurface Light Transport",
#     SIGGRAPH 2001. [J01]
#   Narasimhan, S.G. et al. (2006) "Acquiring Scattering Properties of
#     Participating Media by Dilution", SIGGRAPH 2006. [N06]
#   Frisvad, J.R. et al. (2007) "Computing the Scattering Properties of
#     Participating Media using Lorenz-Mie Theory". [FM07]
#
# ── Convenzione colore ─────────────────────────────────────────────────────
#   Canali [R, G, B] corrispondono a ~700 nm, ~550 nm, ~450 nm.
#   Alto σ_a su un canale = quel colore viene assorbito (non percepito).
#   Alto σ_s + basso σ_a = materiale bianco/lattiginoso/traslucente.
#
# ── Phase function ───────────────────────────────────────────────────────────
#   Pietre: isotropic o hg g≈0.0 (scattering quasi-isotropico in cristalli
#   calcitici). Pietre gessose (alabastro) g≈0.1 per leggera forward-scatter.
#
# ─────────────────────────────────────────────────────────────────────────────

mediums:

  # ── Marmi bianchi ──────────────────────────────────────────────────────────

  - id: "med_marmo_carrara"
    # Marmo bianco di Carrara — SSS lattiginoso caldo, venature grigie.
    # Il riferimento classico della letteratura. Il percepito è bianco caldo
    # con sottofondo leggermente azzurrato grazie al basso σ_a nel blu.
    # Fonte: Jensen et al. 2001 [J01], valori reduced: σ_s=[2.19,2.62,3.00].
    type: homogeneous
    sigma_a: [0.0021, 0.0041, 0.0071]
    sigma_s: [2.19,   2.62,   3.00  ]
    phase:   isotropic

  - id: "med_marmo_statuario"
    # Marmo Statuario di Carrara — bianco ancora più puro del Carrara classico,
    # usato per sculture sin dall'antichità. Praticamente zero assorbimento,
    # σ_s leggermente più alto (cristalli calcitici più grossolani e puri).
    # Percepito: bianco luminoso con glow diffuso; venature minime.
    # Fonte: variazione calibrata da [J01], ridotto σ_a del 30%.
    type: homogeneous
    sigma_a: [0.0014, 0.0028, 0.0050]
    sigma_s: [2.30,   2.75,   3.15  ]
    phase:   isotropic

  - id: "med_marmo_calacatta"
    # Marmo Calacatta — bianco avorio caldo, più "pesante" del Carrara.
    # Cristalli fini, grana calcarea più compatta; leggero ingiallimento
    # da impurità organiche (σ_a blu più alto, σ_a rosso quasi zero).
    # Percepito: bianco caldo panna con venature grigie/dorate.
    # Fonte: calibrazione da [J01] con correzione colorimetrica empirica.
    type: homogeneous
    sigma_a: [0.0018, 0.0038, 0.0110]
    sigma_s: [2.05,   2.50,   2.88  ]
    phase:   isotropic

  - id: "med_marmo_thassos"
    # Marmo Thassos (Grecia) — bianco brillante, quasi puro CaCO₃,
    # considerato il marmo più bianco al mondo. σ_a vicinissimo a zero
    # su tutti i canali; σ_s massimo tra i marmi bianchi.
    # Percepito: bianco ottico accecante con SSS quasi uniforme.
    # Fonte: stimato da dati mineralogici (purezza CaCO₃ >99%).
    type: homogeneous
    sigma_a: [0.0008, 0.0015, 0.0025]
    sigma_s: [2.45,   2.90,   3.30  ]
    phase:   isotropic

  # ── Marmi colorati ─────────────────────────────────────────────────────────

  - id: "med_marmo_rosso_verona"
    # Marmo Rosso di Verona — rosso intenso con venature bianche.
    # Colore dovuto a ossidi di ferro (ematite): alto σ_a verde+blu,
    # basso σ_a rosso. σ_s moderato (pietra compatta, poco SSS).
    # Percepito: rosso mattone caldo, leggera translucenza nelle venature bianche.
    # Fonte: stima da dati mineralogici + calibrazione empirica.
    type: homogeneous
    sigma_a: [0.12,  1.85,  2.40]
    sigma_s: [0.55,  0.45,  0.38]
    phase:   hg
    g:       0.0

  - id: "med_marmo_rosa_portogallo"
    # Marmo Rosa Portogallo (Estremoz) — rosa tenue uniforme.
    # Assorbimento leggero e selettivo: più σ_a su blu e verde che sul rosso,
    # ma valori assoluti bassi per mantenere la traslucenza.
    # Percepito: rosa cipria con sottofondo lattiginoso.
    # Fonte: calibrazione empirica da campioni mineralogici.
    type: homogeneous
    sigma_a: [0.0080, 0.030, 0.085]
    sigma_s: [1.60,   1.85,  2.10 ]
    phase:   isotropic

  - id: "med_marmo_giallo_siena"
    # Marmo Giallo di Siena — giallo caldo/ambrato, venature aranciate.
    # Ossidi di ferro limonitici: alto σ_a blu, medio σ_a verde, quasi zero sul rosso.
    # Percepito: giallo oro caldo, buona traslucenza sulle sezioni sottili.
    # Fonte: stima da analisi colorimetrica del materiale (CIE Lab dati pubblici).
    type: homogeneous
    sigma_a: [0.015, 0.180, 1.60]
    sigma_s: [1.20,  1.40,  1.55]
    phase:   hg
    g:       0.0

  - id: "med_marmo_verde_guatemala"
    # Marmo Verde Guatemala — verde intenso quasi smeraldo.
    # Ricco di silicati e clorite: alto σ_a rosso+blu, basso σ_a verde.
    # σ_s moderato (struttura cristallina compatta).
    # Percepito: verde bosco profondo con SSS modesto ma caratteristico.
    # Fonte: calibrazione empirica su dati colorimetrici campioni lucidati.
    type: homogeneous
    sigma_a: [1.40,  0.18,  1.10]
    sigma_s: [0.65,  0.80,  0.60]
    phase:   hg
    g:       0.0

  - id: "med_marmo_blu_sodalite"
    # Marmo Blu Sodalite (sodalite massiccia) — blu profondo reale.
    # Minerale sodalitico: alto σ_a rosso+verde, basso σ_a blu.
    # σ_s basso (pietra compatta, quasi opaca); percepito: blu notte con
    # flebile luminescenza interna su campioni sottili.
    # Fonte: dati ottici sodalite (Nassau, 1978).
    type: homogeneous
    sigma_a: [2.10,  1.75,  0.15]
    sigma_s: [0.40,  0.35,  0.55]
    phase:   hg
    g:       0.0

  - id: "med_marmo_nero_marquinia"
    # Marmo Nero Marquinia (Spagna) — nero profondo con venature bianche.
    # Alto σ_a su tutti i canali (carbonio organico e bitume); σ_s molto basso.
    # Percepito: nero lucido quasi opaco; le venature bianche calcitiche
    # mostrano SSS significativo in contrasto.
    # Fonte: stima da letteratura su calcari bituminosi.
    type: homogeneous
    sigma_a: [3.20,  3.50,  3.80]
    sigma_s: [0.12,  0.10,  0.09]
    phase:   hg
    g:       0.0

  - id: "med_marmo_port_laurent"
    # Marmo Port Laurent (Francia) — bordeaux/rosso scuro con venature dorate.
    # Pigmentazione da ematite + materia organica: σ_a molto alto verde+blu,
    # alto anche sul rosso (non è un rosso vivace ma bordeaux cupo).
    # Percepito: viola-rosso molto scuro, quasi opaco.
    # Fonte: calibrazione empirica da referenze fotografiche e colorimetria.
    type: homogeneous
    sigma_a: [1.20,  2.80,  3.20]
    sigma_s: [0.30,  0.22,  0.18]
    phase:   hg
    g:       0.0

  # ── Alabastro e onice ──────────────────────────────────────────────────────
  #   Entrambi sono varietà di CaSO₄ (alabastro gessoso) o CaCO₃ (alabastro
  #   calcite/onice). La traslucenza è notevolmente superiore al marmo:
  #   σ_s alto, σ_a molto basso. Phase hg g≈0.10 per forward-scatter lieve.

  - id: "med_alabastro_bianco"
    # Alabastro bianco gessoso — traslucenza massima tra le pietre naturali.
    # CaSO₄·2H₂O quasi puro: σ_a praticamente zero, σ_s molto alto.
    # Percepito: bianco diffuso luminosissimo, come retroilluminato.
    # Utile per lampade, vasi, sculture alabastrine a luce trasmessa.
    # Fonte: Tuchin (2007) optical properties gypsum, stimato da dati IR.
    type: homogeneous
    sigma_a: [0.0010, 0.0018, 0.0030]
    sigma_s: [3.50,   3.80,   4.10  ]
    phase:   hg
    g:       0.10

  - id: "med_alabastro_rosa"
    # Alabastro rosa (Volterra, Italia) — rosa tenue traslucido.
    # Impurità ossidiche rosate in matrice gessosa pura.
    # Percepito: rosa cipria luminoso con blush calda nella luce trasmessa.
    # Fonte: variazione calibrata da med_alabastro_bianco.
    type: homogeneous
    sigma_a: [0.0020, 0.0080, 0.0220]
    sigma_s: [3.20,   3.50,   3.75  ]
    phase:   hg
    g:       0.10

  - id: "med_onice_miele"
    # Onice miele (Pakistan/Messico) — ambrato dorato traslucido,
    # con bande parallele di colore variabile. Calcite a fibra fine.
    # Alto σ_a blu, medio σ_a verde, quasi zero rosso.
    # Percepito: arancio-dorato caldo retroilluminato, molto decorativo.
    # Fonte: calibrazione empirica su campioni retroilluminati.
    type: homogeneous
    sigma_a: [0.015, 0.120, 1.20]
    sigma_s: [2.80,  3.10,  3.40]
    phase:   hg
    g:       0.10

  - id: "med_onice_verde"
    # Onice verde menta (Pakistan) — verde chiaro traslucido.
    # Stessa struttura calcite banded, impurità clorite/serpentino.
    # Percepito: verde pastello luminoso, ottimo per retroilluminazione.
    # Fonte: calibrazione empirica da campioni retroilluminati.
    type: homogeneous
    sigma_a: [0.50,  0.060, 0.45]
    sigma_s: [2.60,  2.90,  2.65]
    phase:   hg
    g:       0.10

  - id: "med_onice_nero"
    # Onice nero (calcite nera con carbonio) — scuro, poca traslucenza.
    # σ_a alto su tutti i canali ma σ_s ancora sufficiente per un accenno
    # di SSS sugli spigoli. Percepito: nero caldo, meno freddo del Marquinia.
    # Fonte: stima da dati ottici calcite carbonatica.
    type: homogeneous
    sigma_a: [2.40,  2.70,  3.00]
    sigma_s: [0.65,  0.55,  0.48]
    phase:   hg
    g:       0.05

  # ── Pietre preziose e semipreziose ─────────────────────────────────────────
  #   Alta traslucenza, σ_s moderato (cristalli più puri e compatti del
  #   marmo). Phase hg g≈0.05-0.15 per leggera forward-scatter cristallina.

  - id: "med_giada_verde"
    # Giada verde (nefrite/giadeite) — verde intenso da silicati Cr/Fe.
    # Alto σ_a rosso+blu; basso σ_a verde; σ_s moderato (struttura fibrosa
    # nefrite o microcristas giadeite). Percepito: verde foglia profondo,
    # SSS visibile sulle lastre sottili come un interno luminescente.
    # Fonte: dati ottici nefrite, Liu & Yui (2004).
    type: homogeneous
    sigma_a: [1.10,  0.085, 0.90]
    sigma_s: [1.80,  2.00,  1.75]
    phase:   hg
    g:       0.05

  - id: "med_giada_bianca"
    # Giada bianca (nefrite bianca, "mutton fat jade") — lattiginosa.
    # Struttura fibrosa di tremolite: σ_s alto uniforme, σ_a basso.
    # Percepito: bianco grasso lattiginoso, senza il glow puro dell'alabastro.
    # Fonte: stima da proprietà ottiche tremolite (fibrosa).
    type: homogeneous
    sigma_a: [0.0090, 0.0120, 0.0180]
    sigma_s: [2.20,   2.40,   2.60  ]
    phase:   hg
    g:       0.08

  - id: "med_quarzo_rosa"
    # Quarzo rosa — rosa tenue da inclusioni di rutilo/titanio.
    # SiO₂ quasi puro con impurità minime; σ_s inferiore al marmo
    # (struttura cristallina monocristallina, meno scattering interno).
    # Percepito: rosa chiarissimo traslucido, quasi come vetro colorato.
    # Fonte: stima da dati ottici SiO₂ + correzione cromatica.
    type: homogeneous
    sigma_a: [0.0060, 0.0220, 0.0680]
    sigma_s: [0.85,   0.95,   1.05  ]
    phase:   hg
    g:       0.05

  - id: "med_quarzo_fume"
    # Quarzo fumé (morione) — marrone fumoso da irradiazione naturale Al³⁺.
    # σ_a moderato su tutti i canali con leggero eccesso sul blu; σ_s basso.
    # Percepito: marrone grigio-fumoso semitrasparente.
    # Fonte: stima da letteratura su centri di colore nel quarzo.
    type: homogeneous
    sigma_a: [0.35,  0.42,  0.60]
    sigma_s: [0.55,  0.60,  0.65]
    phase:   hg
    g:       0.05

  - id: "med_ametista"
    # Ametista — viola da Fe³⁺ in sostituzione Si nel reticolo SiO₂.
    # Alto σ_a verde (elimina il complementare del viola); σ_a moderato
    # su rosso+blu (lascia passare entrambi per costruire il viola).
    # Percepito: viola/lavanda semitrasparente, intensità variabile.
    # Fonte: Nassau (2001) "Physics and Chemistry of Color", stimato.
    type: homogeneous
    sigma_a: [0.28,  1.20,  0.18]
    sigma_s: [0.70,  0.80,  0.90]
    phase:   hg
    g:       0.05

  - id: "med_citrino"
    # Citrino — giallo dorato da Fe³⁺ (spesso ametista riscaldata).
    # Alto σ_a blu; medio σ_a verde; quasi zero σ_a rosso.
    # Percepito: giallo oro caldo traslucido.
    # Fonte: Nassau (2001), correlato all'ametista con shift termico.
    type: homogeneous
    sigma_a: [0.010, 0.140, 1.40]
    sigma_s: [0.65,  0.72,  0.80]
    phase:   hg
    g:       0.05

  - id: "med_opale_bianco"
    # Opale bianco prezioso — lattiginoso con σ_s molto alto
    # (struttura a sfere SiO₂ diffondenti, iridescenza da interferenza).
    # Il medium modella solo il bulk lattiginoso; l'iridescenza è una
    # proprietà di superficie (thin_film nel material Disney).
    # Percepito: bianco lattiginoso vivace, quasi come latte diluito.
    # Fonte: stima da dati ottici opale commons (Gauthier et al. 1978).
    type: homogeneous
    sigma_a: [0.0025, 0.0030, 0.0045]
    sigma_s: [4.20,   4.50,   4.80  ]
    phase:   hg
    g:       0.08

  - id: "med_calcedonio"
    # Calcedonio celeste (aqua chalcedony) — azzurro lattiginoso.
    # Microfibre di quarzo + inclusioni acquose: alto σ_s, basso σ_a.
    # Lieve eccesso σ_a rosso per costruire il tono azzurrato.
    # Percepito: azzurro cielo lattiginoso, simile a un vetro smerigliato blu.
    # Fonte: calibrazione empirica da campioni calcedonio azzurro.
    type: homogeneous
    sigma_a: [0.080, 0.020, 0.008]
    sigma_s: [2.10,  2.30,  2.55 ]
    phase:   hg
    g:       0.08

  # ── Travertino e pietre calcaree ───────────────────────────────────────────
  #   Pietra calcarea porosa/semicompatta. σ_s moderato, σ_a beige/ocra.
  #   Phase isotropic (struttura granulare calcarea).

  - id: "med_travertino"
    # Travertino romano — beige/crema caldo, struttura laminata porosa.
    # σ_s moderato (calcite microcristallina), leggero σ_a blu (tono caldo).
    # Percepito: crema avorio con SSS diffuso sui bordi. Usare con
    # roughness alta per la superficie porosa.
    # Fonte: stima da CaCO₃ microcristallino con impurità Fe.
    type: homogeneous
    sigma_a: [0.0040, 0.0080, 0.0280]
    sigma_s: [1.40,   1.55,   1.70  ]
    phase:   isotropic

  - id: "med_pietra_leccese"
    # Pietra leccese (calcarenite Lecce, Puglia) — giallo chiaro tenero.
    # Calcariite a grana fine con foraminiferi; porosità alta, SSS diffuso.
    # Percepito: giallo paglierino chiarissimo, quasi bianco in luce diretta.
    # Fonte: stima da analisi petrografica calcareniti Lecce.
    type: homogeneous
    sigma_a: [0.0030, 0.0065, 0.0200]
    sigma_s: [1.20,   1.35,   1.50  ]
    phase:   isotropic

  - id: "med_alabastro_egiziano"
    # Alabastro egiziano (calcite banded, travertino onicitico) —
    # ocra chiaro/miele tenue, usato per vasi canopi e sculture.
    # Calcite travertinosa con impurità limonitiche: medio σ_a blu.
    # Percepito: giallo-ocra traslucido, meno intenso dell'onice miele.
    # Fonte: dati mineralogici alabastro calcite egiziano (Hassan, 1976).
    type: homogeneous
    sigma_a: [0.0060, 0.050, 0.380]
    sigma_s: [2.00,   2.20,  2.40 ]
    phase:   hg
    g:       0.08
