# ============================================================================
# Libreria Materiali — Emissivi e Sorgenti Luminose
# ============================================================================
#
# Importa con:  imports: [{ path: "libraries/emissives.yaml" }]
#
# Raccolta completa di materiali emissivi per illuminazione, insegne,
# schermi e effetti speciali. Ogni materiale emette luce propria e
# partecipa automaticamente alla NEE (Next Event Estimation) quando
# applicato a primitive che implementano ISamplable (sfere, cilindri,
# coni, tori, box, quad, disk, annulus, capsule).
#
# ── Nessuna distinzione dis_/cls_ ───────────────────────────────────────
#
#   Il tipo "emissive" è unico nel motore: non ha varianti Disney né
#   Classic. Un emissivo è definito solo da colore e intensità. Questa
#   libreria usa quindi nomi diretti senza prefisso.
#
# ── Parametri ────────────────────────────────────────────────────────────
#
#   color      Colore della luce emessa in RGB lineare [0–1].
#              Moltiplicato per intensity per ottenere la radianza.
#
#   intensity  Moltiplicatore di luminosità. Valori tipici:
#                1–5    Bagliore tenue (braci, indicatori)
#                5–15   Illuminazione ambientale (lampade, neon)
#                15–40  Illuminazione principale (faretti, pannelli)
#                40–100 Sorgenti intense (sole, flash, esplosioni)
#
# ── Note sulla temperatura colore ────────────────────────────────────────
#
#   I colori RGB sono calibrati sulle temperature colore reali:
#
#     1800K  Candela, alba/tramonto     [1.0, 0.45, 0.08]
#     2200K  Incandescente vintage      [1.0, 0.58, 0.18]
#     2700K  Incandescente standard     [1.0, 0.68, 0.34]
#     3000K  Alogena / LED caldo        [1.0, 0.75, 0.45]
#     3500K  LED neutro-caldo           [1.0, 0.82, 0.58]
#     4000K  Fluorescente neutro        [1.0, 0.88, 0.72]
#     5000K  Luce diurna / flash        [1.0, 0.94, 0.88]
#     5500K  Mezzogiorno                [1.0, 0.96, 0.92]
#     6500K  Cielo coperto / daylight   [0.95, 0.96, 1.0]
#     7500K  Cielo azzurro / ombra      [0.88, 0.92, 1.0]
#     10000K Cielo sereno (zenith)      [0.78, 0.85, 1.0]
#
# ── Categorie ────────────────────────────────────────────────────────────
#
#   TEMPERATURA COLORE  Set calibrato sulle temperature Kelvin standard.
#                       Base neutra per illuminazione fotorealistica.
#
#   LED                 LED moderni a diverse temperature: caldo,
#                       neutro, freddo, daylight. I più comuni oggi.
#
#   INCANDESCENZA       Filamento al tungsteno, edison vintage,
#                       alogena. Toni caldi e molto caldi.
#
#   FLUORESCENTE        Tubi neon bianchi, cool white, warm white,
#                       ufficio. Toni leggermente verdastri.
#
#   NEON COLORATI       Insegne luminose: rosso, blu, verde, viola,
#                       rosa, arancione, giallo, ciano, bianco.
#                       Colori saturi, intensità media.
#
#   FIAMMA              Candela, fuoco, torcia, falò.
#                       Toni arancio-rosso molto caldi.
#
#   BRACI E LAVA        Braci ardenti, lava incandescente, ferro
#                       rovente. Emissione rossa/arancione intensa.
#
#   SCHERMI             Monitor, TV, telefono, tablet.
#                       Luce bianco-fredda, intensità bassa.
#
#   INSEGNE E DISPLAY   Lettere luminose, exit sign, indicatori LED,
#                       cruscotto, orologi digitali.
#
#   EFFETTI SPECIALI    Magia, sci-fi, portali, laser, plasma,
#                       radioattivo. Colori fantasiosi.
#
#   BIOLUMINESCENZA     Lucciole, meduse, funghi, plancton.
#                       Toni verdi/blu tenue, intensità bassa.
#
# ============================================================================


