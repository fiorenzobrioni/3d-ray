# ═══════════════════════════════════════════════════════════════════════════
#  Libreria Tipografia — Alfabeto A–Z e Cifre 0–9
# ═══════════════════════════════════════════════════════════════════════════
#
#  36 glifi procedurali in stile geometric sans-serif (famiglia Futura/Avenir).
#  Modellati con triangoli piani e SmoothTriangle (per le curve), estrusi
#  in 3D, esportati come OBJ e avvolti qui in template istanziabili.
#
#  Metriche uniformi per tutti i glifi:
#    • Cap-height: 1.0          (altezza delle maiuscole)
#    • Baseline:   y = 0
#    • Bordo sx:   x = 0
#    • Faccia frontale: z = 0   (estrusione verso −Z)
#    • Profondità: 0.15
#    • Larghezza tratto: 0.15
#    • Advance width: proporzionale per glifo (vedi commento a lato)
#
#  Uso base:
#    imports:
#      - path: "libraries/typography/alphabet.yaml"
#    entities:
#      - { type: "instance", template: "glyph_C", translate: [0.00, 0, 0] }
#      - { type: "instance", template: "glyph_I", translate: [0.90, 0, 0] }
#      - { type: "instance", template: "glyph_A", translate: [1.20, 0, 0] }
#      - { type: "instance", template: "glyph_O", translate: [2.10, 0, 0] }
#
#  Override del materiale per istanza:
#    - { type: "instance", template: "glyph_A", material: "dis_oro_lucido" }
#
#  Rigenerabile con:
#    dotnet run --project src/Tools/TypographyGen
# ═══════════════════════════════════════════════════════════════════════════

materials:
  # Materiale di default usato dai template — neutro, leggermente opaco,
  # adatto a qualsiasi sfondo. Ridefinibile nella scena (local wins).
  - id: "font_primary"
    type: "disney"
    color: [0.92, 0.92, 0.92]
    roughness: 0.35
    specular: 0.45

  # Varianti "pronte" — l'utente può selezionarle nell'istanza con `material:`.
  - id: "font_ink"
    type: "disney"
    color: [0.04, 0.04, 0.04]
    roughness: 0.50
    specular: 0.35

  - id: "font_gold"
    type: "disney"
    color: [1.00, 0.75, 0.30]
    metallic: 1.00
    roughness: 0.15
    specular: 0.80

  - id: "font_copper"
    type: "disney"
    color: [0.95, 0.55, 0.35]
    metallic: 1.00
    roughness: 0.22

  - id: "font_chrome"
    type: "disney"
    color: [0.85, 0.85, 0.87]
    metallic: 1.00
    roughness: 0.08

  - id: "font_neon"
    type: "emissive"
    color: [1.00, 0.35, 0.85]
    intensity: 8.0

# ─── Template dei 36 glifi ────────────────────────────────────────────────
#
# Ogni template è un wrapper minimale attorno alla mesh OBJ del glifo. Il
# `name` segue la convenzione `glyph_<char>`. L'`advance` annotato come
# commento indica la larghezza orizzontale da utilizzare per l'avanzamento
# tra glifi consecutivi quando si compongono parole.

templates:

  # ═══ Lettere A–M ═══
  - name: "glyph_A"       # advance: 0.85
    children:
      - type: "mesh"
        path: "glyphs/A.obj"
        material: "font_primary"

  - name: "glyph_B"       # advance: 0.65
    children:
      - type: "mesh"
        path: "glyphs/B.obj"
