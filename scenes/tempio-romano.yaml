# ═══════════════════════════════════════════════════════════════════════════
#  Tempio Romano — Architettura classica procedurale
#
#  Modello architettonico di un tempio romano in stile periptero: colonne
#  ioniche a scanalature (Catmull-Rom extrusion + taper 0.85), architrave,
#  fregio in oro, frontoni triangolari, tetto a doppio spiovente in tegole
#  terracotta, cella con portale e due bracieri fiammanti all'ingresso.
#
#  Generato tramite il generatore C# .NET 10 TempleGen; ogni parametro
#  dimensionale è derivato dal numero di colonne (6 × 13 peristilio).
#
#  Suggerimenti di rendering:
#    Preview:  -w 640  -H 360  -s 64   -d 4  -S 1
#    Standard: -w 1280 -H 720  -s 256  -d 6  -S 4
#    Finale:   -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  WORLD — Tramonto estivo mediterraneo con cielo dorato
# ═══════════════════════════════════════════════════════════════════════════
world:
  sky:
    type: "gradient"
    zenith_color: [0.15, 0.25, 0.60]
    horizon_color: [0.85, 0.45, 0.20]
    ground_color: [0.20, 0.15, 0.12]
    sun:
      direction: [-0.8, -0.4, 0.5]
      color: [1.0, 0.85, 0.70]
      intensity: 8.0
      size: 2.0
      falloff: 32.0
  ground:
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "ground_stone"

# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════
cameras:
  - name: "front_dramatic"
    position: [0, 2.5, -30]
    look_at: [0, 8.4, 0]
    fov: 55
    aperture: 0.05
    focal_dist: 28
  - name: "side_perspective"
    position: [-30, 12, -31]
    look_at: [0, 5.5, -5]
    fov: 44
    aperture: 0.02
    focal_dist: 40
  - name: "interior"
    position: [0, 4, -8]
    look_at: [0, 4, 10]
    fov: 60
    aperture: 0.0
    focal_dist: 10
  - name: "top_isometric"
    position: [-35, 45, -35]
    look_at: [0, 0, 0]
    fov: 35
    aperture: 0.0
    focal_dist: 60

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS — Due bracieri interni + fill ambientale dal gradient sky
# ═══════════════════════════════════════════════════════════════════════════
lights:
  - type: "point"
    position: [-3, 3.5, 2]
    color: [1.0, 0.5, 0.1]
    intensity: 15.0
    soft_radius: 0.2
  - type: "point"
    position: [3, 3.5, 2]
    color: [1.0, 0.5, 0.1]
    intensity: 15.0
    soft_radius: 0.2

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:
  - id: "white_marble"
    type: "disney"
    color: [0.9, 0.88, 0.85]
    roughness: 0.2
  - id: "dark_marble"
    type: "disney"
    color: [0.2, 0.2, 0.22]
    roughness: 0.3
  - id: "gold"
    type: "metal"
    color: [1.0, 0.85, 0.3]
    fuzz: 0.1
  - id: "roof_tiles"
    type: "lambertian"
    color: [0.6, 0.25, 0.15]
  - id: "ground_stone"
    type: "lambertian"
    color: [0.4, 0.38, 0.35]
  - id: "fire"
    type: "emissive"
    color: [1.0, 0.6, 0.1]
    intensity: 8.0

# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — Colonna ionica e braciere
# ═══════════════════════════════════════════════════════════════════════════
templates:
  - name: "roman_column"
    material: "white_marble"
    children:
      - type: "box"
        scale: [2.2, 0.4, 2.2]
        translate: [0, 0.2, 0]
      - type: "cylinder"
        center: [0, 0.4, 0]
        radius: 1.0
        height: 0.3
      - type: "cylinder"
        center: [0, 0.7, 0]
        radius: 0.9
        height: 0.2
      - type: "extrusion"
        profile_type: "catmull_rom"
        height: 7.5
        taper: 0.85
        curve_samples: 24
        translate: [0, 0.9, 0]
        caps: "both"
        profile:
          - [0.800, 0.000]
          - [0.638, 0.127]
          - [0.739, 0.306]
          - [0.540, 0.361]
          - [0.566, 0.566]
          - [0.361, 0.540]
          - [0.306, 0.739]
          - [0.127, 0.638]
          - [0.000, 0.800]
          - [-0.127, 0.638]
          - [-0.306, 0.739]
          - [-0.361, 0.540]
          - [-0.566, 0.566]
          - [-0.540, 0.361]
          - [-0.739, 0.306]
          - [-0.638, 0.127]
          - [-0.800, 0.000]
          - [-0.638, -0.127]
          - [-0.739, -0.306]
          - [-0.540, -0.361]
          - [-0.566, -0.566]
          - [-0.361, -0.540]
          - [-0.306, -0.739]
          - [-0.127, -0.638]
          - [-0.000, -0.800]
          - [0.127, -0.638]
          - [0.306, -0.739]
          - [0.361, -0.540]
          - [0.566, -0.566]
          - [0.540, -0.361]
          - [0.739, -0.306]
          - [0.638, -0.127]
      - type: "cylinder"
        center: [0, 8.4, 0]
        radius: 0.85
        height: 0.3
      - type: "box"
        scale: [2.2, 0.4, 2.2]
        translate: [0, 8.7, 0]
  
  - name: "brazier"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.3
        height: 1.0
        material: "dark_marble"
      - type: "cone"
        center: [0, 1.0, 0]
        radius: 0.1
        top_radius: 0.6
        height: 0.5
        material: "gold"
      - type: "sphere"
        center: [0, 1.7, 0]
        radius: 0.4
        material: "fire"

