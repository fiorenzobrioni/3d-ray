# ═══════════════════════════════════════════════════════════════════════════
#  SCRIVANIA PIXAR — Luce nella Notte
#
#  Una stanza chiusa, notturna. Su una scrivania in noce scuro siedono gli
#  oggetti del quotidiano: monitor, libri, tazza, portamatite, una pianta
#  grassa, un piccolo giocattolo. A illuminare tutto una sola lampada da
#  tavolo stile Luxo Jr (Pixar): cono di luce calda che scende dall'alto,
#  mentre lo schermo del monitor emette un tenue bagliore freddo. Il medium
#  atmosferico rende visibile il cono di luce nell'aria — quella magia silenziosa
#  dei cortometraggi Pixar.
#
#  La lampada è l'unica sorgente dominante. Il medium omogeneo leggero
#  (sigma_s 0.012) converte ogni raggio in una nuvola di luce diffusa.
#  Lo schermo del monitor aggiunge un fill freddo secondario da sinistra,
#  bilanciando il caldo della lampada con un contrasto caldo/freddo tipico
#  dell'illuminazione cinematografica Pixar.
#
#  COMPOSIZIONE: 5 gruppi, 2 CSG, 19 materiali (di cui 11 Disney PBR),
#                3 luci esplicite (area-key, sphere-fill, point-bounce)
#                + 2 emissivi geometrici (bulb + schermo),
#                atmosfera: medium omogeneo sottile.
#
#  Render consigliato:
#    Preview:  -w 400  -H 225  -s 64   -d 12  -S 1
#    Standard: -w 800  -H 450  -s 256  -d 14  -S 2
#    Finale:   -w 1920 -H 1080 -s 1024 -d 16  -S 4
#    (Con volumetria: aggiungere --clamp 30 per smorzare firefly da rim)
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  WORLD
# ═══════════════════════════════════════════════════════════════════════════
world:
  # Buio quasi totale: la lampada Pixar domina. Tocco viola-notte nelle
  # ombre per "aria notturna" senza le ombre diventino puramente nere.
  ambient_light: [0.006, 0.005, 0.012]
  background: [0.0, 0.0, 0.0]

  ground:
    type: "infinite_plane"
    material: "cls_pavimento_legno"
    y: 0.0

  # Medium leggero: aria della notte con umidità. Rende visibile il cono
  # di luce della lampada Luxo Jr — il signature visivo dei corti Pixar.
  # Per render più rapidi (senza questo effetto): commentare medium e
  # abbassare -d a 10 nella riga di comando.
  medium:
    type: "homogeneous"
    sigma_a: [0.001, 0.001, 0.0012]
    sigma_s: [0.012, 0.012, 0.015]
    phase: "hg"
    g: 0.72

  # ── WORLD ALT-1  Senza volumetria (render rapido) ─────────────────────
  # ambient_light: [0.008, 0.007, 0.014]
  # background: [0.0, 0.0, 0.0]
  # (omettere medium: per disabilitare)

  # ── WORLD ALT-2  Luce ambiente più calda (script serale) ──────────────
  # ambient_light: [0.020, 0.015, 0.008]
  # background: [0.0, 0.0, 0.0]

# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════
cameras:

  # ── #0  Principale — tre quarti rialzato (default) ─────────────────────
  #  Angolo di tre quarti leggermente rialzato: mostra la scrivania
  #  per intero con la lampada a destra e il monitor a sinistra.
  #  Il DOF mette a fuoco la superficie del tavolo; gli angoli della
  #  stanza sfumano nel buio.
  - name:       principale
    position:   [-1.2,  1.8, -3.5]
    look_at:    [ 0.1,  0.95,  0.4]
    vup:        [0, 1, 0]
    fov:        44
    aperture:   0.06
    focal_dist: 4.2

  # ── #1  Dettaglio lampada (bokeh forte) ────────────────────────────────
  #  Close-up sulla lampada Luxo Jr: il paralume illuminato, il braccio
  #  articolato. Il desk sfuma in bokeh caldo dietro.
  - name:       dettaglio_lampada
    position:   [1.8,  1.6, -2.2]
    look_at:    [0.72, 1.45,  0.33]
    vup:        [0, 1, 0]
    fov:        30
    aperture:   0.10
    focal_dist: 2.7

  # ── #2  Cinematografica — angolo basso, leggera dutch incline ──────────
  #  Angolo basso: la lampada domina il frame dal basso verso l'alto,
  #  il cono di luce nel medium è drammatico. Lieve inclinazione
  #  vup dona inquietudine cinematografica.
  - name:       cinematografica
    position:   [-2.5,  0.55, -2.8]
    look_at:    [ 0.3,  0.85,  0.3]
    vup:        [0.17, 0.985, 0.0]
    fov:        52
    aperture:   0.04
    focal_dist: 4.2

  # ── #3  Zenitale — pianimetria del tavolo dall'alto ────────────────────
  #  Vista dall'alto quasi verticale: la distribuzione degli oggetti
  #  sul piano del tavolo come una mappa. Il cono di luce della lampada
  #  è chiaramente visible sul tavolo.
  - name:       zenitale
    position:   [0.0, 4.0, 0.40]
    look_at:    [0.0, 0.76, 0.40]
    vup:        [0, 0, 1]
    fov:        42
    aperture:   0.0
    focal_dist: 3.24

  # ── #4  Dettaglio scrivania — oggetti in primo piano ───────────────────
  #  Close-up sugli oggetti del quotidiano: tazza, libri, portamatite.
  #  Il bokeh laterale dissolve la lampada e il monitor in luci sfocate.
  - name:       dettaglio_scrivania
    position:   [-0.5,  1.3, -1.8]
    look_at:    [-0.2,  0.9,  0.35]
    vup:        [0, 1, 0]
    fov:        32
    aperture:   0.08
    focal_dist: 2.2

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════
lights:

  # ── KEY: Area sotto il paralume della lampada Luxo Jr ─────────────────
  #  Luce calda (≈2700K) che scende dalla lampada verso il tavolo.
  #  Area rettangolare 34×34cm centrata sull'apertura del paralume.
  #  Soft shadows con penombra realistica. Intensità alta: è l'unica
  #  sorgente dominante della scena.
  - type: "area"
    corner:  [0.548, 1.325, 0.158]
    u:       [0.344, 0.0,   0.0  ]
    v:       [0.0,   0.0,   0.344]
    color:   [1.0, 0.86, 0.58]
    intensity: 20.0
    shadow_samples: 16

  # ── FILL: Sfera di luce schermo monitor ────────────────────────────────
  #  Bagliore freddo (≈6500K) dallo schermo del monitor. Contrasto
  #  caldo/freddo: sinistra blu, destra arancio della lampada.
  #  Intensità molto bassa: riempimento secondario, non dominante.
  - type: "sphere"
    position: [-0.55, 1.10, 0.54]
    radius:   0.08
    color:    [0.50, 0.65, 1.0]
    intensity: 0.50
    shadow_samples: 8

  # ── BOUNCE: Punto luce soffitto (bounce indiretto simulato) ────────────
  #  Riflesso caldo molto tenue dalla lampada verso il soffitto. Evita
  #  che il soffitto cada in nero totale. Intensità bassissima.
  - type: "point"
    position: [0.5, 3.0, 0.5]
    color:    [1.0, 0.90, 0.75]
    intensity: 0.15

  # ── LIGHTS ALT-1  Solo lampada (più drammatico, più buio) ─────────────
  # - type: "area"
  #   corner:  [0.548, 1.325, 0.158]
  #   u:       [0.344, 0.0,   0.0  ]
  #   v:       [0.0,   0.0,   0.344]
  #   color:   [1.0, 0.88, 0.60]
  #   intensity: 24.0
  #   shadow_samples: 16

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  STANZA — Pavimento, Pareti, Soffitto
  # ─────────────────────────────────────────────────────────────────────────

  # Parquet a doghe: legno chiaro con venatura longitudinale.
  # Lambertian per superfici grandi — nessun overhead Disney.
  - id: "cls_pavimento_legno"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 2.2
      noise_strength: 1.6
      colors: [[0.58, 0.42, 0.26], [0.44, 0.30, 0.17]]
      rotation: [0, 90, 0]
      randomize_offset: true

  # Intonaco crema — pareti interni domestici, tono caldo.
  # noise_strength basso: variazione sottile, non "grotta".
  - id: "cls_parete_crema"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      colors: [[0.88, 0.84, 0.76], [0.84, 0.80, 0.73]]

  # Soffitto bianco caldo — rifrange luce della lampada verso il basso.
  - id: "cls_soffitto"
    type: "lambertian"
    color: [0.90, 0.88, 0.85]

  # Battiscopa scuro — contrasto con il pavimento chiaro.
  - id: "cls_battiscopa"
    type: "lambertian"
    color: [0.24, 0.18, 0.13]

  # ─────────────────────────────────────────────────────────────────────────
  #  SCRIVANIA — Legno, Metallo
  # ─────────────────────────────────────────────────────────────────────────

  # Noce verniciato — piano scrivania lucido, venatura longitudinale.
  # Disney PBR con clearcoat per la finitura a vernice trasparente.
  - id: "dis_legno_scrivania"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 2.5
      colors: [[0.38, 0.22, 0.10], [0.24, 0.13, 0.06]]
      rotation: [0, 90, 0]
    roughness: 0.28
    metallic: 0.0
    specular: 0.50
    clearcoat: 0.35
    clearcoat_gloss: 0.75

  # ─────────────────────────────────────────────────────────────────────────
  #  LAMPADA LUXO JR — Corpo crema, lampadina
  # ─────────────────────────────────────────────────────────────────────────

  # Verde-crema Pixar: il colore icónico della lampada Luxo Jr.
  # Clearcoat leggero (finitura in smalto opaco-satinato).
  - id: "dis_metallo_lampada"
    type: "disney"
    color: [0.86, 0.90, 0.78]
    roughness: 0.22
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.28
    clearcoat_gloss: 0.78

  # Lampadina incandescente — emissivo molto caldo (2700K).
  # Diventa GeometryLight automatico per NEE.
  - id: "mat_emissive_bulb"
    type: "emissive"
    color: [1.0, 0.88, 0.62]
    intensity: 14.0

  # ─────────────────────────────────────────────────────────────────────────
  #  MONITOR — Plastica scura, schermo
  # ─────────────────────────────────────────────────────────────────────────

  # Plastica nera opaca — corpo monitor stile moderno (iMac/thin bezel).
  - id: "dis_plastica_monitor"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.60
    metallic: 0.0
    specular: 0.30
    clearcoat: 0.10
    clearcoat_gloss: 0.50

  # Schermo attivo — bagliore freddo (6500K). GeometryLight per NEE.
  # Intensità bassa: fill secondario, non abbaglia.
  - id: "mat_emissive_schermo"
    type: "emissive"
    color: [0.72, 0.82, 1.0]
    intensity: 1.8

  # ─────────────────────────────────────────────────────────────────────────
  #  OGGETTI SCRIVANIA
  # ─────────────────────────────────────────────────────────────────────────

  # Ceramica bianca — tazza da caffè smaltata.
  # Disney con clearcoat per il lucido della ceramica smaltata.
  - id: "dis_ceramica_tazza"
    type: "disney"
    color: [0.92, 0.90, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.65
    clearcoat: 0.25
    clearcoat_gloss: 0.90

  # Terracotta non smaltata — vaso pianta grezzo, opaco, poroso.
  - id: "dis_terracotta"
    type: "disney"
    color: [0.62, 0.35, 0.20]
    roughness: 0.72
    metallic: 0.0
    specular: 0.20
    sheen: 0.12
    sheen_tint: 0.80

  # Succulenta — verde-grigiastro con rumore per le punte.
  # Lambertian per velocità: è un oggetto secondario piccolo.
  - id: "cls_pianta_verde"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 18.0
      colors: [[0.25, 0.48, 0.22], [0.15, 0.32, 0.14]]

  # Terreno vaso — terra scura umida.
  - id: "cls_terra"
    type: "lambertian"
    color: [0.12, 0.08, 0.05]

  # Copertina libro rosso scuro — rilegatura in similpelle.
  - id: "dis_libro_rosso"
    type: "disney"
    color: [0.48, 0.08, 0.06]
    roughness: 0.68
    metallic: 0.0
    specular: 0.25
    sheen: 0.18
    sheen_tint: 0.70

  # Copertina libro blu navy — cartone rivestito.
  - id: "dis_libro_blu"
    type: "disney"
    color: [0.08, 0.14, 0.48]
    roughness: 0.72
    metallic: 0.0
    specular: 0.22
    sheen: 0.14

  # Copertina libro verde foresta — feltro legato a mano.
  - id: "dis_libro_verde"
    type: "disney"
    color: [0.10, 0.32, 0.16]
    roughness: 0.78
    metallic: 0.0
    specular: 0.18
    sheen: 0.22
    sheen_tint: 0.60

  # Plastica portamatite — piccolo cilindro opaco scuro.
  - id: "dis_plastica_portamatite"
    type: "disney"
    color: [0.08, 0.08, 0.10]
    roughness: 0.65
    metallic: 0.0
    specular: 0.28
    clearcoat: 0.12

  # Legno matita giallo Pixar — giallo cromo acceso.
  - id: "dis_matita_gialla"
    type: "disney"
    color: [0.92, 0.82, 0.08]
    roughness: 0.45
    metallic: 0.0
    specular: 0.30
    clearcoat: 0.15
    clearcoat_gloss: 0.60

  # Punta grafite matita — grigio scuro quasi metallico.
  - id: "cls_grafite"
    type: "lambertian"
    color: [0.18, 0.18, 0.20]

  # Carta blocco note — bianco cartaceo leggermente ingiallito.
  - id: "cls_carta"
    type: "lambertian"
    color: [0.90, 0.88, 0.80]

  # Toy Pixar corpo — giallo brillante plastificato.
  # Disney con clearcoat per plastica dura lucida da giocattolo.
  - id: "dis_toy_corpo"
    type: "disney"
    color: [0.95, 0.75, 0.08]
    roughness: 0.32
    metallic: 0.0
    specular: 0.50
    clearcoat: 0.35
    clearcoat_gloss: 0.80

  # Toy Pixar testa — rosso brillante satinato.
  - id: "dis_toy_testa"
    type: "disney"
    color: [0.90, 0.12, 0.08]
    roughness: 0.38
    metallic: 0.0
    specular: 0.45
    clearcoat: 0.28
    clearcoat_gloss: 0.75

  # Tastiera — plastica grigio chiaro, quasi piatta.
  - id: "cls_tastiera"
    type: "lambertian"
    color: [0.72, 0.70, 0.68]

  # Mouse — plastica grigio scuro.
  - id: "dis_mouse"
    type: "disney"
    color: [0.22, 0.22, 0.24]
    roughness: 0.50
    metallic: 0.0
    specular: 0.35
    clearcoat: 0.15


# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  # ═══════════════════════════════════════════════════════════════════════
  #  STANZA — Pareti, Soffitto, Battiscopa
  #  Room: X[-3.5,3.5], Y[0,3.2], Z[-0.5,1.8]
  #  Camera outside at Z≈-3.5; no front wall needed.
  # ═══════════════════════════════════════════════════════════════════════

  # Parete di fondo (Z=1.8): il muro più lontano dalla camera.
  - name: "parete_fondo"
    type: "quad"
    q: [-3.5, 0.0, 1.8]
    u: [ 7.0, 0.0, 0.0]
    v: [ 0.0, 3.2, 0.0]
    material: "cls_parete_crema"

  # Parete sinistra (X=-3.5): illuminata di riflesso dal monitor.
  - name: "parete_sinistra"
    type: "quad"
    q: [-3.5, 0.0,  1.8]
    u: [ 0.0, 0.0, -6.0]
    v: [ 0.0, 3.2,  0.0]
    material: "cls_parete_crema"

  # Parete destra (X=3.5): prende il caldo della lampada.
  - name: "parete_destra"
    type: "quad"
    q: [3.5, 0.0, -0.5]
    u: [0.0, 0.0,  6.0]
    v: [0.0, 3.2,  0.0]
    material: "cls_parete_crema"

  # Soffitto (Y=3.2): bianco, diffonde luce della lampada verso il basso.
  - name: "soffitto"
    type: "quad"
    q: [-3.5, 3.2, -0.5]
    u: [ 7.0,  0.0,  0.0]
    v: [ 0.0,  0.0,  6.0]
    material: "cls_soffitto"

  # Battiscopa fondo
  - name: "battiscopa_fondo"
    type: "box"
    scale: [7.0, 0.10, 0.04]
    translate: [0.0, 0.05, 1.78]
    material: "cls_battiscopa"

  # Battiscopa sinistro
  - name: "battiscopa_sinistra"
    type: "box"
    scale: [0.04, 0.10, 6.0]
    translate: [-3.48, 0.05, 0.65]
    material: "cls_battiscopa"

  # Battiscopa destro
  - name: "battiscopa_destra"
    type: "box"
    scale: [0.04, 0.10, 6.0]
    translate: [3.48, 0.05, 0.65]
    material: "cls_battiscopa"

  # ═══════════════════════════════════════════════════════════════════════
  #  SCRIVANIA — Piano + 4 gambe + traversa + cassettiera
  #  Piano superiore: Y=0.760. Desk center: X=0, Z=0.40.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "scrivania"
    type: "group"
    material: "dis_legno_scrivania"
    children:

      # Piano del tavolo (5 cm spessore, sup. a Y=0.760)
      - type: "box"
        scale: [1.80, 0.050, 0.80]
        translate: [0.0, 0.735, 0.40]

      # Gamba anteriore sinistra
      - type: "cylinder"
        center: [-0.82, 0.0, 0.07]
        radius: 0.042
        height: 0.710

      # Gamba anteriore destra
      - type: "cylinder"
        center: [0.82, 0.0, 0.07]
        radius: 0.042
        height: 0.710

      # Gamba posteriore sinistra
      - type: "cylinder"
        center: [-0.82, 0.0, 0.73]
        radius: 0.042
        height: 0.710

      # Gamba posteriore destra
      - type: "cylinder"
        center: [0.82, 0.0, 0.73]
        radius: 0.042
        height: 0.710

      # Traversa di rinforzo (centrale, a metà altezza)
      - type: "box"
        scale: [1.62, 0.045, 0.048]
        translate: [0.0, 0.36, 0.40]

  # Cassettiera sotto-scrivania (lato destro): a 3 cassetti.
  # Colore legno leggermente più scuro per variazione.
  - name: "cassettiera"
    type: "box"
    scale: [0.330, 0.550, 0.700]
    translate: [0.74, 0.275, 0.40]
    material: "dis_legno_scrivania"

  # ═══════════════════════════════════════════════════════════════════════
  #  LAMPADA LUXO JR — Stile Pixar
  #
  #  Geometria calcolata per connessioni precise tra componenti:
  #    Base:        [0.72, 0.760, 0.30]  Y_top=0.802 (r=0.135, h=0.042)
  #    Post:        [0.72, 0.802, 0.30]  Y_top=0.907 (h=0.105)
  #    Pivot1:      [0.72, 0.907, 0.300]
  #    Braccio1:    rotate=-28°X, connette 0.907,Z=0.300 → 1.259,Z=0.112
  #    Pivot2:      [0.72, 1.259, 0.112]
  #    Braccio2:    rotate=+35°X, connette 1.259,Z=0.112 → 1.571,Z=0.330
  #    Pivot3:      [0.72, 1.571, 0.330]
  #    Paralume:    center=[0.72,1.360,0.330], h=0.211 → top a Y=1.571 ✓
  #    Bulb:        [0.72, 1.455, 0.330] (dentro il paralume)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "lampada_luxo"
    type: "group"
    material: "dis_metallo_lampada"
    children:

      # Base pesante (disco stabile)
      - type: "cylinder"
        center: [0.72, 0.760, 0.30]
        radius: 0.135
        height: 0.042

      # Stelo verticale dal centro della base
      - type: "cylinder"
        center: [0.72, 0.802, 0.30]
        radius: 0.022
        height: 0.105

      # Snodo inferiore (attacca stelo al primo braccio)
      - type: "sphere"
        center: [0.72, 0.907, 0.300]
        radius: 0.038

      # Braccio inferiore — ruotato -28° su X (si inclina in avanti, verso Z+)
      # bottom world: [0.72, 0.905, 0.300], top: [0.72, 1.259, 0.112]
      - type: "box"
        scale: [0.032, 0.400, 0.032]
        rotate: [-28, 0, 0]
        translate: [0.72, 1.082, 0.206]

      # Snodo centrale (gomito)
      - type: "sphere"
        center: [0.72, 1.259, 0.112]
        radius: 0.040

      # Braccio superiore — ruotato +35° su X (si apre in avanti, verso Z+)
      # bottom world: [0.72, 1.259, 0.112], top: [0.72, 1.571, 0.330]
      - type: "box"
        scale: [0.032, 0.380, 0.032]
        rotate: [35, 0, 0]
        translate: [0.72, 1.415, 0.221]

      # Snodo testa (attacca braccio superiore al paralume)
      - type: "sphere"
        center: [0.72, 1.571, 0.330]
        radius: 0.036

      # Paralume conico — apertura in basso (verso il tavolo),
      # top chiuso a Y=1.571 dove si attacca allo snodo testa.
      # cone: center=base(apertura), radius=wide, top_radius=small
      - type: "cone"
        center: [0.72, 1.360, 0.330]
        radius: 0.172
        top_radius: 0.052
        height: 0.211

      # Lampadina emissiva (dentro il paralume) — diventa GeometryLight
      - type: "sphere"
        center: [0.72, 1.455, 0.330]
        radius: 0.075
        material: "mat_emissive_bulb"

  # ═══════════════════════════════════════════════════════════════════════
  #  MONITOR — Thin-bezel moderno con schermo emissivo
  # ═══════════════════════════════════════════════════════════════════════
  - name: "monitor"
    type: "group"
    material: "dis_plastica_monitor"
    children:

      # Base stand (piatta, larga)
      - type: "box"
        scale: [0.24, 0.020, 0.18]
        translate: [-0.55, 0.770, 0.60]

      # Collo stand (arm sottile)
      - type: "box"
        scale: [0.030, 0.250, 0.030]
        translate: [-0.55, 0.895, 0.572]

      # Corpo monitor (schienale + bezel)
      - type: "box"
        scale: [0.58, 0.38, 0.042]
        translate: [-0.55, 1.10, 0.578]

  # Schermo emissivo (quad davanti al corpo monitor, normale verso -Z)
  # u×v = [-0.52,0,0]×[0,0.38,0] = [0,0,-0.1976] → -Z → verso camera ✓
  - name: "schermo_monitor"
    type: "quad"
    q: [-0.26, 0.91, 0.556]
    u: [-0.52,  0.0,   0.0]
    v: [  0.0,  0.38,  0.0]
    material: "mat_emissive_schermo"

  # Tastiera sotto il monitor (piatta, grigio chiaro)
  - name: "tastiera"
    type: "box"
    scale: [0.46, 0.018, 0.165]
    translate: [-0.55, 0.769, 0.38]
    material: "cls_tastiera"

  # Mouse (lato destro della tastiera)
  - name: "mouse"
    type: "sphere"
    center: [-0.07, 0.795, 0.38]
    radius: 0.038
    material: "dis_mouse"

  # ═══════════════════════════════════════════════════════════════════════
  #  LIBRI — Stack di 3 volumi (lato destro, centro tavolo)
  # ═══════════════════════════════════════════════════════════════════════

  # Libro 1 (sotto) — rosso scuro, dritto
  - name: "libro_1"
    type: "box"
    scale: [0.21, 0.036, 0.28]
    translate: [0.28, 0.778, 0.52]
    material: "dis_libro_rosso"

  # Libro 2 (centro) — blu navy, leggermente ruotato
  - name: "libro_2"
    type: "box"
    scale: [0.21, 0.036, 0.28]
    translate: [0.26, 0.814, 0.53]
    rotate: [0, 4, 0]
    material: "dis_libro_blu"

  # Libro 3 (cima) — verde foresta, inclinato al contrario
  - name: "libro_3"
    type: "box"
    scale: [0.21, 0.036, 0.28]
    translate: [0.30, 0.850, 0.51]
    rotate: [0, -5, 0]
    material: "dis_libro_verde"

  # ═══════════════════════════════════════════════════════════════════════
  #  TAZZA DA CAFFÈ — CSG: cilindro esterno − interno (cavo)
  #  Posizione: lato sinistro del tavolo, vicino al bordo anteriore.
  # ═══════════════════════════════════════════════════════════════════════
  - name: "tazza_caffe"
    type: "csg"
    operation: "subtraction"
    left:
      type: "cylinder"
      center: [0, 0, 0]
      radius: 0.072
      height: 0.095
    right:
      # Cilindro interno più basso: lascia fondo solido (spessore 0.015)
      type: "cylinder"
      center: [0, 0.015, 0]
      radius: 0.057
      height: 0.090
    translate: [-0.30, 0.760, 0.25]
    material: "dis_ceramica_tazza"

  # Manico tazza (toro appiattito)
  - name: "manico_tazza"
    type: "torus"
    center: [-0.228, 0.810, 0.250]
    major_radius: 0.065
    minor_radius: 0.018
    scale: [0.35, 1.0, 1.0]
    material: "dis_ceramica_tazza"

  # ═══════════════════════════════════════════════════════════════════════
  #  PORTAMATITE — CSG: cilindro esterno − interno (cavo)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "portamatite"
    type: "csg"
    operation: "subtraction"
    left:
      type: "cylinder"
      center: [0, 0, 0]
      radius: 0.046
      height: 0.120
    right:
      type: "cylinder"
      center: [0, 0.012, 0]
      radius: 0.036
      height: 0.116
    translate: [0.12, 0.760, 0.52]
    material: "dis_plastica_portamatite"

  # Matita 1 — sporge dal portamatite
  - name: "matita_1"
    type: "cylinder"
    center: [0.095, 0.840, 0.500]
    radius: 0.008
    height: 0.130
    material: "dis_matita_gialla"

  # Matita 2
  - name: "matita_2"
    type: "cylinder"
    center: [0.130, 0.835, 0.528]
    radius: 0.008
    height: 0.110
    material: "dis_matita_gialla"

  # Matita 3
  - name: "matita_3"
    type: "cylinder"
    center: [0.155, 0.845, 0.505]
    radius: 0.008
    height: 0.120
    material: "dis_matita_gialla"

  # Punte grafite (coni piccoli sulle matite)
  - name: "punta_1"
    type: "cone"
    center: [0.095, 0.970, 0.500]
    radius: 0.008
    top_radius: 0.001
    height: 0.018
    material: "cls_grafite"

  - name: "punta_2"
    type: "cone"
    center: [0.130, 0.945, 0.528]
    radius: 0.008
    top_radius: 0.001
    height: 0.018
    material: "cls_grafite"

  - name: "punta_3"
    type: "cone"
    center: [0.155, 0.965, 0.505]
    radius: 0.008
    top_radius: 0.001
    height: 0.018
    material: "cls_grafite"

  # ═══════════════════════════════════════════════════════════════════════
  #  PIANTA GRASSA — Vaso terracotta + terreno + succulenta
  # ═══════════════════════════════════════════════════════════════════════

  # Vaso (cono rastremato, più largo in alto)
  - name: "vaso_pianta"
