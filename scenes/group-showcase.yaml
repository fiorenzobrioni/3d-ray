# ============================================================================
# Group & Template Showcase
# ============================================================================
# Dimostra:
#   - Import di librerie esterne (materiali, luci)
#   - Template: definisci una volta, istanzia N volte
#   - Transform su template (posa di default) + transform su instance
#   - Override materiale per-istanza
#   - Gruppi con figli CSG e annidamento ricorsivo
#   - Emissivi dentro gruppi per NEE
# ============================================================================

imports:
  - path: "libraries/metals.yaml"
  - path: "libraries/studio-3point.yaml"

world:
  ambient_light: [0.02, 0.02, 0.03]
  background: [0.0, 0.0, 0.0]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.08, 0.08, 0.12]
    ground_color: [0.03, 0.03, 0.04]

camera:
  position: [6, 4, -8]
  look_at: [0, 1.2, 0]
  fov: 42
  aperture: 0.04
  focal_dist: 10.0

materials:
  - id: "pavimento"
    type: "disney"
    color: [0.12, 0.12, 0.14]
    roughness: 0.15

  - id: "luce_calda"
    type: "emissive"
    color: [1.0, 0.85, 0.6]
    intensity: 12.0

  - id: "luce_fredda"
    type: "emissive"
    color: [0.7, 0.85, 1.0]
    intensity: 8.0

  - id: "gomma_nera"
    type: "disney"
    color: [0.05, 0.05, 0.05]
    roughness: 0.8

# ============================================================================
# TEMPLATE: definiti una volta, usati N volte sotto
# ============================================================================
templates:
  # ── Pedina da scacchi ────────────────────────────────────────────────────
  - name: "pedina"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.35
        height: 0.12
      - type: "torus"
        center: [0, 0.12, 0]
        major_radius: 0.30
        minor_radius: 0.05
      - type: "cylinder"
        center: [0, 0.12, 0]
        radius: 0.20
        height: 0.35
      - type: "sphere"
        center: [0, 0.55, 0]
        radius: 0.22

  # ── Lampione stradale ──────────────────────────────────────────────────
  # Ha una trasformazione di default (nessuna in questo caso)
  - name: "lampione"
    material: "ferro_battuto"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.20
        height: 0.08
      - type: "cylinder"
        center: [0, 0.08, 0]
        radius: 0.05
        height: 2.5
      - type: "sphere"
        center: [0, 2.8, 0]
        radius: 0.18
        material: "luce_calda"
      - type: "cone"
        center: [0, 2.88, 0]
        radius: 0.22
        top_radius: 0.04
        height: 0.12

# ============================================================================
# ENTITIES: istanze, gruppi, primitive
# ============================================================================
entities:
  # ── Pavimento ──────────────────────────────────────────────────────────
  - name: "suolo"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  # ── 5 pedine in fila — stesso template, materiali e posizioni diverse ──
  - name: "pedina_1"
    type: "instance"
    template: "pedina"
    material: "oro_lucido"
    translate: [-3, 0, 0]

  - name: "pedina_2"
    type: "instance"
    template: "pedina"
    material: "argento_lucido"
    translate: [-1.5, 0, 0]

  - name: "pedina_3"
    type: "instance"
    template: "pedina"
    material: "rame_lucido"
    translate: [0, 0, 0]

  - name: "pedina_4"
    type: "instance"
    template: "pedina"
    material: "bronzo"
    translate: [1.5, 0, 0]

  - name: "pedina_5"
    type: "instance"
    template: "pedina"
    material: "acciaio_lucido"
    translate: [3, 0, 0]
    scale: 1.3                   # Variante più grande

  # ── 2 lampioni — stesso template, posizioni diverse, uno con luce fredda
  - name: "lampione_sx"
    type: "instance"
    template: "lampione"
    translate: [-4.5, 0, 2]

  - name: "lampione_dx"
    type: "instance"
    template: "lampione"
    translate: [4.5, 0, 2]
    # Nota: la sfera emissiva nel template ha material "luce_calda" hardcoded
    # Per varianti, serve un template separato o un gruppo con override

  # ── Braccio robotico (gruppo annidato a 3 livelli — non template) ──────
  - name: "robot_arm"
    type: "group"
    translate: [0, 0, 3.5]
    material: "acciaio_spazzolato"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.4
        height: 0.12
        material: "gomma_nera"
      - type: "sphere"
        center: [0, 0.20, 0]
        radius: 0.12
      - type: "cylinder"
        center: [0, 0.28, 0]
        radius: 0.06
        height: 1.0
      - name: "avambraccio"
        type: "group"
        translate: [0, 1.28, 0]
        rotate: [0, 0, -25]
        children:
          - type: "sphere"
            center: [0, 0, 0]
            radius: 0.10
          - type: "cylinder"
            center: [0, 0.08, 0]
            radius: 0.05
            height: 0.8
          - name: "mano"
            type: "group"
            translate: [0, 0.88, 0]
            rotate: [0, 0, 15]
            children:
              - type: "sphere"
                center: [0, 0, 0]
                radius: 0.07
                material: "bronzo"
              - type: "box"
                scale: [0.02, 0.16, 0.05]
                translate: [-0.05, 0.10, 0]
              - type: "box"
                scale: [0.02, 0.16, 0.05]
                translate: [0.05, 0.10, 0]
