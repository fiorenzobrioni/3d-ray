    horizon_color: [0.68, 0.76, 0.90]   # orizzonte chiaro lattiginoso
    ground_color:  [0.30, 0.28, 0.25]   # riflessione a terra
    sun:
      direction:  [-0.40, -0.75, 0.40]  # da sud-ovest
      color:      [1.00, 0.93, 0.78]
      intensity:  4.0
      size:       0.06

cameras:
