    color: [0.950, 0.930, 0.880]

  - id: "clock_rim"
    type: "metal"
    color: [0.850, 0.750, 0.200]
    fuzz: 0.150

  - id: "clock_hand"
    type: "metal"
    color: [0.100, 0.100, 0.100]
    fuzz: 0.300

  - id: "iron_dark"
    type: "metal"
