# ═══════════════════════════════════════════════════════════════════════════
#  Elizabeth Tower (Big Ben) — Londra, pomeriggio
#
#  Veduta urbana del celebre campanile neogotico sul Tamigi con Westminster
#  Bridge, il Palazzo di Westminster, autobus rossi a due piani, lampioni
#  vittoriani, panchine, recinzioni in ferro battuto e giardini. La torre
#  è riprodotta con 8 livelli di finestre gotiche, quadranti dell'orologio
#  a ore 12:15, cella campanaria con Big Ben e tetto in rame a gradini.
#  Il cielo procedurale con sun disk simula la luce pomeridiana londinese.
#
#  Engine features demonstrated:
#    • templates + instance  — lamp, bench, tree, fence section, phone box
#    • CSG (subtraction)     — hollowed lamp housing, arched entrance
#    • groups                — multi-primitive bus, bench, tree
#    • cameras (named)       — 5 viewpoints with DOF
#    • procedural textures   — marble, wood, noise
#    • sky gradient + sun disk
#
#  Generated by BigBenGen tool (src/Tools/BigBenGen)
#
#  Render consigliato:
#    Preview: dotnet run ... -- -i scenes/big-ben.yaml -w 400  -H 225  -s 64   -d 4  -S 1
#    Finale:  dotnet run ... -- -i scenes/big-ben.yaml -w 1920 -H 1080 -s 1024 -d 8  -S 4
#    Ultra:   dotnet run ... -- -i scenes/big-ben.yaml -w 3840 -H 2160 -s 1600 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
