# ═══════════════════════════════════════════════════════════════════════════
# Elizabeth Tower (Big Ben) — London
# Highly detailed ray-tracing scene for 3D-Ray engine
# Clock set to 12:15
# ═══════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.10, 0.10, 0.12]
  background: [0.42, 0.55, 0.78]
  ground:
    type: "infinite_plane"
    material: "pavement"
    y: 0.0

camera:
  position: [28, 8, -48]
  look_at: [0, 40, 0]
  fov: 50
  aperture: 0.06
  focal_dist: 55.0

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:
  # --- Ground & environment ---
  - id: "pavement"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      colors: [[0.38, 0.36, 0.32], [0.32, 0.30, 0.27]]

  - id: "pavement_light"
    type: "lambertian"
    color: [0.50, 0.48, 0.44]

  - id: "thames_water"
    type: "metal"
    color: [0.10, 0.16, 0.22]
    fuzz: 0.04

  - id: "thames_bed"
    type: "lambertian"
    color: [0.08, 0.12, 0.10]

  # --- Tower stone ---
  - id: "limestone"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 14.0
      noise_strength: 3.5
      colors: [[0.82, 0.78, 0.68], [0.72, 0.69, 0.60]]

  - id: "limestone_clean"
    type: "lambertian"
    color: [0.84, 0.80, 0.70]

  - id: "limestone_dark"
    type: "lambertian"
    color: [0.60, 0.56, 0.48]

  - id: "stone_detail"
    type: "lambertian"
    color: [0.75, 0.72, 0.65]

  - id: "stone_cornice"
    type: "lambertian"
    color: [0.70, 0.67, 0.60]

  # --- Clock materials ---
  - id: "clock_face_white"
    type: "lambertian"
    color: [0.95, 0.93, 0.88]

  - id: "clock_rim_gold"
    type: "metal"
    color: [0.90, 0.75, 0.15]
    fuzz: 0.08

  - id: "clock_hand_black"
    type: "lambertian"
    color: [0.04, 0.04, 0.04]

  - id: "clock_mark_dark"
    type: "lambertian"
    color: [0.06, 0.06, 0.06]

  - id: "clock_minute_mark"
    type: "lambertian"
    color: [0.10, 0.10, 0.10]

  - id: "clock_hub_gold"
    type: "metal"
    color: [0.88, 0.72, 0.12]
    fuzz: 0.05

  - id: "clock_glass"
    type: "dielectric"
    refraction_index: 1.50

  # --- Metal & decorative ---
  - id: "gold_trim"
    type: "metal"
    color: [0.90, 0.75, 0.15]
    fuzz: 0.08

  - id: "iron_dark"
    type: "metal"
    color: [0.18, 0.16, 0.14]
    fuzz: 0.50

  - id: "copper_roof"
    type: "metal"
    color: [0.25, 0.45, 0.30]
    fuzz: 0.25

  - id: "copper_aged"
    type: "metal"
    color: [0.22, 0.40, 0.28]
    fuzz: 0.30

  - id: "bell_bronze"
    type: "metal"
    color: [0.45, 0.35, 0.15]
    fuzz: 0.35

  # --- Belfry & roof ---
  - id: "dark_recess"
    type: "lambertian"
    color: [0.10, 0.08, 0.06]

  - id: "warm_light_emit"
    type: "lambertian"
    color: [1.00, 0.90, 0.60]

  # --- Bridge ---
  - id: "bridge_stone"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 5.0
      colors: [[0.58, 0.55, 0.50], [0.50, 0.47, 0.42]]

  - id: "bridge_iron"
    type: "metal"
    color: [0.20, 0.22, 0.18]
    fuzz: 0.45

  # --- Westminster Palace ---
  - id: "palace_stone"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 10.0
      noise_strength: 2.5
      colors: [[0.72, 0.68, 0.58], [0.64, 0.60, 0.52]]

  - id: "palace_dark"
    type: "lambertian"
    color: [0.55, 0.52, 0.46]

  - id: "palace_roof"
    type: "lambertian"
    color: [0.30, 0.28, 0.26]

  - id: "palace_window"
    type: "dielectric"
    refraction_index: 1.50

  # --- London elements ---
  - id: "red_bus"
    type: "lambertian"
    color: [0.82, 0.10, 0.08]

  - id: "bus_cream"
    type: "lambertian"
    color: [0.92, 0.88, 0.75]

  - id: "bus_window"
    type: "metal"
    color: [0.08, 0.10, 0.14]
    fuzz: 0.05

  - id: "lamp_iron"
    type: "metal"
    color: [0.12, 0.12, 0.10]
    fuzz: 0.55

  - id: "lamp_glow"
    type: "lambertian"
    color: [1.00, 0.92, 0.65]

  - id: "bench_wood"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 3.0
      colors: [[0.45, 0.30, 0.15], [0.35, 0.22, 0.10]]

  - id: "bench_iron"
    type: "metal"
    color: [0.15, 0.14, 0.12]
    fuzz: 0.50

  - id: "tree_trunk"
    type: "lambertian"
    color: [0.30, 0.20, 0.10]

  - id: "tree_foliage"
    type: "lambertian"
    color: [0.18, 0.40, 0.15]

  - id: "grass"
    type: "lambertian"
    color: [0.20, 0.42, 0.12]

  - id: "fence_iron"
    type: "metal"
    color: [0.14, 0.13, 0.12]
    fuzz: 0.55

  - id: "sidewalk"
    type: "lambertian"
    color: [0.55, 0.53, 0.50]

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # Main sun — warm afternoon light from the south-west
  - type: "directional"
    direction: [-0.4, -0.75, 0.4]
    color: [1.0, 0.93, 0.80]
    intensity: 0.90

  # Sky fill — cool blue from opposite side
  - type: "directional"
    direction: [0.3, -0.5, -0.5]
    color: [0.55, 0.60, 0.75]
    intensity: 0.22

  # Accent point light — illuminates the clock faces
  - type: "point"
    position: [0, 60, -20]
    color: [1.0, 0.96, 0.88]
    intensity: 250.0

  # Warm fill from behind to rim-light the tower
  - type: "point"
    position: [-15, 45, 25]
    color: [1.0, 0.90, 0.70]
    intensity: 150.0

