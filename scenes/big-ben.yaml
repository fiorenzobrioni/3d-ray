# Ray-Tracing Scene - Elizabeth Tower (Big Ben) - London
# Procedurally generated with thousands of fine primitives
# IMPROVED VERSION — See [IMPROVED] and [NEW] tags for changes

world:
  # [IMPROVED] ambient_light alzato da [0.06,0.06,0.09] per migliore fill ombre
  ambient_light: [0.08, 0.08, 0.10]
  background: [0.18, 0.25, 0.50]  # Twilight London sky
  ground:
    type: "infinite_plane"
    material: "pavement"
    y: 0.0

camera:
  position: [18, 3.5, -35]   # Low dramatic angle from across the Thames
  look_at: [0, 32, 0]
  fov: 50
  aperture: 0.08
  focal_dist: 42.0

materials:
  # [IMPROVED] texture noise per irregolarità marciapiede
  - id: "pavement"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 8.0
      colors: [[0.350, 0.330, 0.300], [0.300, 0.280, 0.250]]

  # [IMPROVED] texture marble per venature calcaree
  - id: "limestone"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 12.0
      noise_strength: 4.0
      colors: [[0.820, 0.780, 0.680], [0.720, 0.690, 0.600]]

  - id: "limestone_dark"
    type: "lambertian"
    color: [0.650, 0.600, 0.500]

  - id: "stone_detail"
    type: "lambertian"
    color: [0.750, 0.720, 0.650]

  - id: "clock_white"
    type: "lambertian"
    color: [0.950, 0.930, 0.880]

  - id: "clock_rim"
    type: "metal"
    color: [0.850, 0.750, 0.200]
    fuzz: 0.150

  # [IMPROVED] era metal fuzz=0.3 — lancette dipinte nero opaco
  - id: "clock_hand"
    type: "lambertian"
    color: [0.050, 0.050, 0.050]

  - id: "iron_dark"
    type: "metal"
    color: [0.180, 0.160, 0.140]
    fuzz: 0.500

  # [IMPROVED] fuzz 0.10→0.08
  - id: "gold_trim"
    type: "metal"
    color: [0.900, 0.750, 0.150]
    fuzz: 0.080

  - id: "copper_roof"
    type: "metal"
    color: [0.250, 0.450, 0.300]
    fuzz: 0.250

  - id: "glass_window"
    type: "dielectric"
    refraction_index: 1.500

  - id: "warm_light"
    type: "lambertian"
    color: [1.000, 0.900, 0.600]

  - id: "dark_recess"
    type: "lambertian"
    color: [0.120, 0.100, 0.080]

  - id: "thames_water"
    type: "metal"
    color: [0.120, 0.180, 0.220]
    fuzz: 0.050

  - id: "bridge_stone"
    type: "lambertian"
    color: [0.550, 0.520, 0.480]

  - id: "red_bus"
    type: "lambertian"
    color: [0.800, 0.100, 0.080]

  # [IMPROVED] fuzz 0.4→0.6
  - id: "fence_iron"
    type: "metal"
    color: [0.150, 0.140, 0.130]
    fuzz: 0.600

  # [NEW] bronzo patinato per la campana
  - id: "bell_bronze"
    type: "metal"
    color: [0.450, 0.350, 0.150]
    fuzz: 0.350

  # [NEW] vetro scuro bus
  - id: "bus_window"
    type: "metal"
    color: [0.080, 0.100, 0.140]
    fuzz: 0.050

  # [NEW] fascia panna Routemaster
  - id: "bus_cream"
    type: "lambertian"
    color: [0.920, 0.880, 0.750]

  # [NEW] pietra Westminster Palace
  - id: "palace_stone"
    type: "lambertian"
    color: [0.680, 0.650, 0.580]


lights:
  # Key Light (sole al tramonto, da sinistra)
  - type: "directional"
    direction: [-0.3, -0.8, 0.2]
    color: [1.0, 0.85, 0.65]
    intensity: 0.7

  # Fill Light (cielo, dal lato opposto)
  - type: "directional"
    direction: [0.4, -0.4, -0.6]
    color: [0.40, 0.45, 0.65]
    intensity: 0.20

  # Luce torre alta
  - type: "point"
    position: [0, 55, -5]
    color: [1.0, 0.95, 0.80]
    intensity: 300.0

  # [FIXED] Ayrton Light — spostata da [0,62,0] (dentro guglia) a [0,64.8,0] (sopra croce)
  - type: "point"
    position: [0, 64.8, 0]
    color: [1.0, 0.92, 0.55]
    intensity: 150.0

  # [NEW] Sky Dome Area Light — ombre morbide realistiche
  - type: "area"
    corner: [-20, 70, -20]
    u: [40, 0, 0]
    v: [0, 0, 40]
    color: [0.35, 0.45, 0.70]
    intensity: 0.4
    shadow_samples: 16

  # [NEW] Luci lampioni (5 lungo il marciapiede)
  - type: "point"
    position: [-16.0, 4.6, -13.0]
    color: [1.0, 0.85, 0.55]
    intensity: 15.0
  - type: "point"
    position: [-8.0, 4.6, -13.0]
    color: [1.0, 0.85, 0.55]
    intensity: 15.0
  - type: "point"
    position: [0.0, 4.6, -13.0]
    color: [1.0, 0.85, 0.55]
    intensity: 15.0
  - type: "point"
    position: [8.0, 4.6, -13.0]
    color: [1.0, 0.85, 0.55]
    intensity: 15.0
  - type: "point"
    position: [16.0, 4.6, -13.0]
    color: [1.0, 0.85, 0.55]
    intensity: 15.0

  # [NEW] Fill basso per base torre e ponte
  - type: "point"
    position: [10, 3, -25]
    color: [0.85, 0.80, 0.70]
    intensity: 60.0

