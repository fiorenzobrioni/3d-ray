# Scena 2: Classic Ray Tracing Showcase (Riflessi, Rifrazioni, Materiali)

# --- CONFIGURAZIONI WORLD E LIGHTS (Scommenta quella desiderata) ---
# 1. Studio notturno con cielo scuro, luna tenue
world:
  ambient_light: [0.02, 0.02, 0.02]
  sky:
    type: "gradient"
    zenith_color:  [0.01, 0.01, 0.04]
    horizon_color: [0.04, 0.04, 0.08]
    ground_color:  [0.02, 0.02, 0.03]
  ground: { type: "infinite_plane", material: "floor_checker", y: 0.0 }

lights:
  - type: "spot"
    position: [0, 10, 0]
    direction: [0, -1, 0]
    color: [1.0, 0.95, 0.9]
    intensity: 150
    inner_angle: 20
    outer_angle: 45
  - type: "point"
    position: [-5, 5, -5]
    color: [0.5, 0.8, 1.0]
    intensity: 40
  - type: "point"
    position: [5, 2, -2]
    color: [1.0, 0.5, 0.2]
    intensity: 30

