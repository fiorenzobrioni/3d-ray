# Ray-Tracing Scene - Highly Detailed Chess Set
# Procedurally generated using fine primitives (spheres, cylinders, boxes)

world:
  ambient_light: [0.05, 0.05, 0.08]
  background: [0.1, 0.1, 0.15]
  ground:
    type: "infinite_plane"
    material: "table_wood"
    y: -0.2

camera:
  position: [-5, 6, -6]
  look_at: [0, 0, 0]
  fov: 50
  aperture: 0.15
  focal_dist: 8.0

materials:
  - id: "table_wood"
    type: "lambertian"
    color: [0.4, 0.25, 0.15]

  - id: "board_light"
    type: "metal"
    color: [0.9, 0.85, 0.75]
    fuzz: 0.05

  - id: "board_dark"
    type: "metal"
    color: [0.15, 0.15, 0.15]
    fuzz: 0.05

  - id: "board_border"
    type: "metal"
    color: [0.3, 0.15, 0.05]
    fuzz: 0.1

  - id: "piece_white"
    type: "dielectric"
    refraction_index: 1.5

  - id: "piece_black"
    type: "dielectric"
    refraction_index: 2.0

  # Alternative set of materials for pieces in case dielectric is too noisy:
  - id: "piece_white_solid"
    type: "metal"
    color: [0.9, 0.9, 0.9]
    fuzz: 0.1

  - id: "piece_black_solid"
    type: "metal"
    color: [0.1, 0.1, 0.1]
    fuzz: 0.1

lights:
  - type: "point"
    position: [-2, 8, -2]
    color: [1.0, 0.95, 0.9]
    intensity: 80.0

  - type: "directional"
    direction: [0.5, -1, 0.5]
    color: [0.5, 0.6, 0.8]
    intensity: 0.3

