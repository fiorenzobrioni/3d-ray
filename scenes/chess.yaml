lights:
  # --- Configurazione Corrente: Luce Singola (Luce Calda e Diffusa) ---
  - { type: "point", position: [-2, 8, -2], color: [1.0, 0.95, 0.9], intensity: 80 }

  # --- SET: Balanced 3-Point Lighting (Luce Morbida e Diffusa) ---
  # - { type: "point", position: [5, 10, -5], color: [1.0, 1.0, 1.0], intensity: 100 }  # Key Light
  # - { type: "point", position: [-5, 5, -2], color: [0.8, 0.8, 1.0], intensity: 40 }   # Fill Light
  # - { type: "point", position: [0, 8, 5], color: [1.0, 0.9, 0.7], intensity: 60 }     # Back Light

  # --- SET: DRAMATIC RIM (Solo contorno e silhouette) ---
