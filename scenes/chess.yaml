# Ray-Tracing Scene - Highly Detailed Chess Set
# Procedurally generated using fine primitives (spheres, cylinders, boxes)

world:
  # --- Configurazione Corrente: Studio Buio ---
  ambient_light: [-0.45, -0.45, -0.45]
  background: [0.1, 0.1, 0.15]
  ground:
    type: "infinite_plane"
    material: "table_wood"
    y: -0.2

  # --- AMBIENTE: STUDIO BILANCIATO (Luce Morbida e Diffusa) ---
  # ambient_light: [0.05, 0.05, 0.05]  # Luce di riempimento globale (fill light)
  # background: [0.15, 0.15, 0.2]      # Colore del cielo/orizzonte

  # --- AMBIENTE: MIDNIGHT BLUE (Atmosfera Notturna) ---
  # ambient_light: [0.01, 0.01, 0.02]
  # background: [0.02, 0.02, 0.05]

  # --- AMBIENTE: WARM SUNSET (Luce Calda di Taglio) ---
  # ambient_light: [0.1, 0.05, 0.02]
  # background: [0.8, 0.4, 0.1]

  # --- AMBIENTE: HIGH-KEY STUDIO (Bianco Pulito) ---
  # ambient_light: [0.2, 0.2, 0.2]
  # background: [0.9, 0.9, 0.9]

  # --- AMBIENTE: NOIR / THE VOID (Nero Assoluto) ---
  # ambient_light: [0.0, 0.0, 0.0]
  # background: [0.0, 0.0, 0.0]

camera:
  # --- Camera Principale (Prospettiva Classica) ---
  position: [0, 5, -8]
  look_at: [0, 0, 0]
  fov: 45
  aperture: 0.1
  focal_dist: 9.43         # sqrt(0^2 + 5^2 + (-8)^2) = 9.43

  # --- VISTA MACRO (Dettaglio sui Pezzi Centrali) ---
  # position: [1.5, 1.2, -4]
  # look_at: [0, 0.8, 0]
  # fov: 25.0
  # aperture: 0.2
  # focal_dist: 4.25

  # --- VISTA HERO (Angolo Basso e Imponente) ---
  # position: [0.0, 0.5, -6.5]
  # look_at: [0.0, 1.0, 0.5]
  # fov: 55.0
  # aperture: 0.1
  # focal_dist: 7.0

  # --- VISTA ZENITALE (Vista dall'alto tattica) ---
  # position: [0.0, 12, 0.01]
  # look_at: [0, 0, 0]
  # fov: 35
  # aperture: 0.0
  # focal_dist: 12.0

  # --- VISTA DUTCH ANGLE (Dinamica e Inclinata) ---
  # position: [6.0, 4.0, -6.0]
  # look_at: [0.0, 0.5, 0.0]
  # fov: 40.0
  # aperture: 0.1
  # focal_dist: 8.5

  # --- VISTA PAWN'S EYE (Ad altezza pedina, Bokeh estremo) ---
  # position: [0.0, 0.4, -3.5]
  # look_at: [0.0, 0.6, 2.0]
  # fov: 70.0
  # aperture: 0.3
  # focal_dist: 3.5

materials:
  - id: "table_wood"
    # --- Configurazione Corrente: Noce Satinato (Walnut) ---
    type: "lambertian"
    texture:
      type: "wood"
      scale: 20.0                # Venature più fini e realistiche
      noise_strength: 3.2
      colors: [[0.25, 0.12, 0.05], [0.12, 0.06, 0.02]]
      randomize_offset: true
      rotation: [90, 0, 0]

    # --- VARIANTE: LEGNO LACCATO LUCIDO (Polished Rosewood) ---
    # type: "metal"              # Base metallica per riflessi speculari
    # fuzz: 0.08                 # Riflesso tipico della lacca
    # texture:
    #   type: "wood"
    #   scale: 22.0
    #   colors: [[0.35, 0.05, 0.02], [0.15, 0.02, 0.01]] # Toni rossastri profondi

