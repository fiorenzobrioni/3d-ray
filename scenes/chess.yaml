# Ray-Tracing Scene - Staunton Chess Set, Italian Game opening
# Procedurally generated by src/Tools/ChessGen.
# Position: 1.e4 e5 2.Nf3 Nc6 3.Bc4 Bc5 (Giuoco Piano, 3 moves per side).
# Pieces are emitted as a template per piece type + one instance per board
# square. Edit ChessGen/Program.cs to regenerate this file.

world:
  # --- Configurazione Corrente: Giardino Pomeridiano per Metalli ---
  # Lo sky gradient fornisce ai metalli un cielo credibile da riflettere
  # ed e' la sola sorgente di illuminazione ambientale (path-traced GI).
  sky:
    type: "gradient"
    zenith_color:  [0.02, 0.03, 0.06]
    horizon_color: [0.08, 0.07, 0.09]
    ground_color:  [0.01, 0.01, 0.015]
    sun:
      direction: [-0.6, -0.8, -0.4]
      color: [1.0, 0.96, 0.88]
      intensity: 2.0
      size: 2.5
      falloff: 40.0
  ground:
    type: "infinite_plane"
    material: "table_wood"
    y: -0.2

cameras:
  - name:       classica        # Prospettiva Classica
    position:   [0, 5, -8]
    look_at:    [0, -0.2, 0]
    fov:        45
    aperture:   0.1
    focal_dist: 12.0

  - name:       macro           # Dettaglio sui Pezzi Centrali
    position:   [1.5, 1.2, -4]
    look_at:    [0, 0.8, 0]
    fov:        25.0
    aperture:   0.2
    focal_dist: 4.25

  - name:       hero            # Angolo Basso e Imponente
    position:   [0.0, 0.5, -6.5]
    look_at:    [0.0, 1.0, 0.5]
    fov:        55.0
    aperture:   0.1
    focal_dist: 7.0

  - name:       zenitale        # Vista dall'alto tattica
    position:   [0.0, 12.0, 0.01]
    look_at:    [0.0, 0.0, 0.0]
    fov:        35.0
    aperture:   0.0
    focal_dist: 12.0

  - name:       dutch           # Dinamica e Inclinata
    position:   [6.0, 4.0, -6.0]
    look_at:    [0.0, 0.5, 0.0]
    fov:        40.0
    aperture:   0.1
    focal_dist: 8.5

  - name:       pawns_eye       # Ad altezza pedina, Bokeh estremo
    position:   [0.0, 0.4, -3.5]
    look_at:    [0.0, 0.6, 2.0]
    fov:        70.0
    aperture:   0.3
    focal_dist: 3.5

materials:
  - id: "table_wood"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 6.0
      noise_strength: 2.8
      colors: [[0.28, 0.16, 0.08], [0.15, 0.08, 0.04]]
      randomize_offset: true
      rotation: [90, 0, 0]

  - id: "board_checker"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 0.125
      colors: [[0.82, 0.70, 0.48], [0.20, 0.11, 0.06]]

  - id: "board_border"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 20.0
      noise_strength: 3.0
      colors: [[0.22, 0.09, 0.05], [0.09, 0.04, 0.02]]

  - id: "piece_white"
    type: "disney"
    color: [0.92, 0.84, 0.68]
    metallic: 0.0
    roughness: 0.28
    specular: 0.5
    clearcoat: 0.5
    coat_roughness: 0.15

  - id: "piece_black"
    type: "disney"
    color: [0.05, 0.04, 0.035]
    metallic: 0.0
    roughness: 0.22
    specular: 0.5
    clearcoat: 0.6
    coat_roughness: 0.10

lights: 
  # --- Configurazione Corrente: Three-Point Lighting per Metalli ---
  # Key Light — allineata approssimativamente alla direzione del sun disk
  - type: "-point"
    position: [-3, 10, -4]
    color: [1.0, 0.95, 0.9]
    intensity: 80

  # Fill Light — luce fredda più debole dall'altro lato, ammorbidisce le ombre
  - type: "-point"
    position: [5, 6, -3]
    color: [0.85, 0.85, 1.0]
    intensity: 30

  # Back/Rim Light — luce posteriore per distaccare i pezzi dallo sfondo
  - type: "point"
    position: [0, 8, 6]
    color: [1.0, 0.95, 0.85]
    intensity: 400 #40

