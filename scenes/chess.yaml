  - id: "piece_white_solid"
    # --- Configurazione Corrente: Marmo Bianco Lucido (Carrara) ---
    type: "metal"                    
    fuzz: 0.04
    texture:
      type: "marble"
      scale: 30.0
      colors: [[0.98, 0.98, 0.98], [0.75, 0.75, 0.75]]
