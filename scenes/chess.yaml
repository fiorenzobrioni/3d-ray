# Ray-Tracing Scene - Highly Detailed Chess Set
# Procedurally generated using fine primitives (spheres, cylinders, boxes)
#
# NOTE: Questa scena usa materiali metallici speculari (fuzz=0), quindi serve
# ambient_light > 0 e/o background > 0 affinché gli specchi abbiano luce
# ambientale da riflettere. Con ambient=[0,0,0] e background=[0,0,0] le
# superfici specchiate appaiono nere perché non hanno nulla da riflettere.

world:
  # --- Configurazione Corrente: Studio Bilanciato per Metalli ---
  # L'ambient fornisce una base di fill che i metalli riflettono (tinta dal loro colore).
  # Il background dà un tono morbido ai raggi riflessi che escono dalla scena.
  ambient_light: [0.06, 0.06, 0.07]
  background: [0.08, 0.08, 0.12]
  ground:
    type: "infinite_plane"
    material: "table_wood"
    y: -0.2

  # --- AMBIENTE: STUDIO HIGH-KEY (Bianco Pulito per showcase) ---
  # ambient_light: [0.15, 0.15, 0.15]
  # background: [0.7, 0.7, 0.75]

  # --- AMBIENTE: MIDNIGHT BLUE (Atmosfera Notturna) ---
  # ambient_light: [0.02, 0.02, 0.04]
  # background: [0.03, 0.03, 0.08]

  # --- AMBIENTE: WARM SUNSET (Luce Calda di Taglio) ---
  # ambient_light: [0.08, 0.05, 0.02]
  # background: [0.6, 0.3, 0.1]

  # --- AMBIENTE: THE VOID (Nero quasi assoluto — ATTENZIONE: i metalli saranno scuri) ---
  # ambient_light: [0.01, 0.01, 0.01]
  # background: [0.0, 0.0, 0.0]

camera:
  # --- Camera Principale (Prospettiva Classica) ---
  position: [0, 5, -8]
  look_at: [0, 0, 0]
  fov: 45
  aperture: 0.1
  focal_dist: 12

  # --- VISTA MACRO (Dettaglio sui Pezzi Centrali) ---
  # position: [1.5, 1.2, -4]
  # look_at: [0, 0.8, 0]
  # fov: 25.0
  # aperture: 0.2
  # focal_dist: 4.25

  # --- VISTA HERO (Angolo Basso e Imponente) ---
  # position: [0.0, 0.5, -6.5]
  # look_at: [0.0, 1.0, 0.5]
  # fov: 55.0
  # aperture: 0.1
  # focal_dist: 7.0

  # --- VISTA ZENITALE (Vista dall'alto tattica) ---
  # position: [0.0, 12, 0.01]
  # look_at: [0, 0, 0]
  # fov: 35
  # aperture: 0.0
  # focal_dist: 12.0

  # --- VISTA DUTCH ANGLE (Dinamica e Inclinata) ---
  # position: [6.0, 4.0, -6.0]
  # look_at: [0.0, 0.5, 0.0]
  # fov: 40.0
  # aperture: 0.1
  # focal_dist: 8.5

  # --- VISTA PAWN'S EYE (Ad altezza pedina, Bokeh estremo) ---
  # position: [0.0, 0.4, -3.5]
  # look_at: [0.0, 0.6, 2.0]
  # fov: 70.0
  # aperture: 0.3
  # focal_dist: 3.5

materials:
  - id: "table_wood"
    # --- Configurazione Corrente: Noce Satinato (Walnut) ---
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 3.2
      colors: [[0.25, 0.12, 0.05], [0.12, 0.06, 0.02]]
      randomize_offset: true
      rotation: [90, 0, 0]

    # --- VARIANTE: LEGNO LACCATO LUCIDO (Polished Rosewood) ---
    # type: "metal"
    # fuzz: 0.08
    # texture:
    #   type: "wood"
    #   scale: 22.0
    #   colors: [[0.35, 0.05, 0.02], [0.15, 0.02, 0.01]]

  - id: "board_checker"
    # --- Configurazione Corrente: Scacchiera con leggero riflesso ---
    # fuzz: 0.02 per avere un minimo di diffuse weight che cattura la luce diretta,
    # mantenendo i riflessi quasi speculari. fuzz=0.0 è specchio puro e non riceve
    # luce diretta Lambert — dipende completamente dalle riflessioni.
    type: "metal"
    fuzz: 0.02
    texture:
      type: "checker"
      scale: 0.125
      colors: [[0.95, 0.95, 0.95], [0.05, 0.05, 0.05]]

    # --- VARIANTE: SPECCHIO PURO (Richiede ambient > 0) ---
    # type: "metal"
    # fuzz: 0.0
    # texture:
    #   type: "checker"
    #   scale: 0.125
    #   colors: [[0.95, 0.95, 0.95], [0.05, 0.05, 0.05]]

    # --- VARIANTE: MARMO CLASSICO (Carrara & Marquina) ---
    # type: "metal"
    # fuzz: 0.02
    # texture:
    #   type: "checker"
    #   scale: 0.125
    #   colors: [[0.9, 0.9, 0.9], [0.1, 0.1, 0.1]]

    # --- VARIANTE: LEGNO CLASSICO (Acero & Noce) ---
    # type: "lambertian"
    # texture:
    #   type: "checker"
    #   scale: 0.125
    #   colors: [[0.8, 0.7, 0.5], [0.2, 0.1, 0.05]]

  - id: "board_border"
    # --- Configurazione Corrente: Metallo Brunito (Gunmetal) ---
    type: "metal"
    color: [0.15, 0.15, 0.18]
    fuzz: 0.12

  - id: "piece_white_solid"
    # --- Configurazione Corrente: Argento Lucido ---
    # fuzz: 0.02 per catturare highlight speculari e un minimo di luce diretta.
    # Con fuzz: 0.0 i pezzi dipendono al 100% da riflessioni + ambient.
    type: "metal"
    color: [0.95, 0.95, 0.95]
    fuzz: 0.02

    # --- VARIANTE: SPECCHIO PURO (Richiede buona illuminazione ambiente) ---
    # type: "metal"
    # color: [0.95, 0.95, 0.95]
    # fuzz: 0.0

    # --- VARIANTE: Marmo Bianco Lucido (Carrara) ---
    # type: "metal"
    # fuzz: 0.04
    # texture:
    #  type: "marble"
    #  scale: 30.0
    #  colors: [[0.98, 0.98, 0.98], [0.75, 0.75, 0.75]]
    #  noise_strength: 12.0
    #  randomize_offset: true
    #  randomize_rotation: true

    # --- VARIANTE: VETRO PURO (Clear Glass) ---
    # type: "dielectric"
    # refraction_index: 1.5

    # --- VARIANTE: PORCELLANA BIANCA (White Porcelain) ---
    # type: "lambertian"
    # color: [0.9, 0.9, 0.9]

  - id: "piece_black_solid"
    # --- Configurazione Corrente: Ceramica Nera Lucida ---
    # fuzz: 0.03 per catturare luce diretta e highlight. Aspetto "piano nero laccato".
    type: "metal"
    color: [0.1, 0.1, 0.1]
    fuzz: 0.03

    # --- VARIANTE: SPECCHIO NERO PURO (Richiede buona illuminazione ambiente) ---
    # type: "metal"
    # color: [0.1, 0.1, 0.1]
    # fuzz: 0.0

    # --- VARIANTE: Marmo Nero Lucido (Nero Marquina) ---
    # type: "metal"
    # fuzz: 0.08
    # texture:
    #  type: "marble"
    #  scale: 25.0
    #  colors: [[0.02, 0.02, 0.03], [0.15, 0.15, 0.2]]
    #  noise_strength: 20.0
    #  randomize_offset: true
    #  randomize_rotation: true

    # --- VARIANTE: VETRO FUMÉ (Tinted Glass) ---
    # type: "dielectric"
    # refraction_index: 1.5
    # color: [0.2, 0.2, 0.25]

    # --- VARIANTE: ORO PURO (Polished Gold) ---
    # type: "metal"
    # color: [1.0, 0.84, 0.0]
    # fuzz: 0.01

lights:
  # --- Configurazione Corrente: Three-Point Lighting per Metalli ---
  # Key Light — luce principale calda dall'alto-sinistra
  - type: "point"
    position: [-3, 10, -4]
    color: [1.0, 0.95, 0.9]
    intensity: 80

  # Fill Light — luce fredda più debole dall'altro lato, ammorbidisce le ombre
  - type: "point"
    position: [5, 6, -3]
    color: [0.85, 0.85, 1.0]
    intensity: 30

  # Back/Rim Light — luce posteriore per distaccare i pezzi dallo sfondo
  - type: "point"
    position: [0, 8, 6]
    color: [1.0, 0.95, 0.85]
    intensity: 40

  # --- SET: Luce Singola Forte (Studio Minimalista) ---
  # - { type: "point", position: [-2, 8, -2], color: [1.0, 0.95, 0.9], intensity: 50 }

  # --- SET: Area Light (Ombre Morbide — richiede shadow_samples, più lento) ---
  # - type: "area"
  #   corner: [-3.0, 9.0, -3.0]
  #   u: [6.0, 0.0, 0.0]
  #   v: [0.0, 0.0, 6.0]
  #   color: [1.0, 0.97, 0.92]
  #   intensity: 45.0
  #   shadow_samples: 16
