  # - { type: "point", position: [-8, 2, -2], color: [0.2, 0.2, 0.3], intensity: 20 }

  # --- SET: WARM SUNSET (Atmosfera pomeridiana calda) ---
  # - { type: "directional", direction: [-1, -0.3, -0.5], color: [1.0, 0.6, 0.2], intensity: 2.0 }
  # - { type: "point", position: [5, 3, -5], color: [0.3, 0.3, 0.4], intensity: 15 }

