# Scena: Studio Mattutino con Legno Chiaro venato
# Architetto: 3D-Ray Scene Architect
# Modifica: Implementazione texture 'wood' professionale e parametri PBR corretti

world:
  ambient_light: [0.05, 0.05, 0.07]
  background: [0.6, 0.7, 0.9] # Cielo azzurro visibile dalla finestra
  sky:
    type: "gradient"
    zenith: [0.2, 0.4, 0.8]
    horizon: [0.7, 0.8, 1.0]
    ground: [0.3, 0.3, 0.3]

camera:
  position: [3, 2.5, 4]
  look_at: [0, 0.8, 0]
  fov: 45
  aperture: 0.04 # Leggera sfocatura dello sfondo per profondità cinematografica
  focal_dist: 4.5

materials:
  # Legno professionale con texture 'wood' specifica di 3D-Ray
  - id: "legno_tavolo"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.0              # Frequenza degli anelli di crescita
      noise_strength: 1.5     # Turbolenza nelle venature per un look naturale
      # Sintassi array colors corretta secondo manuale
      colors: [[0.75, 0.62, 0.45], [0.48, 0.35, 0.22]]
      randomize_offset: true  # Sposta la texture per ogni oggetto (essenziale per le gambe)
      randomize_rotation: true # Ruota la grana per maggiore realismo
    roughness: 0.42           # Finitura satinata, non troppo opaca
    specular: 0.35            # Riflessione moderata
    metallic: 0.0             # Dielettrico puro
    anisotropic: 0.3          # Riflessione allungata tipica delle fibre legnose
    sheen: 0.15               # Effetto vellutato superficiale
    clearcoat: 0.08           # Sottile strato di vernice protettiva

  - id: "intonaco_muro"
    type: "lambertian"
    color: [0.92, 0.9, 0.88]

  - id: "pavimento_scuro"
    type: "disney"
    texture:
      type: "checker"   
      colors: [[0.08, 0.08, 0.08], [0.12, 0.12, 0.12]]
      scale: 2.0
    roughness: 0.2
    specular: 0.5

entities:
  # --- Struttura della Stanza ---
  - name: "pavimento"
    type: "box"
    material: "pavimento_scuro"
    scale: [10, 0.1, 10]
    translate: [0, -0.05, 0]

  - name: "muro_fondale"
    type: "box"
    material: "intonaco_muro"
    scale: [10, 5, 0.2]
    translate: [0, 2.5, -3]

  - name: "muro_laterale"
    type: "box"
    material: "intonaco_muro"
    scale: [0.2, 5, 10]
    translate: [-3, 2.5, 0]

  # --- Il Tavolo ---
  - name: "tavolo_pranzo"
    type: "group"
    children:
      # Piano del tavolo
      - type: "box"
        material: "legno_tavolo"
        scale: [2.2, 0.1, 1.2]
        translate: [0, 0.75, 0]
      # Gambe del tavolo
      - type: "box"
        material: "legno_tavolo"
        scale: [0.1, 0.7, 0.1]
        translate: [0.9, 0.35, 0.45]
      - type: "box"
        material: "legno_tavolo"
        scale: [0.1, 0.7, 0.1]
        translate: [-0.9, 0.35, 0.45]
      - type: "box"
        material: "legno_tavolo"
        scale: [0.1, 0.7, 0.1]
        translate: [0.9, 0.35, -0.45]
      - type: "box"
        material: "legno_tavolo"
        scale: [0.1, 0.7, 0.1]
        translate: [-0.9, 0.35, -0.45]

lights:
  # Luce finestra (Area Light) - Fonte di luce morbida principale
  - type: "area"
    corner: [-2.9, 1.5, -2]
    u: [0, 2, 0]
    v: [0, 0, 4]
    color: [1, 0.98, 0.95]
    intensity: 25.0 
    shadow_samples: 32

  # Luce di schiarita (Point Light)
  - type: "point"
    position: [4, 4, 2]
    color: [0.85, 0.9, 1.0]
    intensity: 10.0