# Ray-Tracing Scene - Commodore Amiga Juggler Tribute (High Detail)

world:
  ambient_light: [0.05, 0.05, 0.1] # Soft blue studio ambient
  background: [0.0, 0.0, 0.0]     # Space-like void
  ground:
    type: "infinite_plane"
    material: "floor_check"
    y: 0.0

camera:
  position: [0, 8, -22]
  look_at: [0, 6, 0]
  fov: 48
  aperture: 0.04
  focal_dist: 22.0

materials:
  - id: "floor_check"
    type: "metal"
    fuzz: 0.02
    texture:
      type: "checker"
      scale: 4.0                # Larger squares (4 units wide)
      colors: [[0.9, 0.9, 0.9], [0.1, 0.1, 0.1]]

  - id: "mirror_wall"
    type: "metal"
    color: [0.95, 0.95, 1.0]
    fuzz: 0.0                    # Perfect mirror

  - id: "jug_red"
    type: "lambertian"
    color: [0.8, 0.1, 0.1]

  - id: "jug_white"
    type: "lambertian"
    color: [0.9, 0.9, 0.9]

  - id: "jug_chrome"
    type: "metal"
    color: [0.9, 0.9, 0.95]
    fuzz: 0.04

  - id: "ball_shiny"
    type: "metal"
    color: [0.95, 0.8, 0.1]
    fuzz: 0.0

lights:
  - { type: "point", position: [-10, 15, -10], color: [1.0, 1.0, 1.0], intensity: 150 }
  - { type: "point", position: [10, 10, -5], color: [0.8, 0.8, 1.0], intensity: 100 }
  - { type: "directional", direction: [0, -1, 0.5], color: [0.2, 0.2, 0.3], intensity: 0.4 }

entities:
  # --- THE ROOM ---
  - name: "back_wall_mirror"
    type: "plane"
    point: [0, 0, 12]
    normal: [0, 0, -1]
    material: "mirror_wall"

  # --- THE FIGURE (DETAILED SPHERE-BASED HUMAN) ---
  
  # Feet
  - { name: "L_foot_base", type: "sphere", center: [-1.6, 0.6, 0], radius: 0.6, material: "jug_red" }
  - { name: "R_foot_base", type: "sphere", center: [1.6, 0.6, 0], radius: 0.6, material: "jug_white" }

  # Legs (Alternating colors)
  - { name: "L_leg_joint1", type: "sphere", center: [-1.6, 1.8, 0], radius: 0.6, material: "jug_white" }
  - { name: "L_leg_joint2", type: "sphere", center: [-1.4, 3.0, 0.2], radius: 0.6, material: "jug_red" }
  - { name: "L_leg_joint3", type: "sphere", center: [-1.2, 4.2, 0.4], radius: 0.6, material: "jug_white" }
  
  - { name: "R_leg_joint1", type: "sphere", center: [1.6, 1.8, 0], radius: 0.6, material: "jug_red" }
  - { name: "R_leg_joint2", type: "sphere", center: [1.4, 3.0, 0.2], radius: 0.6, material: "jug_white" }
  - { name: "R_leg_joint3", type: "sphere", center: [1.2, 4.2, 0.4], radius: 0.6, material: "jug_red" }

  # Pelvis & Torso
  - { name: "pelvis_core", type: "sphere", center: [0, 5.5, 0.2], radius: 0.8, material: "jug_white" }
  - { name: "torso_mid", type: "sphere", center: [0, 6.8, 0.1], radius: 0.75, material: "jug_red" }
  - { name: "torso_upper", type: "sphere", center: [0, 8.0, 0.0], radius: 0.8, material: "jug_white" }

  # Shoulders
  - { name: "L_shoulder", type: "sphere", center: [-1.8, 8.5, 0], radius: 0.65, material: "jug_white" }
  - { name: "R_shoulder", type: "sphere", center: [1.8, 8.5, 0], radius: 0.65, material: "jug_red" }

  # Neck & Head
  - { name: "neck", type: "sphere", center: [0, 9.2, 0], radius: 0.4, material: "jug_white" }
  - { name: "head", type: "sphere", center: [0, 10.6, 0.5], radius: 1.0, material: "jug_red" }

  # Left Arm (Bent in Action)
  - { name: "L_arm_upper_1", type: "sphere", center: [-2.6, 7.8, -0.8], radius: 0.55, material: "jug_red" }
  - { name: "L_arm_upper_2", type: "sphere", center: [-3.4, 7.0, -1.6], radius: 0.5, material: "jug_white" }
  - { name: "L_arm_elbow", type: "sphere", center: [-4.2, 6.2, -2.4], radius: 0.45, material: "jug_red" }
  - { name: "L_arm_lower_1", type: "sphere", center: [-4.8, 5.6, -3.2], radius: 0.4, material: "jug_white" }
  - { name: "L_arm_hand", type: "sphere", center: [-5.4, 5.0, -4.0], radius: 0.5, material: "jug_red" }

  # Right Arm (Raised in the Air)
  - { name: "R_arm_upper_1", type: "sphere", center: [2.6, 8.8, -0.8], radius: 0.55, material: "jug_white" }
  - { name: "R_arm_upper_2", type: "sphere", center: [3.4, 9.4, -1.6], radius: 0.5, material: "jug_red" }
  - { name: "R_arm_elbow", type: "sphere", center: [4.2, 10.2, -2.4], radius: 0.45, material: "jug_white" }
  - { name: "R_arm_lower_1", type: "sphere", center: [4.8, 11.2, -3.2], radius: 0.4, material: "jug_red" }
  - { name: "R_arm_hand", type: "sphere", center: [5.4, 12.0, -4.0], radius: 0.5, material: "jug_white" }

  # Juggling Balls (In the air sequence, moved in front of figure)
  - { name: "ball_1_low", type: "sphere", center: [-4.0, 6.5, -4.5], radius: 0.98, material: "ball_shiny" }
  - { name: "ball_2_high", type: "sphere", center: [0, 12.0, -4.5], radius: 0.98, material: "ball_shiny" }
  - { name: "ball_3_low", type: "sphere", center: [4.0, 10.8, -4.5], radius: 0.98, material: "ball_shiny" }
