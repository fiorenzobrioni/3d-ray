# 3D-Ray terrain preview scene — generated by TerrainGen --with-cameras
#
# Render with:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/alps-test-preview.yaml -o renders/preview-alps-test.png \
#     -w 1280 -H 720 -s 256 -d 6 -S 2 -c wide
#
# Cameras: wide | aerial | ground | sunrise | topdown
# List them with --list-cameras.

imports:
  - path: "libraries/terrain/alps-test.yaml"

world:
  ambient_light: [0.050, 0.050, 0.070]
  sky:
    type: "gradient"
    zenith_color:  [0.100, 0.200, 0.450]
    horizon_color: [0.920, 0.550, 0.300]
    ground_color:  [0.300, 0.200, 0.100]
    sun:
      direction: [-0.738, -0.422, -0.527]
      color: [1.000, 0.780, 0.550]
      intensity: 12.000
      size: 3.000
      falloff: 32.0
  medium:
    type: "height_fog"
    sigma_a: [0.001, 0.001, 0.0012]
    sigma_s: [0.010, 0.012, 0.016]
    y0: 0.0
    scale_height: 10.000
    phase: "hg"
    g: 0.6

lights:
  - type: "directional"
    direction: [0.793, -0.226, 0.566]
    color: [0.920, 0.550, 0.300]
    intensity: 1.200

cameras:
  - name: "wide"
    position: [200.000, 100.000, 180.000]
    look_at:  [0.000, 22.698, 0.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "aerial"
    position: [0.000, 185.000, 180.000]
    look_at:  [0.000, 0.000, 0.000]
    fov:      55.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "ground"
    position: [-60.000, 30.698, 60.000]
    look_at:  [60.000, 22.698, -60.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "sunrise"
    position: [-120.000, 34.698, -20.000]
    look_at:  [80.000, 22.698, 20.000]
    fov:      55.000
    aperture: 0.050
    focal_dist: 160.000

  - name: "topdown"
    position: [0.000, 300.000, 0.001]
    look_at:  [0.000, 0.000, 0.000]
    fov:      70.000
    aperture: 0.000
    focal_dist: 1.000

entities:
  - name: "terrain"
    type: "instance"
    template: "alps_test"
    translate: [0.000, 0.000, 0.000]
