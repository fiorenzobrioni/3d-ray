world:
  ambient_light: [0.04, 0.03, 0.02]
  sky:
    type: "gradient"
    zenith_color:  [0.15, 0.25, 0.55]  # Blu profondo in alto
    horizon_color: [0.85, 0.55, 0.25]  # Arancio caldo all'orizzonte
    ground_color:  [0.20, 0.15, 0.10]  # Marrone scuro sotto l'orizzonte
    sun:
      direction: [-0.8, -0.25, -0.5]   # Sole basso a sinistra
      color: [1.0, 0.85, 0.5]
      intensity: 2.0
      size: 4.0                         # Disco solare leggermente grande
      falloff: 24.0                     # Glow ampio e caldo
  ground:
    type: "infinite_plane"
    material: "ground_mat"
    y: 0

lights:
  # La directional light è allineata alla stessa direzione del sun disk.
  # Il sun disk è solo visuale (radiance per i raggi che escono dalla scena),
  # la directional light fornisce l'illuminazione diretta (NEE) sugli oggetti.
  - type: "directional"
    direction: [-0.8, -0.25, -0.5]
    color: [1.0, 0.88, 0.55]
    intensity: 1.2

  # Fill fredda dal lato opposto (simula luce del cielo)
  - type: "directional"
    direction: [0.5, -0.7, 0.3]
    color: [0.5, 0.6, 0.85]
    intensity: 0.3

cameras:
  - name: "front"
    position: [0, 7, 20]
    look_at: [0, 6.5, 0]
    fov: 45
    aperture: 0.05
    focal_dist: 18.0

  - name: "dynamic_low"
    position: [-8, 1, 12]
    look_at: [0, 6, 0]
    fov: 60
    aperture: 0.1
    focal_dist: 15.3

  - name: "close_up_head"
    position: [3, 10, 6]
    look_at: [0, 10, 0]
    fov: 35
    aperture: 0.05
    focal_dist: 6.7

  - name: "isometric"
    position: [12, 12, 12]
    look_at: [0, 5, 0]
    fov: 45
    aperture: 0.05
    focal_dist: 18.4

materials:
  - id: "ground_mat"
    type: "disney"
    color: [0.1, 0.1, 0.12]
    roughness: 0.4
    metallic: 0.2
    clearcoat: 0.3

  - id: "ground_mat_2"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 1.5
      colors: [[0.25, 0.22, 0.18], [0.35, 0.32, 0.26]]

  - id: "gundam_white"
    type: "disney"
    color: [0.85, 0.85, 0.85]
    roughness: 0.3
    metallic: 0.1
    clearcoat: 0.5

  - id: "gundam_blue"
    type: "disney"
    color: [0.1, 0.25, 0.6]
    roughness: 0.3
    metallic: 0.4
    clearcoat: 0.8

  - id: "gundam_red"
    type: "disney"
    color: [0.75, 0.1, 0.1]
    roughness: 0.3
    metallic: 0.3
    clearcoat: 0.8

  - id: "gundam_yellow"
    type: "disney"
    color: [0.9, 0.75, 0.1]
    roughness: 0.4
    metallic: 0.5

  - id: "gundam_gray"
    type: "disney"
    color: [0.25, 0.25, 0.25]
    roughness: 0.5
    metallic: 0.8

  - id: "eye_glow"
    type: "emissive"
    color: [0.2, 1.0, 0.2]
    intensity: 15.0

  - id: "beam_glow"
    type: "emissive"
    color: [1.0, 0.2, 0.8]
    intensity: 20.0

entities:
  - name: "Gundam"
    type: "group"
    translate: [0, 0, 0]
    children:
      # LEGS
      # Left Leg
      - type: "group"
        translate: [-1.4, 0, 0]
        children:
          # Foot
          - type: "box"
            scale: [1.2, 0.8, 2.0]
            translate: [0, 0.4, 0.2]
            material: "gundam_red"
          # Ankle Joint
          - type: "sphere"
            center: [0, 1.2, 0]
            radius: 0.5
            material: "gundam_gray"
          # Lower Leg
          - type: "box"
            scale: [1.4, 2.8, 1.6]
            translate: [0, 2.4, 0]
            material: "gundam_white"
          # Knee
          - type: "box"
            scale: [1.2, 1.0, 1.8]
            translate: [0, 4.0, 0.1]
            material: "gundam_gray"
          # Upper Leg
          - type: "box"
            scale: [1.2, 2.4, 1.2]
            translate: [0, 5.2, 0]
            material: "gundam_white"

      # Right Leg
      - type: "group"
        translate: [1.4, 0, 0]
        children:
          # Foot
          - type: "box"
            scale: [1.2, 0.8, 2.0]
            translate: [0, 0.4, 0.2]
            material: "gundam_red"
          # Ankle Joint
          - type: "sphere"
            center: [0, 1.2, 0]
            radius: 0.5
            material: "gundam_gray"
          # Lower Leg
          - type: "box"
            scale: [1.4, 2.8, 1.6]
            translate: [0, 2.4, 0]
            material: "gundam_white"
          # Knee
          - type: "box"
            scale: [1.2, 1.0, 1.8]
            translate: [0, 4.0, 0.1]
            material: "gundam_gray"
          # Upper Leg
          - type: "box"
            scale: [1.2, 2.4, 1.2]
            translate: [0, 5.2, 0]
            material: "gundam_white"

      # WAIST & PELVIS
      - type: "group"
        translate: [0, 6.8, 0]
        children:
          - type: "box"
            scale: [3.2, 1.4, 2.0]
            translate: [0, 0.7, 0]
            material: "gundam_white"
          # Center crotch piece
          - type: "box"
            scale: [0.8, 1.6, 2.2]
            translate: [0, 0.8, 0.1]
            material: "gundam_red"
          # Front skirts
          - type: "box"
            scale: [1.2, 1.6, 0.2]
            translate: [-0.9, 0.6, 1.0]
            rotate: [-15, 0, 0]
            material: "gundam_white"
          - type: "box"
            scale: [1.2, 1.6, 0.2]
            translate: [0.9, 0.6, 1.0]
            rotate: [-15, 0, 0]
            material: "gundam_white"

      # TORSO
      - type: "group"
        translate: [0, 8.2, 0]
        children:
          # Core/Abdomen
          - type: "box"
            scale: [2.0, 1.6, 1.6]
            translate: [0, 0.8, 0]
            material: "gundam_red"
          # Upper Chest
          - type: "box"
            scale: [3.4, 2.2, 2.0]
            translate: [0, 2.5, 0]
            material: "gundam_blue"
          # Chest Vents
          - type: "box"
            scale: [1.0, 0.6, 2.1]
            translate: [-1.0, 2.5, 0]
            material: "gundam_yellow"
          - type: "box"
            scale: [1.0, 0.6, 2.1]
            translate: [1.0, 2.5, 0]
            material: "gundam_yellow"
          # Cockpit hatch
          - type: "box"
            scale: [0.8, 1.0, 2.2]
            translate: [0, 1.6, 0]
            material: "gundam_red"

      # LEFT ARM
      - type: "group"
        translate: [-2.2, 10.7, 0]
        children:
          # Shoulder joint
          - type: "cylinder"
            center: [0, 0, 0]
            radius: 0.5
            height: 1.0
            rotate: [0, 0, 90]
            material: "gundam_gray"
          # Shoulder armor
          - type: "box"
            scale: [1.6, 1.4, 1.8]
            translate: [-0.5, 0.4, 0]
            material: "gundam_white"
          - type: "box"
            scale: [1.8, 0.6, 2.0]
            translate: [-0.5, 0.4, 0]
            material: "gundam_blue"
          # Upper arm
          - type: "box"
            scale: [0.8, 2.0, 0.8]
            translate: [-0.5, -1.2, 0]
            material: "gundam_white"
          # Elbow
          - type: "sphere"
            center: [-0.5, -2.4, 0]
            radius: 0.5
            material: "gundam_gray"
          # Lower arm
          - type: "box"
            scale: [1.0, 2.4, 1.0]
            translate: [-0.5, -3.8, 0]
            material: "gundam_white"
          # Hand
          - type: "box"
            scale: [0.8, 0.8, 0.8]
            translate: [-0.5, -5.2, 0]
            material: "gundam_gray"

      # RIGHT ARM
      - type: "group"
        translate: [2.2, 10.7, 0]
        children:
          # Shoulder joint
          - type: "cylinder"
            center: [0, 0, 0]
            radius: 0.5
            height: 1.0
            rotate: [0, 0, 90]
            material: "gundam_gray"
          # Shoulder armor
          - type: "box"
            scale: [1.6, 1.4, 1.8]
            translate: [0.5, 0.4, 0]
            material: "gundam_white"
          - type: "box"
            scale: [1.8, 0.6, 2.0]
            translate: [0.5, 0.4, 0]
            material: "gundam_blue"
          # Upper arm
          - type: "box"
            scale: [0.8, 2.0, 0.8]
            translate: [0.5, -1.2, 0]
            material: "gundam_white"
          # Elbow
          - type: "sphere"
            center: [0.5, -2.4, 0]
            radius: 0.5
            material: "gundam_gray"
          # Lower arm
          - type: "box"
            scale: [1.0, 2.4, 1.0]
            translate: [0.5, -3.8, 0]
            material: "gundam_white"
          # Hand
          - type: "box"
            scale: [0.8, 0.8, 0.8]
            translate: [0.5, -5.2, 0.4]
            material: "gundam_gray"
          
          # Beam Saber Group
          - type: "group"
            translate: [0.5, -5.2, 0.4]
            rotate: [70, 0, 0]
            children:
              - type: "cylinder"
                center: [0, -0.6, 0]
                radius: 0.15
                height: 1.2
                material: "gundam_gray"
              - type: "cylinder"
                center: [0, 0.6, 0]
                radius: 0.2
                height: 6.0
                material: "beam_glow"

      # HEAD
      - type: "group"
        translate: [0, 11.8, 0]
        children:
          # Neck
          - type: "cylinder"
            center: [0, 0, 0]
            radius: 0.4
            height: 0.8
            material: "gundam_gray"
          # Helmet Main
          - type: "box"
            scale: [1.4, 1.4, 1.6]
            translate: [0, 1.0, 0]
            material: "gundam_white"
          # Faceplate
          - type: "box"
            scale: [0.7, 0.8, 1.7]
            translate: [0, 0.8, 0.1]
            material: "gundam_gray"
          # Chin red piece
          - type: "box"
            scale: [0.3, 0.4, 1.8]
            translate: [0, 0.5, 0.1]
            material: "gundam_red"
          # Eyes (glowing green)
          - type: "box"
            scale: [0.7, 0.2, 1.75]
            translate: [0, 1.0, 0.1]
            material: "eye_glow"
          # V-Fin Antenna (Left)
          - type: "box"
            scale: [0.1, 1.2, 0.1]
            translate: [-0.4, 1.6, 0.85]
            rotate: [0, 0, 45]
            material: "gundam_yellow"
          # V-Fin Antenna (Right)
          - type: "box"
            scale: [0.1, 1.2, 0.1]
            translate: [0.4, 1.6, 0.85]
            rotate: [0, 0, -45]
            material: "gundam_yellow"
          # V-Fin Center
          - type: "box"
            scale: [0.3, 0.3, 0.15]
            translate: [0, 1.3, 0.85]
            material: "gundam_red"
          # Center Head Camera
          - type: "box"
            scale: [0.3, 0.4, 1.65]
            translate: [0, 1.7, 0.1]
            material: "eye_glow"
