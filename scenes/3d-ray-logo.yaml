# ═════════════════════════════════════════════════════════════════════════════
#  3D-RAY Logo — Hero Showcase v2 (production-grade ground + 3-point pro)
# ═════════════════════════════════════════════════════════════════════════════
#  Restyling 2026 — restyling fotorealistico con materiali da library, palco
#  marmo riflettente, sfera cristallo zaffiro, chrome reposizionato, sky
#  Preetham golden hour e illuminazione 3-point area-light cinematografica.
#
#  Lineup materiali lettere (no vetri):
#   ─ 3 : oro lucido           dis_oro_lucido        (caldo, hero metallic)
#   ─ D : marmo bianco         dis_carrara_studio_lucido  (sostituisce vetro)
#   ─ R : mogano laccato       dis_mogano_laccato    (legno con clearcoat)
#   ─ A : argento brunito      dis_argento_brunito   (metallic freddo opaco)
#   ─ Y : porcellana bianca    dis_porcellana_bianca (ceramica con SSS)
#
#  Sfere:
#   ─ cristallo limpido        front-destra  (Disney spec_trans, ior 1.55)
#   ─ cristallo zaffiro blu    front-sinistra (transmission_color blu, ior 1.77)
#   ─ chrome reflector         dietro centrato (radius 2.2, riflette il logo)
#
#  Feature `world.ground` esercitate:
#   ─ type dispatch `quad` con size 30 (palco marmo finito)
#   ─ material di library risolto per ID
#   ─ uv_scale per fitting del pattern marmo
#
#  Profili rendering (CLI):
#   ─ Preview  : -w 640  -H 360  -s 96   -d 8  -S 2 -c hero
#   ─ Standard : -w 1280 -H 720  -s 384  -d 10 -S 4 -c three_quarter -C 25
#   ─ Final    : -w 1920 -H 1080 -s 1536 -d 12 -S 6 -c hero -C 30 --sampler sobol
# ═════════════════════════════════════════════════════════════════════════════

imports:
  - path: "libraries/fonts/font-open-sans.yaml"
  - path: "libraries/materials/metals.yaml"
  - path: "libraries/materials/stones.yaml"
  - path: "libraries/materials/woods.yaml"
  - path: "libraries/materials/ceramics.yaml"

# ═════════════════════════════════════════════════════════════════════════════
#  WORLD — Preetham golden hour + ground marmo + leggera foschia
# ═════════════════════════════════════════════════════════════════════════════
world:
  sky:
    type: "nishita"                                 # cinematografico, varianza più alta ma sicuro
    turbidity: 3.5
    intensity: 0.85
    sun:
      direction:      [-0.55, 0.45, 0.6]            # golden hour mid-morning (no sunset saturo)
      angular_radius: 0.4
      limb_darkening: true
      shadow_samples: 6

  ground:
    type: "quad"                                    # palco finito sotto il logo
    size: 25                                        # 50×50 m sufficienti per riflessi
    material: "dis_carrara_studio"                  # marmo studio NON lucido (meno riflesso, no washout)
    uv_scale: [3, 3]                                # fit del pattern marmo

  medium:
    type: "height_fog"
    sigma_a: [0.003, 0.004, 0.005]
    sigma_s: [0.006, 0.008, 0.010]
    y0: 0
    scale_height: 1.5
    phase: "hg"
    g: 0.5

  # ─── Variante Preetham (commentata, swap-in opzionale per tonalità diverse) ─
  # sky:
  #   type: "preetham"
  #   turbidity: 3.5
  #   ground_albedo: [0.48, 0.42, 0.36]
  #   sun: { direction: [-0.55, 0.45, 0.6], angular_radius: 0.4, limb_darkening: true, shadow_samples: 6 }

# ═════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═════════════════════════════════════════════════════════════════════════════
cameras:

  - name: "hero"                                    # 3/4 centrale con DOF
    position: [0.0, 3.0, 12.0]
    look_at:  [0.0, 1.3, 0.0]
    vup:      [0.0, 1.0, 0.0]
    fov: 48
    aperture:  0.10
    focal_pos: [0.0, 1.3, 0.5]

  - name: "three_quarter"                           # angolo laterale
    position: [-6.5, 3.0, 10.5]
    look_at:  [-0.5, 1.1, 0.0]
    vup:      [0.0, 1.0, 0.0]
    fov: 44
    aperture:   0.10
    focal_dist: 11.0

  - name: "closeup_D"                               # macro sul marmo
    position: [1.94, 1.0, 3.2]
    look_at:  [1.94, 0.9, 0.0]
    vup:      [0.0, 1.0, 0.0]
    fov: 50
    aperture:   0.06
    focal_dist: 3.2

  # ─── Closeup Y (porcellana) — opzione 4 commentata per debug visivo ──────
  # - name: "closeup_y"
  #   position: [-3.95, 1.0, 2.8]
  #   look_at:  [-3.95, 0.9, 0.0]
  #   vup: [0.0, 1.0, 0.0]
  #   fov: 50
  #   aperture: 0.06
  #   focal_dist: 2.8

# ═════════════════════════════════════════════════════════════════════════════
#  LIGHTS — 3-point area: key calda + fill fredda + rim posteriore
# ═════════════════════════════════════════════════════════════════════════════
lights:

  # ─── KEY — sphere light calda anteriore-destra (off-camera "softbox") ────
  # Funge da softbox stretto: stacca le lettere dalla luce diffusa del cielo
  # e crea highlight specifici su oro/marmo/argento. `visible_to_camera:
  # false` nasconde il disco luminoso dallo sfondo mantenendolo come
  # sorgente di illuminazione (parità Arnold `light.camera: false`).
  - type: "sphere"
    position: [4.5, 4.0, 3.5]
    radius:   0.6
    color:    [1.00, 0.92, 0.78]
    intensity: 80
    visible_to_camera: false

  # ─── RIM — sphere light dietro alto-sinistra (separa dall'orizzonte) ─────
  - type: "sphere"
    position: [-4.5, 3.5, -2.5]
    radius:   0.4
    color:    [1.00, 0.70, 0.40]
    intensity: 50
    visible_to_camera: false

# ═════════════════════════════════════════════════════════════════════════════
#  MATERIALS — fallback font, sfere cristallo (limpido + zaffiro), chrome
#  I materiali delle lettere arrivano dagli `imports:` sopra.
# ═════════════════════════════════════════════════════════════════════════════
materials:

  # Fallback per i template del font (se un'istanza scordasse l'override).
  - id: "font_material"
    type: "lambertian"
    color: [0.60, 0.60, 0.62]

  # ─── Sfera cromata DIETRO il logo (riflette le 5 lettere) ─────────────────
  - id: "mat_chrome_sphere"
    type: "disney"
    color: [0.95, 0.96, 0.97]
    metallic: 1.0
    roughness: 0.02
    specular: 1.0

  # ─── Sfera cristallo limpido in primo piano (vetro neutro) ────────────────
  - id: "mat_crystal_sphere"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    metallic: 0.0
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.55

  # ─── Sfera cristallo ZAFFIRO BLU in primo piano (vetro tinto cool) ────────
  # Beer-Lambert: la luce attraversa il volume e viene tinta dal cammino,
  # producendo blu profondo nei punti più spessi (cuore della sfera).
  - id: "mat_crystal_sphere_sapphire"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    metallic: 0.0
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.77
    transmission_color: [0.10, 0.25, 0.85]
    transmission_depth: 0.5

  # ─── Y — VARIANTE EMISSIVA (per swap inline su `letter_Y`) ────────────────
  # Showcase NEE da geometria emissiva: la lettera diventa una sorgente.
  # Quando in uso, considerare `-C 25` e abbassare la rim light.
  - id: "mat_y_emissivo"
    type: "emissive"
    color: [0.0, 0.0, 1.00]
    intensity: 8

# ═════════════════════════════════════════════════════════════════════════════
#  ENTITIES — 5 lettere "3DRAY" + 2 sfere cristallo davanti + chrome dietro
# ═════════════════════════════════════════════════════════════════════════════
entities:

  # ── "3" — oro lucido (hero metallic caldo) ────────────────────────────────
  - name: "letter_3"
    type: "instance"
    template: "numero_3_open-sans"
    material: "dis_oro_lucido"
    rotate:    [-90, 180, 0]
    translate: [3.28, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── "D" — marmo Carrara lucido (sostituisce il vecchio vetro) ─────────────
  - name: "letter_D"
    type: "instance"
    template: "lettera_d_maiusc_open-sans"
    material: "dis_carrara_studio_lucido"
    rotate:    [-90, 180, 0]
    translate: [1.94, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── "R" — mogano laccato (legno con clearcoat) ────────────────────────────
  - name: "letter_R"
    type: "instance"
    template: "lettera_r_maiusc_open-sans"
    material: "dis_mogano_laccato"
    rotate:    [-90, 180, 0]
    translate: [-0.50, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── "A" — argento brunito (metallic freddo opaco) ─────────────────────────
  - name: "letter_A"
    type: "instance"
    template: "lettera_a_maiusc_open-sans"
    material: "dis_argento_brunito"
    rotate:    [-90, 180, 0]
    translate: [-1.9, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── "Y" — porcellana bianca (ceramica matte con SSS) ──────────────────────
  - name: "letter_Y"
    type: "instance"
    template: "lettera_y_maiusc_open-sans"
    material: "dis_porcellana_bianca"
    rotate:    [-90, 180, 0]
    translate: [-3.00, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── Y — VARIANTE EMISSIVA (swap-in opzionale) ─────────────────────────────
  # - name: "letter_Y"
  #   type: "instance"
  #   template: "lettera_y_maiusc_open-sans"
  #   material: "mat_y_emissivo"
  #   rotate:    [-90, 180, 0]
  #   translate: [-3.00, 0.75, 0.5]
  #   scale:     [1.5, 2.5, 1.5]

  # ── Chrome reflector dietro a destra (riflette le lettere centrali) ──────
  # Posizionato a distanza per non monopolizzare la composizione, raggio
  # ridotto per non oscurare le lettere dietro nel framing camera.
  - name: "chrome_back_sphere"
    type: "sphere"
    material: "mat_chrome_sphere"
    center: [5.5, 1.6, -3.5]
    radius: 1.4

  # ── Cristallo limpido davanti-destra (più grande per essere visibile) ─────
  - name: "crystal_front_clear"
    type: "sphere"
    material: "mat_crystal_sphere"
    center: [-2.4, 0.55, 2.6]
    radius: 0.55

  # ── Cristallo ZAFFIRO BLU davanti-sinistra (Beer-Lambert) ─────────────────
  - name: "crystal_front_sapphire"
    type: "sphere"
    material: "mat_crystal_sphere_sapphire"
    center: [-1.0, 0.45, 2.6]
    radius: 0.45
