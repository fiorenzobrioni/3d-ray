# ═══════════════════ #
#    3D RAY Logo      #
# ═══════════════════ #

imports:
  - path: "libraries/fonts/font-open-sans.yaml"

# ═════════════════════════════════════════════════════════════════════════════
#  WORLD
# ═════════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "nishita"
    turbidity: 4.0
    intensity: 0.8
    sun:
      direction:      [-0.85, 0.12, 0.4]   # sun just above horizon
      angular_radius: 0.5                   # slightly enlarged for cinematic glow
      limb_darkening: true
      shadow_samples: 4
  ground:
    type: "infinite_plane"
    material: "mat_pavimento"
    y: 0.0
  medium:
    type: height_fog
    sigma_a: [0.012, 0.014, 0.018]
    sigma_s: [0.040, 0.045, 0.050]
    y0: 0
    scale_height: 0.8
    phase: "hg"
    g: 0.50

# ═════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═════════════════════════════════════════════════════════════════════════════
cameras:
  - name: "hero"
    position:    [0.0, 2.2, 6.5]
    look_at:     [0.0, 1.5, 0.0]
    vup:         [0.0, 1.0, 0.0]
    fov: 45
    #aperture: 0.05
    #focal_dist: 6.5

  - name: "three_quarter"
    position:    [-3.4, 2.2, 6.5]
    look_at:     [-0.42, 1.1, 0.0]
    vup:         [0.0, 1.0, 0.0]
    fov:         38
    #aperture:    0.10
    #focal_pos:   [3.4, 1.8, -1.7]

  - name: "closeup_y"
    position:    [-3.95, 1.0, 2.2]
    look_at:     [-3.95, 0.9, 0.0]
    vup:         [0.0, 1.0, 0.0]
    fov: 42
    aperture: 0.08
    focal_dist: 2.2

# ═════════════════════════════════════════════════════════════════════════════
#  LIGHTS — 3-point + accento verde per la giada
# ═════════════════════════════════════════════════════════════════════════════
lights:

  - type: spot
    position: [0, 5, 6]
    direction: [0.0, -0.3, -0.5]
    color: [1.0, 0.92, 0.78]
    intensity: 400
    inner_angle: 20
    outer_angle: 36

# ═════════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═════════════════════════════════════════════════════════════════════════════
materials:

  # Fallback per i template del font (se un'instance scordasse l'override).
  - id: "font_material"
    type: "lambertian"
    color: [0.60, 0.60, 0.62]

  # Pavimento: cemento lucido scuro, riflette le lettere.
  - id: "-mat_pavimento"
    type: "lambertian"
    texture:
      type: "checker"
      colors: [[0.06, 0.06, 0.06], [0.12, 0.1, 0.08]]
      scale: 1.5
    
  - id: "mat_pavimento"
    type: "disney"
    color: [0.06, 0.065, 0.080]
    metallic: 0.0
    roughness: 0.1
    specular: 0.6 # 0.6
    texture:
      type: "checker"
      colors: [[0.06, 0.06, 0.06], [0.12, 0.1, 0.08]]
      scale: 1.5

  # ─── 3 ─ ORO LUCIDO (metallic + Kulla-Conty multi-scatter) ──────────────
  - id: "mat_3_oro"
    type: "disney"
    color: [1.00, 0.78, 0.34]
    metallic: 1.0
    roughness: 0.05
    specular: 0.6

  # ─── D ─ VETRO TINTO AZZURRO (spec_trans + Beer-Lambert) ────────────────
  - id: "mat_d_vetro"
    type: "disney"
    color: [0.97, 0.97, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.70
    specular: 0.90
    transmission_color: [0.85, 0.95, 1.00]
    transmission_depth: 0.6

  # ─── R ─ VERNICE ROSSA CLEARCOAT (coat_ior + coat_roughness, stile Arnold)
  - id: "mat_r_carpaint"
    type: "disney"
    color: [0.78, 0.05, 0.06]
    metallic: 0.4
    roughness: 0.35
    specular: 0.6
    clearcoat: 1.0
    coat_ior: 1.55
    coat_roughness: 0.04

  # ─── A ─ ACCIAIO BRUSHED (anisotropic GGX) ──────────────────────────────
  - id: "mat_a_acciaio_brushed"
    type: "disney"
    color: [0.78, 0.79, 0.82]
    metallic: 1.0
    roughness: 0.32
    anisotropic: 0.85
    anisotropic_rotation: 0.0

  # ─── Y ─ GIADA con SUBSURFACE SCATTERING (default) ──────────────────────
  - id: "mat_y_giada"
    type: "disney"
    color: [0.15, 0.55, 0.32]
    metallic: 0.0
    roughness: 0.18
    specular: 0.55
    subsurface: 0.6
    #subsurface_color: [0.45, 0.85, 0.55]
    subsurface_color: [0.10, 0.30, 0.14]

  # ─── Y ─ VARIANTE EMISSIVA (per scommentare l'instance qui sotto) ──────
  # Showcase NEE da geometria emissiva: la lettera diventa una luce.
  # Quando in uso, considerare `-C 25` e abbassare il point verde sopra.
  - id: "mat_y_emissivo"
    type: "emissive"
    color: [0.0, 0.0, 1.00]
    intensity: 8

  # ─── Sfera cromata dietro la D (chrome reflector) ───────────────────────
  - id: "mat_chrome_sphere"
    type: "disney"
    color: [0.95, 0.96, 0.97]
    metallic: 1.0
    roughness: 0.02
    specular: 1.0

  # ─── Sfera di cristallo trasparente in primo piano (vetro neutro) ───────
  - id: "mat_crystal_sphere"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    metallic: 0.0
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.55

# ═════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═════════════════════════════════════════════════════════════════════════════
entities:

  # ── "3" ─ Oro lucido ────────────────────────────────────────────────────
  - name: "letter_3"
    type: "instance"
    template: "numero_3_open-sans"
    material: "mat_3_oro"
    rotate:    [-90, 180, 0]
    translate: [3.28, 0.75, 0.5]
    scale: [1.5, 2.5, 1.5]

  # ── "D" ─ Vetro tinto ──────────────────────────────────────────────────
  - name: "letter_D"
    type: "instance"
    template: "lettera_d_maiusc_open-sans"
    material: "mat_d_vetro"
    rotate:    [-90, 180, 0]
    translate: [1.94, 0.75, 0.5]
    scale: [1.5, 2.5, 1.5]

  # ── "R" ─ Vernice rossa con clearcoat ──────────────────────────────────
  - name: "letter_R"
    type: "instance"
    template: "lettera_r_maiusc_open-sans"
    material: "mat_r_carpaint"
    rotate:    [-90, 180, 0]
    translate: [-0.50, 0.75, 0.5]
    scale: [1.5, 2.5, 1.5]

  # ── "A" ─ Acciaio brushed anisotropico ─────────────────────────────────
  - name: "letter_A"
    type: "instance"
    template: "lettera_a_maiusc_open-sans"
    material: "mat_a_acciaio_brushed"
    rotate:    [-90, 180, 0]
    translate: [-1.9, 0.75, 0.5]
    scale: [1.5, 2.5, 1.5]

  # ── "Y" ─ DEFAULT: giada ───────────────────────────────────────────────
  - name: "letter_Y"
    type: "instance"
    template: "lettera_y_maiusc_open-sans"
    material: "mat_y_giada"
    rotate:    [-90, 180, 0]
    translate: [-3.00, 0.75, 0.5]
    scale:     [1.5, 2.5, 1.5]

  # ── "Y" ─ VARIANTE EMISSIVA ─────────────────────────────────────────────
  # Per swappare la Y al materiale emissivo
  # - name: "letter_Y"
  #   type: "instance"
  #   template: "lettera_y_maiusc_open-sans"
  #   material: "mat_y_emissivo"
  #   rotate:    [-90, 180, 0]
  #   translate: [-3.00, 0.75, 0.5]
  #   scale:     [1.5, 2.5, 1.5]

  # ── Sfera cromata DIETRO ────────────────────────────────
  - name: "chrome_back_sphere"
    type: "sphere"
    material: "mat_chrome_sphere"
    center: [3.4, 1.8, -3.5]
    radius: 1.8

  # ── Sfere di cristallo IN PRIMO PIANO ───────────────────
  - name: "crystal_front_sphere"
    type: "sphere"
    material: "mat_crystal_sphere"
    center: [-1.95, 0.3, 2.0]
    radius: 0.3

  - name: "crystal_front_sphere2"
    type: "sphere"
    material: "mat_crystal_sphere"
    center: [-1.15, 0.2, 2.0]
    radius: 0.2
