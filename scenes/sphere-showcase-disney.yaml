# =============================================================================
#  SPHERE SHOWCASE DISNEY — Espositore 6×6 Sfere di Materiali PBR Moderni
# =============================================================================
#
#  Versione ENHANCED v2: materiali Disney avanzati, multi-camera, setup luci
#  cinematografico (solo point/spot/directional, zero area light, zero emissive),
#  ambientazione curata con muri in stucco e pavimento riflettente.
#  Nessun gradient sky (stanza chiusa) — render molto più veloce.
#
#  Camere disponibili (--camera <nome>):
#    hero          Vista 3/4 classica con DOF (default)
#    frontale      Simmetrica centrata, stile catalogo
#    closeup       Primo piano estremo sulle gemme
#    zenitale      Dall'alto, pianta dell'espositore
#    drammatica    Angolo basso eye-level con le sfere
#    macro_metalli Macro sulla fila metalli con bokeh
#
#  Render consigliati:
#    Preview:    -w 600  -H 400 -s 8   -d 12
#    Draft:      -w 1200 -H 800 -s 32  -d 30
#    Produzione: -w 1920 -H 1080 -s 256 -d 50
#
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  # Ambient leggermente alzato per compensare l'assenza del gradient sky
  ambient_light: [0.025, 0.025, 0.03]
  # Sfondo quasi nero — stanza chiusa, nessun cielo visibile
  background: [0.003, 0.003, 0.008]

  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0


# =============================================================================
#  CAMERAS
# =============================================================================
cameras:

  # ── Hero: vista 3/4 classica, DOF sulle sfere centrali ────────────────
  - name:       hero
    position:   [2.0, 3.8, -6.0]
    look_at:    [0.0, 1.15, 0.0]
    fov:        36
    aperture:   0.06
    focal_dist: 7.2

  # ── Frontale: simmetrica centrata, stile catalogo ─────────────────────
  - name:       frontale
    position:   [0.0, 3.5, -6.5]
    look_at:    [0.0, 1.15, 0.0]
    fov:        38
    aperture:   0.04
    focal_dist: 7.0

  # ── Closeup: primo piano sulle gemme (prima fila) ────────────────────
  - name:       closeup
    position:   [0.5, 1.8, -4.0]
    look_at:    [0.0, 1.22, -2.0]
    fov:        30
    aperture:   0.12
    focal_dist: 2.5

  # ── Zenitale: vista dall'alto per pianta dell'espositore ──────────────
  - name:       zenitale
    position:   [0.0, 7.0, 0.01]
    look_at:    [0.0, 1.0, 0.0]
    vup:        [0, 0, 1]
    fov:        42
    aperture:   0.0
    focal_dist: 6.0

  # ── Drammatica: angolo basso eye-level con le sfere ───────────────────
  - name:       drammatica
    position:   [3.5, 1.3, -5.0]
    look_at:    [0.0, 1.22, 0.0]
    fov:        50
    aperture:   0.08
    focal_dist: 6.0

  # ── Macro metalli: bokeh estremo sulla fila metalli ───────────────────
  - name:       macro_metalli
    position:   [1.0, 1.5, -3.8]
    look_at:    [0.0, 1.22, -1.35]
    fov:        25
    aperture:   0.20
    focal_dist: 3.0


# =============================================================================
#  MATERIALS (Disney BSDF — Enhanced)
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  AMBIENTE: Pavimento e Stanza  [OTTIMIZZATO → lambertian]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Pavimento in pietra levigata scura — checker discreto
  - id: "floor_stone"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.15, 0.13, 0.12], [0.20, 0.18, 0.16]]
 
  # Muro in stucco veneziano
  - id: "wall_stucco"
    type: "lambertian"
    color: [0.22, 0.20, 0.19]
 
  # Soffitto — superficie di rimbalzo luce
  - id: "ceiling_paint"
    type: "lambertian"
    color: [0.32, 0.30, 0.28]

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO  [OTTIMIZZATO → lambertian/metal]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Piano del tavolo in legno scuro — texture venata preservata
  - id: "table_top"
    type: "metal"
    fuzz: 0.35
    texture:
      type: "wood"
      scale: 2.5
      noise_strength: 2.5
      colors: [[0.35, 0.2, 0.1], [0.2, 0.1, 0.04]]
      rotation: [0, 30, 0]
 
  # Corpo tavolo — legno scuro opaco (non visibile nelle viste principali)
  - id: "table_body"
    type: "lambertian"
    color: [0.15, 0.09, 0.04]

  # ─────────────────────────────────────────────────────────────────────────
  #  ESPOSITORE  [OTTIMIZZATO → lambertian/metal]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Cornice in noce — texture legno preservata
  - id: "case_wood"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 3.0
      colors: [[0.42, 0.26, 0.13], [0.28, 0.16, 0.07]]
      randomize_rotation: true
 
  # Base in velluto scuro
  - id: "case_felt"
    type: "lambertian"
    color: [0.04, 0.04, 0.06]
 
  # Divisori — listelli sottili tra le file
  - id: "case_divider"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 6.0
      noise_strength: 2.0
      colors: [[0.38, 0.23, 0.12], [0.25, 0.14, 0.06]]
 
  # Bordino metallico dell'espositore — acciaio satinato
  - id: "case_trim"
    type: "metal"
    color: [0.60, 0.58, 0.55]
    fuzz: 0.35

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 6 — PLASTICHE MORBIDE / ORGANICHE
  #
  #  Ogni sfera simula un materiale morbido diverso: silicone, schiuma,
  #  pelle sintetica, cera d'api, marshmallow, sapone artigianale.
  # ─────────────────────────────────────────────────────────────────────────

  # Rosa cipria — silicone morbido con leggero sheen di superficie
  - id: "soft_pink"
    type: "disney"
    color: [0.92, 0.55, 0.58]
    roughness: 0.95
    subsurface: 0.45
    specular: 0.2
    sheen: 0.4
    sheen_tint: 0.6

  # Azzurro cielo — gomma schiumosa opaca, quasi zero riflesso
  - id: "soft_sky"
    type: "disney"
    color: [0.50, 0.65, 0.92]
    roughness: 1.0
    subsurface: 0.35
    specular: 0.1
    sheen: 0.2
    sheen_tint: 0.4

  # Menta — pelle sintetica con subsurface pronunciato
  - id: "soft_mint"
    type: "disney"
    color: [0.48, 0.85, 0.58]
    roughness: 0.85
    subsurface: 0.55
    specular: 0.3
    sheen: 0.15
    sheen_tint: 0.5

  # Limone — cera d'api, subsurface forte e specular basso
  - id: "soft_lemon"
    type: "disney"
    color: [0.95, 0.88, 0.42]
    roughness: 0.75
    subsurface: 0.7
    specular: 0.35
    sheen: 0.05

  # Lavanda — marshmallow, subsurface altissimo per traslucenza
  - id: "soft_lavender"
    type: "disney"
    color: [0.70, 0.55, 0.88]
    roughness: 0.92
    subsurface: 0.65
    specular: 0.15
    sheen: 0.3
    sheen_tint: 0.7

  # Pesca — sapone artigianale, sheen pronunciato al radente
  - id: "soft_peach"
    type: "disney"
    color: [0.95, 0.68, 0.48]
    roughness: 0.88
    subsurface: 0.4
    specular: 0.25
    sheen: 0.6
    sheen_tint: 0.8

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 5 — PLASTICHE DURE / FINITURE INDUSTRIALI
  #
  #  Vernice auto, lacca pianoforte, ceramica smaltata, ABS, bakelite,
  #  porcellana. Clearcoat e clearcoat_gloss differenziati.
  # ─────────────────────────────────────────────────────────────────────────

  # Rosso ciliegia — vernice auto con clearcoat alto e glossy
  - id: "hard_cherry"
    type: "disney"
    color: [0.78, 0.04, 0.04]
    roughness: 0.28
    clearcoat: 1.0
    clearcoat_gloss: 0.95
    specular: 0.6
    metallic: 0.0

  # Blu royal — lacca profonda tipo pianoforte
  - id: "hard_royal"
    type: "disney"
    color: [0.04, 0.06, 0.72]
    roughness: 0.05
    clearcoat: 1.0
    clearcoat_gloss: 1.0
    specular: 0.8
    metallic: 0.0

  # Verde bosco — ceramica smaltata, clearcoat satinato
  - id: "hard_forest"
    type: "disney"
    color: [0.06, 0.48, 0.10]
    roughness: 0.20
    clearcoat: 0.7
    clearcoat_gloss: 0.75
    specular: 0.5
    specular_tint: 0.3

  # Giallo girasole — ABS lucido tipo LEGO, riflesso netto
