      colors: [[0.62, 0.22, 0.10], [0.42, 0.13, 0.04]]
      randomize_offset: true
      randomize_rotation: true
    roughness: 0.35
    clearcoat: 0.8
    clearcoat_gloss: 0.9
    specular: 0.5

  # Acero — legno grezzo, alta rugosità, niente finitura
