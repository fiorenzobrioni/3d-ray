      type: "wood"
      scale: 6.0
      noise_strength: 2.0
      colors: [[0.40, 0.25, 0.13], [0.28, 0.16, 0.07]]
    roughness: 0.9

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 6 — PLASTICA MORBIDA (Disney, matte)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "soft_pink"
    type: "disney"
    color: [0.92, 0.58, 0.62]
    roughness: 1.0
    subsurface: 0.2

  - id: "soft_sky"
    type: "disney"
    color: [0.55, 0.68, 0.92]
    roughness: 1.0
    subsurface: 0.2

  - id: "soft_mint"
    type: "disney"
    color: [0.55, 0.88, 0.62]
    roughness: 1.0
    subsurface: 0.2

  - id: "soft_lemon"
    type: "disney"
    color: [0.95, 0.9, 0.5]
    roughness: 1.0
    subsurface: 0.2

  - id: "soft_lavender"
    type: "disney"
    color: [0.72, 0.58, 0.88]
