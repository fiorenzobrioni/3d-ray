# =============================================================================
#  SPHERE SHOWCASE DISNEY — Espositore 6×6 Sfere di Materiali PBR Moderni
# =============================================================================
#
#  Versione della scena sphere-showcase.yaml che utilizza esclusivamente 
#  il materiale Disney Principled BSDF per tutte le superfici e un set
#  di luci cinematografico con Area Lights e Sky IBL.
#
#  Render consigliati:
#    Preview:    -w 600  -H 400 -s 8   -d 12 -S 8
#    Draft:      -w 1200 -H 800 -s 32  -d 30 -S 16
#    Produzione: -w 1920 -H 1080 -s 256 -d 50 -S 32
#
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  # Stanza con illuminazione IBL soft
  ambient_light: [0.03, 0.03, 0.04]
  background: [0.005, 0.005, 0.01]
  
  # Cielo con sole per riflessioni realistiche sui materiali PBR
  sky:
    type: "gradient"
    zenith_color:  [0.08, 0.15, 0.45]
    horizon_color: [0.50, 0.55, 0.70]
    ground_color:  [0.15, 0.13, 0.12]
    sun:
      direction: [-0.6, -0.5, -0.8]
      color: [1.0, 0.95, 0.88]
      intensity: 12.0
      size: 3.5
      falloff: 32.0

  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0


# =============================================================================
#  CAMERA
# =============================================================================
camera:
  # Vista 3/4 classica, ideale per mostrare riflessi e profondità
  position: [2.0, 3.8, -6.0]
  look_at: [0.0, 1.15, 0.0]
  fov: 36
  aperture: 0.06
  focal_dist: 7.2


# =============================================================================
#  MATERIALS (Disney BSDF)
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  AMBIENTE: Pavimento e Stanza
  # ─────────────────────────────────────────────────────────────────────────

  - id: "floor_stone"
    type: "disney"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.18, 0.16, 0.14], [0.22, 0.20, 0.18]]
    roughness: 0.6
    metallic: 0.0

  - id: "wall_paint"
    type: "disney"
    color: [0.25, 0.23, 0.22]
    roughness: 0.85
    metallic: 0.0

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO E ARREDI
  # ─────────────────────────────────────────────────────────────────────────

  - id: "table_top"
    type: "disney"
    texture:
      type: "wood"
      scale: 2.5
      noise_strength: 2.5
      colors: [[0.35, 0.2, 0.1], [0.2, 0.1, 0.04]]
      rotation: [0, 30, 0]
    roughness: 0.35
    clearcoat: 0.3

  - id: "table_legs"
    type: "disney"
    color: [0.2, 0.12, 0.06]
    roughness: 0.7
    metallic: 0.0

  - id: "case_wood"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 3.0
      colors: [[0.45, 0.28, 0.15], [0.30, 0.18, 0.08]]
      randomize_rotation: true
    roughness: 0.8

  - id: "case_felt"
    type: "disney"
    color: [0.08, 0.08, 0.1]
    roughness: 1.0
    sheen: 0.8
    sheen_tint: 0.5

  - id: "case_divider"
    type: "disney"
