# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ═══════════════════════════════════════════════════════════════════════════
  #  STANZA — Muri in stucco scuro + soffitto chiaro per rimbalzo
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "back_wall"
    type: "quad"
    q: [-8.0, 0.0, 8.0]
    u: [16.0, 0.0, 0.0]
    v: [0.0, 8.0, 0.0]
    material: "wall_stucco"

  - name: "left_wall"
    type: "quad"
    q: [-8.0, 0.0, -6.0]
    u: [0.0, 0.0, 14.0]
    v: [0.0, 8.0, 0.0]
    material: "wall_stucco"

  - name: "right_wall"
    type: "quad"
    q: [8.0, 0.0, -6.0]
    u: [0.0, 0.0, 14.0]
    v: [0.0, 8.0, 0.0]
    material: "wall_stucco"

  - name: "ceiling"
    type: "quad"
    q: [-8.0, 5.0, -6.0]
    u: [16.0, 0.0, 0.0]
    v: [0.0, 0.0, 14.0]
    material: "ceiling_paint"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TAVOLO — Piano lucido + corpo scuro massiccio
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "table_surface"
    type: "box"
    scale: [8.0, 0.10, 5.5]
    translate: [0.0, 0.70, 0.2]
    material: "table_top"

  - name: "table_body"
    type: "box"
    scale: [7.6, 0.65, 5.1]
    translate: [0.0, 0.325, 0.2]
    material: "table_body"

  # ═══════════════════════════════════════════════════════════════════════════
  #  ESPOSITORE — Vetrina in noce con bordino metallico
  # ═══════════════════════════════════════════════════════════════════════════

  # Base in velluto
  - name: "case_base"
    type: "box"
    scale: [5.50, 0.12, 5.50]
    translate: [0.0, 0.81, 0.0]
    material: "case_felt"

  # Pareti della cornice
  - name: "case_wall_back"
    type: "box"
    scale: [5.74, 0.50, 0.12]
    translate: [0.0, 1.12, 2.81]
    material: "case_wood"

  - name: "case_wall_left"
    type: "box"
    scale: [0.12, 0.50, 5.74]
    translate: [-2.81, 1.12, 0.0]
    material: "case_wood"

  - name: "case_wall_right"
    type: "box"
    scale: [0.12, 0.50, 5.74]
    translate: [2.81, 1.12, 0.0]
    material: "case_wood"

  - name: "case_wall_front"
    type: "box"
    scale: [5.74, 0.18, 0.12]
