# =============================================================================
#  LIGHTS (Professional Studio Lighting Setup)
# =============================================================================
lights:

  # Key Light — Area light grande e morbida dall'alto-sinistra
  - type: "area"
    corner: [-6.0, 5.5, -5.0]
    u: [4.0, 0.0, 0.0]
    v: [0.0, 0.0, 4.0]
    color: [1.0, 0.96, 0.90] # Calda
    intensity: 45.0
    shadow_samples: 16

  # Fill Light — Area light più piccola e fredda dal lato opposto
  - type: "area"
    corner: [5.0, 3.5, -2.0]
    u: [0.0, 0.0, 3.0]
    v: [0.0, 3.0, 0.0]
    color: [0.85, 0.90, 1.0] # Fredda
    intensity: 25.0
    shadow_samples: 12

  # Rim Light — Point light posteriore per staccare dal fondo
  - type: "point"
    position: [0.0, 4.5, 6.0]
    color: [1.0, 1.0, 1.0]
    intensity: 30.0

  # Spotlight decorativo puntato sul primo piano (vetri)
  - type: "spot"
    position: [0.0, 5.0, -3.5]
    direction: [0.0, -0.9, 0.4]
    color: [1.0, 0.98, 0.95]
    intensity: 150.0
    inner_angle: 20
    outer_angle: 40
