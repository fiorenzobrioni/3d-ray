# =============================================================================
#  LIGHTS — Setup Cinematografico (Point + Spot + Directional)
#
#  Schema: Key (point) + Fill (point) + Rim (point) + Accent Spot (gemme)
#          + Overhead Spot (tavolo) + Directional (ombre lunghe)
#
#  Nessun oggetto emissivo, nessuna area light — render veloce.
#  Contrasto caldo/freddo: key calda da sinistra, fill fredda da destra.
#  Ombre nette (stile galleria d'arte con faretti direzionali).
# =============================================================================
lights:

  # ── 1. KEY LIGHT ─────────────────────────────────────────────────────────
  #  Point light calda dall'alto-sinistra. Sorgente dominante della scena.
  #  Posizionata al centro di dove stava l'area light originale.
  #  Intensità calibrata per attenuazione quadratica (~7u di distanza).
  - type: "point"
    position: [-4.25, 4.8, -1.75]
    color: [1.0, 0.94, 0.86]
    intensity: 95.0

  # ── 2. FILL LIGHT ────────────────────────────────────────────────────────
  #  Point light fredda dal lato destro. Riempie le ombre della key
  #  senza eliminarle. Rapporto key:fill ~3:1 per contrasto cinematografico.
  - type: "point"
    position: [4.5, 4.0, -1.5]
    color: [0.78, 0.85, 1.0]
    intensity: 30.0

  # ── 3. RIM / BACK LIGHT ─────────────────────────────────────────────────
  #  Point light posteriore alto. Stacca le silhouette delle sfere
  #  dal fondo scuro con un bordino luminoso sui contorni.
  - type: "point"
    position: [0.0, 4.8, 6.5]
    color: [0.92, 0.88, 0.80]
    intensity: 35.0

  # ── 4. ACCENT SPOT — Gemme (prima fila) ─────────────────────────────────
  #  Spot concentrato sulle gemme in primo piano. Cono stretto per
  #  creare highlight spettacolari su vetri e diamanti senza
  #  sovraesporre il resto della scena.
  - type: "spot"
    position: [0.3, 5.2, -4.0]
    direction: [-0.02, -0.85, 0.52]
    color: [1.0, 0.98, 0.95]
    intensity: 160.0
    inner_angle: 12
    outer_angle: 28

  # ── 5. OVERHEAD SPOT — Tavolo e espositore ──────────────────────────────
  #  Spot dall'alto più ampio che illumina l'intero piano del tavolo.
  #  Crea riflessi sul legno lucidato e fa brillare il bordino metallico.
  - type: "spot"
    position: [0.0, 4.9, 0.5]
    direction: [0.0, -1.0, 0.0]
    color: [1.0, 0.96, 0.90]
    intensity: 80.0
    inner_angle: 25
    outer_angle: 50

  # ── 6. DIRECTIONAL — Fill globale e ombre lunghe ────────────────────────
  #  Luce direzionale tenuissima che aggiunge ombre allungate coerenti
  #  e un minimo di fill nelle zone più buie della stanza.
  - type: "directional"
    direction: [-0.6, -0.5, -0.8]
    color: [1.0, 0.95, 0.88]
    intensity: 0.08
