# =============================================================================
#  IL LABORATORIO DELL'ALCHIMISTA
#
#  Interno notturno con tavolo da lavoro carico di strumenti alchemici:
#  sfera di cristallo su piedistallo, fiale di vetro colorato, astrolabio,
#  bilancia, mortaio, clessidra, lente, libri e calamaio. Sullo sfondo,
#  scaffali a muro con ulteriori oggetti e una finestra a croce con luce
#  lunare. A pavimento, tappeto, vaso di terracotta, globo terrestre e
#  una sfera di smeraldo caduta. Due colonne in marmo ai lati della stanza.
#
#  Illuminazione stratificata caldo/freddo: area light da soffitto, spot
#  sulla sfera di cristallo, luce lunare direzionale, fill laterale tenue.
#  Le fiamme dei candelieri usano materiale emissive (GeometryLight + NEE):
#  producono luce localizzata sul tavolo con ombre proprie dei candelieri.
#  La sfera di cristallo (IOR 1.80) e le fiale dielettriche richiedono
#  profondità di rimbalzo elevata per sviluppare le rifrazioni correttamente.
#
#  Render consigliato:
#    Preview: dotnet run ... -- -i scenes/alchemist-lab.yaml -w 1280 -H 720 -s 16 -d 20
#    Finale:  dotnet run ... -- -i scenes/alchemist-lab.yaml -w 1920 -H 1080 -s 256 -d 60
#    Ultra:   dotnet run ... -- -i scenes/alchemist-lab.yaml -w 3840 -H 2160 -s 256 -d 50 -S 32
# =============================================================================

world:
  # Luce ambiente molto bassa: scena notturna, le candele dominano.
  # Il lievissimo tocco di blu evita che le ombre siano puramente nere.
  ambient_light: [0.010, 0.009, 0.018]

  # Sfondo nero assoluto: nessuna luce proveniente dall'"esterno" oltre
  # alle luci esplicite. Coerente con interni notturni senza HDRI.
  background: [0.0, 0.0, 0.0]

  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0

  # ── WORLD ALT-1  Luce ambiente calda (atmosfera da officina) ─────────────
  # ambient_light: [0.025, 0.018, 0.008]
  # background: [0.0, 0.0, 0.0]

  # ── WORLD ALT-2  Luce ambiente neutra (per valutare i materiali) ─────────
  # ambient_light: [0.04, 0.04, 0.04]
  # background: [0.0, 0.0, 0.0]

# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════
cameras:

  # ── #0  Tre quarti rialzato (default) ─────────────────────────────────────
  #  Angolo di tre quarti leggermente rialzato: mostra il tavolo per intero,
  #  la sfera di cristallo al centro e, sullo sfondo, la finestra lunare
  #  con gli scaffali. Il DOF mette a fuoco la sfera (soggetto principale)
  #  e sfuma leggermente i bordi della scena.
  - name:       principale
    position:   [ 3.5,  4.2, -9.5]
    look_at:    [ 0.0,  3.0,  0.5]
    vup:        [ 0, 1, 0]
    fov:        44
    aperture:   0.08
    focal_dist: 10.3

  # ── #1  Frontale centrata, tutto a fuoco (stile catalogo) ─────────────────
  #  Inquadratura simmetrica sul tavolo, finestra centrata sul fondo.
  #  Apertura zero: nitidezza totale dalla cera delle candele ai libri.
  - name:       frontale
    position:   [ 0.0,  4.0, -9.0]
    look_at:    [ 0.0,  3.0,  0.5]
    vup:        [ 0, 1, 0]
    fov:        42
    aperture:   0.0
    focal_dist: 9.3

  # ── #2  Macro sulla sfera di cristallo (bokeh forte) ──────────────────────
  #  Avvicinamento estremo: la sfera riempie quasi il frame. Le fiale
  #  e il resto del tavolo si dissolvono in un bokeh caldo.
  #  Enfatizza la rifrazione interna della sfera.
  - name:       macro
    position:   [ 1.2,  3.8, -3.8]
    look_at:    [ 0.0,  3.6,  0.3]
    vup:        [ 0, 1, 0]
    fov:        30
    aperture:   0.18
    focal_dist: 4.0

  # ── #3  Vista zenitale (dall'alto, planimetria del tavolo) ─────────────────
  #  Posizione quasi verticale: mostra la distribuzione degli oggetti
  #  sul piano del tavolo come una mappa. Suggestiva con -s alto (128+).
  - name:       zenitale
    position:   [ 0.0,  9.5,  0.5]
    look_at:    [ 0.0,  2.7,  0.5]
    vup:        [ 0, 0, 1]
    fov:        48
    aperture:   0.0
    focal_dist: 6.8

  # ── #4  Dutch angle, lato sinistro (drammatico, notturno) ─────────────────
  #  Camera inclinata ~12° sull'asse Z: orizzonte obliquo, atmosfera
  #  inquieta. Le candele in primo piano bruciano più alte.
  - name:       dutch
    position:   [-4.0,  4.5, -8.0]
    look_at:    [ 0.2,  3.0,  0.5]
    vup:        [ 0.208, 0.978, 0]
    fov:        46
    aperture:   0.06
    focal_dist: 9.0

# =============================================================================
#  MATERIALI
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  PAVIMENTO & MURI
  # ─────────────────────────────────────────────────────────────────────────

  - id: "floor_stone"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 1.5
      colors: [[0.11, 0.09, 0.08], [0.17, 0.14, 0.12]]

  - id: "wall_plaster"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 10.0
      colors: [[0.24, 0.19, 0.14], [0.15, 0.12, 0.09]]

  - id: "wall_dark"
    type: "lambertian"
    color: [0.09, 0.07, 0.06]

  # ─────────────────────────────────────────────────────────────────────────
  #  LEGNO — Tavolo da lavoro, scaffali, cornici
  # ─────────────────────────────────────────────────────────────────────────

  - id: "wood_desk"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 3.0
      noise_strength: 2.5
      colors: [[0.35, 0.20, 0.10], [0.22, 0.12, 0.05]]
      rotation: [0, 90, 0]

  - id: "wood_shelf"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 2.0
      colors: [[0.28, 0.16, 0.08], [0.18, 0.10, 0.04]]
      randomize_rotation: true

  - id: "wood_frame"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 5.0
      noise_strength: 1.5
      colors: [[0.40, 0.25, 0.12], [0.25, 0.15, 0.06]]

  - id: "wood_legs"
    type: "lambertian"
    color: [0.18, 0.10, 0.05]

  # ─────────────────────────────────────────────────────────────────────────
  #  MARMO — Piedistalli, base del globo, mortaio
  # ─────────────────────────────────────────────────────────────────────────

  - id: "marble_white"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 14.0
      noise_strength: 10.0
      colors: [[0.92, 0.90, 0.88], [0.50, 0.48, 0.52]]
      randomize_offset: true

  - id: "marble_nero"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 10.0
      noise_strength: 8.0
      colors: [[0.06, 0.05, 0.07], [0.55, 0.50, 0.60]]
      randomize_offset: true

  - id: "marble_verde"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 12.0
      noise_strength: 9.0
      colors: [[0.08, 0.22, 0.12], [0.03, 0.10, 0.05]]
      randomize_offset: true

  # ─────────────────────────────────────────────────────────────────────────
  #  METALLI
  #  Nota: i valori di fuzz sono calibrati per la luce a candela.
  #  Un fuzz più basso (es. gold_polished: 0.02) produce highlight netti
  #  e visibili anche con intensità candela bassa.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "gold_polished"
    type: "metal"
    color: [0.92, 0.74, 0.14]   # leggermente più saturo per reagire meglio alla luce calda
    fuzz: 0.02

  - id: "gold_satin"
    type: "metal"
    color: [0.86, 0.70, 0.18]
    fuzz: 0.10                   # ridotto da 0.12: riflessi più definiti sul piattino della sfera

  - id: "copper_aged"
    type: "metal"
    color: [0.68, 0.40, 0.16]
    fuzz: 0.20

  - id: "copper_bright"
    type: "metal"
    color: [0.88, 0.52, 0.24]
    fuzz: 0.04                   # ridotto da 0.05: highlight più netti sul candeliere destro

  - id: "bronze_dark"
    type: "metal"
    color: [0.52, 0.36, 0.14]
    fuzz: 0.28

  - id: "silver_mirror"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.0

  - id: "silver_tarnished"
    type: "metal"
    color: [0.58, 0.56, 0.60]
    fuzz: 0.22

  - id: "iron_dark"
    type: "metal"
    color: [0.14, 0.13, 0.12]
    fuzz: 0.50

  - id: "brass_knob"
    type: "metal"
    color: [0.80, 0.64, 0.22]
    fuzz: 0.06                   # ridotto da 0.08: l'astrolabio e i candelieri in ottone
                                 # mostrano highlight più pronunciati

  # ─────────────────────────────────────────────────────────────────────────
  #  VETRI & CRISTALLI — Fiale, sfere, lenti
  #  Gli IOR sono fisicamente corretti. La color agisce come filtro:
  #  non è albedo ma tinta della luce trasmessa (Beer-Lambert implicito).
  # ─────────────────────────────────────────────────────────────────────────

  - id: "glass_clear"
    type: "dielectric"
    refraction_index: 1.52
    color: [1.0, 1.0, 1.0]

  - id: "glass_amber"
    type: "dielectric"
    refraction_index: 1.50
    color: [0.96, 0.76, 0.32]   # leggermente più saturo per leggere meglio nelle ombre

  - id: "glass_emerald"
    type: "dielectric"
    refraction_index: 1.58
    color: [0.28, 0.88, 0.38]

  - id: "glass_ruby"
    type: "dielectric"
    refraction_index: 1.77
    color: [0.92, 0.12, 0.18]

  - id: "glass_sapphire"
    type: "dielectric"
    refraction_index: 1.77
    color: [0.18, 0.22, 0.95]

  - id: "crystal_ball"
    type: "dielectric"
    refraction_index: 1.80       # cristallo di piombo (flint glass): IOR più alto = più caustics
    color: [0.94, 0.90, 1.0]    # lieve tinta viola-freddo per distinguerlo dal vetro chiaro

  - id: "glass_purple"
    type: "dielectric"
    refraction_index: 1.55
    color: [0.62, 0.22, 0.88]

  - id: "glass_smoky"
    type: "dielectric"
    refraction_index: 1.50
    color: [0.52, 0.50, 0.48]   # leggermente più scuro: vetro più opaco nella notte

  # ─────────────────────────────────────────────────────────────────────────
  #  FIAMME — Emissive
  #  Le sfere fiamma sono materiale emissive: il motore le registra
  #  automaticamente come GeometryLight e le include nel NEE.
  #  Le point light delle candele rimangono ma con intensità ridotta:
  #  funzionano da fill direzionale per garantire luce anche con pochi sample.
  #  Intensity 6.0 su raggio 0.04 → area ≈ 0.02 u²: sorgente piccola e intensa,
  #  produce ombre nette alla base dei candelieri.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "candle_flame"
    type: "emissive"
    color: [1.0, 0.82, 0.38]   # arancio-ambra: temperatura colore ~1900 K
    intensity: 6.0

  - id: "candle_wax"
    type: "lambertian"
    color: [0.90, 0.85, 0.70]

  # ─────────────────────────────────────────────────────────────────────────
  #  CUOIO, FELTRO, TESSUTO
  # ─────────────────────────────────────────────────────────────────────────

  - id: "leather_book"
    type: "lambertian"
    color: [0.35, 0.12, 0.06]

  - id: "leather_green"
    type: "lambertian"
    color: [0.10, 0.25, 0.10]

  - id: "leather_blue"
    type: "lambertian"
    color: [0.08, 0.10, 0.32]

  - id: "felt_desk"
    type: "lambertian"
    color: [0.11, 0.19, 0.09]   # leggermente più scuro: il feltro è vecchio e consumato

  - id: "paper_aged"
    type: "lambertian"
    color: [0.80, 0.72, 0.54]   # più scuro/invecchiato

  - id: "ink_black"
    type: "lambertian"
    color: [0.03, 0.02, 0.05]

  # ─────────────────────────────────────────────────────────────────────────
  #  CERAMICA & ARGILLA
  #  Usiamo metal con fuzz alto per simulare la superficie semi-lucida
  #  della ceramica smaltata (smalto opaco con qualche riflesso).
  # ─────────────────────────────────────────────────────────────────────────

  - id: "ceramic_white"
    type: "metal"
    color: [0.88, 0.86, 0.82]
    fuzz: 0.32

  - id: "ceramic_blue"
    type: "metal"
    color: [0.15, 0.22, 0.55]
    fuzz: 0.28

  - id: "clay_terracotta"
    type: "lambertian"
    color: [0.72, 0.38, 0.18]


# =============================================================================
#  LUCI
#
#  Schema stratificato a tre temperature di colore:
#   · Caldo  (candele + lanterna): 1900–2800 K  →  [1.0, 0.78, 0.32]
#   · Neutro (spot cristallo):     3200 K        →  [1.0, 0.95, 0.85]
#   · Freddo (luna):               6500 K        →  [0.70, 0.78, 1.0]
#
#  Intensità calibrate in modo che le candele siano dominanti in primo
#  piano, lo spot esalti la sfera di cristallo, e la luna sia visibile
#  ma non sovrasti il mood notturno.
# =============================================================================
lights:

  # ── Lanterna sospesa dal soffitto (area light, calda diffusa) ─────────────
  #  Simula una lanterna a olio appesa al centro della stanza.
  #  Area 2×2 u: ombre morbide coerenti con una fonte grande.
  - type: "area"
    corner: [-1.0, 5.8, -0.5]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
    color: [1.0, 0.80, 0.42]
    intensity: 22.0
    shadow_samples: 16

  # ── Candela sinistra (point, fill direzionale) ───────────────────────────
  #  La sfera fiamma emissive è la sorgente primaria. Questa point light
  #  è un fill tenue che garantisce luce nelle zone d'ombra con pochi sample.
  #  Intensità ridotta rispetto allo schema lambertian+point precedente.
  - type: "point"
    position: [-1.8, 3.38, -0.5]
    color: [1.0, 0.72, 0.28]
    intensity: 5

  # ── Candela destra (point, fill direzionale) ──────────────────────────────
  - type: "point"
    position: [1.5, 3.38, 0.2]
    color: [1.0, 0.76, 0.32]
    intensity: 3

  # ── Luce lunare (direzionale, fredda) ─────────────────────────────────────
  #  Entra dalla finestra in alto a sinistra. Il vettore direction indica
  #  la direzione di propagazione (dalla finestra verso l'interno).
  #  Intensità bassa: riempimento freddo, non illuminazione principale.
  - type: "directional"
    direction: [0.5, -0.45, -1.0]
    color: [0.70, 0.78, 1.0]
    intensity: 0.28

  # ── Spot sulla sfera di cristallo (neutro-caldo, soggetto principale) ─────
  #  Posizionato appena sopra e leggermente spostato verso la camera
  #  per creare un highlight dominante senza shadow frontale sulla sfera.
  #  Inner/outer stretti: pool di luce concentrata.
  - type: "spot"
    position: [0.3, 6.2, -1.5]
    direction: [-0.05, -1.0, 0.35]
    color: [1.0, 0.96, 0.88]
    intensity: 90
    inner_angle: 7
    outer_angle: 18

  # ── Riempimento laterale destro (point, freddo-neutro, molto tenue) ────────
  #  Evita che le zone a destra della scena cadano in nero totale.
  #  Il colore lievemente bluastro bilancia il caldo delle candele.
  - type: "point"
    position: [6.5, 3.5, -3.5]
    color: [0.65, 0.68, 0.90]
    intensity: 4

  # ─────────────────────────────────────────────────────────────────────────
  #  LIGHTS ALT-1  Solo candele + luna (atmosfera spettrale, senza spot)
  #  Rimuove lo spot e abbassa la lanterna: i bordi della scena si scuriscono,
  #  la sfera di cristallo è illuminata solo da luce indiretta delle candele.
  #  Consigliato con -s 256 -d 70 per ridurre il rumore nelle zone scure.
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "area"
  #   corner: [-1.0, 5.8, -0.5]
  #   u: [2.0, 0.0, 0.0]
  #   v: [0.0, 0.0, 2.0]
  #   color: [1.0, 0.78, 0.38]
  #   intensity: 16.0
  #   shadow_samples: 16
  # - type: "point"
  #   position: [-1.8, 3.38, -0.5]
  #   color: [1.0, 0.70, 0.26]
  #   intensity: 18
  # - type: "point"
  #   position: [1.5, 3.38, 0.2]
  #   color: [1.0, 0.74, 0.30]
  #   intensity: 11
  # - type: "directional"
  #   direction: [0.5, -0.45, -1.0]
  #   color: [0.72, 0.80, 1.0]
  #   intensity: 0.40

  # ─────────────────────────────────────────────────────────────────────────
  #  LIGHTS ALT-2  Schema "tramonto rosso" (luce esterna calda-arancio)
  #  La luna diventa un sole al tramonto che illumina dal fondo.
  #  Tutto il bilanciamento caldo/freddo si inverte: candele quasi inutili.
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "area"
  #   corner: [-1.0, 5.8, -0.5]
  #   u: [2.0, 0.0, 0.0]
  #   v: [0.0, 0.0, 2.0]
  #   color: [1.0, 0.80, 0.42]
  #   intensity: 18.0
  #   shadow_samples: 16
  # - type: "point"
  #   position: [-1.8, 3.38, -0.5]
  #   color: [1.0, 0.72, 0.28]
  #   intensity: 5
  # - type: "point"
  #   position: [1.5, 3.38, 0.2]
  #   color: [1.0, 0.76, 0.32]
  #   intensity: 4
  # - type: "directional"
  #   direction: [0.5, -0.3, -1.0]
  #   color: [1.0, 0.55, 0.20]
  #   intensity: 1.8
  # - type: "spot"
  #   position: [0.3, 6.2, -1.5]
  #   direction: [-0.05, -1.0, 0.35]
  #   color: [1.0, 0.85, 0.60]
  #   intensity: 60
  #   inner_angle: 10
  #   outer_angle: 24


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ═══════════════════════════════════════════════════════════════════════════
  #  STANZA — Muri, pavimento (ground), soffitto
  # ═══════════════════════════════════════════════════════════════════════════

  # Parete di fondo
  - name: "back_wall"
    type: "quad"
    q: [-6, 0, 6]
    u: [12, 0, 0]
    v: [0, 7, 0]
    material: "wall_plaster"

  # Parete sinistra
  - name: "left_wall"
    type: "quad"
    q: [-6, 0, 6]
    u: [0, 0, -14]
    v: [0, 7, 0]
    material: "wall_plaster"

  # Parete destra
  - name: "right_wall"
    type: "quad"
    q: [6, 0, 6]
    u: [0, 0, -14]
    v: [0, 7, 0]
    material: "wall_dark"

  # Soffitto
  - name: "ceiling"
    type: "quad"
    q: [-6, 6.5, 6]
    u: [12, 0, 0]
    v: [0, 0, -14]
    material: "wall_dark"

  # ═══════════════════════════════════════════════════════════════════════════
  #  FINESTRA — Apertura sulla parete di fondo con luce lunare
  #  Vetro fumé + cornice in legno + croce interna
  # ═══════════════════════════════════════════════════════════════════════════

  # Vetro della finestra (riflesso notturno)
  - name: "window_glass"
    type: "quad"
    q: [-4.2, 3.0, 5.98]
    u: [2.4, 0.0, 0.0]
    v: [0.0, 2.5, 0.0]
    material: "glass_smoky"

  # Cornice finestra — montante sinistro
  - name: "window_frame_left"
    type: "box"
    scale: [0.12, 2.7, 0.15]
    translate: [-4.26, 4.25, 5.92]
    material: "wood_frame"

  # Cornice finestra — montante destro
  - name: "window_frame_right"
    type: "box"
    scale: [0.12, 2.7, 0.15]
    translate: [-1.74, 4.25, 5.92]
    material: "wood_frame"

  # Cornice finestra — traversa superiore
  - name: "window_frame_top"
    type: "box"
    scale: [2.64, 0.12, 0.15]
    translate: [-3.0, 5.56, 5.92]
    material: "wood_frame"

  # Cornice finestra — traversa inferiore
  - name: "window_frame_bottom"
    type: "box"
    scale: [2.64, 0.12, 0.15]
    translate: [-3.0, 2.94, 5.92]
    material: "wood_frame"

  # Croce della finestra — montante verticale
  - name: "window_cross_v"
    type: "box"
    scale: [0.06, 2.5, 0.08]
    translate: [-3.0, 4.25, 5.95]
    material: "wood_frame"

  # Croce della finestra — traversa orizzontale
  - name: "window_cross_h"
    type: "box"
    scale: [2.4, 0.06, 0.08]
    translate: [-3.0, 4.25, 5.95]
    material: "wood_frame"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TAVOLO DA LAVORO PRINCIPALE
  #  Piano in legno massiccio + gambe tornite + feltro verde sul piano
  # ═══════════════════════════════════════════════════════════════════════════

  # Piano del tavolo
  - name: "desk_top"
    type: "box"
    scale: [5.0, 0.18, 2.8]
    translate: [0.0, 2.60, 0.0]
    material: "wood_desk"

