# Ray-Tracing Scene - Formula 1 Car
# A blocky, low-poly representation of an F1 car using boxes and spheres

world:
  ambient_light: [0.1, 0.1, 0.1]
  background: [0.6, 0.7, 0.9]
  ground:
    type: "infinite_plane"
    material: "asphalt"
    y: 0.0

camera:
  position: [-6, 3, 10]
  look_at: [0, 0.8, 0]
  fov: 50
  aperture: 0.02
  focal_dist: 12.0

materials:
  - id: "asphalt"
    type: "lambertian"
    color: [0.2, 0.2, 0.2]

  - id: "car_body"
    type: "metal"
    color: [0.9, 0.1, 0.15] # Rosso Corsa
    fuzz: 0.1

  - id: "carbon_fiber"
    type: "lambertian"
    color: [0.15, 0.15, 0.15]

  - id: "tire_rubber"
    type: "lambertian"
    color: [0.05, 0.05, 0.05]

  - id: "rim_metal"
    type: "metal"
    color: [0.8, 0.8, 0.8]
    fuzz: 0.3

  - id: "visor_glass"
    type: "dielectric"
    refraction_index: 1.5

lights:
  - type: "directional"
    direction: [-0.5, -1.0, 0.5]
    color: [1.0, 0.95, 0.85]
    intensity: 1.2

  - type: "point"
    position: [5, 8, -2]
    color: [0.9, 0.9, 1.0]
    intensity: 40.0

entities:
  # Main Chassis (Tub)
  - name: "chassis"
    type: "box"
    min: [-0.6, 0.2, -2.0]
    max: [0.6, 0.8, 2.0]
    material: "car_body"

  # Nose Cone
  - name: "nose"
    type: "box"
    min: [-0.4, 0.2, 2.0]
    max: [0.4, 0.6, 4.0]
    material: "car_body"

  # Front Wing Main Plane
  - name: "front_wing"
    type: "box"
    min: [-1.8, 0.1, 3.5]
    max: [1.8, 0.2, 4.2]
    material: "carbon_fiber"

  # Front Wing Endplates
  - name: "front_wing_ep_l"
    type: "box"
    min: [-1.8, 0.1, 3.3]
    max: [-1.7, 0.6, 4.3]
    material: "carbon_fiber"
  - name: "front_wing_ep_r"
    type: "box"
    min: [1.7, 0.1, 3.3]
    max: [1.8, 0.6, 4.3]
    material: "carbon_fiber"

  # Rear Wing Main Plane
  - name: "rear_wing"
    type: "box"
    min: [-1.5, 1.4, -2.8]
    max: [1.5, 1.5, -2.0]
    material: "car_body"

  # Rear Wing Endplates
  - name: "rear_wing_ep_l"
    type: "box"
    min: [-1.5, 0.6, -3.0]
    max: [-1.4, 1.6, -1.8]
    material: "carbon_fiber"
  - name: "rear_wing_ep_r"
    type: "box"
    min: [1.4, 0.6, -3.0]
    max: [1.5, 1.6, -1.8]
    material: "carbon_fiber"

  # Engine Cover / Airbox
  - name: "airbox"
    type: "box"
    min: [-0.4, 0.8, -1.5]
    max: [0.4, 1.5, 0.0]
    material: "car_body"

  # Driver Helmet
  - name: "helmet"
    type: "sphere"
    center: [0, 0.9, 0.2]
    radius: 0.3
    material: "visor_glass"

  # Sidepods
  - name: "sidepod_l"
    type: "box"
    min: [-1.2, 0.2, -1.3]
    max: [-0.6, 0.7, 0.5]
    material: "car_body"
  - name: "sidepod_r"
    type: "box"
    min: [0.6, 0.2, -1.3]
    max: [1.2, 0.7, 0.5]
    material: "car_body"

  # --- Wheels ---
  # Front Left Tire & Rim
  - name: "tire_fl"
    type: "sphere"
    center: [-1.5, 0.5, 2.5]
    radius: 0.45
    material: "tire_rubber"
  - name: "rim_fl"
    type: "sphere"
    center: [-1.6, 0.5, 2.5]
    radius: 0.3
    material: "rim_metal"

  # Front Right Tire & Rim
  - name: "tire_fr"
    type: "sphere"
    center: [1.5, 0.5, 2.5]
    radius: 0.45
    material: "tire_rubber"
  - name: "rim_fr"
    type: "sphere"
    center: [1.6, 0.5, 2.5]
    radius: 0.3
    material: "rim_metal"

  # Rear Left Tire & Rim
  - name: "tire_rl"
    type: "sphere"
    center: [-1.6, 0.55, -1.5]
    radius: 0.55
    material: "tire_rubber"
  - name: "rim_rl"
    type: "sphere"
    center: [-1.75, 0.55, -1.5]
    radius: 0.4
    material: "rim_metal"

  # Rear Right Tire & Rim
  - name: "tire_rr"
    type: "sphere"
    center: [1.6, 0.55, -1.5]
    radius: 0.55
    material: "tire_rubber"
  - name: "rim_rr"
    type: "sphere"
    center: [1.75, 0.55, -1.5]
    radius: 0.4
    material: "rim_metal"
