imports:
  - path: "libraries/materials/metals.yaml"
  - path: "libraries/materials/ceramics.yaml"
  - path: "libraries/lights/studio-3point.yaml"

world:
  ambient_light: [0.02, 0.02, 0.03]
  background: [0.0, 0.0, 0.0]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.08, 0.08, 0.12]
    ground_color: [0.03, 0.03, 0.04]

cameras:
  # Baseline: pinhole, tutto a fuoco
  - name: "pinhole"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42
    aperture: 0.0
    focal_dist: 10.5

  # DoF morbido: test deformazioni
  - name: "dof_soft"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42
    aperture: 0.2
    focal_dist: 10.5

  # DoF estremo: stress test
  - name: "dof_extreme"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42
    aperture: 0.5
    focal_dist: 10.5

  # Closeup: primo piano per vedere i dettagli dei contorni
  - name: "closeup"
    position: [1.2, 0.5, -2.0]
    look_at: [0, 0.25, 0]
    fov: 30
    aperture: 0.0
    focal_dist: 1

  # Zenitale: vista dall'alto per simmetria
  - name: "top"
    position: [0, 9, 2.01]
    look_at: [0, 0, 2]
    fov: 50
    aperture: 0.0
    focal_dist: 10

materials:
  - id: "pavimento"
    type: "disney"
    roughness: 0.45
    metallic: 0.0
    specular: 0.0
    texture:
      type: "checker"
      colors: [[0.08, 0.08, 0.10], [0.18, 0.18, 0.20]]
      scale: 1.0

entities:
  - name: "suolo"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  - name: "sfera"
    type: "sphere"
    center: [0, 0.0, 0]
    radius: 1
    translate: [0, 1.1, 0]
    scale: [1, 2, 1]                  # Variante più grande
    material: "dis_porcellana_bianca"
