# ============================================================
# RAY TRACING SHOWCASE - "The Infinite Prism"
# ============================================================
# This scene is designed to demonstrate every advanced feature
# of the engine: Reflection, Refraction, Procedural Textures,
# 3-Point Lighting, and Depth-of-Field (Bokeh).

world:
  # Professional dark studio environment
  ambient_light: [0.02, 0.02, 0.03]
  background: [0.01, 0.01, 0.02]
  ground:
    type: "infinite_plane"
    material: "polished_floor"
    y: 0.0

camera:
  # Macro view with high bokeh effect
  position: [0.0, 3.5, -9.0]
  look_at: [0.0, 1.2, 0.0]
  fov: 38.0
  aperture: 0.25            # Strong Depth of Field
  focal_dist: 9.2           # Focused on the central glass sphere

materials:
  # 1. LUXURY WOOD FLOOR (Reflective)
  - id: "polished_floor"
    type: "metal"           # Metal base for glossy reflections
    fuzz: 0.05
    texture:
      type: "wood"
      scale: 18.0
      colors: [[0.25, 0.12, 0.05], [0.10, 0.05, 0.02]]
      randomize_offset: true

  # 2. CRYSTAL GLASS (Refraction)
  - id: "crystal_glass"
    type: "dielectric"
    refraction_index: 1.65  # High-refractive flint glass

  # 3. CARRARA MARBLE (Procedural Marble)
  - id: "carrara_marble"
    type: "metal"           # Polished marble look
    fuzz: 0.02
    texture:
      type: "marble"
      scale: 15.0
      colors: [[0.98, 0.98, 1.0], [0.70, 0.75, 0.85]]
      noise_strength: 8.0

  # 4. CHROME CHECKER (High Reflection)
  - id: "chrome_checker"
    type: "metal"
    fuzz: 0.0
    texture:
      type: "checker"
      scale: 0.5
      colors: [[0.95, 0.95, 0.95], [0.1, 0.1, 0.1]]

  # 5. EMERALD NOISE (Subtle Texture)
  - id: "emerald_noise"
    type: "metal"
    fuzz: 0.1
    texture:
      type: "noise"
      scale: 25.0
      colors: [[0.1, 0.6, 0.2], [0.02, 0.2, 0.05]]

  # 6. GOLDEN SOLID
  - id: "solid_gold"
    type: "metal"
    fuzz: 0.05
    color: [1.0, 0.84, 0.0]

lights:
  # Key Light (Strong, Warm)
  - { type: "point", position: [8, 12, -5], color: [1.0, 0.9, 0.7], intensity: 350 }
  
  # Fill Light (Soft, Cool)
  - { type: "point", position: [-10, 5, -2], color: [0.7, 0.8, 1.0], intensity: 150 }
  
  # Rim/Back Light (Dramatic Contour)
  - { type: "point", position: [0, 8, 10], color: [1.0, 1.0, 1.0], intensity: 200 }

entities:
  # --- CENTRAL MASTERPIECE ---
  # Large Crystal Sphere
  - name: "central_glass"
    type: "sphere"
    center: [0.0, 2.0, 0.0]
    radius: 2.0
    material: "crystal_glass"

  # Inner Marble Sphere (Visible through refraction)
  - name: "inner_core"
    type: "sphere"
    center: [0.0, 2.0, 0.0]
    radius: 0.8
    material: "carrara_marble"

  # --- SURROUNDING ELEMENTS ---
  # Marble Pedestal
  - name: "pedestal"
    type: "box"
    scale: [3.5, 0.4, 3.5]
    translate: [0.0, 0.2, 0.0]
    material: "carrara_marble"

  # Chrome Checker Cube (Left Background)
  - name: "bg_box_l"
    type: "box"
    scale: [1.5, 1.5, 1.5]
    translate: [-4.5, 0.75, 2.0]
    material: "chrome_checker"

  # Emerald Sphere (Right Foreground)
  - name: "fg_sphere_r"
    type: "sphere"
    center: [3.5, 0.8, -3.0]
    radius: 0.8
    material: "emerald_noise"

  # Golden Sphere (Left Foreground)
  - name: "fg_sphere_l"
    type: "sphere"
    center: [-3.8, 0.6, -4.0]
    radius: 0.6
    material: "solid_gold"

  # Decorative Distant Spheres (For Bokeh)
  - name: "bokeh_ball_1"
    type: "sphere"
    center: [10, 15, 20]
    radius: 3.0
    material: "solid_gold"
    
  - name: "bokeh_ball_2"
    type: "sphere"
    center: [-12, 12, 25]
    radius: 4.0
    material: "crystal_glass"
