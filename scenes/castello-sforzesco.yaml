# ═══════════════════════════════════════════════════════════════════════════════
#  Castello Sforzesco — Milano
#
#  Modello architettonico del Castello Sforzesco: la Torre del Filarete con
#  loggia, orologio e guglia in rame, quattro torri angolari cilindriche,
#  cinta muraria con merlature ghibelline, fossato perimetrale, ponte di
#  accesso, cortile interno con portico a colonne, stemma Visconteo, bandiera
#  sul pinnacolo e dettagli decorativi in rame inverdito.
#
#  La scena è illuminata con un gradient sky "pomeriggio estivo milanese":
#  cielo azzurro intenso allo zenit, bianco luminoso all'orizzonte, disco
#  solare con glow caldo abbinato a una directional light coerente.
#  Il fossato è reso con metallo a bassissima fuzz per simulare un'acqua
#  quasi ferma e riflettente. Le torri angolari usano brick_dark per
#  differenziarle cromaticamente dalla cinta muraria principale.
#
#  Render consigliato:
#    Preview: dotnet run ... -- -i scenes/castello-sforzesco.yaml -w 1280 -H 720 -s 64 -d 12
#    Finale:  dotnet run ... -- -i scenes/castello-sforzesco.yaml -w 1920 -H 1080 -s 256 -d 20
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  WORLD — Pomeriggio estivo milanese (cielo azzurro con sole alto-laterale)
# ─────────────────────────────────────────────────────────────────────────────
world:
  ambient_light: [0.10, 0.09, 0.08]   # lievemente alzata: GI subtile sulle zone d'ombra
  sky:
    type: "gradient"
    zenith_color:  [0.12, 0.32, 0.78]  # blu profondo in alto
    horizon_color: [0.68, 0.82, 1.00]  # azzurro chiaro/bianco all'orizzonte
    ground_color:  [0.32, 0.28, 0.22]  # riflesso caldo del terreno sotto l'orizzonte
    sun:
      direction: [-0.4, -0.8, 0.3]    # sole alto, lievemente a destra (coerente con key light)
      color: [1.0, 0.94, 0.82]        # luce solare calda pomeridiana
      intensity: 18.0                  # disco visibile con glow netto
      size: 2.5
      falloff: 40.0

  # ── ALT-1: Golden Hour (tramonto a sinistra) ──────────────────────────────
  # world:
  #   ambient_light: [0.07, 0.05, 0.04]
  #   sky:
  #     type: "gradient"
  #     zenith_color:  [0.08, 0.12, 0.38]
  #     horizon_color: [0.90, 0.50, 0.20]
  #     ground_color:  [0.18, 0.12, 0.07]
  #     sun:
  #       direction: [-0.9, -0.25, 0.2]
  #       color: [1.0, 0.72, 0.35]
  #       intensity: 28.0
  #       size: 5.0
  #       falloff: 16.0

  # ── ALT-2: Cielo coperto / overcast (luce piatta, no sole) ───────────────
  # world:
  #   ambient_light: [0.14, 0.14, 0.15]
  #   sky:
  #     type: "gradient"
  #     zenith_color:  [0.55, 0.57, 0.62]
  #     horizon_color: [0.72, 0.74, 0.78]
  #     ground_color:  [0.35, 0.34, 0.32]

  ground:
    type: "infinite_plane"
    material: "cobblestone"
    y: 0.0

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA — Angolo drammatico basso da destra, Torre del Filarete in primo piano
# ─────────────────────────────────────────────────────────────────────────────
camera:
  position: [42, 9, -58]     # leggermente arretrata e abbassata per più cielo in alto
  look_at:  [0, 20, 0]       # punta verso la metà alta della Torre del Filarete
  fov: 46                    # ridotto di 2° per comprimere lievemente la prospettiva
  aperture: 0.06             # DOF ridotto: tutto il castello deve essere a fuoco
  focal_dist: 68.0           # messa a fuoco sulla torre (distanza ~68 u)

  # ── ALT: Vista frontale simmetrica (render da cartolina) ─────────────────
  # camera:
  #   position: [0, 12, -65]
  #   look_at:  [0, 18, 0]
  #   fov: 42
  #   aperture: 0.0
  #   focal_dist: 1.0

  # ── ALT: Vista aerea da drone (↑ per pianta del castello) ────────────────
  # camera:
  #   position: [15, 55, -30]
  #   look_at:  [0, 8, -4]
  #   fov: 55
  #   aperture: 0.0
  #   focal_dist: 1.0

# ─────────────────────────────────────────────────────────────────────────────
#  MATERIALS
# ─────────────────────────────────────────────────────────────────────────────
materials:
  # Pavimentazione esterna e cortile
  - id: "cobblestone"
    type: "lambertian"
    color: [0.43, 0.40, 0.36]      # leggermente scurita per maggior contrasto col castello

  # Mattone principale cinta muraria — rosso mattone milanese
  - id: "brick_main"
    type: "lambertian"
    color: [0.60, 0.30, 0.20]

  # Mattone scuro torri angolari — più saturo e profondo delle mura
  - id: "brick_dark"
    type: "lambertian"
    color: [0.48, 0.23, 0.16]

  # Mattone Torre del Filarete — tono intermedio, differenziato
  - id: "brick_tower"
    type: "lambertian"
    color: [0.56, 0.28, 0.19]

  # Pietra decorativa: cornici, fasce, archi
  - id: "stone_trim"
    type: "lambertian"
    color: [0.80, 0.76, 0.68]      # alzata leggermente per leggibilità delle cornici

  # Pietra da costruzione: scarpate, ponti, basi torri
  - id: "stone_base"
    type: "lambertian"
    color: [0.64, 0.60, 0.53]

  # Marmo bianco: colonne, stemma, orologio
  - id: "marble_white"
    type: "lambertian"
    color: [0.92, 0.90, 0.86]

  # Tegole: tetto loggia, cornicioni torri angolari
  - id: "roof_tile"
    type: "lambertian"
    color: [0.52, 0.26, 0.16]

  # Legno scuro: finestre, portoni
  - id: "dark_wood"
    type: "lambertian"
    color: [0.22, 0.13, 0.07]      # scurito per un maggior contrasto sulla facciata

  # Metallo cancello / ringhiere
  - id: "gate_metal"
    type: "metal"
    color: [0.22, 0.20, 0.18]
    fuzz: 0.45

  # Vetro finestre (non usato direttamente negli oggetti finestre,
  # mantenuto per futuri aggiornamenti / render interni)
  - id: "window_glass"
    type: "dielectric"
    refraction_index: 1.5

  # Rame inverdito: sfere decorative, guglia, spire torri
  - id: "copper_aged"
    type: "metal"
    color: [0.28, 0.52, 0.38]
    fuzz: 0.25                     # fuzz ridotta: dettaglio metallico più netto

  # Bandiera rossa
  - id: "flag_red"
    type: "lambertian"
    color: [0.82, 0.10, 0.09]

  # Acqua fossato: metallo a fuzz quasi zero = riflesso quasi speculare
  - id: "moat_water"
    type: "metal"
    color: [0.14, 0.24, 0.32]
    fuzz: 0.03                     # acqua ferma: più riflessiva dell'originale (0.05)

# ─────────────────────────────────────────────────────────────────────────────
#  LIGHTS
# ─────────────────────────────────────────────────────────────────────────────
lights:
  # Sole principale (key light) — coerente con il sole nel gradient sky
  - type: "directional"
    direction: [-0.4, -0.8, 0.3]
    color: [1.0, 0.94, 0.82]      # stessa cromaticità del sun disk
    intensity: 1.05               # leggermente alzata per ombre più nette

  # Luce di riempimento dal cielo (sky fill) — colore azzurro del cielo
  - type: "directional"
    direction: [0.3, -0.5, -0.5]
    color: [0.55, 0.65, 0.85]     # tono più azzurro/freddo (sky-bounce)
    intensity: 0.22

  # ── RIMOSSA: Point light [0, 40, -20] intensity 200 ──────────────────────
  # Questa luce era posizionata sopra la Torre del Filarete e produceva
  # un'illuminazione dall'alto non coerente con la scena diurna esterna;
  # con il gradient sky che contribuisce GI dall'alto, è superflua e
  # introduce hotspot innaturali sulla sommità della torre.
  # ─────────────────────────────────────────────────────────────────────────

  # ── ALT-1: Aggiunta per render Golden Hour (sostituisce key light) ────────
  # - type: "directional"
  #   direction: [-0.9, -0.25, 0.2]
  #   color: [1.0, 0.70, 0.30]
  #   intensity: 1.20
  # - type: "directional"
  #   direction: [0.5, -0.4, -0.6]
  #   color: [0.40, 0.45, 0.65]
  #   intensity: 0.15

  # ── ALT-2: Area light per render overcast (rimuovere directional) ─────────
  # - type: "area"
  #   corner: [-40, 60, -40]
  #   u: [80, 0, 0]
  #   v: [0, 0, 80]
  #   color: [0.85, 0.88, 0.95]
  #   intensity: 0.6
  #   shadow_samples: 16

