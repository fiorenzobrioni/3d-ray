# Ray-Tracing Scene - Castello Sforzesco di Milano
# Detailed model with Torre del Filarete, corner towers, curtain walls,
# crenellations, courtyard, windows, and decorative elements.

world:
  ambient_light: [0.08, 0.07, 0.06]
  background: [0.35, 0.50, 0.80]  # Clear Milanese sky
  ground:
    type: "infinite_plane"
    material: "cobblestone"
    y: 0.0

camera:
  position: [45, 8, -55]    # Low dramatic angle from front-right
  look_at: [0, 18, 0]       # Looking up at the central tower
  fov: 48
  aperture: 0.08
  focal_dist: 65.0

materials:
  - id: "cobblestone"
    type: "lambertian"
    color: [0.45, 0.42, 0.38]

  - id: "brick_main"
    type: "lambertian"
    color: [0.62, 0.32, 0.22]

  - id: "brick_dark"
    type: "lambertian"
    color: [0.50, 0.25, 0.18]

  - id: "brick_tower"
    type: "lambertian"
    color: [0.58, 0.30, 0.20]

  - id: "stone_trim"
    type: "lambertian"
    color: [0.78, 0.75, 0.68]

  - id: "stone_base"
    type: "lambertian"
    color: [0.65, 0.62, 0.55]

  - id: "marble_white"
    type: "lambertian"
    color: [0.90, 0.88, 0.84]

  - id: "roof_tile"
    type: "lambertian"
    color: [0.55, 0.28, 0.18]

  - id: "dark_wood"
    type: "lambertian"
    color: [0.25, 0.15, 0.08]

  - id: "gate_metal"
    type: "metal"
    color: [0.20, 0.18, 0.16]
    fuzz: 0.5

  - id: "window_glass"
    type: "dielectric"
    refraction_index: 1.5

  - id: "copper_aged"
    type: "metal"
    color: [0.30, 0.50, 0.35]
    fuzz: 0.3

  - id: "flag_red"
    type: "lambertian"
    color: [0.85, 0.12, 0.10]

  - id: "moat_water"
    type: "metal"
    color: [0.15, 0.25, 0.30]
    fuzz: 0.05

lights:
  - type: "directional"
    direction: [-0.4, -0.8, 0.3]
    color: [1.0, 0.92, 0.78]
    intensity: 0.85

  - type: "directional"
    direction: [0.3, -0.5, -0.5]
    color: [0.5, 0.55, 0.70]
    intensity: 0.25

  - type: "point"
    position: [0, 40, -20]
    color: [1.0, 0.95, 0.85]
    intensity: 200.0

