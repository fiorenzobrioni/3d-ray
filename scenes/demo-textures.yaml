# Ray-Tracing Scene - Test delle nuove Textures Procedurali
# Questa scena espone 5 primitive (sfere) e un piano,
# ciascuno con una diversa texture (Solid, Noise, Checker, Wood, Marble)

world:
  ambient_light: [-0.6, -0.6, -0.6]  # Ambient leggero
  background: [0.70, 0.85, 0.95]     # Cielo azzurro
  ground:
    type: "infinite_plane"
    material: "floor_checker"
    y: 0.0

camera:
  position: [0.0, 3.0, -8.0]
  look_at: [0.0, 1.0, 0.0]
  fov: 45.0
  aperture: 0.02
  focal_dist: 8.0

materials:
  # 1. Checker (Scacchiera tridimensionale)
  - id: "floor_checker"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 2.0
      colors: [[0.1, 0.1, 0.1], [0.9, 0.9, 0.9]]

  # 2. SolidColor (Colore tinta unita tradizionale estesa)
  - id: "mat_solid_red"
    type: "metal"
    fuzz: 0.1
    texture:
      type: "solid"
      colors: [[0.9, 0.1, 0.1]]

  # 3. Noise (Perlin Noise monocromatico)
  - id: "mat_noise"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 5.0

  # 4. Wood (Legno procedurale con anelli turbolenti)
  - id: "mat_wood"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 12.0
      turbulence: 3.5
      colors: [[0.6, 0.35, 0.15], [0.3, 0.15, 0.05]]

  # 5. Marble (Marmo striato tramite turbolenza Perlin)
  - id: "mat_marble"
    type: "metal"
    fuzz: 0.05
    texture:
      type: "marble"
      scale: 7.0
      colors: [[0.95, 0.95, 0.90], [0.1, 0.2, 0.3]] # Marmo bluastro

  # 6. Dielectric (Vetro, per confrontare i riflessi sulle texture)
  - id: "mat_glass"
    type: "dielectric"
    refraction_index: 1.52

lights:
  - type: "point"
    position: [-5.0, 10.0, -5.0]
    color: [1.0, 0.95, 0.9]
    intensity: 100.0

  - type: "directional"
    direction: [-1.0, -1.0, 0.0]
    color: [0.8, 0.8, 1.0]
    intensity: 0.5

entities:
  # Tutte le sfere poggiano sul piano y=0 (raggio=1, centro.y=1)

  - name: "sphere_solid"
    type: "sphere"
    center: [-4.0, 1.0, 0.0]
    radius: 1.0
    material: "mat_solid_red"

  - name: "sphere_noise"
    type: "sphere"
    center: [-1.5, 1.0, -1.5]
    radius: 1.0
    material: "mat_noise"

  - name: "sphere_wood"
    type: "sphere"
    center: [1.5, 1.0, 0.5]
    radius: 1.0
    material: "mat_wood"

  - name: "sphere_marble"
    type: "sphere"
    center: [4.0, 1.0, 0.0]
    radius: 1.0
    material: "mat_marble"

  - name: "sphere_glass"
    type: "sphere"
    center: [0.0, 1.0, 2.5]
    radius: 1.0
    material: "mat_glass"
