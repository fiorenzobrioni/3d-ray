# ============================================================================
# Torus & Annulus — Showcase Scene
# ============================================================================
#
# Scena progettata per mostrare:
#   1. Contorno fantasma del torus dietro altri oggetti (cono, cilindro)
#   2. Deformazioni geometriche del torus con Depth of Field (focal_dist)
#   3. Rendering corretto dell'annulus
#   4. Comportamento con scale non uniformi (pedina grande)
#
# Camere:
#   - "pinhole"     : senza DoF, riferimento baseline
#   - "dof_soft"    : DoF moderato (aperture 0.08, focal_dist 8)
#   - "dof_extreme" : DoF forte (aperture 0.2, focal_dist 10)  
#   - "closeup"     : primo piano sulla pedina per ispezionare il contorno
#   - "top"         : zenitale per verificare la simmetria del torus
#
# Uso:
#   dotnet run -- -i scenes/torus-showcase.yaml -c pinhole -s 36 -w 800 -H 533
#   dotnet run -- -i scenes/torus-showcase.yaml -c dof_soft -s 36 -w 800 -H 533
#   dotnet run -- -i scenes/torus-showcase.yaml -c closeup -s 64 -w 800 -H 533
# ============================================================================

world:
  ambient_light: [0.03, 0.03, 0.04]
  background: [0.0, 0.0, 0.0]
  sky:
    type: "gradient"
    zenith_color: [0.05, 0.05, 0.12]
    horizon_color: [0.12, 0.12, 0.18]
    ground_color: [0.04, 0.04, 0.06]
  ground:
    y: 0.0
    material: "pavimento"

cameras:
  # ── Baseline: pinhole, tutto a fuoco ──────────────────────────────────
  - name: "pinhole"
    position: [4, 3, -6]
    look_at: [0, 0.6, 0]
    fov: 45
    aperture: 0.0
    focal_dist: 1

  # ── DoF morbido: test deformazioni con focal_dist medio ──────────────
  - name: "dof_soft"
    position: [4, 3, -6]
    look_at: [0, 0.6, 0]
    fov: 45
    aperture: 0.08
    focal_dist: 8

  # ── DoF estremo: stress test per il quartic solver ────────────────────
  - name: "dof_extreme"
    position: [4, 3, -6]
    look_at: [0, 0.6, 0]
    fov: 45
    aperture: 0.2
    focal_dist: 10

  # ── Closeup: primo piano sulla pedina per ispezionare il contorno ─────
  - name: "closeup"
    position: [1.2, 0.5, -2.0]
    look_at: [0, 0.25, 0]
    fov: 30
    aperture: 0.0
    focal_dist: 1

  # ── Zenitale: vista dall'alto per simmetria ───────────────────────────
  - name: "top"
    position: [0, 6, 0.01]
    look_at: [0, 0, 0]
    fov: 50
    aperture: 0.0
    focal_dist: 1

# ============================================================================
# MATERIALI
# ============================================================================
materials:

  - id: "pavimento"
    type: "disney"
    roughness: 0.6
    metallic: 0.0
    specular: 0.0
    texture:
      type: "checker"
      colors: [[0.10, 0.10, 0.12], [0.22, 0.22, 0.25]]
      scale: 1.0

  # ── Materiali per le geometrie di test ────────────────────────────────
  - id: "ceramica_bianca"
    type: "disney"
    color: [0.92, 0.90, 0.88]
    roughness: 0.25
    metallic: 0.0
    specular: 0.5
    clearcoat: 0.8

  - id: "ceramica_azzurra"
    type: "disney"
    color: [0.35, 0.55, 0.85]
    roughness: 0.2
    metallic: 0.0
    specular: 0.5
    clearcoat: 0.6

  - id: "rame"
    type: "disney"
    color: [0.85, 0.55, 0.35]
    roughness: 0.3
    metallic: 0.95

  - id: "acciaio"
    type: "disney"
    color: [0.6, 0.6, 0.62]
    roughness: 0.15
    metallic: 1.0

  - id: "vetro"
    type: "dielectric"
    refraction_index: 1.5

  - id: "gomma_grigia"
    type: "disney"
    color: [0.25, 0.25, 0.25]
    roughness: 0.9
    metallic: 0.0

  - id: "rosso_opaco"
    type: "lambertian"
    color: [0.75, 0.15, 0.12]

  - id: "verde_opaco"
    type: "lambertian"
    color: [0.15, 0.65, 0.25]

  - id: "giallo_opaco"
    type: "lambertian"
    color: [0.85, 0.75, 0.15]

  - id: "luce_area"
    type: "emissive"
    color: [1.0, 0.95, 0.85]
    intensity: 15.0

  - id: "luce_accento"
    type: "emissive"
    color: [0.6, 0.8, 1.0]
    intensity: 10.0

# ============================================================================
# LUCI
# ============================================================================
lights:
  # Key light — sopra e davanti a sinistra
  - type: "point"
    position: [-3, 5, -4]
    color: [1.0, 0.95, 0.85]
    intensity: 25

  # Fill light — destra, più morbida
  - type: "point"
    position: [5, 3, -2]
    color: [0.7, 0.8, 1.0]
    intensity: 12

  # Rim light — dietro
  - type: "point"
    position: [0, 4, 5]
    color: [1.0, 0.9, 0.7]
    intensity: 10

# ============================================================================
# TEMPLATE: pedina di test
# ============================================================================
templates:

  - name: "pedina"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.38
        height: 0.05
      - type: "torus"
        translate: [0, 0.05, 0]
        major_radius: 0.35
        minor_radius: 0.06
      - type: "cone"
        center: [0, 0.05, 0]
        radius: 0.30
        top_radius: 0.13
        height: 0.48
      - type: "torus"
        translate: [0, 0.53, 0]
        major_radius: 0.15
        minor_radius: 0.04
      - type: "cylinder"
        center: [0, 0.53, 0]
        radius: 0.09
        height: 0.12
      - type: "sphere"
        center: [0, 0.74, 0]
        radius: 0.16

# ============================================================================
# ENTITIES
# ============================================================================
entities:

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 1: Pedina 1
  # ═══════════════════════════════════════════════════════════════════════
  - name: "pedina_1"
    type: "instance"
    template: "pedina"
    material: "ceramica_bianca"
    translate: [-2, 0, 0]

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 2: Pedina 2
  # ═══════════════════════════════════════════════════════════════════════
  - name: "pedina_2"
    type: "instance"
    template: "pedina"
    material: "ceramica_azzurra"
    #material: "rosso_opaco"
    translate: [0, 0, 0]

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 3: Pedina scalata (stress test per Transform + quartica)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "pedina_grande"
    type: "instance"
    template: "pedina"
    material: "rame"
    translate: [2.2, 0, 0]
    scale: 1.5

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 4: Torus isolato con cono nel buco (test puro di occlusione)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "torus_grande"
    type: "torus"
    center: [-2, 0.4, 2.5]
    major_radius: 0.6
    minor_radius: 0.15
    material: "acciaio"

  - name: "cono_nel_buco"
    type: "cone"
    center: [-2, 0, 2.5]
    radius: 0.50           # era 0.35 → copre l'inner edge del torus (0.45)
    top_radius: 0.10
    height: 0.9
    material: "rosso_opaco"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 5: Torus con cilindro attraverso il buco
  # ═══════════════════════════════════════════════════════════════════════
  - name: "torus_cilindro"
    type: "torus"
    center: [0, 0.5, 2.5]
    major_radius: 0.5
    minor_radius: 0.12
    material: "ceramica_azzurra"

  - name: "cilindro_attraverso"
    type: "cylinder"
    center: [0, 0, 2.5]
    radius: 0.36           # era 0.28 → chiude il gap col torus inner edge (0.38)
    height: 1.0
    material: "verde_opaco"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 6: Torus in vetro (test rifrazione + quartica)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "torus_vetro"
    type: "torus"
    center: [2, 0.35, 2.5]
    major_radius: 0.45
    minor_radius: 0.12
    material: "vetro"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 7: Annulus — disco piatto con foro
  # ═══════════════════════════════════════════════════════════════════════
  - name: "annulus_piatto"
    type: "annulus"
    center: [-2, 0.01, -2]
    normal: [0, 1, 0]
    radius: 0.8
    inner_radius: 0.35
    material: "rame"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 8: Annulus verticale (test orientamento normale)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "annulus_verticale"
    type: "annulus"
    center: [0, 0.6, -2]
    normal: [0, 0, -1]
    radius: 0.6
    inner_radius: 0.25
    material: "giallo_opaco"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 9: Annulus inclinato
  # ═══════════════════════════════════════════════════════════════════════
  - name: "annulus_inclinato"
    type: "annulus"
    center: [2, 0.5, -2]
    normal: [0.3, 1, -0.2]
    radius: 0.5
    inner_radius: 0.2
    material: "ceramica_bianca"

  # ═══════════════════════════════════════════════════════════════════════
  # TEST 10: Torus emissivo (test ISamplable + NEE)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "neon_anello"
    type: "torus"
    center: [0, 2.5, 1]
    major_radius: 0.8
    minor_radius: 0.03
    material: "luce_accento"
