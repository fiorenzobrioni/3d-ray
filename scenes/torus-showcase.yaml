# ============================================================================
# Scene: Torus Showcase
# Tests: Ring torus, horn torus, glass torus, CSG with torus, emissive torus
# ============================================================================

camera:
  position: [0, 6, -14]
  look_at: [0, 1.5, 0]
  fov: 42
  aperture: 0.0

world:
  ambient_light: [0.02, 0.02, 0.03]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.08]
    horizon_color: [0.08, 0.06, 0.12]
    ground_color: [0.03, 0.03, 0.03]
  ground:
    type: "plane"
    material: "pavimento"
    y: 0

materials:
  # ── Pavimento ──────────────────────────────────────────────────────────────
  - id: "pavimento"
    type: "disney"
    roughness: 0.6
    texture:
      type: "checker"
      colors: [[0.08, 0.08, 0.08], [0.18, 0.18, 0.18]]
      scale: 1.0

  # ── Materiali per i tori ───────────────────────────────────────────────────
  - id: "oro_lucido"
    type: "disney"
    color: [1.0, 0.84, 0.0]
    roughness: 0.1
    metallic: 1.0

  - id: "rame"
    type: "disney"
    color: [0.72, 0.45, 0.20]
    roughness: 0.25
    metallic: 1.0

  - id: "ceramica_bianca"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.3
    metallic: 0.0

  - id: "gomma_nera"
    type: "disney"
    color: [0.05, 0.05, 0.05]
    roughness: 0.85
    metallic: 0.0

  - id: "vetro"
    type: "dielectric"
    refraction_index: 1.5

  - id: "rubino"
    type: "dielectric"
    refraction_index: 1.76
    color: [0.9, 0.1, 0.1]

  - id: "acciaio"
    type: "disney"
    color: [0.8, 0.8, 0.82]
    roughness: 0.2
    metallic: 1.0

  - id: "marmo_bianco"
    type: "disney"
    color: [0.95, 0.92, 0.88]
    roughness: 0.4
    texture:
      type: "marble"
      scale: 2.0
      colors: [[0.95, 0.92, 0.88], [0.6, 0.58, 0.55]]

  # ── Emissive ───────────────────────────────────────────────────────────────
  - id: "neon_rosa"
    type: "emissive"
    color: [1.0, 0.2, 0.6]
    intensity: 12.0

  - id: "neon_azzurro"
    type: "emissive"
    color: [0.2, 0.6, 1.0]
    intensity: 10.0

lights:
  - type: "point"
    position: [6, 12, -8]
    color: [1, 1, 1]
    intensity: 140

  - type: "point"
    position: [-6, 8, -4]
    color: [0.8, 0.85, 1.0]
    intensity: 100

entities:
  # ═══════════════════════════════════════════════════════════════════════════
  # RIGA POSTERIORE — Tori base
  # ═══════════════════════════════════════════════════════════════════════════

  # 1. Ring torus classico — oro lucido
  - name: "toro_oro"
    type: "torus"
    major_radius: 1.2
    minor_radius: 0.35
    translate: [-4, 1.55, 3]
    material: "oro_lucido"

  # 2. Toro di vetro trasparente — rifrazioni complesse
  - name: "toro_vetro"
    type: "torus"
    major_radius: 1.0
    minor_radius: 0.4
    translate: [0, 1.4, 3]
    material: "vetro"

  # 3. Toro in rame — tubo sottile (anello)
  - name: "anello_rame"
    type: "torus"
    major_radius: 1.3
    minor_radius: 0.12
    translate: [4, 1.42, 3]
    material: "rame"

  # ═══════════════════════════════════════════════════════════════════════════
  # RIGA CENTRALE — Tori orientati e scalati
  # ═══════════════════════════════════════════════════════════════════════════

  # 4. Pneumatico in piedi (ruotato 90° su X)
  - name: "pneumatico"
    type: "torus"
    major_radius: 1.5
    minor_radius: 0.55
    rotate: [90, 0, 0]
    translate: [-4, 2.05, 0]
    material: "gomma_nera"

  # 5. Toro di marmo — inclinato
  - name: "toro_marmo"
    type: "torus"
    major_radius: 1.1
    minor_radius: 0.3
    rotate: [25, 0, 15]
    translate: [0, 1.5, 0]
    material: "marmo_bianco"

  # 6. Toro di rubino — piedra preziosa ad anello
  - name: "toro_rubino"
    type: "torus"
    major_radius: 0.9
    minor_radius: 0.45
    translate: [4, 1.35, 0]
    material: "rubino"

  # ═══════════════════════════════════════════════════════════════════════════
  # RIGA ANTERIORE — CSG con tori e emissive
  # ═══════════════════════════════════════════════════════════════════════════

  # 7. Mezzo toro sezionato (CSG subtraction)
  - name: "mezzo_toro"
    type: "csg"
    operation: "subtraction"
    material: "acciaio"
    translate: [-4, 1.2, -3]
    left:
      type: "torus"
      major_radius: 1.2
      minor_radius: 0.3
    right:
      type: "box"
      scale: [4, 4, 4]
      translate: [0, 2, 0]

  # 8. Catena — due anelli concatenati
  - name: "catena"
    type: "csg"
    operation: "union"
    material: "acciaio"
    translate: [0, 1.2, -3]
    left:
      type: "torus"
      major_radius: 0.7
      minor_radius: 0.1
    right:
      type: "torus"
      major_radius: 0.7
      minor_radius: 0.1
      rotate: [90, 0, 0]
      translate: [1.3, 0, 0]

  # 9. Toro con cilindro passante (CSG union)
  - name: "toro_con_asse"
    type: "csg"
    operation: "union"
    material: "rame"
    translate: [4, 1.5, -3]
    left:
      type: "torus"
      major_radius: 1.0
      minor_radius: 0.2
    right:
      type: "cylinder"
      center: [0, -1.5, 0]
      radius: 0.15
      height: 3.0

  # ═══════════════════════════════════════════════════════════════════════════
  # EMISSIVE — Neon ad anello (test ISamplable + NEE)
  # ═══════════════════════════════════════════════════════════════════════════

  # 10. Neon rosa — anello sottile sospeso
  - name: "neon_anello_rosa"
    type: "torus"
    major_radius: 2.5
    minor_radius: 0.04
    translate: [0, 5.5, 0]
    material: "neon_rosa"

  # 11. Neon azzurro — anello più piccolo
  - name: "neon_anello_azzurro"
    type: "torus"
    major_radius: 1.8
    minor_radius: 0.03
    translate: [0, 4.8, 0]
    material: "neon_azzurro"
