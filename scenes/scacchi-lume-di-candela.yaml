# ═══════════════════════════════════════════════════════════════════════════════
#  SCACCHI A LUME DI CANDELA — Zugzwang
#
#  Scena in stile natura morta fiamminga: partita a scacchi interrotta su un
#  tavolo in rovere, illuminata da una singola candela. La posizione è un
#  endgame drammatico — il Re nero bloccato nell'angolo h8 dalla Regina bianca
#  che ha appena dato scacco matto. Sul tavolo accanto alla scacchiera giacciono
#  due pezzi catturati durante la partita: un alfiere nero sdraiato su un
#  fianco e un pedone bianco rotolato fuori dal bordo. Un bicchiere di vino
#  rosso e un libro rilegato in pelle completano la composizione.
#
#  Tutti i pezzi Staunton usano i template della libreria chess.yaml,
#  integralmente torniti via lathe Catmull-Rom: base, stelo, collarino e
#  testa sono generati da un singolo profilo C¹ per ciascun pezzo.
#
#  Feature dimostrate:
#    • Libreria chess.yaml    → pezzi Staunton lathe + scacchiera in mogano
#    • Libreria tableware.yaml → bicchiere_vino (lathe) e decanter
#    • Libreria materials     → legni Disney, vetri/cristalli, pelli
#    • NEE + clamp basso      → candela come sorgente principale + vino
#    • Multi-camera           → 4 inquadrature cinematografiche
#    • Rotazione 90°          → alfiere sdraiato sul tavolo
#
#  AMBIENTAZIONE: Indoor, notte — studio di un nobile a lume di candela
#  STILE: Chiaroscuro fiammingo, intimo, tensione narrativa
#
#  Render consigliati:
#    Preview:  -w 400  -H 225  -s 64   -d 6   -S 1  -C 50
#    Standard: -w 800  -H 450  -s 256  -d 12  -S 4  -C 25
#    Finale:   -w 1920 -H 1080 -s 1024 -d 16  -S 4  -C 25
#
#  NOTE:
#    - Profondità alta (d ≥ 12): il bicchiere di vino e il decanter sono
#      dielettrici (cristallo IOR 1.62) con liquido rosso rifrattivo.
#    - Clamp basso (-C 25): gli spot speculari sui pezzi a forte roughness
#      bassa (cromo/ebano lucido) tendono a produrre fireflies occasionali
#      sotto la candela.
#    - Tutti i pezzi Staunton sono lathe puri (senza CSG per il corpo),
#      quindi ogni pezzo costa ~10× un equivalente conico analitico:
#      previsti tempi di render moderati con 8 pezzi sulla scacchiera.
# ═══════════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════
#  IMPORT — librerie condivise
# ═══════════════════════════════════════════════════════════════════════════
imports:
  - path: "libraries/materials/metals.yaml"
  - path: "libraries/materials/woods.yaml"
  - path: "libraries/materials/glasses.yaml"
  - path: "libraries/materials/foods.yaml"
  - path: "libraries/materials/organics.yaml"
  - path: "libraries/materials/emissives.yaml"
  - path: "libraries/materials/fabrics.yaml"
  - path: "libraries/objects/chess.yaml"
  - path: "libraries/objects/tableware.yaml"


# ═══════════════════════════════════════════════════════════════════════════
#  WORLD — studio buio, nessuna luce ambiente, sfondo nero
#  La candela è l'unica sorgente diretta visibile.
# ═══════════════════════════════════════════════════════════════════════════
world:
  ambient_light: [0.028, 0.022, 0.014]
  background:    [0.0, 0.0, 0.0]


# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS — 4 inquadrature
# ═══════════════════════════════════════════════════════════════════════════
cameras:

  # HERO — 3/4 frontale dal lato dei bianchi (altezza "giocatore seduto")
  # Incornicia la scacchiera con la candela a sinistra in primo piano e
  # il Re nero nell'angolo h8 come soggetto principale sul lato lontano.
  - name: "hero"
    position:   [0.35, 1.20, -0.70]
    look_at:    [0.02, 0.81, 0.05]
    fov:        40
    aperture:   0.025
    focal_dist: 0.82

  # SCACCO_MATTO — macro a quota-pezzo sulla Regina bianca in primo piano
  # e il Re nero in profondità. Camera sul lato della candela così i
  # pezzi sono front-luminosi. Profondità di campo corta: la Regina è
  # perfettamente a fuoco, il Re leggermente ammorbidito.
  - name: "scacco_matto"
    position:   [-0.25, 0.90, -0.30]
    look_at:    [0.10, 0.87, 0.14]
    fov:        28
    aperture:   0.035
    focal_dist: 0.60

  # LATERALE — vista di taglio lungo la diagonale h1-a8, i pezzi
  # diventano silhouettes contro il bagliore della candela.
  - name: "laterale"
    position:   [-0.70, 0.87, 0.40]
    look_at:    [0.30, 0.82, -0.10]
    fov:        38
    aperture:   0.020
    focal_dist: 0.95

  # ZENITALE — inquadratura dall'alto, stile "chess notation":
  # mostra la posizione come se letta su un diagramma.
  - name: "zenitale"
    position:   [0.0, 1.60, 0.0]
    look_at:    [0.0, 0.81, 0.0]
    vup:        [0, 0, -1]
    fov:        32
    aperture:   0.0
    focal_dist: 0.8


# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS — candela (NEE via emissive) + rim freddo (luna fuori campo)
# ═══════════════════════════════════════════════════════════════════════════
lights:

  # RIM FREDDO — finestra fuori campo che filtra luce lunare dal retro-sx.
  # Separa i pezzi dallo sfondo scuro con un contrasto caldo/freddo.
  - type: "directional"
    direction: [0.70, -0.35, -0.65]
    color:     [0.40, 0.52, 0.85]
    intensity: 0.020

  # BAGLIORE PARETE — sphere light molto tenue dietro il giocatore.
  # Simula il riflesso caldo di un focolare spento nel camino laterale.
  - type: "sphere"
    position:  [-1.2, 0.55, -1.6]
    radius:    0.30
    color:     [0.90, 0.45, 0.18]
    intensity: 1.8
    shadow_samples: 4


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS — solo custom (stanza / tavolo)
#  Tutti gli altri arrivano dalle librerie importate in cima al file.
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ── Pavimento: parquet scuro con leggera variazione ─────────────────────
  - id: "pavimento_parquet"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 2.2
      colors: [[0.22, 0.13, 0.06], [0.14, 0.08, 0.03]]
      randomize_offset: true
      randomize_rotation: true
    roughness: 0.50
    specular: 0.30
    clearcoat: 0.20
    coat_roughness: 0.45

  # ── Muri in stucco rosso scuro (palette bordeaux da studio nobiliare) ────
  - id: "muro_bordeaux"
    type: "disney"
    texture:
      type: "noise"
      scale: 10.0
      noise_strength: 0.30
      colors: [[0.22, 0.08, 0.06], [0.16, 0.05, 0.04]]
      randomize_offset: true
    roughness: 0.92
    specular: 0.08

  # ── Soffitto: legno scuro a travi (quasi nero) ──────────────────────────
  - id: "soffitto_legno"
    type: "disney"
    color:    [0.06, 0.04, 0.03]
    roughness: 0.85

  # ── Piano del tavolo: rovere scuro vissuto ──────────────────────────────
  - id: "tavolo_rovere"
    type: "disney"
    texture:
      type: "wood"
      scale: 3.0
      noise_strength: 2.8
      colors: [[0.28, 0.16, 0.07], [0.18, 0.10, 0.04]]
      randomize_offset: true
    roughness: 0.40
    specular: 0.45
    clearcoat: 0.30
    coat_roughness: 0.35

  # ── Pelle bordeaux per il libro (copertina rilegata) ────────────────────
  - id: "pelle_libro"
    type: "disney"
    color: [0.32, 0.10, 0.08]
    roughness: 0.55
    specular: 0.30
    sheen: 0.35
    sheen_tint: 0.50

  # ── Oro per i fregi sul dorso del libro ─────────────────────────────────
  - id: "oro_fregio"
    type: "disney"
    color: [1.0, 0.72, 0.28]
    metallic: 1.0
    roughness: 0.18
    specular: 0.70

  # ── Carta delle pagine del libro ────────────────────────────────────────
  - id: "carta_antica"
    type: "disney"
    color: [0.82, 0.76, 0.60]
    roughness: 0.90
    specular: 0.10

  # ── Stoppino candela (scuro, quasi carbonizzato) ────────────────────────
  - id: "stoppino"
    type: "lambertian"
    color: [0.05, 0.04, 0.03]

  # ── Override della fiamma: più intensa del default library (4.0 → 12).
  # Con ambient bassa serve più flusso dalla candela per illuminare i
  # pezzi più distanti (h7/g8). Stesso colore 1800K della libreria.
  - id: "fiamma_candela"
    type: "emissive"
    color: [1.0, 0.55, 0.12]
    intensity: 12.0


# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  STANZA — scatola chiusa tranne fronte (camera-facing)
  #  Dimensioni: 4 × 2.5 × 4 (X × Y × Z)
  # ─────────────────────────────────────────────────────────────────────────

  - { name: "pavimento", type: "quad", q: [-2.0, 0.0,    -2.0], u: [4, 0, 0], v: [0, 0, 4], material: "pavimento_parquet", seed: 10 }
  - { name: "soffitto",  type: "quad", q: [-2.0, 2.5,    -2.0], u: [4, 0, 0], v: [0, 0, 4], material: "soffitto_legno" }
  - { name: "muro_sx",   type: "quad", q: [-2.0, 0.0,    -2.0], u: [0, 0, 4], v: [0, 2.5, 0], material: "muro_bordeaux", seed: 11 }
  - { name: "muro_dx",   type: "quad", q: [ 2.0, 0.0,    -2.0], u: [0, 0, 4], v: [0, 2.5, 0], material: "muro_bordeaux", seed: 12 }
  - { name: "muro_back", type: "quad", q: [-2.0, 0.0,     2.0], u: [4, 0, 0], v: [0, 2.5, 0], material: "muro_bordeaux", seed: 13 }

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO IN ROVERE — top + 4 gambe
  #  Top: Y = 0.76 → 0.80 (spessore 4 cm)
  # ─────────────────────────────────────────────────────────────────────────

  - name: "tavolo_top"
    type: "box"
    scale: [1.40, 0.04, 0.90]
    translate: [0.0, 0.780, 0.0]
    material: "tavolo_rovere"
    seed: 50

  # Gambe (cilindri tornìti semplici, altezza 0.76)
  - { name: "gamba_fl", type: "cylinder", center: [-0.60, 0.0, -0.38], radius: 0.030, height: 0.76, material: "tavolo_rovere" }
  - { name: "gamba_fr", type: "cylinder", center: [ 0.60, 0.0, -0.38], radius: 0.030, height: 0.76, material: "tavolo_rovere" }
  - { name: "gamba_bl", type: "cylinder", center: [-0.60, 0.0,  0.38], radius: 0.030, height: 0.76, material: "tavolo_rovere" }
  - { name: "gamba_br", type: "cylinder", center: [ 0.60, 0.0,  0.38], radius: 0.030, height: 0.76, material: "tavolo_rovere" }

  # ─────────────────────────────────────────────────────────────────────────
  #  SCACCHIERA — mogano con checker legno, appoggiata sul tavolo (Y=0.80)
  #  Il piano di gioco risulta a Y = 0.80 + 0.031 = 0.831
  #  Squares 0.05 m. Centri:
  #    files a..h → X = -0.175, -0.125, -0.075, -0.025, 0.025, 0.075, 0.125, 0.175
  #    ranks 1..8 → Z = -0.175, -0.125, -0.075, -0.025, 0.025, 0.075, 0.125, 0.175
  # ─────────────────────────────────────────────────────────────────────────

  - name: "scacchiera"
    type: "instance"
    template: "scacchiera_legno"
    translate: [0.0, 0.800, 0.0]

  # ─────────────────────────────────────────────────────────────────────────
  #  POSIZIONE — Endgame: scacco matto del Re nero in h8
  #
  #     8  r . . . . . k .    (nero: re in g8, torre in a8)
  #     7  . . . . . p . p    (nero: pedoni in f7, h7)
  #     6  . . n . . . . .    (nero: cavallo in c6)
  #     5  . . . . Q . . .    (BIANCO: regina in e5 — dà matto)
  #     4  . . B . . . . .    (BIANCO: alfiere in c4)
  #     3  . . . . K . . .    (BIANCO: re in e3)
  #     2  . . . . . . . .
  #     1  . . . . . . . .
  #
  #  Il Re nero in g8 è mattato: la Regina bianca in e5 copre la diagonale
  #  e5-g7, l'Alfiere bianco in c4 copre la diagonale c4-g8. Unica fuga
  #  sarebbe h8 ma il pedone in h7 la blocca. La Torre in a8 è troppo lontana.
  # ─────────────────────────────────────────────────────────────────────────

  # ── BIANCHI ──────────────────────────────────────────────────────────────
  - name: "bianco_re"
    type: "instance"
    template: "re_staunton"
    material: "chs_legno_chiaro"
    translate: [0.025, 0.831, -0.075]   # e3

  - name: "bianco_regina"
    type: "instance"
    template: "regina_staunton"
    material: "chs_legno_chiaro"
    translate: [0.025, 0.831, 0.025]    # e5

  - name: "bianco_alfiere"
    type: "instance"
    template: "alfiere_staunton"
    material: "chs_legno_chiaro"
    translate: [-0.075, 0.831, -0.025]  # c4

  # ── NERI ─────────────────────────────────────────────────────────────────
  - name: "nero_re"
    type: "instance"
    template: "re_staunton"
    material: "chs_ebano"
    translate: [0.125, 0.831, 0.175]    # g8

  - name: "nero_torre"
    type: "instance"
    template: "torre_staunton"
    material: "chs_ebano"
    translate: [-0.175, 0.831, 0.175]   # a8

  - name: "nero_cavallo"
    type: "instance"
    template: "cavallo_staunton"
    material: "chs_ebano"
    translate: [-0.075, 0.831, 0.075]   # c6
    rotate: [0, -90, 0]                 # cavallo rivolto verso il Re bianco

  - name: "nero_pedone_f7"
    type: "instance"
    template: "pedone_staunton"
    material: "chs_ebano"
    translate: [0.075, 0.831, 0.125]    # f7

  - name: "nero_pedone_h7"
    type: "instance"
    template: "pedone_staunton"
    material: "chs_ebano"
    translate: [0.175, 0.831, 0.125]    # h7

  # ─────────────────────────────────────────────────────────────────────────
  #  PEZZI CATTURATI — giacciono sul tavolo accanto alla scacchiera
  # ─────────────────────────────────────────────────────────────────────────

  # Alfiere nero catturato, sdraiato su un fianco (rotato 90° sull'asse Z).
  # La base ora "punta" verso +X; il pezzo appoggia sul suo lato destro.
  # La mitra fessa resta visibile grazie alla rotazione.
  - name: "alfiere_catturato"
    type: "instance"
    template: "alfiere_staunton"
    material: "chs_ebano"
    translate: [0.320, 0.818, 0.00]
    rotate: [0, 0, 90]

  # Pedone bianco catturato, sdraiato più vicino al bordo del tavolo.
  # Leggermente ruotato in Y per variare la prospettiva.
  - name: "pedone_catturato"
    type: "instance"
    template: "pedone_staunton"
    material: "chs_legno_chiaro"
    translate: [0.380, 0.818, -0.10]
    rotate: [0, 20, 90]

  # ─────────────────────────────────────────────────────────────────────────
  #  CANDELA — candeliere tornito + candela di cera + fiamma emissiva
  #
  #  Lathe Linear per il candeliere (base larga + stelo + piattino superiore),
  #  poi cilindro di cera e sfera emissiva per la fiamma. La candela è a
  #  sinistra della scacchiera: diventa la fonte luminosa principale e
  #  proietta ombre lunghe dei pezzi verso la camera "hero".
  # ─────────────────────────────────────────────────────────────────────────

  # Candeliere in ottone tornito (lathe)
  - name: "candeliere"
    type: "lathe"
    profile_type: "catmull_rom"
    material: "dis_ottone_antico"
    translate: [-0.28, 0.800, -0.14]
    profile:
      - [0.000, 0.000]
      - [0.040, 0.000]   # bordo esterno della base
      - [0.042, 0.006]
      - [0.035, 0.012]   # modanatura (toro) del piattino
      - [0.018, 0.018]   # raccordo verso lo stelo
      - [0.012, 0.030]
      - [0.010, 0.060]   # stelo tornito
      - [0.014, 0.072]   # nodo decorativo (ellissoide schiacciato)
      - [0.010, 0.088]
      - [0.010, 0.110]
      - [0.018, 0.118]   # piattino porta-candela svasato
      - [0.020, 0.126]
      - [0.018, 0.130]   # bordo superiore del piattino
      - [0.010, 0.132]   # piccolo incavo dove si infila la cera
      - [0.000, 0.132]

  # Candela di cera (sopra il piattino del candeliere)
  - name: "candela_cera"
    type: "cylinder"
    center: [-0.28, 0.930, -0.14]
    radius: 0.0092
    height: 0.080
    material: "dis_cera_api"

  # Stoppino visibile (minuscolo cilindro nero sopra la cera)
  - name: "stoppino_candela"
    type: "cylinder"
    center: [-0.28, 1.008, -0.14]
    radius: 0.0015
    height: 0.012
    material: "stoppino"

  # Fiamma: ellissoide emissivo che fa da NEE light principale
  - name: "fiamma"
    type: "sphere"
    center: [-0.28, 1.026, -0.14]
    radius: 0.014
    scale: [0.75, 1.80, 0.75]
    material: "fiamma_candela"

  # ─────────────────────────────────────────────────────────────────────────
  #  BICCHIERE DI VINO — calice in cristallo dalla libreria tableware
  #  con un secondo lathe che simula il livello del vino rosso.
  # ─────────────────────────────────────────────────────────────────────────

  - name: "calice"
    type: "instance"
    template: "bicchiere_vino"
    translate: [0.38, 0.800, 0.20]

  # Vino rosso dentro il calice (lathe Catmull-Rom piccolo, superficie
  # menisco piatta in cima). Segue il profilo interno della coppa del
  # bicchiere_vino (raggio max ~0.042 a y=0.175).
  - name: "vino_nel_calice"
    type: "lathe"
    profile_type: "catmull_rom"
    material: "dis_vino_rosso"
    translate: [0.38, 0.800, 0.20]
    profile:
      - [0.000, 0.140]
      - [0.024, 0.143]
      - [0.034, 0.158]
      - [0.040, 0.175]
      - [0.040, 0.180]   # superficie (menisco) del vino
      - [0.000, 0.180]

  # ─────────────────────────────────────────────────────────────────────────
  #  LIBRO APERTO — rilegatura in pelle bordeaux, pagine color avorio
  #  Posizionato all'angolo del tavolo come se il giocatore avesse
  #  consultato un manuale di teoria prima della partita.
  # ─────────────────────────────────────────────────────────────────────────

  # Blocco pagine (cuboide di carta antica)
  - name: "libro_pagine"
    type: "box"
    scale: [0.180, 0.030, 0.130]
    translate: [-0.48, 0.815, 0.28]
    rotate: [0, 15, 0]
    material: "carta_antica"

  # Copertina (box leggermente più grande sopra/sotto)
  - name: "libro_copertina"
    type: "box"
    scale: [0.190, 0.034, 0.140]
    translate: [-0.48, 0.813, 0.28]
    rotate: [0, 15, 0]
    material: "pelle_libro"

  # Filetto d'oro sul dorso (cilindretto lungo il bordo superiore)
  - name: "libro_dorso_filetto"
    type: "cylinder"
    center: [-0.479, 0.831, 0.220]
    radius: 0.002
    height: 0.095
    rotate: [90, 15, 0]
    material: "oro_fregio"


# ─── ALT-WORLD: gradiente caldo ambiente (decommenta per alzare la base) ───
# world:
#   ambient_light: [0.030, 0.022, 0.012]
#   sky:
#     type: "gradient"
#     zenith_color:  [0.018, 0.012, 0.008]
#     horizon_color: [0.10,  0.06,  0.025]
#     ground_color:  [0.03,  0.02,  0.01]

# ─── ALT-LIGHTS — aggiungi un point light per enfatizzare ulteriormente ───
# lights:
#   - type: "point"
#     position: [-0.32, 1.03, 0.0]   # sulla fiamma
#     color: [1.0, 0.52, 0.10]
#     intensity: 3.0
