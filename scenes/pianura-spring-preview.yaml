# 3D-Ray terrain preview scene — generated by TerrainGen --with-cameras
#
# Render with:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/pianura-spring-preview.yaml -o renders/preview-pianura-spring.png \
#     -w 1280 -H 720 -s 256 -d 6 -S 2 -c wide
#
# Cameras: wide | aerial | ground | sunrise | topdown
# List them with --list-cameras.

imports:
  - path: "libraries/terrain/pianura-spring.yaml"

world:
  ambient_light: [0.060, 0.080, 0.100]
  sky:
    type: "gradient"
    zenith_color:  [0.300, 0.550, 0.850]
    horizon_color: [0.920, 0.940, 0.960]
    ground_color:  [0.300, 0.360, 0.200]
    sun:
      direction: [-0.465, -0.814, -0.349]
      color: [1.000, 0.970, 0.920]
      intensity: 14.000
      size: 2.500
      falloff: 32.0

lights:
  - type: "directional"
    direction: [0.655, -0.573, 0.492]
    color: [0.920, 0.940, 0.960]
    intensity: 1.400

cameras:
  - name: "wide"
    position: [100.000, 50.000, 90.000]
    look_at:  [0.000, 9.662, 0.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "aerial"
    position: [0.000, 92.500, 90.000]
    look_at:  [0.000, 0.000, 0.000]
    fov:      55.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "ground"
    position: [-30.000, 13.662, 30.000]
    look_at:  [30.000, 9.662, -30.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "sunrise"
    position: [-60.000, 15.662, -10.000]
    look_at:  [40.000, 9.662, 10.000]
    fov:      55.000
    aperture: 0.050
    focal_dist: 80.000

  - name: "topdown"
    position: [0.000, 150.000, 0.001]
    look_at:  [0.000, 0.000, 0.000]
    fov:      70.000
    aperture: 0.000
    focal_dist: 1.000

entities:
  - name: "terrain"
    type: "instance"
    template: "pianura_spring"
    translate: [0.000, 0.000, 0.000]
