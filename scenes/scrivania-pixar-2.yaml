# ==============================================================================
# SCENE: Desk in the Dark (Pixar Lamp Setup)
# ==============================================================================

world:
  # Luce ambientale quasi assente per un forte contrasto drammatico
  ambient_light: [0.005, 0.005, 0.01]
  # Background scurissimo per simulare una stanza buia di notte
  background: [0.01, 0.01, 0.015]

cameras:
  - name: "main_shot"
    position: [-1.0, 4.0, 6.0]
    look_at: [0.5, 0.0, 0.0]
    fov: 40
    aperture: 0.08
    focal_dist: 7.3  # Mette a fuoco il notebook e la penna sul sottomano
    vup: [0, 1, 0]

  - name: "macro_pen_shot"
    position: [2.5, 1.0, 2.0]
    look_at: [1.2, 0.09, 0.6]
    fov: 30
    aperture: 0.03
    focal_dist: 1.9

materials:
  # --- Scrivania e Sottomano ---
  - id: "desk_wood"
    type: "disney"
    color: [0.15, 0.08, 0.03]
    roughness: 0.4
    clearcoat: 0.2
    texture:
      type: "wood"
      scale: 3.0
      noise_strength: 2.0
      colors: [[0.25, 0.13, 0.06], [0.12, 0.06, 0.02]]

  - id: "mat_leather"
    type: "disney"
    color: [0.06, 0.07, 0.08]
    roughness: 0.85
    sheen: 1.0
    sheen_tint: 0.5
    texture:
      type: "noise"
      scale: 80.0
      noise_strength: 0.2

  # --- Materiali Lampada Pixar ---
  - id: "pixar_red"
    type: "disney"
    color: [0.8, 0.12, 0.12]
    metallic: 0.0
    roughness: 0.25
    clearcoat: 1.0
    clearcoat_gloss: 0.95

  - id: "lamp_metal_joints"
    type: "metal"
    color: [0.85, 0.85, 0.88]
    fuzz: 0.15

  - id: "bulb_glow"
    type: "emissive"
    color: [1.0, 0.92, 0.75]
    intensity: 20.0

  # --- Oggetti da Scrivania ---
  - id: "paper"
    type: "lambertian"
    color: [0.95, 0.93, 0.88]

  - id: "notebook_cover"
    type: "disney"
    color: [0.08, 0.15, 0.3]
    roughness: 0.5
    clearcoat: 0.5

  - id: "pen_body"
    type: "metal"
    color: [0.1, 0.1, 0.1]
    fuzz: 0.2

  - id: "brass_tip"
    type: "metal"
    color: [0.9, 0.75, 0.3]
    fuzz: 0.05

  - id: "ceramic_mug"
    type: "disney"
    color: [0.85, 0.85, 0.82]
    roughness: 0.1
    clearcoat: 1.0

entities:
  # ================= GEOMETRIA DELLA SCRIVANIA =================
  - name: "desk_surface"
    type: "box"
    scale: [18.0, 0.5, 10.0]
    translate: [0, -0.25, 0]
    material: "desk_wood"

  - name: "desk_mat"
    type: "box"
    scale: [8.0, 0.02, 4.5]
    translate: [0, 0.01, 0]
    material: "mat_leather"

  # ================= OGGETTI DA SCRIVANIA =================
  - name: "notebook"
    type: "group"
    translate: [1.5, 0.02, 0.5]
    rotate: [0, -18, 0]
    children:
      - type: "box" # Pagine del quaderno
        scale: [1.4, 0.06, 2.0]
        translate: [0, 0.04, 0]
        material: "paper"
      - type: "box" # Copertina
        scale: [1.45, 0.02, 2.05]
        translate: [0, 0.01, 0]
        material: "notebook_cover"

  - name: "fancy_pen"
    type: "group"
    translate: [1.1, 0.09, 0.6]
    rotate: [0, 35, -90] # Appoggiata orizzontalmente sul quaderno
    children:
      - type: "cylinder" # Corpo della penna
        center: [0, 0, 0]
        radius: 0.035
        height: 0.55
        material: "pen_body"
      - type: "cone" # Punta dorata
        center: [0, 0.55, 0]
        radius: 0.035
        height: 0.15
        material: "brass_tip"

  - name: "coffee_mug"
    type: "csg"
    operation: "subtraction"
    material: "ceramic_mug"
    operand_a:
      type: "cylinder" # Esterno tazza
      center: [2.8, 0.02, -1.2]
      radius: 0.38
      height: 0.85
    operand_b:
      type: "cylinder" # Interno (sottrazione per cavità)
      center: [2.8, 0.1, -1.2]
      radius: 0.33
      height: 0.85

  # ================= LAMPADA PIXAR =================
  - name: "pixar_lamp_body"
    type: "group"
    translate: [-2.5, 0.02, -1.5]
    children:
      - type: "cylinder" # Base pesante
        center: [0, 0, 0]
        radius: 0.7
        height: 0.08
        material: "pixar_red"
      - type: "cylinder" # Braccio inferiore
        center: [0, 0.08, 0]
        radius: 0.06
        height: 1.5
        rotate: [0, 0, -25] # Inclinato in avanti
        material: "lamp_metal_joints"
      - type: "sphere" # Snodo centrale
        center: [0.63, 1.43, 0]
        radius: 0.12
        material: "lamp_metal_joints"
      - type: "cylinder" # Braccio superiore
        center: [0.63, 1.43, 0]
        radius: 0.06
        height: 1.2
        rotate: [0, 0, 35] # Inclinato verso il sottomano
        material: "lamp_metal_joints"

  - name: "pixar_lamp_head"
    type: "group"
    # Posizionato esattamente alla fine del braccio superiore
    translate: [-0.05, 2.4, 0.0]
    rotate: [15, 0, 45] # Roll & Pitch per far puntare l'apertura verso [0.5, 0, 0]
    children:
      - type: "cone" # Paralume (Frustum)
        center: [0, 0, 0]
        radius: 0.6      # Apertura larga rivolta in basso
        top_radius: 0.15 # Attacco stretto
        height: 0.7
        material: "pixar_red"
      - type: "sphere" # Lampadina a bulbo visibile
        center: [0, 0.25, 0]
        radius: 0.12
        material: "bulb_glow"

lights:
  # Spotlight principale nascosto dentro il paralume per creare il cono di luce
  - type: "spot"
    position: [-0.05, 2.1, 0.0]
    direction: [0.55, -2.1, 0.0] # Punta dritto al centro del sottomano
    color: [1.0, 0.95, 0.85]     # Luce calda da tungsteno
    intensity: 45.0
    inner_angle: 25
    outer_angle: 50

  # Sphere light co-locata per generare ombre morbidissime (penombra realistica)
  - type: "sphere"
    position: [-0.05, 2.1, 0.0]
    radius: 0.12
    color: [1.0, 0.92, 0.8]
    intensity: 25.0
    shadow_samples: 32           # Alta qualità per il campionamento
    