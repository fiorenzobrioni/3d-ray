# ═══════════════════════════════════════════════════════════════════════════
#  ICE CAUSTICS — Showcase: caustiche su geometria curva + CSG
#
#  Dimostra le caustiche oltre la sfera, con geometria che focalizza davvero
#  (primitive curve + CSG). Luce laterale calda → caustiche nitide.
#    • CUBETTI DI GHIACCIO  → CSG intersezione(box ∩ sfera) = facce piatte +
#      spigoli arrotondati; gli spigoli curvi focalizzano la luce.
#    • ICE BALL             → sfera di vetro (caustica forte di riferimento).
#    • TUMBLER DI VETRO      → CSG (cilindro \ cilindro), caustica astigmatica.
#    • Piano scuro lucido = superficie ricevente.
#
#  Render (final/ultra abilitano --caustics da soli):
#    dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#      -i scenes/sms-ice-caustics.yaml -o renders/ice-caustics.png \
#      -q final --caustics on -w 1600 -H 1000
#  Confronto: --caustics off per vedere sparire gli spot focalizzati.
# ═══════════════════════════════════════════════════════════════════════════

camera:
  position: [2.6, 2.0, 3.6]
  look_at:  [0.1, 0.35, 0.0]
  fov: 42

world:
  sky:
    type: "flat"
    color: [0.015, 0.015, 0.02]
  ground:
    type: "infinite_plane"
    material: "floor"
    y: 0.0

lights:
  # Area light calda LATERALE (da +X, medio-alta) → le superfici curve
  # rifrangono verso il pavimento opposto: caustiche definite.
  - type: area
    corner: [3.4, 1.7, -0.7]
    u: [0.0, 0.0, 1.5]
    v: [0.0, 1.1, 0.0]
    color: [1.0, 0.93, 0.82]
    intensity: 240.0
    shadow_samples: 6

materials:
  - id: "floor"
    type: "disney"
    color: [0.16, 0.17, 0.19]
    roughness: 0.4
    specular: 0.5

  # Ghiaccio: vetro quasi limpido, IOR 1.31 → caustica nitida.
  - id: "ice"
    type: "dielectric"
    refraction_index: 1.31

  - id: "glass_clear"
    type: "dielectric"
    refraction_index: 1.5

entities:
  # ── CUBETTO DI GHIACCIO 1 — CSG: box ∩ sfera (cubo dagli spigoli arrotondati)
  - name: "ice_cube"
    type: "csg"
    operation: "intersection"
    material: "ice"
    left:  { type: "box", scale: [0.60, 0.60, 0.60], translate: [0.55, 0.30, 0.35] }
    right: { type: "sphere", center: [0.55, 0.30, 0.35], radius: 0.345 }

  # ── CUBETTO DI GHIACCIO 2 — più piccolo, accanto
  - name: "ice_cube_2"
    type: "csg"
    operation: "intersection"
    material: "ice"
    left:  { type: "box", scale: [0.44, 0.44, 0.44], translate: [0.05, 0.22, 1.0] }
    right: { type: "sphere", center: [0.05, 0.22, 1.0], radius: 0.255 }

  # ── ICE BALL — sfera di vetro (caustica forte, riferimento)
  - name: "ice_ball"
    type: "sphere"
    center: [-0.9, 0.42, 0.1]
    radius: 0.42
    material: "ice"

  # ── TUMBLER DI VETRO — CSG cilindro \ cilindro (parete spessa per castare)
  - name: "tumbler"
    type: "csg"
    operation: "subtraction"
    material: "glass_clear"
    left:
      type: "cylinder"
      center: [-0.4, 0.0, -0.95]
      radius: 0.55
      height: 1.15
    right:
      type: "cylinder"
      center: [-0.4, 0.16, -0.95]
      radius: 0.40
      height: 1.20
