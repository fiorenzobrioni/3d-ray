# =============================================================================
#  SET FOTOGRAFICO INDOOR — Showcase Completo Ray Tracer
#  "Il Tavolo dei Materiali"
# =============================================================================
#
#  Scena: studio fotografico professionale con tavolo in noce e 15 oggetti
#  disposti per mettere in mostra TUTTE le capacità del motore:
#
#   ● Materiali fisici : lambertian · metal (fuzz 0→0.20) · dielectric
#   ● Texture proc.   : marble · wood · checker · noise
#   ● Ottica          : DOF (bokeh) · teleobiettivo · dutch angle
#   ● Illuminazione   : spot key/fill/rim · point bounce · schemi alternativi
#   ● Geometrie       : sphere · box · cylinder · quad · disk · infinite_plane
#   ● Trasformazioni  : scale · rotate · translate · seed deterministico
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  COMANDI DI RENDER CONSIGLIATI                                          │
#  │                                                                         │
#  │  PREVIEW  (< 5 s):                                                      │
#  │    dotnet run ... -- -i photo_studio_showcase.yaml -s 4 -d 8            │
#  │                       --width 800 --height 450                          │
#  │                                                                         │
#  │  DRAFT  (10–40 s):                                                      │
#  │    dotnet run ... -- -i photo_studio_showcase.yaml -s 16 -d 25          │
#  │                       --width 1280 --height 720                         │
#  │                                                                         │
#  │  PRODUCTION  (qualità finale):                                          │
#  │    dotnet run ... -- -i photo_studio_showcase.yaml -s 128 -d 50         │
#  │                       --width 1920 --height 1080                        │
#  │                                                                         │
#  │  ULTRA  (stampa/portfolio):                                             │
#  │    dotnet run ... -- -i photo_studio_showcase.yaml -s 256 -d 50         │
#  │                       --width 3840 --height 2160                        │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  SISTEMA DI COORDINATE usato in questa scena:
#    X = destra  |  Y = alto  |  Z negativo = lontano dalla camera
#    Piano del tavolo: Y ≈ 0.83
#    Tavolo occupa: X[-1.50 : +1.50]  Z[-0.60 : +1.00]
# =============================================================================


# =============================================================================
#  WORLD — Ambiente dello studio
# =============================================================================
world:
  # Luce ambiente quasi assente: il set è controllato solo da luci artificiali.
  # Un valore non-zero evita ombre completamente nere (fisicamente più corretto).
  ambient_light: [0.03, 0.03, 0.04]

  # Fondo molto scuro: studio chiuso, nessuna luce naturale.
  # I raggi che sfuggono dalla scena raccolgono questo colore come GI.
  # Un leggero tono blu-freddo simula la riflessione delle pareti grigio-acciaio.
  background: [0.05, 0.05, 0.07]

  # Pavimento dello studio: parquet in rovere naturale
  ground:
    type: "infinite_plane"
    material: "pavimento_parquet"
    y: 0.0


# =============================================================================
#  CAMERA — Vista principale e alternative commentate
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ATTIVA ★  Vista tre quarti destra con DOF da teleobiettivo
#  Punto di vista: alto-destra dello studio, come fotografia di still life.
#  L'apertura sottile crea un bokeh delicato: il tavolo è nitido, le pareti
#  posteriori si sfumano. Equivalente 70mm f/2.8 su medio formato.
# ─────────────────────────────────────────────────────────────────────────────
camera:
  position:   [ 3.20,  2.80, -5.50]
  look_at:    [ 0.00,  1.10,  0.20]
  vup:        [ 0, 1, 0]
  fov:        30                      # teleobiettivo lieve: comprime la profondità
  aperture:   0.07                    # DOF morbido: oggetti sul tavolo a fuoco
  focal_dist: 6.70                    # distanza camera → centro del tavolo


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-1  Vista frontale simmetrica  (stile scheda tecnica / catalogo)
#  Tutto a fuoco, asse centrato: ideale per documentazione materiali.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  2.20, -6.20]
#   look_at:    [ 0.00,  1.05,  0.20]
#   vup:        [ 0, 1, 0]
#   fov:        38
#   aperture:   0.0                   # TUTTO A FUOCO: nessun bokeh
#   focal_dist: 5.80


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-2  Top-Down dall'alto  (vista planimetrica del tavolo)
#  Tutti gli oggetti visibili in pianta, layout del set ben leggibile.
#  vup punta verso Z- per un orientamento canonico della composizione.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  6.50, -0.20]
#   look_at:    [ 0.00,  0.84,  0.20]
#   vup:        [ 0, 0, -1]           # "su" della camera verso Z- (N nella pianta)
#   fov:        52
#   aperture:   0.0
#   focal_dist: 5.70


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-3  Macro con DOF pronunciato  (close-up sfera di cristallo)
#  Campo stretto, apertura massima: effetto macro da studio.
#  Il cristallo è perfettamente a fuoco, tutto il resto è bokeh puro.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [-1.00,  1.70, -3.10]
#   look_at:    [-0.75,  1.23, -0.15]  # punta esattamente sul centro del cristallo
#   vup:        [ 0, 1, 0]
#   fov:        26                     # campo stretto: effetto macro 100mm
#   aperture:   0.22                   # apertura ampia: bokeh molto pronunciato
#   focal_dist: 3.00                   # distanza esatta camera → sfera cristallo


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-4  Profilo laterale sinistro  (mostra profondità del tavolo)
#  Ottima per valutare la distribuzione degli oggetti lungo Z.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [-5.80,  2.10,  0.20]
#   look_at:    [ 0.00,  1.10,  0.20]
#   vup:        [ 0, 1, 0]
#   fov:        36
#   aperture:   0.05
#   focal_dist: 5.90


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-5  Dutch Angle cinematografico  (orizzonte inclinato ~13°)
#  Effetto tension/drama. Ideale con lo schema luci "Neon Studio" (Alt-3 luci).
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 2.80,  3.40, -5.20]
#   look_at:    [ 0.00,  1.10,  0.20]
#   vup:        [ 0.24, 1, 0]         # inclina l'orizzonte di ~13.5°
#   fov:        44
#   aperture:   0.06
#   focal_dist: 6.40


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ───────────────────────────────────────────────────────────────────────────
  #  AMBIENTE — Pareti, soffitto, pavimento
  # ───────────────────────────────────────────────────────────────────────────

  # Pavimento: parquet in rovere naturale con listoni a 30°
  - id: "pavimento_parquet"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 20.0                     # listoni fini: tipico del parquet 70mm
      noise_strength: 2.8             # venatura leggermente distorta
      colors: [[0.62, 0.45, 0.28], [0.35, 0.21, 0.10]]
      rotation: [0, 30, 0]            # listoni inclinati di 30° rispetto all'asse X

  # Backdrop fotografia: seamless paper bianco caldo
  - id: "muro_backdrop"
    type: "lambertian"
    color: [0.88, 0.88, 0.90]         # bianco neutro con lievissima nota fredda

  # Parete laterale sinistra: grigio studio freddo
  - id: "muro_sx"
    type: "lambertian"
    color: [0.52, 0.53, 0.56]

  # Parete laterale destra: grigio studio caldo (leggermente diverso → piccola
  # variazione di colore contribuisce al realismo per le riflessioni indirette)
  - id: "muro_dx"
    type: "lambertian"
    color: [0.56, 0.54, 0.52]

  # Soffitto: bianco opaco riflettente come pannello diffusore
  - id: "soffitto_studio"
    type: "lambertian"
    color: [0.86, 0.86, 0.88]

  # ───────────────────────────────────────────────────────────────────────────
  #  TAVOLO — Piano + gambe
  # ───────────────────────────────────────────────────────────────────────────

  # Piano in noce verniciato opaco-satinato
  # metal con fuzz basso simula la riflessività di legno levigato con vernice
  - id: "piano_noce"
    type: "metal"
    fuzz: 0.14                        # satinato: riflessioni morbide e sfocate
    texture:
      type: "wood"
      scale: 11.0
      noise_strength: 5.0
      colors: [[0.30, 0.18, 0.08], [0.15, 0.08, 0.03]]  # noce scuro

  # Gambe: acciaio tornito verniciato nero-grafite
  - id: "gamba_acciaio"
    type: "metal"
    color: [0.22, 0.21, 0.20]
    fuzz: 0.06                        # acciaio lavorato a macchina, quasi speculare

  # ───────────────────────────────────────────────────────────────────────────
  #  DIELECTRIC — Trasparenti e rifrattivi
  # ───────────────────────────────────────────────────────────────────────────

  # Cristallo puro ottico (lead crystal) — IOR 1.78
  # Nessun colore: massima trasparenza, rifrazione pronunciata
  - id: "cristallo_puro"
    type: "dielectric"
    refraction_index: 1.78

  # Vetro fumé grigio-freddo — effetto vetro decorativo anni '60–'70
  - id: "vetro_fume"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.34, 0.37, 0.40]        # tintura grigio-ardesia

  # Cristallo colorato azzurro cielo — decorativo, molto refrattivo
  - id: "cristallo_azzurro"
    type: "dielectric"
    refraction_index: 1.72            # cristallo ottico colorato
    color: [0.52, 0.72, 0.90]        # azzurro intenso

  # Vetro ambra — bottiglia / vaso antico
  - id: "vetro_ambra"
    type: "dielectric"
    refraction_index: 1.50
    color: [0.68, 0.38, 0.08]        # arancio caldo ambrato

  # Diamante — IOR 2.42, massima dispersione possibile in questa scena
  - id: "diamante"
    type: "dielectric"
    refraction_index: 2.42            # IOR del diamante reale

  # ───────────────────────────────────────────────────────────────────────────
  #  METAL — Cinque superfici metalliche con rugosità crescente
  # ───────────────────────────────────────────────────────────────────────────

  # Cromo specchio  (fuzz = 0.0 → riflessione speculare perfetta)
  - id: "cromo_specchio"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.0                         # ★ specchio perfetto: riflette tutta la scena

  # Oro lucidato  (fuzz = 0.02 → quasi speculare, colore dorato intenso)
  - id: "oro_lucido"
    type: "metal"
    color: [0.96, 0.78, 0.08]        # oro giallo 24k
    fuzz: 0.02

  # Rame brillante  (fuzz = 0.04 → metallo lucido, riflessioni calde)
  - id: "rame_brillante"
    type: "metal"
    color: [0.88, 0.46, 0.18]        # rame rossastro
    fuzz: 0.04

  # Acciaio spazzolato  (fuzz = 0.16 → satinato, riflessi morbidi direzionali)
  - id: "acciaio_spazzolato"
    type: "metal"
    color: [0.70, 0.72, 0.74]        # grigio acciaio inox
    fuzz: 0.16

  # Ottone satinato  (fuzz = 0.22 → riflessioni ampie e diffuse)
  - id: "ottone_satinato"
    type: "metal"
    color: [0.78, 0.65, 0.22]        # ottone giallo-verde
    fuzz: 0.22

  # ───────────────────────────────────────────────────────────────────────────
  #  LAMBERTIAN — Diffusi opachi con texture procedurali
  # ───────────────────────────────────────────────────────────────────────────

  # Marmo Calacatta bianco — venature viola/blu drammatiche
  # randomize_offset + randomize_rotation → venature uniche per ogni oggetto
  - id: "marmo_calacatta"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 9.0
      noise_strength: 20.0            # venature molto pronunciate e sinuose
      colors: [[0.95, 0.93, 0.90], [0.16, 0.12, 0.28]]
      randomize_offset: true
      randomize_rotation: true

  # Marmo Marquina nero — venature bianche su fondo quasi nero
  - id: "marmo_marquina"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 6.0
      noise_strength: 12.0
      colors: [[0.07, 0.06, 0.08], [0.88, 0.85, 0.78]]  # nero / venature avorio
      randomize_offset: true
      randomize_rotation: true

  # Noce americano — per il cubo decorativo
  - id: "noce_americano"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 15.0
      noise_strength: 6.0
      colors: [[0.42, 0.26, 0.10], [0.20, 0.11, 0.05]]
      randomize_offset: true
      randomize_rotation: true

  # Ceramica opaca bianca — base/piedistallo per la sfera di marmo
  # noise sottile simula la micro-rugosità della porcellana non smaltata
  - id: "ceramica_bianca"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 12.0                     # rumore fine: superficie quasi liscia ma non perfetta

  # Scacchiera avorio/ebano — disco base sotto la sfera cromata
  - id: "checker_avorio"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 3.5                      # quadrati di circa 11cm reali
      colors: [[0.88, 0.84, 0.75], [0.10, 0.08, 0.07]]


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ===========================================================================
  #  AMBIENTE — Pareti e soffitto dello studio
  # ===========================================================================

  # Backdrop fotografia: grande parete bianca di fondo (seamless paper)
  # q=angolo in basso-sinistra,  u=vettore larghezza,  v=vettore altezza
  - name: "backdrop_fondo"
    type: "quad"
    q: [-5.50, 0.0,  2.80]
    u: [11.00, 0.0,  0.00]           # 11m di larghezza
    v: [ 0.00, 6.0,  0.00]           # 6m di altezza
    material: "muro_backdrop"

  # Parete laterale sinistra
  - name: "parete_sinistra"
    type: "quad"
    q: [-5.50, 0.0, -2.50]
    u: [ 0.00, 0.0,  5.30]           # profondità studio 5.3m
    v: [ 0.00, 6.0,  0.00]
    material: "muro_sx"

  # Parete laterale destra
  - name: "parete_destra"
    type: "quad"
    q: [ 5.50, 0.0, -2.50]
    u: [ 0.00, 0.0,  5.30]
    v: [ 0.00, 6.0,  0.00]
    material: "muro_dx"

  # Soffitto
  - name: "soffitto"
    type: "quad"
    q: [-5.50, 5.50, -2.50]
    u: [11.00, 0.00,  0.00]
    v: [ 0.00, 0.00,  5.30]
    material: "soffitto_studio"

  # Pannello riflettore su parete destra: striscia bianca lucida vicino al set.
  # Simula il reflector board usato in fotografia per schiarire le ombre lato dx.
  # Posizionato a X=4.80 (30cm dalla parete), Y=0.50–3.00, Z=-0.80–1.20
  - name: "reflector_dx"
    type: "quad"
    q: [4.80, 0.50, -0.80]
    u: [0.00, 0.00,  2.00]
    v: [0.00, 2.50,  0.00]
    material: "muro_backdrop"        # stessa finitura bianca del backdrop

  # ===========================================================================
  #  TAVOLO — Piano in noce + 4 gambe tornite + traverse di irrigidimento
  # ===========================================================================
  #
  #  Dimensioni reali:  3.00m larghezza × 1.60m profondità × 0.07m spessore
  #  Superficie superiore a Y = 0.795 + 0.035 = 0.830
  #  Gambe: altezza 0.760 → si appoggiano esattamente sotto il piano

  - name: "piano_tavolo"
    type: "box"
    scale:     [3.00, 0.07, 1.60]
    translate: [0.00, 0.795, 0.20]   # centro piano a Y=0.795
    material: "piano_noce"

  # Gamba anteriore sinistra
  - name: "gamba_ant_sx"
    type: "cylinder"
    center: [-1.32, 0.00, -0.56]
    radius: 0.038
    height: 0.760
    material: "gamba_acciaio"

  # Gamba anteriore destra
  - name: "gamba_ant_dx"
    type: "cylinder"
    center: [ 1.32, 0.00, -0.56]
    radius: 0.038
    height: 0.760
    material: "gamba_acciaio"

  # Gamba posteriore sinistra
  - name: "gamba_post_sx"
    type: "cylinder"
    center: [-1.32, 0.00,  0.96]
    radius: 0.038
    height: 0.760
    material: "gamba_acciaio"

  # Gamba posteriore destra
  - name: "gamba_post_dx"
    type: "cylinder"
    center: [ 1.32, 0.00,  0.96]
    radius: 0.038
    height: 0.760
    material: "gamba_acciaio"

  # Traversa longitudinale sinistra (h=0.35, collega le due gambe sx)
  - name: "traversa_long_sx"
    type: "box"
    scale:     [0.038, 0.038, 1.520]
    translate: [-1.32, 0.340, 0.200]
    material: "gamba_acciaio"

  # Traversa longitudinale destra
  - name: "traversa_long_dx"
    type: "box"
    scale:     [0.038, 0.038, 1.520]
    translate: [ 1.32, 0.340, 0.200]
    material: "gamba_acciaio"

  # Traversa trasversale anteriore
  - name: "traversa_tras_ant"
    type: "box"
    scale:     [2.640, 0.038, 0.038]
    translate: [0.000, 0.340, -0.560]
    material: "gamba_acciaio"

  # Traversa trasversale posteriore
  - name: "traversa_tras_post"
    type: "box"
    scale:     [2.640, 0.038, 0.038]
    translate: [0.000, 0.340,  0.960]
    material: "gamba_acciaio"


  # ===========================================================================
  #  OGGETTI SUL TAVOLO  (superficie di appoggio a Y = 0.830)
  # ===========================================================================

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-01  Grande sfera di cristallo ottico  ★ CENTERPIECE
  #
  #  showcase: DIELECTRIC IOR 1.78 — massima rifrazione, caustics, trasparenza
  #  assoluta. La sfera più grande domina la composizione.
  #  Posizione: primo piano, lato sinistro del tavolo.
  #  Calcolo: R=0.40 → centro Y = 0.830 + 0.40 = 1.230
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_cristallo"
    type: "sphere"
    center: [-0.75, 1.230, -0.15]
    radius: 0.40
    seed: 1001
    material: "cristallo_puro"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-02  Sfera di marmo Calacatta bianco  (su base in ceramica)
  #
  #  showcase: LAMBERTIAN + MARBLE TEXTURE — venature drammatiche, pattern 3D
  #  procedurale, effetto scultura da museo.
  #  La base ceramica la solleva: R=0.30, base H=0.08 → centro Y=0.830+0.08+0.30=1.210
  # ─────────────────────────────────────────────────────────────────────────
  - name: "base_ceramica"
    type: "cylinder"
    center: [0.20, 0.830, 0.50]
    radius: 0.240                     # base leggermente più larga della sfera
    height: 0.080                     # sottile piedistallo, cima a Y=0.910
    material: "ceramica_bianca"

  - name: "sfera_marmo_calacatta"
    type: "sphere"
    center: [0.20, 1.210, 0.50]       # appoggiata sulla cima della base
    radius: 0.30
    seed: 2002
    material: "marmo_calacatta"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-03  Sfera cromata specchio  (su disco scacchiera)
  #
  #  showcase: METAL fuzz=0.0 — riflessione speculare perfetta. Riflette l'intera
  #  scena come uno specchio sferico. È il miglior test del path tracer.
  #  Il disco checker sotto aggiunge un dettaglio geometrico raffinato.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "disco_checker_base"
    type: "disk"
    center: [0.90, 0.832, -0.20]      # 2mm sopra il piano del tavolo
    normal: [0, 1, 0]
    radius: 0.400                     # leggermente più largo della sfera
    material: "checker_avorio"

  - name: "sfera_cromo"
    type: "sphere"
    center: [0.90, 1.130, -0.20]      # R=0.30 → centro Y=0.83+0.30=1.130
    radius: 0.30
    seed: 3003
    material: "cromo_specchio"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-04  Sfera di vetro fumé  (grigio-ardesia trasparente)
  #
  #  showcase: DIELECTRIC con COLOR TINT — rifrazione + assorbimento colorato.
  #  L'effetto di "grigio sfumato" è ottenuto puro con fisica, non con shader.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_vetro_fume"
    type: "sphere"
    center: [-0.30, 1.030, 0.36]      # R=0.20
    radius: 0.20
    seed: 4004
    material: "vetro_fume"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-05  Piccola sfera d'oro 24k lucidato
  #
  #  showcase: METAL color caldo, fuzz=0.02 — quasi speculare. Il colore dorato
  #  "tinge" le riflessioni. Posizionata in mezzo al tavolo come gioiello.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_oro"
    type: "sphere"
    center: [0.46, 0.930, 0.25]       # R=0.10
    radius: 0.10
    seed: 5005
    material: "oro_lucido"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-06  Sfera di cristallo azzurro  (decorativa, media misura)
  #
  #  showcase: DIELECTRIC colorato — la tinta azzurra si vede chiaramente nei
  #  riflessi interni, creando un effetto "cuore di ghiaccio" luminoso.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_cristallo_azzurro"
    type: "sphere"
    center: [0.60, 0.980, 0.20]       # R=0.15
    radius: 0.15
    seed: 6006
    material: "cristallo_azzurro"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-07  Cubo in noce americano  (ruotato di 28° attorno a Y)
  #
  #  showcase: LAMBERTIAN + WOOD TEXTURE + rotate — il cubo ruotato mostra
  #  tre facce diverse simultaneamente e la texture wood si orienta
  #  in modo naturale grazie a randomize_offset/randomize_rotation.
  #  translate: centro a Y = 0.830 + 0.165 = 0.995
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cubo_noce"
    type: "box"
    scale:     [0.33, 0.33, 0.33]
    rotate:    [0, 28, 0]             # ruotato sul piano: tre facce visibili
    translate: [-0.65, 0.995, 0.70]
    seed: 7007
    material: "noce_americano"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-08  Prisma alto in marmo Marquina nero  (colonnina decorativa)
  #
  #  showcase: LAMBERTIAN + MARBLE TEXTURE su BOX elongato — le venature bianche
  #  su fondo nero sono molto teatrali. rotate Y 15° → angolazione elegante.
  #  translate: H=0.55 → centro Y = 0.830 + 0.275 = 1.105
  # ─────────────────────────────────────────────────────────────────────────
  - name: "prisma_marmo_nero"
    type: "box"
    scale:     [0.18, 0.55, 0.18]
    rotate:    [0, 15, 0]
    translate: [0.82, 1.105, 0.40]
    seed: 8008
    material: "marmo_marquina"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-09  Cilindro tornito in rame brillante  (vaso/urna decorativa)
  #
  #  showcase: METAL color caldo fuzz=0.04 su geometria CYLINDER — il rame
  #  riscalda visivamente la scena. La forma tubolare mostra come il riflesso
  #  metallico si distorce sulle superfici curve verticali.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cilindro_rame"
    type: "cylinder"
    center: [-0.06, 0.830, -0.38]     # base a Y=0.83, cima a Y=1.28
    radius: 0.090
    height: 0.450
    material: "rame_brillante"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-10  Gemma diamante su piedistallo in acciaio  (punto focale prezioso)
  #
  #  showcase: DIELECTRIC IOR 2.42 (diamante reale) — massima dispersione,
  #  la luce si rifrange in modo estremo. Su un mini-piedistallo in acciaio
  #  per sollevarla e rendere visibile la rifrazione verso il basso.
  #
  #  Piedistallo: cyl H=0.10 → cima a Y = 0.830+0.10 = 0.930
  #  Gemma: R=0.09 → centro Y = 0.930+0.09 = 1.020
  # ─────────────────────────────────────────────────────────────────────────
  - name: "piedistallo_diamante"
    type: "cylinder"
    center: [0.26, 0.830, -0.30]
    radius: 0.065
    height: 0.100
    material: "acciaio_spazzolato"

  - name: "gemma_diamante"
    type: "sphere"
    center: [0.26, 1.020, -0.30]
    radius: 0.090
    seed: 9009
    material: "diamante"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-11  Vaso cilindrico in vetro ambra  (bottiglia decorativa)
  #
  #  showcase: DIELECTRIC con forte COLOR TINT arancione — la luce filtra
  #  attraverso il vetro ambrato creando un cono colorato sul piano sotto.
  #  Il vetro spesso del cilindro crea caustics visibili.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "vaso_vetro_ambra"
    type: "cylinder"
    center: [-1.06, 0.830, 0.52]      # base a Y=0.83, cima a Y=1.35
    radius: 0.120
    height: 0.520
    material: "vetro_ambra"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-12  Piccola sfera in ottone satinato
  #
  #  showcase: METAL fuzz=0.22 (satinato) — confronto diretto con la sfera
  #  cromata (fuzz=0). Stessa forma, materiale completamente diverso:
  #  i riflessi sono morbidi e "vellutati" anziché nitidi.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_ottone"
    type: "sphere"
    center: [1.22, 0.930, 0.45]       # R=0.10
    radius: 0.10
    seed: 1201
    material: "ottone_satinato"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-13  Sfera in acciaio inox spazzolato  (lato sinistro, dietro)
  #
  #  showcase: METAL fuzz=0.16 — intermedio tra cromo (0.0) e ottone (0.22).
  #  Dimostra chiaramente come il parametro fuzz controlli la qualità dei riflessi.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "sfera_acciaio_spazzolato"
    type: "sphere"
    center: [-1.28, 1.030, -0.38]     # R=0.20, nella zona sinistra-anteriore
    radius: 0.20
    seed: 1301
    material: "acciaio_spazzolato"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-14  Cubo di marmo Calacatta a terra  (dettaglio laterale)
  #
  #  Piccolo blocco di marmo bianco a terra accanto a una gamba del tavolo.
  #  Aggiunge profondità alla composizione e mostra la texture marble
  #  su una geometria box con facce piane (vs la sfera curva dell'OGG-02).
  #  Rotate 20° per variare l'orientamento delle venature rispetto alla sfera.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cubo_marmo_terra"
    type: "box"
    scale:     [0.28, 0.28, 0.28]
    rotate:    [0, 20, 0]
    translate: [-1.30, 0.140, 0.60]   # a terra, appoggiato alla gamba post-sx
    seed: 1401
    material: "marmo_calacatta"

  # ─────────────────────────────────────────────────────────────────────────
  #  OGG-15  Disco sottile come "coaster" sotto il cilindro di rame
  #
  #  Piccolo disco in ceramica bianca sotto il cilindro di rame.
  #  Dettaglio di composizione che aggiunge realismo ("il vaso appoggia su
  #  un sottopiano"). Mostra anche la geometria DISK a bassa quota.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "coaster_rame"
    type: "disk"
    center: [-0.06, 0.831, -0.38]     # 1mm sopra il piano del tavolo
    normal: [0, 1, 0]
    radius: 0.140                     # leggermente più largo del cilindro
    material: "ceramica_bianca"


# =============================================================================
#  LIGHTS — Schema attivo + 3 schemi alternativi commentati
# =============================================================================
lights:

  # ───────────────────────────────────────────────────────────────────────────
  #  SCHEMA ATTIVO ★  Three-Point Lighting da studio fotografico professionale
  #  Tecnica standard per still life e product photography.
  # ───────────────────────────────────────────────────────────────────────────

  # KEY LIGHT — Softbox principale 90×90cm (simulato con spot ad apertura ampia)
  # Dall'alto-destra-fronte: crea le ombre diagonali che modellano gli oggetti.
  # Colore caldo (5200K) per dominare la scena.
  - type: "spot"
    position:    [ 3.80,  5.80, -4.00]
    direction:   [-0.52, -0.78,  0.38] # punta verso il centro del tavolo
    color:       [1.00,  0.96,  0.88]  # bianco caldo, tungsteno HMI
    intensity:   29
    inner_angle: 22                    # cono pieno: copre tutto il tavolo
    outer_angle: 42                    # bordo morbido: penombra graduale

  # FILL LIGHT — Pannello LED da sinistra (freddo, di contrasto)
  # Schiarisce le ombre proiettate dalla key. Il contrasto caldo/freddo
  # (key calda vs fill fredda) è la firma estetica della product photography moderna.
  - type: "point"
    position:    [-4.80,  3.60, -2.00]
    color:       [0.72,  0.82,  1.00]  # freddo: azzurro LED daylight 6500K
    intensity:   7.2

  # RIM LIGHT — Faretto posteriore di contorno  (separa i soggetti dal fondo)
  # Dall'alto-centro-dietro: crea un alone luminoso attorno agli oggetti,
  # li "stacca" dal backdrop e aggiunge tridimensionalità alla scena.
  - type: "spot"
    position:    [ 0.50,  5.20,  3.80]
    direction:   [-0.05, -0.68, -0.73] # punta in avanti-basso verso il tavolo
    color:       [0.85,  0.90,  1.00]  # bianco freddo/neutro
    intensity:   13.5
    inner_angle: 16
    outer_angle: 32

  # BOUNCE LIGHT — Rimbalzo caldo dal parquet (luce di rimbalzo simulata)
  # Sorgente puntiforme debolissima a livello pavimento: simula la GI
  # del parquet caldo illuminato dalla key. Riempie le ombre sotto il tavolo
  # e sui lati inferiori degli oggetti con una nota ambrata calda.
  - type: "point"
    position:    [ 0.50,  0.12,  0.20]
    color:       [1.00,  0.82,  0.52]  # caldo ambrato: il parquet riflette luce calda
    intensity:   0.7                     # debolissima: solo una nota di colore

  # TOP ACCENT — Piccolo faretto zenitale sulla gemma diamante
  # Punta direttamente sulla gemma per esaltare la sua capacità di dispersione
  # della luce (IOR 2.42). Crea raggi di luce colorata sul piano del tavolo.
  - type: "spot"
    position:    [ 0.26,  3.50, -0.30]
    direction:   [ 0.00, -1.00,  0.00] # perfettamente verticale
    color:       [1.00,  0.98,  0.94]  # bianco quasi puro
    intensity:   9.5
    inner_angle: 8                     # cono stretto: solo sulla gemma
    outer_angle: 18


  # ───────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-1  Luce naturale da finestra — daylight photography
  #
  #  Richiede nel world:
  #    ambient_light: [0.04, 0.06, 0.08]
