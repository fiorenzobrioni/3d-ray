    rotate: [13.0, 0, -13.0]
    material: "ferro_eiffel"

  - name: "gamba_nw_2"
    type: "box"
    scale: [7.0, 14.0, 7.0]
    translate: [-38.2, 38.5, -38.2]
    rotate: [11.0, 0, -11.0]
    material: "ferro_eiffel"

  - name: "gamba_nw_3"
    type: "box"
    scale: [6.5, 13.0, 6.5]
    translate: [-35.0, 50.5, -35.0]
    rotate: [8.0, 0, -8.0]
    material: "ferro_eiffel"

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTROVENTI ORIZZONTALI — Sezione base (Y = 5 → 57)
