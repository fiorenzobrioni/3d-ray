    scale: [8.0, 14.5, 8.0]
    translate: [45.8, 12.25, 45.8]
    rotate: [-14.0, 0, 14.0]
    material: "ferro_eiffel"

  - name: "gamba_se_1"
    type: "box"
    scale: [7.5, 14.5, 7.5]
    translate: [42.0, 25.75, 42.0]
    rotate: [-13.0, 0, 13.0]
    material: "ferro_eiffel"

  - name: "gamba_se_2"
    type: "box"
    scale: [7.0, 14.0, 7.0]
    translate: [38.2, 38.5, 38.2]
    rotate: [-11.0, 0, 11.0]
    material: "ferro_eiffel"

  - name: "gamba_se_3"
    type: "box"
    scale: [6.5, 13.0, 6.5]
