# ═══════════════════════════════════════════════════════════════════════════════
#  TOUR EIFFEL — Parigi, Ora d'Oro
#
#  La Torre Eiffel al tramonto vista dal Champ de Mars: il reticolo di ferro
#  battuto con le quattro gambe rastremate, le tre piattaforme di osservazione,
#  l'arco decorativo al primo livello, il fusto centrale fino alla sommità e
#  l'antenna. Il parco circostante con vialetti in ghiaia, panchine in ghisa,
#  alberi potati alla francese e lampioni parigini completano l'ambientazione.
#  Illuminazione golden hour con cielo dorato e ombre lunghe violacee.
#
#  Engine features demonstrated:
#    • templates + instance  — albero, panchina, lampione
#    • groups               — gambe multi-segmento, archi decorativi
#    • rotate               — segmenti inclinati delle gambe
#    • cameras (named)      — 5 inquadrature con DOF
#    • sky gradient + sun   — ora d'oro parigina
#
#  Render consigliato:
#    Preview: dotnet run ... -- -i scenes/tour-eiffel.yaml -w 400  -H 225  -s 64   -d 4  -S 1
#    Finale:  dotnet run ... -- -i scenes/tour-eiffel.yaml -w 1920 -H 1080 -s 1024 -d 8  -S 4
#    Ultra:   dotnet run ... -- -i scenes/tour-eiffel.yaml -w 3840 -H 2160 -s 1600 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────────
#  WORLD — Ora d'oro parigina (golden hour, sole basso a sud-ovest)
# ─────────────────────────────────────────────────────────────────────────────
world:
  ambient_light: [0.06, 0.05, 0.03]
  sky:
    type: "gradient"
    zenith_color:  [0.14, 0.22, 0.55]    # blu profondo allo zenit
    horizon_color: [0.88, 0.58, 0.22]    # ambra caldo all'orizzonte
    ground_color:  [0.18, 0.13, 0.08]    # terra scura sotto l'orizzonte
    sun:
      direction:  [-0.80, -0.25, -0.55]  # sole basso a sx-retro, ombre lunghe
      color:      [1.0, 0.82, 0.42]      # luce dorata tipica golden hour
      intensity:  22.0
      size:       4.0
      falloff:    20.0

  # ── ALT-1: Pomeriggio estivo (cielo azzurro, sole alto) ───────────────────
  # world:
  #   ambient_light: [0.10, 0.09, 0.08]
  #   sky:
  #     type: "gradient"
  #     zenith_color:  [0.15, 0.35, 0.78]
  #     horizon_color: [0.70, 0.82, 1.00]
  #     ground_color:  [0.30, 0.26, 0.20]
  #     sun:
  #       direction: [-0.4, -0.8, 0.3]
  #       color: [1.0, 0.95, 0.85]
  #       intensity: 16.0
  #       size: 2.5
  #       falloff: 40.0

  # ── ALT-2: Notte con illuminazione artificiale ────────────────────────────
  # world:
  #   ambient_light: [0.008, 0.008, 0.015]
  #   background: [0.01, 0.01, 0.03]

  ground:
    type: "infinite_plane"
    material: "prato"
    y: 0.0


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERAS — Tour Eiffel
# ─────────────────────────────────────────────────────────────────────────────
cameras:
  # Vista classica tre quarti da sud-est — la torre intera nell'inquadratura
  - name:       principale
    position:   [220, 35, 320]
    look_at:    [0, 130, 0]
    fov:        48
    aperture:   0.08
    focal_dist: 400.0

  # Dal Champ de Mars — prospettiva simmetrica frontale
  - name:       champ_de_mars
    position:   [0, 6, 420]
    look_at:    [0, 130, 0]
    fov:        42
    aperture:   0.0
    focal_dist: 1.0

  # Angolo basso drammatico — dal di sotto della torre
  - name:       dal_basso
    position:   [18, 2, 55]
    look_at:    [0, 180, 0]
    fov:        70
    aperture:   0.0
    focal_dist: 1.0

  # Primo piano sulla struttura all'altezza del primo livello
  - name:       primo_piano
    position:   [85, 55, 85]
    look_at:    [32, 48, 32]
    fov:        50
    aperture:   0.04
    focal_dist: 75.0

  # Panoramica larga da nord-ovest — torre nel contesto del parco
  - name:       panoramica
    position:   [-280, 45, -180]
    look_at:    [0, 140, 0]
    fov:        55
    aperture:   0.0
    focal_dist: 1.0


# ─────────────────────────────────────────────────────────────────────────────
#  LIGHTS — Illuminazione golden hour (3 direzionali + accent)
# ─────────────────────────────────────────────────────────────────────────────
lights:
  # Sole golden hour (key) — basso a sud-ovest, ombre lunghe
  - type: "directional"
    direction: [-0.80, -0.25, -0.55]
    color: [1.0, 0.82, 0.42]
    intensity: 0.95

  # Fill cielo azzurro — luce complementare fredda dallo zenit
  - type: "directional"
    direction: [0.15, -0.95, 0.25]
    color: [0.42, 0.60, 1.0]
    intensity: 0.18

  # Warm ground bounce — rimbalzo caldo dal terreno illuminato
  - type: "directional"
    direction: [0.0, 1.0, 0.0]
    color: [1.0, 0.75, 0.35]
    intensity: 0.06

  # Accent sulla torre — illumina la facciata rivolta alla camera
  - type: "point"
    position: [100, 80, 200]
    color: [1.0, 0.90, 0.70]
    intensity: 800.0


# ─────────────────────────────────────────────────────────────────────────────
#  MATERIALS — Tour Eiffel
# ─────────────────────────────────────────────────────────────────────────────
materials:

  # ── Ferro della torre ──────────────────────────────────────────────────────

  # Ferro verniciato "brun Tour Eiffel" — il colore iconico della torre
  - id: "ferro_eiffel"
    type: "disney"
    color: [0.38, 0.26, 0.15]
    metallic: 0.85
    roughness: 0.45
    specular: 0.50

  # Ferro più scuro — controventi, diagonali, dettagli strutturali
  - id: "ferro_scuro"
    type: "disney"
    color: [0.28, 0.20, 0.12]
    metallic: 0.82
    roughness: 0.50
    specular: 0.40

  # Ferro chiaro — piattaforme, parapetti
  - id: "ferro_chiaro"
    type: "disney"
    color: [0.44, 0.32, 0.20]
    metallic: 0.80
    roughness: 0.40
    specular: 0.55

  # ── Piattaforme e fondazioni ───────────────────────────────────────────────

  # Pietra calcarea — basamenti delle gambe
  - id: "pietra_base"
    type: "lambertian"
    color: [0.78, 0.74, 0.66]

  # Pavimentazione piattaforme — legno/metallo
  - id: "piano_piattaforma"
    type: "lambertian"
    color: [0.42, 0.36, 0.28]

  # ── Parco e ambiente ───────────────────────────────────────────────────────

  # Prato del Champ de Mars
  - id: "prato"
    type: "lambertian"
    color: [0.15, 0.35, 0.10]

  # Ghiaia vialetti
  - id: "ghiaia"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 4.0
      colors: [[0.62, 0.58, 0.50], [0.55, 0.52, 0.45]]

  # Tronco albero
  - id: "tronco"
    type: "lambertian"
    color: [0.28, 0.18, 0.09]

  # Fogliame potate alla francese
  - id: "fogliame"
    type: "lambertian"
    color: [0.12, 0.32, 0.08]

  # Ghisa panchina — verde scuro parigino
  - id: "ghisa_panchina"
    type: "disney"
    color: [0.05, 0.12, 0.05]
    metallic: 0.75
    roughness: 0.60
    specular: 0.30

  # Legno panchina — doghe verniciate
  - id: "legno_panchina"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 3.0
      colors: [[0.42, 0.28, 0.13], [0.34, 0.22, 0.10]]

  # Ferro lampione — ghisa scura
  - id: "ferro_lampione"
    type: "metal"
    color: [0.14, 0.12, 0.10]
    fuzz: 0.50

  # Luce lampione — globo luminoso caldo
  - id: "luce_lampione"
    type: "emissive"
    color: [1.0, 0.88, 0.55]
    intensity: 3.0

  # Dettagli dorati — bordi piattaforme, cornici
  - id: "oro_decoro"
    type: "metal"
    color: [0.88, 0.72, 0.14]
    fuzz: 0.06


# ─────────────────────────────────────────────────────────────────────────────
#  TEMPLATES — Elementi ripetuti
# ─────────────────────────────────────────────────────────────────────────────
templates:

  # Albero parigino potato a sfera (platano/ippocastano)
  - name: "albero_parigino"
    type: "group"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.30
        height: 4.5
        material: "tronco"
      - type: "sphere"
        center: [0, 5.5, 0]
        radius: 2.8
        material: "fogliame"
      - type: "sphere"
        center: [-1.0, 5.0, 0.7]
        radius: 2.2
        material: "fogliame"
      - type: "sphere"
        center: [0.8, 6.0, -0.5]
        radius: 2.4
        material: "fogliame"
      - type: "sphere"
        center: [0.3, 7.0, 0.4]
        radius: 1.6
        material: "fogliame"

  # Panchina parigina in ghisa e legno
  - name: "panchina_parco"
    type: "group"
    children:
      # Seduta
      - type: "box"
        scale: [1.80, 0.08, 0.48]
        translate: [0, 0.46, 0]
        material: "legno_panchina"
      # Schienale
      - type: "box"
        scale: [1.80, 0.52, 0.06]
        translate: [0, 0.78, 0.22]
        material: "legno_panchina"
      # Gambe ghisa
      - type: "box"
        scale: [0.06, 0.46, 0.06]
        translate: [-0.78, 0.23, -0.16]
        material: "ghisa_panchina"
      - type: "box"
        scale: [0.06, 0.46, 0.06]
        translate: [-0.78, 0.23, 0.16]
        material: "ghisa_panchina"
      - type: "box"
        scale: [0.06, 0.46, 0.06]
        translate: [0.78, 0.23, -0.16]
        material: "ghisa_panchina"
      - type: "box"
        scale: [0.06, 0.46, 0.06]
        translate: [0.78, 0.23, 0.16]
        material: "ghisa_panchina"
      # Braccioli
      - type: "box"
        scale: [0.06, 0.22, 0.40]
        translate: [-0.90, 0.60, 0.02]
        material: "ghisa_panchina"
      - type: "box"
        scale: [0.06, 0.22, 0.40]
        translate: [0.90, 0.60, 0.02]
        material: "ghisa_panchina"

  # Lampione parigino a colonna con globo
  - name: "lampione_parigino"
    type: "group"
    children:
      # Base
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.22
        height: 0.30
        material: "ferro_lampione"
      # Fusto
      - type: "cylinder"
        center: [0, 0.30, 0]
        radius: 0.08
        height: 4.20
        material: "ferro_lampione"
      # Capitello
      - type: "cylinder"
        center: [0, 4.50, 0]
        radius: 0.15
        height: 0.12
        material: "ferro_lampione"
      # Globo luminoso
      - type: "sphere"
        center: [0, 4.85, 0]
        radius: 0.22
        material: "luce_lampione"


# ─────────────────────────────────────────────────────────────────────────────
#  ENTITIES — Tour Eiffel + Ambiente
# ─────────────────────────────────────────────────────────────────────────────
