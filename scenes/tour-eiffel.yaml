    type: "box"
    scale: [18.0, 5.0, 18.0]
    translate: [47, 2.5, 47]
    material: "pietra_base"

  - name: "fondazione_sw"
    type: "box"
    scale: [18.0, 5.0, 18.0]
    translate: [-47, 2.5, 47]
