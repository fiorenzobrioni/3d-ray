# =============================================================================
#  NEWTON'S PENDULUM — Executive Desktop & Studio Chiaroscuro
# =============================================================================
#
#  DESCRIZIONE:
#  Un'elegante riproduzione di un Pendolo di Newton in cromo lucido, poggiato su
#  una base in legno mogano laccato con rifiniture dorate. La scena è ambientata
#  su una scrivania in noce scuro, arricchita da un sottomano in pelle, una
#  penna stilografica di pregio, un fermacarte in cristallo e un libro antico.
#
#  CARATTERISTICHE TECNICHE E HIGHLIGHTS:
#  - Geometria di precisione in scala 1:1.
#  - Materiali avanzati: cromo specchiante, vetro flint ad alto indice di rifrazione,
#    legno con venature procedurali e pelle.
#  - Illuminazione "Chiaroscuro": un setup fotografico professionale per esaltare
#    volumi, riflessi e profondità.
#  - Ottimizzazione BVH per scene con numerosi oggetti cilindrici e sferici.
#
#  Render consigliato:
#    Preview: dotnet run ... -- -i scenes/pendolo-newton.yaml -w 1280 -H 720 -s 64 -d 12
#    Finale:  dotnet run ... -- -i scenes/pendolo-newton.yaml -w 1920 -H 1080 -s 256 -d 50 -S 16
#    Ultra:   dotnet run ... -- -i scenes/pendolo-newton.yaml -w 3840 -H 2160 -s 256 -d 50 -S 32
# =============================================================================

# =============================================================================
#  WORLD
# =============================================================================
world:
  # Studio scurissimo: luce d'ambiente minima per ombre profonde
  ambient_light: [0.012, 0.012, 0.015]
  background:    [0.015, 0.015, 0.022]

  # Opzione HDRI: rimuovi il commento per riflessi ambientali complessi
  # (Richiede un file .hdr nella cartella textures/)
  # background_hdri: "textures/studio_small_01_2k.hdr"
  # background_hdri_intensity: 0.8

  ground:
    type:     "infinite_plane"
    material: "scrivania_noce"
    y: 0.0

# =============================================================================
#  CAMERAS
# =============================================================================
cameras:
  - name:       principale      # Vista classica — tutta la struttura del pendolo
    position:   [-0.42,  0.38, -0.58]
    look_at:    [ 0.00,  0.14,  0.00]
    vup:        [0, 1, 0]
    fov:        32
    aperture:   0.005           # bokeh leggermente pronunciato
    focal_dist: 0.72

  - name:       macro           # Dettaglio macro — focus sulla sfera in movimento
    position:   [-0.30,  0.22, -0.25]
    look_at:    [-0.14,  0.14,  0.00]
    fov:        22
    aperture:   0.012
    focal_dist: 0.35

  - name:       zenitale        # Prospettiva zenitale — planimetria
    position:   [ 0.00,  0.85,  0.00]
    look_at:    [ 0.00,  0.10,  0.00]
    vup:        [0, 0, -1]      # vup lungo -Z: il pendolo appare dritto dall'alto
    fov:        45
    aperture:   0.0
    focal_dist: 0.75

  - name:       executive       # Grandangolare — mostra tutta la scrivania
    position:   [-0.60,  0.45, -0.75]
    look_at:    [ 0.05,  0.12,  0.00]
    fov:        40
    aperture:   0.003
    focal_dist: 1.05

  - name:       impact          # "Point of Contact" — basso raggio vicino al punto d'impatto
    position:   [-0.15,  0.12, -0.22]
    look_at:    [-0.032, 0.095,  0.00]
    fov:        28
    aperture:   0.008
    focal_dist: 0.25

# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ── Piano scrivania: noce scuro con venature ──────────────────────────────
  - id: "scrivania_noce"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 14                        # Leggermente più fitta
      noise_strength: 3.5
      colors: [[0.22, 0.10, 0.04], [0.10, 0.05, 0.01]]
      randomize_offset: true
      rotation: [45, 0, 0]

  # ── Sottomano: pelle nera premium ───────────────────────────────────────── (NEW)
  - id: "pelle_nera"
    type: "lambertian"
    color: [0.06, 0.06, 0.07]

  # ── Base pendolo: mogano laccato texturizzato ─────────────────────────────
  - id: "mogano_base"
    type: "metal"                      # Simulazione lacca lucida
    color: [0.25, 0.10, 0.05]
    fuzz: 0.06
    seed: 5001

  # ── Bordo base: filetto dorato ────────────────────────────────────────────
  - id: "filetto_oro"
    type: "metal"
    color: [0.85, 0.70, 0.25]
    fuzz: 0.04
    seed: 5002

  # ── Frame: cromo lucido tubolare ──────────────────────────────────────────
  - id: "cromo_frame"
    type: "metal"
    color: [0.90, 0.90, 0.92]
    fuzz: 0.008                        # Minimal fuzz per realismo
    seed: 5003

  # ── Sfere: acciaio cromato specchio perfetto ─────────────────────────────
  - id: "cromo_sfera"
    type: "metal"
    color: [0.92, 0.92, 0.94]
    fuzz: 0.0
    seed: 5004

  # ── Fili sospensione: acciaio chirurgico scuro ───────────────────────────
  - id: "filo_acciaio"
    type: "metal"
    color: [0.35, 0.35, 0.38]
    fuzz: 0.2                          # Opacizzato
    seed: 5005

  # ── Ganci: cromo satinato ─────────────────────────────────────────────────
  - id: "gancio_cromo"
    type: "metal"
    color: [0.80, 0.80, 0.82]
    fuzz: 0.05
    seed: 5006

  # ── Piedini gomma antiscivolo ─────────────────────────────────────────────
  - id: "gomma_nera"
    type: "lambertian"
    color: [0.04, 0.04, 0.04]

  # ── Penna stilografica: lacca nera e dettagli oro ────────────────────────
  - id: "penna_lacca"
    type: "metal"
    color: [0.04, 0.04, 0.05]
    fuzz: 0.02
    seed: 5007
  - id: "penna_oro"
    type: "metal"
    color: [0.92, 0.78, 0.22]
    fuzz: 0.05
    seed: 5008

  # ── Fermacarte cristallo ──────────────────────────────────────────────────
  - id: "cristallo"
    type: "dielectric"
    refraction_index: 1.68             # Vetro ottico

  # ── Libro: pelle marrone e pagine crema ──────────────────────────────────
  - id: "pelle_libro"
    type: "lambertian"
    color: [0.22, 0.12, 0.07]
  - id: "pagine_crema"
    type: "lambertian"
    color: [0.85, 0.82, 0.74]

  # ── Targa: ottone invecchiato ─────────────────────────────────────────────
  - id: "ottone_targa"
    type: "metal"
    color: [0.70, 0.55, 0.20]
    fuzz: 0.08
    seed: 5009

# =============================================================================
#  LIGHTS
# =============================================================================
lights:

  # KEY — Area light (softbox) dall'alto-sinistra-fronte
  - type: "area"
    corner: [-0.70, 0.80, -0.60]
    u: [0.60, 0.00, 0.00]
    v: [0.00, 0.20, 0.40]
    color: [1.00, 0.95, 0.88]
    intensity: 6.5
    shadow_samples: 16

  # FILL — Point a destra, fredda
  - type: "point"
    position:  [0.80, 0.60, -0.30]
    color:     [0.65, 0.78, 1.00]
    intensity: 0.8

  # RIM — Spot dal retro-alto
  - type: "spot"
    position:    [0.10, 1.00, 0.80]
    direction:   [-0.10, -0.70, -0.80]
    color:       [0.88, 0.92, 1.00]
    intensity:   4.5
    inner_angle: 15
    outer_angle: 35

  # ACCENT — Spot stretto sulla sfera sollevata
  - type: "spot"
    position:    [-0.45, 0.75, -0.45]
    direction:   [0.25, -0.55, 0.45]
    color:       [1.00, 0.98, 0.92]
    intensity:   4.0
    inner_angle: 6
    outer_angle: 16

  # BOUNCE — Rimbalzo calore scrivania
  - type: "point"
    position:    [0.00, 0.02, 0.00]
    color:       [0.85, 0.60, 0.35]
    intensity:   0.10

