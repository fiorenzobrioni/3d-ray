#     intensity:   6
#   - type: "point"
#     position:    [0.00, 0.80, -0.30]
#     color:       [0.15, 1.00, 0.50]   # verde acido
#     intensity:   2

# ─────────────────────────────────────────────────────────────────────────────
#  LUCI ALT-3  Museo / Galleria — Faretti zenitali individuali
#
#  world consigliato:
#    ambient_light: [0.00, 0.00, 0.00]
#    background:    [0.00, 0.00, 0.00]
# ─────────────────────────────────────────────────────────────────────────────
# lights:
#   - type: "spot"                     # Faretto sfera sollevata (la star)
#     position:    [-0.174, 1.10, 0.00]
#     direction:   [0.00, -1.00, 0.00]
#     color:       [1.00, 0.95, 0.88]
#     intensity:   18
#     inner_angle: 10
#     outer_angle: 22
#   - type: "spot"                     # Faretto cluster 4 sfere
#     position:    [0.016, 1.10, 0.00]
#     direction:   [0.00, -1.00, 0.00]
#     color:       [1.00, 0.96, 0.92]
#     intensity:   20
#     inner_angle: 18
#     outer_angle: 35
#   - type: "point"                    # Fill minimo per non perdere i fili
#     position:    [0.00, 0.60, 0.00]
#     color:       [0.50, 0.60, 1.00]
#     intensity:   0.4


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ===========================================================================
  #  BASE IN LEGNO MOGANO LACCATO
  # ===========================================================================
  #
  #  Base rettangolare classica con bordo dorato e piedini in gomma.
  #  Dimensioni: 22cm × 2cm × 14cm
  #
  #  Vista dall'alto:
  #    ┌─────────────────────────────┐
  #    │        FILETTO ORO          │  Z = +0.070
  #    │  ┌───────────────────────┐  │
  #    │  │     MOGANO            │  │
  #    │  │                       │  │
  #    │  └───────────────────────┘  │
  #    │        FILETTO ORO          │  Z = −0.070
  #    └─────────────────────────────┘
  #          X: −0.110 ─── +0.110
  # ===========================================================================

  # Corpo base principale
  - name: "base_corpo"
    type: "box"
    scale:     [0.220, 0.020, 0.140]
    translate: [0.000, 0.010, 0.000]
    material:  "mogano_base"

  # Bordo superiore dorato (cornice perimetrale, leggermente sporgente)
  - name: "base_bordo_top"
    type: "box"
    scale:     [0.226, 0.003, 0.146]
    translate: [0.000, 0.021, 0.000]
    material:  "filetto_oro"

  # Bordo inferiore dorato
  - name: "base_bordo_bot"
    type: "box"
    scale:     [0.226, 0.003, 0.146]
    translate: [0.000, 0.000, 0.000]
    material:  "filetto_oro"

  # Piedini gomma (4 angoli)
  - name: "piedino_0"
    type: "cylinder"
    center: [-0.095, -0.004, -0.055]
    radius: 0.008
    height: 0.004
    material: "gomma_nera"
  - name: "piedino_1"
    type: "cylinder"
    center: [0.095, -0.004, -0.055]
    radius: 0.008
    height: 0.004
    material: "gomma_nera"
  - name: "piedino_2"
    type: "cylinder"
    center: [-0.095, -0.004, 0.055]
    radius: 0.008
    height: 0.004
    material: "gomma_nera"
  - name: "piedino_3"
    type: "cylinder"
    center: [0.095, -0.004, 0.055]
    radius: 0.008
    height: 0.004
    material: "gomma_nera"

  # Targa ottone sulla fronte
  - name: "targa"
    type: "box"
    scale:     [0.080, 0.008, 0.002]
    translate: [0.000, 0.012, -0.072]
    material:  "ottone_targa"


  # ===========================================================================
  #  FRAME IN CROMO TUBOLARE
  # ===========================================================================
  #
  #  4 montanti cilindrici + 2 binari superiori + 2 traverse laterali.
  #  Frame esterno: X = ±0.100, Z = ±0.065
  #  Altezza montanti: dalla base (Y=0.022) al rail (Y=0.250)
  #  Diametro tubi: 5mm (raggio 0.0025)
  # ===========================================================================

  # Montante anteriore sinistro
  - name: "mont_ant_sx"
    type: "cylinder"
    center:  [-0.100, 0.022, -0.065]
    radius:  0.0025
    height:  0.228
    material: "cromo_frame"
  # Montante anteriore destro
  - name: "mont_ant_dx"
    type: "cylinder"
    center:  [0.100, 0.022, -0.065]
    radius:  0.0025
    height:  0.228
    material: "cromo_frame"
  # Montante posteriore sinistro
  - name: "mont_post_sx"
    type: "cylinder"
    center:  [-0.100, 0.022, 0.065]
    radius:  0.0025
    height:  0.228
    material: "cromo_frame"
  # Montante posteriore destro
  - name: "mont_post_dx"
    type: "cylinder"
    center:  [0.100, 0.022, 0.065]
    radius:  0.0025
    height:  0.228
    material: "cromo_frame"

  # Binario superiore anteriore (a cui si agganciano i fili front)
  - name: "rail_front"
    type: "cylinder"
    center:  [-0.100, 0.247, -0.065]
    radius:  0.0025
    height:  0.003
    material: "cromo_frame"
  # Workaround: il cilindro è allineato Y. Usiamo un box orizzontale per il rail.
  - name: "rail_front_bar"
    type: "box"
    scale:     [0.208, 0.005, 0.005]
    translate: [0.000, 0.250, -0.065]
    material:  "cromo_frame"

  # Binario superiore posteriore
  - name: "rail_back_bar"
    type: "box"
    scale:     [0.208, 0.005, 0.005]
    translate: [0.000, 0.250, 0.065]
    material:  "cromo_frame"

  # Traversa superiore sinistra (collega front e back)
  - name: "traversa_sx"
    type: "box"
    scale:     [0.005, 0.005, 0.138]
    translate: [-0.100, 0.250, 0.000]
    material:  "cromo_frame"

  # Traversa superiore destra
  - name: "traversa_dx"
    type: "box"
    scale:     [0.005, 0.005, 0.138]
    translate: [0.100, 0.250, 0.000]
    material:  "cromo_frame"

  # Sfere decorative ai vertici superiori dei montanti
  - name: "cap_ant_sx"
    type: "sphere"
    center: [-0.100, 0.253, -0.065]
    radius: 0.004
    material: "cromo_frame"
  - name: "cap_ant_dx"
    type: "sphere"
    center: [0.100, 0.253, -0.065]
    radius: 0.004
    material: "cromo_frame"
  - name: "cap_post_sx"
    type: "sphere"
    center: [-0.100, 0.253, 0.065]
    radius: 0.004
    material: "cromo_frame"
  - name: "cap_post_dx"
    type: "sphere"
    center: [0.100, 0.253, 0.065]
    radius: 0.004
    material: "cromo_frame"


  # ===========================================================================
  #  SFERE — 1 sollevata (45°) + 4 in equilibrio a contatto
  # ===========================================================================
  #
  #  R = 0.016 m,  passo = 0.032 m
  #  Centri sfere a riposo X: −0.032, 0.000, +0.032, +0.064
  #  Sfera 0 sollevata: centro originale X=−0.064
  #    X = −0.064 − 0.155·sin(45°) = −0.174
  #    Y =  0.250 − 0.155·cos(45°) =  0.140
  # ===========================================================================

  # Sfera 0 — SOLLEVATA a 45° (protagonista)
  - name: "sfera_0"
    type: "sphere"
    center:   [-0.174, 0.140, 0.000]
    radius:   0.016
    seed:     2001
    material: "cromo_sfera"

  # Sfera 1 — prima del cluster
  - name: "sfera_1"
    type: "sphere"
    center:   [-0.032, 0.095, 0.000]
    radius:   0.016
    seed:     2002
    material: "cromo_sfera"

  # Sfera 2 — centro
  - name: "sfera_2"
    type: "sphere"
    center:   [0.000, 0.095, 0.000]
    radius:   0.016
    seed:     2003
    material: "cromo_sfera"

  # Sfera 3
  - name: "sfera_3"
    type: "sphere"
    center:   [0.032, 0.095, 0.000]
    radius:   0.016
    seed:     2004
    material: "cromo_sfera"

  # Sfera 4 — ultima destra
  - name: "sfera_4"
    type: "sphere"
    center:   [0.064, 0.095, 0.000]
    radius:   0.016
    seed:     2005
    material: "cromo_sfera"


  # ===========================================================================
  #  FILI DI SOSPENSIONE — V-shape per ogni sfera
  # ===========================================================================
  #
  #  Ogni sfera ha 2 fili (front Z=−0.065, back Z=+0.065) che formano
  #  una V dal rail al centro sfera.
  #  Fili = box sottilissimi (1.5mm) con rotazione 3D.
  #  α_Z = arctan(0.065/0.155) ≈ 22.8° ≈ 23°
  #
  #  Sfere 1–4 a riposo: rotate [∓23, 0, 0]
  #  Sfera 0 sollevata: rotate complesso (−23° Z-tilt + 45° swing)
  # ===========================================================================

  # ── SFERA 0 (sollevata 45°) ────────────────────────────────────────────────
  # I fili della sfera sollevata hanno una rotazione 3D composta.
  # Vettore filo front: da (-0.174, 0.140, 0) a (-0.064, 0.250, -0.065)
  #   delta = (0.110, 0.110, -0.065)
  # Approssimazione con rotazione: rotate [-18, 0, -45]
  - name: "filo_0_front"
