# =============================================================================
#  IL PENDOLO DI NEWTON — Executive Desktop, Dramatic Chiaroscuro
# =============================================================================
#
#  Scena rifatta da zero. Pendolo di Newton classico da scrivania in cromo
#  lucido su base di legno mogano laccato, posato su un piano di noce scuro.
#  Sfera sinistra sollevata a ~45°. Contesto: penna stilografica, fermacarte
#  in vetro, libro rilegato in pelle — still life da ufficio d'epoca.
#
#  Design realistico:
#   ● Scala reale 1:1 (unità = metri). Sfere d=3.2cm, frame h=28cm
#   ● Base in legno mogano (lambertian wood texture) — NON acciaio
#   ● Frame in cromo tubolare (metal fuzz=0.005 — quasi specchio)
#   ● Sfere in acciaio cromato (metal fuzz=0.0 — specchio perfetto)
#   ● Fili in acciaio sottile (metal scuro, non nylon)
#   ● Piano scrivania in noce con venature (marble texture warm)
#   ● Props contestuali per composizione classica
#
#  Illuminazione drammatica:
#   ● Area light principale (softbox) per ombre morbide sulle sfere
#   ● Spot accent sulla sfera sollevata (protagonista)
#   ● Rim light fredda dal retro per separare dal fondo
#   ● Ambiente scurissimo — studio controllato
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  RENDER CONSIGLIATI                                                     │
#  │                                                                         │
#  │  PREVIEW   dotnet run ... -- -i pendolo-newton.yaml -s 4  -d 10        │
#  │                               -w 800 -H 450 -S 4                       │
#  │                                                                         │
#  │  DRAFT     dotnet run ... -- -i pendolo-newton.yaml -s 16 -d 30        │
#  │                               -w 1280 -H 720                           │
#  │                                                                         │
#  │  PROD      dotnet run ... -- -i pendolo-newton.yaml -s 128 -d 50       │
#  │                               -w 1920 -H 1080 -S 16                    │
#  │                                                                         │
#  │  ULTRA     dotnet run ... -- -i pendolo-newton.yaml -s 256 -d 50       │
#  │                               -w 3840 -H 2160 -S 32                    │
#  └─────────────────────────────────────────────────────────────────────────┘
#
# =============================================================================
#  GEOMETRIA — Dati di progetto
# =============================================================================
#
#  R_sfera     = 0.016 m            (raggio, diametro 3.2 cm)
#  Passo_X     = 2·R = 0.032 m     (centro-centro sfere a contatto)
#  Z_attacco   = ±0.065 m          (binari front/back)
#  H_filo      = 0.155 m           (componente verticale)
#  Y_rail      = 0.250 m           (quota binari superiori)
#  Y_sfera     = Y_rail − H_filo = 0.095 m   (centri sfere a riposo)
#
#  Sfera 0 sollevata θ=45°:
#    X = −0.064 − 0.155·sin(45°) = −0.064 − 0.110 = −0.174
#    Y = 0.250  − 0.155·cos(45°) = 0.250  − 0.110 =  0.140
#
#  Frame: 4 montanti verticali + 2 binari + 2 traverse + base mogano
#  Base mogano: 22cm × 2cm × 14cm, appoggiata sul piano scrivania
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  # Studio scurissimo — solo luci artificiali controllate
  ambient_light: [0.012, 0.012, 0.016]
  background:    [0.015, 0.015, 0.025]

  ground:
    type:     "infinite_plane"
    material: "scrivania_noce"
    y: 0.0


# =============================================================================
#  CAMERA ATTIVA ★  Tre quarti sinistra — drammatica, leggero DOF
#
#  La sfera sollevata domina il primo piano sinistro.
#  Fov 32° ≈ 70mm su pieno formato: compressione naturale, bokeh morbido.
#  Apertura moderata: sfera a fuoco, fondo leggermente sfocato.
# =============================================================================
camera:
  position:   [-0.42,  0.38, -0.58]
  look_at:    [ 0.00,  0.14,  0.00]
  vup:        [ 0, 1, 0]
  fov:        32
  aperture:   0.004
  focal_dist: 0.72


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-1  Frontale simmetrica (catalogo, tutto nitido)
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  0.24, -0.60]
#   look_at:    [ 0.00,  0.16,  0.00]
#   fov:        38
#   aperture:   0.0
#   focal_dist: 0.60

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-2  Macro estremo sulla sfera sollevata (bokeh forte)
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [-0.34,  0.26, -0.36]
#   look_at:    [-0.17,  0.14,  0.00]
#   fov:        24
#   aperture:   0.015
#   focal_dist: 0.42

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-3  Top-down (planimetria, fili a V visibili)
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  0.80, -0.05]
#   look_at:    [ 0.00,  0.12,  0.00]
#   vup:        [ 0, 0, -1]
#   fov:        45
#   aperture:   0.0
#   focal_dist: 0.68

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-4  Profilo sinistro (mostra l'angolo di alzo 45°)
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [-0.55,  0.22, -0.02]
#   look_at:    [-0.04,  0.15,  0.00]
#   fov:        30
#   aperture:   0.002
#   focal_dist: 0.52

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-5  Dutch angle cinematografico (~10° tilt)
#  Ideale con schema luci ALT-2 (Neon Bicolore)
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [-0.40,  0.40, -0.55]
#   look_at:    [ 0.00,  0.13,  0.00]
#   vup:        [ 0.18, 1, 0]
#   fov:        36
#   aperture:   0.004
#   focal_dist: 0.68


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ── Piano scrivania: noce scuro con venature ──────────────────────────────
  - id: "scrivania_noce"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 12
      noise_strength: 3.2
      colors: [[0.25, 0.12, 0.05], [0.12, 0.06, 0.02]]
      randomize_offset: true
      rotation: [45, 0, 0]

  # ── Base pendolo: mogano laccato lucido ───────────────────────────────────
  - id: "mogano_base"
    type: "metal"
    color: [0.28, 0.12, 0.06]
    fuzz: 0.08                         # lacca lucida ma non specchio

  # ── Bordo base: filetto dorato ────────────────────────────────────────────
  - id: "filetto_oro"
    type: "metal"
    color: [0.85, 0.70, 0.25]
    fuzz: 0.05

  # ── Frame: cromo lucido tubolare ──────────────────────────────────────────
  - id: "cromo_frame"
    type: "metal"
    color: [0.90, 0.90, 0.92]
    fuzz: 0.005                        # quasi-specchio

  # ── Sfere: acciaio cromato specchio perfetto ★ ───────────────────────────
  - id: "cromo_sfera"
    type: "metal"
    color: [0.88, 0.88, 0.90]
    fuzz: 0.0                          # specchio perfetto

  # ── Fili sospensione: acciaio chirurgico scuro ───────────────────────────
  - id: "filo_acciaio"
    type: "metal"
    color: [0.30, 0.28, 0.26]
    fuzz: 0.25                         # opacizzato

  # ── Ganci: cromo satinato ─────────────────────────────────────────────────
  - id: "gancio_cromo"
    type: "metal"
    color: [0.78, 0.78, 0.80]
    fuzz: 0.04

  # ── Piedini gomma antiscivolo ─────────────────────────────────────────────
  - id: "gomma_nera"
    type: "lambertian"
    color: [0.05, 0.05, 0.05]

  # ── Penna stilografica: lacca nera ────────────────────────────────────────
  - id: "lacca_nera"
    type: "metal"
    color: [0.04, 0.04, 0.05]
    fuzz: 0.03

  # ── Cappuccio penna: oro satinato ─────────────────────────────────────────
  - id: "oro_penna"
    type: "metal"
    color: [0.90, 0.75, 0.20]
    fuzz: 0.06

  # ── Fermacarte cristallo ──────────────────────────────────────────────────
  - id: "cristallo"
    type: "dielectric"
    refraction_index: 1.72             # vetro flint pesante

  # ── Libro: pelle marrone scura ────────────────────────────────────────────
  - id: "pelle_libro"
    type: "lambertian"
    color: [0.24, 0.14, 0.08]

  # ── Libro: pagine (taglio) ────────────────────────────────────────────────
  - id: "pagine_crema"
    type: "lambertian"
    color: [0.88, 0.84, 0.76]

  # ── Targa: ottone invecchiato ─────────────────────────────────────────────
  - id: "ottone_targa"
    type: "metal"
    color: [0.72, 0.58, 0.22]
    fuzz: 0.10


# =============================================================================
#  LIGHTS ★ Schema attivo: Chiaroscuro Drammatico
# =============================================================================
#
#  Ispirato alla fotografia di prodotto high-end per orologi/gioielli:
#  una sorgente morbida principale (area light) + accenti chirurgici.
#  Rapporto key:fill > 4:1 per dramma e profondità.
# =============================================================================
lights:

  # KEY — Area light (softbox) dall'alto-sinistra-fronte
  # Produce ombre morbide con penombra sulle sfere cromate.
  # La dimensione grande (60cm × 40cm) mimetizza la sorgente puntiforme
  # e crea riflessi ampi e sfumati sulla superficie curva delle sfere.
  - type: "area"
    corner: [-0.70, 0.80, -0.60]
    u: [0.60, 0.00, 0.00]
    v: [0.00, 0.20, 0.40]
    color: [1.00, 0.94, 0.86]         # tungsteno caldo 4500K
    intensity: 6.0
    shadow_samples: 16

  # FILL — Point a destra, fredda, debole
  # Schiarisce appena le ombre, mantiene il rapporto drammatico.
  - type: "point"
    position:  [0.80, 0.50, -0.30]
    color:     [0.60, 0.75, 1.00]     # LED 7000K
    intensity: 0.6

  # RIM — Spot dal retro-alto: separa le sfere dal fondo
  # Il controluce crea un alone luminoso sul profilo delle sfere.
  - type: "spot"
    position:    [0.05, 0.90, 0.80]
    direction:   [-0.02, -0.60, -0.80]
    color:       [0.85, 0.90, 1.00]
    intensity:   4.0
    inner_angle: 14
    outer_angle: 30

  # ACCENT — Spot stretto sulla sfera sollevata
  # Enfatizza la protagonista. La superficie specchio lo trasforma
  # in un highlight brillante che guida l'occhio.
  - type: "spot"
    position:    [-0.40, 0.70, -0.50]
    direction:   [0.18, -0.48, 0.44]
    color:       [1.00, 0.96, 0.90]
    intensity:   3.5
    inner_angle: 8
    outer_angle: 18

  # BOUNCE — Rimbalzo dal piano (simula GI sotto le sfere)
  - type: "point"
    position:    [0.00, 0.01, 0.00]
    color:       [0.80, 0.55, 0.30]    # calore della scrivania
    intensity:   0.08


# ─────────────────────────────────────────────────────────────────────────────
#  LUCI ALT-1  Finestra Nord — Luce diurna naturale morbida
#
#  world consigliato:
#    ambient_light: [0.03, 0.04, 0.06]
#    background:    [0.12, 0.18, 0.30]
# ─────────────────────────────────────────────────────────────────────────────
