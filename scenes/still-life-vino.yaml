# ═══════════════════════════════════════════════════════════════════════════════
#  STILL LIFE — Vino a Lume di Candela
#
#  Scena in stile natura morta fiamminga: sala da pranzo intima illuminata
#  da una singola candela. Su un tavolo in rovere sono disposti una bottiglia
#  di vino rosso e due calici, tutti generati via lathe (superficie di
#  rivoluzione). La candela fornisce la luce principale: la fiamma emissiva
#  partecipa alla NEE e proietta il vetro verde della bottiglia e le
#  rifrazioni dei calici sul piano del tavolo.
#
#  Feature dimostrate:
#    • Lathe Catmull-Rom  → bottiglia (collo + spalla + corpo) e calice
#    • Lathe Linear       → candela (look tornito classico)
#    • Template + Instance → due calici identici posizionati diversamente
#    • Materiali Disney   → vetro verde bottiglia, cristallo, vino rosso, cera
#    • NEE su emissive    → la fiamma del candela come sorgente principale
#    • Multi-camera       → 4 inquadrature: hero, macro, laterale, zenitale
#
#  AMBIENTAZIONE: Indoor, notte — sala da pranzo a lume di candela
#  STILE: Chiaroscuro fiammingo, intimo, caldo, cinematografico
#
#  Render consigliati:
#    Preview:  -w 400  -H 225  -s 64   -d 6   -S 1  -C 50
#    Standard: -w 800  -H 450  -s 256  -d 12  -S 4  -C 25
#    Finale:   -w 1920 -H 1080 -s 1024 -d 16  -S 4  -C 25
#
#  NOTE:
#    - Profondità alta (d ≥ 12): bottiglia + vino + calice = dielettrici
#      impilati, servono bounce extra per non generare zone nere.
#    - Clamp basso (-C 25): le rifrazioni attraverso il vetro verde della
#      bottiglia tendono a produrre fireflies occasionali.
#    - I lathe con profilo Catmull-Rom hanno costo ~10× rispetto a un cono
#      analitico: aspettatevi render più lenti del solito per le dimensioni.
# ═══════════════════════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════════════════
#  IMPORT — materiali da librerie condivise
# ═══════════════════════════════════════════════════════════════════════════
imports:
  - path: "libraries/materials/woods.yaml"
  - path: "libraries/materials/glasses.yaml"
  - path: "libraries/materials/foods.yaml"
  - path: "libraries/materials/organics.yaml"
  - path: "libraries/materials/emissives.yaml"


# ═══════════════════════════════════════════════════════════════════════════
#  WORLD — stanza buia, nessuna luce ambiente, sfondo nero
#  La candela emissiva è l'unica sorgente diretta visibile.
# ═══════════════════════════════════════════════════════════════════════════
world:
  ambient_light: [0.010, 0.008, 0.005]
  background:    [0.0, 0.0, 0.0]

# ─── ALT-WORLD: leggero glow caldo ambientale (commentare quello sopra) ────
# world:
#   ambient_light: [0.025, 0.018, 0.010]
#   sky:
#     type: "gradient"
#     zenith_color:  [0.02, 0.015, 0.010]
#     horizon_color: [0.08, 0.05,  0.020]
#     ground_color:  [0.03, 0.02,  0.010]


# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS — 4 inquadrature
# ═══════════════════════════════════════════════════════════════════════════
cameras:

  # HERO — 3/4 frontale, altezza occhi di un commensale seduto
  - name: "hero"
    position:   [1.4, 1.15, -1.3]
    look_at:    [-0.05, 0.88, 0.0]
    fov:        42
    aperture:   0.025
    focal_dist: 2.0

  # MACRO — primo piano del calice frontale, mostra la rifrazione del vino
  - name: "macro_calice"
    position:   [0.7, 0.98, -0.75]
    look_at:    [0.18, 0.92, -0.20]
    fov:        32
    aperture:   0.04
    focal_dist: 0.75

  # LATERALE — vista di taglio lungo la fila bottiglia + calici
  - name: "laterale"
    position:   [2.0, 0.92, 0.0]
    look_at:    [-0.6, 0.90, 0.0]
    fov:        38
    aperture:   0.02
    focal_dist: 2.4

  # ZENITALE — top-down cinematografico, per il reading della composizione
  - name: "zenitale"
    position:   [0.0, 1.9, 0.0]
    look_at:    [0.0, 0.79, 0.0]
    vup:        [0, 0, -1]
    fov:        52
    aperture:   0.0
    focal_dist: 1.2


# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS — candela (NEE via emissive) + fill freddo + rim caldo dalla parete
# ═══════════════════════════════════════════════════════════════════════════
lights:

  # FILL FREDDO — finestra fuori campo che filtra luce lunare
  #   Rompe il nero assoluto delle zone in ombra e introduce un contrasto
  #   caldo/freddo tipico delle tele fiamminghe al lume di candela.
  - type: "directional"
    direction: [-0.60, -0.40, 0.70]
    color:     [0.45, 0.55, 0.85]
    intensity: 0.025

  # ACCENT CALDO — sphere light tenue dietro il tavolo
  #   Simula un riflesso caldo dalla parete retrostante (focolare fuori
  #   campo). Aiuta a separare gli oggetti dal fondo.
  - type: "sphere"
    position:  [-0.3, 0.55, 1.8]
    radius:    0.25
    color:     [1.0, 0.55, 0.20]
    intensity: 2.5
    shadow_samples: 8

# ─── ALT-LIGHTS-1: candele multiple (interior-candlelight library) ─────────
# lights:
#   - type: "point"
#     position: [-0.65, 1.03, -0.20]   # posizione fiamma candela principale
#     color: [1.0, 0.48, 0.08]
#     intensity: 3.5


# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS — solo custom (muri / pavimento / piccoli extra)
#  Tutti gli altri arrivano dalle librerie importate in cima al file.
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ── Muri in stucco caldo, leggera variazione procedurale ─────────────────
  - id: "muro_stucco"
    type: "disney"
    texture:
      type: "noise"
      scale: 12.0
      noise_strength: 0.35
      colors: [[0.32, 0.24, 0.18], [0.26, 0.19, 0.13]]
      randomize_offset: true
    roughness: 0.95
    specular: 0.05

  # ── Soffitto scuro a travature implicite (scuro, quasi nero) ─────────────
  - id: "soffitto_legno"
    type: "disney"
    color:    [0.08, 0.06, 0.04]
    roughness: 0.85

  # ── Pavimento: parquet scuro con texture wood ────────────────────────────
  - id: "pavimento_parquet"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.5
      noise_strength: 2.0
      colors: [[0.22, 0.13, 0.06], [0.14, 0.08, 0.03]]
      randomize_offset: true
      randomize_rotation: true
    roughness: 0.55
    specular: 0.30
    clearcoat: 0.20
    coat_roughness: 0.45


# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — il calice di vino (lathe + wine fill) riutilizzabile
# ═══════════════════════════════════════════════════════════════════════════
templates:

  # ── CALICE DI VINO ─────────────────────────────────────────────────────────
  #  Due lathe concentrici:
  #    1) Il cristallo: profilo Catmull-Rom che descrive l'intera silhouette
  #       del calice (base → stelo → coppa → rim chiuso sull'asse).
  #    2) Il vino rosso: un secondo lathe più piccolo che riempie la parte
  #       bassa della coppa, con superficie piatta in sommità per simulare
  #       il menisco. Materiale override -> dis_vino_rosso.
  #  Entrambi i lathe partono con y=0 alla base del calice, così
  #  le istanze possono essere piazzate direttamente a y=0.79 (piano tavolo).
  # ───────────────────────────────────────────────────────────────────────────
  - name: "calice_vino"
    material: "dis_vetro_extrachiaro"
    children:

      # Corpo del calice: cristallo trasparente
      - type: "lathe"
        profile_type: "catmull_rom"
        profile:
          - [0.000, 0.000]   # asse alla base
          - [0.045, 0.000]   # bordo esterno del piede
          - [0.045, 0.006]
          - [0.040, 0.012]   # raccordo verso lo stelo
          - [0.010, 0.018]
          - [0.006, 0.030]   # stelo sottile
          - [0.006, 0.095]   # stelo in alto
          - [0.012, 0.105]   # attacco coppa
          - [0.030, 0.118]
          - [0.045, 0.145]   # coppa più larga
          - [0.043, 0.180]
          - [0.035, 0.205]
          - [0.026, 0.218]   # bordo rim
          - [0.000, 0.220]   # chiusura sull'asse

      # Vino rosso all'interno (coppa riempita a 1/3)
      - type: "lathe"
        profile_type: "catmull_rom"
        material: "dis_vino_rosso"
        profile:
          - [0.000, 0.115]
          - [0.022, 0.118]
          - [0.034, 0.135]
          - [0.040, 0.155]
          - [0.040, 0.162]   # superficie del vino
          - [0.000, 0.162]


# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  # ─────────────────────────────────────────────────────────────────────────
  #  STANZA — scatola chiusa tranne fronte (camera-facing)
  #  Dimensioni: 5 × 2.6 × 5 (X × Y × Z)
  # ─────────────────────────────────────────────────────────────────────────

  - { name: "pavimento", type: "quad", q: [-2.5, 0.0,    -2.5], u: [5, 0, 0], v: [0, 0, 5], material: "pavimento_parquet", seed: 10 }
  - { name: "soffitto",  type: "quad", q: [-2.5, 2.6,    -2.5], u: [5, 0, 0], v: [0, 0, 5], material: "soffitto_legno" }
  - { name: "muro_sx",   type: "quad", q: [-2.5, 0.0,    -2.5], u: [0, 0, 5], v: [0, 2.6, 0], material: "muro_stucco",  seed: 11 }
  - { name: "muro_dx",   type: "quad", q: [ 2.5, 0.0,    -2.5], u: [0, 0, 5], v: [0, 2.6, 0], material: "muro_stucco",  seed: 12 }
  - { name: "muro_back", type: "quad", q: [-2.5, 0.0,     2.5], u: [5, 0, 0], v: [0, 2.6, 0], material: "muro_stucco",  seed: 13 }

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO IN ROVERE — top + 4 gambe
  #  Top: Y = 0.76 → 0.79 (spessore 3 cm)
  #  Gambe: cilindri h=0.76 che arrivano esattamente sotto il top.
  # ─────────────────────────────────────────────────────────────────────────

  - name: "tavolo_top"
    type: "box"
    scale: [1.80, 0.03, 0.90]
    translate: [0.0, 0.775, 0.0]
    material: "dis_quercia_olio"
    seed: 50

  - { name: "gamba_fl", type: "cylinder", center: [-0.80, 0.0, -0.38], radius: 0.035, height: 0.76, material: "dis_quercia_olio" }
  - { name: "gamba_fr", type: "cylinder", center: [ 0.80, 0.0, -0.38], radius: 0.035, height: 0.76, material: "dis_quercia_olio" }
  - { name: "gamba_bl", type: "cylinder", center: [-0.80, 0.0,  0.38], radius: 0.035, height: 0.76, material: "dis_quercia_olio" }
  - { name: "gamba_br", type: "cylinder", center: [ 0.80, 0.0,  0.38], radius: 0.035, height: 0.76, material: "dis_quercia_olio" }

  # ─────────────────────────────────────────────────────────────────────────
  #  BOTTIGLIA DI VINO — Lathe Catmull-Rom, vetro verde bottiglia
  #
  #  Profilo stile Bordeaux: base cilindrica, spalla raccordata, collo stretto,
  #  labbro appena accennato. Alto 31 cm, diametro corpo 9 cm.
  # ─────────────────────────────────────────────────────────────────────────

  - name: "bottiglia"
    type: "lathe"
    profile_type: "catmull_rom"
    material: "dis_vetro_verde_bottiglia"
    translate: [-0.30, 0.79, 0.0]
    profile:
      - [0.000, 0.000]
      - [0.045, 0.000]
      - [0.045, 0.015]
      - [0.045, 0.200]   # corpo cilindrico
      - [0.043, 0.215]
      - [0.028, 0.240]   # spalla
      - [0.018, 0.260]
      - [0.014, 0.280]
      - [0.013, 0.300]   # collo
      - [0.015, 0.306]   # labbro
      - [0.013, 0.310]
      - [0.000, 0.310]   # chiusura superiore

  # Vino dentro la bottiglia: secondo lathe più piccolo, superficie piatta
  # alla spalla. Visibile per trasparenza del vetro verde.
  - name: "vino_nella_bottiglia"
    type: "lathe"
    profile_type: "linear"
    material: "dis_vino_rosso"
    translate: [-0.30, 0.79, 0.0]
    profile:
      - [0.000, 0.005]
      - [0.042, 0.005]
      - [0.042, 0.230]
      - [0.020, 0.255]
      - [0.013, 0.270]
      - [0.000, 0.270]

  # Tappo di sughero sporgente dal collo della bottiglia
  - name: "tappo_sughero"
    type: "cylinder"
    center: [-0.30, 1.095, 0.0]
    radius: 0.0128
    height: 0.022
    material: "dis_sughero_naturale"

  # ─────────────────────────────────────────────────────────────────────────
  #  DUE CALICI DI VINO — istanze del template "calice_vino"
  #  Sono leggermente ruotati fra loro per evitare simmetria piatta.
  # ─────────────────────────────────────────────────────────────────────────

  - name: "calice_sinistro"
    type: "instance"
    template: "calice_vino"
    translate: [0.12, 0.79, -0.22]
    rotate:    [0, 18, 0]

  - name: "calice_destro"
    type: "instance"
    template: "calice_vino"
    translate: [0.36, 0.79, 0.18]
    rotate:    [0, -35, 0]

  # ─────────────────────────────────────────────────────────────────────────
  #  CANDELA — lathe Linear (il look tornito del candeliere reale) +
  #  fiamma emissiva come sfera (NEE-friendly).
  # ─────────────────────────────────────────────────────────────────────────

  - name: "candela_corpo"
    type: "lathe"
    profile_type: "linear"
    material: "dis_candela_avorio"
    translate: [-0.70, 0.79, -0.18]
    profile:
      - [0.000, 0.000]
      - [0.022, 0.000]   # base larga
      - [0.022, 0.010]
      - [0.018, 0.012]
      - [0.018, 0.140]   # fusto
      - [0.016, 0.148]
      - [0.014, 0.152]
      - [0.008, 0.156]
      - [0.005, 0.158]   # punta verso il wick
      - [0.000, 0.158]

  # Stoppino visibile (minuscolo cilindro scuro sopra la cera)
  - name: "stoppino"
    type: "cylinder"
    center: [-0.70, 0.948, -0.18]
    radius: 0.0015
    height: 0.010
    material: "soffitto_legno"

  # Fiamma: sfera emissiva leggermente allungata, contribuisce alla NEE
  - name: "fiamma"
    type: "sphere"
    center: [-0.70, 0.968, -0.18]
    radius: 0.014
    scale: [0.8, 1.8, 0.8]
    material: "fiamma_candela"

  # ─────────────────────────────────────────────────────────────────────────
  #  PICCOLA CIOTOLA DECORATIVA — lathe Bezier (guscio basso con labbro)
  #  Un tocco scenografico: una scodella bassa che fa da centrotavola.
  #  Profilo Bezier per mostrare il terzo modo di lathe sulla scena.
  # ─────────────────────────────────────────────────────────────────────────

  - name: "ciotola"
    type: "lathe"
    profile_type: "bezier"
    material: "dis_quercia_grezzo"
    translate: [0.55, 0.79, -0.15]
    profile:
      - [0.00, 0.00]
      - [0.09, 0.02]
      - [0.11, 0.05]
      - [0.00, 0.05]
    profile_bezier_controls:
      # Segmento 0: base piatta che sale sul labbro
      - [0.00, 0.00]
      - [0.04, 0.00]
      - [0.07, 0.01]
      - [0.09, 0.02]
      # Segmento 1: curva ascendente fino al bordo
      - [0.09, 0.02]
      - [0.105, 0.035]
      - [0.115, 0.045]
      - [0.11, 0.05]
      # Segmento 2: labbro orizzontale che si chiude sull'asse
      - [0.11, 0.05]
      - [0.07, 0.05]
      - [0.03, 0.05]
      - [0.00, 0.05]
