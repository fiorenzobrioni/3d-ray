# =============================================================================
#  FURNACE TEST — Metal (3 livelli di fuzz)
#
#  Tre sfere di metallo bianco (albedo 1.0) immerse in un ambiente di
#  luminanza costante 1.0. Tre fuzz diversi:
#    sx  — fuzz 0.05  (specchio quasi perfetto: sample delta tinted)
#    cen — fuzz 0.30  (GGX rough, lobo MIS-pesabile)
#    dx  — fuzz 0.80  (GGX molto rough, vicino a Lambertian)
#
#  Il sampler GGX-NDF di Metal scarta i campioni che cadono sotto la
#  superficie (NdotL ≤ 0), perciò l'integrale del Pdf su S² è < 1 per fuzz
#  alto — questo NON pregiudica MIS (l'estimator usa lo stesso Pdf nel
#  numeratore e nel denominatore), ma il furnace test mostra come la
#  perdita di energia sia visibile per fuzz alto. Le tre sfere quindi
#  appaiono progressivamente più scure da sinistra a destra: un
#  comportamento atteso della formulazione NDF (vs VNDF di Disney).
#
#  COMANDO TIPO
#    dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#      -i scenes/furnace-metal.yaml -w 600 -H 200 -s 128 -d 6
# =============================================================================

world:
  ambient_light: [0.0, 0.0, 0.0]
  sky:
    type: "gradient"
    zenith_color:  [1.0, 1.0, 1.0]
    horizon_color: [1.0, 1.0, 1.0]
    ground_color:  [1.0, 1.0, 1.0]

camera:
  position: [0, 0, -6]
  look_at:  [0, 0, 0]
  fov: 35

materials:
  - { id: "metal_smooth", type: "metal", color: [1.0, 1.0, 1.0], fuzz: 0.05 }
  - { id: "metal_rough",  type: "metal", color: [1.0, 1.0, 1.0], fuzz: 0.30 }
  - { id: "metal_matte",  type: "metal", color: [1.0, 1.0, 1.0], fuzz: 0.80 }

entities:
  - { name: "smooth", type: "sphere", center: [-2.2, 0, 0], radius: 1.0, material: "metal_smooth" }
  - { name: "rough",  type: "sphere", center: [ 0.0, 0, 0], radius: 1.0, material: "metal_rough" }
  - { name: "matte",  type: "sphere", center: [ 2.2, 0, 0], radius: 1.0, material: "metal_matte" }

lights: []
