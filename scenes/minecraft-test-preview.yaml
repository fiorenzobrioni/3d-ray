lights:
  - type: "directional"
    direction: [0.574, -0.300, 0.717]
    color: [0.780, 0.820, 0.880]
    intensity: 1.000

cameras:
  - name: "wide"
    position: [100.000, 48.125, 90.000]
    look_at:  [0.000, 9.069, 0.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "aerial"
    position: [0.000, 88.594, 90.000]
    look_at:  [0.000, 0.000, 0.000]
    fov:      55.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "ground"
    position: [-30.000, 13.069, 30.000]
    look_at:  [30.000, 9.069, -30.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "sunrise"
    position: [-60.000, 15.069, -10.000]
    look_at:  [40.000, 9.069, 10.000]
    fov:      55.000
    aperture: 0.050
    focal_dist: 80.000

  - name: "topdown"
    position: [0.000, 143.750, 0.001]
    look_at:  [0.000, 0.000, 0.000]
    fov:      70.000
    aperture: 0.000
    focal_dist: 1.000

entities:
  - name: "terrain"
    type: "instance"
    template: "minecraft_test"
    translate: [0.000, 0.000, 0.000]
