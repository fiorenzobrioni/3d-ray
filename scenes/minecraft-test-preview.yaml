# 3D-Ray terrain preview scene — generated by TerrainGen --with-cameras
#
# Render with:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/minecraft-test-preview.yaml -o renders/preview-minecraft-test.png \
#     -w 1280 -H 720 -s 256 -d 6 -S 2 -c wide
#
# Cameras: wide | aerial | ground | sunrise | topdown
# List them with --list-cameras.

imports:
  - path: "libraries/terrain/minecraft-test.yaml"

world:
  ambient_light: [0.060, 0.070, 0.100]
  sky:
    type: "gradient"
    zenith_color:  [0.250, 0.320, 0.450]
    horizon_color: [0.780, 0.820, 0.880]
    ground_color:  [0.550, 0.550, 0.600]
    sun:
      direction: [-0.474, -0.652, -0.592]
      color: [0.950, 0.950, 1.000]
      intensity: 10.000
      size: 3.000
      falloff: 32.0

lights:
  - type: "directional"
    direction: [0.574, -0.395, 0.717]
    color: [0.780, 0.820, 0.880]
    intensity: 1.000

cameras:
  - name: "wide"
    position: [100.000, 48.125, 90.000]
    look_at:  [0.000, 9.069, 0.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "aerial"
    position: [0.000, 88.594, 90.000]
    look_at:  [0.000, 0.000, 0.000]
    fov:      55.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "ground"
    position: [-30.000, 13.069, 30.000]
    look_at:  [30.000, 9.069, -30.000]
    fov:      50.000
    aperture: 0.000
    focal_dist: 1.000

  - name: "sunrise"
    position: [-60.000, 15.069, -10.000]
    look_at:  [40.000, 9.069, 10.000]
    fov:      55.000
    aperture: 0.050
    focal_dist: 80.000

  - name: "topdown"
    position: [0.000, 143.750, 0.001]
    look_at:  [0.000, 0.000, 0.000]
    fov:      70.000
    aperture: 0.000
    focal_dist: 1.000

entities:
  - name: "terrain"
    type: "instance"
    template: "minecraft_test"
    translate: [0.000, 0.000, 0.000]
