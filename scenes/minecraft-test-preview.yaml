# 3D-Ray terrain preview scene — generated by TerrainGen --with-cameras
#
# Render with:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/minecraft-test-preview.yaml -o renders/preview-minecraft-test.png \
#     -w 1280 -H 720 -s 256 -d 6 -S 2 -c wide
#
# Cameras: wide | aerial | ground | sunrise | topdown
# List them with --list-cameras.

imports:
  - path: "libraries/terrain/minecraft-test.yaml"

world:
  sky:
    type: "gradient"
    zenith_color:  [0.15, 0.25, 0.55]  # Blu profondo in alto
    horizon_color: [0.85, 0.55, 0.25]  # Arancio caldo all'orizzonte
    ground_color:  [0.20, 0.15, 0.10]  # Marrone scuro sotto l'orizzonte
    sun:
      direction: [-0.8, -0.25, -0.5]   # Sole basso a sinistra
      color: [1.0, 0.85, 0.5]
      intensity: 2.0
      size: 3.0                         # Disco solare leggermente grande
      falloff: 32.0                     # Glow ampio e caldo
#  ground:
#    type: "infinite_plane"
#    material: "terreno"
#    y: 0

#world:
