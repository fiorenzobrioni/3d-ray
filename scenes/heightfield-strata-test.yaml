# HeightField with altitude/slope-driven strata + a sea-level water plane.
# Exercises the full v1 surface dispatch: per-band material selection on top
# of the procedural height, plus the clipped-plane water inside the bounds.

world:
  sky:
    type: "gradient"
    zenith_color:  [0.22, 0.38, 0.62]
    horizon_color: [0.82, 0.88, 0.94]
    ground_color:  [0.15, 0.20, 0.18]
    sun:
      direction: [-0.40, -0.78, -0.35]
      color: [1.00, 0.97, 0.92]
      intensity: 14.0
      size: 2.0
      falloff: 32.0

lights:
  - type: "directional"
    direction: [0.55, -0.60, 0.50]
    color: [0.95, 0.94, 0.93]
    intensity: 1.10

cameras:
  - name: "wide"
    position: [70.0, 38.0, 75.0]
    look_at:  [0.0, 8.0, 0.0]
    fov: 50.0
  - name: "low"
    position: [-25.0, 7.0, 38.0]
    look_at:  [10.0, 8.0, -20.0]
    fov: 55.0

materials:
  - id: "sand"
    type: "disney"
    base_color: [0.78, 0.70, 0.50]
    roughness: 0.88
  - id: "grass"
    type: "disney"
    base_color: [0.30, 0.45, 0.20]
    roughness: 0.90
  - id: "rock"
    type: "disney"
    base_color: [0.45, 0.38, 0.32]
    roughness: 0.95
  - id: "snow"
    type: "disney"
    base_color: [0.93, 0.95, 0.97]
    roughness: 0.65
  - id: "water"
    type: "disney"
    base_color: [0.05, 0.10, 0.18]
    roughness: 0.04
    specular_transmission: 0.65
    ior: 1.33

entities:
  - name: "terrain"
    type: "heightfield"
    bounds: [-50, -50, 50, 50]
    max_height: 25
    height_scale: 25
    resolution: 512
    sea_level: 4.5
    sea_material: "water"
    height_texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 0.028
      octaves: 8
      lacunarity: 2.3
      gain: 0.5
      fractal_increment: 0.25
      fractal_offset: 0.65
      distortion: 0.25
      colors: [[0, 0, 0], [1, 1, 1]]
    material: "grass"
    strata:
      - { min_altitude: 0.00, max_altitude: 0.18, material: "sand",  blend_width: 0.04 }
      - { min_altitude: 0.14, max_altitude: 0.55, material: "grass", blend_width: 0.08 }
      - { min_altitude: 0.50, max_altitude: 0.85, min_slope_deg: 25, material: "rock", blend_width: 0.08 }
      - { min_altitude: 0.80, max_altitude: 1.00, material: "snow",  blend_width: 0.04 }
