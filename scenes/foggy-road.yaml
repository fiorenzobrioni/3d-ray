# ==============================================================================
# SCENE: Nebbia Serale Londinese
# ARCHITETTO: 3D-Ray YAML Expert
# ==============================================================================

world:
  # Un cielo serale profondo, essenziale per far risaltare il bagliore dei lampioni
  sky:
    type: "flat"
    color: [0.02, 0.03, 0.06]
  medium:
    type: height_fog
    sigma_a: [0.012, 0.014, 0.018]
    sigma_s: [0.040, 0.045, 0.050]
    y0: 0
    scale_height: 12
    phase: "hg"
    g: 0.50

cameras:
  - name: "main"
    position: [0, 1.7, 8]      # Altezza occhi umani
    look_at: [0, 2.5, -50]     # Sguardo perso verso il fondo della strada
    fov: 38                    # FOV leggermente stretto per comprimere la prospettiva

lights:
  # ============================================================================
  # LUCI (Una per ogni istanza del lampione)
  # Utilizzo di Point Light per simulare le vecchie lampadine a incandescenza
  # Colore caldo tendente all'arancione per richiamare le vecchie lampadine
  # Lascio radius: 0.15 nel caso si voglia cambiare tipo di luce "sphere" al posto di "point"
  # ============================================================================
  # Lato Destro
  - type: "point"
    position: [-3.5, 3.75, 0]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -10]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -20]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -30]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -40]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -50]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0

  # Lato Sinistro
  - type: "point"
    position: [3.5, 3.75, 0]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -10]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -20]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -30]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -40]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -50]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0

materials:
  - id: "mat_asphalt"
    type: "disney"
    color: [0.15, 0.15, 0.16]
    roughness: 0.35            # Abbastanza liscio da simulare umidità
    specular: 0.2              # Rifletterà splendidamente i lampioni

  - id: "mat_wet_grass"
    type: "disney"
    color: [0.05, 0.15, 0.04]  # Verde scuro, desaturato dalla sera
    roughness: 0.8
    specular: 0.1

  - id: "mat_cast_iron"
    type: "disney"
    color: [0.30, 0.28, 0.26]
    metallic: 0.85
    roughness: 0.62
    specular: 0.35

  - id: "mat_sidewalk"
    type: "disney"
    color: [0.25, 0.25, 0.25]  # Grigio cemento opaco
    roughness: 0.85            # Più ruvido e meno riflettente dell'asfalto
    specular: 0.15

  - id: "mat_dark_cloth"
    type: "disney"
    color: [0.04, 0.04, 0.04]  # Stoffa nera/grigio molto scura
    roughness: 0.9             # Molto opaco per non riflettere luce diretta
    sheen: 0.85
    sheen_tint: 0.3
    sheen_roughness: 0.40
    specular: 0.10


templates:
  # ============================================================================
  # Lampione per sphere light
  # Paralume in ghisa direzionale verso il basso senza sfere che blocchino la luce
  # ============================================================================
  - name: "london_lamp_spot"
    material: "mat_cast_iron"
    type: "group"
    children:
      # BASE, PALO E BARRA TRASVERSALE
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.22
        height: 0.5
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.06
        height: 3.5

      # CAPPELLO / PARALUME (Scavato con CSG per non bloccare la luce)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 3.8, 0]       
          radius: 0.35              
          top_radius: 0.05          
          height: 0.3
        right:
          type: "cone"
          center: [0, 3.79, 0]      # Leggermente più in basso per scavare
          radius: 0.33              # Leggermente più stretto per creare il bordo
          top_radius: 0.04
          height: 0.32              # Più alto per bucare fino in fondo

      # AGGANCI SUPERIORI PARALUME
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 45, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 135, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 225, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 315, 0]
        translate: [0.0, 3.42, 0.0]

      # PUNTA DECORATIVA SUPERIORE
      - type: "sphere"
        center: [0, 4.14, 0]
        radius: 0.05

entities:

  # 1. IL SUOLO (Prato)
  - name: "grass_plane"
    type: "box"
    scale: [200, 1, 200]
    translate: [0, -0.5, 0]
    material: "mat_wet_grass"

  # 2. LA STRADA
  - name: "road"
    type: "box"
    scale: [6, 1, 200]
    translate: [0, -0.48, 0]
    material: "mat_asphalt"

  # 3. MARCIAPIEDE SINISTRO
  - name: "sidewalk_left"
    type: "box"
    translate: [-3.75, -0.4, 0] # Altezza Y=+0.05: crea un piccolo gradino sopra l'asfalto (Y=+0.01)
    scale: [1.5, 1, 200]
    material: "mat_sidewalk"

  # 4. MARCIAPIEDE DESTRO
  - name: "sidewalk_right"
    type: "box"
    translate: [3.75, -0.4, 0]  # Centrato esattamente a filo con la strada, copre la base dei lampioni
    scale: [1.5, 1, 200]
    material: "mat_sidewalk"

  # 5. I LAMPIONI (Lato Sinistro, X = -3.5)
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, 0]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -10]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -20]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -30]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -40]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -50]

  # 6. I LAMPIONI (Lato Destro, X = 3.5)
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, 0]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -10]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -20]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -30]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -40]
  - type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -50]

  # 7. UOMO NELLA NEBBIA (Silhouette Dettagliata e Corretta)
  - name: "mysterious_man"
    type: "group"
    translate: [-1.1, 0.01, -10] # Appoggiato sull'asfalto, lontano nella nebbia
    rotate: [0,15,0]
    children:
      # --- Scarpe (h=0.1, base=0.0) ---
      - type: "box"
        translate: [-0.15, 0.05, 0]
        scale: [0.12, 0.1, 0.25]
        material: "mat_dark_cloth"
      - type: "box"
        translate: [0.15, 0.05, 0]
        scale: [0.12, 0.1, 0.25]
        material: "mat_dark_cloth"

      # --- Gambe (h=0.9, base=0.1) ---
      - type: "cylinder"
        center: [-0.15, 0.1, -0.05]
        radius: 0.08
        height: 0.9
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0.15, 0.1, -0.05]
        radius: 0.08
        height: 0.9
        material: "mat_dark_cloth"

      # --- Busto / Cappotto (h=0.7, base=1.0) ---
      - type: "cone"
        center: [0, 0.9, 0]
        radius: 0.35 
        top_radius: 0.22 
        height: 0.8
        scale: [1, 1, 0.5]
        material: "mat_dark_cloth"

      # --- Bavero alzato (h=0.15, base=1.7) ---
      - type: "cone"
        center: [0, 1.7, 0]
        radius: 0.22 
        top_radius: 0.26 
        height: 0.15
        scale: [1, 1, 0.5]
        material: "mat_dark_cloth"

      # --- Braccia (h=0.6, aggancio=1.7, scendono fino a 1.1) ---
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.07
        height: 0.6
        rotate: [0, 0, -5]
        translate: [-0.34, 1.1, 0]
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.07
        height: 0.6
        rotate: [0, 0, 5]
        translate: [0.34, 1.1, 0]
        material: "mat_dark_cloth"

      # --- Mani (Raggio=0.06, centro=1.1) ---
      - type: "sphere"
        center: [-0.34, 1.1, 0]
        radius: 0.08
        material: "mat_dark_cloth"
      - type: "sphere"
        center: [0.34, 1.1, 0]
        radius: 0.08
        material: "mat_dark_cloth"

      # --- Bastone (h=0.95, base=0.01) ---
      - type: "cylinder"
        center: [0.34, 0.0, 0]
        radius: 0.015
        height: 1.1
        material: "mat_cast_iron"

      # --- Testa ---
      - type: "sphere"
        center: [0, 1.95, 0]
        radius: 0.14
        material: "mat_dark_cloth"

      # --- Cappello ---
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.22
        height: 0.02
        rotate: [12, 0, -5] 
        translate: [0, 1.99, 0]
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0, 0, 0] 
        radius: 0.12
        height: 0.18
        rotate: [12, 0, -5]
        translate: [0, 1.990, 0]
        material: "mat_dark_cloth"