# ═══════════════════════════════════════════════════════════════════════════
#  Foggy Road — Nebbia Serale Londinese
#
#  Strada urbana inglese di notte avvolta da una nebbia procedurale a banchi.
#  Doppia fila di lampioni vittoriani in ghisa (CSG cono cavo) con luce
#  point calda arancio (incandescenza) che crea god-rays nella nebbia.
#  Un misterioso passante in silhouette si staglia nella via.
#
#  Suggerimenti di rendering:
#    Preview:  -w 640  -H 360  -s 128  -d 6  -S 2
#    Standard: -w 1280 -H 720  -s 512  -d 8  -S 4
#    Finale:   -w 1920 -H 1080 -s 1024 -d 10 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  # Un cielo serale profondo, essenziale per far risaltare il bagliore dei lampioni
  sky:
    type: "flat"
    color: [0.02, 0.03, 0.06]
  # Nebbia procedurale (fBm + delta tracking): densità disomogenea, a chiazze
  # e con sfilacciature, invece dell'esponenziale "perfetto" dell'height_fog.
  # I banchi più densi creano god-rays irregolari attorno ai lampioni.
  # medium:
  #   type: procedural
  #   sigma_a: [0.012, 0.014, 0.018]
  #   sigma_s: [0.050, 0.056, 0.062]
  #   frequency: 0.10        # bassa = banchi grandi, a scala della strada
  #   octaves: 5             # dettaglio fine sui bordi dei banchi
  #   lacunarity: 2.0
  #   gain: 0.55
  #   seed: 1977
  #   phase: "hg"
  #   g: 0.55

cameras:
  - name: "main"
    position: [0, 1.7, 8]      # Altezza occhi umani
    look_at: [0, 2.5, -50]     # Sguardo perso verso il fondo della strada
    fov: 38                    # FOV leggermente stretto per comprimere la prospettiva

  # Vista da sotto il lampione: bagliore arancio in primo piano
  - name: "sotto_lampione"
    position: [-3.5, 2.2, -1.0]
    look_at:  [-1.1, 1.5, -10]
    fov: 50

lights:
  # ============================================================================
  # LUCI (Una per ogni istanza del lampione)
  # Utilizzo di Point Light per simulare le vecchie lampadine a incandescenza
  # Colore caldo tendente all'arancione per richiamare le vecchie lampadine
  # Lascio radius: 0.15 nel caso si voglia cambiare tipo di luce "sphere" al posto di "point"
  # ============================================================================
  # Lato Destro
  - type: "point"
    position: [-3.5, 3.75, 0]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -10]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -20]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -30]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -40]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [-3.5, 3.75, -50]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0

  # Lato Sinistro
  - type: "point"
    position: [3.5, 3.75, 0]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -10]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -20]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -30]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -40]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0
  - type: "point"
    position: [3.5, 3.75, -50]
    radius: 0.15
    color: [1.0, 0.6, 0.2]
    intensity: 20.0

materials:
  - id: "mat_asphalt"
    type: "disney"
    # Asfalto scuro e realistico: l'asfalto è la superficie PIÙ scura della
    # scena (più scura del cemento dei marciapiedi). Grana fine dell'inerte,
    # variazione di tono contenuta (niente chiazzoni da "strada sterrata").
    color: [0.045, 0.045, 0.050]
    texture:
      type: "noise"
      noise_type: "fbm"
      scale: 4.5              # grana dell'aggregato + qualche chiazza media
      octaves: 4
      distortion: 0.30        # warp leggero: rompe la regolarità senza esagerare
      colors: [[0.026, 0.026, 0.030], [0.078, 0.078, 0.083]]
    roughness: 0.80           # asfalto asciutto: prevalentemente matte/diffuso
    # Bagnato a chiazze LOCALIZZATE e CONTENUTE: lieve variazione di lucentezza,
    # mai veri specchi, così la strada non riflette i lampioni su tutta la
    # larghezza (era quello a darle l'aspetto chiaro/sterrato).
    roughness_texture:
      type: "noise"
      noise_type: "fbm"
      scale: 0.9              # banchi a scala reale
      octaves: 3
      distortion: 0.4
      colors: [[0.58, 0.58, 0.58], [0.85, 0.85, 0.85]]
    specular: 0.09            # velo riflesso appena accennato verso i lampioni
    # NB: niente bump_map sull'asfalto. La camera guarda quasi radente lungo la
    # strada e qualsiasi rilievo (anche fbm debole) perturba le normali verso i
    # lampioni "sbiancando" il fondo stradale (bump aliasing a incidenza
    # radente). La disomogeneità viene dalla texture di colore e di roughness.

  - id: "mat_wet_grass"
    type: "disney"
    # Prato notturno. NB: i lampioni sono caldi/arancio ([1,0.6,0.2]); con un
    # verde scuro l'illuminazione arancio lo desatura a marrone/oliva e "non
    # sembra più verde". Per farlo restare verde sotto la luce calda alzo molto
    # il canale verde e tengo basso rosso/blu dell'albedo.
    # Verde scuro desaturato con chiazze di terra più scure.
    color: [0.05, 0.15, 0.04]
    texture:
      type: "noise"
      noise_type: "fbm"
      scale: 3.0
      octaves: 4
      distortion: 0.6
      colors: [[0.02, 0.07, 0.02], [0.07, 0.17, 0.05]]
    roughness: 0.85
    specular: 0.08
    # NB: niente bump_map sul prato. Le sponde lontane si vedono di taglio
    # (incidenza radente) e qualunque rilievo perturba le normali schiarendo
    # l'erba: l'ACES tone map la desatura verso il bianco ("prato bianco").
    # Senza bump il verde resta brillante e saturo come nella versione iniziale.

  - id: "mat_cast_iron"
    type: "disney"
    # Ghisa verniciata invecchiata (lampioni vittoriani): nero/antracite molto
    # scuro, semi-satinato. Variazione leggera di usura, niente effetto "metallo
    # grezzo arrugginito". È metallo, quindi metallic alto ma colore scurissimo.
    color: [0.050, 0.052, 0.050]
    texture:
      type: "noise"
      noise_type: "fbm"
      scale: 3.5
      octaves: 4
      distortion: 0.3
      colors: [[0.035, 0.036, 0.035], [0.065, 0.067, 0.065]]
    metallic: 0.80
    roughness: 0.42           # vernice semi-satinata, superficie liscia
    # Usura molto leggera: minima variazione di lucentezza, niente "ruggine"
    roughness_texture:
      type: "noise"
      noise_type: "fbm"
      scale: 3.0
      octaves: 3
      colors: [[0.46, 0.46, 0.46], [0.56, 0.56, 0.56]]
    specular: 0.5
    # Micro-rilievo della ghisa: fbm dolce e molto leggero (niente turbulence
    # ad alta frequenza che rendeva i pali granulosi/aggressivi)
    bump_map:
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 5
        octaves: 3
        colors: [[0, 0, 0], [1, 1, 1]]
      strength: 0.10

  - id: "mat_sidewalk"
    type: "disney"
    # Cemento dei marciapiedi: grigio chiaro (PIÙ chiaro dell'asfalto), opaco e
    # ruvido. Sporcizia/scolorimento leggeri, senza chiazze esagerate.
    color: [0.32, 0.32, 0.315]
    texture:
      type: "noise"
      noise_type: "fbm"
      scale: 2.2
      octaves: 3
      distortion: 0.2          # variazione di tono lieve e morbida
      colors: [[0.285, 0.285, 0.280], [0.345, 0.345, 0.340]]
    roughness: 0.90            # cemento matte: più ruvido e opaco dell'asfalto
    specular: 0.5
    # Rilievo del cemento: appena accennato (disomogeneità leggera, non
    # ciottolato aggressivo). Strength bassa anche per evitare il bump
    # aliasing a incidenza radente verso il fondo della via.
    bump_map:
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 4
        octaves: 4
        colors: [[0, 0, 0], [1, 1, 1]]
      strength: 0.15

  - id: "mat_dark_cloth"
    type: "disney"
    color: [0.04, 0.04, 0.04]  # Stoffa nera/grigio molto scura
    roughness: 0.9             # Molto opaco per non riflettere luce diretta
    sheen: 0.85
    sheen_tint: 0.3
    sheen_roughness: 0.40
    specular: 0.10


templates:
  # ============================================================================
  # Lampione per sphere light
  # Paralume in ghisa direzionale verso il basso senza sfere che blocchino la luce
  # ============================================================================
  - name: "london_lamp_spot"
    material: "mat_cast_iron"
    type: "group"
    children:
      # BASE, PALO E BARRA TRASVERSALE
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.22
        height: 0.5
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.06
        height: 3.5

      # CAPPELLO / PARALUME (Scavato con CSG per non bloccare la luce)
      - type: "csg"
        operation: "subtraction"
        left:
          type: "cone"
          center: [0, 3.8, 0]       
          radius: 0.35              
          top_radius: 0.05          
          height: 0.3
        right:
          type: "cone"
          center: [0, 3.79, 0]      # Leggermente più in basso per scavare
          radius: 0.33              # Leggermente più stretto per creare il bordo
          top_radius: 0.04
          height: 0.32              # Più alto per bucare fino in fondo

      # AGGANCI SUPERIORI PARALUME
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 45, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 135, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 225, 0]
        translate: [0.0, 3.42, 0.0]

      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.01
        height: 0.52
        rotate: [43, 315, 0]
        translate: [0.0, 3.42, 0.0]

      # PUNTA DECORATIVA SUPERIORE
      - type: "sphere"
        center: [0, 4.14, 0]
        radius: 0.05

entities:

  # 1. IL SUOLO (Prato)
  - name: "grass_plane"
    type: "box"
    scale: [200, 1, 200]
    translate: [0, -0.5, 0]
    material: "mat_wet_grass"

  # 2. LA STRADA
  - name: "road"
    type: "box"
    scale: [6, 1, 200]
    translate: [0, -0.48, 0]
    material: "mat_asphalt"

  # 3. MARCIAPIEDE SINISTRO
  - name: "sidewalk_left"
    type: "box"
    translate: [-3.75, -0.4, 0] # Altezza Y=+0.05: crea un piccolo gradino sopra l'asfalto (Y=+0.01)
    scale: [1.5, 1, 200]
    material: "mat_sidewalk"

  # 4. MARCIAPIEDE DESTRO
  - name: "sidewalk_right"
    type: "box"
    translate: [3.75, -0.4, 0]  # Centrato esattamente a filo con la strada, copre la base dei lampioni
    scale: [1.5, 1, 200]
    material: "mat_sidewalk"

  # 5. I LAMPIONI (Lato Sinistro, X = -3.5)
  - name: "lamp_sx_0"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, 0]
  - name: "lamp_sx_1"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -10]
  - name: "lamp_sx_2"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -20]
  - name: "lamp_sx_3"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -30]
  - name: "lamp_sx_4"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -40]
  - name: "lamp_sx_5"
    type: "instance"
    template: "london_lamp_spot"
    translate: [-3.5, 0, -50]

  # 6. I LAMPIONI (Lato Destro, X = 3.5)
  - name: "lamp_dx_0"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, 0]
  - name: "lamp_dx_1"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -10]
  - name: "lamp_dx_2"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -20]
  - name: "lamp_dx_3"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -30]
  - name: "lamp_dx_4"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -40]
  - name: "lamp_dx_5"
    type: "instance"
    template: "london_lamp_spot"
    translate: [3.5, 0, -50]

  # 7. UOMO NELLA NEBBIA (Silhouette Dettagliata e Corretta)
  - name: "mysterious_man"
    type: "group"
    translate: [-1.1, 0.01, -10] # Appoggiato sull'asfalto, lontano nella nebbia
    rotate: [0,15,0]
    children:
      # --- Scarpe (h=0.1, base=0.0) ---
      - type: "box"
        translate: [-0.15, 0.05, 0]
        scale: [0.12, 0.1, 0.25]
        material: "mat_dark_cloth"
      - type: "box"
        translate: [0.15, 0.05, 0]
        scale: [0.12, 0.1, 0.25]
        material: "mat_dark_cloth"

      # --- Gambe (h=0.9, base=0.1) ---
      - type: "cylinder"
        center: [-0.15, 0.1, -0.05]
        radius: 0.08
        height: 0.9
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0.15, 0.1, -0.05]
        radius: 0.08
        height: 0.9
        material: "mat_dark_cloth"

      # --- Busto / Cappotto (h=0.7, base=1.0) ---
      - type: "cone"
        center: [0, 0.9, 0]
        radius: 0.35 
        top_radius: 0.22 
        height: 0.8
        scale: [1, 1, 0.5]
        material: "mat_dark_cloth"

      # --- Bavero alzato (h=0.15, base=1.7) ---
      - type: "cone"
        center: [0, 1.7, 0]
        radius: 0.22 
        top_radius: 0.26 
        height: 0.15
        scale: [1, 1, 0.5]
        material: "mat_dark_cloth"

      # --- Braccia (h=0.6, aggancio=1.7, scendono fino a 1.1) ---
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.07
        height: 0.6
        rotate: [0, 0, -5]
        translate: [-0.34, 1.1, 0]
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.07
        height: 0.6
        rotate: [0, 0, 5]
        translate: [0.34, 1.1, 0]
        material: "mat_dark_cloth"

      # --- Mani (Raggio=0.06, centro=1.1) ---
      - type: "sphere"
        center: [-0.34, 1.1, 0]
        radius: 0.08
        material: "mat_dark_cloth"
      - type: "sphere"
        center: [0.34, 1.1, 0]
        radius: 0.08
        material: "mat_dark_cloth"

      # --- Bastone (h=0.95, base=0.01) ---
      - type: "cylinder"
        center: [0.34, 0.0, 0]
        radius: 0.015
        height: 1.1
        material: "mat_cast_iron"

      # --- Testa ---
      - type: "sphere"
        center: [0, 1.95, 0]
        radius: 0.14
        material: "mat_dark_cloth"

      # --- Cappello ---
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.22
        height: 0.02
        rotate: [12, 0, -5] 
        translate: [0, 1.99, 0]
        material: "mat_dark_cloth"
      - type: "cylinder"
        center: [0, 0, 0] 
        radius: 0.12
        height: 0.18
        rotate: [12, 0, -5]
        translate: [0, 1.990, 0]
        material: "mat_dark_cloth"