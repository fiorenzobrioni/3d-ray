# ═══════════════════════════════════════════════════════════════════════════
#  Environment Fog — Nebbia esponenziale con MIS volumetrico
#
#  Verifica che le shadow ray verso l'EnvironmentLight ricevano correttamente
#  l'attenuazione Beer-Lambert del global_medium. Sfere diffuse colorate
#  disposte a profondità crescenti: le più lontane appaiono progressivamente
#  desaturate dalla dominanza atmosferica.
#
#  Criterio visivo: le sfere lontane si "sbiadiscono" nella nebbia mentre
#  il sole illumina in modo morbido attraverso lo strato di height_fog.
#
#  Suggerimenti di rendering:
#    Preview:  -w 800  -H 450  -s 64   -d 4  -S 2
#    Standard: -w 1280 -H 720  -s 256  -d 6  -S 4
#    Finale:   -w 1920 -H 1080 -s 512  -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "gradient"
    zenith_color:  [0.20, 0.32, 0.55]
    horizon_color: [0.85, 0.88, 0.92]
    ground_color:  [0.30, 0.27, 0.24]
    sun:
      direction: [-0.3, -0.55, -0.6]
      color:     [1.0, 0.95, 0.85]
      intensity: 6.0
      size:      2.0
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0
  medium:
    type: height_fog
    sigma_a: [0.012, 0.014, 0.018]
    sigma_s: [0.040, 0.045, 0.050]
    y0: 0
    scale_height: 8
    phase: "hg"
    g: 0.50

cameras:
  - name: "wide"
    position: [0, 1.6, -8]
    look_at:  [-0.5, 1.0, 6]
    fov: 50

  # Vista laterale per osservare la gradazione della nebbia in profondità
  - name: "lateral"
    position: [-8, 2.0, 4]
    look_at:  [4, 1.0, 4]
    fov: 50

materials:
  - id: "pavimento"
    type: "lambertian"
    color: [0.55, 0.50, 0.45]
  - id: "rosso"
    type: "lambertian"
    color: [0.85, 0.20, 0.18]
  - id: "verde"
    type: "lambertian"
    color: [0.20, 0.65, 0.30]
  - id: "azzurro"
    type: "lambertian"
    color: [0.25, 0.55, 0.85]
  - id: "ambra"
    type: "lambertian"
    color: [0.85, 0.62, 0.20]

entities:
  # Sfere disposte in profondità — ognuna attraversa più nebbia della precedente
  - { name: "near",  type: "sphere", center: [-2.0, 0.9, -2], radius: 0.9, material: "rosso"   }
  - { name: "mid1",  type: "sphere", center: [ 0.0, 0.9,  2], radius: 0.9, material: "verde"   }
  - { name: "mid2",  type: "sphere", center: [ 2.5, 0.9,  6], radius: 0.9, material: "azzurro" }
  - { name: "far",   type: "sphere", center: [-2.5, 0.9, 14], radius: 0.9, material: "ambra"   }
