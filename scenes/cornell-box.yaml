# =============================================================================
#  CORNELL BOX — Riproduzione Classica Fedele
#  Benchmark universale per la validazione dei motori di Global Illumination
# =============================================================================
#
#  La Cornell Box fu sviluppata nel 1984 da Cindy Goral, Kenneth Torrance,
#  Donald Greenberg e Bennett Battaile all'Università Cornell come scena
#  di riferimento per misurare e confrontare algoritmi di radiosity e
#  global illumination. È il benchmark più riconosciuto nella storia della
#  computer grafica.
#
#  Caratteristiche distintive della scena:
#    ● Parete SINISTRA rossa  → color bleeding rosso sul pavimento e blocco sx
#    ● Parete DESTRA verde    → color bleeding verde sul pavimento e blocco dx
#    ● Soffitto BIANCO con pannello luminoso centrale
#    ● Due blocchi bianchi con rotazioni canoniche (17° e -15°)
#    ● Luce indiretta: la firma visiva è la luce rimbalzata colorata
#
#  DIMENSIONI SCENA (fedeli all'originale scalato a unità metriche):
#    Scatola: 2.00 × 2.00 × 2.00 unità
#    X : [-1.00 → +1.00]   ←  parete rossa  |  parete verde  →
#    Y : [ 0.00 → +2.00]   ↑  pavimento     |  soffitto      ↑
#    Z : [ 0.00 → +2.00]      apertura       |  parete fondo
#    Camera: Z negativo (davanti all'apertura), guarda verso +Z
#
#  ┌──────────────────────────────────────────────────────────────────────┐
#  │  COMANDI DI RENDER CONSIGLIATI                                       │
#  │                                                                      │
#  │  ⚠ IMPORTANTE: usa sempre -d ≥ 20 per la corretta GI a rimbalzi    │
#  │    multipli. Con -d basso le zone in ombra risultano nere artificiali│
#  │                                                                      │
#  │  PREVIEW  (< 5 s):                                                   │
#  │    dotnet run ... -- -i cornell_box.yaml -s 4 -d 12                  │
#  │                       --width 512 --height 512                       │
#  │                                                                      │
#  │  DRAFT  (30–90 s):                                                   │
#  │    dotnet run ... -- -i cornell_box.yaml -s 64 -d 30                 │
#  │                       --width 512 --height 512                       │
#  │                                                                      │
#  │  PRODUCTION  (qualità finale):                                       │
#  │    dotnet run ... -- -i cornell_box.yaml -s 256 -d 50                │
#  │                       --width 1024 --height 1024                     │
#  │                                                                      │
#  │  ULTRA  (stampa/portfolio):                                          │
#  │    dotnet run ... -- -i cornell_box.yaml -s 512 -d 50                │
#  │                       --width 2048 --height 2048                     │
#  └──────────────────────────────────────────────────────────────────────┘
#
#  VARIANTI DISPONIBILI (decommentare nelle sezioni entities/lights/world):
#    VARIANTE A : sfera di vetro al posto del blocco corto  (caustics)
#    VARIANTE B : sfera cromata specchio                    (riflessioni globali)
#    VARIANTE C : blocco corto in oro satinato              (metallo caldo)
#    VARIANTE D : parete di fondo in marmo bianco           (texture procedurale)
#    ALT-LIGHTS 1 : luce laterale da finestra sinistra      (ombre direzionali)
#    ALT-LIGHTS 2 : neon bicolore blu/rosso                 (drama/fashion)
#    ALT-LIGHTS 3 : spotlight museale per ogni oggetto      (galleria teatrale)
# =============================================================================


# =============================================================================
#  WORLD — Studio completamente chiuso
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ATTIVO ★  Studio buio con solo luce artificiale interna
#  Nessuna luce esterna: tutta la GI dipende dai rimbalzi interni.
#  È la configurazione che esalta il color bleeding rosso/verde.
# ─────────────────────────────────────────────────────────────────────────────
world:
  ambient_light: [0.0, 0.0, 0.0]   # nessuna luce piatta: solo rimbalzi reali
  background:    [0.0, 0.0, 0.0]   # studio chiuso: i raggi fuggiti non raccolgono nulla
  # Nessun ground globale: il pavimento è definito come quad nelle entities.


# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ALT-1  Luce ambiente minima (draft-friendly)
#  Aggiunge una luce di riempimento piattissima per recuperare i dettagli
#  nelle ombre profonde con basso sample count (preview e draft veloci).
#  Il color bleeding risulta leggermente meno puro, ma la scena è più leggibile
#  anche a -s 4 o -s 16.
# ─────────────────────────────────────────────────────────────────────────────
# world:
#   ambient_light: [0.018, 0.018, 0.022]
#   background:    [0.0, 0.0, 0.0]


# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ALT-2  Vetrata immaginaria (luce diurna)
#  Il background azzurro simula luce naturale che entra dall'apertura frontale.
#  Per una versione fotorealistica in stile "interno di giorno".
#  Ridurre l'intensità delle luci esplicite del 30–40% per compensare.
# ─────────────────────────────────────────────────────────────────────────────
# world:
#   ambient_light: [0.03, 0.04, 0.06]
#   background:    [0.22, 0.32, 0.55]   # cielo diurno freddo → GI azzurrina


# =============================================================================
#  CAMERA
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ATTIVA ★  Vista Canonica Cornell Box
#
#  Replica la fotocamera dell'esperimento originale (1984):
#    - Asse di simmetria perfettamente centrato (X=0)
#    - Altezza occhio a Y=1.0 (metà esatta della scatola)
#    - FOV 39° in verticale (standard del paper originale)
#    - Apertura zero: tutto a fuoco, nessun DOF
#    - Inquadra l'intera scatola con un margine minimo
#
#  Questa vista enfatizza la simmetria della scena e il color bleeding
#  simmetrico rosso/verde sui fianchi dei blocchi bianchi.
# ─────────────────────────────────────────────────────────────────────────────
camera:
  position:   [ 0.00,  1.00, -4.00]
  look_at:    [ 0.00,  1.00,  1.00]   # punta al centro della scatola (Z=1 = metà profondità)
  vup:        [ 0, 1, 0]
  fov:        39                       # FOV canonico Cornell Box
  aperture:   0.0                      # tutto a fuoco: fedele all'originale
  focal_dist: 5.00                     # distanza camera → centro scatola


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-1  Vista Angolata 3/4 dall'alto-destra
#  Più cinematografica: mostra contemporaneamente il soffitto con il pannello
#  luce, la parete verde a destra e il pavimento con le ombre dei blocchi.
#  Ideale per valorizzare la differenza di altezza tra i due blocchi.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 1.80,  2.60, -3.80]
#   look_at:    [-0.05,  0.75,  1.00]
#   vup:        [ 0, 1, 0]
#   fov:        46
#   aperture:   0.0
#   focal_dist: 5.30


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-2  Macro con DOF pronunciato — focus sul blocco corto
#  Simula un obiettivo 85mm f/1.8 da studio: il blocco corto è perfettamente
#  nitido, il blocco alto e la parete di fondo sfumano in bokeh.
#  Esalta la texture della superficie bianca lambertian con il color bleeding.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.10,  1.10, -2.60]
#   look_at:    [-0.30,  0.55,  0.72]   # punta esattamente sul centro del blocco corto
#   vup:        [ 0, 1, 0]
#   fov:        34
#   aperture:   0.14                     # apertura ampia: bokeh molto pronunciato
#   focal_dist: 3.40                     # distanza esatta camera → blocco corto


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-3  Vista Zenitale (Top-Down)
#  Mostra la pianta della scatola con le due impronte dei blocchi e
#  il pattern di ombre proiettate sul pavimento.
#  vup: [0, 0, 1] orienta il "nord" della pianta verso la parete di fondo.
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  5.80,  1.00]
#   look_at:    [ 0.00,  0.00,  1.00]
#   vup:        [ 0, 0, 1]             # "su" della pianta = verso la parete di fondo
#   fov:        36
#   aperture:   0.0
#   focal_dist: 5.80


# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-4  Dutch Angle cinematografico (~13° di inclinazione)
#  Orizzonte inclinato: atmosfera tesa e dinamica.
#  Ottima con lo schema luci "Neon Bicolore" (ALT-LIGHTS 2)
#  o con la Variante B (sfera cromata).
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.90,  1.40, -4.00]
#   look_at:    [-0.10,  0.90,  1.00]
#   vup:        [ 0.24, 1, 0]         # inclina l'orizzonte di ~13.5°
#   fov:        42
#   aperture:   0.0
#   focal_dist: 5.20


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  SUPERFICI CLASSICHE CORNELL (1984)
  #
  #  I valori RGB sono calibrati sulle misurazioni fotometriche del paper
  #  originale. Il bianco (0.73) non è puro per evitare energy gain
  #  nei rimbalzi multipli. Il rosso e il verde sono volutamente "sporchi"
  #  per risultare naturali nelle riflessioni indirette.
  # ─────────────────────────────────────────────────────────────────────────

  # Bianco opaco calibrato — pavimento, soffitto, parete di fondo, blocchi
  # Riflettività: 73% (non 100% per evitare rimbalzi infiniti ad alta energia)
  - id: "bianco_cornell"
    type: "lambertian"
    color: [0.73, 0.73, 0.73]

  # Rosso Cornell — parete sinistra
  # Misurato fotometricamente: rosso dominante, quasi nessun blue/green
  - id: "rosso_cornell"
    type: "lambertian"
    color: [0.65, 0.05, 0.05]

  # Verde Cornell — parete destra
  # Misurato fotometricamente: verde medio, leggerissima traccia di blue
  - id: "verde_cornell"
    type: "lambertian"
    color: [0.12, 0.45, 0.15]

  # ─────────────────────────────────────────────────────────────────────────
  #  VARIANTI MATERIALI PER I BLOCCHI
  #  (usare nelle entities, sezione "Varianti")
  # ─────────────────────────────────────────────────────────────────────────

  # Cromo specchio — per Variante B (sfera cromata)
  # La sfera riflette tutta la scena: parete rossa, verde e pannello luce
  # sono tutti visibili nella riflessione speculare.
  - id: "cromo_specchio"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.0                          # specchio perfetto: fuzz zero

  # Vetro crown ottico — per Variante A (sfera cristallo con caustics)
  # IOR 1.52 produce caustics eleganti sul pavimento bianco.
  - id: "vetro_crown"
    type: "dielectric"
    refraction_index: 1.52

  # Oro satinato — per Variante C (blocco corto dorato)
  # fuzz=0.05 → quasi speculare: le pareti rosse e verdi si riflettono
  # con una tinta aurea calda.
  - id: "oro_satinato"
    type: "metal"
    color: [0.94, 0.76, 0.12]
    fuzz: 0.05

  # Marmo Calacatta bianco — per Variante D (parete di fondo in marmo)
  # Venature viola/grigio su fondo bianco. randomize_offset: false
  # per un pattern fisso e simmetrico sulla parete piana.
  - id: "marmo_fondo"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 6.0
      noise_strength: 9.0
      colors: [[0.94, 0.93, 0.91], [0.16, 0.13, 0.24]]  # bianco / venature viola
      randomize_offset: false
      randomize_rotation: false


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ===========================================================================
  #  LE CINQUE PARETI DELLA SCATOLA
  #
  #  La Cornell Box è aperta sul lato frontale (Z=0 → apertura verso la camera).
  #  Le restanti 5 superfici (pavimento, soffitto, fondo, sx, dx) formano
  #  la scatola chiusa che intrappola la luce e la fa rimbalzare.
  #
  #  Ogni quad è definito con:
  #    q = angolo di origine (corner in basso-sinistra guardando la superficie)
  #    u = vettore del primo lato
  #    v = vettore del secondo lato
  # ===========================================================================

  # ─── PAVIMENTO (Y = 0.0)  ─────────────────────────────────────────────────
  #  Bianco. Il color bleeding rosso/verde si deposita qui in modo
  #  simmetrico: lato sx sfuma in rosso, lato dx sfuma in verde.
  - name: "pavimento"
    type: "quad"
    q: [-1.0, 0.0,  0.0]
    u: [ 2.0, 0.0,  0.0]              # larghezza: da X=-1 a X=+1
    v: [ 0.0, 0.0,  2.0]              # profondità: da Z=0 a Z=+2
    material: "bianco_cornell"

  # ─── SOFFITTO (Y = 2.0)  ──────────────────────────────────────────────────
  #  Bianco. Al centro c'è il pannello luce (gestito dalle lights, non come
  #  geometria emissiva). Il soffitto riflette la luce verso il basso
  #  contribuendo alla GI diffusa.
  - name: "soffitto"
    type: "quad"
    q: [-1.0, 2.0,  0.0]
    u: [ 2.0, 0.0,  0.0]
    v: [ 0.0, 0.0,  2.0]
    material: "bianco_cornell"

  # ─── PARETE DI FONDO (Z = +2.0)  ─────────────────────────────────────────
  #  Bianco. È la superficie più illuminata direttamente dalla key light.
  #  Il gradiente di colore rosso/verde sulle sue zone laterali è uno degli
  #  effetti più spettacolari della Cornell Box.
  - name: "parete_fondo"
    type: "quad"
    q: [-1.0, 0.0,  2.0]
    u: [ 2.0, 0.0,  0.0]
    v: [ 0.0, 2.0,  0.0]
    material: "bianco_cornell"

  # ─── PARETE SINISTRA — ROSSA (X = -1.0)  ─────────────────────────────────
  #  Il colore rosso si diffonde come GI su pavimento, blocco corto e
  #  zona sinistra della parete di fondo. Questo "color bleeding" laterale
  #  è la firma iconografica della Cornell Box.
  - name: "parete_sinistra_rossa"
    type: "quad"
    q: [-1.0, 0.0,  0.0]
    u: [ 0.0, 0.0,  2.0]              # profondità: da Z=0 a Z=+2
    v: [ 0.0, 2.0,  0.0]              # altezza: da Y=0 a Y=+2
    material: "rosso_cornell"

  # ─── PARETE DESTRA — VERDE (X = +1.0)  ───────────────────────────────────
  #  Speculare alla sinistra: il verde contamina il lato destro della scena.
  - name: "parete_destra_verde"
    type: "quad"
    q: [ 1.0, 0.0,  0.0]
    u: [ 0.0, 0.0,  2.0]
    v: [ 0.0, 2.0,  0.0]
    material: "verde_cornell"


  # ===========================================================================
  #  I DUE BLOCCHI BIANCHI — Canonici Cornell Box (1984)
  #
  #  Proporzioni fedeli al paper originale (normalizzate su box 2×2×2):
  #    Blocco corto: 0.60 × 0.60 × 0.60  (≈ 30% della larghezza per lato)
  #    Blocco alto : 0.60 × 1.20 × 0.60  (≈ 60% dell'altezza)
  #
  #  Rotazioni canoniche (vedere pianta dall'alto):
  #    Blocco corto: +17° attorno a Y (angolato verso destra = verso centro)
  #    Blocco alto : -15° attorno a Y (angolato verso sinistra = verso centro)
  #
  #  I due blocchi sono posizionati in modo asimmetrico:
  #    Corto: zona sinistra-frontale  (X≈-0.30, Z≈0.72)  → vicino alla parete rossa
  #    Alto : zona destra-posteriore  (X≈+0.33, Z≈1.30)  → vicino alla parete verde
  #
  #  Calcolo Y per la base a pavimento (Y=0):
  #    blocco corto: center_Y = scale_Y/2 = 0.60/2 = 0.30  → base a Y=0 ✓
  #    blocco alto:  center_Y = scale_Y/2 = 1.20/2 = 0.60  → base a Y=0 ✓
  # ===========================================================================

  # ─── BLOCCO CORTO (sx, frontale) ──────────────────────────────────────────
  #  Il color bleeding rosso dalla parete sinistra si deposita sulla faccia
  #  sinistra di questo blocco. La faccia superiore è quasi bianca pura
  #  perché riceve luce diretta dal pannello in soffitto.
  - name: "blocco_corto"
    type: "box"
    scale:     [0.60, 0.60, 0.60]
    rotate:    [0, 17, 0]             # 17° CCW attorno a Y (canonico Cornell)
    translate: [-0.30, 0.30, 0.72]    # sinistra-frontale, base a Y=0
    material:  "bianco_cornell"

  # ─── BLOCCO ALTO (dx, posteriore) ─────────────────────────────────────────
  #  Il color bleeding verde dalla parete destra si deposita sulla faccia
  #  destra. La faccia superiore riceve luce diretta ma più debole perché
  #  l'altezza totale (1.20) si avvicina al soffitto (2.0).
  - name: "blocco_alto"
    type: "box"
    scale:     [0.60, 1.20, 0.60]
    rotate:    [0, -15, 0]            # -15° CW attorno a Y (canonico Cornell)
    translate: [ 0.33, 0.60, 1.30]    # destra-posteriore, base a Y=0
    material:  "bianco_cornell"


  # ===========================================================================
  #  VARIANTI OPZIONALI — Decommentare per render alternativi
  #  (ricordare di commentare le entità originali corrispondenti)
  # ===========================================================================

  # ─── VARIANTE A: Sfera di vetro (caustics sul pavimento)  ─────────────────
  #  Sostituisce il blocco corto con una sfera di cristallo IOR 1.52.
  #  La luce rifrata crea caustics (macchie di luce concentrata) sul pavimento
  #  bianco. Richiede -d ≥ 30 e -s ≥ 64 per i caustics visibili.
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "sfera_vetro"
  #   type: "sphere"
  #   center: [-0.30, 0.30, 0.72]     # stessa posizione del blocco corto
  #   radius: 0.30
  #   seed: 1111
  #   material: "vetro_crown"

  # ─── VARIANTE B: Sfera cromata specchio  ──────────────────────────────────
  #  La sfera riflette l'intera scena: entrambe le pareti colorate, il soffitto
  #  con il pannello luce e il blocco alto sono visibili nella riflessione.
  #  Effetto "snow globe" della Cornell Box.
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "sfera_cromo"
  #   type: "sphere"
  #   center: [-0.30, 0.30, 0.72]
  #   radius: 0.30
  #   seed: 2222
  #   material: "cromo_specchio"

  # ─── VARIANTE C: Blocco corto in oro satinato  ────────────────────────────
  #  Le pareti colorate si riflettono sul blocco dorato con una tinta calda.
  #  Le sfumature rosse e verdi nelle riflessioni quasi-speculari del metallo
  #  creano un effetto di grande complessità visiva.
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "blocco_corto_oro"
  #   type: "box"
  #   scale:     [0.60, 0.60, 0.60]
  #   rotate:    [0, 17, 0]
  #   translate: [-0.30, 0.30, 0.72]
  #   seed: 3333
  #   material:  "oro_satinato"

  # ─── VARIANTE D: Parete di fondo in marmo bianco  ─────────────────────────
  #  Le venature del marmo Calacatta ricevono il color bleeding rosso/verde
  #  in modo visivamente complesso, creando un interazione interessante
  #  tra pattern procedurale e GI colorata.
  #  PRIMA: commentare "parete_fondo" sopra.
  # - name: "parete_fondo_marmo"
  #   type: "quad"
  #   q: [-1.0, 0.0,  2.0]
  #   u: [ 2.0, 0.0,  0.0]
  #   v: [ 0.0, 2.0,  0.0]
  #   material: "marmo_fondo"


# =============================================================================
#  LIGHTS — Schema attivo + 3 schemi alternativi commentati
# =============================================================================
lights:

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ATTIVO ★  Pannello Luce da Soffitto (Cornell Box Classico)
  #
  #  La sorgente originale è un rettangolo luminoso 33×33cm (≈ 0.33×0.33u)
  #  al centro del soffitto, a Z≈1.00 (metà profondità). Poiché il renderer
  #  non gestisce geometria emissiva, il pannello è simulato con uno spot
  #  posizionato a 3cm dal soffitto (Y=1.97), cono abbastanza ampio da
  #  illuminare uniformemente tutta la scatola.
  #
  #  Un secondo point debolissimo riempie l'angolo posteriore in ombra
  #  (zona tra blocco alto e parete di fondo) per evitare zone completamente
  #  nere con basso sample count.
  #
  #  Calibrazione:
  #    spot key intensity=12 → esposizione corretta con -s ≥ 64 e -d ≥ 25
  #    Se la scena risulta sovraesposta, ridurre a 9; se sottoesposta, alzare a 16
  # ─────────────────────────────────────────────────────────────────────────

  # Pannello luce principale zenitale — simula il rettangolo luminoso originale
  - type: area
    corner:      [ -0.2, 1.99, 0.2]
    u:           [0.4, 0.0, 0.4]
    v:           [0.0, 0.0, 2.0]
    color:       [1.0, 1.0, 1.0]
    intensity:   4.0
    shadow_samples: 16

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-1  Luce Laterale da Finestra Sinistra
  #
  #  Una finestra immaginaria nella parete sinistra (rossa).
  #  Lo spot penetra lateralmente: ombre lunghe e direzionali dei blocchi
  #  sul pavimento, la parete di fondo riceve luce radente.
  #  Atmosphera più realistica di un interno di giorno.
  #
  #  Richiede world:
  #    ambient_light: [0.02, 0.02, 0.03]
  #    background:    [0.0, 0.0, 0.0]
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "spot"
  #   position:    [-0.92,  1.65,  0.50]  # vicino alla parete sinistra, in alto
  #   direction:   [ 0.88, -0.38,  0.28]  # verso l'interno-basso-fondo
  #   color:       [ 1.00,  0.97,  0.90]  # luce diurna bianco-calda
  #   intensity:   20
  #   inner_angle: 22
  #   outer_angle: 40
  # - type: "point"
  #   position:    [-0.88,  0.70,  1.20]  # riflesso cielo dalla finestra
  #   color:       [ 0.65,  0.78,  1.00]  # azzurro cielo diffuso
  #   intensity:   1.8


  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-2  Neon Bicolore — Blu Freddo + Rosso Caldo
  #
  #  Atmosfera cyberpunk/fashion: spot blu dall'alto + punto neon rosso
  #  dal basso. Il contrasto di colore estremo crea un effetto molto
  #  drammatico, soprattutto con Variante B (sfera cromata).
  #
  #  Abbina: Camera ALT-4 (Dutch Angle) per massimo impatto cinematografico.
