# =============================================================================
#  CORNELL BOX — Riproduzione Classica Fedele (Revisionata)
#  Benchmark universale per la validazione dei motori di Global Illumination
# =============================================================================
#
#  La Cornell Box fu sviluppata nel 1984 da Cindy Goral, Kenneth Torrance,
#  Donald Greenberg e Bennett Battaile all'Università Cornell come scena
#  di riferimento per misurare e confrontare algoritmi di radiosity e
#  global illumination.
#
#  RIFERIMENTO ORIGINALE — dati dal Cornell Program of Computer Graphics:
#    http://www.graphics.cornell.edu/online/box/data.html
#
#  Scatola originale:  556 × 548.8 × 559.2 mm
#  Normalizzata qui a: 2.00 × 1.97 × 2.01 unità  (fattore ≈ 1/278)
#  Per semplicità, arrotondato a 2.00 × 2.00 × 2.00 con Y in [0, 2].
#
#  Pannello luminoso originale: 343 × 332 mm → 1.23 × 1.19u normalizzato
#  Arrotondato a: 0.66 × 0.66 unità (≈ 33% della larghezza della scatola)
#  Posizionato al centro del soffitto, rientrato di 1mm (Y = 1.99).
#
#  Blocco corto originale:  165 × 165 × 330 mm → 0.59 × 0.59 × 1.19u
#  Arrotondato a: 0.60 × 0.60 × 0.60  (cubo)
#  Rotazione: ≈ +17° attorno a Y
#
#  Blocco alto originale:   165 × 165 × 660 mm → 0.59 × 0.59 × 2.37u
#  NOTA: nella normalizzazione 2×2×2 il blocco alto è circa il doppio
#  del corto → 0.60 × 1.20 × 0.60
#  Rotazione: ≈ -15° attorno a Y (specchio asimmetrico del corto)
#
#  Colori misurati fotometricamente (riflettanza spettrale → sRGB lineare):
#    Bianco:  ≈ 0.73          (energy-safe per rimbalzi multipli)
#    Rosso:   ≈ (0.65, 0.05, 0.05)
#    Verde:   ≈ (0.12, 0.45, 0.15)
#
#  Coordinate:
#    X : [-1.00 → +1.00]   ←  parete rossa  |  parete verde  →
#    Y : [ 0.00 → +2.00]   ↑  pavimento     |  soffitto      ↑
#    Z : [ 0.00 → +2.00]      apertura       |  parete fondo
#    Camera: Z negativo (davanti all'apertura), guarda verso +Z
#
#  ┌──────────────────────────────────────────────────────────────────────┐
#  │  COMANDI DI RENDER CONSIGLIATI                                      │
#  │                                                                     │
#  │  ⚠ IMPORTANTE: usa sempre -d ≥ 20 per la corretta GI a rimbalzi   │
#  │    multipli. Con -d basso le zone in ombra sono nero puro.          │
#  │                                                                     │
#  │  PREVIEW  (< 5 s):                                                  │
#  │    dotnet run ... -- -i cornell-box.yaml -s 4 -d 12                 │
#  │                       -w 512 -H 512 -S 4                            │
#  │                                                                     │
#  │  DRAFT  (30–90 s):                                                  │
#  │    dotnet run ... -- -i cornell-box.yaml -s 64 -d 30                │
#  │                       -w 512 -H 512                                 │
#  │                                                                     │
#  │  PRODUCTION  (qualità finale):                                      │
#  │    dotnet run ... -- -i cornell-box.yaml -s 256 -d 50               │
#  │                       -w 1024 -H 1024                               │
#  │                                                                     │
#  │  ULTRA  (stampa/portfolio):                                         │
#  │    dotnet run ... -- -i cornell-box.yaml -s 512 -d 50               │
#  │                       -w 2048 -H 2048                               │
#  └──────────────────────────────────────────────────────────────────────┘
#
#  VARIANTI DISPONIBILI (decommentare nelle sezioni entities/lights/world):
#    VARIANTE A : sfera di vetro al posto del blocco corto  (caustics)
#    VARIANTE B : sfera cromata specchio                    (riflessioni globali)
#    VARIANTE C : blocco corto in oro satinato              (metallo caldo)
#    VARIANTE D : parete di fondo in marmo bianco           (texture procedurale)
#    ALT-LIGHTS 1 : luce laterale da finestra sinistra      (ombre direzionali)
#    ALT-LIGHTS 2 : neon bicolore blu/rosso                 (drama/fashion)
#    ALT-LIGHTS 3 : spotlight museale per ogni oggetto      (galleria teatrale)
# =============================================================================


# =============================================================================
#  WORLD — Studio completamente chiuso
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ATTIVO ★  Studio buio con solo luce artificiale interna
#  Nessuna luce esterna: tutta la GI dipende dai rimbalzi interni.
#  È la configurazione che esalta il color bleeding rosso/verde.
# ─────────────────────────────────────────────────────────────────────────────
world:
  ambient_light: [0.0, 0.0, 0.0]
  background:    [0.0, 0.0, 0.0]

# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ALT-1  Luce ambiente minima (draft-friendly)
#  Aggiunge una luce di riempimento piattissima per recuperare i dettagli
#  nelle ombre profonde con basso sample count (preview e draft veloci).
# ─────────────────────────────────────────────────────────────────────────────
# world:
#   ambient_light: [0.018, 0.018, 0.022]
#   background:    [0.0, 0.0, 0.0]

# ─────────────────────────────────────────────────────────────────────────────
#  WORLD ALT-2  Vetrata immaginaria (luce diurna)
#  Il background azzurro simula luce naturale che entra dall'apertura frontale.
#  Ridurre l'intensità delle luci esplicite del 30–40% per compensare.
# ─────────────────────────────────────────────────────────────────────────────
# world:
#   ambient_light: [0.03, 0.04, 0.06]
#   background:    [0.22, 0.32, 0.55]


# =============================================================================
#  CAMERA
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ATTIVA ★  Vista Canonica Cornell Box
#
#  Replica la fotocamera dell'esperimento originale (1984):
#    - Centrata perfettamente (X=0)
#    - Altezza occhio a Y=1.0 (metà scatola)
#    - FOV ≈ 39° verticale (dato dal paper)
#    - Distanza camera → centro = 5.0u
#    - Apertura zero: tutto a fuoco
# ─────────────────────────────────────────────────────────────────────────────
camera:
  position:   [ 0.00,  1.00, -4.00]
  look_at:    [ 0.00,  1.00,  1.00]
  vup:        [ 0, 1, 0]
  fov:        39
  aperture:   0.0
  focal_dist: 5.00

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-1  Vista Angolata 3/4 dall'alto-destra
#
#  Più cinematografica: mostra contemporaneamente soffitto con pannello luce,
#  parete verde a destra e pavimento con ombre dei blocchi.
#  Ideale per valorizzare la differenza di altezza tra i due blocchi.
#
#  Distanza camera → look_at:
#    √((1.80-(-0.05))² + (2.60-0.75)² + (-3.80-1.00)²) ≈ 5.34
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 1.80,  2.60, -3.80]
#   look_at:    [-0.05,  0.75,  1.00]
#   vup:        [ 0, 1, 0]
#   fov:        46
#   aperture:   0.0
#   focal_dist: 5.34

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-2  Macro con DOF pronunciato — focus sul blocco corto
#
#  Simula un obiettivo 85mm f/1.8 da studio: blocco corto nitido,
#  blocco alto e parete di fondo in bokeh.
#
#  Distanza camera → blocco corto (centro):
#    √((0.10-(-0.30))² + (1.10-0.30)² + (-2.60-0.72)²) ≈ 3.44
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.10,  1.10, -2.60]
#   look_at:    [-0.30,  0.55,  0.72]
#   vup:        [ 0, 1, 0]
#   fov:        34
#   aperture:   0.14
#   focal_dist: 3.44

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-3  Vista Zenitale (Top-Down)
#
#  Mostra la pianta della scatola con le due impronte dei blocchi
#  e il pattern di ombre proiettate sul pavimento.
#  vup: [0, 0, 1] orienta il "nord" verso la parete di fondo.
#
#  Distanza camera → look_at (pavimento):
#    √(0 + 5.80² + 0) = 5.80
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.00,  5.80,  1.00]
#   look_at:    [ 0.00,  0.00,  1.00]
#   vup:        [ 0, 0, 1]
#   fov:        36
#   aperture:   0.0
#   focal_dist: 5.80

# ─────────────────────────────────────────────────────────────────────────────
#  CAMERA ALT-4  Dutch Angle cinematografico (~13.5° di inclinazione)
#
#  Orizzonte inclinato: atmosfera tesa e dinamica.
#  Ottima con lo schema luci "Neon Bicolore" (ALT-LIGHTS 2)
#  o con la Variante B (sfera cromata).
#
#  Il vup è normalizzato: (0.233, 0.972, 0) → |vup| ≈ 1.0
#  L'angolo di inclinazione: atan(0.233/0.972) ≈ 13.5°
#
#  Distanza camera → look_at:
#    √((0.90-(-0.10))² + (1.40-0.90)² + (-4.00-1.00)²) ≈ 5.12
# ─────────────────────────────────────────────────────────────────────────────
# camera:
#   position:   [ 0.90,  1.40, -4.00]
#   look_at:    [-0.10,  0.90,  1.00]
#   vup:        [ 0.233, 0.972, 0]
#   fov:        42
#   aperture:   0.0
#   focal_dist: 5.12


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  SUPERFICI CLASSICHE CORNELL (1984)
  #
  #  I valori RGB sono calibrati sulle misurazioni fotometriche del paper
  #  originale. Il bianco (0.73) non è puro per evitare energy gain
  #  nei rimbalzi multipli. Il rosso e il verde sono volutamente "sporchi"
  #  per risultare naturali nelle riflessioni indirette.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "bianco_cornell"
    type: "lambertian"
    color: [0.73, 0.73, 0.73]

  - id: "rosso_cornell"
    type: "lambertian"
    color: [0.65, 0.05, 0.05]

  - id: "verde_cornell"
    type: "lambertian"
    color: [0.12, 0.45, 0.15]

  # ─────────────────────────────────────────────────────────────────────────
  #  VARIANTI MATERIALI
  # ─────────────────────────────────────────────────────────────────────────

  - id: "cromo_specchio"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.0

  - id: "vetro_crown"
    type: "dielectric"
    refraction_index: 1.52

  - id: "oro_satinato"
    type: "metal"
    color: [0.94, 0.76, 0.12]
    fuzz: 0.05

  - id: "marmo_fondo"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 6.0
      noise_strength: 9.0
      colors: [[0.94, 0.93, 0.91], [0.16, 0.13, 0.24]]
      randomize_offset: false
      randomize_rotation: false


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ===========================================================================
  #  LE CINQUE PARETI DELLA SCATOLA
  #
  #  La Cornell Box è aperta sul lato frontale (Z=0 → apertura verso camera).
  #  Le 5 superfici (pavimento, soffitto, fondo, sx, dx) formano la scatola
  #  chiusa che intrappola la luce e la fa rimbalzare.
  # ===========================================================================

  # ─── PAVIMENTO (Y = 0.0) ──────────────────────────────────────────────────
  - name: "pavimento"
    type: "quad"
    q: [-1.0, 0.0,  0.0]
    u: [ 2.0, 0.0,  0.0]
    v: [ 0.0, 0.0,  2.0]
    material: "bianco_cornell"

  # ─── SOFFITTO (Y = 2.0) ───────────────────────────────────────────────────
  - name: "soffitto"
    type: "quad"
    q: [-1.0, 2.0,  0.0]
    u: [ 2.0, 0.0,  0.0]
    v: [ 0.0, 0.0,  2.0]
    material: "bianco_cornell"

  # ─── PARETE DI FONDO (Z = +2.0) ───────────────────────────────────────────
  - name: "parete_fondo"
    type: "quad"
    q: [-1.0, 0.0,  2.0]
    u: [ 2.0, 0.0,  0.0]
    v: [ 0.0, 2.0,  0.0]
    material: "bianco_cornell"

  # ─── PARETE SINISTRA — ROSSA (X = -1.0) ───────────────────────────────────
  - name: "parete_sinistra_rossa"
    type: "quad"
    q: [-1.0, 0.0,  0.0]
    u: [ 0.0, 0.0,  2.0]
    v: [ 0.0, 2.0,  0.0]
    material: "rosso_cornell"

  # ─── PARETE DESTRA — VERDE (X = +1.0) ─────────────────────────────────────
  - name: "parete_destra_verde"
    type: "quad"
    q: [ 1.0, 0.0,  0.0]
    u: [ 0.0, 0.0,  2.0]
    v: [ 0.0, 2.0,  0.0]
    material: "verde_cornell"

  # ===========================================================================
  #  I DUE BLOCCHI BIANCHI — Canonici Cornell Box (1984)
  #
  #  Proporzioni originali normalizzate su box 2×2×2:
  #    Blocco corto: 0.60 × 0.60 × 0.60  — cubo
  #    Blocco alto : 0.60 × 1.20 × 0.60  — parallelepipedo
  #
  #  Rotazioni canoniche:
  #    Blocco corto: +17° attorno a Y
  #    Blocco alto : -15° attorno a Y
  #
  #  Posizioni asimmetriche:
  #    Corto: sx-frontale  (X≈-0.33, Z≈0.66)  → vicino parete rossa
  #    Alto : dx-posteriore (X≈+0.33, Z≈1.30) → vicino parete verde
  # ===========================================================================

  # ─── BLOCCO CORTO (sx, frontale) ──────────────────────────────────────────
  - name: "blocco_corto"
    type: "box"
    scale:     [0.60, 0.60, 0.60]
    rotate:    [0, 17, 0]
    translate: [-0.33, 0.30, 0.66]
    material:  "bianco_cornell"

  # ─── BLOCCO ALTO (dx, posteriore) ─────────────────────────────────────────
  - name: "blocco_alto"
    type: "box"
    scale:     [0.60, 1.20, 0.60]
    rotate:    [0, -15, 0]
    translate: [ 0.33, 0.60, 1.30]
    material:  "bianco_cornell"

  # ===========================================================================
  #  VARIANTI OPZIONALI — Decommentare per render alternativi
  # ===========================================================================

  # ─── VARIANTE A: Sfera di vetro (caustics sul pavimento) ──────────────────
  #  Sostituisce il blocco corto. Richiede -d ≥ 30 e -s ≥ 64.
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "sfera_vetro"
  #   type: "sphere"
  #   center: [-0.33, 0.30, 0.66]
  #   radius: 0.30
  #   seed: 1111
  #   material: "vetro_crown"

  # ─── VARIANTE B: Sfera cromata specchio ───────────────────────────────────
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "sfera_cromo"
  #   type: "sphere"
  #   center: [-0.33, 0.30, 0.66]
  #   radius: 0.30
  #   seed: 2222
  #   material: "cromo_specchio"

  # ─── VARIANTE C: Blocco corto in oro satinato ─────────────────────────────
  #  PRIMA: commentare "blocco_corto" sopra.
  # - name: "blocco_corto_oro"
  #   type: "box"
  #   scale:     [0.60, 0.60, 0.60]
  #   rotate:    [0, 17, 0]
  #   translate: [-0.33, 0.30, 0.66]
  #   seed: 3333
  #   material:  "oro_satinato"

  # ─── VARIANTE D: Parete di fondo in marmo bianco ──────────────────────────
  #  PRIMA: commentare "parete_fondo" sopra.
  # - name: "parete_fondo_marmo"
  #   type: "quad"
  #   q: [-1.0, 0.0,  2.0]
  #   u: [ 2.0, 0.0,  0.0]
  #   v: [ 0.0, 2.0,  0.0]
  #   material: "marmo_fondo"


# =============================================================================
#  LIGHTS — Schema attivo + 3 schemi alternativi commentati
# =============================================================================
lights:

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ATTIVO ★  Pannello Luce da Soffitto (Cornell Box Classico)
  #
  #  La sorgente originale era un rettangolo luminoso al centro del soffitto.
  #  Dimensioni originali: 343 × 332 mm → normalizzate a ≈ 0.66 × 0.66 unità.
  #
  #  L'area light è definita da:
  #    corner = angolo in basso-sinistra del rettangolo
  #    u = vettore lungo X (larghezza)
  #    v = vettore lungo Z (profondità)
  #
  #  CENTRAMENTO: il pannello è centrato in X e Z nella scatola.
  #    X: centro = 0.0, metà-larghezza = 0.33 → da -0.33 a +0.33
  #    Z: centro = 1.0, metà-profondità = 0.33 → da  0.67 a  1.33
  #    Y: 1.99 (1mm sotto il soffitto a Y=2.0, così non è complanare)
  #
  #  Normale risultante: Cross(u, v) = Cross([0.66,0,0], [0,0,0.66])
  #    = (0, 0, 0) — NO! I vettori devono generare una normale verso -Y.
  #  Cross([0.66, 0, 0], [0, 0, 0.66]) = (0*0.66 - 0*0, 0*0 - 0.66*0.66, 0.66*0 - 0*0)
  #    = (0, -0.4356, 0) → normale verso -Y ✓ (il pannello emette verso il basso)
  #
  #  Formula illuminazione del motore:
  #    L = Intensity * area * cos(θ_light) / (distance² * ShadowSamples)
  #  con area = |Cross(u,v)| = 0.4356 u²
  #
  #  Per una scatola 2×2×2, distanza media pannello→pavimento ≈ 2.0u:
  #    L ≈ Intensity * 0.4356 * cos(0) / (4.0 * 16) ≈ Intensity * 0.0068
  #  Con Intensity=22 → L ≈ 0.15 per campione — corretto dopo tone mapping.
  #
  #  Calibrazione:
  #    Intensity 22 → esposizione bilanciata con -s ≥ 64, -d ≥ 25
  #    Se sovraesposta: ridurre a 18. Se sottoesposta: alzare a 28.
  # ─────────────────────────────────────────────────────────────────────────
  - type: "area"
    corner:         [-0.33, 1.99,  0.67]
    u:              [ 0.66, 0.00,  0.00]
    v:              [ 0.00, 0.00,  0.66]
    color:          [ 1.00, 0.98,  0.94]    # bianco caldo (≈ 4500K)
    intensity:      22.0
    shadow_samples: 16

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-1  Luce Laterale da Finestra Sinistra
  #
  #  Una finestra immaginaria nella parete sinistra (rossa).
  #  Spot penetra lateralmente: ombre lunghe e direzionali dei blocchi
  #  sul pavimento. Parete di fondo riceve luce radente.
  #
  #  Calibrazione spot: Intensity / distance² al centro della scena.
  #    Distanza pos→centro ≈ √(0.08+0.0025+0.25) ≈ 0.58
  #    Att. = 20 / 0.34 ≈ 59, smorzata dal cono: 59 * ~0.4 ≈ 24 — ok.
  #
  #  Richiede world:
  #    ambient_light: [0.02, 0.02, 0.03]
  #    background:    [0.0, 0.0, 0.0]
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "spot"
  #   position:    [-0.92,  1.65,  0.50]
  #   direction:   [ 0.88, -0.38,  0.28]
  #   color:       [ 1.00,  0.97,  0.90]
  #   intensity:   20
  #   inner_angle: 22
  #   outer_angle: 45
  # - type: "point"
  #   position:    [-0.88,  0.70,  1.20]
  #   color:       [ 0.65,  0.78,  1.00]
  #   intensity:   1.5

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-2  Neon Bicolore — Blu Freddo + Rosso Caldo
  #
  #  Atmosfera cyberpunk/fashion: spot blu dall'alto + point rosso dal basso.
  #  Contrasto cromatico estremo.
  #  Abbina: Camera ALT-4 (Dutch Angle) per massimo impatto.
  #
  #  Calibrazione:
  #    Spot blu: Intensity 16, cono ampio (58°) → riempie tutta la scatola
  #    Point rosso: Intensity 4.0, quasi a pavimento → controfiamma caldo
  #    Point verde-acqua: Intensity 1.5, accento secondario
  #
  #  Richiede world:
  #    ambient_light: [0.0, 0.0, 0.0]
  #    background:    [0.0, 0.0, 0.0]
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "spot"
  #   position:    [ 0.00,  1.97,  1.00]
  #   direction:   [ 0.00, -1.00,  0.00]
  #   color:       [ 0.40,  0.62,  1.00]
  #   intensity:   16
  #   inner_angle: 32
  #   outer_angle: 58
  # - type: "point"
  #   position:    [ 0.00,  0.08,  0.85]
  #   color:       [ 1.00,  0.28,  0.18]
  #   intensity:   4.0
  # - type: "point"
  #   position:    [ 0.00,  0.08,  1.60]
  #   color:       [ 0.18,  0.90,  0.55]
  #   intensity:   1.5

  # ─────────────────────────────────────────────────────────────────────────
  #  SCHEMA ALT-3  Galleria Museale — Spotlight Individuale per Oggetto
  #
  #  Un faretto zenitale dedicato per ogni blocco.
  #  Ombre dure, teatrali, atmosfera da galleria.
  #
  #  Calibrazione:
  #    Ciascuno spot Intensity=18, cono stretto (inner 16°, outer 30°)
  #    Distanza pos→blocco ≈ 1.67 → Att. = 18 / 2.79 ≈ 6.5
  #    Con il cono: ≈ 6.5 * 0.5 ≈ 3.2 — sufficiente per scena scura.
  #    Fill debolissimo (0.6) per evitare nero assoluto sulle pareti.
  #
  #  Richiede world:
  #    ambient_light: [0.005, 0.005, 0.006]
  #    background:    [0.0, 0.0, 0.0]
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "spot"
  #   position:    [-0.33,  1.97,  0.66]
  #   direction:   [ 0.00, -1.00,  0.00]
  #   color:       [ 1.00,  0.96,  0.88]
  #   intensity:   18
  #   inner_angle: 16
  #   outer_angle: 30
  # - type: "spot"
