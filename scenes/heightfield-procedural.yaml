# Procedural HeightField smoke test — Musgrave hetero_terrain through the
# new primitive. No baked PNG, no mesh BVH; the surface is bilinearly
# interpolated from a 512×512 sample grid synthesised from the noise.

world:
  sky:
    type: "gradient"
    zenith_color:  [0.18, 0.32, 0.58]
    horizon_color: [0.78, 0.85, 0.92]
    ground_color:  [0.20, 0.22, 0.18]
    sun:
      direction: [-0.45, -0.80, -0.40]
      color: [1.00, 0.96, 0.90]
      intensity: 12.0
      size: 2.0
      falloff: 32.0

lights:
  - type: "directional"
    direction: [0.50, -0.65, 0.55]
    color: [0.96, 0.95, 0.94]
    intensity: 1.20

cameras:
  - name: "wide"
    position: [80.0, 45.0, 80.0]
    look_at:  [0.0, 10.0, 0.0]
    fov: 50.0
  - name: "top"
    position: [0.0, 120.0, 0.001]
    look_at:  [0.0, 0.0, 0.0]
    fov: 55.0

materials:
  - id: "rock"
    type: "disney"
    base_color: [0.45, 0.38, 0.32]
    roughness: 0.92

entities:
  - name: "ground_plane"
    type: "plane"
    point:  [0, 0, 0]
    normal: [0, 1, 0]
    material: "rock"

  - name: "terrain"
    type: "heightfield"
    bounds: [-50, -50, 50, 50]
    max_height: 25
    height_scale: 25
    resolution: 512
    height_texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 0.012
      octaves: 5
      lacunarity: 2.0
      gain: 0.55
      fractal_increment: 0.35
      fractal_offset: 0.65
      distortion: 0.15
      colors: [[0, 0, 0], [1, 1, 1]]
    material: "rock"
