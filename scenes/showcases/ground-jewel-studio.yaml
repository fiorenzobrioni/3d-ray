# ═════════════════════════════════════════════════════════════════════════════
#  GROUND — Jewel Studio (disk podium, sfondo nero, 3-point lighting)
# ═════════════════════════════════════════════════════════════════════════════
#  Vetrina di gioielleria minimal. Un palco circolare lucido emerge dal nero:
#  sopra, una sfera di oro lucido come hero piece, un vaso Ming in porcellana
#  bianca e un trio di gemme cristalline (quarzo rosa, ametista, calcite).
#  Niente cyclorama esplicito — lo sky flat scuro definisce l'infinito.
#
#  La scena dimostra il dispatcher `world.ground` nel suo uso "indoor product":
#   ─ type dispatch `disk`             (palco circolare finito)
#   ─ inline material shorthand        (color/roughness/metallic anonimo)
#   ─ uv_scale fine                    (tiling di micro-imperfezioni)
#   ─ visibility default (tutto on)    (riceve ombre, riflessi e bounce)
#
#  Profili rendering (CLI):
#   ─ Preview   : -w 480  -H 270  -s 64   -d 6  -S 2
#   ─ Standard  : -w 1280 -H 720  -s 384  -d 8  -S 4
#   ─ Final     : -w 1920 -H 1080 -s 1536 -d 10 -S 6 -C 25 --sampler sobol
# ═════════════════════════════════════════════════════════════════════════════

imports:
  - path: "../libraries/materials/metals.yaml"
  - path: "../libraries/materials/ceramics.yaml"
  - path: "../libraries/materials/minerals-gems.yaml"
  - path: "../libraries/objects/decorative-objects.yaml"

world:
  # ── Sky: flat presso-nero come "infinito di studio" ───────────────────────
  sky:
    type: "flat"
    color: [0.06, 0.06, 0.07]

  # ── Ground: disk lucido come palco del prodotto ───────────────────────────
  ground:
    type: "disk"
    size: 4                                # raggio 4 m (palco generoso)
    point: [0, 0, 0]
    # Disney BSDF anonimo: nero satin riflettente, micro-uv per realismo
    color:    [0.04, 0.04, 0.045]          # nero profondo con leggera tinta cool
    roughness: 0.05                        # quasi specchio (riflette gli oggetti)
    metallic:  0.0
    uv_scale:  [3, 3]                      # micro-tile (texture-friendly)

# ═════════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═════════════════════════════════════════════════════════════════════════════
cameras:
  - name: "hero"                           # ravvicinata + DOF morbido
    position: [0, 1.2, 4.5]
    look_at:  [0, 0.7, 0]
    fov: 35
    aperture:   0.04
    focal_dist: 4.5

  - name: "topdown_macro"                  # vista zenitale per layout
    position: [0, 3.5, 0.001]
    look_at:  [0, 0, 0]
    fov: 60

# ═════════════════════════════════════════════════════════════════════════════
#  MATERIALS — solo i 2 emissivi locali; il resto arriva dagli imports
# ═════════════════════════════════════════════════════════════════════════════
materials:

  # Rim light: barra emissiva calda dietro il palco
  - id: "mat_rim_warm"
    type: "emissive"
    color: [1.00, 0.78, 0.45]
    intensity: 25

# ═════════════════════════════════════════════════════════════════════════════
#  LIGHTS — Studio 3-point (key calda, fill fredda, rim emissivo dietro)
# ═════════════════════════════════════════════════════════════════════════════
lights:

  # ─── Key — area calda alta a 45° ──────────────────────────────────────────
  - type: "area"
    corner: [2.0, 4.5, 3.0]
    u:      [2.2, 0, 0]
    v:      [0, 0, -2.0]
    color:  [1.00, 0.94, 0.85]
    intensity: 32

  # ─── Fill — area fredda larga sul lato opposto ────────────────────────────
  - type: "area"
    corner: [-4.0, 3.5, 2.0]
    u:      [2.4, 0, 0]
    v:      [0, 0, -1.6]
    color:  [0.70, 0.82, 1.00]
    intensity: 12

# ═════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═════════════════════════════════════════════════════════════════════════════
entities:

  # ─── Rim emissivo dietro (barra sottile orizzontale) ──────────────────────
  - name: "rim_bar"
    type: "box"
    material: "mat_rim_warm"
    translate: [0, 1.6, -1.8]
    scale:     [3.0, 0.08, 0.06]

  # ─── Hero — sfera oro lucido al centro ────────────────────────────────────
  - name: "sphere_gold_hero"
    type: "sphere"
    material: "dis_oro_lucido"
    center: [0, 0.9, 0]
    radius: 0.9

  # ─── Vaso Ming sulla sinistra (porcellana bianca, scala piccola) ──────────
  # Il template definisce un vaso ~Ø 0.22 × 0.42 m con porcellana blu di
  # default; lo override con porcellana bianca per coerenza chromatic.
  - name: "vaso"
    type: "instance"
    template: "vaso_ming"
    material: "dis_porcellana_bianca"
    translate: [-1.9, 0, 0.6]
    scale:     [1.4, 1.4, 1.4]

  # ─── Trio di gemme cristalline davanti (gemme NON vetro puro) ─────────────
  - name: "gem_quartz_pink"
    type: "sphere"
    material: "dis_quarzo_rosa"
    center: [1.4, 0.18, 1.2]
    radius: 0.18

  - name: "gem_amethyst"
    type: "sphere"
    material: "dis_ametista_grezza"
    center: [1.9, 0.15, 0.7]
    radius: 0.15

  - name: "gem_calcite"
    type: "sphere"
    material: "dis_calcite_islandese"
    center: [2.2, 0.13, 1.3]
    radius: 0.13

  # ─── Piedistallo argento brunito a destra ─────────────────────────────────
  - name: "pedestal"
    type: "instance"
    template: "colonnina"
    material: "dis_argento_brunito"
    translate: [1.6, 0, -1.4]
    scale:     [0.6, 0.6, 0.6]
