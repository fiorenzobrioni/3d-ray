# ═══════════════════════════════════════════════════════════════════════════
#  Liquids Showcase — Liquidi
#
#  Dimostra 5 liquidi come sfere trasparenti.
#  Le sfere isolate non sono il modo realistico di renderizzare liquidi
#  (servirebbero bicchieri con superfici interno+esterno), ma esibiscono
#  efficacemente Beer-Lambert e trasmissione colorata.
#
#    x=-4.8  Vino rosso             → transmission_depth corto, colore profondo
#    x=-2.4  Latte intero            → subsurface 0.65 (opaco)
#    x=  0   Miele                   → spec_trans + ior 1.484 alto
#    x=+2.4  Olio motore             → thin_film 380nm iridescente
#    x=+4.8  Acqua piscina           → spec_trans 1.0 + ior 1.33
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 128  -d 12 -S 1
#    Finale: -w 1920 -H 1080 -s 2048 -d 14 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.18, 0.18, 0.20]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "dis_vino_rosso"
    type: "disney"
    color: [0.45, 0.06, 0.10]
    roughness: 0.05
    specular: 0.50
    spec_trans: 1.0
    ior: 1.345
    transmission_color: [0.45, 0.04, 0.06]
    transmission_depth: 0.4

  - id: "dis_latte_intero"
    type: "disney"
    color: [0.97, 0.95, 0.90]
    subsurface_radius: [0.50, 0.55, 0.65]
    subsurface_anisotropy: 0.8
    spec_trans: 0.0
    roughness: 0.25
    specular: 0.42

  - id: "dis_miele"
    type: "disney"
    color: [0.95, 0.68, 0.18]
    roughness: 0.05
    specular: 0.50
    spec_trans: 0.95
    ior: 1.484
    transmission_color: [0.88, 0.45, 0.05]
    transmission_depth: 0.3

  - id: "dis_olio_motore"
    type: "disney"
    color: [0.05, 0.04, 0.04]
    roughness: 0.05
    specular: 0.55
    spec_trans: 0.30
    ior: 1.470
    transmission_color: [0.02, 0.02, 0.02]
    transmission_depth: 0.1
    thin_film_thickness: 380
    thin_film_ior: 1.40
    clearcoat: 0.4
    coat_roughness: 0.05
    coat_ior: 1.5

  - id: "dis_acqua_piscina"
    type: "disney"
    color: [0.85, 0.95, 1.00]
    roughness: 0.02
    specular: 0.50
    spec_trans: 1.0
    ior: 1.33
    transmission_color: [0.78, 0.92, 0.98]
    transmission_depth: 2.0

  - id: "floor"
    type: "disney"
    color: [0.62, 0.62, 0.60]
    roughness: 0.65
    specular: 0.35

  - id: "backdrop"
    type: "disney"
    color: [0.35, 0.35, 0.36]
    roughness: 0.88

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "vino"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "dis_vino_rosso"
  - name: "latte"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "dis_latte_intero"
  - name: "miele"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "dis_miele"
  - name: "olio"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "dis_olio_motore"
  - name: "acqua"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "dis_acqua_piscina"

lights:

  # Backdrop chiaro + key forte: i liquidi trasparenti devono mostrare
  # la propria assorbimento Beer-Lambert leggendo il backdrop.
  - type: "directional"
    direction: [-0.4, -0.5, 0.6]
    color: [1.0, 0.97, 0.92]
    intensity: 7.0
    angular_radius: 0.4

  - type: "point"
    position: [0, 5, -4]
    color: [1.0, 1.0, 0.95]
    intensity: 90

  - type: "point"
    position: [0, 3, 5]
    color: [1.0, 0.92, 0.78]
    intensity: 65
