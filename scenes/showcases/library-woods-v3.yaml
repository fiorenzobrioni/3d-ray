# ═══════════════════════════════════════════════════════════════════════════
#  Library Woods — V3
#
#  Showcase pro-grade della texture wood riscritta. Sei campioni cubici (1.4 wu
#  per lato) disposti come in uno SHOWROOM di legno: la faccia superiore
#  mostra l'end-grain (anelli concentrici, cross-cut del tronco), le facce
#  laterali mostrano il rift-cut con curve iperboliche.  Camera leggermente
#  sollevata per mostrare entrambi i tagli contemporaneamente.
#
#  Composizione (da sinistra a destra):
#    Quercia olio          — latifoglia chiara open-pore (pori vasi visibili)
#    Noce verniciato       — latifoglia scura + clearcoat + heartwood gradient
#    Mogano flame studio   — figure intensa perpendicolare al grain
#    Pino nodoso heavy     — conifera nodosa con nodi cono-3D + ramp 5-stop
#    Acero curly max       — figure massima a banda larga, close-pore
#    Wengé olio            — nero open-pore (latifoglia africana)
#
#  Le sei essenze sono state scelte per coprire:
#    • Chiaro vs scuro      (acero/quercia ↔ wengé/noce)
#    • Open vs close pore   (quercia/wengé ↔ acero/mogano)
#    • Con vs senza figure  (curly/flame ↔ quercia/wengé)
#    • Con vs senza nodi    (pino nodoso ↔ tutte le altre)
#    • Grezzo vs lucido     (quercia olio/wengé olio ↔ noce verniciato)
#    • Latifoglia vs conifera (5 ↔ pino)
#
#  Lighting tarato per LEGNO (opaco/satinato), non per il marmo lucido del
#  showcase precedente: key direzionale ~4.5 + fill freddo ~18 + rim caldo ~12
#  (~50% delle intensità del marble showcase).  Sky pure black per non
#  inquinare i riflessi clearcoat del noce verniciato.
#
#  Render hint:
#    Draft:    -w 640  -H 360  -s 128  -d 8  -S 1
#    Standard: -w 1920 -H 1080 -s 512  -d 8  -S 4
#    Final:    -w 1920 -H 1080 -s 2048 -d 12 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.001, 0.001, 0.0012]

camera:
  position: [0, 2.9, -7.8]
  look_at:  [0, 0.55, 0]
  fov: 50

materials:

  # Pavimento scuro opaco — fa risaltare i campioni senza riflettere
  # luce ambientale sui clearcoat.
  - id: "floor"
    type: "disney"
    color: [0.06, 0.06, 0.07]
    roughness: 0.88
    specular: 0.10

  # Piano di fondo verticale (anche scuro) per dare profondità — chiude
  # lo sfondo dietro i campioni invece di lasciarli galleggiare nel nero.
  - id: "backwall"
    type: "disney"
    color: [0.10, 0.10, 0.11]
    roughness: 0.92
    specular: 0.08

  - id: "dis_quercia_olio"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.5
      grain_strength: 1.8
      latewood_width: 0.24
      ring_sharpness: 4.0
      ring_color_variation: 0.22
      ring_width_variation: 0.18
      warp_amplitude: 0.55
      fold_amplitude: [0.40, 0.12, 0.40]
      figure_strength: 0.30
      figure_scale: 0.18
      figure_aspect: 4.0
      pore_density: 0.48
      pore_scale: 18.0
      pore_aspect: 6.0
      pore_strength: 0.60
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.22, 0.12, 0.04], interp: "smoothstep" }
        - { position: 0.55, color: [0.72, 0.50, 0.24], interp: "smoothstep" }
        - { position: 1.00, color: [0.88, 0.74, 0.46], interp: "linear" }
    roughness: 0.65
    specular: 0.32
    sheen: 0.10
    sheen_tint: 0.7

  - id: "dis_noce_verniciato"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.2
      grain_strength: 1.6
      latewood_width: 0.20
      ring_sharpness: 3.8
      ring_color_variation: 0.22
      ring_width_variation: 0.15
      warp_amplitude: 0.55
      fold_amplitude: [0.40, 0.12, 0.45]
      figure_strength: 0.45
      figure_scale: 0.16
      figure_aspect: 4.0
      heartwood_radius: 1.6
      heartwood_blend: 0.22
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.10, 0.05, 0.03], interp: "smoothstep" }
        - { position: 0.55, color: [0.38, 0.22, 0.12], interp: "smoothstep" }
        - { position: 1.00, color: [0.62, 0.40, 0.22], interp: "linear" }
    roughness: 0.26
    specular: 0.52
    clearcoat: 0.72
    coat_roughness: 0.10

  - id: "dis_mogano_flame_studio"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.8
      grain_strength: 0.40
      latewood_width: 0.16
      ring_sharpness: 4.5
      ring_color_variation: 0.14
      ring_width_variation: 0.10
      warp_amplitude: 0.50
      figure_strength: 1.6
      figure_scale: 0.11
      figure_aspect: 6.0
      heartwood_radius: 1.2
      heartwood_blend: 0.12
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.20, 0.06, 0.03], interp: "smoothstep" }
        - { position: 0.50, color: [0.50, 0.18, 0.10], interp: "smoothstep" }
        - { position: 1.00, color: [0.74, 0.36, 0.22], interp: "linear" }
    roughness: 0.28
    specular: 0.52
    clearcoat: 0.78
    coat_roughness: 0.08

  - id: "dis_pino_nodoso_heavy"
    type: "disney"
    texture:
      type: "wood"
      scale: 6.0
      grain_strength: 0.8
      latewood_width: 0.30
      ring_sharpness: 5.5
      ring_color_variation: 0.26
      ring_width_variation: 0.22
      warp_amplitude: 0.55
      fold_amplitude: [0.35, 0.10, 0.40]
      figure_strength: 0.30
      figure_scale: 0.22
      figure_aspect: 3.0
      knot_density: 1.0
      knot_scale: 1.2
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.02, 0.01, 0.01], interp: "smoothstep" }
        - { position: 0.15, color: [0.18, 0.08, 0.04], interp: "smoothstep" }
        - { position: 0.45, color: [0.55, 0.36, 0.16], interp: "smoothstep" }
        - { position: 0.80, color: [0.88, 0.72, 0.42], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.88, 0.62], interp: "linear" }
    roughness: 0.55
    specular: 0.38

  - id: "dis_acero_curly_max"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.5
      grain_strength: 0.20
      latewood_width: 0.14
      ring_sharpness: 5.5
      ring_color_variation: 0.10
      warp_amplitude: 0.40
      figure_strength: 2.4
      figure_scale: 0.08
      figure_aspect: 5.0
      octaves: 4
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.45, 0.30, 0.15], interp: "smoothstep" }
        - { position: 0.45, color: [0.78, 0.62, 0.35], interp: "smoothstep" }
        - { position: 0.80, color: [0.92, 0.80, 0.58], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.92, 0.78], interp: "linear" }
    roughness: 0.30
    specular: 0.50
    clearcoat: 0.65
    coat_roughness: 0.08

  - id: "dis_wenge_olio"
    type: "disney"
    texture:
      type: "wood"
      scale: 5.0
      grain_strength: 1.8
      latewood_width: 0.22
      ring_sharpness: 4.0
      ring_color_variation: 0.18
      ring_width_variation: 0.14
      warp_amplitude: 0.50
      pore_density: 0.45
      pore_scale: 20.0
      pore_aspect: 6.0
      pore_strength: 0.55
      octaves: 5
      randomize_offset: true
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.06, 0.04, 0.03], interp: "smoothstep" }
        - { position: 0.55, color: [0.22, 0.14, 0.08], interp: "smoothstep" }
        - { position: 1.00, color: [0.42, 0.28, 0.18], interp: "linear" }
    roughness: 0.62
    specular: 0.34
    sheen: 0.05
    sheen_tint: 0.4

entities:

  # Pavimento
  - { name: "floor", type: "quad",
      q: [-11, 0, -2.5], u: [22, 0, 0], v: [0, 0, 6],
      material: "floor" }

  # Parete di fondo (z = 2.5)
  - { name: "backwall", type: "quad",
      q: [-11, 0, 2.5], u: [22, 0, 0], v: [0, 4, 0],
      material: "backwall" }

  # ── Sei campioni cubici 1.4×1.4×1.4 ────────────────────────────────────
  # Centro y = 0.7 (cubo poggiato sul pavimento).
  # Spaziatura x = 2.0 wu, totale 10 wu (centrato a 0).

  - name: "quercia_olio"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [-5.0, 0.7, 0]
    seed: 1
    material: "dis_quercia_olio"

  - name: "noce_verniciato"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [-3.0, 0.7, 0]
    seed: 7
    material: "dis_noce_verniciato"

  - name: "mogano_flame"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [-1.0, 0.7, 0]
    seed: 13
    material: "dis_mogano_flame_studio"

  - name: "pino_nodoso"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [1.0, 0.7, 0]
    seed: 23
    material: "dis_pino_nodoso_heavy"

  - name: "acero_curly"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [3.0, 0.7, 0]
    seed: 31
    material: "dis_acero_curly_max"

  - name: "wenge_olio"
    type: "box"
    scale: [1.4, 1.4, 1.4]
    translate: [5.0, 0.7, 0]
    seed: 41
    material: "dis_wenge_olio"

lights:

  # Key direzionale dall'alto-sinistra — dominante, leggermente calda.
  # Intensità tarata per legno opaco (~50% del marble showcase: il legno
  # non ha un clearcoat lucido da dominare).
  - type: "directional"
    direction: [-0.35, -0.82, 0.45]
    color: [1.0, 0.97, 0.92]
    intensity: 3.4
    angular_radius: 1.2     # bordi ombra morbidi

  # Fill freddo dalla sinistra-bassa — apre le ombre senza schiarire troppo.
  # Spostato più lontano per inverse-square più dolce.
  - type: "point"
    position: [-8.5, 4.5, -5.0]
    color: [0.80, 0.86, 1.00]
    intensity: 28

  # Rim caldo dal RETRO-ALTO DESTRA — separa i campioni dallo sfondo
  # senza colpire la parete (era il bright spot del render precedente).
  - type: "point"
    position: [6.5, 5.5, -4.5]
    color: [1.00, 0.82, 0.62]
    intensity: 18
