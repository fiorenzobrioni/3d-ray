# ═══════════════════════════════════════════════════════════════════════════
#  Library Woods — V3
#
#  Showcase pro-grade della texture wood riscritta. Mostra i 6 risultati
#  più rappresentativi dei nuovi algoritmi: profilo anulare asimmetrico
#  (earlywood/latewood), variazione random per anello (la singola feature
#  che separa "wood CG" da "wood reale"), recursive IQ warp, fold
#  anisotropico, vasi di poro (Worley anisotropico per le essenze
#  open-pore), figure direzionata perpendicolare alla venatura.
#
#    x=-5.0  Quercia open-pore (pro)   → pori vasi 0.48 + figure 0.30 +
#                                        ring_color_variation 0.22
#    x=-3.0  Rovere quartato medullary → radial_anisotropy 4.5 + tiger ray
#    x=-1.0  Acero curly studio        → figure 1.8 perpendicolare grain
#    x=+1.0  Pino nodoso heavy         → knot 3D-cone 1.0 + ramp 5-stop
#    x=+3.0  Mogano flame              → figure verticale 1.6 + heartwood
#    x=+5.0  Burr walnut (Rolls)       → figure 1.4 + knots + warp iter 3
#
#  Lo sfondo è scuro per non inquinare il riflesso dei laccati.
#
#  Render hint:
#    Draft:    -w 640  -H 360  -s 64   -d 8  -S 1
#    Standard: -w 1920 -H 1080 -s 1024 -d 8  -S 4
#    Final:    -w 1920 -H 1080 -s 2048 -d 12 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/woods.yaml" }

world:
  sky:
    type: "flat"
    color: [0.002, 0.002, 0.0025]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.85, 0]
