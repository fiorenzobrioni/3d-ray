# ═══════════════════════════════════════════════════════════════════════════
#  Voronoi Extended Outputs Showcase — VFX Production-Grade Textures, Step 6/7
#
#  Dimostra i nuovi canali di output del nodo voronoi: F3, F4, F3−F1
#  (banda border morbida, lower-frequency rispetto a F2−F1) e Position
#  (XYZ del feature point della cella F1, usato come ID stocastico per cella).
#
#  Allineamento puntuale:
#    Cycles Voronoi Texture (F1..F4 + Position output) /
#    RenderMan PxrVoronoise (F1..F4 + position) /
#    Houdini Voronoi (P_ attribute + closest-N).
#
#  LAYOUT
#  ──────
#  Sei sfere su due righe (3×2), tutte con stesso seed e stesso scale Voronoi,
#  varia solo `output`. Stesso color ramp 4-stop dove applicabile, così la
#  signature spaziale (densità delle celle) è identica e la differenza visiva
#  è puramente data dal canale scelto.
#
#  Riga A (y=1.2):
#    A1 (x=-2.4):  output: f1            — reference, distanza al feature più vicino.
#    A2 (x= 0.0):  output: f2_minus_f1   — crackle classico (banda stretta).
#    A3 (x= 2.4):  output: f3_minus_f1   — crackle largo, banda più morbida.
#
#  Riga B (y=-0.4):
#    B1 (x=-2.4):  output: f3            — distanza al 3° feature (anello esterno).
#    B2 (x= 0.0):  output: f4            — distanza al 4° feature (più esterno ancora).
#    B3 (x= 2.4):  output: position      — XYZ del feature F1 come RGB
#                                         (random color per cella, niente ramp).
#
#  Use case:
#    F3/F4              — cellulare gerarchico, multi-scale leather, scaglie a doppia scala.
#    F3-F1              — border masks larghe, soft rim, mortar gradiente.
#    Position           — random color/normal/scale per-cella alla Houdini/Cycles,
#                         input deterministico per un altro nodo procedurale.
#
#  Render consigliato:
#    Draft:   -w 640  -H 480  -s 32   -d 4  -S 1
#    Standard:-w 1280 -H 960  -s 256  -d 6  -S 2
#    Final:   -w 1920 -H 1440 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "gradient"
    zenith_color:  [0.03, 0.05, 0.10]
    horizon_color: [0.08, 0.10, 0.14]
    ground_color:  [0.02, 0.02, 0.02]

camera:
  position: [0, 0.5, -6.2]
  look_at:  [0, 0.4, 0]
  fov: 42

materials:

  # ── A1: F1 — reference distanza al feature più vicino ──────────────────
  - id: "voronoi_f1"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f1"
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.02, 0.02, 0.03], interp: "linear"     }
        - { position: 0.35, color: [0.45, 0.40, 0.36], interp: "smoothstep" }
        - { position: 0.70, color: [0.88, 0.82, 0.72], interp: "linear"     }
        - { position: 1.00, color: [1.00, 0.95, 0.85], interp: "linear"     }

  # ── A2: F2−F1 — crackle classico, banda stretta ────────────────────────
  - id: "voronoi_f2mf1"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f2_minus_f1"
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.95, 0.88, 0.70], interp: "linear"     }
        - { position: 0.25, color: [0.55, 0.32, 0.18], interp: "smoothstep" }
        - { position: 1.00, color: [0.04, 0.03, 0.02], interp: "linear"     }

  # ── A3: F3−F1 — crackle largo, banda border morbida ────────────────────
  - id: "voronoi_f3mf1"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f3_minus_f1"
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.95, 0.88, 0.70], interp: "linear"     }
        - { position: 0.50, color: [0.55, 0.32, 0.18], interp: "smoothstep" }
        - { position: 1.00, color: [0.04, 0.03, 0.02], interp: "linear"     }

  # ── B1: F3 — distanza al 3° feature più vicino ─────────────────────────
  - id: "voronoi_f3"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f3"
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.05, 0.10, 0.20], interp: "linear"     }
        - { position: 0.50, color: [0.30, 0.50, 0.70], interp: "smoothstep" }
        - { position: 1.00, color: [0.85, 0.92, 1.00], interp: "linear"     }

  # ── B2: F4 — distanza al 4° feature più vicino ─────────────────────────
  - id: "voronoi_f4"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f4"
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.05, 0.10, 0.20], interp: "linear"     }
        - { position: 0.50, color: [0.30, 0.50, 0.70], interp: "smoothstep" }
        - { position: 1.00, color: [0.85, 0.92, 1.00], interp: "linear"     }

  # ── B3: Position — feature-point XYZ as RGB (random color per cell) ────
  - id: "voronoi_position"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.45
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "position"
      randomness: 1.0
      # No color_ramp — Position bypasses ramp (vector identity output).

  # ── Pavimento neutro per ricevere ombre soft ───────────────────────────
  - id: "floor"
    type: "disney"
    color: [0.32, 0.32, 0.34]
    roughness: 0.85

entities:

  # ── Pavimento ──────────────────────────────────────────────────────────
  - name: "floor"
    type: "quad"
    q: [-6, -1.3, -2.5]
    u: [12, 0, 0]
    v: [0, 0, 6]
    material: "floor"

  # ── Riga A: F1 / F2−F1 / F3−F1 ─────────────────────────────────────────
  - name: "A1_f1"
    type: "sphere"
    center: [-2.4, 1.2, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_f1"

  - name: "A2_f2mf1"
    type: "sphere"
    center: [0.0, 1.2, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_f2mf1"

  - name: "A3_f3mf1"
    type: "sphere"
    center: [2.4, 1.2, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_f3mf1"

  # ── Riga B: F3 / F4 / Position ─────────────────────────────────────────
  - name: "B1_f3"
    type: "sphere"
    center: [-2.4, -0.4, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_f3"

  - name: "B2_f4"
    type: "sphere"
    center: [0.0, -0.4, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_f4"

  - name: "B3_position"
    type: "sphere"
    center: [2.4, -0.4, 0]
    radius: 0.78
    seed: 1
    material: "voronoi_position"

lights:

  # ── Key directional 3/4-front ─────────────────────────────────────────
  - type: "-directional"
    direction: [0.4, -0.7, 0.6]
    color: [1.0, 0.96, 0.88]
    intensity: 3.6
    angular_radius: 0.6

  # ── Fill morbido dall'alto-sinistra ────────────────────────────────────
  - type: "point"
    position: [-4, 4, -3]
    color: [0.70, 0.78, 0.95]
    intensity: 60

  # ── Rim leggero dal retro ──────────────────────────────────────────────
  - type: "point"
    position: [0, 2.5, 4.5]
    color: [1.0, 0.85, 0.70]
    intensity: 35
