# Procedural (Perlin-fBm) fog showcase: spatially-varying density, irregular
# fog patches illuminated by a spot light that produces god-rays through the
# denser regions. Uses delta tracking internally.
world:
  ambient_light: [0.005, 0.005, 0.008]
  background:   [0.0, 0.0, 0.0]
  ground: { y: 0, material: floor }
  medium:
    type: procedural
    sigma_a: [0.01, 0.01, 0.01]
    sigma_s: [0.5, 0.5, 0.55]
    frequency: 0.45
    octaves: 4
    lacunarity: 2.0
    gain: 0.55
    seed: 42
    phase: hg
    g: 0.75
camera: { position: [0, 2.0, 8], look_at: [0, 1.5, 0], vup: [0,1,0], fov: 35, aperture: 0, focal_dist: 8 }
materials:
  - { id: floor, type: lambertian, albedo: [0.25, 0.22, 0.20] }
  - { id: pillar, type: lambertian, albedo: [0.55, 0.5, 0.45] }
lights:
  - type: spot
    position: [-3, 6, 2]
    direction: [0.5, -1, -0.3]
    color: [1.0, 0.92, 0.78]
    intensity: 1200
    inner_angle: 4
    outer_angle: 9
entities:
  - { type: box, scale: [0.5, 3.0, 0.5], translate: [-1.25, 1.5, -1.25], material: pillar }
  - { type: box, scale: [0.5, 3.0, 0.5], translate: [ 1.25, 1.5, -1.25], material: pillar }
  - { type: box, scale: [0.8, 1.2, 0.8], translate: [ 0.0,  0.6,  0.4 ], material: pillar }
