# ═══════════════════════════════════════════════════════════════════════════
#  Instancing Forest Showcase — Bosco con template e istanze condivise
#
#  Dimostra il feature #22 (Instancing) con scenario realistico:
#
#    ▸ 3 TEMPLATE di alberi, ciascuno = Group con 2 CSG figli
#          (tronco + chioma), ognuno a sua volta unione di più primitive
#
#    ▸ 30 ISTANZE totali (10 per template) che CONDIVIDONO la geometria
#          del template (e quindi la sua BVH) variando solo
#          translate / scale / rotate → footprint di memoria ≈ 1/10
#
#    ▸ Seed deterministico per-istanza (StableSeed): ogni albero ha una
#          texture procedurale leggermente diversa pur condividendo la
#          geometria, e il risultato è riproducibile tra run.
#
#    ▸ Materiali ereditati dal template: nessuna istanza fa override,
#          così i figli CSG mantengono i loro materiali specifici
#          (tronco scuro + chioma verde) — esattamente il comportamento
#          atteso per un set di alberi.
#
#  Render consigliato:
#    Draft : -w 400  -H 225  -s 64   -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "gradient"
    zenith_color:  [0.25, 0.45, 0.80]
    horizon_color: [0.90, 0.78, 0.60]
    ground_color:  [0.18, 0.16, 0.12]

cameras:
  # ── Panoramica a livello del suolo — guarda dentro al bosco ────────────
  - name:       panorama
    position:   [-13, 2.2, -13]
    look_at:    [2, 2.5, 2]
    fov:        55
    aperture:   0.05
    focal_dist: 18.0

  # ── Aerea — vista d'insieme, mostra la distribuzione degli alberi ─────
  - name:       aerea
    position:   [0, 22, -14]
    look_at:    [0, 0, 0]
    fov:        50
    aperture:   0.0
    focal_dist: 26.0

  # ── Close-up — per ispezionare la struttura CSG di un singolo albero ──
  - name:       closeup
    position:   [-4.5, 2.8, -10]
    look_at:    [-3, 2.8, -7]
    fov:        35
    aperture:   0.08
    focal_dist: 4.0

  # ── Radente — camminata fra i tronchi, forte profondità di campo ─────
  - name:       radente
    position:   [7.5, 1.4, 8]
    look_at:    [-1, 1.8, -2]
    fov:        50
    aperture:   0.12
    focal_dist: 12.0

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ── Terreno: prato con marble procedurale (mottled verde) ─────────────
  - id: "terreno"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 3.0
      noise_strength: 6.0
      colors: [[0.22, 0.38, 0.14], [0.32, 0.48, 0.20]]
      randomize_offset: true

  # ── TRONCHI (marroni, una variante per specie) ─────────────────────────
  #   Pino: corteccia scura, opaca
  - id: "tronco_pino"
    type: "disney"
    color: [0.22, 0.14, 0.08]
    roughness: 0.88

  #   Quercia: texture wood → anelli visibili, texture più "nobile"
  - id: "tronco_quercia"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.0
      noise_strength: 2.5
      colors: [[0.55, 0.38, 0.22], [0.28, 0.16, 0.08]]
      randomize_offset: true
      randomize_rotation: true

  #   Betulla: corteccia chiara, tipico bianco-grigio
  - id: "tronco_betulla"
    type: "disney"
    color: [0.82, 0.80, 0.75]
    roughness: 0.75

  # ── CHIOME (verdi, una variante per specie) ────────────────────────────
  #   Pino: verde scuro, opaco
  - id: "fogliame_pino"
    type: "lambertian"
    color: [0.10, 0.26, 0.12]

  #   Quercia: verde medio con texture marble per mottled fogliame
  - id: "fogliame_quercia"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 4.0
      noise_strength: 3.0
      colors: [[0.22, 0.44, 0.18], [0.32, 0.56, 0.24]]
      randomize_offset: true

  #   Betulla: verde chiaro, tendente al lime
  - id: "fogliame_betulla"
    type: "lambertian"
    color: [0.52, 0.68, 0.26]

# ═══════════════════════════════════════════════════════════════════════════
#  TEMPLATES — 3 specie d'albero, ciascuno un Group con 2 CSG figli
# ═══════════════════════════════════════════════════════════════════════════
templates:

  # ─────────────────────────────────────────────────────────────────────────
  #  1. PINO — conifera conica, chioma a cono multi-livello
  #
  #     Tronco : CSG union di cilindro principale + cono di slargamento
  #              alla base (radici affioranti).
  #     Chioma : CSG union di 3 coni sovrapposti, decrescenti verso l'alto,
  #              a formare la silhouette classica dell'abete/pino.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "pino"
    children:

      - name: "tronco"
        type: "csg"
        operation: "union"
        material: "tronco_pino"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.18
          height: 1.6
        right:
          type: "cone"
          center: [0, 0, 0]
          radius: 0.40
          top_radius: 0.18
          height: 0.35

      - name: "chioma"
        type: "csg"
        operation: "union"
        material: "fogliame_pino"
        left:
          type: "csg"
          operation: "union"
          left:
            # Livello basso, largo
            type: "cone"
            center: [0, 1.3, 0]
            radius: 1.25
            top_radius: 0.05
            height: 1.4
          right:
            # Livello medio
            type: "cone"
            center: [0, 2.2, 0]
            radius: 0.95
            top_radius: 0.05
            height: 1.3
        right:
          # Livello alto, punta
          type: "cone"
          center: [0, 3.1, 0]
          radius: 0.60
          top_radius: 0.02
          height: 1.2

  # ─────────────────────────────────────────────────────────────────────────
  #  2. QUERCIA — latifoglia dalla chioma tondeggiante e tronco robusto
  #
  #     Tronco : CSG union di cilindro largo + cono di base per lo slargo
  #              delle radici.
  #     Chioma : CSG union di 3 sfere offset, a formare una massa fogliare
  #              corposa e irregolare.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "quercia"
    children:

      - name: "tronco"
        type: "csg"
        operation: "union"
        material: "tronco_quercia"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.28
          height: 1.9
        right:
          type: "cone"
          center: [0, 0, 0]
          radius: 0.55
          top_radius: 0.28
          height: 0.45

      - name: "chioma"
        type: "csg"
        operation: "union"
        material: "fogliame_quercia"
        left:
          type: "csg"
          operation: "union"
          left:
            type: "sphere"
            center: [0, 2.8, 0]
            radius: 1.25
          right:
            type: "sphere"
            center: [0.85, 2.55, 0.20]
            radius: 0.95
        right:
          type: "sphere"
          center: [-0.70, 2.55, -0.25]
          radius: 1.05

  # ─────────────────────────────────────────────────────────────────────────
  #  3. BETULLA — alta e slanciata, chioma leggera a doppia massa
  #
  #     Tronco : CSG union di cilindro sottile ma lungo + cono di base.
  #     Chioma : CSG union di 2 sfere in verticale per suggerire il fogliame
  #              rado e alto tipico della betulla.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "betulla"
    children:

      - name: "tronco"
        type: "csg"
        operation: "union"
        material: "tronco_betulla"
        left:
          type: "cylinder"
          center: [0, 0, 0]
          radius: 0.11
          height: 2.6
        right:
          type: "cone"
          center: [0, 0, 0]
          radius: 0.25
          top_radius: 0.11
          height: 0.30

      - name: "chioma"
        type: "csg"
        operation: "union"
        material: "fogliame_betulla"
        left:
          type: "sphere"
          center: [0, 3.0, 0]
          radius: 0.85
        right:
          type: "sphere"
          center: [0.10, 3.75, -0.05]
          radius: 0.70

# ═══════════════════════════════════════════════════════════════════════════
