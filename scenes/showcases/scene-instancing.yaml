# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS — sole direzionale caldo, ombre morbide dal cielo ambientale
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # ── Sole — luce direzionale principale ─────────────────────────────────
  - type: "directional"
    direction: [-0.45, -0.80, -0.40]
    color: [1.0, 0.92, 0.78]
    intensity: 1.4

  # ── Fill freddo da nord (cielo aperto) ─────────────────────────────────
  - type: "directional"
    direction: [0.35, -0.40, 0.85]
    color: [0.70, 0.82, 1.0]
    intensity: 0.35
