world:
  sky:
    type: "gradient"
    zenith_color:  [0.6, 0.7, 0.85]
    horizon_color: [0.9, 0.9, 0.9]
    ground_color:  [0.3, 0.3, 0.3]
    sun:
      direction: [-0.8, -0.6, -0.4]
      color: [1.0, 0.98, 0.95]
      intensity: 10
      size: 5
  ground:
    type: "infinite_plane"
    material: "floor_checker"
    y: 0.0

camera:
  position:   [0, 2.5, 8.0]
  look_at:    [0, 1.2, 0]
  fov:        35
  aperture:   0.02
  focal_pos:  [0, 1.2, 0]

materials:
  # Floor with a large standard checkerboard
  - id: "floor_checker"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 2.0
      colors: [[0.8, 0.8, 0.8], [0.15, 0.15, 0.15]]

  # 1. High frequency checker
  - id: "checker_micro"
    type: "disney"
    texture:
      type: "checker"
      scale: 15.0
      colors: [[0.85, 0.25, 0.25], [0.25, 0.25, 0.85]]

  # 2. Medium scale checker
  - id: "checker_medium"
    type: "disney"
    texture:
      type: "checker"
      scale: 5.0
      colors: [[0.1, 0.6, 0.2], [0.9, 0.8, 0.2]]

  # 3. Soft contrast checker
  - id: "checker_soft"
    type: "disney"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.65, 0.60, 0.55], [0.55, 0.50, 0.45]]

entities:
  # Using large spheres to showcase how the 3D space-based checker wraps
  - type: "sphere"
    center: [-2.2, 1.2, 0.0]
    radius: 1.2
    material: "checker_micro"

  - type: "sphere"
    center: [ 0.0, 1.2, 0.0]
    radius: 1.2
    material: "checker_medium"
    
  - type: "sphere"
    center: [ 2.2, 1.2, 0.0]
    radius: 1.2
    material: "checker_soft"
