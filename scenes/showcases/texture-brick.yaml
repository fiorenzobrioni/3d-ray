world:
  sky:
    type: "gradient"
    zenith_color:  [0.45, 0.55, 0.70]
    horizon_color: [0.85, 0.80, 0.70]
    ground_color:  [0.2, 0.18, 0.15]
    sun:
      direction: [-0.6, -0.6, -0.4]
      color: [1.0, 0.95, 0.9]
      intensity: 15
      size: 3
  ground:
    type: "infinite_plane"
    material: "ground_mat"
    y: 0.0

camera:
  position:   [0, 2.0, 7.5]
  look_at:    [0, 1.2, 0]
  fov:        35
  aperture:   0.02
  focal_pos:  [0, 1.2, 0]

materials:
  - id: "ground_mat"
    type: "lambertian"
    color: [0.15, 0.15, 0.15]

  # 1. Classic Red Brick (Running Bond)
  - id: "brick_classic"
    type: "disney"
    texture:
      type: "brick"
      brick_width: 0.5
      brick_height: 0.2
      mortar_size: 0.025
      row_offset: 0.5
      color_variation: 0.3
      noise_scale: 0.0
      colors:
        - [0.65, 0.25, 0.20] # Red 1
        - [0.50, 0.18, 0.12] # Red 2
        - [0.85, 0.83, 0.78] # Mortar

  # 2. Modern Stack Bond (No offset)
  - id: "brick_stack"
    type: "disney"
    texture:
      type: "brick"
      brick_width: 0.4
      brick_height: 0.4
      mortar_size: 0.03
      row_offset: 0.0  # Stack bond (alligned)
      color_variation: 0.5
      noise_scale: 0.0
      colors:
        - [0.35, 0.35, 0.35]
        - [0.15, 0.15, 0.15]
        - [0.05, 0.05, 0.05]

  # 3. Weathered Old Brick (High noise and variation)
  - id: "brick_weathered"
    type: "disney"
    texture:
      type: "brick"
      brick_width: 0.6
      brick_height: 0.25
      mortar_size: 0.04
      row_offset: 0.5
      color_variation: 0.8
      noise_scale: 0.12 # Adds per-brick noise weathering
      colors:
        - [0.75, 0.60, 0.45]
        - [0.45, 0.35, 0.25]
        - [0.60, 0.55, 0.50]

entities:
  # Using large boxes to better show the flat wall nature of bricks
  - type: "box"
    translate: [-2.2, 1.25, -0.5]
    scale: [2.0, 2.5, 1.0]
    material: "brick_classic"

  - type: "box"
    translate: [0, 1.25, -0.5]
    scale: [2.0, 2.5, 1.0]
    material: "brick_stack"
    
  - type: "box"
    translate: [ 2.2, 1.25, -0.5]
    scale: [2.0, 2.5, 1.0]
    material: "brick_weathered"
