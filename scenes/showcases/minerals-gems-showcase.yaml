# ═══════════════════════════════════════════════════════════════════════════
#  Minerals & Gems Showcase — Cristalli e Minerali Grezzi
#
#  Dimostra 5 materiali della libreria `minerals-gems.yaml`, ciascuno per
#  una feature differente:
#
#    x=-4.8  Drusa di quarzo            → vector displacement tangent-space
#    x=-2.4  Ametista grezza             → spec_trans + color_ramp 3-stop
#    x=  0   Opale di fuoco              → thin_film + transmission + SSS
#    x=+2.4  Fluorite rainbow            → color_ramp 5-stop + spec_trans
#    x=+4.8  Pirite cubica               → metallic 0.85 + anisotropic
#
#  Le gemme trasparenti richiedono `-d 12+` per propagare correttamente
#  riflessioni interne e dispersione.
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 64   -d 10 -S 1
#    Finale: -w 1920 -H 1080 -s 2048 -d 14 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/minerals-gems.yaml" }

world:
  sky:
    type: "flat"
    color: [0.04, 0.04, 0.05]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.10, 0.10, 0.12]
    roughness: 0.40
    specular: 0.45

  - id: "backdrop"
    type: "disney"
    color: [0.06, 0.06, 0.08]
    roughness: 0.92

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - { name: "drusa",     type: "sphere", center: [-4.8, 0.9, 0], radius: 0.9, seed:  3, material: "dis_drusa_quarzo"      }
  - { name: "ametista",  type: "sphere", center: [-2.4, 0.9, 0], radius: 0.9, seed: 11, material: "dis_ametista_grezza"   }
  - { name: "opale",     type: "sphere", center: [ 0.0, 0.9, 0], radius: 0.9, seed: 19, material: "dis_opale_fuoco"       }
  - { name: "fluorite",  type: "sphere", center: [ 2.4, 0.9, 0], radius: 0.9, seed: 29, material: "dis_fluorite_rainbow"  }
  - { name: "pirite",    type: "sphere", center: [ 4.8, 0.9, 0], radius: 0.9, seed: 37, material: "dis_pirite_cubica"     }

lights:

  # Key direzionale: simulazione luce museo, intensa e puntuale.
  - type: "directional"
    direction: [-0.5, -0.7, 0.3]
    color: [1.0, 0.98, 0.95]
    intensity: 6.0
    angular_radius: 0.4

  # Sphere light frontale per le riflessioni interne dei cristalli.
  - type: "sphere"
    position: [-3, 4, -4]
    radius: 0.5
    color: [1.0, 1.0, 0.95]
    intensity: 15

  # Rim caldo dietro per separare dal nero. I cristalli trasparenti
  # devono mostrare la struttura interna illuminata da dietro.
  - type: "point"
    position: [0, 3, 5]
    color: [1.0, 0.85, 0.65]
    intensity: 60
