# ═══════════════════════════════════════════════════════════════════════════
#  Glass Features Showcase — Vetri e Gemme Sezione v2
#
#  Dimostra 6 vetri/gemme della sezione EXTENDED VFX in `glasses.yaml`:
#
#    x=-5.0  Vetro iridescente       → thin_film 480nm
#    x=-3.0  Ghiaccio fratturato     → smooth voronoi f1_plus_f2
#    x=-1.0  Vetro soffiato a mano   → displacement scalare imperfezioni
#    x=+1.0  Smeraldo v2             → color_ramp 3-stop zonazione
#    x=+3.0  Zaffiro v2              → thin_film 540nm sleep silk
#    x=+5.0  Diamante brilliant      → ior 2.418
#
#  I vetri trasparenti richiedono `-d 14+` per dispersione e riflessioni
#  multiple interne corrette.
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 128  -d 12 -S 1
#    Finale: -w 1920 -H 1080 -s 2048 -d 16 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.18, 0.18, 0.22]

camera:
  position: [0, 2.0, -5.0]
  look_at:  [0, 1.5, 0]
  fov: 45

materials:
  - id: "floor"
    type: "disney"
    color: [0.15, 0.15, 0.15]
    roughness: 0.50
    specular: 0.35

  - id: "backdrop"
    type: "disney"
    color: [0.55, 0.55, 0.58]
    roughness: 0.80

  # ─── Vetri / gemme (inline, autosufficienti) ──────────────────────────────
  - id: "dis_vetro_iridescente"
    type: "disney"
    color: [0.95, 0.95, 0.97]
    roughness: 0.05
    specular: 0.55
    spec_trans: 0.92
    ior: 1.52
    transmission_color: [0.95, 0.95, 0.97]
    transmission_depth: 1.5
    thin_film_thickness: 480
    thin_film_ior: 1.45

  - id: "dis_ghiaccio_fratturato"
    type: "disney"
    color: [0.88, 0.92, 0.98]
    subsurface_radius: [1.0, 1.2, 1.5]
    subsurface_anisotropy: 0.9
    roughness: 0.18
    specular: 0.50
    spec_trans: 0.78
    ior: 1.31
    transmission_color: [0.85, 0.92, 0.98]
    transmission_depth: 1.2
    texture:
      type: "voronoi"
      scale: 6.0
      output: "f1_plus_f2"
      smoothness: 0.3
      colors: [[0.72, 0.82, 0.92], [0.95, 0.97, 1.00]]

  - id: "dis_vetro_soffiato"
    type: "disney"
    color: [0.92, 0.94, 0.95]
    roughness: 0.04
    spec_trans: 0.95
    ior: 1.52
    specular: 0.55
    transmission_color: [0.92, 0.94, 0.95]
    transmission_depth: 2.0
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        scale: 3.0
        noise_type: "fbm"
        octaves: 3
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.003
      midlevel: 0.5
      bound: 0.006
      autobump: true
      displacement_method: "bump_only"

  - id: "dis_smeraldo"
    type: "disney"
    color: [0.18, 0.62, 0.32]
    roughness: 0.05
    specular: 0.60
    spec_trans: 0.92
    ior: 1.580
    transmission_color: [0.08, 0.55, 0.22]
    transmission_depth: 0.4
    texture:
      type: "noise"
      scale: 2.5
      noise_type: "fbm"
      octaves: 3
      noise_strength: 0.25
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.05, 0.35, 0.15], interp: "smoothstep" }
        - { position: 0.55, color: [0.22, 0.62, 0.32], interp: "smoothstep" }
        - { position: 1.00, color: [0.45, 0.85, 0.55], interp: "linear" }

  - id: "dis_zaffiro_blu"
    type: "disney"
    color: [0.10, 0.22, 0.62]
    roughness: 0.04
    spec_trans: 0.92
    ior: 1.770
    specular: 0.60
    transmission_color: [0.05, 0.15, 0.55]
    transmission_depth: 0.3
    thin_film_thickness: 540
    thin_film_ior: 1.55

  - id: "dis_diamante_brilliant"
    type: "disney"
    color: [0.98, 0.98, 0.98]
    roughness: 0.02
    specular: 0.65
    spec_trans: 1.0
    ior: 2.418
    transmission_color: [0.98, 0.98, 0.98]
    transmission_depth: 2.5

entities:

  - { name: "floor", type: "quad", q: [-12, 0, -4], u: [24, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-12, 0,  6], u: [24, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "iride"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [-2.0, 2.2, 0]
    seed: 3
    material: "dis_vetro_iridescente"
  - name: "ice"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [0.0, 2.2, 0]
    seed: 11
    material: "dis_ghiaccio_fratturato"
  - name: "soffiato"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [2.0, 2.2, 0]
    seed: 19
    material: "dis_vetro_soffiato"
  - name: "smeraldo"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [-2.0, 0.65, 0]
    seed: 29
    material: "dis_smeraldo"
  - name: "zaffiro"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [0.0, 0.65, 0]
    seed: 37
    material: "dis_zaffiro_blu"
  - name: "diamante"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.95, 0.95, 0.95]
    translate: [2.0, 0.65, 0]
    seed: 43
    material: "dis_diamante_brilliant"

lights:
  - type: "directional"
    direction: [-0.4, -0.6, 0.5]
    color: [1.0, 0.98, 0.95]
    intensity: 7.0
    angular_radius: 0.4

