# ═══════════════════════════════════════════════════════════════════════════
#  SSS RANDOM WALK — Galleria del Marmo
#
#  Composizione cinematografica da galleria museale per evidenziare il
#  random-walk subsurface scattering su tre marmi spettralmente diversi:
#
#    • Carrara hero (centrale, sotto campana di vetro)   — SSS bianco-caldo
#    • Rosso Levanto (sinistra, leggermente indietro)      — SSS rosso ambra
#    • Verde Guatemala (destra, leggermente indietro)  — SSS verde profondo
#
#  Caratteristiche dimostrate:
#    1. Random-walk SSS per il colore di volume (σ_a spettralmente sbilanciato).
#       Il `color` della Disney resta neutro [1,1,1]; tutto il colore arriva
#       dal medium.
#    2. Texture marble procedurale come `roughness_texture` (output: mask) →
#       le vene appaiono come bande lucido/satinato sulla superficie senza
#       conflitto con `spec_trans: 1.0`.
#    3. MediumStack push/pop attraverso vetro nidificato (campana sul Carrara):
#       Enter vetro → walk vuoto → Enter marmo → walk SSS → Exit marmo → Exit vetro.
#    4. Area light tutte `visible_to_camera: false` (no pannelli fluttuanti).
#
#  Profili consigliati:
#    Preview  (10–30 s):    -q draft-small  --sss-quality preview
#    Standard (~3 min):     -q medium-small --sss-quality normal  -C 25
#    Final    (~20–40 min): -q final-small  --sss-quality high    -C 25
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: gradient
    zenith_color:  [0.004, 0.005, 0.008]
    horizon_color: [0.025, 0.025, 0.030]
    ground_color:  [0.008, 0.008, 0.010]
  ground:
    type: infinite_plane
    material: pavimento_satin
    y: 0.0

commented_world:
  sky:
    type: "gradient"
    zenith_color:  [0.005, 0.005, 0.020]
    horizon_color: [0.020, 0.020, 0.045]
    ground_color:  [0.005, 0.005, 0.010]
    intensity: 1.0
    sun:                                # the "sun" here is the moon
      direction:      [-0.4, 0.6, -0.7]
      color:          [0.70, 0.75, 0.90] # cool blue moonlight
      intensity:      3.0
      angular_radius: 0.5
      limb_darkening: false
      shadow_samples: 4
  ground:
    type: "infinite_plane"
    color:    [0.06, 0.07, 0.10]
    roughness: 0.65
    metallic:  0.0

camera:
  position:   [0.0, 1.10, 2.40]
  look_at:    [0.0, 0.60, 0.30]
  vup:        [0, 1, 0]
  fov:        40
  aperture:   0.02
  focal_pos:  [0.0, 0.80, 0.30]

# ── Mediums: il colore SSS arriva da qui, NON dal `color` materiale ────────
#  Le σ_s sono tenute alte (8–14) perché le sfere hanno raggio piccolo
#  (0.25–0.30) — con σ_s bassi, il walk fa solo ~1–2 eventi e il filtro
#  spettrale resta debolissimo. Con σ_s ~12 e radius 0.25, il walk attraversa
#  ~5–7 mfp e la firma cromatica diventa nitida.
mediums:
  # Marmo bianco Carrara — σ_s alti, σ_a quasi nullo → albedo ~1 → bianco brillante
  - id: med_carrara
    type: homogeneous
    sigma_a: [0.008, 0.014, 0.025]
    sigma_s: [9.0,   10.0,  11.0]
    phase: hg
    g: 0.0

  # Rosso Levanto: assorbimento G/B molto aggressivo, scatter R altissimo
  - id: med_rosso
    type: homogeneous
    sigma_a: [0.10, 3.80, 5.50]
    sigma_s: [14.0, 4.0,  3.0]
    phase: hg
    g: 0.0

  # Verde Guatemala: assorbimento R/B aggressivo, scatter G altissimo
  - id: med_verde
    type: homogeneous
    sigma_a: [4.00, 0.08, 4.50]
    sigma_s: [5.0,  16.0, 5.0]
    phase: hg
    g: 0.0

# ── Materiali ──────────────────────────────────────────────────────────────
materials:
  # ── Pavimento satin scuro ────────────────────────────────────────────────
  - id: pavimento_satin
    type: disney
    color: [0.05, 0.05, 0.06]
    roughness: 0.18
    specular: 0.5

  # ── Pedistalli neutri scuri (separano i marmi dal pavimento) ─────────────
  - id: pedestal_dark
    type: disney
    color: [0.08, 0.08, 0.09]
    roughness: 0.30
    specular: 0.4

  # ─────────────────────────────────────────────────────────────────────────
  #  Marmo Carrara — superficie Disney rifrattiva con roughness modulata
  #  da marble mask (vene = bande più lucide). Il colore SSS arriva dal medium.
  # ─────────────────────────────────────────────────────────────────────────
  - id: marmo_carrara_surf
    type: disney
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.50
    roughness: 0.22                # baseline; la mask modula
    specular: 0.5
    texture:
      type: marble
      scale: 4.0
      vein_layers: 2
      vein_scale:     [1.0, 2.4]
      vein_weight:    [1.0, 0.55]
      vein_thickness: 0.18
      vein_softness:  0.08
      warp_amplitude: 0.35
      warp_iterations: 2
      cracks_density: 0.30
      cracks_scale:   3.5
      cracks_softness: 0.045
      cracks_weight:   0.55
      color_ramp:
        - { position: 0.0, color: [0.92, 0.91, 0.89] }  # bianco Carrara caldo
        - { position: 0.35, color: [0.60, 0.58, 0.55] } # transizione grigio
        - { position: 0.65, color: [0.22, 0.20, 0.18] } # vena grigio scuro
        - { position: 1.0, color: [0.07, 0.06, 0.05] }  # vena quasi nera
    roughness_texture:
      type: marble
      output: mask
      scale: 4.0
      vein_layers: 2
      vein_scale:   [1.0, 2.4]
      vein_weight:  [1.0, 0.55]
      vein_thickness: 0.18
      vein_softness:  0.08
      warp_amplitude: 0.35
      warp_iterations: 2
      cracks_density: 0.30
      cracks_scale: 3.5
      cracks_softness: 0.045
      cracks_weight: 0.55
      color_ramp:
        - { position: 0.0, color: [0.22, 0.22, 0.22] }   # base: roughness 0.22
        - { position: 1.0, color: [0.09, 0.09, 0.09] }   # vene: roughness 0.09

  # ─────────────────────────────────────────────────────────────────────────
  #  Rosso Levanto — vene più tormentate, base più matte
  # ─────────────────────────────────────────────────────────────────────────
  - id: marmo_rosso_surf
    type: disney
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.50
    roughness: 0.25
    specular: 0.5
    roughness_texture:
      type: marble
      output: mask
      scale: 5.0
      vein_layers: 2
      vein_scale:   [0.9, 2.6]
      vein_weight:  [1.0, 0.60]
      vein_thickness: 0.22
      vein_softness:  0.10
      warp_amplitude: 0.45
      warp_iterations: 2
      cracks_density: 0.55
      cracks_scale: 4.0
      cracks_softness: 0.05
      cracks_weight: 0.7
      color_ramp:
        - { position: 0.0, color: [0.25, 0.25, 0.25] }
        - { position: 1.0, color: [0.10, 0.10, 0.10] }

  # ─────────────────────────────────────────────────────────────────────────
  #  Verde Guatemala — 3-layer veining per look stratificato
  # ─────────────────────────────────────────────────────────────────────────
  - id: marmo_verde_surf
    type: disney
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.50
    roughness: 0.22
    specular: 0.5    
    roughness_texture:
      type: marble
      output: mask
      scale: 4.5
      vein_layers: 3
      vein_scale:   [0.8, 2.0, 4.2]
      vein_weight:  [1.0, 0.65, 0.35]
      vein_thickness: 0.20
      vein_softness:  0.08
      warp_amplitude: 0.30
      warp_iterations: 2
      cracks_density: 0.4
      cracks_scale: 3.8
      cracks_softness: 0.05
      cracks_weight: 0.5
      color_ramp:
        - { position: 0.0, color: [0.22, 0.22, 0.22] }
        - { position: 1.0, color: [0.08, 0.08, 0.08] }

  # ── Campana di vetro ──────────────
  - id: vetro_campana
    type: "disney"
    color: [0.98, 0.99, 1.0]
    roughness: 0.0
    specular: 0.55
    spec_trans: 0.98
    ior: 1.52

  - id: vetro_campana_2
    type: "disney"
    color: [0.98, 0.99, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52
    specular: 0.8

# ── Luci: 3-point, tutte invisibili alla camera ────────────────────────────
lights:
  # Key calda da alto-destra (3/4)
  - type: area
    corner:    [ 1.4,  2.6,  0.4]
    u:         [ 1.4,  0.0,  0.0]
    v:         [ 0.0,  0.0,  1.4]
    color:     [1.00, 0.94, 0.82]
    intensity: 36
    visible_to_camera: false

  # Fill freddo da sinistra
  - type: area
    corner:    [-2.4,  1.4, -0.4]
    u:         [ 1.4,  0.0,  0.0]
    v:         [ 0.0,  0.0,  1.2]
    color:     [0.62, 0.75, 1.00]
    intensity: 10
    visible_to_camera: false

  # Rim posteriore — silhouette i marmi sul fondo scuro
  - type: area
    corner:    [-0.8,  2.2, -2.2]
    u:         [ 1.6,  0.0,  0.0]
    v:         [ 0.0,  0.6,  0.0]
    color:     [1.00, 0.92, 0.78]
    intensity: 16
    visible_to_camera: false

# ── Entità ─────────────────────────────────────────────────────────────────
entities:
  # ── Pedistallo hero centrale (Carrara) ───────────────────────────────────
  - name: pedestal_centro
    type: cylinder
    center: [0.0, 0.0, 0.30]
    radius: 0.20
    height: 0.50
    material: pedestal_dark

  # ── Marmo Carrara hero — sfera + medium SSS (no dome → pulito al centro) ─
  - name: carrara_hero
    type: sphere
    center: [0.0, 0.80, 0.30]
    radius: 0.30
    material: marmo_carrara_surf
    interior_medium: med_carrara

  # ── Pedistallo sinistra (Rosso Levanto) ────────────────────────────────────
  - name: pedestal_destra
    type: cylinder
    center: [1.0, 0.0, -0.30]
    radius: 0.18
    height: 0.40
    material: pedestal_dark

  - name: rosso_levanto
    type: sphere
    center: [1.0, 0.65, -0.30]
    radius: 0.25
    material: marmo_rosso_surf
    interior_medium: med_rosso

  # ── Pedistallo destra (Verde Guatemala, sotto campana di vetro) ────────
  - name: pedestal_sinistra
    type: cylinder
    center: [-1.0, 0.0, -0.30]
    radius: 0.18
    height: 0.40
    material: pedestal_dark

  - name: verde_guatemala
    type: sphere
    center: [-1.0, 0.65, -0.30]
    radius: 0.25
    material: marmo_verde_surf
    interior_medium: med_verde

  # ── Campana di vetro sul Rosso
  - name: campana_vetro_1
    type: csg
    operation: "subtraction"
    left:
      type: sphere
      center: [1.0, 0.65, -0.30]
      radius: 0.4
    right:
      type: sphere
      center: [1.0, 0.65, -0.30]
      radius: 0.36
    material: vetro_campana

  # ── Campana di vetro sul Verde
  - name: campana_vetro_2
    type: csg
    operation: "subtraction"
    left:
      type: sphere
      center: [-1.0, 0.65, -0.30]
      radius: 0.4
    right:
      type: sphere
      center: [-1.0, 0.65, -0.30]
      radius: 0.36
    material: vetro_campana
