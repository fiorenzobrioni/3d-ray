# Scena di verifica caustiche — caster curvi + CSG su pavimento scuro, luce angolata.
# Uso diagnostico (on/off + delta map). NON è uno showcase.
camera:
  position: [0, 7.5, 7.0]
  look_at:  [0, 0.2, -0.3]
  fov: 50

world:
  sky:
    type: "flat"
    color: [0.0, 0.0, 0.0]
  ground:
    type: "infinite_plane"
    material: "darkfloor"
    y: 0.0

lights:
  # Area light alta e angolata da -Z (davanti) → i casters rifrangono verso il pavimento dietro/sotto.
  - type: area
    corner: [-1.0, 5.0, -3.6]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 1.4, 0.0]
    color: [1.0, 0.97, 0.92]
    intensity: 120.0
    shadow_samples: 6

materials:
  - id: "darkfloor"
    type: "lambertian"
    color: [0.12, 0.12, 0.13]

  - id: "glass"
    type: "dielectric"
    refraction_index: 1.5
    color: [.98, .98, 1]

  - id: "glass_red"
    #type: "dielectric"
    #refraction_index: 1.5
    #color: [1, 0, 0]
    type: "disney"
    color: [1, 0, 0]
    roughness: 0.01
    specular: 0
    spec_trans: 0.92
    ior: 1.5

  - id: "glass_green"
    type: "dielectric"
    refraction_index: 1.5
    color: [0, 1, 0]

  - id: "glass_blue"
    type: "dielectric"
    refraction_index: 1.5
    color: [0, 0, 1]

  - id: "glass_yellow"
    type: "dielectric"
    refraction_index: 1.5
    color: [1, 1, 0]

entities:
  - name: "sphere"
    type: "sphere"
    radius: 0.6
    material: "glass_blue"
    translate: [-4.2, 0.9, 0]

  - name: "cylinder"
    type: "cylinder"
    radius: 0.55
    height: 1.3
    material: "glass_red"
    rotate: [0, 0, 90]
    translate: [-1.5, 0.85, 0]

  - name: "cone"
    type: "cone"
    radius: 0.7
    top_radius: 0.16
    height: 1.4
    material: "glass"
    rotate: [0, 0, 90]
    translate: [0.7, 0.8, 0]

  - name: "torus"
    type: "torus"
    major_radius: 0.60
    minor_radius: 0.27
    rotate: [90, 0, 0]
    translate: [2.2, 0.15, 0]
    material: "glass_green"

  # CSG: sfera ∩ box grande = dado arrotondato
  - name: "csg"
    type: "csg"
    operation: "intersection"
    material: "glass_yellow"
    left:  { type: "sphere", radius: 0.7 }
    right: { type: "box", scale: [1, 1, 1] }
    translate: [4.4, 0.8, 0.0]
