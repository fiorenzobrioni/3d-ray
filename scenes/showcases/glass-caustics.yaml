# Scena di verifica caustiche — caster curvi + CSG su pavimento scuro, luce angolata.
# Uso diagnostico (on/off + delta map). NON è uno showcase.
camera:
  position: [0, 7.5, 7.0]
  look_at:  [0, 0.2, -0.3]
  fov: 50

world:
  sky:
    type: "flat"
    color: [0.0, 0.0, 0.0]
  ground:
    type: "infinite_plane"
    material: "darkfloor"
    y: 0.0

lights:
  # Area light alta e angolata da -Z (davanti) → i casters rifrangono verso il pavimento dietro/sotto.
  - type: area
    corner: [-1.0, 5.0, -3.6]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 1.4, 0.0]
    color: [1.0, 0.97, 0.92]
    intensity: 120.0
    shadow_samples: 6

materials:
  - id: "darkfloor"
    type: "lambertian"
    color: [0.12, 0.12, 0.13]
  - id: "glass"
    type: "dielectric"
    refraction_index: 1.5

entities:
  - name: "sphere"
    type: "sphere"
    radius: 0.6
    material: "glass"
    translate: [-4.2, 0.9, 0]

  - name: "cylinder"
    type: "cylinder"
    radius: 0.55
    height: 1.3
    material: "glass"
    rotate: [0, 0, 90]
    translate: [-1.5, 0.85, 0]

  - name: "cone"
    type: "cone"
    radius: 0.7
    top_radius: 0.16
    height: 1.4
    material: "glass"
    rotate: [0, 0, 90]
    translate: [0.7, 0.8, 0]

  - name: "torus"
    type: "torus"
    major_radius: 0.60
    minor_radius: 0.27
    rotate: [90, 0, 0]
    translate: [2.2, 0.15, 0]
    material: "glass"

  # CSG: sfera ∩ box grande = dado arrotondato
  - name: "csg"
    type: "csg"
    operation: "intersection"
    material: "glass"
    left:  { type: "sphere", radius: 0.7 ,translate: [3.0, 0.8, 2.2]}
    right: { type: "box", scale: [1, 1, 1] ,translate: [3.0, 0.8, 2.2]}

  # CSG: stelo bicchiere
  - name: "base_stelo"
    type: "csg"
    operation: "union"
    material: "glass"
    left:
      type: "cylinder"
      radius: 0.58
      height: 0.05
    right:
      type: "cylinder"
      radius: 0.045
      height: 0.64
    translate: [4.4, 0.1, 0.0]

  # CSG: coppa bicchiere
  - name: "coppa"
    type: "csg"
    operation: "subtraction"
    material: "glass"
    left:
      type: "csg"
      operation: "subtraction"
      left:
        type: "sphere"
        radius: 0.76
      right:
        type: "sphere"
        radius: 0.74
    right:
      type: "box"
      scale: [4, 2.60, 4]
      translate: [0.0, 1.6, 0.0]
    translate: [4.4, 1.5, 0.0]
