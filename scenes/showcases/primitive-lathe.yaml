# ============================================================================
# Scene: Lathe Showcase
# Tests: Lathe primitive — linear, Catmull-Rom and Bezier profiles, plus a
#        Bezier emissive bowl exercising the NEE path through ISamplable.
# ============================================================================

camera:
  position: [0, 3, -6]
  look_at: [0, 1.2, 0]
  fov: 42
  aperture: 0.0

world:
  sky:
    type: "gradient"
    zenith_color: [0.04, 0.05, 0.10]
    horizon_color: [0.12, 0.12, 0.18]
    ground_color: [0.03, 0.03, 0.04]
  ground:
    type: "plane"
    material: "pavimento"
    y: 0

materials:
  - id: "pavimento"
    type: "lambertian"
    texture: { type: "noise", scale: 6.0, noise_strength: 4.0, colors: [[0.45, 0.32, 0.18], [0.32, 0.22, 0.12]], randomize_offset: true }

    #type: "metal"
    #fuzz: 0.12
    #texture: { type: "checker", colors: [[0.90, 0.88, 0.85], [0.06, 0.06, 0.07]], scale: 1.5 }

    #type: "lambertian"
    #texture: { type: "checker", colors: [[0.85, 0.80, 0.70], [0.55, 0.25, 0.15]], scale: 1.5 }

    #type: "disney"
    #roughness: 0.85
    #texture:
    #  type: "checker"
    #  colors: [[0.10, 0.10, 0.11], [0.22, 0.22, 0.23]]
    #  scale: 0.7

  # ── Ceramic vase (Catmull-Rom) ───────────────────────────────────────────
  - id: "porcellana"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.8
    clearcoat: 0.4
    coat_roughness: 0.10
    subsurface: 0.15

    #type: "disney"
    #color: [0.94, 0.92, 0.88]
    #roughness: 0.25
    #specular: 0.6

  # ── Faceted column (linear) — the turned-by-hand look ────────────────────
  - id: "marmo"
    type: "disney"
    texture:
      type: "marble"
      scale: 15.0
      noise_strength: 12.0
      colors: [[0.96, 0.95, 0.94], [0.42, 0.43, 0.48]]
      randomize_offset: true
    roughness: 0.10
    clearcoat: 0.90
    coat_roughness: 0.05
    specular: 0.72
    subsurface: 0.08

    #type: "disney"
    #texture:
    #  type: "marble"
    #  scale: 15.0
    #  noise_strength: 12.0
    #  colors: [[0.96, 0.95, 0.94], [0.42, 0.43, 0.48]]
    #  randomize_offset: true
    #roughness: 0.10
    #clearcoat: 0.90
    #coat_roughness: 0.05
    #specular: 0.72
    #subsurface: 0.08

    #type: "disney"
    #color: [0.88, 0.86, 0.82]
    #roughness: 0.35

  # ── Glass chalice (Catmull-Rom) ──────────────────────────────
  - id: "cristallo"
    type: "disney"
    color: [0.99, 0.99, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.8
    specular: 0.95

    #type: "dielectric"
    #refraction_index: 1.5

lights:
  - type: "directional"
    direction: [0.3, -0.6, 0.5]
    color: [0.6, 0.65, 0.85]
    intensity: 0.15

  - type: "point"
    position: [-3, 4, -2]
    color: [0.5, 0.55, 0.80]
    intensity: 20

entities:
  # ═════════════════════════════════════════════════════════════════════════
  # 1. Ceramic Ming-style vase — centripetal Catmull-Rom
  # ═════════════════════════════════════════════════════════════════════════
  - name: "vaso"
    type: "lathe"
    profile_type: "catmull_rom"
    material: "porcellana"
    translate: [-2.8, 0, 0]
    profile:
      - [0.00, 0.00]
      - [0.35, 0.00]
      - [0.55, 0.10]
      - [0.80, 0.30]
      - [0.95, 0.55]
      - [0.75, 0.90]
      - [0.55, 1.30]
      - [0.45, 1.70]
      - [0.55, 2.00]
      - [0.60, 2.10]
      - [0.40, 2.15]
      - [0.00, 2.15]

  # ═════════════════════════════════════════════════════════════════════════
  # 2. Faceted doric-style column — linear profile (faceted ridges)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "colonna"
    type: "lathe"
    profile_type: "linear"
    material: "marmo"
    translate: [0, 0, 0]
    profile:
      - [0.00, 0.00]
      - [0.55, 0.00]
      - [0.55, 0.10]
      - [0.48, 0.15]
      - [0.42, 0.25]
      - [0.42, 2.00]
      - [0.48, 2.10]
      - [0.55, 2.15]
      - [0.55, 2.25]
      - [0.00, 2.25]

  # ═════════════════════════════════════════════════════════════════════════
  # 3. Glass chalice — smooth Catmull-Rom with a refractive material
  # ═════════════════════════════════════════════════════════════════════════

  - name: "calice_1"
    type: "csg"
    operation: "subtraction"
    left:
      type: "lathe"
      profile_type: "catmull_rom"
      profile:
        - [0.00, 0.00]
        - [0.45, 0.00]
        - [0.40, 0.05]
        - [0.08, 0.10]
        - [0.08, 0.60]
        - [0.20, 0.80]
        - [0.55, 1.20]
        - [0.55, 1.65]
        - [0.50, 1.75]
        - [0.00, 1.75]
    right:
      type: "lathe"
      profile_type: "catmull_rom"
      profile:
        - [0.00, 0.80]
        - [0.54, 1.20]
        - [0.54, 1.65]
        - [0.49, 1.75]
        - [0.00, 1.78]
    translate: [2.6, 0, 0]
    rotate: [0, 0, 0]
    material: "cristallo"



  - name: "calice"
    type: "-lathe"
    profile_type: "catmull_rom"
    material: "cristallo"
    translate: [2.6, 0, 0]
    profile:
      - [0.00, 0.00]
      - [0.45, 0.00]
      - [0.40, 0.05]
      - [0.08, 0.10]
      - [0.08, 0.60]
      - [0.20, 0.80]
      - [0.55, 1.20]
      - [0.55, 1.65]
      - [0.50, 1.75]
      - [0.00, 1.75]

  - name: "calice_2"
    type: "-lathe"
    profile_type: "catmull_rom"
    material: "porcellana"
    translate: [2.6, 0, 0]
    profile:
      - [0.00, 0.80]
      - [0.18, 0.80]
      - [0.54, 1.20]
      - [0.54, 1.65]
      - [0.49, 1.75]
      - [0.00, 1.78]

  # ═════════════════════════════════════════════════════════════════════════
  # 4. Bowl.
  #    Two segments: base (r = 0 → 0.55) and bowl wall (0.55 → 0.65 → 0).
  # ═════════════════════════════════════════════════════════════════════════
  - name: "ciotola"
    type: "-lathe"
    profile_type: "bezier"
    material: "porcellana"
    translate: [1.5, 0.05, 3.0]
    profile:
      - [0.00, 0.00]
      - [0.55, 0.30]
      - [0.00, 0.65]
    profile_bezier_controls:
      # Segment A — base rises from the axis to the bowl lip
      - [0.00, 0.00]
      - [0.30, 0.00]
      - [0.50, 0.10]
      - [0.55, 0.30]
      # Segment B — bowl wall curves up and back to the axis
      - [0.55, 0.30]
      - [0.60, 0.45]
      - [0.40, 0.65]
      - [0.00, 0.65]
