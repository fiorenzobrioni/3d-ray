# ═══════════════════════════════════════════════════════════════════════════
#  SSS RANDOM WALK #01 — Busto in marmo bianco
#
#  Showcase del subsurface scattering volumetrico via `interior_medium`.
#  Un busto schematico (sfera-testa + sfera-collo + cilindro-piedistallo)
#  in marmo Carrara, illuminato da un'area light calda di tre quarti.
#
#  Il marmo è un Disney BSDF lambert + clearcoat sottile sulla superficie,
#  con il vero SSS prodotto dal medium volumetrico legato all'interno
#  delle due sfere: σ_a basso + σ_s alto + isotropic phase → la luce
#  entra dalla zona illuminata e RIESCE dalle zone in ombra, scaldando
#  il bordo del naso, della guancia e dell'orecchio. Coefficienti σ
#  derivati dal preset Jensen 2001 "marble".
#
#  La superficie usa `spec_trans: 1.0` e `ior: 1.5`: il raggio entra
#  davvero per refrazione, il random walk lo trasporta nel volume, e
#  la BSDF di uscita applica il Fresnel di re-entry. È il cammino
#  completo, non un effetto cosmetico sul lobe diffuse.
#
#  Profili di rendering:
#    Preview:    -q draft-small     (~10-30 s)
#    Standard:   -q medium-small    (~1-3 min)
#    Final:      -q final-small     (qualche minuto, look pulito)
#    Showcase:   -q final           (1920×1080, portfolio)
#
#  Knobs SSS dedicati (CLI):
#    --sss-mode auto|off            (default auto)
#    --sss-quality preview|normal|high
#    --max-volume-bounces N
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "gradient"
    zenith_color:  [0.020, 0.025, 0.035]
    horizon_color: [0.060, 0.060, 0.070]
    ground_color:  [0.015, 0.015, 0.018]
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0.0

camera:
  position: [1.4, 1.55, 3.6]
  look_at:  [0.0, 1.10, 0.0]
  vup:      [0, 1, 0]
  fov:      35
  aperture: 0.04
  focal_dist: 3.8

# ── Libreria mediums: il marmo come volume ─────────────────────────────────
#  Jensen 2001 "marble": σ_a ≈ [0.0021, 0.0041, 0.0071]·units⁻¹
#                        σ_s ≈ [2.19, 2.62, 3.00]·units⁻¹  (g = 0)
#  Albedo singolo-scatter ≈ 0.999/0.998/0.997 — quasi totalmente scattering,
#  con la leggera deriva spettrale rossa che dà al marmo il suo colore
#  caratteristico nelle zone ombrose.
mediums:
  - id: marble_int
    type: homogeneous
    sigma_a: [0.0021, 0.0041, 0.0071]
    sigma_s: [2.19,   2.62,   3.00]
    phase: hg
    g: 0.0

materials:
  # Marmo Carrara: superficie quasi specchio-trasparente, il "colore" arriva dal volume.
  - id: marble_surface
    type: disney
    color: [1.0, 1.0, 1.0]
    roughness: 0.18
    specular: 0.5
    spec_trans: 1.0
    ior: 1.5
    clearcoat: 0.0

  - id: pavimento
    type: disney
    color: [0.22, 0.21, 0.20]
    roughness: 0.55
    specular: 0.30

  - id: piedistallo_mat
    type: disney
    color: [0.12, 0.11, 0.10]
    roughness: 0.35
    specular: 0.40

lights:
  # Key: area calda tre quarti destra-alta — modella i piani del volto e
  # spinge la luce dentro la guancia/orecchio per il color bleed SSS.
  # u × v deve puntare verso il basso (normale -Y): con u=+X, v=+Z.
  # visible_to_camera: false → la proxy emissiva del rect non appare nel frame
  # come "pannello fluttuante", ma resta visibile a NEE e ai bounce indiretti.
  - type: "area"
    corner:    [ 1.4,  2.6, -0.3]
    u:         [ 1.4,  0.0,  0.0]
    v:         [ 0.0,  0.0,  1.4]
    color:     [1.00, 0.92, 0.78]
    intensity: 38
    visible_to_camera: false

  # Fill freddo da sinistra — apre le ombre senza appiattire.
  - type: "area"
    corner:    [-2.2,  1.8, -0.6]
    u:         [ 1.2,  0.0,  0.0]
    v:         [ 0.0,  0.0,  1.0]
    color:     [0.66, 0.78, 1.00]
    intensity: 9
    visible_to_camera: false

entities:
  # Piedistallo: cilindro non legato a medium (esterno).
  - name: "piedistallo"
    type: "cylinder"
    center: [0, 0.30, 0]
    radius: 0.55
    height: 0.60
    material: "piedistallo_mat"

  # Collo: sfera marble + medium interior.
  - name: "collo"
    type: "sphere"
    center: [0, 0.92, 0]
    radius: 0.34
    material: "marble_surface"
    interior_medium: marble_int

  # Testa: sfera marble + medium interior. Il random walk è scoped a questa
  # entity (restricted-BVH query via rec.EntityRoot), quindi la luce trasportata
  # nel volume non può "saltare" sull'altra sfera o sul pavimento.
  - name: "testa"
    type: "sphere"
    center: [0, 1.50, 0]
    radius: 0.42
    material: "marble_surface"
    interior_medium: marble_int
