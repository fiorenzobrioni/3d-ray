# =============================================================================
# Volumetrics #04 — Grid medium (fumo in un volume localizzato)
# =============================================================================
#
# SCENA
#   Una nuvoletta di fumo "tangibile" sospesa sopra il pavimento: un blob
#   roughly sferico costruito da una griglia 3D inline 4×4×4 dentro un
#   bounding box. Illuminazione combinata: point light warm dall'alto a destra
#   e directional azzurrina (cielo) dall'alto a sinistra. Fuori dal bounding
#   box il mondo è vuoto (trasmittanza = 1).
#
# EFFETTO NEBBIA
#   Grid medium: densità discreta d(i,j,k) ∈ [0,1] campionata su voxel, con
#   σ_T(p) = σ_base · d(p) per interpolazione trilineare. Il raggio è
#   ritagliato sulla AABB della griglia (slab test) e il delta tracking usa
#   un majorant σ_base · maxDensity. Analogo a PBRT GridMedium, Arnold volume
#   (modalità VDB) e V-Ray VolumeGrid. Qui i dati sono inline nello YAML; per
#   griglie più grandi usa `file: foo.vol` (formato binario VOL1).
#
# PARAMETRI DEL MEDIUM
#   type: grid             - densità campionata su griglia regolare
#   sigma_a: [0.05, 0.05, 0.05]
#                          - coefficiente di assorbimento quando d = 1
#   sigma_s: [1.5, 1.5, 1.6]
#                          - coefficiente di scattering quando d = 1. Valore
#                            moderato perché ora la densità media è maggiore:
#                            più voxel sono > 0 rispetto al blob binario.
#   bounds_min / bounds_max
#                          - AABB world-space del volume. Fuori: vuoto.
#   nx, ny, nz: 4          - risoluzione della griglia (qui 4³ = 64 voxel).
#                            Minimo consentito: 2 per asse.
#   phase: hg
#   g: 0.5                 - forward scattering moderato
#
#   data (layout z-major):
#     - 16 valori per z-slice (y outer, x inner) → 4×4 = 16 float per slice
#     - 4 slice (z = 0..3) → 64 valori totali
#     - Pattern radiale: densità = f(distanza dal centro (1.5,1.5,1.5)), con
#       falloff Gaussian-like. Voxel centrali (8 voxel in {1,2}³) = 1.0; face
#       neighbours = 0.5; edge neighbours = 0.15; corner voxels = 0.03.
#       Questo evita i kink visibili (bande verticali/orizzontali nette) che
#       si ottengono con un blob binario 0/1 a bassa risoluzione — ved. nota.
#
# NOTA SULLA RISOLUZIONE DELLA GRIGLIA
#   Con soli 4³ voxel l'interpolazione trilineare è ovviamente molto "grossa".
#   Se i voxel hanno valori binari (0/1) con plateau al centro, la derivata
#   del campo di densità ha salti netti ai confini delle celle: questi salti
#   sono C⁰ ma non C¹ e si proiettano come bande lineari visibili nel render.
#   È un artefatto universale (capita anche in Arnold, V-Ray, RenderMan a
#   bassissima risoluzione): in produzione si usano griglie VDB a 128³-512³+
#   con densità che variano smoothly, rendendo i kink sub-pixel. Qui il
#   pattern radiale-Gaussian attenua i kink riducendo il gradiente alle
#   transizioni, dando un blob molto più morbido a parità di risoluzione.
#
# PROFILI DI RENDERING
#   Il grid è delta tracking come il procedurale, ma ha un'AABB piccola:
#   la maggior parte dei raggi manca completamente il volume → molto veloce.
#   Rumore concentrato dove il raggio entra nella densità alta.
#
#   Preview:
#     RayTracer -i volumetric-04-grid-showcase.yaml -w 400 -H 225 -s 64  -d 4 -S 1
#   Standard:
#     RayTracer -i volumetric-04-grid-showcase.yaml -w 800 -H 450 -s 256 -d 6 -S 1
#   Final:
#     RayTracer -i volumetric-04-grid-showcase.yaml -w 1920 -H 1080 -s 1024 -d 8 -S 4
#
#   Tip: per griglie ad alta risoluzione (64³ o più) inline-YAML diventa
#   ingestibile; esporta in formato binario VOL1 e referenzialo con
#   `file: path/to/volume.vol` (path relativo allo YAML).
#
# =============================================================================

world:
  ambient_light: [0.02, 0.02, 0.03]
  background:   [0.05, 0.05, 0.08]
  ground: { y: 0, material: floor }
  medium:
    type: grid
    sigma_a: [0.05, 0.05, 0.05]
    sigma_s: [1.5, 1.5, 1.6]
    bounds_min: [-1.5, 0.5, -1.5]
    bounds_max: [ 1.5, 3.5,  1.5]
    nx: 4
    ny: 4
    nz: 4
    phase: hg
    g: 0.5
    # z-major layout: 16 values per z-slice (y outer, x inner).
    # Radial Gaussian-like falloff centered at voxel position (1.5, 1.5, 1.5):
    #   r² = 0.75 (8 central voxels ∈ {1,2}³) → 1.00
    #   r² = 2.75 (face neighbours)           → 0.50
    #   r² = 4.75 (edge neighbours)           → 0.15
    #   r² = 6.75 (corner voxels)             → 0.03
    data:
      # z = 0 (bottom slice, r²∈{2.75..6.75})
      - 0.03   # (0,0,0)
      - 0.15   # (1,0,0)
      - 0.15   # (2,0,0)
      - 0.03   # (3,0,0)
      - 0.15   # (0,1,0)
      - 0.5    # (1,1,0)
      - 0.5    # (2,1,0)
      - 0.15   # (3,1,0)
      - 0.15   # (0,2,0)
      - 0.5    # (1,2,0)
      - 0.5    # (2,2,0)
      - 0.15   # (3,2,0)
      - 0.03   # (0,3,0)
      - 0.15   # (1,3,0)
      - 0.15   # (2,3,0)
      - 0.03   # (3,3,0)
      # z = 1
      - 0.15   # (0,0,1)
      - 0.5    # (1,0,1)
      - 0.5    # (2,0,1)
      - 0.15   # (3,0,1)
      - 0.5    # (0,1,1)
      - 1.0    # (1,1,1)
      - 1.0    # (2,1,1)
      - 0.5    # (3,1,1)
      - 0.5    # (0,2,1)
      - 1.0    # (1,2,1)
      - 1.0    # (2,2,1)
      - 0.5    # (3,2,1)
      - 0.15   # (0,3,1)
      - 0.5    # (1,3,1)
      - 0.5    # (2,3,1)
      - 0.15   # (3,3,1)
      # z = 2 (same as z = 1 by symmetry around center)
      - 0.15   # (0,0,2)
      - 0.5    # (1,0,2)
      - 0.5    # (2,0,2)
      - 0.15   # (3,0,2)
      - 0.5    # (0,1,2)
      - 1.0    # (1,1,2)
      - 1.0    # (2,1,2)
      - 0.5    # (3,1,2)
      - 0.5    # (0,2,2)
      - 1.0    # (1,2,2)
      - 1.0    # (2,2,2)
      - 0.5    # (3,2,2)
      - 0.15   # (0,3,2)
      - 0.5    # (1,3,2)
      - 0.5    # (2,3,2)
      - 0.15   # (3,3,2)
      # z = 3 (same as z = 0 by symmetry)
      - 0.03   # (0,0,3)
      - 0.15   # (1,0,3)
      - 0.15   # (2,0,3)
      - 0.03   # (3,0,3)
      - 0.15   # (0,1,3)
      - 0.5    # (1,1,3)
      - 0.5    # (2,1,3)
      - 0.15   # (3,1,3)
      - 0.15   # (0,2,3)
      - 0.5    # (1,2,3)
      - 0.5    # (2,2,3)
      - 0.15   # (3,2,3)
      - 0.03   # (0,3,3)
      - 0.15   # (1,3,3)
      - 0.15   # (2,3,3)
      - 0.03   # (3,3,3)
camera: { position: [0, 2.0, 7], look_at: [0, 2.0, 0], vup: [0,1,0], fov: 40, aperture: 0, focal_dist: 7 }
materials:
  - { id: floor, type: lambertian, albedo: [0.3, 0.3, 0.3] }
lights:
  - type: point
    position: [3, 4, 3]
    color: [1.0, 0.95, 0.85]
    intensity: 120
  - type: directional
    direction: [-0.4, -1.0, -0.2]
    color: [0.6, 0.7, 0.9]
    intensity: 1.5
