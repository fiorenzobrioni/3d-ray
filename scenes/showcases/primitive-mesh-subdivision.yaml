# ============================================================================
# Scene: Mesh Subdivision Showcase (Loop + Catmull-Clark)
# Surface displacement stack — step 2 of the DEVLOG roadmap.
#
# Row 1 (back): cube + Catmull-Clark at 0 / 1 / 2 / 3 iterations.
# Row 2 (front): icosahedron + Loop at 0 / 1 / 2 / 3 iterations.
# Center: an icosahedron driven by the adaptive `subdivision_pixel_error`
# heuristic — refines until the longest projected edge is below 6 px.
# ============================================================================

camera:
  position: [0, 3.0, -10]
  look_at:  [0, 1.0, 0]
  fov: 38
  aperture: 0.0

world:
  sky:
    type: "gradient"
    zenith_color:  [0.05, 0.07, 0.12]
    horizon_color: [0.30, 0.28, 0.32]
    ground_color:  [0.04, 0.04, 0.04]
  ground:
    type: "plane"
    material: "pavimento"
    y: 0

materials:
  - id: "pavimento"
    type: "disney"
    roughness: 0.6
    texture:
      type: "checker"
      colors: [[0.10, 0.10, 0.10], [0.18, 0.18, 0.18]]
      scale: 1.0

  - id: "porcellana"
    type: "disney"
    color: [0.92, 0.88, 0.82]
    roughness: 0.20
    specular: 0.7
    clearcoat: 0.3
    coat_roughness: 0.12

  - id: "rame"
    type: "disney"
    color: [0.95, 0.55, 0.30]
    roughness: 0.22
    metallic: 1.0

lights:
  - type: "point"
    position: [5, 9, -6]
    color: [1.0, 0.98, 0.95]
    intensity: 220

  - type: "point"
    position: [-5, 6, -3]
    color: [0.85, 0.92, 1.0]
    intensity: 80

entities:
  # ── Row 1: Catmull-Clark on a unit-cube quad mesh ────────────────────────
  - name: "cc_0"
    type: "mesh"
    path: "../models/subdivision-cube.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    translate: [-4.5, 0.5, 2]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 0

  - name: "cc_1"
    type: "mesh"
    path: "../models/subdivision-cube.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    translate: [-1.5, 0.5, 2]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 1

  - name: "cc_2"
    type: "mesh"
    path: "../models/subdivision-cube.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    translate: [1.5, 0.5, 2]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 2

  - name: "cc_3"
    type: "mesh"
    path: "../models/subdivision-cube.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    translate: [4.5, 0.5, 2]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # ── Row 2: Loop on an icosahedron ────────────────────────────────────────
  - name: "loop_0"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rame"
    scale: [0.7, 0.7, 0.7]
    translate: [-4.5, 0.7, -1.5]
    subdivision_scheme: "loop"
    subdivision_iterations: 0

  - name: "loop_1"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rame"
    scale: [0.7, 0.7, 0.7]
    translate: [-1.5, 0.7, -1.5]
    subdivision_scheme: "loop"
    subdivision_iterations: 1

  - name: "loop_2"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rame"
    scale: [0.7, 0.7, 0.7]
    translate: [1.5, 0.7, -1.5]
    subdivision_scheme: "loop"
    subdivision_iterations: 2

  - name: "loop_3"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rame"
    scale: [0.7, 0.7, 0.7]
    translate: [4.5, 0.7, -1.5]
    subdivision_scheme: "loop"
    subdivision_iterations: 3

  # ── Center: adaptive screen-space subdivision ────────────────────────────
  # Loop iterations chosen so the longest projected edge falls below 6 px
  # at the configured 1920×1080 / fov 38° camera.
  - name: "adaptive"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "porcellana"
    scale: [1.1, 1.1, 1.1]
    translate: [0, 1.1, 0.2]
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
