# ═══════════════════════════════════════════════════════════════════════════
#  Industrial Coatings Showcase — Vernici Industriali Speciali
#
#  Dimostra 5 verniciature tecniche della libreria `industrial-coatings.yaml`:
#
#    x=-4.8  Chassis matte nero        → roughness 0.65 + coat moderato
#    x=-2.4  RAL 5015 blu cielo        → polvere elettrostatica + clearcoat
#    x=  0   Anodizzato oro             → thin_film 380nm (no pigmento)
#    x=+2.4  Gel coat marino blu       → clearcoat saturo + nautico
#    x=+4.8  Termocromica gradiente    → color_ramp 4-stop + gradient
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 32   -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/industrial-coatings.yaml" }

world:
  sky:
    type: "flat"
    color: [0.05, 0.05, 0.06]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.16, 0.16, 0.17]
    roughness: 0.55

  - id: "backdrop"
    type: "disney"
    color: [0.08, 0.08, 0.09]
    roughness: 0.92

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "matte"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "dis_chassis_matte_nero"
  - name: "ral5015"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "dis_ral5015_blu_cielo"
  - name: "anodizoro"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "dis_anodizzato_oro"
  - name: "gelcoat"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "dis_gelcoat_blu_marino"
  - name: "termo"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "dis_termocromica"

lights:

  - type: "directional"
    direction: [-0.45, -0.75, 0.4]
    color: [1.00, 0.98, 0.95]
    intensity: 6.0
    angular_radius: 0.4

  - type: "point"
    position: [-6, 7, -3]
    color: [0.88, 0.92, 1.00]
    intensity: 70

  - type: "point"
    position: [0, 3, 5]
    color: [1.0, 0.88, 0.68]
    intensity: 55
