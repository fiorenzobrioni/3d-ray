# ═══════════════════════════════════════════════════════════════════════════
#  Library Marbles — V3
#
#  Showcase pro-grade dei 6 marmi storici. Tutti sfruttano il nuovo procedural
#  marble (ridged multi-scala + IQ warp + fold + bg variation). Le feature
#  della patch 2 (mask roughness, space_stretch, cracks Worley) sono usate
#  con parsimonia — solo dove migliorano il look senza distorcerlo.
#
#    x=-5.0  White Carrara         → defaults Carrara, vene sottili pulite
#    x=-3.0  Black Marquinia       → cracks Worley sottili (linee, non spot)
#    x=-1.0  Verde Alpi            → impurità sparse + space_stretch leggero
#    x=+1.0  Calacatta Gold        → 3 layer + cracks + mask roughness (ricetta
#                                    canonica per il look "lavorato a specchio")
#    x=+3.0  Statuario             → 3 layer + space_stretch verticale leggero
#    x=+5.0  Arabescato            → 3 layer + warp_iter 3 (caos massimo)
#
#  Render hint:
#    Draft:    -w 640  -H 360  -s 64   -d 8  -S 1
#    Standard: -w 1920 -H 1080 -s 1024 -d 8  -S 4
#    Final:    -w 1920 -H 1080 -s 2048 -d 12 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.002, 0.002, 0.0025]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.85, 0]
  fov: 56

materials:

  - id: "floor"
    type: "disney"
    color: [0.18, 0.18, 0.20]
    roughness: 0.65
    specular: 0.30

  # White Carrara — defaults puliti, niente patch-2 features
  - id: "showcase_white_carrara"
    type: "disney"
    texture:
      type: "marble"
      scale: 2.4
      colors: [[0.96, 0.95, 0.94], [0.32, 0.34, 0.40]]
      vein_axis: [0, 1, 0]
      warp_amplitude: 0.9
      warp_iterations: 2
      fold_amplitude: [0.8, 0.25, 0.45]
      vein_layers: 2
      vein_scale:  [1.0, 2.4]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.13
      vein_softness: 0.07
      color_variation: 0.08
      randomize_offset: true
    roughness: 0.18
    specular: 0.55
    clearcoat: 0.65
    coat_roughness: 0.08

  # Black Marquinia — base nera + cracks Worley SOTTILI (linewidth 0.02)
  # La nuova formula cracks usa CracksSoftness come line-width: 0.02 = filiformi.
  - id: "showcase_black_marquinia"
    type: "disney"
    texture:
      type: "marble"
      scale: 2.0
      colors: [[0.04, 0.04, 0.05], [0.86, 0.84, 0.78]]
      vein_axis: [0, 1, 0]
      warp_amplitude: 0.95
      warp_iterations: 2
      fold_amplitude: [0.80, 0.22, 0.48]
      vein_layers: 2
      vein_scale:  [1.0, 2.5]
      vein_weight: [1.0, 0.55]
      vein_thickness: 0.13
      vein_softness: 0.05
      color_variation: 0.06
      cracks_density: 0.45
      cracks_scale: 2.4
      cracks_softness: 0.020
      cracks_weight: 0.85
      randomize_offset: true
    roughness: 0.10
    specular: 0.80
    clearcoat: 0.92
    coat_roughness: 0.05

  # Verde Alpi — verde profondo, impurità RIDOTTE (0.025) e space_stretch lieve
  - id: "showcase_verde_alpi"
    type: "disney"
    texture:
      type: "marble"
      scale: 2.3
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.05
      warp_iterations: 2
      fold_amplitude: [0.85, 0.30, 0.55]
      space_stretch: [0.7, 1.3, 1.0]
      vein_layers: 2
      vein_scale:  [0.85, 2.0]
      vein_weight: [1.0, 0.55]
      vein_thickness: 0.22
      vein_softness: 0.09
      color_variation: 0.10
      impurities_density: 0.025
      impurities_scale: 12.0
      impurity_weight: 0.18
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.16, 0.40, 0.22], interp: "linear" }
        - { position: 0.55, color: [0.06, 0.22, 0.10], interp: "smoothstep" }
        - { position: 1.00, color: [0.02, 0.08, 0.04], interp: "linear" }
    roughness: 0.20
    specular: 0.55
    clearcoat: 0.55
    coat_roughness: 0.12

  # Calacatta Gold — RICETTA CANONICA della patch 2: mask roughness con range
  # CONSERVATIVO (0.22 → 0.12), cracks sottili (linewidth 0.04). L'unica
  # sfera con roughness_texture mask del showcase.
  - id: "showcase_calacatta_gold"
    type: "disney"
    texture:
      type: "marble"
      scale: 1.9
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.1
      warp_iterations: 2
      fold_amplitude: [0.95, 0.35, 0.55]
      vein_layers: 3
      vein_scale:  [0.65, 1.5, 3.4]
      vein_weight: [1.0, 0.70, 0.40]
      vein_thickness: 0.22
      vein_softness: 0.09
      color_variation: 0.09
      cracks_density: 0.30
      cracks_scale: 3.2
      cracks_softness: 0.040
      cracks_weight: 0.70
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.97, 0.95, 0.90], interp: "linear" }
        - { position: 0.30, color: [0.92, 0.85, 0.72], interp: "smoothstep" }
        - { position: 0.65, color: [0.85, 0.62, 0.28], interp: "smoothstep" }
        - { position: 1.00, color: [0.18, 0.10, 0.05], interp: "linear" }
    roughness: 0.22
    roughness_texture:
      type: "marble"
      output: "mask"
      scale: 1.9
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.1
      warp_iterations: 2
      fold_amplitude: [0.95, 0.35, 0.55]
      vein_layers: 3
      vein_scale:  [0.65, 1.5, 3.4]
      vein_weight: [1.0, 0.70, 0.40]
      vein_thickness: 0.22
      vein_softness: 0.09
      cracks_density: 0.30
      cracks_scale: 3.2
      cracks_softness: 0.040
      cracks_weight: 0.70
      randomize_offset: true
      color_ramp:
        - { position: 0.0, color: [0.22, 0.22, 0.22] }   # base avorio matte
        - { position: 1.0, color: [0.12, 0.12, 0.12] }   # vena oro/dark glossier
    specular: 0.65
    clearcoat: 0.85
    coat_roughness: 0.06

  # Statuario — bianco purissimo + space_stretch verticale LEGGERO
  - id: "showcase_statuario"
    type: "disney"
    texture:
      type: "marble"
      scale: 2.1
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.2
      warp_iterations: 3
      fold_amplitude: [1.0, 0.35, 0.55]
      space_stretch: [1.0, 0.7, 1.0]
      vein_layers: 3
      vein_scale:  [0.6, 1.4, 3.0]
      vein_weight: [1.0, 0.65, 0.35]
      vein_thickness: 0.20
      vein_softness: 0.08
      color_variation: 0.06
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.98, 0.98, 0.96], interp: "linear" }
        - { position: 0.65, color: [0.50, 0.50, 0.52], interp: "smoothstep" }
        - { position: 1.00, color: [0.06, 0.06, 0.08], interp: "linear" }
    roughness: 0.18
    specular: 0.60
    clearcoat: 0.75
    coat_roughness: 0.07

  # Arabescato — caos massimo, niente cracks/mask (le 3 layer + warp 3 bastano)
  - id: "showcase_arabescato"
    type: "disney"
    texture:
      type: "marble"
      scale: 1.8
      vein_axis: [0, 1, 0]
      warp_amplitude: 1.4
      warp_iterations: 3
      fold_amplitude: [1.1, 0.5, 0.7]
      vein_layers: 3
      vein_scale:  [0.55, 1.4, 3.2]
      vein_weight: [1.0, 0.75, 0.45]
      vein_thickness: 0.34
      vein_softness: 0.12
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.94, 0.92, 0.88], interp: "linear" }
        - { position: 0.55, color: [0.55, 0.50, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.06, 0.06, 0.10], interp: "linear" }
    roughness: 0.18
    specular: 0.55
    clearcoat: 0.65
    coat_roughness: 0.08

entities:

  - { name: "floor", type: "quad", q: [-12, 0, -4], u: [24, 0, 0], v: [0, 0, 10], material: "floor" }

  - { name: "carrara",    type: "sphere", center: [-5.0, 0.85, 0], radius: 0.85, seed: 1,   material: "showcase_white_carrara"  }
  - { name: "marquinia",  type: "sphere", center: [-3.0, 0.85, 0], radius: 0.85, seed: 7,   material: "showcase_black_marquinia" }
  - { name: "verde_alpi", type: "sphere", center: [-1.0, 0.85, 0], radius: 0.85, seed: 13,  material: "showcase_verde_alpi"     }
  - { name: "calacatta",  type: "sphere", center: [ 1.0, 0.85, 0], radius: 0.85, seed: 23,  material: "showcase_calacatta_gold" }
  - { name: "statuario",  type: "sphere", center: [ 3.0, 0.85, 0], radius: 0.85, seed: 31,  material: "showcase_statuario"      }
  - { name: "arabescato", type: "sphere", center: [ 5.0, 0.85, 0], radius: 0.85, seed: 41,  material: "showcase_arabescato"     }

lights:
  - type: "directional"
    direction: [-0.4, -0.8, 0.45]
    color: [1.0, 0.98, 0.94]
    intensity: 6.5
    angular_radius: 0.6

  - type: "point"
    position: [-7, 6, -4]
    color: [0.90, 0.93, 1.00]
    intensity: 55

  - type: "point"
    position: [0, 3.5, 5]
    color: [1.0, 0.82, 0.62]
    intensity: 45

  - type: "point"
    position: [7, 6, -4]
    color: [0.92, 0.95, 1.00]
    intensity: 55
