# ═══════════════════════════════════════════════════════════════════════════
#  Mix Material Showcase
#
#  Dimostra il materiale MixMaterial con diverse modalità di blending:
#    • Blend costante (peso fisso)
#    • Maschera procedurale Perlin noise (ruggine organica)
#    • Maschera procedurale marble (transizioni venate)
#    • Maschera checker (pattern regolare)
#    • Mix-of-mix (composizione ricorsiva)
#
#  Ogni sfera mostra un caso d'uso diverso del MixMaterial:
#    Fila posteriore: blend costante a 3 livelli (25%, 50%, 75%)
#    Fila centrale:   maschere procedurali (noise, marble, wood)
#    Fila anteriore:  applicazioni pratiche (ruggine, usura, lava)
#
#  Render consigliato:
#    Draft:  -w 400  -H 225  -s 64   -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "gradient"
    zenith_color:  [0,0,0]
    horizon_color: [0,0,0]
    ground_color:  [0,0,0]
    sun:
      direction: [-0.4, -0.7, -0.5]
      color:      [0,0,0]
      intensity:  0
      size:       2.0
      falloff:    48.0
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0

camera:
  position: [0, 4, -9]
  look_at: [0, 1.2, 1]
  fov: 48

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:

  # ── Pavimento ──────────────────────────────────────────────────────────
  - id: "pavimento"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 1.5
      colors: [[0.75, 0.72, 0.68], [0.45, 0.42, 0.38]]

  # ════════════════════════════════════════════════════════════════════════
  #  BASE MATERIALS (componenti per i mix)
  # ════════════════════════════════════════════════════════════════════════

  # ── Metallo pulito (cromato) ───────────────────────────────────────────
  - id: "cromo"
    type: "metal"
    color: [0.85, 0.85, 0.88]
    fuzz: 0.02

  # ── Ruggine opaca ─────────────────────────────────────────────────────
  - id: "ruggine"
    type: "disney"
    color: [0.55, 0.25, 0.10]
    metallic: 0.3
    roughness: 0.9

  # ── Plastica rossa lucida ─────────────────────────────────────────────
  - id: "plastica_rossa"
    type: "disney"
    color: [0.85, 0.08, 0.05]
    roughness: 0.15
    specular: 0.6
    clearcoat: 0.4
    coat_roughness: 0.10

  # ── Plastica bianca opaca ─────────────────────────────────────────────
  - id: "plastica_bianca"
    type: "lambertian"
    color: [0.92, 0.90, 0.88]

  # ── Oro lucido ────────────────────────────────────────────────────────
  - id: "oro"
    type: "metal"
    color: [0.95, 0.75, 0.20]
    fuzz: 0.05

  # ── Ossidazione verde (patina) ────────────────────────────────────────
  - id: "patina"
    type: "disney"
    color: [0.30, 0.55, 0.35]
    roughness: 0.85
    metallic: 0.1

  # ── Roccia scura ──────────────────────────────────────────────────────
  - id: "roccia"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 3.0
      colors: [[0.35, 0.32, 0.28], [0.20, 0.18, 0.15]]

  # ── Lava incandescente ────────────────────────────────────────────────
  - id: "lava"
    type: "emissive"
    color: [1.0, 0.35, 0.05]
    intensity: 6.0

  # ── Vetro colorato ────────────────────────────────────────────────────
  - id: "vetro_azzurro"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.8, 0.9, 1.0]

  # ════════════════════════════════════════════════════════════════════════
  #  MIX MATERIALS
  # ════════════════════════════════════════════════════════════════════════

  # ── Fila posteriore: blend costante ────────────────────────────────────

  # 25% ruggine, 75% cromo
  - id: "mix_25"
    type: "mix"
    material_a: "cromo"
    material_b: "ruggine"
    blend: 0.25

  # 50% ruggine, 50% cromo
  - id: "mix_50"
    type: "mix"
    material_a: "cromo"
    material_b: "ruggine"
    blend: 0.50

  # 75% ruggine, 25% cromo
  - id: "mix_75"
    type: "mix"
    material_a: "cromo"
    material_b: "ruggine"
    blend: 0.75

  # ── Fila centrale: maschere procedurali ────────────────────────────────

  # Noise mask — ruggine organica irregolare
  - id: "mix_noise"
    type: "mix"
    material_a: "cromo"
    material_b: "ruggine"
    mask:
      type: "noise"
      scale: 4.0
      noise_strength: 3.0

  # Marble mask — transizioni venate tipo pietra
  - id: "mix_marble"
    type: "mix"
    material_a: "plastica_bianca"
    material_b: "plastica_rossa"
    mask:
      type: "marble"
      scale: 8.0
      noise_strength: 6.0
      colors: [[1.0, 1.0, 1.0], [0.0, 0.0, 0.0]]

  # Wood mask — anelli di transizione concentrici
  - id: "mix_wood"
    type: "mix"
    material_a: "oro"
    material_b: "patina"
    mask:
      type: "wood"
      scale: 3.0
      noise_strength: 1.5
      colors: [[0.9, 0.9, 0.9], [0.1, 0.1, 0.1]]

  # ── Fila anteriore: applicazioni pratiche ──────────────────────────────

  # Ruggine con noise — effetto weathering realistico
  - id: "metallo_arrugginito"
    type: "mix"
    material_a: "cromo"
    material_b: "ruggine"
    mask:
      type: "noise"
      scale: 3.0
      noise_strength: 5.0

  # Lava che si raffredda — emissivo + roccia con maschera
  - id: "lava_cooling"
    type: "mix"
    material_a: "roccia"
    material_b: "lava"
    mask:
      type: "marble"
      scale: 5.0
      noise_strength: 8.0
      colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]

  # Checker mask — pattern regolare di due materiali
  - id: "checker_mix"
    type: "mix"
    material_a: "cromo"
    material_b: "plastica_rossa"
    mask:
      type: "checker"
      scale: 6.0
      colors: [[1.0, 1.0, 1.0], [0.0, 0.0, 0.0]]

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # ── SOLE — key light ──────────────────────────────────────────────────────
  - type: "sphere"
    position: [10, 18, 13]
    radius: 2.0
    color: [1.0, 0.96, 0.85]
    intensity: 12.0

  # ── CIELO — fill freddo ───────────────────────────────────────────────────
  - type: "sphere"
    position: [-14, 20, -12]
    radius: 3.0
    color: [0.65, 0.78, 1.0]
    intensity: 5.0

  # ── TERRENO — fill caldo ──────────────────────────────────────────────────
  - type: "sphere"
    position: [10, 12.0, 14]
    radius: 2.5
    color: [0.95, 0.85, 0.65]
    intensity: 20

# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  # ════════════════════════════════════════════════════════════════════════
  #  FILA POSTERIORE — Blend costante (z = 3)
  #  Dimostra l'interpolazione lineare tra cromo e ruggine
  # ════════════════════════════════════════════════════════════════════════

  - name: "blend_25"
    type: "sphere"
    center: [-3, 1.2, 3]
    radius: 1.0
    material: "mix_25"

  - name: "blend_50"
    type: "sphere"
    center: [0, 1.2, 3]
    radius: 1.0
    material: "mix_50"

  - name: "blend_75"
    type: "sphere"
    center: [3, 1.2, 3]
    radius: 1.0
    material: "mix_75"

  # ════════════════════════════════════════════════════════════════════════
  #  FILA CENTRALE — Maschere procedurali (z = 0)
  #  Noise, marble, wood come maschere spaziali
  # ════════════════════════════════════════════════════════════════════════

  - name: "noise_mask"
    type: "sphere"
    center: [-3, 1.2, 0]
    radius: 1.0
    material: "mix_noise"

  - name: "marble_mask"
    type: "sphere"
    center: [0, 1.2, 0]
    radius: 1.0
    material: "mix_marble"

  - name: "wood_mask"
    type: "sphere"
    center: [3, 1.2, 0]
    radius: 1.0
    material: "mix_wood"

  # ════════════════════════════════════════════════════════════════════════
  #  FILA ANTERIORE — Applicazioni pratiche (z = -3)
  #  Weathering, lava, pattern decorativi
  # ════════════════════════════════════════════════════════════════════════

  - name: "weathered_sphere"
    type: "sphere"
    center: [-3, 1.2, -3]
    radius: 1.0
    material: "metallo_arrugginito"

  - name: "lava_rock"
    type: "sphere"
    center: [0, 1.2, -3]
    radius: 1.0
    material: "lava_cooling"

  - name: "checker_sphere"
    type: "sphere"
    center: [3, 1.2, -3]
    radius: 1.0
    material: "checker_mix"
