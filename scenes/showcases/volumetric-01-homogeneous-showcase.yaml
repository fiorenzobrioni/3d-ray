# =============================================================================
# Volumetrics #01 — Nebbia omogenea (baseline)
# =============================================================================
#
# SCENA
#   Sala buia con tre pilastri verticali disposti a triangolo e un blocco basso
#   in primo piano. Un unico spot warm (~3200 K) illumina la scena dall'alto a
#   sinistra: è l'unica fonte luminosa, a parte un ambient quasi nero.
#
# EFFETTO NEBBIA
#   Nebbia uniforme densità costante ovunque. Il cono dello spot diventa
#   visibile perché la luce, viaggiando nell'aria, scattera in direzione della
#   camera ("god ray" classico). La trasmittanza segue Beer-Lambert
#   Tr = exp(-σ_T · d): più il raggio percorre nebbia, più si attenua.
#
# PARAMETRI DEL MEDIUM
#   type: homogeneous      - densità costante nello spazio
#   sigma_a: [0.005, 0.005, 0.005]
#                          - coefficiente di assorbimento (quasi neutro,
#                            leggero tint freddo). Basso → nebbia luminosa.
#   sigma_s: [0.06, 0.06, 0.07]
#                          - coefficiente di scattering (dominante). Fa
#                            "accendere" il cono di luce visibile in camera.
#   g: 0.85                - Henyey-Greenstein forward-scattering (tipico di
#                            nebbia/goccioline). Valori > 0 → scattering in
#                            avanti; dà coni luminosi stretti e allungati.
#   phase: hg              - commentato: default = HG quando g è presente.
#
# PROFILI DI RENDERING (vedi docs/reference/profili-di-rendering.md)
#   Preview    (~10-30 s, controllo composizione):
#     RayTracer -i volumetric-01-homogeneous-showcase.yaml -w 400 -H 225 -s 64  -d 4 -S 1
#
#   Standard   (review / CI, ~1-3 min):
#     RayTracer -i volumetric-01-homogeneous-showcase.yaml -w 800 -H 450 -s 256 -d 6 -S 1
#
#   Final      (portfolio, qualche minuto):
#     RayTracer -i volumetric-01-homogeneous-showcase.yaml -w 1920 -H 1080 -s 1024 -d 8 -S 4
#
# =============================================================================

world:
  ambient_light: [0.005, 0.005, 0.008]
  background:   [0.0, 0.0, 0.0]
  ground: { y: 0, material: floor }
  medium:
    type: homogeneous
    sigma_a: [0.005, 0.005, 0.005]
    sigma_s: [0.06, 0.06, 0.07]
    phase: hg
    g: 0.85
camera: { position: [0, 2.0, 8], look_at: [0, 1.5, 0], vup: [0,1,0], fov: 35, aperture: 0, focal_dist: 8 }
materials:
  - { id: floor, type: lambertian, albedo: [0.25, 0.22, 0.20] }
  - { id: pillar, type: lambertian, albedo: [0.55, 0.5, 0.45] }
lights:
  - type: spot
    position: [-3, 6, 2]
    direction: [0.5, -1, -0.3]
    color: [1.0, 0.92, 0.78]
    intensity: 800
    inner_angle: 4
    outer_angle: 9
entities:
  - { type: box, scale: [0.5, 3.0, 0.5], translate: [-1.25, 1.5, -1.25], material: pillar }
  - { type: box, scale: [0.5, 3.0, 0.5], translate: [ 1.25, 1.5, -1.25], material: pillar }
  - { type: box, scale: [0.8, 1.2, 0.8], translate: [ 0.0,  0.6,  0.4 ], material: pillar }
