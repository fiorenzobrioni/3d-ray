# ═══════════════════════════════════════════════════════════════════════════
#  Classico vs Disney affiancato
#
#  Pavimento LAMBERTIAN per isolare il rumore sulle sfere.
#  Tre file: vetro, plastica, metallo. Sinistra=classico, destra=Disney.
#
#  Render consigliato:
#    Test veloce: -s 64   -d 4  -w 400  -H 225 -S 1
#    Confronto:   -s 1024 -d 8  -w 1920 -H 1080 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.04, 0.04, 0.05]
  sky:
    type: "gradient"
    zenith_color:  [0.10, 0.15, 0.30]
    horizon_color: [0.45, 0.50, 0.60]
    ground_color:  [0.12, 0.11, 0.10]
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0

camera:
  position: [0, 5, -10]
  look_at: [0, 1.0, 1.5]
  fov: 48

lights:
  - type: "point"
    position: [4, 7, -4]
    color: [1.0, 0.95, 0.88]
    intensity: 60
  - type: "point"
    position: [-4, 5, -2]
    color: [0.8, 0.85, 1.0]
    intensity: 30
  - type: "directional"
    direction: [-0.5, -0.6, 0.5]
    color: [1.0, 0.95, 0.9]
    intensity: 0.15

materials:
  # ── Pavimento LAMBERTIAN (nessun rumore Disney) ────────────────────────
  - id: "pavimento"
    type: "lambertian"
    texture:
      type: "checker"
      colors: [[0.15, 0.15, 0.15], [0.35, 0.35, 0.35]]
      scale: 1.5

  # ── Separatore centrale ────────────────────────────────────────────────
  - id: "separatore"
    type: "lambertian"
    color: [0.08, 0.08, 0.08]

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 1 — VETRO (Z = 4)  ← dove FIX #8a dovrebbe aiutare di più
  # ═════════════════════════════════════════════════════════════════════════
  - id: "cl_vetro_bianco"
    type: "dielectric"
    refraction_index: 1.52
    color: [1.0, 1.0, 1.0]

  - id: "di_vetro_bianco"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52

  - id: "cl_vetro_rosso"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.9, 0.15, 0.15]

  - id: "di_vetro_rosso"
    type: "disney"
    color: [0.9, 0.15, 0.15]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52

  - id: "cl_vetro_verde"
    type: "dielectric"
    refraction_index: 1.52
    color: [0.15, 0.9, 0.15]

  - id: "di_vetro_verde"
    type: "disney"
    color: [0.15, 0.9, 0.15]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 2 — PLASTICA OPACA (Z = 2)  ← rumore strutturale Disney
  # ═════════════════════════════════════════════════════════════════════════
  - id: "cl_plastica_rossa"
    type: "lambertian"
    color: [0.8, 0.1, 0.1]

  - id: "di_plastica_rossa"
    type: "disney"
    color: [0.8, 0.1, 0.1]
    roughness: 0.5
    specular: 0.5

  - id: "cl_plastica_blu"
    type: "lambertian"
    color: [0.1, 0.2, 0.8]

  - id: "di_plastica_blu"
    type: "disney"
    color: [0.1, 0.2, 0.8]
    roughness: 0.5
    specular: 0.5

  - id: "cl_plastica_bianca"
    type: "lambertian"
    color: [0.9, 0.9, 0.88]

  - id: "di_plastica_bianca"
    type: "disney"
    color: [0.9, 0.9, 0.88]
    roughness: 0.5
    specular: 0.5

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 3 — METALLI (Z = 0)  ← Disney ≈ classico (1 lobo dominante)
  # ═════════════════════════════════════════════════════════════════════════
  - id: "cl_oro"
    type: "metal"
    color: [1.0, 0.71, 0.29]
    fuzz: 0.15

  - id: "di_oro"
    type: "disney"
    color: [1.0, 0.71, 0.29]
    metallic: 1.0
    roughness: 0.15

  - id: "cl_cromo"
    type: "metal"
    color: [0.95, 0.93, 0.88]
    fuzz: 0.02

  - id: "di_cromo"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    metallic: 1.0
    roughness: 0.02

  - id: "cl_rame"
    type: "metal"
    color: [0.95, 0.64, 0.54]
    fuzz: 0.25

  - id: "di_rame"
    type: "disney"
    color: [0.95, 0.64, 0.54]
    metallic: 1.0
    roughness: 0.25

entities:
  # ── Separatore centrale (sottile barra tra colonne classico/Disney) ────
  - name: "sep"
    type: "box"
    scale: [0.04, 0.5, 10]
    translate: [0, 0.25, 2]
    material: "separatore"

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 1 — VETRO (Z = 4)
  #  Sinistra = classico (X < 0), Destra = Disney (X > 0)
  # ═════════════════════════════════════════════════════════════════════════
  - { name: "cl_v1", type: "sphere", center: [-3.0, 0.8, 4.0], radius: 0.75, material: "cl_vetro_bianco" }
  - { name: "di_v1", type: "sphere", center: [ 3.0, 0.8, 4.0], radius: 0.75, material: "di_vetro_bianco" }

  - { name: "cl_v2", type: "sphere", center: [-1.0, 0.8, 4.0], radius: 0.75, material: "cl_vetro_rosso" }
  - { name: "di_v2", type: "sphere", center: [ 1.0, 0.8, 4.0], radius: 0.75, material: "di_vetro_rosso" }

  - { name: "cl_v3", type: "sphere", center: [-5.0, 0.8, 4.0], radius: 0.75, material: "cl_vetro_verde" }
  - { name: "di_v3", type: "sphere", center: [ 5.0, 0.8, 4.0], radius: 0.75, material: "di_vetro_verde" }

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 2 — PLASTICA (Z = 2)
  # ═════════════════════════════════════════════════════════════════════════
  - { name: "cl_p1", type: "sphere", center: [-3.0, 0.8, 2.0], radius: 0.75, material: "cl_plastica_rossa" }
  - { name: "di_p1", type: "sphere", center: [ 3.0, 0.8, 2.0], radius: 0.75, material: "di_plastica_rossa" }

  - { name: "cl_p2", type: "sphere", center: [-1.0, 0.8, 2.0], radius: 0.75, material: "cl_plastica_blu" }
  - { name: "di_p2", type: "sphere", center: [ 1.0, 0.8, 2.0], radius: 0.75, material: "di_plastica_blu" }

  - { name: "cl_p3", type: "sphere", center: [-5.0, 0.8, 2.0], radius: 0.75, material: "cl_plastica_bianca" }
  - { name: "di_p3", type: "sphere", center: [ 5.0, 0.8, 2.0], radius: 0.75, material: "di_plastica_bianca" }

  # ═════════════════════════════════════════════════════════════════════════
  #  FILA 3 — METALLI (Z = 0)
  # ═════════════════════════════════════════════════════════════════════════
  - { name: "cl_m1", type: "sphere", center: [-3.0, 0.8, 0.0], radius: 0.75, material: "cl_oro" }
  - { name: "di_m1", type: "sphere", center: [ 3.0, 0.8, 0.0], radius: 0.75, material: "di_oro" }

  - { name: "cl_m2", type: "sphere", center: [-1.0, 0.8, 0.0], radius: 0.75, material: "cl_cromo" }
  - { name: "di_m2", type: "sphere", center: [ 1.0, 0.8, 0.0], radius: 0.75, material: "di_cromo" }

  - { name: "cl_m3", type: "sphere", center: [-5.0, 0.8, 0.0], radius: 0.75, material: "cl_rame" }
  - { name: "di_m3", type: "sphere", center: [ 5.0, 0.8, 0.0], radius: 0.75, material: "di_rame" }
