# ═══════════════════════════════════════════════════════════════════════════
#  Plasters Showcase — Intonaci e Stucchi
#
#  Dimostra 5 finiture decorative della libreria `plasters.yaml`:
#
#    x=-4.8  Veneziano avorio         → marble studio + secondary_wave + clearcoat
#    x=-2.4  Marmorino blu polvere    → marble + color_ramp 3-stop opaco
#    x=  0   Tadelakt rosa            → clearcoat 0.45 + subsurface alta
#    x=+2.4  Stucco antico crepato    → voronoi f2_minus_f1 + color_ramp 4-stop
#    x=+4.8  Graffiato esterno        → bump ridged + displacement scalare
#
#  Il pattern del veneziano e marmorino è "orizzontale": vein_axis [1,0,0]
#  produce strisce che seguono il movimento della spatola tipico
#  dell'applicazione manuale.
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 32  -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.05, 0.05, 0.055]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.22, 0.22, 0.22]
    roughness: 0.80

  - id: "backdrop"
    type: "disney"
    color: [0.12, 0.12, 0.13]
    roughness: 0.92

  - id: "dis_veneziano_avorio"
    type: "disney"
    color: [0.92, 0.86, 0.74]
    roughness: 0.18
    specular: 0.45
    clearcoat: 0.85
    coat_roughness: 0.08
    coat_ior: 1.5
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.85
      warp_iterations: 2
      fold_amplitude: [0.75, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.30
      vein_softness: 0.20
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.96, 0.92, 0.84], interp: "linear" }
        - { position: 0.55, color: [0.85, 0.75, 0.55], interp: "smoothstep" }
        - { position: 1.00, color: [0.60, 0.45, 0.22], interp: "linear" }

  - id: "dis_marmorino_blu_polvere"
    type: "disney"
    color: [0.62, 0.72, 0.78]
    roughness: 0.65
    specular: 0.35
    texture:
      type: "marble"
      scale: 1.4
      vein_axis: [1, 0, 0]
      warp_amplitude: 0.75
      warp_iterations: 2
      fold_amplitude: [0.65, 0.30, 0.45]
      vein_layers: 2
      vein_scale:  [0.9, 2.0]
      vein_weight: [1.0, 0.50]
      vein_thickness: 0.32
      vein_softness: 0.22
      color_variation: 0.10
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.80, 0.88, 0.92], interp: "linear" }
        - { position: 0.50, color: [0.62, 0.72, 0.78], interp: "smoothstep" }
        - { position: 1.00, color: [0.40, 0.50, 0.58], interp: "linear" }

  - id: "dis_tadelakt_rosa"
    type: "disney"
    color: [0.88, 0.66, 0.58]
    roughness: 0.28
    specular: 0.42
    clearcoat: 0.45
    coat_roughness: 0.18
    coat_ior: 1.5
    texture:
      type: "noise"
      scale: 2.2
      noise_type: "fbm"
      octaves: 4
      noise_strength: 0.18
      colors: [[0.82, 0.60, 0.52], [0.92, 0.72, 0.64]]
      randomize_offset: true

  - id: "dis_stucco_antico_crepato"
    type: "disney"
    color: [0.82, 0.76, 0.62]
    roughness: 0.92
    specular: 0.22
    texture:
      type: "noise"
      scale: 1.2
      noise_type: "fbm"
      octaves: 6
      noise_strength: 1.5
      distortion: 0.3
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.42, 0.36, 0.26], interp: "smoothstep" }
        - { position: 0.30, color: [0.62, 0.54, 0.42], interp: "smoothstep" }
        - { position: 0.65, color: [0.78, 0.72, 0.58], interp: "smoothstep" }
        - { position: 1.00, color: [0.92, 0.86, 0.72], interp: "linear" }
    bump_map:
      texture:
        type: "voronoi"
        scale: 4.0
        output: "f2_minus_f1"
        colors: [[0.30, 0.30, 0.30], [0.70, 0.70, 0.70]]
      strength: 0.8

  - id: "dis_graffiato_esterno"
    type: "disney"
    color: [0.82, 0.78, 0.70]
    roughness: 0.92
    specular: 0.24
    texture:
      type: "noise"
      scale: 2.5
      noise_strength: 0.20
      colors: [[0.74, 0.70, 0.62], [0.88, 0.84, 0.76]]
      randomize_offset: true
    bump_map:
      texture:
        type: "noise"
        scale: 12.0
        noise_type: "ridged"
        octaves: 3
        colors: [[0.35, 0.35, 0.35], [0.65, 0.65, 0.65]]
      strength: 1.5
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        scale: 10.0
        noise_type: "ridged"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.004
      midlevel: 0.5
      bound: 0.008
      autobump: true
      autobump_strength: 1.5
      displacement_method: "bump_only"

entities:

  - { name: "floor",   type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",    type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "veneziano"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "dis_veneziano_avorio"
  - name: "marmorino"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "dis_marmorino_blu_polvere"
  - name: "tadelakt"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "dis_tadelakt_rosa"
  - name: "stucco"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "dis_stucco_antico_crepato"
  - name: "graffiato"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "dis_graffiato_esterno"

lights:

  # Key direzionale calda da sinistra: simulazione luce d'interno con
  # finestra a Ovest. Le sfere lucide (veneziano, tadelakt) devono
  # mostrare un highlight diretto distinto.
  - type: "directional"
    direction: [-0.5, -0.7, 0.4]
    color: [1.0, 0.95, 0.88]
    intensity: 5.0
    angular_radius: 0.6

  # Fill freddo dall'alto: ambient indiretto neutro.
  - type: "point"
    position: [0, 8, -4]
    color: [0.92, 0.95, 1.00]
    intensity: 55

  # Rim caldo dietro per separare dal backdrop. Più stretto perché i
  # materiali opachi hanno bordi meno definiti dei marmi.
  - type: "point"
    position: [0, 3, 4.5]
    color: [1.0, 0.85, 0.70]
    intensity: 40
