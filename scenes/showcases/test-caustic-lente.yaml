# ═══════════════════════════════════════════════════════════════════════════
#  TEST: Caustica lente biconvessa CSG — scena minimale v2
#
#  Lente ORIZZONTALE (asse lungo Y): le facce grandi puntano su/giù.
#  Luce dall'alto (area overhead) → entra dalla faccia superiore, rifrange
#  verso il basso, fuoco calcolato per cadere ESATTAMENTE sul pavimento.
#
#  Geometria:
#    R = 2.08,  d = ±1.699 lungo Y,  bounding sphere R=1.2
#    f = R / (2*(n-1)) = 2.08 / (2*0.52) = 2.0
#    Lente a y=2.0  →  fuoco a y = 2.0 - 2.0 = 0.0 (pavimento)
#
#  La lente CSG di vetro focalizza la luce sul pavimento; con --caustics on
#  il photon map rende la caustica automaticamente (nessun flag per-oggetto).
#
#  Render consigliato:
#    dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#      -i scenes/showcases/test-caustic-lente.yaml \
#      -o renders/test-caustic-lente.png \
#      -w 1200 -H 675 -s 512 -d 8 -S 4 --caustics on -C 20
# ═══════════════════════════════════════════════════════════════════════════

cameras:
  # Vista laterale elevata — vede il disco + lo spot sul pavimento
  - name: "principale"
    position: [5, 3.0, 0.0]
    look_at:  [0, 0.3, 0.0]
    fov: 42

  # Radente sul pavimento — caustica in primissimo piano
  - name: "radente"
    position: [4.5, 0.18, 1.0]
    look_at:  [0.0, 0.03, 0.0]
    fov: 38

world:
  sky:
    type: "flat"
    color: [0.010, 0.010, 0.014]
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:
  # Pavimento scuro semi-lucido
  - id: "pavimento"
    type: "disney"
    color: [0.09, 0.10, 0.12]
    roughness: 0.38
    specular: 0.55

  # Vetro cristallino IOR 1.52
  - id: "vetro"
    type: "disney"
    color: [0.98, 0.99, 1.0]
    roughness: 0.0
    spec_trans: 1.0
    ior: 1.52
    specular: 0.8

# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:
  # Lente biconvessa CSG — asse lungo Y, disco orizzontale a y=2.0
  # Due sfere R=2.08 ai centri y=0.301 e y=3.699
  # Bounding sphere R=1.2 centrata a y=2.0 → ritaglia disco Ø 2.4
  # f = 2.08 / (2*(1.52-1)) = 2.0  →  fuoco esattamente a y=0 (pavimento)
  - name: "lente_biconvessa"
    type: "csg"
    operation: "intersection"
    left:
      type: "csg"
      operation: "intersection"
      left:
        type: "sphere"
        center: [0, 0.301, 0]
        radius: 2.08
      right:
        type: "sphere"
        center: [0, 3.699, 0]
        radius: 2.08
    right:
      type: "sphere"
      center: [0, 2.0, 0]
      radius: 1.2
    material: "vetro"

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # Pannello overhead: entra dalla faccia superiore della lente e
  # genera la caustica focalizzata sul pavimento.
  - type: area
    corner: [-3.0, 7.0, -3.0]
    u: [6.0, 0.0, 0.0]
    v: [0.0, 0.0, 6.0]
    color: [1.0, 0.95, 0.88]
    intensity: 55.0
    shadow_samples: 4

  # Fill tenue laterale (delta — solo fill ambientale)
  - type: "point"
    position: [5.0, 4.0, 2.0]
    color: [0.6, 0.65, 0.9]
    intensity: 5
