# Pro-grade procedural textures showcase
# Demonstrates the upgraded noise / marble / wood algorithms and the new
# voronoi, brick and gradient textures — feature parity with Arnold's "noise"
# / "cell_noise", Cycles' Voronoi / Brick / Gradient / Wave nodes and
# RenderMan's PxrFractal / PxrVoronoise / PxrTile.
#
# Layout: a 3×3 grid of spheres on a marble floor, each sphere advertising
# one texture flavour. Camera framed to keep all nine samples in frame.
#
# Suggested render:
#   dotnet run --project src/RayTracer/RayTracer.csproj -c Release -- \
#     -i scenes/showcases/texture-pro.yaml \
#     -o renders/texture-pro.png \
#     -w 1920 -H 1080 -s 256 -d 6

world:
  sky:
    type: "gradient"
    zenith_color:  [0.30, 0.45, 0.70]
    horizon_color: [0.85, 0.78, 0.65]
    ground_color:  [0.15, 0.12, 0.10]
    sun:
      direction: [-0.4, -0.8, -0.3]
      color:     [1.0, 0.92, 0.78]
      intensity: 12
      size:      4
  ground:
    type: "infinite_plane"
    material: "marble_floor"
    y: 0.0

camera:
  position:   [0, 3.5, 9]
  look_at:    [0, 1.0, 0]
  fov:        38
  aperture:   0.03
  focal_pos:  [0, 1.0, 0]

materials:
  # ----- Floor: pro Carrara-style marble -----
  # Tuning notes (Arnold / RenderMan / Cycles production playbook for marble
  # viewed at low grazing angle, like this 30-wu wide floor):
  #   - scale moderate (≈3): the underlying sinusoid runs at a vein-friendly
  #     frequency, giving 5-10 veins across the visible slab — denser than
  #     the camera resolves up close, sparse enough to read as figured stone.
  #   - noise_strength ≫ π so the noise term wraps the sine phase multiple
  #     times per world unit, fully scrambling any axial alignment.
  #   - distortion 1.2 pre-warps the input position with a 3-D Perlin vector
  #     sample (Inigo Quilez technique). At ≥1 the warp rotates the dominant
  #     direction completely, killing the residual "stripe" look that pure
  #     marble inevitably has at low scale.
  #   - vein_axis kept slightly off-axial (X dominant, gentle Z tilt) so that
  #     when the warp happens to be small, the residual direction still
  #     reads as natural slab-cut rather than wall-paneling.
  #   - vein_sharpness 6 narrows the veins into the thin high-contrast lines
  #     of real Carrara; >8 starts to alias.
  - id: "marble_floor"
    type: "lambertian"
    texture:
      type: "marble"
      scale: 1.0
      noise_strength: 32.0
      noise_type: "turbulence"
      octaves: 8
      lacunarity: 2.0
      gain: 0.5
      vein_axis: [1.0, 0.0, 0.55]
      vein_frequency: 1.0
      vein_sharpness: 5.0
      distortion: 0.6
      # Multi-stop ramp drives the colour directly, bypassing the two-colour
      # lerp. This Statuario-style ramp pushes a faint golden mid-tone
      # between the dark veins and the warm-white base — a look impossible
      # to reach with the legacy `colors: [A, B]` shorthand.
      color_ramp:
        - { position: 0.00, color: [0.08, 0.08, 0.10], interp: "smoothstep" }   # vein (dark)
        - { position: 0.35, color: [0.55, 0.45, 0.32], interp: "linear"     }   # gold transition
        - { position: 0.55, color: [0.95, 0.92, 0.86], interp: "linear"     }   # base (warm white)
        - { position: 1.00, color: [0.94, 0.92, 0.88], interp: "linear"     }

  # ----- Row 1: noise family (Perlin, fBm, Ridged) -----
  - id: "tex_perlin"
    type: "lambertian"
    texture:
      type: "noise"
      noise_type: "perlin"
      scale: 4.0
      colors: [[0.20, 0.45, 0.70], [0.95, 0.95, 0.98]]

  - id: "tex_fbm"
    type: "lambertian"
    texture:
      type: "noise"
      noise_type: "fbm"
      scale: 3.0
      octaves: 7
      lacunarity: 2.0
      gain: 0.55
      distortion: 0.4
      colors: [[0.10, 0.30, 0.20], [0.85, 0.80, 0.55]]

  - id: "tex_ridged"
    type: "lambertian"
    texture:
      type: "noise"
      noise_type: "ridged"
      scale: 3.5
      octaves: 6
      lacunarity: 2.3
      gain: 0.5
      colors: [[0.10, 0.10, 0.12], [0.95, 0.55, 0.20]]

  # ----- Row 2: cellular / Voronoi family -----
  - id: "tex_voronoi_f1"
    type: "lambertian"
    texture:
      type: "voronoi"
      scale: 4.5
      metric: "euclidean"
      output: "f1"
      randomness: 1.0
      colors: [[0.95, 0.92, 0.88], [0.20, 0.18, 0.16]]

  # f2_minus_f1 is ZERO on the cell boundary (perpendicular bisector between
  # two feature points) and grows to its MAX at the cell centre. Since the
  # lerp uses t = (F2-F1)/maxD, t=0 → colors[0] is the EDGE colour and
  # t=1 → colors[1] is the CELL-INTERIOR colour. For the classic "crackle"
  # look (bright thin lines on a dark background) put the bright edge colour
  # FIRST and the dark interior colour SECOND.
  - id: "tex_voronoi_crackle"
    type: "lambertian"
    texture:
      type: "voronoi"
      scale: 5.5
      metric: "euclidean"
      output: "f2_minus_f1"
      randomness: 0.95
      distortion: 0.35
      colors: [[0.95, 0.92, 0.75], [0.04, 0.04, 0.05]]   # bright EDGES, dark interior

  - id: "tex_voronoi_chebyshev"
    type: "lambertian"
    texture:
      type: "voronoi"
      scale: 4.0
      metric: "chebyshev"
      output: "cell"
      randomness: 0.4

  # ----- Row 3: classic stone / wood / pattern -----
  - id: "tex_brick"
    type: "lambertian"
    texture:
      type: "brick"
      brick_width:    0.4
      brick_height:   0.18
      mortar_size:    0.025
      row_offset:     0.5
      color_variation: 0.6
      noise_scale:    0.15
      colors:
        - [0.72, 0.32, 0.22]    # warm brick
        - [0.52, 0.18, 0.12]    # darker brick
        - [0.86, 0.83, 0.78]    # mortar

  - id: "tex_wood"
    type: "disney"
    roughness: 0.35
    specular: 0.5
    texture:
      type: "wood"
      scale: 5.0
      noise_strength: 1.2
      ring_axis: [0, 1, 0.15]
      ring_sharpness: 3.5
      axial_grain: 0.4
      octaves: 4
      lacunarity: 2.0
      gain: 0.5
      distortion: 0.18
      colors: [[0.78, 0.55, 0.30], [0.42, 0.24, 0.12]]

  - id: "tex_gradient"
    type: "lambertian"
    texture:
      type: "gradient"
      mode: "spherical"
      length: 0.95
      # 4-stop sunset ramp: warm sun core → orange → magenta → deep blue
      # twilight at the silhouette. The `easing` interp at the magenta
      # band gives the smooth photo-real shoulder no two-colour lerp can
      # produce.
      color_ramp:
        - { position: 0.00, color: [1.00, 0.92, 0.55], interp: "linear"     }
        - { position: 0.35, color: [1.00, 0.55, 0.20], interp: "ease"       }
        - { position: 0.65, color: [0.70, 0.15, 0.45], interp: "smoothstep" }
        - { position: 1.00, color: [0.05, 0.02, 0.20], interp: "linear"     }

entities:
  # ----- Row 1 (back row, z = -2.2) -----
  - { type: "sphere", center: [-2.4, 1.0, -2.2], radius: 1.0, material: "tex_perlin" }
  - { type: "sphere", center: [ 0.0, 1.0, -2.2], radius: 1.0, material: "tex_fbm" }
  - { type: "sphere", center: [ 2.4, 1.0, -2.2], radius: 1.0, material: "tex_ridged" }

  # ----- Row 2 (middle row, z = 0) -----
  - { type: "sphere", center: [-2.4, 1.0,  0.0], radius: 1.0, material: "tex_voronoi_f1" }
  - { type: "sphere", center: [ 0.0, 1.0,  0.0], radius: 1.0, material: "tex_voronoi_crackle" }
  - { type: "sphere", center: [ 2.4, 1.0,  0.0], radius: 1.0, material: "tex_voronoi_chebyshev" }

  # ----- Row 3 (front row, z = 2.2) -----
  - { type: "sphere", center: [-2.4, 1.0,  2.2], radius: 1.0, material: "tex_brick" }
  - { type: "sphere", center: [ 0.0, 1.0,  2.2], radius: 1.0, material: "tex_wood" }
  - { type: "sphere", center: [ 2.4, 1.0,  2.2], radius: 1.0, material: "tex_gradient" }
