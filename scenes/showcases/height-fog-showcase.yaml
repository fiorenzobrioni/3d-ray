# Height-fog showcase: exponential atmospheric falloff with altitude.
# Dense fog near the ground (y0=0), thinning out with scale_height=2.
# Tall pillars let the camera see the gradient from their base to their top.
world:
  ambient_light: [0.02, 0.02, 0.03]
  background:   [0.35, 0.45, 0.6]
  ground: { y: 0, material: floor }
  medium:
    type: height_fog
    sigma_a: [0.02, 0.02, 0.025]
    sigma_s: [0.25, 0.28, 0.32]
    y0: 0.0
    scale_height: 2.0
    phase: hg
    g: 0.6
camera: { position: [0, 3, 12], look_at: [0, 2, 0], vup: [0,1,0], fov: 45, aperture: 0, focal_dist: 12 }
materials:
  - { id: floor, type: lambertian, albedo: [0.35, 0.32, 0.28] }
  - { id: pillar, type: lambertian, albedo: [0.7, 0.65, 0.55] }
lights:
  - type: directional
    direction: [-0.3, -1.0, -0.4]
    color: [1.0, 0.95, 0.85]
    intensity: 4
entities:
  - { type: box, scale: [0.4, 8.0, 0.4], translate: [-3.0, 4.0, -2.0], material: pillar }
  - { type: box, scale: [0.4, 8.0, 0.4], translate: [ 3.0, 4.0, -2.0], material: pillar }
  - { type: box, scale: [0.4, 5.0, 0.4], translate: [-1.0, 2.5, -1.0], material: pillar }
  - { type: box, scale: [0.4, 5.0, 0.4], translate: [ 1.0, 2.5, -1.0], material: pillar }
