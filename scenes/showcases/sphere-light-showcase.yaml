# ═══════════════════════════════════════════════════════════════════════════
#  sphere-light-showcase.yaml — Sphere Light con Solid-Angle Sampling
# ═══════════════════════════════════════════════════════════════════════════
#
#  Tre sphere light con raggio crescente dimostrano la progressione della
#  penumbra: da quasi-netta (R=0.15) a molto morbida (R=1.2).
#
#  Render consigliati:
#    Preview:  -s 64   -d 4  -w 400  -H 225 -S 1
#    Draft:    -s 256  -d 6  -w 800  -H 450
#    Final:    -s 1024 -d 8  -w 1920 -H 1080 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.01, 0.01, 0.015]
  sky:
    type: "gradient"
    zenith_color:  [0.02, 0.04, 0.12]
    horizon_color: [0.06, 0.08, 0.12]
    ground_color:  [0.02, 0.02, 0.02]

camera:
  position: [0, 5, 11]
  look_at:  [0, 1.2, 0]
  vup:      [0, 1, 0]
  fov: 40
  aperture: 0.0
  focal_dist: 11

# ═════════════════════════════════════════════════════════════════════════════
#  MATERIALI
# ═════════════════════════════════════════════════════════════════════════════
materials:

  # ── Pedana — grigio medio per leggere bene le ombre ─────────────────────
  - id: "floor"
    type: "disney"
    color: [0.65, 0.63, 0.60]
    roughness: 0.45
    metallic: 0.0
    specular: 0.3

  # ── Parete di fondo — leggermente più chiara del pavimento ──────────────
  - id: "wall"
    type: "lambertian"
    color: [0.75, 0.73, 0.70]

  # ── Oggetti test ─────────────────────────────────────────────────────────
  - id: "chrome"
    type: "disney"
    color: [0.95, 0.93, 0.90]
    roughness: 0.02
    metallic: 1.0

  - id: "clay"
    type: "lambertian"
    color: [0.72, 0.20, 0.12]

  - id: "glass"
    type: "dielectric"
    color: [0.97, 0.98, 1.0]
    refraction_index: 1.52

  - id: "ivory"
    type: "disney"
    color: [0.85, 0.82, 0.75]
    roughness: 0.25
    metallic: 0.0
    specular: 0.5

# ═════════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═════════════════════════════════════════════════════════════════════════════
entities:

  # ── Pavimento ────────────────────────────────────────────────────────────
  - name: "floor"
    type: "box"
    material: "floor"
    scale: [18, 0.2, 14]
    translate: [0, -0.1, 0]

  # ── Parete di fondo ─────────────────────────────────────────────────────
  - name: "wall_back"
    type: "box"
    material: "wall"
    scale: [18, 10, 0.2]
    translate: [0, 5, -7]

  # ═══════════════════════════════════════════════════════════════════════════
  #  Tre gruppi di oggetti test — uno sotto ciascuna sphere light
  #  Le ombre mostrano la progressione della penumbra.
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Gruppo sinistro (sotto sfera piccola R=0.15, ombre quasi nette) ─────
  - { name: "chrome_L",  type: "sphere",  center: [-4.5, 0.55, 0.5],  radius: 0.55, material: "chrome" }
  - { name: "clay_L",    type: "sphere",  center: [-4.5, 0.35, 2.0],  radius: 0.35, material: "clay" }
  - { name: "ivory_L",   type: "sphere",  center: [-3.5, 0.30, 1.2],  radius: 0.30, material: "ivory" }

  # ── Gruppo centrale (sotto sfera media R=0.5, penumbra moderata) ────────
  - { name: "chrome_C",  type: "sphere",  center: [0, 0.55, 0.5],     radius: 0.55, material: "chrome" }
  - { name: "clay_C",    type: "sphere",  center: [0, 0.35, 2.0],     radius: 0.35, material: "clay" }
  - { name: "ivory_C",   type: "sphere",  center: [1.0, 0.30, 1.2],   radius: 0.30, material: "ivory" }

  # ── Gruppo destro (sotto sfera grande R=1.2, ombre molto morbide) ───────
  - { name: "chrome_R",  type: "sphere",  center: [4.5, 0.55, 0.5],   radius: 0.55, material: "chrome" }
  - { name: "clay_R",    type: "sphere",  center: [4.5, 0.35, 2.0],   radius: 0.35, material: "clay" }
  - { name: "ivory_R",   type: "sphere",  center: [5.5, 0.30, 1.2],   radius: 0.30, material: "ivory" }

  # ── Sfere di vetro (fila arretrata) ─────────────────────────────────────
  - { name: "glass_L",   type: "sphere",  center: [-4.5, 0.32, -1.2], radius: 0.32, material: "glass" }
  - { name: "glass_C",   type: "sphere",  center: [0, 0.32, -1.2],    radius: 0.32, material: "glass" }
  - { name: "glass_R",   type: "sphere",  center: [4.5, 0.32, -1.2],  radius: 0.32, material: "glass" }

# ═════════════════════════════════════════════════════════════════════════════
#  LIGHTS — Tre Sphere Light con raggio crescente
# ═════════════════════════════════════════════════════════════════════════════
#
#  Stessa intensità per tutte e tre: le differenze nella penumbra
#  dipendono SOLO dal raggio (angolo solido sotteso).
#
#  Intensità calibrata per evitare sovraesposizione sul pavimento
#  grigio medio. Il floor a 0.65 assorbe abbastanza luce da rendere
#  leggibili le sfumature di penumbra.
# ═════════════════════════════════════════════════════════════════════════════
lights:

  # ── Sfera piccola (quasi-puntiforme, ombre nette con penumbra sottile) ──
  - type: "sphere"
    position: [-4.5, 4.5, 0.5]
    radius: 0.15
    color: [1.0, 0.95, 0.88]
    intensity: 12.0
    shadow_samples: 16

  # ── Sfera media (lampadina classica, penumbra moderata) ─────────────────
  - type: "sphere"
    position: [0, 4.5, 0.5]
    radius: 0.5
    color: [1.0, 0.95, 0.88]
    intensity: 12.0
    shadow_samples: 16

  # ── Sfera grande (lanterna/globo, ombre molto morbide) ──────────────────
  - type: "sphere"
    position: [4.5, 4.5, 0.5]
    radius: 1.2
    color: [1.0, 0.93, 0.80]
    intensity: 12.0
    shadow_samples: 16

  # ── Fill tenue dal retro-alto (evita nero assoluto nei recessi) ─────────
  - type: "point"
    position: [0, 7, 8]
    color: [0.55, 0.60, 0.75]
    intensity: 2.0
