# ═══════════════════════════════════════════════════════════════════════════
#  Marbles Studio v2 Showcase — Sezione EXTENDED di stones.yaml
#
#  Dimostra 6 marmi e pietre dell'estensione VFX v2 in `stones.yaml`,
#  che esibiscono le feature studio-quality più recenti:
#
#    x=-5.0  Carrara v2          → secondary_wave + color_ramp 5-stop
#    x=-3.0  Calacatta gold v2   → vein dorata + secondary forte
#    x=-1.0  Arabescato v2       → distortion 0.45 + secondary 0.75
#    x=+1.0  Breccia Aurora      → voronoi cell + 5-stop frammenti
#    x=+3.0  Travertino musgrave → hybrid_multifractal stratificato
#    x=+5.0  Onice musgrave miele → hetero_terrain + spec_trans
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 64   -d 8  -S 1
#    Finale: -w 1920 -H 1080 -s 2048 -d 12 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/stones.yaml" }

world:
  sky:
    type: "flat"
    color: [0.001, 0.001, 0.0012]

camera:
  position: [0, 1.6, -10.5]
  look_at:  [0, 0.85, 0]
  fov: 56

materials:
  - id: "floor"
    type: "disney"
    color: [0.28, 0.28, 0.30]
    roughness: 0.80

entities:

  - { name: "floor", type: "quad", q: [-12, 0, -4], u: [24, 0, 0], v: [0, 0, 10], material: "floor" }

  - name: "carrara"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [-5.0, 0.85, 0]
    seed: 1
    material: "dis_carrara_studio_v2"
  - name: "calacatta"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [-3.0, 0.85, 0]
    seed: 7
    material: "dis_calacatta_gold_v2"
  - name: "arabescato"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [-1.0, 0.85, 0]
    seed: 13
    material: "dis_arabescato_studio_v2"
  - name: "breccia"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [1.0, 0.85, 0]
    seed: 23
    material: "dis_breccia_aurora"
  - name: "travertino"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [3.0, 0.85, 0]
    seed: 31
    material: "dis_travertino_musgrave"
  - name: "onice"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.85, 0.85, 0.85]
    translate: [5.0, 0.85, 0]
    seed: 41
    material: "dis_onice_musgrave_miele"

lights:
  - type: "directional"
    direction: [-0.4, -0.8, 0.45]
    color: [1.0, 0.98, 0.94]
    intensity: 6.5
    angular_radius: 0.6

  - type: "point"
    position: [-7, 6, -4]
    color: [0.90, 0.93, 1.00]
    intensity: 55

  - type: "point"
    position: [0, 3.5, 5]
    color: [1.0, 0.82, 0.62]
    intensity: 45
