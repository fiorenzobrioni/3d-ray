lights:
  - type: "directional"
    direction: [-0.4, -0.8, 0.45]
    color: [1.0, 0.98, 0.94]
    intensity: 6.5
    angular_radius: 0.6

  - type: "point"
    position: [-7, 6, -4]
    color: [0.90, 0.93, 1.00]
    intensity: 55

  - type: "point"
    position: [0, 3.5, 5]
    color: [1.0, 0.82, 0.62]
    intensity: 45
