# ============================================================================
# Group & Template Showcase
# ============================================================================
# Dimostra:
#   - Template: definisci una volta, istanzia N volte
#   - Transform su template (posa di default) + transform su instance
#   - Override materiale per-istanza
#   - Gruppi con figli CSG e annidamento ricorsivo
#   - Emissivi dentro gruppi per NEE
# ============================================================================

world:
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.08, 0.08, 0.12]
    ground_color: [0.03, 0.03, 0.04]

cameras:
  # ── Baseline: pinhole, tutto a fuoco ──────────────────────────────────
  - name: "pinhole"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42

  # ── DoF morbido: test deformazioni con focal_dist medio ──────────────
  - name: "dof_soft"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42
    aperture: 0.2
    focal_dist: 10.5

  # ── DoF estremo: stress test per il quartic solver ────────────────────
  - name: "dof_extreme"
    position: [6, 4, -8]
    look_at: [1.1, 1.2, 0.5]
    fov: 42
    aperture: 0.5
    focal_dist: 10.5

  # ── Closeup: primo piano sulla pedina per ispezionare il contorno ─────
  - name: "closeup"
    position: [1.2, 0.5, -2.0]
    look_at: [0, 0.25, 0]
    fov: 30
    aperture: 0.0
    focal_dist: 1

  # ── Zenitale: vista dall'alto per simmetria ───────────────────────────
  - name: "top"
    position: [0, 9, 2.01]
    look_at: [0, 0, 2]
    fov: 50
    aperture: 0.0
    focal_dist: 10

materials:
  - id: "pavimento"
    type: "disney"
    roughness: 0.45
    metallic: 0.0
    specular: 0.0
    texture:
      type: "checker"
      colors: [[0.08, 0.08, 0.10], [0.18, 0.18, 0.20]]
      scale: 1.0

  - id: "luce_calda"
    type: "emissive"
    color: [1.0, 0.85, 0.6]
    intensity: 12.0

  - id: "luce_fredda"
    type: "emissive"
    color: [0.7, 0.85, 1.0]
    intensity: 8.0

  - id: "gomma_nera"
    type: "disney"
    color: [0.05, 0.05, 0.05]
    roughness: 0.8

  # ─── Metalli (inline, autosufficienti) ────────────────────────────────────
  - id: "dis_ferro_battuto"
    type: "disney"
    color: [0.30, 0.28, 0.26]
    metallic: 0.85
    roughness: 0.62
    specular: 0.35

  - id: "dis_acciaio_spazzolato"
    type: "disney"
    color: [0.54, 0.53, 0.51]
    metallic: 1.0
    roughness: 0.38
    specular: 0.55
    anisotropic: 0.85
    anisotropic_rotation: 0.0

  - id: "dis_bronzo_satinato"
    type: "disney"
    color: [0.72, 0.45, 0.20]
    metallic: 1.0
    roughness: 0.28
    specular: 0.55

  # ─── Ceramiche (inline, autosufficienti) ──────────────────────────────────
  - id: "dis_porcellana_bianca"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.12
    specular: 0.8
    clearcoat: 0.4
    coat_roughness: 0.10
    coat_ior: 1.5

  - id: "dis_porcellana_blu"
    type: "disney"
    color: [0.10, 0.15, 0.55]
    roughness: 0.10
    specular: 0.85
    clearcoat: 0.5
    coat_roughness: 0.08
    coat_ior: 1.5

  - id: "dis_porcellana_nera"
    type: "disney"
    color: [0.03, 0.03, 0.04]
    roughness: 0.06
    specular: 0.9
    clearcoat: 0.6
    coat_roughness: 0.05
    coat_ior: 1.5

  - id: "dis_celadon_classico"
    type: "disney"
    color: [0.45, 0.62, 0.48]
    roughness: 0.12
    specular: 0.75
    clearcoat: 0.5
    coat_roughness: 0.10
    coat_ior: 1.5

  - id: "dis_raku_rame"
    type: "disney"
    color: [0.65, 0.35, 0.18]
    roughness: 0.28
    metallic: 0.55
    specular: 0.7
    specular_tint: 0.6

# ============================================================================
# LIGHTS: studio 3-point (key area calda, fill area fredda, rim point caldo)
# ============================================================================
lights:
  - type: "area"
    corner: [-4.0, 4.0, -2.0]
    u: [2.0, 0.0, 0.0]
    v: [0.0, 0.0, 2.0]
    color: [1.0, 0.96, 0.90]
    intensity: 45.0

  - type: "area"
    corner: [3.0, 3.0, -1.5]
    u: [1.2, 0.0, 0.0]
    v: [0.0, 0.0, 1.2]
    color: [0.72, 0.82, 1.0]
    intensity: 15.0
    shadow_samples: 9

  - type: "point"
    position: [1.0, 4.5, 4.5]
    color: [1.0, 0.97, 0.88]
    intensity: 55.0
    soft_radius: 0.12

# ============================================================================
# TEMPLATE: definiti una volta, usati N volte sotto
# ============================================================================
templates:
  # ── Pedina da scacchi (stile Staunton) ─────────────────────────────────
  #
  #  Profilo:          ○           ← testa sferica
  #                    │
  #                  ──┤──         ← collarino (torus)
  #                  / │ \
  #                /   │   \      ← corpo conico (frustum)
  #              /     │     \
  #            ════════╤════════   ← labbro base (torus, sporge)
  #            ┗━━━━━━━┛          ← piatto base (cilindro)
  #
  - name: "pedina"
    children:
      # 1. Piatto base — disco largo e sottile
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.38
        height: 0.05
      # 2. Labbro base — torus che sporge oltre il piatto (outer 0.41)
      - type: "torus"
        translate: [0, 0.05, 0]
        major_radius: 0.35
        minor_radius: 0.06
      # 3. Corpo — cono tronco rastremato verso l'alto
      - type: "cone"
        center: [0, 0.05, 0]
        radius: 0.30
        top_radius: 0.13
        height: 0.48
      # 4. Collarino — anello decorativo al collo
      - type: "torus"
        translate: [0, 0.53, 0]
        major_radius: 0.15
        minor_radius: 0.04
      # 5. Collo — cilindretto sottile
      - type: "cylinder"
        center: [0, 0.53, 0]
        radius: 0.09
        height: 0.12
      # 6. Testa — sfera classica della pedina
      - type: "sphere"
        center: [0, 0.74, 0]
        radius: 0.16

  # ── Lampione stradale ──────────────────────────────────────────────────
  - name: "lampione"
    material: "dis_ferro_battuto"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.20
        height: 0.08
      - type: "cylinder"
        center: [0, 0.08, 0]
        radius: 0.05
        height: 2.5
      - type: "sphere"
        center: [0, 2.8, 0]
        radius: 0.18
        material: "luce_calda"
      - type: "cone"
        center: [0, 2.88, 0]
        radius: 0.30
        top_radius: 0.05
        height: 0.15

# ============================================================================
# ENTITIES: istanze, gruppi, primitive
# ============================================================================
entities:

  # ── Pavimento ──────────────────────────────────────────────────────────
  - name: "suolo"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  # ── 5 pedine in fila — stesso template, ceramiche diverse ───────────────
  - name: "pedina_1"
    type: "instance"
    template: "pedina"
    material: "dis_porcellana_bianca"
    translate: [-3, 0, 0]

  - name: "pedina_2"
    type: "instance"
    template: "pedina"
    material: "dis_celadon_classico"
    translate: [-1.5, 0, 0]

  - name: "pedina_3"
    type: "instance"
    template: "pedina"
    material: "dis_porcellana_blu"
    translate: [0, 0, 0]

  - name: "pedina_4"
    type: "instance"
    template: "pedina"
    material: "dis_raku_rame"
    translate: [1.5, 0, 0]

  - name: "pedina_5"
    type: "instance"
    template: "pedina"
    material: "dis_porcellana_nera"
    translate: [3, 0, 0]
    scale: 1.3                   # Variante più grande

  # ── 2 lampioni — stesso template, posizioni diverse, uno con luce fredda
  - name: "lampione_sx"
    type: "instance"
    template: "lampione"
    translate: [-4.5, 0, 2]

  - name: "lampione_dx"
    type: "instance"
    template: "lampione"
    translate: [4.5, 0, 2]
    # Nota: la sfera emissiva nel template ha material "luce_calda" hardcoded
    # Per varianti, serve un template separato o un gruppo con override

  # ── Braccio robotico (gruppo annidato a 3 livelli — non template) ──────
  - name: "robot_arm"
    type: "group"
    translate: [0, 0, 3.5]
    material: "dis_acciaio_spazzolato"
    children:
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.4
        height: 0.12
        material: "gomma_nera"
      - type: "sphere"
        center: [0, 0.20, 0]
        radius: 0.12
      - type: "cylinder"
        center: [0, 0.28, 0]
        radius: 0.06
        height: 1.0
      - name: "avambraccio"
        type: "group"
        translate: [0, 1.28, 0]
        rotate: [0, 0, -25]
        children:
          - type: "sphere"
            center: [0, 0, 0]
            radius: 0.10
          - type: "cylinder"
            center: [0, 0.08, 0]
            radius: 0.05
            height: 0.8
          - name: "mano"
            type: "group"
            translate: [0, 0.88, 0]
            rotate: [0, 0, 15]
            children:
              - type: "sphere"
                center: [0, 0, 0]
                radius: 0.07
                material: "dis_bronzo_satinato"
              - type: "box"
                scale: [0.02, 0.16, 0.05]
                translate: [-0.05, 0.10, 0]
              - type: "box"
                scale: [0.02, 0.16, 0.05]
                translate: [0.05, 0.10, 0]
