# ═══════════════════════════════════════════════════════════════════════════
#  Synthetics Showcase — Materiali Tecnici Avanzati
#
#  Dimostra 5 materiali tecnici avanzati:
#
#    x=-4.8  Fibra di carbonio twill    → anisotropic 0.85 + clearcoat 0.95
#    x=-2.4  Kevlar giallo               → anisotropic + sheen weave
#    x=  0   Silicone medicale           → subsurface 0.55 + spec_trans
#    x=+2.4  Vinile chrome rosa          → metallic 1.0 + clearcoat
#    x=+4.8  Neoprene foderato           → sheen alto + bump weave
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 32   -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.03, 0.03, 0.04]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "dis_carbonio_twill"
    type: "disney"
    color: [0.04, 0.04, 0.05]
    roughness: 0.20
    specular: 0.50
    anisotropic: 0.85
    anisotropic_rotation: 0.125
    clearcoat: 0.95
    coat_roughness: 0.05
    coat_ior: 1.5
    bump_map:
      texture:
        type: "voronoi"
        scale: 60.0
        output: "random"
        smoothness: 0.05
        randomness: 0.4
        colors: [[0.35, 0.35, 0.35], [0.65, 0.65, 0.65]]
      strength: 0.6

  - id: "dis_kevlar_giallo"
    type: "disney"
    color: [0.95, 0.78, 0.18]
    roughness: 0.65
    specular: 0.32
    anisotropic: 0.60
    anisotropic_rotation: 0.0
    sheen: 0.30
    sheen_roughness: 0.6
    bump_map:
      texture:
        type: "voronoi"
        scale: 60.0
        output: "random"
        randomness: 0.3
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.6

  - id: "dis_silicone_medicale"
    type: "disney"
    color: [0.94, 0.92, 0.90]
    roughness: 0.25
    specular: 0.45
    spec_trans: 0.25
    ior: 1.41
    transmission_color: [0.95, 0.92, 0.88]
    transmission_depth: 0.5

  - id: "dis_vinile_chrome_rosa"
    type: "disney"
    metallic: 1.0
    color: [0.95, 0.62, 0.78]
    roughness: 0.05
    specular: 0.6
    clearcoat: 0.9
    coat_roughness: 0.04
    coat_ior: 1.5

  - id: "dis_neoprene_foderato"
    type: "disney"
    color: [0.06, 0.06, 0.06]
    roughness: 0.78
    specular: 0.22
    sheen: 0.40
    sheen_roughness: 0.7
    bump_map:
      texture:
        type: "voronoi"
        scale: 90.0
        output: "random"
        smoothness: 0.2
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.5

  - id: "floor"
    type: "disney"
    color: [0.16, 0.16, 0.17]
    roughness: 0.65

  - id: "backdrop"
    type: "disney"
    color: [0.06, 0.06, 0.07]
    roughness: 0.92

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "carbon"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "dis_carbonio_twill"
  - name: "kevlar"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "dis_kevlar_giallo"
  - name: "silicone"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "dis_silicone_medicale"
  - name: "chrome"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "dis_vinile_chrome_rosa"
  - name: "neoprene"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "dis_neoprene_foderato"

lights:

  - type: "directional"
    direction: [-0.45, -0.75, 0.4]
    color: [1.0, 0.98, 0.95]
    intensity: 5.5
    angular_radius: 0.5

  - type: "point"
    position: [-6, 7, -3]
    color: [0.85, 0.92, 1.00]
    intensity: 60

  - type: "point"
    position: [0, 3.5, 5]
    color: [1.0, 0.85, 0.62]
    intensity: 50
