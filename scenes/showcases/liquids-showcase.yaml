# ═══════════════════════════════════════════════════════════════════════════
#  Liquids Showcase — Liquidi
#
#  Dimostra 5 liquidi della libreria `liquids.yaml` come sfere trasparenti.
#  Le sfere isolate non sono il modo realistico di renderizzare liquidi
#  (servirebbero bicchieri con superfici interno+esterno), ma esibiscono
#  efficacemente Beer-Lambert e trasmissione colorata.
#
#    x=-4.8  Vino rosso             → transmission_depth corto, colore profondo
#    x=-2.4  Latte intero            → subsurface 0.65 (opaco)
#    x=  0   Miele                   → spec_trans + ior 1.484 alto
#    x=+2.4  Olio motore             → thin_film 380nm iridescente
#    x=+4.8  Acqua piscina           → spec_trans 1.0 + ior 1.33
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 128  -d 12 -S 1
#    Finale: -w 1920 -H 1080 -s 2048 -d 14 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/liquids.yaml" }

world:
  sky:
    type: "flat"
    color: [0.18, 0.18, 0.20]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.62, 0.62, 0.60]
    roughness: 0.65
    specular: 0.35

  - id: "backdrop"
    type: "disney"
    color: [0.35, 0.35, 0.36]
    roughness: 0.88

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - { name: "vino",   type: "sphere", center: [-4.8, 0.9, 0], radius: 0.9, seed:  3, material: "dis_vino_rosso"     }
  - { name: "latte",  type: "sphere", center: [-2.4, 0.9, 0], radius: 0.9, seed: 11, material: "dis_latte_intero"   }
  - { name: "miele",  type: "sphere", center: [ 0.0, 0.9, 0], radius: 0.9, seed: 19, material: "dis_miele"          }
  - { name: "olio",   type: "sphere", center: [ 2.4, 0.9, 0], radius: 0.9, seed: 29, material: "dis_olio_motore"    }
  - { name: "acqua",  type: "sphere", center: [ 4.8, 0.9, 0], radius: 0.9, seed: 37, material: "dis_acqua_piscina"  }

lights:

  # Backdrop chiaro + key forte: i liquidi trasparenti devono mostrare
  # la propria assorbimento Beer-Lambert leggendo il backdrop.
  - type: "directional"
    direction: [-0.4, -0.5, 0.6]
    color: [1.0, 0.97, 0.92]
    intensity: 7.0
    angular_radius: 0.4

  - type: "point"
    position: [0, 5, -4]
    color: [1.0, 1.0, 0.95]
    intensity: 90

  - type: "point"
    position: [0, 3, 5]
    color: [1.0, 0.92, 0.78]
    intensity: 65
