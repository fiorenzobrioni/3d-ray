lights:

  # Sole basso caldo da sinistra — outdoor abandoned site.
  - type: "directional"
    direction: [-0.55, -0.55, 0.6]
    color: [1.00, 0.88, 0.68]
    intensity: 5.5
    angular_radius: 0.7

  # Fill freddo dall'alto — sky bounce.
  - type: "point"
    position: [0, 8, -3]
    color: [0.82, 0.88, 1.00]
    intensity: 70

  # Rim caldo basso da dietro — enfatizza i bordi dei due livelli.
  - type: "point"
    position: [0, 2, 6]
    color: [1.0, 0.78, 0.55]
    intensity: 45
