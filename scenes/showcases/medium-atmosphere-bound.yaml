# ═══════════════════════════════════════════════════════════════════════════
#  MEDIUM INTERFACE #04 — Atmosfera legata a una sfera (aerial perspective locale)
#
#  Una sfera-pianeta opaca circondata da un guscio sferico trasparente
#  legato a un medium "atmosphere" — un omogeneo con coefficiente Rayleigh
#  (σ_s ∝ 1/λ⁴, da cui il classico blu-eccesso) e phase function rayleigh.
#  Esterno = vacuum globale: lo spazio attorno al pianeta resta nero.
#
#  Punto chiave: senza MediumInterface, l'unico modo per avere
#  "atmosfera del pianeta" sarebbe `world.medium` — che riempirebbe
#  l'INTERA scena di nebbia. Bindando il medium a un guscio sferico,
#  l'atmosfera è davvero localizzata: solo i raggi che attraversano
#  il guscio vedono lo scattering Rayleigh, gli altri viaggiano nel
#  vacuum.
#
#  Per la fisica realistica con scale-height esponenziale, esiste anche
#  il `type: atmosphere` (NishitaAtmosphereMedium) — ma il suo modello
#  è "flat earth" (altitudine = differenza in Y), quindi non si adatta
#  geometricamente bene a una sfera-pianeta inquadrata in close-up.
#  L'omogeneo con phase rayleigh dà il look corretto su scala locale.
#
#  Profili:
#    Preview:    -q draft-small
#    Standard:   -q medium-small
#    Final:      -q final-small
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.0008, 0.0010, 0.0018]   # Quasi vacuum scuro (no stelle)

camera:
  position: [0, 0, 5.6]
  look_at:  [0, 0, 0]
  vup:      [0, 1, 0]
  fov:      38
  aperture: 0.0
  focal_dist: 5.6

mediums:
  # Atmosfera con scattering Rayleigh (blu eccesso). σ_s sui canali bilanciati
  # come 1/λ⁴ rispetto al verde: λ_R=650, λ_G=550, λ_B=440 → (550/650)⁴ ≈ 0.51,
  # (550/440)⁴ ≈ 2.42.
  - id: planet_atmosphere
    type: homogeneous
    sigma_a: [0.0, 0.0, 0.0]
    sigma_s: [0.35, 0.68, 1.65]
    phase: rayleigh

materials:
  - id: planet_surface
    type: disney
    color: [0.18, 0.28, 0.42]        # Tipo oceano + nuvole
    roughness: 0.50
    specular: 0.35

  - id: atmosphere_shell
    type: disney
    color: [1.0, 1.0, 1.0]
    roughness: 0.0
    specular: 0.0
    spec_trans: 1.0
    ior: 1.0                          # Matched IOR → niente refrazione, solo medium

lights:
  # Sole (directional con soft disk per il terminator).
  - type: directional
    direction: [-0.65, -0.10, -0.45]
    color:     [1.0, 0.97, 0.90]
    intensity: 4.0
    angular_radius_deg: 0.27

entities:
  # Guscio atmosfera: trasparente, interior = atmosphere medium.
  - name: atmosphere
    type: sphere
    center: [0, 0, 0]
    radius: 1.40
    material: atmosphere_shell
    interior_medium: planet_atmosphere

  # Pianeta opaco (più piccolo, dentro l'atmosfera).
  - name: planet
    type: sphere
    center: [0, 0, 0]
    radius: 1.20
    material: planet_surface
