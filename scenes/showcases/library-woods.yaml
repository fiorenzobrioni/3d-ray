    color: [0.28, 0.28, 0.30]
    roughness: 0.80

  - id: "dis_rovere_quartato_medullary"
    type: "disney"
    texture:
      type: "wood"
      scale: 4.5
      grain_strength: 2.0
      latewood_width: 0.20
      ring_sharpness: 4.5
      ring_color_variation: 0.22
      ring_width_variation: 0.18
      warp_amplitude: 0.50
      radial_anisotropy: 4.5
      figure_strength: 0.55
      figure_scale: 0.16
      figure_aspect: 5.0
      pore_density: 0.45
      pore_scale: 18.0
      pore_aspect: 7.0
      pore_strength: 0.55
      octaves: 5
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.08, 0.04], interp: "smoothstep" }
        - { position: 0.30, color: [0.42, 0.25, 0.10], interp: "smoothstep" }
        - { position: 0.65, color: [0.78, 0.55, 0.30], interp: "smoothstep" }
        - { position: 1.00, color: [0.96, 0.82, 0.55], interp: "linear" }
