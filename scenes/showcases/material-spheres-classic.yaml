# =============================================================================
#  SPHERE SHOWCASE DISNEY — Espositore 6×6 Sfere di Materiali PBR Moderni
#  ┌─────────────────────────────────────────────────────────────────────┐
#  │  LEGACY — versione storica conservata per riferimento.              │
#  │  La nuova versione `sphere-showcase.yaml` integra l'intero stack    │
#  │  displacement (bump / subdivision / scalar / vector / autobump) e   │
#  │  le feature di texturing VFX (color ramp multi-stop, smooth         │
#  │  voronoi, Musgrave multifractal, marble/wood studio, F3/F4 voronoi  │
#  │  outputs, coordinate texture).                                       │
#  └─────────────────────────────────────────────────────────────────────┘
# =============================================================================
#
#  Camere disponibili (--camera <nome>):
#    hero          Vista 3/4 classica con DOF (default)
#    frontale      Simmetrica centrata, stile catalogo
#    closeup       Primo piano estremo sulle gemme
#    zenitale      Dall'alto, pianta dell'espositore
#    drammatica    Angolo basso eye-level con le sfere
#    macro_metalli Macro sulla fila metalli con bokeh
#
#  Render consigliati:
#    Preview:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Draft:      -w 800  -H 450  -s 256  -d 6
#    Produzione: -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  sky:
    type: "flat"
    color: [0.1, 0.1, 0.15]
  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0


# =============================================================================
#  CAMERAS
# =============================================================================
cameras:

  # ── Hero: vista 3/4 classica, DOF sulle sfere centrali ────────────────
  - name:       hero
    position:   [2.0, 3.8, -6.0]
    look_at:    [-0.4, 0.7, 0.0]
    fov:        36
    aperture:   0.0 # 0.2
    focal_dist: 6.5

  # ── Frontale: simmetrica centrata, stile catalogo ─────────────────────
  - name:       frontale
    position:   [0.0, 3.5, -6.5]
    look_at:    [0.0, 1.15, 0.0]
    fov:        38
    aperture:   0.04
    focal_dist: 7.0

  # ── Closeup: primo piano sulle gemme (prima fila) ────────────────────
  - name:       closeup
    position:   [0.5, 1.8, -4.0]
    look_at:    [0.0, 1.22, -2.0]
    fov:        30
    aperture:   0.12
    focal_dist: 2.5

  # ── Zenitale: vista dall'alto per pianta dell'espositore ──────────────
  - name:       zenitale
    position:   [0.0, 7.0, 0.01]
    look_at:    [0.0, 1.0, 0.0]
    vup:        [0, 0, 1]
    fov:        42
    aperture:   0.0
    focal_dist: 6.0

  # ── Drammatica: angolo basso eye-level con le sfere ───────────────────
  - name:       drammatica
    position:   [3.5, 1.3, -5.0]
    look_at:    [0.0, 1.22, 0.0]
    fov:        50
    aperture:   0.08
    focal_dist: 6.0

  # ── Macro metalli: bokeh estremo sulla fila metalli ───────────────────
  - name:       macro_metalli
    position:   [1.0, 1.5, -3.8]
    look_at:    [0.0, 1.22, -1.35]
    fov:        25
    aperture:   0.20
    focal_dist: 3.0

# =============================================================================
#  LIGHTS
# =============================================================================
lights:

  # ─────────────────────────────────────────────────────────────────────────
  #  SET CORRENTE: Studio Professionale con Point Light
  #
  #  Due point light laterali aggiungono dimensione e separano i materiali.
  #  Un punto luce posteriore separa il tavolo dallo sfondo scuro.
  # ─────────────────────────────────────────────────────────────────────────

  # Key Light — punto luce caldo dall'alto-sinistra
  # - type: "point"
  #   position: [-4.0, 4.5, -4.0]
  #   color: [1.0, 0.95, 0.88]
  #   intensity: 120

  # Fill Light — luce fredda leggera dal lato opposto
  # - type: "point"
  #   position: [5.0, 3.0, -2.0]
  #   color: [0.85, 0.88, 1.0]
  #   intensity: 60

  # ─────────────────────────────────────────────────────────────────────────
  #  SET ALTERNATIVO 1: Solo Area Light (ombre ultra-morbide, minimalista)
  # ─────────────────────────────────────────────────────────────────────────
  - type: "area"
    corner: [-2.5, 4.8, -2.5]
    u: [5.0, 0.0, 0.0]
    v: [0.0, 0.0, 5.0]
    color: [1.0, 0.97, 0.92]
    intensity: 5.0
  - type: "point"
    position: [-5.0, 2.0, -3.0]
    color: [0.8, 0.85, 1.0]
    intensity: 6

  # ─────────────────────────────────────────────────────────────────────────
  #  SET ALTERNATIVO 2: Three-Point Classico (ombre nette, veloce)
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "point"
  #   position: [-5, 6, -5]
  #   color: [1.0, 0.95, 0.9]
  #   intensity: 100
  # - type: "point"
  #   position: [5, 3, -2]
  #   color: [0.85, 0.85, 1.0]
  #   intensity: 35
  # - type: "point"
  #   position: [0, 6, 5]
  #   color: [1.0, 0.95, 0.85]
  #   intensity: 50

  # ─────────────────────────────────────────────────────────────────────────
  #  SET ALTERNATIVO 3: Warm & Cool Contrast (atmosferico)
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "point"
  #   position: [-5, 4, -3]
  #   color: [1.0, 0.5, 0.15]
  #   intensity: 90
  # - type: "point"
  #   position: [5, 4, -3]
  #   color: [0.15, 0.4, 1.0]
  #   intensity: 90
  # - type: "point"
  #   position: [0, 5, 0]
  #   color: [1.0, 1.0, 1.0]
  #   intensity: 20

  # ─────────────────────────────────────────────────────────────────────────
  #  SET ALTERNATIVO 4: Dramatic Spot (museo, luce concentrata)
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "spot"
  #   position: [0, 4.8, -2]
  #   direction: [0, -0.9, 0.2]
  #   color: [1.0, 0.98, 0.92]
  #   intensity: 250
  #   inner_angle: 15
  #   outer_angle: 30
  # - type: "point"
  #   position: [-6, 2, 0]
  #   color: [0.7, 0.7, 0.8]
  #   intensity: 10

  # ─────────────────────────────────────────────────────────────────────────
  #  SET ALTERNATIVO 5: Neon Cyber (creativo, magenta + ciano)
  # ─────────────────────────────────────────────────────────────────────────
  # - type: "point"
  #   position: [-5, 3, 0]
  #   color: [1.0, 0.0, 0.8]
  #   intensity: 120
  # - type: "point"
  #   position: [5, 3, 0]
  #   color: [0.0, 0.8, 1.0]
  #   intensity: 120
  # - type: "point"
  #   position: [0, 4.5, -2]
  #   color: [1.0, 1.0, 1.0]
  #   intensity: 15

# =============================================================================
#  MATERIALS (Disney BSDF — Enhanced)
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  AMBIENTE: Pavimento e Stanza  [OTTIMIZZATO → lambertian]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Pavimento in pietra levigata scura — checker discreto
  - id: "floor_stone"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.15, 0.13, 0.12], [0.20, 0.18, 0.16]]
 
  # Muro in stucco veneziano
  - id: "wall_stucco"
    type: "lambertian"
    color: [0.22, 0.20, 0.19]
 
  # Soffitto — superficie di rimbalzo luce
  - id: "ceiling_paint"
    type: "lambertian"
    color: [0.32, 0.30, 0.28]

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO  [OTTIMIZZATO → lambertian/metal]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Piano del tavolo in legno scuro — finitura ad olio opaca
  - id: "table_top"
    type: "disney"
    metallic: 0.0
    roughness: 0.70
    specular: 0.25
    sheen: 0.15
    sheen_tint: 0.8
    sheen_roughness: 0.6
    texture:
      type: "wood"
      scale: 2.5
      noise_strength: 2.5
      colors: [[0.35, 0.2, 0.1], [0.2, 0.1, 0.04]]
      rotation: [0, 30, 0]
 
  # Corpo tavolo — legno scuro opaco (non visibile nelle viste principali)
  - id: "table_body"
    type: "lambertian"
    color: [0.15, 0.09, 0.04]

  # ─────────────────────────────────────────────────────────────────────────
  #  ESPOSITORE  [OTTIMIZZATO → lambertian/metal]
  # ─────────────────────────────────────────────────────────────────────────
 
  # Cornice in noce — texture legno preservata
