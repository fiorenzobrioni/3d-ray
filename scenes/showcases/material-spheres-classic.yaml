  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 1 — VETRO (gemme preziose)
  #
  #  Ogni gemma usa il path Beer-Lambert del Disney BSDF: il colore della
  #  pietra nasce dall'assorbimento accumulato lungo il cammino interno
  #  del raggio (transmission_color come riferimento, transmission_depth
  #  come distanza-scala). baseColor resta neutro perché la diffuse pool
  #  su vetro puro (spec_trans=1) ha peso zero — il colore non deve essere
  #  veicolato da quel canale o si ottiene una sfera "opaca colorata"
  #  invece di un vetro tinto. Stesso motivo per cui subsurface e
  #  specular_tint sono assenti: il primo richiede un volume diffondente
  #  che il vetro non ha, il secondo colorerebbe il riflesso Fresnel
  #  esterno (look "dichroic" che non è quello di una gemma vera).
  # ─────────────────────────────────────────────────────────────────────────

  # Cristallo puro — vetro ottico perfetto, IOR alto stile flint
  - id: "glass_clear"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.8
    roughness: 0.0
    specular: 1.0
    transmission_color: [0.97, 0.97, 1.0]
    transmission_depth: 1.0

  # Diamante — IOR 2.42, riflessi luminosi (il F0 Fresnel ~0.172 a IOR 2.42
  # produce già la brillantezza caratteristica; niente clearcoat per evitare
  # il conflitto delta↔delta quando transmission e coat sono entrambi a
  # specchio — causa documentata di fireflies sulle gemme di vetro).
  - id: "glass_diamond"
