# ═══════════════════════════════════════════════════════════════════════════
#  Leathers Showcase — Pelli
#
#  Dimostra 5 pelli, ciascuna scelta per
#  esibire una feature differente del Disney BSDF:
#
#    x=-4.8  Nappa rossa                → subsurface_color + sheen
#    x=-2.4  Suede tabacco              → sheen 0.85 + sheen_roughness 0.85
#    x=  0   Pelle pitone naturale      → voronoi cell + f2_minus_f1 bump
#    x=+2.4  Pelle vintage marrone      → color_ramp 4-stop + bump grana
#    x=+4.8  Coccodrillo nero           → voronoi + displacement scalare
#
#  Layout su sfere per esibire la grana procedurale senza ambiguità di UV
#  (sfere hanno parametrizzazione naturale).
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 32  -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 10 -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.025, 0.025, 0.03]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "dis_nappa_rossa"
    type: "disney"
    color: [0.62, 0.10, 0.08]
    roughness: 0.58
    specular: 0.40
    sheen: 0.25
    sheen_roughness: 0.6
    sheen_tint: 0.3
    texture:
      type: "noise"
      scale: 4.0
      noise_strength: 0.08
      colors: [[0.56, 0.08, 0.06], [0.68, 0.12, 0.10]]
      randomize_offset: true

  - id: "dis_suede_tabacco"
    type: "disney"
    color: [0.45, 0.30, 0.18]
    roughness: 0.95
    specular: 0.14
    sheen: 0.85
    sheen_roughness: 0.85
    sheen_tint: 0.5
    texture:
      type: "noise"
      scale: 4.0
      noise_strength: 0.18
      colors: [[0.38, 0.24, 0.14], [0.52, 0.36, 0.22]]
      randomize_offset: true

  - id: "dis_pelle_pitone_naturale"
    type: "disney"
    color: [0.72, 0.66, 0.52]
    roughness: 0.55
    specular: 0.42
    clearcoat: 0.4
    coat_roughness: 0.15
    coat_ior: 1.5
    texture:
      type: "voronoi"
      scale: 14.0
      output: "random"
      randomness: 1.0
      smoothness: 0.05
      colors: [[0.18, 0.14, 0.10], [0.86, 0.80, 0.64]]
    bump_map:
      texture:
        type: "voronoi"
        scale: 14.0
        output: "f2_minus_f1"
        colors: [[0.30, 0.30, 0.30], [0.70, 0.70, 0.70]]
      strength: 1.4

  - id: "dis_pelle_vintage_marrone"
    type: "disney"
    color: [0.42, 0.26, 0.16]
    roughness: 0.45
    specular: 0.40
    texture:
      type: "noise"
      scale: 1.8
      noise_type: "fbm"
      octaves: 5
      noise_strength: 0.8
      distortion: 0.2
      randomize_offset: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.10, 0.06], interp: "smoothstep" }
        - { position: 0.35, color: [0.36, 0.20, 0.12], interp: "smoothstep" }
        - { position: 0.70, color: [0.55, 0.36, 0.22], interp: "smoothstep" }
        - { position: 1.00, color: [0.72, 0.52, 0.32], interp: "linear" }
    bump_map:
      texture:
        type: "voronoi"
        scale: 60.0
        smoothness: 0.3
        colors: [[0.40, 0.40, 0.40], [0.60, 0.60, 0.60]]
      strength: 0.7
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        scale: 25.0
        noise_type: "fbm"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.0015
      midlevel: 0.5
      bound: 0.003
      autobump: true
      autobump_strength: 1.3
      displacement_method: "bump_only"

  - id: "dis_pelle_coccodrillo_nero"
    type: "disney"
    color: [0.06, 0.06, 0.06]
    roughness: 0.45
    specular: 0.45
    clearcoat: 0.5
    coat_roughness: 0.10
    coat_ior: 1.5
    texture:
      type: "voronoi"
      scale: 6.0
      output: "random"
      randomness: 1.0
      smoothness: 0.02
      colors: [[0.04, 0.04, 0.04], [0.12, 0.10, 0.08]]
    bump_map:
      texture:
        type: "voronoi"
        scale: 6.0
        output: "f2_minus_f1"
        colors: [[0.25, 0.25, 0.25], [0.75, 0.75, 0.75]]
      strength: 1.8
    displacement:
      mode: "scalar"
      texture:
        type: "voronoi"
        scale: 6.0
        output: "f1"
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.003
      midlevel: 0.5
      bound: 0.006
      autobump: true
      autobump_strength: 1.4
      displacement_method: "bump_only"

  - id: "floor"
    type: "disney"
    color: [0.16, 0.14, 0.12]
    roughness: 0.55
    specular: 0.40

  - id: "backdrop"
    type: "disney"
    color: [0.08, 0.07, 0.06]
    roughness: 0.92

entities:

  - { name: "floor",   type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",    type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "nappa"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "dis_nappa_rossa"
  - name: "suede"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "dis_suede_tabacco"
  - name: "pitone"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "dis_pelle_pitone_naturale"
  - name: "vintage"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "dis_pelle_vintage_marrone"
  - name: "coccod"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "dis_pelle_coccodrillo_nero"

lights:

  # Key warm tinted: ambiente boutique caldo. Le pelli vintage devono
  # respirare in un tono di luce ambra.
  - type: "directional"
    direction: [-0.4, -0.8, 0.4]
    color: [1.00, 0.92, 0.78]
    intensity: 4.5
    angular_radius: 0.5

  # Fill freddo dall'alto sinistra per separare i tonifici scuri
  # dall'ambient nero del backdrop.
  - type: "point"
    position: [-6, 7, -3]
    color: [0.85, 0.90, 1.00]
    intensity: 50

  # Sphere light rim caldo dal retro: enfatizza il sheen del suede
  # (backlit fuzz halo) e i bordi scaglie del pitone.
  - type: "sphere"
    position: [0, 3.5, 4.5]
    radius: 0.6
    color: [1.0, 0.78, 0.55]
    intensity: 12
