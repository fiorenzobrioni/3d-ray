# ═══════════════════════════════════════════════════════════════════════════
#  Weathered Surfaces Showcase — Materiali Invecchiati (Cross-Library Mix)
#
#  Combina materiali base + weathering overlays via mix material per
#  ottenere look "lived-in" / "industrial decay".
#
#    x=-4.8  Acciaio + ruggine heavy    → metallo + over_rust_heavy
#    x=-2.4  Cemento + muschio dense    → cemento + over_moss_dense
#    x=  0   Vernice + scrostatura      → primer + over_paint_flake
#    x=+2.4  Ferro + sale marino        → ferro + over_sale_marino
#    x=+4.8  Rame + verderame           → rame + over_verderame
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 64   -d 6  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 10 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "../libraries/materials/weathering.yaml" }
  - { path: "../libraries/materials/metals.yaml" }
  - { path: "../libraries/materials/concretes.yaml" }

world:
  sky:
    type: "flat"
    color: [0.06, 0.06, 0.07]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "primer_grigio"
    type: "disney"
    color: [0.55, 0.53, 0.50]
    roughness: 0.65
    specular: 0.35

  # ── Mix 1: Acciaio + ruggine heavy ──────────────────────────────────
  - id: "mix_acciaio_ruggine_heavy"
    type: "mix"
    material_a: "dis_acciaio_lucido"
    material_b: "over_rust_heavy"
    mask:
      type: "noise"
      scale: 2.0
      noise_type: "ridged"
      octaves: 6
      noise_strength: 1.4
      randomize_offset: true

  # ── Mix 2: Cemento + muschio dense ──────────────────────────────────
  - id: "mix_cemento_muschio_dense"
    type: "mix"
    material_a: "dis_cemento_armato_grezzo"
    material_b: "over_moss_dense"
    mask:
      type: "voronoi"
      scale: 3.5
      output: "f1"
      smoothness: 0.3
      colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]

  # ── Mix 3: Primer + vernice scrostata militare ──────────────────────
  - id: "mix_vernice_scrostata_militare"
    type: "mix"
    material_a: "primer_grigio"
    material_b: "over_paint_flake_verde_militare"
    mask:
      type: "voronoi"
      scale: 5.0
      output: "f2_minus_f1"
      colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]

  # ── Mix 4: Ferro + sale marino ──────────────────────────────────────
  - id: "mix_ferro_sale_marino"
    type: "mix"
    material_a: "dis_ferro_battuto"
    material_b: "over_sale_marino"
    mask:
      type: "noise"
      scale: 4.0
      noise_type: "fbm"
      octaves: 5
      noise_strength: 1.2
      distortion: 0.4
      randomize_offset: true

  # ── Mix 5: Rame + verderame ─────────────────────────────────────────
  - id: "mix_rame_verderame"
    type: "mix"
    material_a: "dis_rame_lucido"
    material_b: "over_verderame"
    mask:
      type: "noise"
      scale: 2.5
      noise_type: "fbm"
      octaves: 6
      noise_strength: 1.5
      distortion: 0.35
      randomize_offset: true

  - id: "floor"
    type: "disney"
    color: [0.18, 0.16, 0.14]
    roughness: 0.85

  - id: "backdrop"
    type: "disney"
    color: [0.08, 0.07, 0.06]
    roughness: 0.92

entities:

  - { name: "floor", type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",  type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - name: "acciaio_rust"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-4.8, 0.9, 0]
    seed: 3
    material: "mix_acciaio_ruggine_heavy"
  - name: "cemento_moss"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [-2.4, 0.9, 0]
    seed: 11
    material: "mix_cemento_muschio_dense"
  - name: "vernice_militare"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [0.0, 0.9, 0]
    seed: 19
    material: "mix_vernice_scrostata_militare"
  - name: "ferro_sale"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [2.4, 0.9, 0]
    seed: 29
    material: "mix_ferro_sale_marino"
  - name: "rame_verderame"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    subdivision_scheme: "loop"
    subdivision_pixel_error: 6.0
    subdivision_max_iterations: 5
    scale: [0.9, 0.9, 0.9]
    translate: [4.8, 0.9, 0]
    seed: 37
    material: "mix_rame_verderame"

lights:

  # Sole basso caldo da sinistra: setup "outdoor abandoned site".
  - type: "directional"
    direction: [-0.55, -0.55, 0.6]
    color: [1.00, 0.88, 0.68]
    intensity: 5.5
    angular_radius: 0.7

  - type: "point"
    position: [0, 7, -3]
    color: [0.82, 0.88, 1.00]
    intensity: 60

  - type: "point"
    position: [0, 2, 5]
    color: [1.0, 0.78, 0.55]
    intensity: 45
