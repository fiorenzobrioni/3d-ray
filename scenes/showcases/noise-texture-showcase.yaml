# ═══════════════════════════════════════════════════════════════════════════
#  Noise Texture Showcase
#
#  Dimostra il tipo di texture procedurale "noise" (Perlin) e l'effetto del
#  nuovo campo `colors`. Di default il noise produce un pattern grayscale
#  (nero → bianco); fornendo due colori RGB si interpola linearmente fra di
#  essi usando il valore del rumore, in modo analogo a `marble` e `wood`.
#
#  Sfere da sinistra a destra:
#    1. Noise liscio, default grayscale                 (black → white)
#    2. Noise turbolento, default grayscale             (black → white)
#    3. Noise turbolento, due tonalità di marrone       (earth tones)
#    4. Noise liscio, cielo/oceano                      (blu → ciano)
#    5. Noise turbolento, rame patinato                 (verde → marrone)
#
#  Render consigliato:
#    Draft:  -w 400  -H 225  -s 64   -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8  -S 4
# ═══════════════════════════════════════════════════════════════════════════

world:
  ambient_light: [0.10, 0.10, 0.12]
  sky:
    type: "gradient"
    zenith_color:  [0.22, 0.38, 0.70]
    horizon_color: [0.75, 0.82, 0.92]
    ground_color:  [0.18, 0.15, 0.10]
    sun:
      direction: [-0.55, -0.78, -0.30]
      color: [1.0, 0.96, 0.88]
      intensity: 10.0
      size: 2.0
      falloff: 48.0
  ground:
    type: "infinite_plane"
    material: "pavimento"
    y: 0

camera:
  position: [0, 1.6, 6.5]
  look_at: [0, 0.5, 0]
  fov: 40

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:

  - id: "pavimento"
    type: "lambertian"
    color: [0.55, 0.55, 0.55]

  # 1. Noise liscio, grayscale (default)
  - id: "noise_smooth_default"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 4.0
      randomize_offset: true

  # 2. Noise turbolento, grayscale (default)
  - id: "noise_turbulent_default"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 4.0
      randomize_offset: true

  # 3. Noise turbolento, earth tones (esempio dell'utente)
  - id: "noise_earth"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 4.0
      colors: [[0.45, 0.32, 0.18], [0.32, 0.22, 0.12]]
      randomize_offset: true

  # 4. Noise liscio, gradiente oceano
  - id: "noise_ocean"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 3.0
      colors: [[0.05, 0.20, 0.45], [0.30, 0.70, 0.85]]
      randomize_offset: true

  # 5. Noise turbolento, patina di rame
  - id: "noise_copper_patina"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 8.0
      noise_strength: 5.0
      colors: [[0.25, 0.55, 0.45], [0.45, 0.25, 0.12]]
      randomize_offset: true

# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES
# ═══════════════════════════════════════════════════════════════════════════
entities:

  - type: "sphere"
    center: [2.2, 0.5, 0]
    radius: 0.5
    material: "noise_smooth_default"

  - type: "sphere"
    center: [1.1, 0.5, 0]
    radius: 0.5
    material: "noise_turbulent_default"

  - type: "sphere"
    center: [0.0, 0.5, 0]
    radius: 0.5
    material: "noise_earth"

  - type: "sphere"
    center: [-1.1, 0.5, 0]
    radius: 0.5
    material: "noise_ocean"

  - type: "sphere"
    center: [-2.2, 0.5, 0]
    radius: 0.5
    material: "noise_copper_patina"
