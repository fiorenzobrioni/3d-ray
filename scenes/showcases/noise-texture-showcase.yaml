world:
  ambient_light: [0.015, 0.015, 0.016]
  sky:
    type: "gradient"
    zenith_color:  [0.15, 0.25, 0.55]  # Blu profondo in alto
    horizon_color: [0.85, 0.55, 0.25]  # Arancio caldo all'orizzonte
    ground_color:  [0.18, 0.15, 0.10]
  ground:
    type: "infinite_plane"
    material: "ground"
    y: 0.0

camera:
  position:   [0, 1.2, 4]
  look_at:    [0, 0.5, 0]
  fov:        30

materials:
  - id: "ground"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 1.5
      colors: [[0.25, 0.22, 0.18], [0.35, 0.32, 0.26]]
  - id: "brown_noise"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 4.0
      colors: [[0.45, 0.32, 0.18], [0.32, 0.22, 0.12]]
      randomize_offset: true
  - id: "gray_noise_default"
    type: "lambertian"
    texture:
      type: "noise"
      scale: 6.0
      noise_strength: 4.0

entities:
  - type: "sphere"
    center: [-0.7, 0.5, 0]
    radius: 0.5
    material: "brown_noise"
  - type: "sphere"
    center: [0.7, 0.5, 0]
    radius: 0.5
    material: "gray_noise_default"
