# ═══════════════════════════════════════════════════════════════════════════
#  Concretes Showcase — Cementi & Asfalti
#
#  Dimostra 5 materiali della libreria `concretes.yaml`, ciascuno scelto per
#  esibire una feature specifica del motore:
#
#    x=-4.8  Tadao Ando béton brut     → bump_map fine, color_ramp 3-stop
#    x=-2.4  Bocciardato                → voronoi f2_minus_f1 + autobump
#    x=  0   Lavato (ghiaietto chiaro)  → voronoi cell + scalar displacement
#    x=+2.4  Asfalto consumato heavy    → vector displacement tangent-space
#    x=+4.8  Asfalto bagnato            → clearcoat + spec_trans-zero
#
#  Layout: singola fila orizzontale per confronto immediato. Sfere di
#  raggio 0.9 ben distanziate. Camera arretrata con FOV 50° per
#  inquadrare tutte e cinque le sfere senza distorsione percettiva.
#
#  Render consigliato:
#    Draft:  -w 640  -H 360  -s 32  -d 4  -S 1
#    Finale: -w 1920 -H 1080 -s 1024 -d 8 -S 4
# ═══════════════════════════════════════════════════════════════════════════

imports:
  - { path: "libraries/materials/concretes.yaml" }

world:
  sky:
    type: "flat"
    color: [0.04, 0.04, 0.045]

camera:
  position: [0, 1.8, -11.0]
  look_at:  [0, 0.9, 0]
  fov: 50

materials:

  - id: "floor"
    type: "disney"
    color: [0.18, 0.18, 0.19]
    roughness: 0.85

  - id: "backdrop"
    type: "disney"
    color: [0.10, 0.10, 0.11]
    roughness: 0.92

entities:

  - { name: "floor",   type: "quad", q: [-14, 0, -3], u: [28, 0, 0], v: [0, 0, 10], material: "floor" }
  - { name: "wall",    type: "quad", q: [-14, 0,  6], u: [28, 0, 0], v: [0, 8, 0],  material: "backdrop" }

  - { name: "ando",     type: "sphere", center: [-4.8, 0.9, 0], radius: 0.9, seed:  3, material: "dis_cemento_tadao_ando"          }
  - { name: "bocciard", type: "sphere", center: [-2.4, 0.9, 0], radius: 0.9, seed: 11, material: "dis_cemento_bocciardato"         }
  - { name: "lavato",   type: "sphere", center: [ 0.0, 0.9, 0], radius: 0.9, seed: 19, material: "dis_cemento_lavato_chiaro"       }
  - { name: "asfalto",  type: "sphere", center: [ 2.4, 0.9, 0], radius: 0.9, seed: 29, material: "dis_asfalto_consumato_heavy"     }
  - { name: "wet",      type: "sphere", center: [ 4.8, 0.9, 0], radius: 0.9, seed: 37, material: "dis_asfalto_bagnato"             }

lights:

  # Key direzionale: sole alto da sinistra, leggermente caldo. Angular
  # radius medio (0.5°) per ombre nette ma non hard. Intensity contenuta
  # perché il cemento è altamente diffuso e satura velocemente.
  - type: "directional"
    direction: [-0.45, -0.85, 0.30]
    color: [1.0, 0.97, 0.92]
    intensity: 5.5
    angular_radius: 0.5

  # Fill freddo dall'alto-destra: stacca i piani d'ombra senza appiattire.
  - type: "point"
    position: [6, 7, -3]
    color: [0.85, 0.92, 1.00]
    intensity: 65

  # Rim caldo dal retro: separa le sfere dal backdrop scuro. Strategico
  # per far brillare i bordi sull'asfalto bagnato (clearcoat → sparkle).
  - type: "point"
    position: [0, 4, 5]
    color: [1.0, 0.85, 0.65]
    intensity: 55
