    material: "case_divider"

  # ═══════════════════════════════════════════════════════════════════════════
  #  ELEMENTI ESPOSTI — 6 file × 6 colonne
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Fila 6 (Z=+2.25) PIANETI / TERRAIN MUSGRAVE ───────────────────────
  - { name: "planet_1", type: "sphere", center: [-2.25, 1.22, 2.25], radius: 0.35, seed: 6001, material: "planet_earth" }
  - { name: "planet_2", type: "sphere", center: [-1.35, 1.22, 2.25], radius: 0.35, seed: 6002, material: "planet_mars" }
  - { name: "planet_3", type: "sphere", center: [-0.45, 1.22, 2.25], radius: 0.35, seed: 6003, material: "planet_strata" }
  - { name: "planet_4", type: "sphere", center: [ 0.45, 1.22, 2.25], radius: 0.35, seed: 6004, material: "planet_gas" }
  - { name: "planet_5", type: "sphere", center: [ 1.35, 1.22, 2.25], radius: 0.35, seed: 6005, material: "planet_asteroid" }
  - { name: "planet_6", type: "sphere", center: [ 2.25, 1.22, 2.25], radius: 0.35, seed: 6006, material: "planet_lava" }

  # ── Fila 5 (Z=+1.35) ROCCE / DISPLACEMENT STACK ────────────────────────
  #
  #  Tutte le entità sono icosahedra (12 vertici, 20 facce) subdivisi
  #  Catmull-Clark ×3 = 1280 quad ⇒ ~2560 triangoli per roccia, abbastanza
  #  per leggere la silhouette displaced senza esplodere i tempi.
  #  Scale 0.42 ≈ raggio 0.35 (l'icosahedron è inscritto nella sfera
  #  unitaria, vertici a distanza 1 dall'origine).

  # R1 ── bump-only su sfera "perfetta": riferimento, no displacement vero.
  #       La silhouette resta liscia, il rilievo è solo perturbazione di
  #       normale. Confronta con R3 (stesso noise come displacement vero).
  - name: "rock_1_bumponly"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_granite_bumponly"
    scale: [0.40, 0.40, 0.40]
    translate: [-2.25, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R2 ── scalar displacement Voronoi F2−F1: silhouette a tessere.
  - name: "rock_2_voronoi_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_basalt"
    scale: [0.40, 0.40, 0.40]
    translate: [-1.35, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3
    displacement:
      mode: "scalar"
      texture:
        type: "voronoi"
        scale: 4.0
        metric: "euclidean"
        output: "f2_minus_f1"
        smoothness: 0.2
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.10
      midlevel: 0.0
    displacement_bound: 0.14

  # R3 ── scalar displacement Musgrave hetero_terrain: pianeta in miniatura
  #       con creste alte e valli lisce. La silhouette è ondulata.
  - name: "rock_3_terrain_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_sandstone"
    scale: [0.40, 0.40, 0.40]
    translate: [-0.45, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        noise_type: "hetero_terrain"
        scale: 3.5
        octaves: 6
        fractal_increment: 0.30
        fractal_offset: 0.7
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.16
      midlevel: 0.45
    displacement_bound: 0.22

  # R4 ── vector displacement OBJECT-space (icosphere non ha UV, tangent
  #       non disponibile): noise RGB letto come (x, y, z) locali; overhang
  #       indipendenti dalla parametrizzazione.
  - name: "rock_4_vector_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_basalt"
    scale: [0.40, 0.40, 0.40]
    translate: [ 0.45, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3
    displacement:
      mode: "vector"
      space: "object"
      texture:
        type: "noise"
        noise_type: "ridged"
        scale: 3.2
        octaves: 5
        lacunarity: 2.2
        gain: 0.55
        colors: [[0.20, 0.20, 0.20], [0.80, 0.80, 0.80]]
      scale: 0.14
      midlevel: 0.5
    displacement_bound: 0.26

  # R5 ── FULL STACK: subdivision + scalar displacement + autobump + bump
  #       materiale. La silhouette è dettata dal displacement, il
  #       sub-griglia recuperato dall'autobump, i graffi sopra dal
  #       bump_map del materiale `rock_sandstone_scratched`.
  - name: "rock_5_full_stack"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_sandstone_scratched"
    scale: [0.40, 0.40, 0.40]
    translate: [ 1.35, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 5.0
        octaves: 6
        lacunarity: 2.0
        gain: 0.5
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.14
      midlevel: 0.5
      autobump: true                       # ← recupera sub-griglia
      autobump_strength: 1.5
      autobump_scale: 1.4
    displacement_bound: 0.20

  # R6 ── obsidiana scolpita: vector displacement object-space su mesh
  #       Catmull-Clark = ossidiana semi-frantumata con clearcoat lucido.
  - name: "rock_6_obsidian_sculpted"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_obsidian"
    scale: [0.40, 0.40, 0.40]
    translate: [ 2.25, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3
    displacement:
      mode: "vector"
      space: "object"
      texture:
        type: "voronoi"
        scale: 5.0
        output: "position"                  # ← XYZ feature come offset XYZ
        randomness: 1.0
        colors: [[0.20, 0.20, 0.20], [0.80, 0.80, 0.80]]
      scale: 0.10
      midlevel: 0.5
