    color: [1.0, 0.71, 0.29]
    metallic: 1.0
    roughness: 0.18
    specular: 0.8
    specular_tint: 0.4
    bump_map:
      texture:
        type: "voronoi"
        scale: 9.0
        metric: "euclidean"
        output: "f1"
        smoothness: 0.4
        randomness: 1.0
        colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]
