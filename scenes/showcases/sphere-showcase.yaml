    roughness: 0.015
    specular: 0.9
    transmission_color: [0.88, 0.10, 0.12]
    transmission_depth: 0.4

  - id: "gem_emerald"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.57
    roughness: 0.04
    specular: 0.75
    transmission_color: [0.18, 0.82, 0.38]
    transmission_depth: 0.4

  - id: "gem_sapphire"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.77
    roughness: 0.01
    specular: 0.95
    transmission_color: [0.10, 0.18, 0.85]
    transmission_depth: 0.35

  # "Quarzo grezzo" — smooth-voronoi su cuoio levigato bianco-azzurro,
  # mostra il soft-min IQ (smoothness 0.55) + color ramp.
  - id: "mineral_rough_quartz"
    type: "disney"
    color: [0.92, 0.95, 1.0]
    roughness: 0.30
    specular: 0.55
    clearcoat: 0.30
    coat_roughness: 0.25
    subsurface: 0.25
    texture:
      type: "voronoi"
      scale: 8.0
      metric: "euclidean"
      output: "f2_minus_f1"
      smoothness: 0.55                  # ← IQ log-sum-exp soft-min
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.55, 0.65, 0.85], interp: "smoothstep" }   # crepa
        - { position: 0.30, color: [0.82, 0.90, 0.98], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.97, 1.00], interp: "linear"     }   # base ghiaccio

  # Coordinate texture debug — modalità "object" (bande tilable R=X G=Y B=Z
  # in local space, equivalente al "Texture Coordinate → Object" di Cycles).
  # Più leggibile in vetrina rispetto a "generated", che da angolazione 3/4
  # mostra solo un quadrante. Scale 6 → ~4 celle visibili sul diametro.
  - id: "mineral_coordinate_debug"
    type: "lambertian"
    color: [1, 1, 1]
    texture:
      type: "coordinate"
      mode: "object"
      scale: 6.0


