  # ── Fila 5 (Z=+1.35) ROCCE / DISPLACEMENT STACK ────────────────────────
  #
  #  Tutte le entità sono icosahedra (12 vertici, 20 facce) subdivisi
  #  Catmull-Clark ×3 = 1280 quad ⇒ ~2560 triangoli per roccia, abbastanza
  #  per leggere la silhouette displaced senza esplodere i tempi.
  #  Scale 0.42 ≈ raggio 0.35 (l'icosahedron è inscritto nella sfera
  #  unitaria, vertici a distanza 1 dall'origine).

  # R1 ── bump-only su sfera "perfetta": riferimento, no displacement vero.
  #       La silhouette resta liscia, il rilievo è solo perturbazione di
  #       normale. Confronta con R3 (stesso noise come displacement vero).
  - name: "rock_1_bumponly"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_granite_bumponly"
    scale: [0.40, 0.40, 0.40]
    translate: [-2.25, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R2 ── scalar displacement Voronoi F2−F1: silhouette a tessere.
  #       Material 'rock_basalt_voronoi' porta il displacement.
  - name: "rock_2_voronoi_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_basalt_voronoi"
    scale: [0.40, 0.40, 0.40]
    translate: [-1.35, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R3 ── scalar displacement hetero_terrain: pianeta in miniatura.
  - name: "rock_3_terrain_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_sandstone"
    scale: [0.40, 0.40, 0.40]
    translate: [-0.45, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R4 ── vector displacement OBJECT-space ridged.
  - name: "rock_4_vector_disp"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_basalt_vector_ridged"
    scale: [0.40, 0.40, 0.40]
    translate: [ 0.45, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R5 ── FULL STACK: scalar displacement + autobump + bump materiale.
  - name: "rock_5_full_stack"
    type: "mesh"
    path: "../models/subdivision-icosahedron.obj"
    material: "rock_sandstone_scratched"
    scale: [0.40, 0.40, 0.40]
    translate: [ 1.35, 1.27, 1.35]
    subdivision_scheme: "catmull_clark"
    subdivision_iterations: 3

  # R6 ── obsidiana scolpita: vector displacement object-space Voronoi.
  - name: "rock_6_obsidian_sculpted"
