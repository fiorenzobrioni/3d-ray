      scale: 4.0
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 3.0
      noise_strength: 6.0
      octaves: 8
      randomize_offset: true
      secondary_wave:
        axis: [1, 0, 0]
        frequency: 0.65
        strength: 0.45
      color_ramp:
        - { position: 0.00, color: [0.10, 0.08, 0.08], interp: "smoothstep" }   # vena (rara)
        - { position: 0.35, color: [0.85, 0.65, 0.30], interp: "smoothstep" }   # gold transition
        - { position: 0.70, color: [0.92, 0.85, 0.72], interp: "smoothstep" }   # cream
        - { position: 1.00, color: [0.97, 0.95, 0.90], interp: "linear"     }   # ivory (dominante)

  # Arabescato — secondary_wave forte + distortion (look caotico)
  - id: "marble_arabescato"
