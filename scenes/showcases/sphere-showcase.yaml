  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 1 — GEMME / MINERALI
  #
  #  Quattro vetri Beer-Lambert + un "minerale grezzo" con smooth-voronoi
  #  (gemma scolpita non polita) + un debug "coordinate-texture" come
  #  oggetto educativo. Nota: i vetri usano colore neutro nel baseColor
  #  e il colore arriva solo da transmission_color (vedi nota tecnica
