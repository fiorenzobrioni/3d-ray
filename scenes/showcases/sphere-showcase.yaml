# =============================================================================
#  SPHERE SHOWCASE — Espositore 6×6 con stack completo
#                    Surface Displacement + Texturing VFX production-grade
# =============================================================================
#
#  Erede di `sphere-showcase-legacy.yaml`. Stessa identità visiva (cornice
#  in noce su base velluto, tavolo lucido, sei file di sei elementi), ma
#  ogni materiale ridisegnato per esercitare le feature più recenti del
#  motore — parità di workflow con Arnold / RenderMan / Cycles:
#
#    • Stack Surface Displacement (riga "ROCCE", subdivision-icosphere)
#        – mesh subdivision (Catmull-Clark)
#        – bump map procedurale
#        – scalar displacement vero (silhouette modificata)
#        – vector displacement (overhang reali, object-space)
#        – bump + displacement + autobump combinati (full stack)
#
#    • Texturing VFX (5 righe procedurali sulle sfere primitive)
#        – Color ramp multi-stop (4-stop su marmi, legni, voronoi, musgrave)
#        – Smooth Voronoi (IQ soft-min) su silicone/cuoio
#        – Musgrave hetero_terrain / hybrid_multifractal (pianeti, atmosfere)
#        – Marble "studio" (secondary_wave: Calacatta / Arabescato cross-veining)
#        – Wood "studio" (figure_strength, knot_density, radial_anisotropy)
#        – F1 / F2−F1 / F3 / F4 / position Voronoi extended outputs (riga vetri
#          come "minerali grezzi" colorati, accanto alle gemme polite)
#        – Coordinate texture node (object/uv/generated/world) come "minerale
#          debug" in vetrina
#
#    • Anti-aliasing analitico texture (ray differentials / EWA mipmap +
#      octave clamp procedurale) → attivo di default, CLI:
#        --texture-filtering on  (auto = procedurali sì, image sì → consigliato)
#
#  LAYOUT (Z cresce verso lo sfondo)
#  ──────────────────────────────────
#    Fila 6 (Z = +2.25)  PIANETI / TERRAIN MUSGRAVE  — sfere con color_ramp
#                       multi-stop su hetero_terrain / hybrid_multifractal.
#    Fila 5 (Z = +1.35)  ROCCE / DISPLACEMENT STACK  — 6 subdivision icospheres
#                       (Catmull-Clark) con bump/scalar/vector/autobump.
#    Fila 4 (Z = +0.45)  LEGNI STUDIO                — figure, knot, anisotropy.
#    Fila 3 (Z = −0.45)  MARMI STUDIO                — secondary_wave, ramp 4-stop.
#    Fila 2 (Z = −1.35)  METALLI ANISO + BUMP        — hammered, brushed, etched.
#    Fila 1 (Z = −2.25)  GEMME / MINERALI            — quattro vetri Beer-Lambert
#                       (diamante, rubino, smeraldo, zaffiro), quarzo grezzo
#                       smooth-voronoi, ametista cut Beer-Lambert.
#
#  Camere disponibili (--camera <nome>):
#    hero          Vista 3/4 classica con DOF (default)
#    frontale      Simmetrica centrata, stile catalogo
#    closeup       Primo piano estremo sulle gemme
#    zenitale      Dall'alto, pianta dell'espositore
#    drammatica    Angolo basso eye-level con le sfere
#    macro_rocce   Macro sulla fila displacement con bokeh
#
#  Render consigliati:
#    Preview:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Draft:      -w 800  -H 450  -s 256  -d 6
#    Produzione: -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  sky:
    type: "flat"
    color: [0.1, 0.1, 0.15]
  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0


# =============================================================================
#  CAMERAS
# =============================================================================
cameras:

  - name:       hero
    position:   [2.0, 3.8, -6.0]
    look_at:    [-0.4, 0.7, 0.0]
    fov:        36
    aperture:   0.0
    focal_dist: 6.5

  - name:       frontale
    position:   [0.0, 3.5, -6.5]
    look_at:    [0.0, 1.15, 0.0]
    fov:        38
    aperture:   0.04
    focal_dist: 7.0

  - name:       closeup
    position:   [0.5, 1.8, -4.0]
    look_at:    [0.0, 1.22, -2.0]
    fov:        30
    aperture:   0.12
    focal_dist: 2.5

  - name:       zenitale
    position:   [0.0, 7.0, 0.01]
    look_at:    [0.0, 1.0, 0.0]
    vup:        [0, 0, 1]
    fov:        42
    aperture:   0.0
    focal_dist: 6.0

  - name:       drammatica
    position:   [3.5, 1.3, -5.0]
    look_at:    [0.0, 1.22, 0.0]
    fov:        50
    aperture:   0.08
    focal_dist: 6.0

  # Macro sulla fila "rocce/displacement": angolazione 3/4 con bokeh marcato
  # per esaltare i micro-rilievi di autobump e la silhouette displacement.
  - name:       macro_rocce
    position:   [1.4, 1.6, -3.0]
    look_at:    [-0.3, 1.30, 1.35]
    fov:        28
    aperture:   0.18
    focal_dist: 4.5


# =============================================================================
#  LIGHTS — Studio Area + accent point
# =============================================================================
lights:

  # ─────────────────────────────────────────────────────────────────────────
  # Studio 3-point bilanciato in "EV neutrale" — irradianza target ~0.6 sulla
  # marble row, dentro la sweet-spot lineare di ACES (0.4-0.7) dove il
  # tonemap NON schiaccia la differenza tra base color e vena. Il vecchio
  # setup (5.0 + 6 + 18) produceva ~2.9 di irradianza → ACES comprimeva
  # qualsiasi marmo a contrasto 1.2:1, indistinguibile dal bianco.
  # ─────────────────────────────────────────────────────────────────────────

  # Key softbox dall'alto-fronte
  - type: "area"
    corner: [-2.5, 4.8, -2.5]
    u: [5.0, 0.0, 0.0]
    v: [0.0, 0.0, 5.0]
    color: [1.0, 0.97, 0.92]
    intensity: 1.6

  # Fill freddo da sinistra-fondo per separare i materiali scuri
  - type: "point"
    position: [-5.0, 2.0, -3.0]
    color: [0.8, 0.85, 1.0]
    intensity: 1.5

  # Rim caldo basso da destra per silhouette displacement
  - type: "point"
    position: [5.0, 1.3, 1.0]
    color: [1.0, 0.88, 0.70]
    intensity: 5

  # ─────────────────────────────────────────────────────────────────────────
  # OPTIONAL — Studio "fast lookdev" senza area panels (commentato).
  #
  # Da provare quando vuoi un render ~3-4× più rapido (l'area light richiede
  # NEE multi-sample per ombra; directional + point hanno NEE single-sample
  # con `soft_radius` per ombreggiare). Stessi rapporti chiaroscurali del
  # setup default ma con disco solare directional come key — gradiente di
  # luminosità simile, dettaglio leggermente più netto sui bump.
  #
  # Per usare: commenta le 3 luci sopra e scommenta il blocco qui sotto.
  # Il rendering rimane in ACES sweet-spot a EV 0 (no --exposure necessario).
  # ─────────────────────────────────────────────────────────────────────────
  #
  # # Key — directional come sole, disco angolare 4° per ombre soft penumbra
  # - type: "directional"
  #   direction: [-0.35, -1.0, -0.25]
  #   color: [1.00, 0.97, 0.92]
  #   intensity: 1.6
  #   angular_radius_deg: 4.0
  #   shadow_samples: 4         # 4 sample disc-jitter (sweet-spot quality/speed)
  #
  # # Fill freddo da sinistra-fondo — point con soft_radius (no 1/d² divergence)
  # - type: "point"
  #   position: [-4.5, 2.8, -2.5]
  #   color: [0.78, 0.84, 1.00]
  #   intensity: 16
  #   soft_radius: 0.6
  #
  # # Bounce dal piano frontale — point basso che simula il bounce del pavimento
  # - type: "point"
  #   position: [0.0, 0.4, -4.5]
  #   color: [0.92, 0.88, 0.80]
  #   intensity: 5
  #   soft_radius: 0.4
  #
  # # Rim caldo radente da destra-fondo, marcato per le silhouette displacement
  # - type: "point"
  #   position: [5.5, 1.0, 1.5]
  #   color: [1.00, 0.85, 0.60]
  #   intensity: 14
  #   soft_radius: 0.35


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  AMBIENTE — pavimento / muri / soffitto (invariati vs legacy)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "floor_stone"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.15, 0.13, 0.12], [0.20, 0.18, 0.16]]

  - id: "wall_stucco"
    type: "lambertian"
    color: [0.22, 0.20, 0.19]

  - id: "ceiling_paint"
    type: "lambertian"
    color: [0.32, 0.30, 0.28]

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO — piano lucido (wood studio: figure leggera + ring sharp)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "table_top"
    type: "disney"
    metallic: 0.0
    roughness: 0.55
    specular: 0.4
    clearcoat: 0.4
    coat_roughness: 0.25
    texture:
      type: "wood"
      scale: 2.5
      ring_axis: [0, 1, 0.12]
      ring_sharpness: 4.5
      noise_strength: 1.6
      octaves: 6
      grain_scale: 1.5
      figure_scale: 0.12
      figure_strength: 0.4
      color_ramp:
        - { position: 0.00, color: [0.20, 0.10, 0.04], interp: "smoothstep" }
        - { position: 0.55, color: [0.42, 0.24, 0.12], interp: "smoothstep" }
        - { position: 1.00, color: [0.58, 0.36, 0.20], interp: "linear"     }

  - id: "table_body"
    type: "lambertian"
    color: [0.15, 0.09, 0.04]

  # ─────────────────────────────────────────────────────────────────────────
  #  ESPOSITORE — cornice noce / velluto / divisori / bordino metallico
  # ─────────────────────────────────────────────────────────────────────────

  # Noce nazionale (Juglans regia) finitura oil-rubbed satin — il legno
  # classico delle vetrine da gioielleria e delle scatole di violini.
  # Tono caldo profondo che contrasta con il velluto nero della base e
  # fa risaltare i materiali chiari (marmi, gemme bianche) senza che la
  # cornice scompaia. Clearcoat 0.20 per la lucentezza "ad olio" tipica
  # del display case da boutique, NON la lucentezza piano-lacquer
  # dell'ebano (sarebbe troppo formale).
  - id: "case_wood"
    type: "disney"
    roughness: 0.55
    specular: 0.35
    clearcoat: 0.20
    coat_roughness: 0.35
    texture:
      type: "wood"
      scale: 2.2
      ring_axis: [0, 1, 0]
      ring_sharpness: 2.2
      noise_strength: 0.9
      octaves: 5
      distortion: 0.18
      figure_scale: 0.25
      figure_strength: 0.30
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.10, 0.06, 0.03], interp: "smoothstep" }   # latewood scuro
        - { position: 0.45, color: [0.28, 0.16, 0.08], interp: "smoothstep" }   # transizione
        - { position: 0.80, color: [0.46, 0.28, 0.14], interp: "smoothstep" }   # earlywood
        - { position: 1.00, color: [0.58, 0.38, 0.20], interp: "linear"     }   # earlywood chiaro

  # Velluto nero "midnight" — il classico tessuto delle scatole gioielli.
  # NB: non perfettamente nero per evitare clip su [0]; valore in linea
  # con l'albedo medio di velvet nero illuminato (riflessività ≈ 4–6%).
  - id: "case_felt"
    type: "lambertian"
    color: [0.04, 0.04, 0.05]

  # Divisori coerenti con la cornice in noce (stesso legno, scala più fine
  # perché i listelli sono sottili e necessitano grana proporzionata).
  - id: "case_divider"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 4.5
      ring_sharpness: 2.2
      noise_strength: 0.9
      distortion: 0.18
      colors: [[0.18, 0.10, 0.05], [0.46, 0.28, 0.14]]

  # Trim ottone spazzolato — la cornice metallica del display case da
  # boutique. Disney metallic (parità BSDF col resto della scena, vs
  # legacy `type: "metal"`); roughness 0.28 dà il classico look "satinato"
  # dell'ottone spazzolato. Tinta calda [0.85, 0.65, 0.42] caratteristica
  # dell'ottone (≈ Cu 65% + Zn 35%) non del cromo grigio neutro.
  - id: "case_trim"
    type: "disney"
    color: [0.85, 0.65, 0.42]
    metallic: 1.0
    roughness: 0.28
    specular: 0.7
    specular_tint: 0.5
    anisotropic: 0.20

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 6 — PIANETI / TERRAIN MUSGRAVE
  #
  #  Sei sfere con texture color_ramp multi-stop guidate da noise di nuova
  #  generazione. Mostrano la differenza visiva tra fBm omogeneo,
  #  hetero_terrain (creste alte / valli lisce), hybrid_multifractal
  #  (strati rocciosi), ridged (asteroide), e billow (gassoso).
  # ─────────────────────────────────────────────────────────────────────────

  # Terra-like — hetero_terrain con ramp acqua→spiaggia→erba→roccia→neve
  - id: "planet_earth"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.55
    specular: 0.3
    texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 4.0
      octaves: 8
      lacunarity: 2.0
      fractal_increment: 0.30
      fractal_offset:    0.7
      color_ramp:
        - { position: 0.00, color: [0.04, 0.10, 0.28], interp: "linear"     }   # ocean deep
        - { position: 0.45, color: [0.10, 0.32, 0.55], interp: "smoothstep" }   # shallow
        - { position: 0.50, color: [0.78, 0.72, 0.50], interp: "smoothstep" }   # beach
        - { position: 0.60, color: [0.18, 0.40, 0.18], interp: "smoothstep" }   # grass
        - { position: 0.78, color: [0.42, 0.36, 0.28], interp: "smoothstep" }   # rock
        - { position: 0.92, color: [0.92, 0.93, 0.95], interp: "linear"     }   # snow

  # Marte alpino — hetero_terrain con offset basso (montagne ovunque)
  - id: "planet_mars"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.65
    specular: 0.25
    texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 4.5
      octaves: 7
      lacunarity: 2.1
      fractal_increment: 0.22
      fractal_offset:    0.25                # ← niente sea-level, terreno alpino
      color_ramp:
        - { position: 0.00, color: [0.30, 0.12, 0.05], interp: "linear"     }
        - { position: 0.45, color: [0.62, 0.25, 0.10], interp: "smoothstep" }
        - { position: 0.85, color: [0.85, 0.52, 0.25], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.92, 0.85], interp: "linear"     }   # polo

  # Pianeta rocce stratificate — hybrid_multifractal (terreni a strati)
  - id: "planet_strata"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.6
    specular: 0.28
    texture:
      type: "noise"
      noise_type: "hybrid_multifractal"
      scale: 3.5
      octaves: 8
      lacunarity: 2.0
      fractal_increment: 0.28
      fractal_offset:    0.65
      color_ramp:
        - { position: 0.00, color: [0.10, 0.07, 0.05], interp: "linear"     }
        - { position: 0.35, color: [0.50, 0.32, 0.20], interp: "smoothstep" }
        - { position: 0.65, color: [0.82, 0.65, 0.40], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.85, 0.60], interp: "linear"     }

  # Gigante gassoso — billow + domain warp (bande nuvolose torte)
  - id: "planet_gas"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.80
    specular: 0.15
    subsurface: 0.25
    texture:
      type: "noise"
      noise_type: "billow"
      scale: 6.0
      octaves: 6
      lacunarity: 2.2
      distortion: 0.6
      color_ramp:
        - { position: 0.00, color: [0.92, 0.85, 0.68], interp: "linear"     }
        - { position: 0.40, color: [0.88, 0.60, 0.35], interp: "smoothstep" }
        - { position: 0.75, color: [0.55, 0.25, 0.12], interp: "smoothstep" }
        - { position: 1.00, color: [0.30, 0.12, 0.06], interp: "linear"     }

  # Asteroide / luna craterizzata — ridged + distortion alta
  - id: "planet_asteroid"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.75
    specular: 0.20
    texture:
      type: "noise"
      noise_type: "ridged"
      scale: 7.0
      octaves: 7
      lacunarity: 2.3
      gain: 0.55
      distortion: 0.3
      color_ramp:
        - { position: 0.00, color: [0.08, 0.08, 0.10], interp: "linear"     }
        - { position: 0.55, color: [0.42, 0.42, 0.46], interp: "smoothstep" }
        - { position: 1.00, color: [0.88, 0.88, 0.90], interp: "linear"     }

  # Pianeta lava — turbulence + ramp dal nero della crosta al giallo magma.
  # Nota: Disney non ha campo `emission`; il look "bagliore" arriva dal
  # color_ramp (highlight in cima al gradiente) e dal `specular` alto.
  # Per un vero glow autonomo si userebbe mix(disney, emissive).
  - id: "planet_lava"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.60
    specular: 0.45
    texture:
      type: "noise"
      noise_type: "turbulence"
      scale: 5.5
      octaves: 7
      lacunarity: 2.0
      color_ramp:
        - { position: 0.00, color: [0.05, 0.02, 0.01], interp: "linear"     }
        - { position: 0.45, color: [0.30, 0.05, 0.02], interp: "smoothstep" }
        - { position: 0.75, color: [0.95, 0.30, 0.05], interp: "smoothstep" }
        - { position: 1.00, color: [1.00, 0.85, 0.30], interp: "linear"     }

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 5 — DISPLACEMENT STACK (rocce sculpted)
  #
  #  Sei "sfere" sono in realtà icosahedra subdivisi (Catmull-Clark ×3).
  #  Materiali base condivisi, displacement diversi per dimostrare l'intero
  #  stack: mesh subdivision → bump_map → scalar displacement → vector
  #  displacement → autobump → bump combinato.
  # ─────────────────────────────────────────────────────────────────────────

  # Arenaria — scalar displacement "hetero_terrain" (pianeta-cresta) sulla R3.
  - id: "rock_sandstone"
    type: "disney"
    color: [0.82, 0.66, 0.42]
    roughness: 0.78
    specular: 0.30
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        noise_type: "hetero_terrain"
        scale: 3.5
        octaves: 6
        fractal_increment: 0.30
        fractal_offset: 0.7
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.16
      midlevel: 0.45
      bound: 0.22

  # Basalto base — niente displacement (proxy material referenziabile).
  - id: "rock_basalt"
    type: "disney"
    color: [0.18, 0.16, 0.18]
    roughness: 0.72
    specular: 0.40

  # Variante basalto: scalar displacement Voronoi F2−F1 (R2: silhouette a
  # tessere).
  - id: "rock_basalt_voronoi"
    type: "disney"
    color: [0.18, 0.16, 0.18]
    roughness: 0.72
    specular: 0.40
    displacement:
      mode: "scalar"
      texture:
        type: "voronoi"
        scale: 4.0
        metric: "euclidean"
        output: "f2_minus_f1"
        smoothness: 0.2
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.10
      midlevel: 0.0
      bound: 0.14

  # Variante basalto: vector displacement OBJECT-space ridged (R4: overhang).
  - id: "rock_basalt_vector_ridged"
    type: "disney"
    color: [0.18, 0.16, 0.18]
    roughness: 0.72
    specular: 0.40
    displacement:
      mode: "vector"
      space: "object"
      texture:
        type: "noise"
        noise_type: "ridged"
        scale: 3.2
        octaves: 5
        lacunarity: 2.2
        gain: 0.55
        colors: [[0.20, 0.20, 0.20], [0.80, 0.80, 0.80]]
      scale: 0.14
      midlevel: 0.5
      bound: 0.26

  # Ossidiana base + scolpita via vector-object Voronoi position (R6).
  - id: "rock_obsidian"
    type: "disney"
    color: [0.05, 0.05, 0.07]
    roughness: 0.25
    specular: 0.80
    clearcoat: 0.6
    coat_roughness: 0.15
    displacement:
      mode: "vector"
      space: "object"
      texture:
        type: "voronoi"
        scale: 5.0
        output: "position"
        randomness: 1.0
        colors: [[0.20, 0.20, 0.20], [0.80, 0.80, 0.80]]
      scale: 0.10
      midlevel: 0.5
      bound: 0.20

  # Variante arenaria con bump materiale aggiuntivo (graffi diagonali ridged) +
  # scalar displacement fBm + autobump (R5: full stack subdivision →
  # displacement → autobump → bump materiale).
  - id: "rock_sandstone_scratched"
    type: "disney"
    color: [0.82, 0.66, 0.42]
    roughness: 0.78
    specular: 0.30
    bump_map:
      texture:
        type: "noise"
        noise_type: "ridged"
        scale: 28.0
        octaves: 2
        colors: [[0.45, 0.45, 0.45], [0.55, 0.55, 0.55]]
      strength: 1.2
    displacement:
      mode: "scalar"
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 5.0
        octaves: 6
        lacunarity: 2.0
        gain: 0.5
        colors: [[0, 0, 0], [1, 1, 1]]
      scale: 0.14
      midlevel: 0.5
      bound: 0.20
      autobump: true
      autobump_strength: 1.5
      autobump_scale: 1.4

  # Granito — bump-only (riferimento del bump puro vs vero displacement)
  - id: "rock_granite_bumponly"
    type: "disney"
    color: [0.55, 0.50, 0.48]
    roughness: 0.70
    specular: 0.40
    bump_map:
      texture:
        type: "voronoi"
        scale: 12.0
        metric: "euclidean"
        output: "f2_minus_f1"
        smoothness: 0.25
        colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]
      strength: 2.5

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 4 — LEGNO STUDIO QUALITY
  #
  #  Sei essenze con i nuovi controlli wood pro: figure_strength (curly /
  #  flame), knot_density (nodi voronoi), radial_anisotropy (quartersawn),
  #  ramp 3-4 stop sapwood/latewood/heartwood/knot.
  # ─────────────────────────────────────────────────────────────────────────

  # Quercia europea quartersawn LACCATA SATIN — radial_anisotropy moderato
  # (3.0 era estremo su sfera di r=0.35 e creava strisce stirate). I campioni
  # di rovere in vetrina sono sempre lacquerati per protezione → clearcoat
  # 0.25 con coat_roughness 0.30 (vernice opaca-satin tipica del rovere
  # europeo, non lucida come ciliegio o ebano). Specular 0.30 corrisponde a
  # IOR ≈ 1.42 (cellulosa pura, dielettrico legnoso).
  - id: "wood_oak"
    type: "disney"
    color: [0.72, 0.55, 0.36]
    roughness: 0.50
    specular: 0.30
    clearcoat: 0.25
    coat_roughness: 0.30
    texture:
      type: "wood"
      scale: 7.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 2.5
      noise_strength: 1.1
      octaves: 5
      distortion: 0.20
      radial_anisotropy: 1.4
      knot_density: 0.80
      randomize_rotation: true
      # randomize_offset OMESSO sui legni: l'offset ±1000 wu collassa i
      # cerchi degli anelli in righe parallele (curvatura 1/dist → 0 a 1000
      # unità dall'asse). La rotazione casuale già fornisce variazione
      # per-sfera, e il fatto che ogni sfera stia a un X diverso porta
      # automaticamente a campioni di noise differenti.
      color_ramp:
        - { position: 0.00, color: [0.18, 0.10, 0.05], interp: "smoothstep" }   # cuore nodo
        - { position: 0.20, color: [0.30, 0.18, 0.08], interp: "smoothstep" }   # latewood
        - { position: 0.55, color: [0.82, 0.62, 0.38], interp: "smoothstep" }   # earlywood
        - { position: 1.00, color: [0.95, 0.82, 0.62], interp: "linear"     }   # earlywood chiaro

  # Noce — figure leggera + clearcoat satinato, qualche nodo sporadico.
  - id: "wood_walnut"
    type: "disney"
    color: [0.42, 0.26, 0.13]
    roughness: 0.50
    specular: 0.40
    clearcoat: 0.30
    coat_roughness: 0.30
    texture:
      type: "wood"
      scale: 6.5
      ring_axis: [0, 1, 0]
      ring_sharpness: 2.5
      noise_strength: 0.9
      distortion: 0.20
      figure_scale: 0.35
      figure_strength: 0.50
      knot_density: 0.65
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.08, 0.05, 0.02], interp: "smoothstep" }   # cuore nodo
        - { position: 0.20, color: [0.18, 0.10, 0.05], interp: "smoothstep" }   # latewood
        - { position: 0.55, color: [0.42, 0.26, 0.13], interp: "smoothstep" }
        - { position: 1.00, color: [0.62, 0.42, 0.24], interp: "linear"     }

  # Ciliegio — verniciato lucido, clearcoat pieno. Ciliegio ha pochi nodi
  # (knot_density 0.15) e grain più fitta di noce/rovere.
  - id: "wood_cherry"
    type: "disney"
    color: [0.62, 0.22, 0.10]
    roughness: 0.30
    specular: 0.55
    clearcoat: 0.85
    coat_roughness: 0.10
    texture:
      type: "wood"
      scale: 7.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 3.0
      noise_strength: 0.9
      distortion: 0.18
      figure_scale: 0.40
      figure_strength: 0.30
      knot_density: 0.45
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.05, 0.02], interp: "smoothstep" }
        - { position: 0.20, color: [0.32, 0.10, 0.04], interp: "smoothstep" }
        - { position: 0.55, color: [0.62, 0.22, 0.10], interp: "smoothstep" }
        - { position: 1.00, color: [0.85, 0.45, 0.22], interp: "linear"     }

  # Acero curly French-polish — l'acero curly è prezioso proprio perché
  # privo di nodi (knot_density 0), la firma è il ripple del figure.
  # Finitura French polish (gomma-lacca) tipica della liuteria: clearcoat
  # 0.50, coat_roughness 0.18 — più lucida del rovere/pino, meno
  # dell'ebano. ring_sharpness ridotto da 5 a 3.5 per evitare il look
  # "calza a righe" su sfera piccola.
  - id: "wood_curly_maple"
    type: "disney"
    color: [0.86, 0.74, 0.55]
    roughness: 0.40
    specular: 0.40
    clearcoat: 0.50
    coat_roughness: 0.18
    texture:
      type: "wood"
      scale: 8.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 3.5
      noise_strength: 0.25
      distortion: 0.12
      grain_scale: 1.8
      figure_scale: 0.20
      figure_strength: 1.6
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.55, 0.38, 0.20], interp: "smoothstep" }
        - { position: 0.45, color: [0.85, 0.72, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.92, 0.76], interp: "linear"     }

  # Ebano (Diospyros) finitura "piano lacquer" — l'ebano da pianoforte è
  # il riferimento massimo di lucentezza nel mondo del legno. Roughness
  # base 0.12 + clearcoat 1.0 con coat_roughness 0.08 (NON 0.05: uno
  # specchio puro sarebbe irrealistico anche su un Steinway — i micrograffi
  # del lucido riducono la "perfezione" della riflessione). Ebano vero non
  # ha nodi visibili, solo grain finissima; ring_sharpness moderato e
  # distortion bassa mantengono la lettura uniforme.
  - id: "wood_ebony"
    type: "disney"
    color: [0.06, 0.04, 0.03]
    roughness: 0.14
    specular: 0.65
    clearcoat: 1.0
    coat_roughness: 0.08
    texture:
      type: "wood"
      scale: 8.5
      ring_sharpness: 2.5
      noise_strength: 0.7
      distortion: 0.12
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.02, 0.01, 0.01], interp: "smoothstep" }
        - { position: 1.00, color: [0.16, 0.10, 0.06], interp: "linear"     }

  # Pino nodoso LACCATO SATIN — knot_density 1.0 (showcase del nodo
  # Voronoi-based). Distortion alta (0.40) + noise_strength 0.9 per
  # spezzare la regolarità degli anelli; color_ramp compressa su una banda
  # ambra→crema realistica (nessun nero puro, nessun bianco puro: il pino
  # vero ha latewood color caramello e earlywood color avorio). Stesso
  # finish del rovere (satin lacquer, NON polish lucido — il pino
  # high-gloss leggerebbe "plastica") per coerenza di vetrina.
  - id: "wood_knotty_pine"
    type: "disney"
    color: [0.82, 0.66, 0.42]
    roughness: 0.52
    specular: 0.30
    clearcoat: 0.25
    coat_roughness: 0.30
    texture:
      type: "wood"
      scale: 7.5
      ring_axis: [0, 1, 0]
      ring_sharpness: 2.5
      noise_strength: 0.9
      distortion: 0.40
      figure_scale: 0.45
      figure_strength: 0.4
      knot_density: 1.0
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.22, 0.12, 0.05], interp: "smoothstep" }   # cuore nodo (bruno scuro, non nero)
        - { position: 0.25, color: [0.50, 0.32, 0.16], interp: "smoothstep" }   # latewood caramello
        - { position: 0.65, color: [0.78, 0.60, 0.38], interp: "smoothstep" }   # earlywood
        - { position: 1.00, color: [0.90, 0.78, 0.55], interp: "linear"     }   # earlywood chiaro (avorio, non bianco)

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 3 — MARMO STUDIO QUALITY
  #
  #  Sei marmi con secondary_wave (cross-veining Statuario/Calacatta) e
  #  ramp 4-stop. Convenzione ramp: position 0 = vena rara/scura, position
  #  1 = base dominante.
  # ─────────────────────────────────────────────────────────────────────────

  # Carrara — sharpness 1.2 + vena "grigio fumo" (non nero pece): la curva
  # `t = 1−(1−t)^k` con k=1.2 è quasi-lineare → uniform-ish distribution di t,
  # quindi VISIBILE chiaroscuro su tutta la superficie. La vena grigia [0.40]
  # invece di nera [0.12] mantiene la lettura "marmo chiaro" (media sample
  # ≈ blend(0.65 vena, 0.96 base) ≈ 0.85 = chiaro) ma con sfumature reali.
  - id: "marble_carrara"
    type: "disney"
    color: [0.92, 0.91, 0.88]
    roughness: 0.22
    clearcoat: 0.30
    coat_roughness: 0.18
    specular: 0.50
    texture:
      type: "marble"
      scale: 5.5
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 1.2
      noise_strength: 8.0
      octaves: 8
      randomize_offset: true
      randomize_rotation: true
      colors: [[0.95, 0.94, 0.91], [0.42, 0.42, 0.44]]

  # Calacatta Oro — base ivory caldo, vena oro-ambra (NON nero) per restare
  # leggibile "marmo dorato" anche con sharpness 1.2 (chiaroscuro visibile).
  # La sfumatura va da ivory caldo (base) a oro ambrato (vena).
  - id: "marble_calacatta"
    type: "disney"
    color: [0.92, 0.85, 0.65]
    roughness: 0.22
    clearcoat: 0.30
    coat_roughness: 0.18
    specular: 0.50
    texture:
      type: "marble"
      scale: 4.5
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 1.2
      noise_strength: 7.0
      octaves: 8
      randomize_offset: true
      randomize_rotation: true
      secondary_wave:
        axis: [1, 0, 0]
        frequency: 0.6
        strength: 0.5
      # Ramp: vena oro caldo saturo → base ivory. Il gold è più saturo del
      # legacy [0.60, 0.38, 0.12] per leggere "Calacatta ORO" anche su sfera
      # piccola (35 mm proiettati).
      colors: [[0.95, 0.90, 0.78], [0.72, 0.42, 0.08]]

  # Verde Alpi (Valle d'Aosta) — marmo serpentinitico verde foresta profondo
  # con venature bianche cristalline a rete. La base verde è satura
  # (0.10–0.40 dominante) per essere identificata come MARMO VERDE anche
  # con sharpness 1.2 (~83% base, 17% vena → la base deve essere
  # cromaticamente decisa). Secondary wave forte → pattern reticolato
  # caratteristico delle serpentiniti alpine.
  - id: "marble_verde_alpi"
    type: "disney"
    color: [0.08, 0.28, 0.18]
    roughness: 0.22
    clearcoat: 0.35
    coat_roughness: 0.18
    specular: 0.55
    texture:
      type: "marble"
      scale: 4.5
      vein_axis: [0, 0, 1]
      vein_frequency: 1.1
      vein_sharpness: 1.2
      noise_strength: 8.0
      octaves: 8
      distortion: 0.35
      randomize_offset: true
      randomize_rotation: true
      secondary_wave:
        axis: [1, 0.25, 0]
        frequency: 1.0
        strength: 0.7
      # Ramp: vena cristallina bianca → base verde foresta saturo.
      colors: [[0.92, 0.94, 0.88], [0.08, 0.32, 0.20]]

  # Nero Marquinia — base nero scuro, vena oro/bronzo. Sharpness 1.8 lascia
  # vedere meglio le venature oro (vs 3.5 che le rendeva troppo rare).
  - id: "marble_nero"
    type: "disney"
    color: [0.06, 0.06, 0.07]
    roughness: 0.16
    clearcoat: 0.50
    coat_roughness: 0.14
    specular: 0.65
    texture:
      type: "marble"
      scale: 5.0
      vein_axis: [0, 0, 1]
      vein_frequency: 0.85
      vein_sharpness: 1.8
      noise_strength: 7.0
      octaves: 8
      randomize_offset: true
      randomize_rotation: true
      secondary_wave:
        axis: [1, 0.2, 0]
        frequency: 0.55
        strength: 0.5
      # Ramp INVERSA — vena (stop 0) = oro brillante, base (stop 1) = nero
      # scuro. Sharpness 1.8 → ~64% nero + 36% disteso verso oro visibile.
      colors: [[0.95, 0.75, 0.30], [0.05, 0.05, 0.06]]

  # Azul Macauba (Bahia, Brasile) — marmo blu cobalto profondo con venature
  # cristalline bianco-grigie. Stessa ricetta "balanced" degli altri colorati:
  # sharpness 1.2 + vena chiara (cream) → blu identitario dominante con
  # variazione cristallina visibile su tutta la superficie.
  - id: "marble_blu"
    type: "disney"
    color: [0.10, 0.22, 0.58]
    roughness: 0.24
    clearcoat: 0.30
    coat_roughness: 0.20
    specular: 0.50
    texture:
      type: "marble"
      scale: 4.5
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 1.2
      noise_strength: 8.0
      octaves: 8
      distortion: 0.30
      randomize_offset: true
      randomize_rotation: true
      secondary_wave:
        axis: [1, 0, 0]
        frequency: 0.85
        strength: 0.6
      # Ramp INVERSA — vena cristallina cream (stop 0), base blu cobalto (stop 1).
      colors: [[0.92, 0.92, 0.86], [0.08, 0.20, 0.55]]

  # Rosso Levanto (Liguria) — marmo brecciato rosso bordeaux profondo con
  # venature cream/avorio. È il classico "rosso italiano" usato nelle
  # chiese seicentesche. Base saturata sul bordeaux scuro per essere
  # immediatamente riconoscibile come MARMO ROSSO; sharpness 1.2 lascia
  # passare le venature cream con buon chiaroscuro.
  - id: "marble_rosso_levanto"
    type: "disney"
    color: [0.45, 0.10, 0.10]
    roughness: 0.24
    clearcoat: 0.35
    coat_roughness: 0.20
    specular: 0.55
    texture:
      type: "marble"
      scale: 4.5
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 1.2
      noise_strength: 8.0
      octaves: 8
      distortion: 0.30
      randomize_offset: true
      randomize_rotation: true
      secondary_wave:
        axis: [1, 0.2, 0]
        frequency: 0.85
        strength: 0.55
      # Ramp: vena cream/avorio → base bordeaux saturo.
      colors: [[0.94, 0.86, 0.74], [0.42, 0.08, 0.10]]

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 2 — METALLI con anisotropia e bump
  #
  #  Sei leghe con la coppia anisotropic + bump_map per simulare lavorazioni
  #  industriali (hammered, brushed, etched, hairlined).
  # ─────────────────────────────────────────────────────────────────────────

  # Oro martellato — voronoi F1 bump (concavità sferiche del martello)
  - id: "metal_gold_hammered"
    type: "disney"
    color: [1.0, 0.71, 0.29]
    metallic: 1.0
    roughness: 0.18
    specular: 0.8
    specular_tint: 0.4
    bump_map:
      texture:
        type: "voronoi"
        scale: 9.0
        metric: "euclidean"
        output: "f1"
        smoothness: 0.4
        randomness: 1.0
        colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]
      strength: 3.0

  # Argento brushed — bump da noise allungato + aniso direzionale
  - id: "metal_silver_brushed"
    type: "disney"
    color: [0.97, 0.96, 0.92]
    metallic: 1.0
    roughness: 0.18
    specular: 0.9
    anisotropic: 0.7
    anisotropic_rotation: 0.0
    bump_map:
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 40.0
        octaves: 3
        uv_scale: [1.0, 30.0]              # ← striature direzionali
        colors: [[0.3, 0.3, 0.3], [0.7, 0.7, 0.7]]
      strength: 0.8

  # Rame ossidato — voronoi crackle bump (patina graffiata) + aniso
  - id: "metal_copper_patina"
    type: "disney"
    color: [0.78, 0.48, 0.32]
    metallic: 1.0
    roughness: 0.32
    specular: 0.6
    specular_tint: 0.5
    clearcoat: 0.10
    coat_roughness: 0.50
    anisotropic: 0.45
    anisotropic_rotation: 0.15
    bump_map:
      texture:
        type: "voronoi"
        scale: 18.0
        output: "f2_minus_f1"
        smoothness: 0.3
        colors: [[0.85, 0.85, 0.85], [0.0, 0.0, 0.0]]
      strength: 1.5

  # Bronzo etched — bump da marble (venature inciso acido)
  - id: "metal_bronze_etched"
    type: "disney"
    color: [0.60, 0.42, 0.20]
    metallic: 0.92
    roughness: 0.40
    specular: 0.45
    specular_tint: 0.6
    anisotropic: 0.50
    anisotropic_rotation: 0.40
    bump_map:
      texture:
        type: "marble"
        scale: 6.0
        vein_axis: [1, 0, 0]
        vein_frequency: 4.0
        vein_sharpness: 3.0
        distortion: 0.4
        colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]
      strength: 2.0

  # Cromo polished — specchio quasi perfetto, niente bump
  - id: "metal_chrome"
    type: "disney"
    color: [0.96, 0.96, 0.98]
    metallic: 1.0
    roughness: 0.01
    specular: 1.0

  # Gunmetal hairlined — bump direzionale fittissimo + clearcoat anodizzato
  - id: "metal_gunmetal_hairlined"
    type: "disney"
    color: [0.18, 0.18, 0.24]
    metallic: 0.92
    roughness: 0.28
    specular: 0.7
    clearcoat: 0.35
    coat_roughness: 0.15
    anisotropic: 0.65
    anisotropic_rotation: 0.70
    bump_map:
      texture:
        type: "noise"
        noise_type: "fbm"
        scale: 80.0
        octaves: 2
        uv_scale: [60.0, 1.0]              # ← capelli orizzontali
        colors: [[0.4, 0.4, 0.4], [0.6, 0.6, 0.6]]
      strength: 0.5

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 1 — GEMME / MINERALI
  #
  #  Cinque vetri Beer-Lambert (diamante, rubino, smeraldo, zaffiro,
  #  ametista) + un "minerale grezzo" smooth-voronoi (quarzo non polito,
  #  coppia naturale con l'ametista cut: stesso SiO₂, due lavorazioni
  #  gemmologiche). Convenzione tecnica: tutti i vetri usano colore neutro
  #  [1,1,1] nel baseColor e il colore puro arriva da transmission_color
  #  (Beer-Lambert) — l'energia non viene riflessa via diffuse, scaffolding
  #  che mantiene i vetri NON-saturi nei riflessi ma colorati internamente.
  # ─────────────────────────────────────────────────────────────────────────

  - id: "gem_diamond"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 2.42
    roughness: 0.003
    specular: 1.0
    transmission_color: [0.99, 0.99, 1.0]
    transmission_depth: 1.0

  - id: "gem_ruby"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.77
    roughness: 0.015
    specular: 0.9
    transmission_color: [0.88, 0.10, 0.12]
    transmission_depth: 0.4

  - id: "gem_emerald"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.57
    roughness: 0.04
    specular: 0.75
    transmission_color: [0.18, 0.82, 0.38]
    transmission_depth: 0.4

  - id: "gem_sapphire"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.77
    roughness: 0.01
    specular: 0.95
    transmission_color: [0.10, 0.18, 0.85]
    transmission_depth: 0.35

  # "Quarzo grezzo" — smooth-voronoi su cuoio levigato bianco-azzurro,
  # mostra il soft-min IQ (smoothness 0.55) + color ramp.
  - id: "mineral_rough_quartz"
    type: "disney"
    color: [0.92, 0.95, 1.0]
    roughness: 0.30
    specular: 0.55
    clearcoat: 0.30
    coat_roughness: 0.25
    subsurface: 0.25
    texture:
      type: "voronoi"
      scale: 8.0
      metric: "euclidean"
      output: "f2_minus_f1"
      smoothness: 0.55                  # ← IQ log-sum-exp soft-min
      randomness: 1.0
      color_ramp:
        - { position: 0.00, color: [0.55, 0.65, 0.85], interp: "smoothstep" }   # crepa
        - { position: 0.30, color: [0.82, 0.90, 0.98], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.97, 1.00], interp: "linear"     }   # base ghiaccio

  # Ametista — quarzo violetto saturo, taglio sfaccettato (qui sferico per
  # uniformità di vetrina). Stesso IOR 1.55 del quarzo grezzo adiacente,
  # ma transmission_color violetto profondo (R alto + B molto alto, G basso
  # = magenta-purple). Forma con il mineral_rough_quartz la coppia
  # "ametista lavorata + quarzo grezzo" — entrambi SiO₂, due stati di
  # lavorazione gemmologica.
  - id: "gem_amethyst"
    type: "disney"
    color: [1.0, 1.0, 1.0]
    spec_trans: 1.0
    ior: 1.55
    roughness: 0.012
    specular: 0.85
    transmission_color: [0.55, 0.22, 0.85]
    transmission_depth: 0.45


# =============================================================================
#  ENTITIES
# =============================================================================
entities:

  # ═══════════════════════════════════════════════════════════════════════════
  #  STANZA — Muri + soffitto
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "back_wall"
