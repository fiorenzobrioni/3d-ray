# =============================================================================
#  SPHERE SHOWCASE — Espositore 6×6 con stack completo
#                    Surface Displacement + Texturing VFX production-grade
# =============================================================================
#
#  Erede di `sphere-showcase-legacy.yaml`. Stessa identità visiva (cornice
#  in noce su base velluto, tavolo lucido, sei file di sei elementi), ma
#  ogni materiale ridisegnato per esercitare le feature più recenti del
#  motore — parità di workflow con Arnold / RenderMan / Cycles:
#
#    • Stack Surface Displacement (riga "ROCCE", subdivision-icosphere)
#        – mesh subdivision (Catmull-Clark)
#        – bump map procedurale
#        – scalar displacement vero (silhouette modificata)
#        – vector displacement (overhang reali, object-space)
#        – bump + displacement + autobump combinati (full stack)
#
#    • Texturing VFX (5 righe procedurali sulle sfere primitive)
#        – Color ramp multi-stop (4-stop su marmi, legni, voronoi, musgrave)
#        – Smooth Voronoi (IQ soft-min) su silicone/cuoio
#        – Musgrave hetero_terrain / hybrid_multifractal (pianeti, atmosfere)
#        – Marble "studio" (secondary_wave: Calacatta / Arabescato cross-veining)
#        – Wood "studio" (figure_strength, knot_density, radial_anisotropy)
#        – F1 / F2−F1 / F3 / F4 / position Voronoi extended outputs (riga vetri
#          come "minerali grezzi" colorati, accanto alle gemme polite)
#        – Coordinate texture node (object/uv/generated/world) come "minerale
#          debug" in vetrina
#
#    • Anti-aliasing analitico texture (ray differentials / EWA mipmap +
#      octave clamp procedurale) → attivo di default, CLI:
#        --texture-filtering on  (auto = procedurali sì, image sì → consigliato)
#
#  LAYOUT (Z cresce verso lo sfondo)
#  ──────────────────────────────────
#    Fila 6 (Z = +2.25)  PIANETI / TERRAIN MUSGRAVE  — sfere con color_ramp
#                       multi-stop su hetero_terrain / hybrid_multifractal.
#    Fila 5 (Z = +1.35)  ROCCE / DISPLACEMENT STACK  — 6 subdivision icospheres
#                       (Catmull-Clark) con bump/scalar/vector/autobump.
#    Fila 4 (Z = +0.45)  LEGNI STUDIO                — figure, knot, anisotropy.
#    Fila 3 (Z = −0.45)  MARMI STUDIO                — secondary_wave, ramp 4-stop.
#    Fila 2 (Z = −1.35)  METALLI ANISO + BUMP        — hammered, brushed, etched.
#    Fila 1 (Z = −2.25)  GEMME / MINERALI            — vetri Beer-Lambert,
#                       smooth-voronoi gem grezza, coordinate-texture node.
#
#  Camere disponibili (--camera <nome>):
#    hero          Vista 3/4 classica con DOF (default)
#    frontale      Simmetrica centrata, stile catalogo
#    closeup       Primo piano estremo sulle gemme
#    zenitale      Dall'alto, pianta dell'espositore
#    drammatica    Angolo basso eye-level con le sfere
#    macro_rocce   Macro sulla fila displacement con bokeh
#
#  Render consigliati:
#    Preview:    -w 400  -H 225  -s 64   -d 4  -S 1
#    Draft:      -w 800  -H 450  -s 256  -d 6
#    Produzione: -w 1920 -H 1080 -s 1024 -d 8  -S 4
#
# =============================================================================


# =============================================================================
#  WORLD
# =============================================================================
world:
  sky:
    type: "flat"
    color: [0.1, 0.1, 0.15]
  ground:
    type: "infinite_plane"
    material: "floor_stone"
    y: 0.0


# =============================================================================
#  CAMERAS
# =============================================================================
cameras:

  - name:       hero
    position:   [2.0, 3.8, -6.0]
    look_at:    [-0.4, 0.7, 0.0]
    fov:        36
    aperture:   0.0
    focal_dist: 6.5

  - name:       frontale
    position:   [0.0, 3.5, -6.5]
    look_at:    [0.0, 1.15, 0.0]
    fov:        38
    aperture:   0.04
    focal_dist: 7.0

  - name:       closeup
    position:   [0.5, 1.8, -4.0]
    look_at:    [0.0, 1.22, -2.0]
    fov:        30
    aperture:   0.12
    focal_dist: 2.5

  - name:       zenitale
    position:   [0.0, 7.0, 0.01]
    look_at:    [0.0, 1.0, 0.0]
    vup:        [0, 0, 1]
    fov:        42
    aperture:   0.0
    focal_dist: 6.0

  - name:       drammatica
    position:   [3.5, 1.3, -5.0]
    look_at:    [0.0, 1.22, 0.0]
    fov:        50
    aperture:   0.08
    focal_dist: 6.0

  # Macro sulla fila "rocce/displacement": angolazione 3/4 con bokeh marcato
  # per esaltare i micro-rilievi di autobump e la silhouette displacement.
  - name:       macro_rocce
    position:   [1.4, 1.6, -3.0]
    look_at:    [-0.3, 1.30, 1.35]
    fov:        28
    aperture:   0.18
    focal_dist: 4.5


# =============================================================================
#  LIGHTS — Studio Area + accent point
# =============================================================================
lights:

  # Key softbox dall'alto (area large = ombre morbide, luce avvolgente
  # necessaria per leggere il rilievo dei bump senza speckles).
  - type: "area"
    corner: [-2.5, 4.8, -2.5]
    u: [5.0, 0.0, 0.0]
    v: [0.0, 0.0, 5.0]
    color: [1.0, 0.97, 0.92]
    intensity: 5.0

  # Fill freddo da sinistra-fondo per separare i materiali scuri dal nero
  # del velluto.
  - type: "point"
    position: [-5.0, 2.0, -3.0]
    color: [0.8, 0.85, 1.0]
    intensity: 6

  # Rim caldo basso da destra: radente sulla fila rocce per esaltare i
  # micro-rilievi (autobump) e le silhouette del vector displacement.
  - type: "point"
    position: [5.0, 1.3, 1.0]
    color: [1.0, 0.88, 0.70]
    intensity: 18


# =============================================================================
#  MATERIALS
# =============================================================================
materials:

  # ─────────────────────────────────────────────────────────────────────────
  #  AMBIENTE — pavimento / muri / soffitto (invariati vs legacy)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "floor_stone"
    type: "lambertian"
    texture:
      type: "checker"
      scale: 3.0
      colors: [[0.15, 0.13, 0.12], [0.20, 0.18, 0.16]]

  - id: "wall_stucco"
    type: "lambertian"
    color: [0.22, 0.20, 0.19]

  - id: "ceiling_paint"
    type: "lambertian"
    color: [0.32, 0.30, 0.28]

  # ─────────────────────────────────────────────────────────────────────────
  #  TAVOLO — piano lucido (wood studio: figure leggera + ring sharp)
  # ─────────────────────────────────────────────────────────────────────────

  - id: "table_top"
    type: "disney"
    metallic: 0.0
    roughness: 0.55
    specular: 0.4
    clearcoat: 0.4
    coat_roughness: 0.25
    texture:
      type: "wood"
      scale: 2.5
      ring_axis: [0, 1, 0.12]
      ring_sharpness: 4.5
      noise_strength: 1.6
      octaves: 6
      grain_scale: 1.5
      figure_scale: 0.12
      figure_strength: 0.4
      color_ramp:
        - { position: 0.00, color: [0.20, 0.10, 0.04], interp: "smoothstep" }
        - { position: 0.55, color: [0.42, 0.24, 0.12], interp: "smoothstep" }
        - { position: 1.00, color: [0.58, 0.36, 0.20], interp: "linear"     }

  - id: "table_body"
    type: "lambertian"
    color: [0.15, 0.09, 0.04]

  # ─────────────────────────────────────────────────────────────────────────
  #  ESPOSITORE — cornice noce / velluto / divisori / bordino metallico
  # ─────────────────────────────────────────────────────────────────────────

  - id: "case_wood"
    type: "disney"
    roughness: 0.55
    specular: 0.30
    clearcoat: 0.25
    coat_roughness: 0.30
    texture:
      type: "wood"
      scale: 4.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.0
      noise_strength: 2.2
      octaves: 5
      figure_scale: 0.18
      figure_strength: 0.5
      knot_density: 0.15
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.05, 0.03, 0.02], interp: "smoothstep" }   # cuore nodo
        - { position: 0.20, color: [0.22, 0.13, 0.06], interp: "smoothstep" }   # latewood
        - { position: 1.00, color: [0.55, 0.34, 0.17], interp: "linear"     }   # earlywood

  - id: "case_felt"
    type: "lambertian"
    color: [0.04, 0.04, 0.06]

  - id: "case_divider"
    type: "lambertian"
    texture:
      type: "wood"
      scale: 6.0
      noise_strength: 2.0
      colors: [[0.38, 0.23, 0.12], [0.25, 0.14, 0.06]]

  - id: "case_trim"
    type: "metal"
    color: [0.60, 0.58, 0.55]
    fuzz: 0.35

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 6 — PIANETI / TERRAIN MUSGRAVE
  #
  #  Sei sfere con texture color_ramp multi-stop guidate da noise di nuova
  #  generazione. Mostrano la differenza visiva tra fBm omogeneo,
  #  hetero_terrain (creste alte / valli lisce), hybrid_multifractal
  #  (strati rocciosi), ridged (asteroide), e billow (gassoso).
  # ─────────────────────────────────────────────────────────────────────────

  # Terra-like — hetero_terrain con ramp acqua→spiaggia→erba→roccia→neve
  - id: "planet_earth"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.55
    specular: 0.3
    texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 4.0
      octaves: 8
      lacunarity: 2.0
      fractal_increment: 0.30
      fractal_offset:    0.7
      color_ramp:
        - { position: 0.00, color: [0.04, 0.10, 0.28], interp: "linear"     }   # ocean deep
        - { position: 0.45, color: [0.10, 0.32, 0.55], interp: "smoothstep" }   # shallow
        - { position: 0.50, color: [0.78, 0.72, 0.50], interp: "smoothstep" }   # beach
        - { position: 0.60, color: [0.18, 0.40, 0.18], interp: "smoothstep" }   # grass
        - { position: 0.78, color: [0.42, 0.36, 0.28], interp: "smoothstep" }   # rock
        - { position: 0.92, color: [0.92, 0.93, 0.95], interp: "linear"     }   # snow

  # Marte alpino — hetero_terrain con offset basso (montagne ovunque)
  - id: "planet_mars"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.65
    specular: 0.25
    texture:
      type: "noise"
      noise_type: "hetero_terrain"
      scale: 4.5
      octaves: 7
      lacunarity: 2.1
      fractal_increment: 0.22
      fractal_offset:    0.25                # ← niente sea-level, terreno alpino
      color_ramp:
        - { position: 0.00, color: [0.30, 0.12, 0.05], interp: "linear"     }
        - { position: 0.45, color: [0.62, 0.25, 0.10], interp: "smoothstep" }
        - { position: 0.85, color: [0.85, 0.52, 0.25], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.92, 0.85], interp: "linear"     }   # polo

  # Pianeta rocce stratificate — hybrid_multifractal (terreni a strati)
  - id: "planet_strata"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.6
    specular: 0.28
    texture:
      type: "noise"
      noise_type: "hybrid_multifractal"
      scale: 3.5
      octaves: 8
      lacunarity: 2.0
      fractal_increment: 0.28
      fractal_offset:    0.65
      color_ramp:
        - { position: 0.00, color: [0.10, 0.07, 0.05], interp: "linear"     }
        - { position: 0.35, color: [0.50, 0.32, 0.20], interp: "smoothstep" }
        - { position: 0.65, color: [0.82, 0.65, 0.40], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.85, 0.60], interp: "linear"     }

  # Gigante gassoso — billow + domain warp (bande nuvolose torte)
  - id: "planet_gas"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.80
    specular: 0.15
    subsurface: 0.25
    texture:
      type: "noise"
      noise_type: "billow"
      scale: 6.0
      octaves: 6
      lacunarity: 2.2
      distortion: 0.6
      color_ramp:
        - { position: 0.00, color: [0.92, 0.85, 0.68], interp: "linear"     }
        - { position: 0.40, color: [0.88, 0.60, 0.35], interp: "smoothstep" }
        - { position: 0.75, color: [0.55, 0.25, 0.12], interp: "smoothstep" }
        - { position: 1.00, color: [0.30, 0.12, 0.06], interp: "linear"     }

  # Asteroide / luna craterizzata — ridged + distortion alta
  - id: "planet_asteroid"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.75
    specular: 0.20
    texture:
      type: "noise"
      noise_type: "ridged"
      scale: 7.0
      octaves: 7
      lacunarity: 2.3
      gain: 0.55
      distortion: 0.3
      color_ramp:
        - { position: 0.00, color: [0.08, 0.08, 0.10], interp: "linear"     }
        - { position: 0.55, color: [0.42, 0.42, 0.46], interp: "smoothstep" }
        - { position: 1.00, color: [0.88, 0.88, 0.90], interp: "linear"     }

  # Pianeta lava — turbulence + ramp dal nero della crosta al giallo magma.
  # Nota: Disney non ha campo `emission`; il look "bagliore" arriva dal
  # color_ramp (highlight in cima al gradiente) e dal `specular` alto.
  # Per un vero glow autonomo si userebbe mix(disney, emissive).
  - id: "planet_lava"
    type: "disney"
    color: [0.85, 0.85, 0.86]
    roughness: 0.60
    specular: 0.45
    texture:
      type: "noise"
      noise_type: "turbulence"
      scale: 5.5
      octaves: 7
      lacunarity: 2.0
      color_ramp:
        - { position: 0.00, color: [0.05, 0.02, 0.01], interp: "linear"     }
        - { position: 0.45, color: [0.30, 0.05, 0.02], interp: "smoothstep" }
        - { position: 0.75, color: [0.95, 0.30, 0.05], interp: "smoothstep" }
        - { position: 1.00, color: [1.00, 0.85, 0.30], interp: "linear"     }

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 5 — DISPLACEMENT STACK (rocce sculpted)
  #
  #  Sei "sfere" sono in realtà icosahedra subdivisi (Catmull-Clark ×3).
  #  Materiali base condivisi, displacement diversi per dimostrare l'intero
  #  stack: mesh subdivision → bump_map → scalar displacement → vector
  #  displacement → autobump → bump combinato.
  # ─────────────────────────────────────────────────────────────────────────

  # Pietra arenaria — base porcellanata calda (riusata su 3 rocce)
  - id: "rock_sandstone"
    type: "disney"
    color: [0.82, 0.66, 0.42]
    roughness: 0.78
    specular: 0.30

  - id: "rock_basalt"
    type: "disney"
    color: [0.18, 0.16, 0.18]
    roughness: 0.72
    specular: 0.40

  - id: "rock_obsidian"
    type: "disney"
    color: [0.05, 0.05, 0.07]
    roughness: 0.25
    specular: 0.80
    clearcoat: 0.6
    coat_roughness: 0.15

  # Variante arenaria con bump materiale aggiuntivo (graffi diagonali ridged)
  # — usata sulla roccia "full stack" per dimostrare la composizione finale
  # subdivision → displacement → autobump → bump materiale.
  - id: "rock_sandstone_scratched"
    type: "disney"
    color: [0.82, 0.66, 0.42]
    roughness: 0.78
    specular: 0.30
    bump_map:
      texture:
        type: "noise"
        noise_type: "ridged"
        scale: 28.0
        octaves: 2
        colors: [[0.45, 0.45, 0.45], [0.55, 0.55, 0.55]]
      strength: 1.2

  # Granito — bump-only (riferimento del bump puro vs vero displacement)
  - id: "rock_granite_bumponly"
    type: "disney"
    color: [0.55, 0.50, 0.48]
    roughness: 0.70
    specular: 0.40
    bump_map:
      texture:
        type: "voronoi"
        scale: 12.0
        metric: "euclidean"
        output: "f2_minus_f1"
        smoothness: 0.25
        colors: [[0.0, 0.0, 0.0], [1.0, 1.0, 1.0]]
      strength: 2.5

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 4 — LEGNO STUDIO QUALITY
  #
  #  Sei essenze con i nuovi controlli wood pro: figure_strength (curly /
  #  flame), knot_density (nodi voronoi), radial_anisotropy (quartersawn),
  #  ramp 3-4 stop sapwood/latewood/heartwood/knot.
  # ─────────────────────────────────────────────────────────────────────────

  # Quercia quartersawn — radial_anisotropy alto, grain pronunciato
  - id: "wood_oak"
    type: "disney"
    color: [0.80, 0.62, 0.42]
    roughness: 0.55
    specular: 0.30
    texture:
      type: "wood"
      scale: 5.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.0
      noise_strength: 2.2
      octaves: 5
      radial_anisotropy: 3.0
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.30, 0.18, 0.08], interp: "smoothstep" }
        - { position: 0.55, color: [0.82, 0.62, 0.38], interp: "smoothstep" }
        - { position: 1.00, color: [0.95, 0.82, 0.62], interp: "linear"     }

  # Noce — figure leggera + clearcoat satinato
  - id: "wood_walnut"
    type: "disney"
    color: [0.42, 0.26, 0.13]
    roughness: 0.50
    specular: 0.40
    clearcoat: 0.30
    coat_roughness: 0.30
    texture:
      type: "wood"
      scale: 4.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 3.5
      noise_strength: 1.5
      figure_scale: 0.18
      figure_strength: 0.55
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.18, 0.10, 0.05], interp: "smoothstep" }
        - { position: 0.55, color: [0.42, 0.26, 0.13], interp: "smoothstep" }
        - { position: 1.00, color: [0.62, 0.42, 0.24], interp: "linear"     }

  # Ciliegio — verniciato lucido, clearcoat pieno
  - id: "wood_cherry"
    type: "disney"
    color: [0.62, 0.22, 0.10]
    roughness: 0.30
    specular: 0.55
    clearcoat: 0.85
    coat_roughness: 0.10
    texture:
      type: "wood"
      scale: 4.5
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.5
      noise_strength: 1.4
      figure_scale: 0.20
      figure_strength: 0.30
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.32, 0.10, 0.04], interp: "smoothstep" }
        - { position: 0.55, color: [0.62, 0.22, 0.10], interp: "smoothstep" }
        - { position: 1.00, color: [0.85, 0.45, 0.22], interp: "linear"     }

  # Acero curly — figure_strength alto, grain quasi-spento
  - id: "wood_curly_maple"
    type: "disney"
    color: [0.88, 0.78, 0.60]
    roughness: 0.42
    specular: 0.40
    clearcoat: 0.4
    coat_roughness: 0.20
    texture:
      type: "wood"
      scale: 5.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 5.0
      noise_strength: 0.25
      grain_scale: 1.8
      figure_scale: 0.10
      figure_strength: 1.7
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.55, 0.38, 0.20], interp: "smoothstep" }
        - { position: 0.45, color: [0.85, 0.72, 0.48], interp: "smoothstep" }
        - { position: 1.00, color: [0.98, 0.92, 0.76], interp: "linear"     }

  # Ebano laccato — finitura a specchio
  - id: "wood_ebony"
    type: "disney"
    color: [0.10, 0.07, 0.04]
    roughness: 0.12
    specular: 0.70
    clearcoat: 1.0
    coat_roughness: 0.05
    texture:
      type: "wood"
      scale: 6.0
      ring_sharpness: 4.0
      noise_strength: 1.0
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.02, 0.01, 0.01], interp: "smoothstep" }
        - { position: 1.00, color: [0.16, 0.10, 0.06], interp: "linear"     }

  # Pino con nodi — knot_density 1.0 (showcase del nodo Voronoi-based)
  - id: "wood_knotty_pine"
    type: "disney"
    color: [0.85, 0.70, 0.45]
    roughness: 0.55
    specular: 0.30
    texture:
      type: "wood"
      scale: 6.0
      ring_axis: [0, 1, 0]
      ring_sharpness: 4.0
      noise_strength: 0.6
      figure_scale: 0.25
      figure_strength: 0.3
      knot_density: 1.0
      randomize_rotation: true
      color_ramp:
        - { position: 0.00, color: [0.05, 0.03, 0.02], interp: "smoothstep" }
        - { position: 0.18, color: [0.35, 0.18, 0.08], interp: "smoothstep" }
        - { position: 0.65, color: [0.90, 0.68, 0.40], interp: "smoothstep" }
        - { position: 1.00, color: [0.97, 0.86, 0.60], interp: "linear"     }

  # ─────────────────────────────────────────────────────────────────────────
  #  FILA 3 — MARMO STUDIO QUALITY
  #
  #  Sei marmi con secondary_wave (cross-veining Statuario/Calacatta) e
  #  ramp 4-stop. Convenzione ramp: position 0 = vena rara/scura, position
  #  1 = base dominante.
  # ─────────────────────────────────────────────────────────────────────────

  # Carrara — single-axis, vena sottile su base bianca (reference legacy
  # ma con sharpening del marble fix)
  - id: "marble_carrara"
    type: "disney"
    color: [0.95, 0.94, 0.92]
    roughness: 0.18
    clearcoat: 0.7
    coat_roughness: 0.10
    specular: 0.60
    subsurface: 0.08
    texture:
      type: "marble"
      scale: 5.0
      vein_axis: [0, 0, 1]
      vein_frequency: 1.0
      vein_sharpness: 4.0
      noise_strength: 8.0
      octaves: 8
      randomize_offset: true
      colors: [[0.96, 0.94, 0.91], [0.10, 0.08, 0.10]]

  # Calacatta — secondary_wave 0.45 + ramp 4-stop gold transition
  - id: "marble_calacatta"
    type: "disney"
    color: [0.95, 0.94, 0.92]
    roughness: 0.16
    clearcoat: 0.8
    coat_roughness: 0.08
    specular: 0.65
    subsurface: 0.06
    texture:
