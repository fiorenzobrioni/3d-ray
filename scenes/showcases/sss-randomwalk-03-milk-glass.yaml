# ═══════════════════════════════════════════════════════════════════════════
#  SSS RANDOM WALK #03 — Bicchiere di latte (Cornell)
#
#  Cornell box classica (pareti rosso-verde, soffitto emissivo) con un
#  cilindro verticale di "latte" al centro. Il latte è dichiarato come
#  Disney trasparente + `interior_medium: milk_int`: σ_s alto, σ_a quasi
#  zero, phase isotropica. Il color bleed sulle pareti del Cornell mostra
#  che il SSS si combina correttamente con NEE (Next Event Estimation)
#  dentro al volume — questo è l'obiettivo del preset "normal" e "high"
#  (`nee_in_walk = true`).
#
#  Coefficienti σ derivati da Jensen 2001 "wholemilk" (latte intero):
#    σ_a   ≈ [0.0011, 0.0024, 0.014]
#    σ_s   ≈ [2.55,   3.21,   3.77]
#    g     = 0 (isotropico nei nostri test — la dispersione delle micelle
#               è praticamente isotropica nella banda visibile)
#
#  Profili:
#    Preview:   -q draft-small
#    Standard:  -q medium-small
#    Final:     -q final-small
#    Showcase:  -q final
# ═══════════════════════════════════════════════════════════════════════════

world:
  sky:
    type: "flat"
    color: [0.0, 0.0, 0.0]

camera:
  position: [0, 1.25, 2.6]
  look_at:  [0, 1.25, -1.0]
  vup:      [0, 1, 0]
  fov:      54
  aperture: 0.0
  focal_dist: 3.6

mediums:
  - id: milk_int
    type: homogeneous
    sigma_a: [0.0011, 0.0024, 0.014]
    sigma_s: [2.55,   3.21,   3.77]
    phase: isotropic

materials:
  - id: wall_white
    type: lambertian
    color: [0.73, 0.73, 0.73]
  - id: wall_red
    type: lambertian
    color: [0.65, 0.05, 0.05]
  - id: wall_green
    type: lambertian
    color: [0.12, 0.45, 0.15]

  # NB: l'Emissive accetta `color` + `intensity`, NON `emit:` (campo
  # silenziosamente ignorato dal loader → default albedo 0.5, intensity 1
  # → scena pressoché buia). emission = color × intensity.
  - id: ceiling_light
    type: emissive
    color:     [1.0, 0.93, 0.85]
    intensity: 11.0

  - id: milk_surface
    type: disney
    color: [1.0, 1.0, 1.0]
    roughness: 0.05
    specular: 0.5
    spec_trans: 1.0
    ior: 1.35

lights:
  # No explicit lights — the emissive ceiling becomes a GeometryLight in NEE.

entities:
  # ── Cornell box: 5 quads (1 face each, no wasted back-faces on box-walls) ──
  # Box volume: x=[-1.25, 1.25], y=[0, 2.5], z=[-2.25, 0.25] (open at z>0.25)
  - name: pavimento
    type: quad
    q: [-1.25, 0.0,  0.25]
    u: [ 2.5,  0.0,  0.0]
    v: [ 0.0,  0.0, -2.5]
    material: wall_white

  - name: soffitto
    type: quad
    q: [-1.25, 2.5, -2.25]
    u: [ 2.5,  0.0,  0.0]
    v: [ 0.0,  0.0,  2.5]
    material: wall_white

  - name: parete_fondo
    type: quad
    q: [-1.25, 0.0, -2.25]
    u: [ 2.5,  0.0,  0.0]
    v: [ 0.0,  2.5,  0.0]
    material: wall_white

  - name: parete_sinistra_rossa
    type: quad
    q: [-1.25, 0.0,  0.25]
    u: [ 0.0,  0.0, -2.5]
    v: [ 0.0,  2.5,  0.0]
    material: wall_green

  - name: parete_destra_verde
    type: quad
    q: [ 1.25, 0.0, -2.25]
    u: [ 0.0,  0.0,  2.5]
    v: [ 0.0,  2.5,  0.0]
    material: wall_red

  # Pannello luminoso: quad emissivo single-sided, normale -Y verso il basso.
  # Cross(u, v) = (1.3, 0, 0) × (0, 0, 1.3) = (0, -1.69, 0) → normal (0, -1, 0).
  # Quad: ogni NEE sample atterra su una superficie utile (vs box che spreca
  # 5/6 dei sample sulle facce top/laterali con cosLight=0 o grazing).
  - name: pannello_luce
    type: quad
    q: [-0.65, 2.49, -1.65]
    u: [ 1.30, 0.0,   0.0]
    v: [ 0.0,  0.0,   1.30]
    material: ceiling_light

  # Bicchiere di latte: cilindro verticale, vincolato a milk_int
  - name: latte
    type: cylinder
    center: [0, 0.55, -0.6]
    radius: 0.42
    height: 1.10
    material: milk_surface
    interior_medium: milk_int
