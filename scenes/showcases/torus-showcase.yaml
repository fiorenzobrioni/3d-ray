# ============================================================================
#  THE CELESTIAL COMPASS — Torus & Annulus Showcase
# ============================================================================
#
#  DESCRIZIONE:
#  Una composizione monumentale a simmetria radiale progettata per mostrare
#  la precisione geometrica dei primitivi Torus e Annulus in un contesto
#  di design premium (Museum / High-End Jewelry style).
#
#  HIGHLIGHTS:
#  - "The Gyroscope": scultura centrale con 3 tori intrecciati (Oro).
#  - "Radial Cardinals": 4 stazioni satelliti con test di occlusione e rifrazione.
#  - "Annulus Mandala": base circolare geometricamente perfetta.
#  - "Studio Lighting": setup a 4 punti perfettamente bilanciato.
#
#  USO:
#  dotnet run -- -i scenes/showcases/torus-showcase.yaml -c main -s 64 -w 1200 -H 800
# ============================================================================

world:
  ambient_light: [0.015, 0.015, 0.018]
  background: [0.02, 0.02, 0.03]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.05]
    horizon_color: [0.05, 0.05, 0.08]
    ground_color: [0.01, 0.01, 0.01]
  ground:
    y: 0.0
    material: "pavimento_nero"

cameras:
  # ── Inquadratura Principale: Simmetrica e bilanciata ────────────────────
  - name: "main"
    position: [0.0, 3.5, -7.5]
    look_at: [0.0, 0.45, 0.0]
    fov: 38
    aperture: 0.01
    focal_dist: 7.5

  # ── Zenitale: La perfezione radiale del Mandala ────────────────────────
  - name: "zenith"
    position: [0.0, 8.5, 0.01]
    look_at: [0.0, 0.0, 0.0]
    fov: 42
    aperture: 0.0
    focal_dist: 1

  # ── Closeup Gyroscope: Dettaglio del cuore dorato ──────────────────────
  - name: "gyro_detail"
    position: [-1.2, 1.8, -3.5]
    look_at: [0.0, 1.0, 0.0]
    fov: 30
    aperture: 0.03
    focal_dist: 4.2

  # ── Satellite Focus: Ispezione dei test di occlusione ──────────────────
  - name: "satellite_left"
    position: [-4.5, 1.5, -1.5]
    look_at: [-2.5, 0.5, 0.0]
    fov: 35
    aperture: 0.02
    focal_dist: 3.5

# ============================================================================
# MATERIALI
# ============================================================================
materials:

  - id: "pavimento_nero"
    type: "disney"
    color: [0.05, 0.05, 0.06]
    roughness: 0.12
    specular: 0.8
    metallic: 0.1

  - id: "oro_lucido"
    type: "disney"
    color: [1.0, 0.82, 0.45]
    roughness: 0.08
    metallic: 1.0
    specular: 1.0

  - id: "acciaio_satinato"
    type: "disney"
    color: [0.85, 0.85, 0.88]
    roughness: 0.2
    metallic: 0.9

  - id: "marmo_puro"
    type: "disney"
    color: [0.98, 0.98, 1.0]
    roughness: 0.15
    specular: 0.5
    texture:
      type: "marble"
      scale: 3.0
      vein_color: [0.85, 0.85, 0.9]

  - id: "ceramica_navy"
    type: "disney"
    color: [0.15, 0.25, 0.45]
    roughness: 0.2
    clearcoat: 0.8

  - id: "vetro_ottico"
    type: "dielectric"
    refraction_index: 1.52

  - id: "rosso_accento"
    type: "lambertian"
    color: [0.8, 0.1, 0.05]

  - id: "verde_accento"
    type: "lambertian"
    color: [0.1, 0.6, 0.2]

# ============================================================================
# LUCI
# ============================================================================
lights:

  # ── KEY LIGHT: Sphere zenitale ──────────────────────────────────────────
  - type: "sphere"
    position: [0.0, 7.0, 0.0]
    radius: 1.2
    color: [1.0, 0.98, 0.92]
    intensity: 45.0
    shadow_samples: 16

  # ── FILL LIGHTS (Symmetrically balanced) ────────────────────────────────
  - type: "area"
    corner: [-6.0, 3.0, -4.0] # FR DX
    u: [0.0, 0.0, 2.5]
    v: [0.0, 4.0, 0.0]
    color: [0.8, 0.9, 1.0] # Fredda
    intensity: 15.0
    shadow_samples: 16

  - type: "area"
    corner: [6.0, 3.0, -4.0] # FR SX
    u: [0.0, 0.0, 2.5]
    v: [0.0, 4.0, 0.0]
    color: [1.0, 0.9, 0.8] # Calda
    intensity: 15.0
    shadow_samples: 16

  - type: "area"
    corner: [-6.0, 3.0, 4.0] # RR DX
    u: [0.0, 0.0, 2.5]
    v: [0.0, 4.0, 0.0]
    color: [0.9, 0.95, 1.0]
    intensity: 10.0
    shadow_samples: 16

  - type: "area"
    corner: [6.0, 3.0, 4.0] # RR SX
    u: [0.0, 0.0, 2.5]
    v: [0.0, 4.0, 0.0]
    color: [1.0, 0.95, 0.9]
    intensity: 10.0
    shadow_samples: 16

# ============================================================================
# TEMPLATES
# ============================================================================
templates:

  # Piedistallo satellitare (Pillar)
  - name: "satellite_base"
    children:
      - type: "annulus"
        center: [0, 0.005, 0]
        normal: [0, 1, 0]
        radius: 0.6
        inner_radius: 0.4
        material: "acciaio_satinato"
      - type: "cylinder"
        center: [0, 0, 0]
        radius: 0.25
        height: 0.7
        material: "ceramica_navy"
      - type: "disk"
        center: [0, 0.7, 0]
        normal: [0, 1, 0]
        radius: 0.3
        material: "acciaio_satinato"

# ============================================================================
# ENTITIES
# ============================================================================
entities:

  # ═══════════════════════════════════════════════════════════════════════
  # IL CUORE (THE CORE GYROSCOPE)
  # ═══════════════════════════════════════════════════════════════════════
  - name: "gyro_pedestal"
    type: "cylinder"
    center: [0, 0, 0]
    radius: 1.5
    height: 0.4
    material: "ceramica_navy"

  - name: "gyro_mandala_base"
    type: "annulus"
    center: [0, 0.405, 0]
    normal: [0, 1, 0]
    radius: 1.6
    inner_radius: 1.2
    material: "acciaio_satinato"

  - name: "gyro_sphere"
    type: "sphere"
    center: [0, 0, 0]
    radius: 0.55
    translate: [0, 1.3, 0]
    material: "marmo_puro"

  - name: "gyro_ring_1"
    type: "torus"
    center: [0, 0, 0]
    major_radius: 1.0
    minor_radius: 0.12
    translate: [0, 1.3, 0]
    material: "oro_lucido"

  - name: "gyro_ring_2"
    type: "torus"
    center: [0, 0, 0]
    major_radius: 1.02 # Offset per evitare z-fighting
    minor_radius: 0.12
    rotate: [120, 0, 0]
    translate: [0, 1.3, 0]
    material: "oro_lucido"

  - name: "gyro_ring_3"
    type: "torus"
    center: [0, 0, 0]
    major_radius: 1.04 # Offset per evitare z-fighting
    minor_radius: 0.12
    rotate: [240, 0, 0]
    translate: [0, 1.3, 0]
    material: "oro_lucido"

  # ═══════════════════════════════════════════════════════════════════════
  # COMPASS POINTS (THE SATELLITES)
  # ═══════════════════════════════════════════════════════════════════════

  # --- SUD: Test Occlusione (Cono) ---
  - name: "station_south"
    type: "instance"
    template: "satellite_base"
    translate: [0, 0, -2.8]

  - name: "obj_south_torus"
    type: "torus"
    center: [0, 1.2, -2.8]
    major_radius: 0.5
    minor_radius: 0.1
    material: "ceramica_navy"

  - name: "obj_south_cone"
    type: "cone"
    center: [0, 0.7, -2.8]
    radius: 0.4
    top_radius: 0.1
    height: 1.0
    material: "rosso_accento"

  # --- NORD: Test Occlusione (Cilindro) ---
  - name: "station_north"
    type: "instance"
    template: "satellite_base"
    translate: [0, 0, 2.8]

  - name: "obj_north_torus"
    type: "torus"
    center: [0, 1.2, 2.8]
    major_radius: 0.5
    minor_radius: 0.1
    material: "ceramica_navy"

  - name: "obj_north_cyl"
    type: "cylinder"
    center: [0, 0.7, 2.8]
    radius: 0.35
    height: 1.0
    material: "verde_accento"

  # --- EST: Test Rifrazione (Vetro) ---
  - name: "station_east"
    type: "instance"
    template: "satellite_base"
    translate: [2.8, 0, 0]

  - name: "obj_east_torus"
    type: "torus"
    center: [0, 0, 0]
    major_radius: 0.6
    minor_radius: 0.18
    rotate: [0, 0, 90]
    translate: [2.8, 1.44, 0]
    material: "vetro_ottico"

  # --- OVEST: Test Annulus Mandala ---
  - name: "station_west"
    type: "instance"
    template: "satellite_base"
    translate: [-2.8, 0, 0]

  - name: "obj_west_mandala"
    children:
      - type: "annulus"
        center: [-2.8, 1.25, 0]
        normal: [0, 0, -1]
        radius: 0.55
        inner_radius: 0.35
        material: "oro_lucido"
      - type: "annulus"
        center: [-2.8, 1.25, 0]
        normal: [0, 0, -1]
        radius: 0.3
        inner_radius: 0.15
        material: "acciaio_satinato"
      - type: "annulus"
        center: [-2.8, 1.25, 0]
        normal: [0, 0, -1]
        radius: 0.1
        inner_radius: 0.05
        material: "oro_lucido"
