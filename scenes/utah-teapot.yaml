# ═══════════════════════════════════════════════════════════════════════════
#  Utah Teapot — Il classico benchmark del ray tracing
#
#  Teiera in porcellana smaltata su tavolo di legno, con origami in carta
#  rossa (gru) costruito manualmente con primitive triangle/smooth_triangle,
#  sfera cromata e sfera in vetro ambrato come accessori.
#  Il file models/utah-teapot.obj deve essere presente nella cartella models.
#
#  Suggerimenti di rendering:
#    Preview:  -w 640  -H 360  -s 64   -d 6  -S 2
#    Standard: -w 1280 -H 720  -s 256  -d 8  -S 4
#    Finale:   -w 1920 -H 1080 -s 1024 -d 10 -S 4
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  WORLD — Studio quasi-nero, sfondo scuro per esaltare la teiera
# ═══════════════════════════════════════════════════════════════════════════
world:
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.06, 0.05, 0.08]
    ground_color: [0.02, 0.02, 0.02]

# ═══════════════════════════════════════════════════════════════════════════
#  CAMERAS
# ═══════════════════════════════════════════════════════════════════════════
cameras:
  - name: "hero"
    position: [5, 4.5, -7]
    look_at: [0.2, 1.0, 0]
    fov: 32
    aperture: 0.0
    focal_dist: 8.5

  - name: "top"
    position: [0, 8, -0.1]
    look_at: [0, 1.5, 0]
    fov: 50
    aperture: 0.0

  - name: "close"
    position: [2.5, 2.5, -3]
    look_at: [0, 2, 0.5]
    fov: 35
    aperture: 0.08
    focal_dist: 4.0

# ═══════════════════════════════════════════════════════════════════════════
#  MATERIALS
# ═══════════════════════════════════════════════════════════════════════════
materials:
  # ── Teiera — DISNEY (protagonista, clearcoat per smaltatura) ───────────
  - id: "porcellana"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.8
    clearcoat: 0.4
    coat_roughness: 0.10

  # ── Tavolo — LAMBERTIAN (superficie grande, nessun feature Disney) ─────
  - id: "legno_scuro"
    type: "lambertian"
    color: [0.25, 0.13, 0.06]

  # ── Pavimento — LAMBERTIAN (superficie più grande della scena) ─────────
  - id: "pavimento"
    type: "lambertian"
    texture:
      type: "checker"
      colors: [[0.06, 0.06, 0.06], [0.12, 0.1, 0.08]]
      scale: 1.5

  # ── Origami — LAMBERTIAN (carta opaca, nessun riflesso speculare) ──────
  - id: "carta_rossa"
    type: "lambertian"
    color: [0.85, 0.12, 0.08]

  # ── Sfera cromo — METAL (equivalente al disney metallic=1) ─────────────
  - id: "cromo"
    type: "metal"
    color: [0.95, 0.95, 0.97]
    fuzz: 0.02

  # ── Sfera vetro — già classico, invariato ──────────────────────────────
  - id: "vetro_ambra"
    type: "dielectric"
    refraction_index: 1.5
    color: [1.0, 0.85, 0.6]

# ═══════════════════════════════════════════════════════════════════════════
#  LIGHTS — Four-point: area key + fill + directional + spot teatrale
# ═══════════════════════════════════════════════════════════════════════════
lights:
  # Key light — area calda da destra
  - type: "area"
    corner: [4, 6, -2]
    u: [0, 0, 2]
    v: [0, 1, 0]
    color: [1.0, 0.92, 0.8]
    intensity: 30

  # Fill — fredda da sinistra
  - type: "point"
    position: [-5, 4, -3]
    color: [0.7, 0.8, 1.0]
    intensity: 220

  # Rim — posteriore
  - type: "point"
    position: [1.5, 3, 6]
    color: [1.0, 0.98, 0.95]
    intensity: 120

  # Spot teatrale — faretto dall'alto puntato sulla teiera
  - type: "spot"
    position: [-2, 9, -4]
    direction: [0.22, -0.88, 0.42]
    color: [1.0, 0.96, 0.88]
    intensity: 80
    inner_angle: 14
    outer_angle: 28

# ═══════════════════════════════════════════════════════════════════════════
#  ENTITIES — Pavimento, tavolo, teiera (mesh OBJ), origami, sfere deco
# ═══════════════════════════════════════════════════════════════════════════
entities:
  # ─── Pavimento ─────────────────────────────────────────────────────────
  - name: "pavimento"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  # ─── Tavolo — box con piano spesso e gambe cilindriche ─────────────────
  - name: "piano_tavolo"
    type: "box"
    scale: [6.0, 0.2, 5.0]
    translate: [0.0, 1.0, 0.5]
    material: "legno_scuro"

  # Gambe del tavolo
  - name: "gamba_1"
    type: "cylinder"
    center: [-2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_2"
    type: "cylinder"
    center: [2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_3"
    type: "cylinder"
    center: [-2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_4"
    type: "cylinder"
    center: [2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  # ─── Utah Teapot — il protagonista (unico Disney della scena) ──────────
  - name: "teapot"
    type: "mesh"
    path: "models/utah-teapot.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    rotate: [0, -30, 0]
    translate: [0, 1.1, 0.5]

  # ─── Smooth Triangles — Origami (gru) accanto alla teiera ──────────────

  # ─── Corpo: diamante con 4 facce ───────────────────────────────────────
  - name: "gru_corpo_top_fr"
    type: "smooth_triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [1.6, 1.1,  0.0]
    v2: [2.0, 1.1, -0.33]
    n0: [0, 0.8, -0.6]
    n1: [-0.5, -0.5, -0.5]
    n2: [0, -0.3, -0.95]
    material: "carta_rossa"

  - name: "gru_corpo_top_re"
    type: "smooth_triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [2.0, 1.1, 0.33]
    v2: [1.6, 1.1, 0.0]
    n0: [0, 0.8, 0.6]
    n1: [0, -0.3, 0.95]
    n2: [-0.5, -0.5, 0.5]
    material: "carta_rossa"

  - name: "gru_corpo_top_r"
    type: "smooth_triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [2.0, 1.1, -0.33]
    v2: [2.4, 1.1,  0.0]
    n0: [0, 0.8, -0.6]
    n1: [0, -0.3, -0.95]
    n2: [0.5, -0.5, -0.5]
    material: "carta_rossa"

  - name: "gru_corpo_top_re2"
    type: "smooth_triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [2.4, 1.1,  0.0]
    v2: [2.0, 1.1,  0.33]
    n0: [0, 0.8, 0.6]
    n1: [0.5, -0.5, 0.5]
    n2: [0, -0.3, 0.95]
    material: "carta_rossa"

  # ─── Ala sinistra: 2 facce ─────────────────────────────────────────────
  - name: "gru_ala_sx_fr"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.0, 1.1, -0.33]
    v2: [1.1, 1.18, 0.0]
    material: "carta_rossa"

  - name: "gru_ala_sx_re"
    type: "triangle"
    v0: [2.0, 1.1,  0.33]
    v1: [1.6, 1.1,  0.0]
    v2: [1.1, 1.18, 0.0]
    material: "carta_rossa"

  # ─── Ala destra: 2 facce ───────────────────────────────────────────────
  - name: "gru_ala_dx_fr"
    type: "triangle"
    v0: [2.4, 1.1,  0.0]
    v1: [2.9, 1.18, 0.0]
    v2: [2.0, 1.1, -0.33]
    material: "carta_rossa"

  - name: "gru_ala_dx_re"
    type: "triangle"
    v0: [2.0, 1.1,  0.33]
    v1: [2.9, 1.18, 0.0]
    v2: [2.4, 1.1,  0.0]
    material: "carta_rossa"

  # ─── Collo/testa: 2 triangoli sfalsati per spessore visivo ─────────────
  - name: "gru_collo_a"
    type: "triangle"
    v0: [2.0,  1.55, 0.0]
    v1: [2.0,  1.1, -0.33]
    v2: [2.4,  2.0, -0.9]
    material: "carta_rossa"

  - name: "gru_collo_b"
    type: "triangle"
    v0: [1.95, 1.55, 0.0]
    v1: [1.95, 1.1, -0.33]
    v2: [2.35, 2.0, -0.9]
    material: "carta_rossa"

  # ─── Coda: 1 faccia ────────────────────────────────────────────────────
  - name: "gru_coda"
    type: "triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [1.9, 2.05, 0.9]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ─── Fondo corpo: chiude la base del diamante ──────────────────────────
  - name: "gru_fondo_fr"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.0, 1.1, -0.33]
    v2: [2.4, 1.1,  0.0]
    material: "carta_rossa"

  - name: "gru_fondo_re"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.4, 1.1,  0.0]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ─── Oggetti decorativi — sfera cromo e sfera ambra ─────────────────────

  # Sfera cromo — riflette la teiera
  - name: "sfera_cromo"
    type: "sphere"
    center: [1.3, 1.45, -0.8]
    radius: 0.35
    material: "cromo"

  # Sfera vetro ambrato
  - name: "sfera_ambra"
    type: "sphere"
    center: [-0.8, 1.4, -0.7]
    radius: 0.3
    material: "vetro_ambra"
