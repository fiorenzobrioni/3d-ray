# ============================================================================
# Scene: Utah Teapot Showcase
# ============================================================================
# The classic ray tracing benchmark scene: a porcelain teapot on a wooden
# table, with hand-crafted smooth triangles demonstrating the new YAML
# primitive, and dramatic lighting.
#
# NOTE: Place utah-teapot.obj in models folder.
# ============================================================================

cameras:
  - name: "hero"
    position: [5, 4.5, -7]
    look_at: [0, 1.8, 0]
    fov: 38
    aperture: 0.05
    focal_dist: 8.5

  - name: "top"
    position: [0, 8, -0.1]
    look_at: [0, 1.5, 0]
    fov: 50
    aperture: 0.0

  - name: "close"
    position: [2.5, 2.5, -3]
    look_at: [0, 2, 0.5]
    fov: 35
    aperture: 0.08
    focal_dist: 4.0

world:
  ambient_light: [0.01, 0.01, 0.015]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.06, 0.05, 0.08]
    ground_color: [0.02, 0.02, 0.02]

materials:
  # ── Teiera ─────────────────────────────────────────────────────────────────
  - id: "porcellana"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.8
    clearcoat: 0.4
    clearcoat_gloss: 0.9

  # ── Tavolo ─────────────────────────────────────────────────────────────────
  - id: "legno_scuro"
    type: "disney"
    color: [0.25, 0.13, 0.06]
    roughness: 0.5
    metallic: 0.0

  # ── Pavimento ──────────────────────────────────────────────────────────────
  - id: "pavimento"
    type: "disney"
    roughness: 0.6
    texture:
      type: "checker"
      colors: [[0.06, 0.06, 0.06], [0.12, 0.1, 0.08]]
      scale: 1.5

  # ── Origami (smooth triangles) ─────────────────────────────────────────────
  - id: "carta_rossa"
    type: "disney"
    color: [0.85, 0.12, 0.08]
    roughness: 0.6

  - id: "carta_blu"
    type: "disney"
    color: [0.1, 0.2, 0.8]
    roughness: 0.6

  - id: "carta_oro"
    type: "disney"
    color: [0.9, 0.75, 0.2]
    roughness: 0.35
    metallic: 0.6

  # ── Sfera decorativa ───────────────────────────────────────────────────────
  - id: "cromo"
    type: "disney"
    color: [0.95, 0.95, 0.97]
    roughness: 0.02
    metallic: 1.0

  - id: "vetro_ambra"
    type: "dielectric"
    refraction_index: 1.5
    color: [1.0, 0.85, 0.6]

  # ── Luci emissive ──────────────────────────────────────────────────────────
  - id: "luce_calda"
    type: "emissive"
    color: [1.0, 0.9, 0.7]
    intensity: 20.0

  - id: "neon_smooth"
    type: "emissive"
    color: [0.3, 0.8, 1.0]
    intensity: 8.0

lights:
  # Luce principale — calda da destra
  - type: "area"
    corner: [4, 6, -2]
    u: [0, 0, 2]
    v: [0, 1, 0]
    color: [1.0, 0.92, 0.8]
    intensity: 30
    shadow_samples: 16

  # Luce di riempimento — fredda da sinistra
  - type: "point"
    position: [-5, 4, -3]
    color: [0.7, 0.8, 1.0]
    intensity: 25

  # Luce di contorno — dietro
  - type: "point"
    position: [0, 3, 6]
    color: [1, 1, 1]
    intensity: 15

entities:
  # ═══════════════════════════════════════════════════════════════════════════
  # PAVIMENTO
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "pavimento"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  # ═══════════════════════════════════════════════════════════════════════════
  # TAVOLO — box con piano spesso
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "piano_tavolo"
    type: "box"
    min: [-3, 0.9, -2]
    max: [3, 1.1, 3]
    material: "legno_scuro"

  # Gambe del tavolo
  - name: "gamba_1"
    type: "cylinder"
    center: [-2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_2"
    type: "cylinder"
    center: [2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_3"
    type: "cylinder"
    center: [-2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_4"
    type: "cylinder"
    center: [2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  # ═══════════════════════════════════════════════════════════════════════════
  # UTAH TEAPOT — il protagonista
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "teapot"
    type: "mesh"
    path: "models/utah-teapot.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    rotate: [0, -30, 0]
    translate: [0, 1.1, 0.5]

  # ═══════════════════════════════════════════════════════════════════════════
  # SMOOTH TRIANGLES — Origami decorativi accanto alla teiera
  # Dimostrano la nuova primitiva YAML con smooth shading
  # ═══════════════════════════════════════════════════════════════════════════

  # Origami gru — ala sinistra (smooth triangle con normali curve)
  - name: "origami_ala_sx"
    type: "smooth_triangle"
    v0: [-2.0, 1.1, 0.0]
    v1: [-1.2, 1.5, -0.3]
    v2: [-1.5, 1.1, 0.8]
    n0: [0.0, 1.0, 0.0]
    n1: [-0.3, 0.95, -0.1]
    n2: [0.0, 0.9, 0.44]
    uv0: [0, 0]
    uv1: [1, 0]
    uv2: [0.5, 1]
    material: "carta_rossa"

  # Origami gru — ala destra
  - name: "origami_ala_dx"
    type: "smooth_triangle"
    v0: [-2.0, 1.1, 0.0]
    v1: [-1.2, 1.5, -0.3]
    v2: [-2.5, 1.1, -0.7]
    n0: [0.0, 1.0, 0.0]
    n1: [-0.3, 0.95, -0.1]
    n2: [0.0, 0.9, -0.44]
    material: "carta_rossa"

  # Piramide origami — quattro smooth triangles
  - name: "piramide_f1"
    type: "smooth_triangle"
    v0: [2.0, 1.1, -0.5]
    v1: [2.5, 1.1, 0.3]
    v2: [2.25, 1.8, -0.1]
    n0: [0.0, 0.3, -0.95]
    n1: [0.5, 0.3, 0.81]
    n2: [0.0, 1.0, 0.0]
    material: "carta_blu"

  - name: "piramide_f2"
    type: "smooth_triangle"
    v0: [2.5, 1.1, 0.3]
    v1: [1.8, 1.1, 0.4]
    v2: [2.25, 1.8, -0.1]
    n0: [0.5, 0.3, 0.81]
    n1: [-0.5, 0.3, 0.81]
    n2: [0.0, 1.0, 0.0]
    material: "carta_blu"

  - name: "piramide_f3"
    type: "smooth_triangle"
    v0: [1.8, 1.1, 0.4]
    v1: [1.6, 1.1, -0.4]
    v2: [2.25, 1.8, -0.1]
    n0: [-0.5, 0.3, 0.81]
    n1: [-0.5, 0.3, -0.81]
    n2: [0.0, 1.0, 0.0]
    material: "carta_oro"

  - name: "piramide_f4"
    type: "smooth_triangle"
    v0: [1.6, 1.1, -0.4]
    v1: [2.0, 1.1, -0.5]
    v2: [2.25, 1.8, -0.1]
    n0: [-0.5, 0.3, -0.81]
    n1: [0.0, 0.3, -0.95]
    n2: [0.0, 1.0, 0.0]
    material: "carta_oro"

  # Triangolo emissivo smooth — piccola luce decorativa
  - name: "luce_triangolare"
    type: "smooth_triangle"
    v0: [-0.5, 3.5, -1.0]
    v1: [0.5, 3.5, -1.0]
    v2: [0.0, 4.2, -0.8]
    n0: [0, 0, -1]
    n1: [0, 0, -1]
    n2: [0, 0.3, -0.95]
    material: "neon_smooth"

  # ═══════════════════════════════════════════════════════════════════════════
  # OGGETTI DECORATIVI — primitive analitiche per composizione
  # ═══════════════════════════════════════════════════════════════════════════

  # Sfera cromo — riflette la teiera
  - name: "sfera_cromo"
    type: "sphere"
    center: [1.3, 1.45, -0.8]
    radius: 0.35
    material: "cromo"

  # Sfera vetro ambrato
  - name: "sfera_ambra"
    type: "sphere"
    center: [-0.8, 1.4, -0.7]
    radius: 0.3
    material: "vetro_ambra"

  # Piccolo pannello luminoso caldo — area light emissiva
  - name: "pannello_luce"
    type: "quad"
    q: [-1, 4, 1]
    u: [2, 0, 0]
    v: [0, 0, 1]
    material: "luce_calda"
