# ============================================================================
# Scene: Utah Teapot Showcase
# ============================================================================
# The classic ray tracing benchmark scene: a porcelain teapot on a wooden
# table, with hand-crafted smooth triangles demonstrating the new YAML
# primitive, and dramatic lighting.
#
# NOTE: Place utah-teapot.obj in models folder.
# ============================================================================

cameras:
  - name: "hero"
    position: [5, 4.5, -7]
    look_at: [0, 1.8, 0]
    fov: 38
    aperture: 0.05
    focal_dist: 8.5

  - name: "top"
    position: [0, 8, -0.1]
    look_at: [0, 1.5, 0]
    fov: 50
    aperture: 0.0

  - name: "close"
    position: [2.5, 2.5, -3]
    look_at: [0, 2, 0.5]
    fov: 35
    aperture: 0.08
    focal_dist: 4.0

world:
  ambient_light: [0.01, 0.01, 0.015]
  sky:
    type: "gradient"
    zenith_color: [0.02, 0.02, 0.06]
    horizon_color: [0.06, 0.05, 0.08]
    ground_color: [0.02, 0.02, 0.02]

materials:
  # ── Teiera ─────────────────────────────────────────────────────────────────
  - id: "porcellana"
    type: "disney"
    color: [0.95, 0.93, 0.88]
    roughness: 0.12
    metallic: 0.0
    specular: 0.8
    clearcoat: 0.4
    clearcoat_gloss: 0.9

  # ── Tavolo ─────────────────────────────────────────────────────────────────
  - id: "legno_scuro"
    type: "disney"
    color: [0.25, 0.13, 0.06]
    roughness: 0.5
    metallic: 0.0

  # ── Pavimento ──────────────────────────────────────────────────────────────
  - id: "pavimento"
    type: "disney"
    roughness: 0.6
    texture:
      type: "checker"
      colors: [[0.06, 0.06, 0.06], [0.12, 0.1, 0.08]]
      scale: 1.5

  # ── Origami (smooth triangles) ─────────────────────────────────────────────
  - id: "carta_rossa"
    type: "disney"
    color: [0.85, 0.12, 0.08]
    roughness: 0.6

  # ── Sfera decorativa ───────────────────────────────────────────────────────
  - id: "cromo"
    type: "disney"
    color: [0.95, 0.95, 0.97]
    roughness: 0.02
    metallic: 1.0

  - id: "vetro_ambra"
    type: "dielectric"
    refraction_index: 1.5
    color: [1.0, 0.85, 0.6]

  # ── Luci emissive ──────────────────────────────────────────────────────────
  - id: "luce_calda"
    type: "emissive"
    color: [1.0, 0.9, 0.7]
    intensity: 14.0

lights:
  # Key light — area calda da destra (invariata, funziona bene)
  - type: "area"
    corner: [4, 6, -2]
    u: [0, 0, 2]
    v: [0, 1, 0]
    color: [1.0, 0.92, 0.8]
    intensity: 30
    shadow_samples: 16

  # Fill — fredda da sinistra (invariata)
  - type: "point"
    position: [-5, 4, -3]
    color: [0.7, 0.8, 1.0]
    intensity: 25

  # Rim — spostata verso destra per coprire gru + teapot
  - type: "point"
    position: [1.5, 3, 6]
    color: [1.0, 0.98, 0.95]
    intensity: 15

entities:
  # ═══════════════════════════════════════════════════════════════════════════
  # PAVIMENTO
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "pavimento"
    type: "infinite_plane"
    point: [0, 0, 0]
    normal: [0, 1, 0]
    material: "pavimento"

  # ═══════════════════════════════════════════════════════════════════════════
  # TAVOLO — box con piano spesso
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "piano_tavolo"
    type: "box"
    min: [-3, 0.9, -2]
    max: [3, 1.1, 3]
    material: "legno_scuro"

  # Gambe del tavolo
  - name: "gamba_1"
    type: "cylinder"
    center: [-2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_2"
    type: "cylinder"
    center: [2.5, 0, -1.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_3"
    type: "cylinder"
    center: [-2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  - name: "gamba_4"
    type: "cylinder"
    center: [2.5, 0, 2.5]
    radius: 0.08
    height: 0.9
    material: "legno_scuro"

  # ═══════════════════════════════════════════════════════════════════════════
  # UTAH TEAPOT — il protagonista
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "teapot"
    type: "mesh"
    path: "models/utah-teapot.obj"
    material: "porcellana"
    scale: [0.5, 0.5, 0.5]
    rotate: [0, -30, 0]
    translate: [0, 1.1, 0.5]

  # ═══════════════════════════════════════════════════════════════════════════
  # SMOOTH TRIANGLES — Origami decorativi accanto alla teiera
  # Dimostrano la nuova primitiva YAML con smooth shading
  # ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
  # ORIGAMI GRU (Tsuru) — 13 triangoli flat-shaded
  # Posizione: lato destro del tavolo (dove c'era la piramide)
  #
  # Vertici chiave:
  #   P_cl  [ 1.6, 1.1,  0.0]   corpo sinistra
  #   P_cr  [ 2.4, 1.1,  0.0]   corpo destra
  #   P_cf  [ 2.0, 1.1, -0.33]  corpo fronte
  #   P_cb  [ 2.0, 1.1,  0.33]  corpo retro
  #   P_top [ 2.0, 1.55, 0.0]   cresta dorsale
  #   P_wlt [ 0.9, 1.18, 0.0]   punta ala sinistra
  #   P_wrt [ 2.9, 1.18, 0.0]   punta ala destra
  #   P_nh  [ 2.4, 2.0,  -0.9]  testa / becco
  #   P_tt  [ 1.9, 2.05,  0.9]  punta coda
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── Corpo: 4 facce a diamante ─────────────────────────────────────────────
  - name: "gru_corpo_sx_fr"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.0, 1.55, 0.0]
    v2: [2.0, 1.1, -0.33]
    material: "carta_rossa"

  - name: "gru_corpo_dx_fr"
    type: "triangle"
    v0: [2.0, 1.1, -0.33]
    v1: [2.0, 1.55, 0.0]
    v2: [2.4, 1.1,  0.0]
    material: "carta_rossa"

  - name: "gru_corpo_sx_re"
    type: "triangle"
    v0: [2.0, 1.1,  0.33]
    v1: [2.0, 1.55, 0.0]
    v2: [1.6, 1.1,  0.0]
    material: "carta_rossa"

  - name: "gru_corpo_dx_re"
    type: "triangle"
    v0: [2.4, 1.1,  0.0]
    v1: [2.0, 1.55, 0.0]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ─── Ala sinistra: 2 facce ─────────────────────────────────────────────────
  - name: "gru_ala_sx_fr"
    type: "triangle"
    v0: [2.0, 1.1, -0.33]
    v1: [0.9, 1.18, 0.0]
    v2: [1.6, 1.1,  0.0]
    material: "carta_rossa"

  - name: "gru_ala_sx_re"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [0.9, 1.18, 0.0]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ─── Ala destra: 2 facce ───────────────────────────────────────────────────
  - name: "gru_ala_dx_fr"
    type: "triangle"
    v0: [2.4, 1.1,  0.0]
    v1: [2.9, 1.18, 0.0]
    v2: [2.0, 1.1, -0.33]
    material: "carta_rossa"

  - name: "gru_ala_dx_re"
    type: "triangle"
    v0: [2.0, 1.1,  0.33]
    v1: [2.9, 1.18, 0.0]
    v2: [2.4, 1.1,  0.0]
    material: "carta_rossa"

  # ─── Collo/testa: 2 triangoli sfalsati di 0.05 in X per spessore visivo ────
  - name: "gru_collo_a"
    type: "triangle"
    v0: [2.0,  1.55, 0.0]
    v1: [2.0,  1.1, -0.33]
    v2: [2.4,  2.0, -0.9]
    material: "carta_rossa"

  - name: "gru_collo_b"
    type: "triangle"
    v0: [1.95, 1.55, 0.0]
    v1: [1.95, 1.1, -0.33]
    v2: [2.35, 2.0, -0.9]
    material: "carta_rossa"

  # ─── Coda: 1 faccia ────────────────────────────────────────────────────────
  - name: "gru_coda"
    type: "triangle"
    v0: [2.0, 1.55, 0.0]
    v1: [1.9, 2.05, 0.9]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ─── Fondo corpo: chiude la base del diamante ──────────────────────────────
  - name: "gru_fondo_fr"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.0, 1.1, -0.33]
    v2: [2.4, 1.1,  0.0]
    material: "carta_rossa"

  - name: "gru_fondo_re"
    type: "triangle"
    v0: [1.6, 1.1,  0.0]
    v1: [2.4, 1.1,  0.0]
    v2: [2.0, 1.1,  0.33]
    material: "carta_rossa"

  # ═══════════════════════════════════════════════════════════════════════════
  # OGGETTI DECORATIVI — primitive analitiche per composizione
  # ═══════════════════════════════════════════════════════════════════════════

  # Sfera cromo — riflette la teiera
  - name: "sfera_cromo"
    type: "sphere"
    center: [1.3, 1.45, -0.8]
    radius: 0.35
    material: "cromo"

  # Sfera vetro ambrato
  - name: "sfera_ambra"
    type: "sphere"
    center: [-0.8, 1.4, -0.7]
    radius: 0.3
    material: "vetro_ambra"

  # Piccolo pannello luminoso caldo — area light emissiva
  - name: "pannello_luce"
    type: "quad"
    q: [0, 4, 0]
    u: [3, 0, 0]
    v: [0, 0, 2]
    material: "luce_calda"