# Render manuale ad alta qualità — eseguito solo su richiesta (workflow_dispatch).
# Compila il progetto una volta sola, poi renderizza in parallelo le scene
# selezionate nella matrix a risoluzione 1920×1080 con 1024 samples.
# Per attivare una scena: rimuovi il # davanti alla voce corrispondente
# nella lista `scene:` prima di avviare il workflow.
# I render vengono caricati come artifact (retention 7 giorni).

name: Render Scenes

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build (Release)
        run: |
          dotnet restore src/RayTracer/RayTracer.csproj
          dotnet publish src/RayTracer/RayTracer.csproj \
            --configuration Release \
            --output publish/RayTracer \
            --no-restore

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: raytracer-bin
          path: publish/RayTracer/
          retention-days: 1

  render:
    name: Render ${{ matrix.scene }}
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scene:
          - utah-teapot
#          - primitive-showcase
#          - cristallo
#          - csg-showcase
#          - sphere-showcase
#          - cornell-box
#          - chess
#          - classic-showcase
#          - gradient-sky-showcase
#          - sample

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: raytracer-bin
          path: publish/RayTracer/

      - name: Make binary executable
        run: chmod +x publish/RayTracer/RayTracer

      - name: Render ${{ matrix.scene }}
        run: |
          mkdir -p renders
          publish/RayTracer/RayTracer \
            -i scenes/${{ matrix.scene }}.yaml \
            -o renders/sample-${{ matrix.scene }}.png \
            -s 1024 -d 60 -w 1920 -H 1080

      - name: Upload render
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ matrix.scene }}
          path: renders/sample-${{ matrix.scene }}.png
          retention-days: 7
