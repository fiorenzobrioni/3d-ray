# Render manuale ad alta qualità — eseguito solo su richiesta (workflow_dispatch).
# Compila il progetto una volta sola, poi renderizza in parallelo le scene
# selezionate nella matrix a risoluzione 1920×1080 con 1024 samples.
# Per attivare una scena: rimuovi il # davanti alla voce corrispondente
# nella lista `scene:` prima di avviare il workflow.
# I render vengono caricati come artifact (retention 7 giorni).

name: Render Scenes

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build (Release)
        run: |
          dotnet restore src/RayTracer/RayTracer.csproj
          dotnet publish src/RayTracer/RayTracer.csproj \
            --configuration Release \
            --output publish/RayTracer \
            --no-restore

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: raytracer-bin
          path: publish/RayTracer/
          retention-days: 1

  render:
    name: Render ${{ matrix.scene }}
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scene:
          # --- Elenco disattivato (rimuovi il # per attivare) ---
          #- environment-fog
          #- chess
          #- cornell-box
          #- cornell-box-sphere
          #- showcases/scene-csg
          #- showcases/scene-group
          #- pendolo-newton
          #- showcases/lighting-sphere
          #- showcases/glass-caustics
          - showcases/spheres-classic
          - tempio-romano
          - showcases/texture-voronoi-smooth
          - showcases/material-mix-metal-rust
          - showcases/material-marble
          - showcases/material-wood
          - showcases/medium-water-tank
          #
          #- showcases/material-emissive
          #- sample
          #- showcase
          #- showcases/material-classic
          #- showcases/material-classic-vs-disney
          #- cristallo
          #- showcases/lighting-gradient-sky
          #- heightfield-procedural-test
          #- heightfield-strata-test-preview
          #- showcases/material-mix
          #- showcases/primitive-overview
          #- showcases/material-spheres-pbr
          #- utah-teapot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download binary
        uses: actions/download-artifact@v6
        with:
          name: raytracer-bin
          path: publish/RayTracer/

      - name: Make binary executable
        run: chmod +x publish/RayTracer/RayTracer

      - name: Execute Render
        run: |
          # Estrae il nome base per l'artifact (es. da "showcases/chess" diventa "chess")
          SCENE_NAME=$(basename "${{ matrix.scene }}")
          echo "SCENE_NAME=$SCENE_NAME" >> $GITHUB_ENV
          
          # Crea la struttura di cartelle necessaria ad ospitare l'output
          mkdir -p "$(dirname "renders/${{ matrix.scene }}")"
          
          # Lancia il RayTracer (aggiornato a 1024 samples)
          publish/RayTracer/RayTracer \
            -i scenes/${{ matrix.scene }}.yaml \
            -o renders/${{ matrix.scene }}.png \
            -q standard -s 1024

      - name: Upload render
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: render-${{ env.SCENE_NAME }}
          path: renders/${{ matrix.scene }}.png
          retention-days: 7
          if-no-files-found: warn
