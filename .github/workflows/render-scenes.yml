# Render manuale ad alta qualità — eseguito solo su richiesta (workflow_dispatch).
# Compila il progetto una volta sola, poi renderizza in parallelo le scene
# selezionate nella matrix a risoluzione 1920×1080 con 1024 samples.
# Per attivare una scena: rimuovi il # davanti alla voce corrispondente
# nella lista `scene:` prima di avviare il workflow.
# I render vengono caricati come artifact (retention 7 giorni).

name: Render Scenes

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build (Release)
        run: |
          dotnet restore src/RayTracer/RayTracer.csproj
          dotnet publish src/RayTracer/RayTracer.csproj \
            --configuration Release \
            --output publish/RayTracer \
            --no-restore

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: raytracer-bin
          path: publish/RayTracer/
          retention-days: 1

  render:
    name: Render ${{ matrix.scene }}
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scene:
          # --- Elenco disattivato (rimuovi il # per attivare) ---
          #- environment-fog
          - chess -q final
          - cornell-box -q final
          - cornell-box-sphere -q final
          - showcases/motion-blur-billiard -q final
          - showcases/motion-blur -q final
          - showcases/scene-csg -q final
          - showcases/scene-group -q final
          - pendolo-newton -q final
          - showcases/lighting-sphere standard
          - showcases/glass-caustics -q final
          - showcases/spheres-classic -q standard
          - showcases/spheres-pbr -q standard
          - tempio-romano -q standard
          - showcases/texture-voronoi-smooth -q standard
          - showcases/material-mix-metal-rust -q standard
          - showcases/material-marble -q final
          - showcases/material-wood -q final
          - showcases/material-mix -q pre-final
          - showcases/material-emissive -q standard
          - showcases/sky-nishita -q final
          - showcases/texture-noise -q standard
          - showcases/extrusion -q final
          - showcases/texture-displacement-scalar -q standard
          #- sample
          #- showcase
          #- showcases/material-classic
          #- showcases/material-classic-vs-disney
          #- cristallo
          #- heightfield-procedural-test
          #- heightfield-strata-test-preview
          #- showcases/primitive-overview
          #- utah-teapot
          #- showcases/medium-water-tank

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download binary
        uses: actions/download-artifact@v6
        with:
          name: raytracer-bin
          path: publish/RayTracer/

      - name: Make binary executable
        run: chmod +x publish/RayTracer/RayTracer

      - name: Execute Render
        run: |
          # Estrae il nome base per l'artifact (es. da "showcases/chess" diventa "chess")
          SCENE_NAME=$(basename "${{ matrix.scene }}")
          echo "SCENE_NAME=$SCENE_NAME" >> $GITHUB_ENV
          
          # Crea la struttura di cartelle necessaria ad ospitare l'output
          mkdir -p "$(dirname "renders/${{ matrix.scene }}")"
          
          # Lancia il RayTracer (aggiornato a 1024 samples)
          publish/RayTracer/RayTracer \
            -i scenes/${{ matrix.scene }} \
            -o renders/${{ matrix.scene }}.png

      - name: Upload render
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: render-${{ env.SCENE_NAME }}
          path: renders/${{ matrix.scene }}.png
          retention-days: 7
          if-no-files-found: warn
