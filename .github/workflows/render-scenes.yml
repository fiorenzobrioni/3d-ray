# Render manuale ad alta qualità — eseguito solo su richiesta (workflow_dispatch).
# Compila il progetto una volta sola, poi renderizza in parallelo le scene
# selezionate nella matrix a risoluzione 1920×1080.
# Per attivare una scena: rimuovi il # davanti alla riga include corrispondente.
# I render vengono caricati come artifact (retention 7 giorni).

name: Render Scenes

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build (Release)
        run: |
          dotnet restore src/RayTracer/RayTracer.csproj
          dotnet publish src/RayTracer/RayTracer.csproj \
            --configuration Release \
            --output publish/RayTracer \
            --no-restore

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: raytracer-bin
          path: publish/RayTracer/
          retention-days: 1

  render:
    name: Render ${{ matrix.scene }}
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Elenco disattivato (rimuovi il # davanti alla riga per attivare) ---
          #- { scene: environment-fog,                        quality: standard  }
          - { scene: chess,                                   quality: final     }
          - { scene: cornell-box,                             quality: final     }
          - { scene: cornell-box-sphere,                      quality: final     }
          - { scene: showcases/motion-blur-billiard,          quality: final     }
          - { scene: showcases/motion-blur,                   quality: final     }
          - { scene: showcases/scene-csg,                     quality: final     }
          - { scene: showcases/scene-group,                   quality: final     }
          - { scene: pendolo-newton,                          quality: final     }
          - { scene: showcases/lighting-sphere,               quality: standard  }
          - { scene: showcases/glass-caustics,                quality: final     }
          - { scene: showcases/spheres-classic,               quality: standard  }
          - { scene: showcases/spheres-pbr,                   quality: standard  }
          - { scene: tempio-romano,                           quality: standard  }
          - { scene: showcases/texture-voronoi-smooth,        quality: standard  }
          - { scene: showcases/material-mix-metal-rust,       quality: standard  }
          - { scene: showcases/material-marble,               quality: final     }
          - { scene: showcases/material-wood,                 quality: final     }
          - { scene: showcases/material-mix,                  quality: pre-final }
          - { scene: showcases/material-emissive,             quality: standard  }
          - { scene: showcases/sky-nishita,                   quality: final     }
          - { scene: showcases/texture-noise,                 quality: standard  }
          - { scene: showcases/extrusion,                     quality: final     }
          - { scene: showcases/texture-displacement-scalar,   quality: standard  }
          #- { scene: sample,                                  quality: standard  }
          #- { scene: showcase,                                quality: standard  }
          #- { scene: showcases/material-classic,              quality: standard  }
          #- { scene: showcases/material-classic-vs-disney,    quality: standard  }
          #- { scene: cristallo,                               quality: final     }
          #- { scene: heightfield-procedural-test,             quality: standard  }
          #- { scene: heightfield-strata-test-preview,         quality: pre-final }
          #- { scene: showcases/primitive-overview,            quality: standard  }
          #- { scene: utah-teapot,                             quality: final     }
          #- { scene: showcases/medium-water-tank,             quality: final     }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: raytracer-bin
          path: publish/RayTracer/

      - name: Make binary executable
        run: chmod +x publish/RayTracer/RayTracer

      - name: Execute Render
        run: |
          # Estrae il nome base per l'artifact (es. da "showcases/chess" diventa "chess")
          SCENE_NAME=$(basename "${{ matrix.scene }}")
          echo "SCENE_NAME=$SCENE_NAME" >> $GITHUB_ENV

          # Crea la struttura di cartelle necessaria ad ospitare l'output
          mkdir -p "$(dirname "renders/${{ matrix.scene }}")"

          # Lancia il RayTracer
          publish/RayTracer/RayTracer \
            -i scenes/${{ matrix.scene }} \
            -o renders/${{ matrix.scene }}.png \
            -q ${{ matrix.quality }}

      - name: Upload render
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: render-${{ env.SCENE_NAME }}
          path: renders/${{ matrix.scene }}.png
          retention-days: 7
          if-no-files-found: warn
