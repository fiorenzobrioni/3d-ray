# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: RayTracer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/RayTracer/RayTracer.csproj

    - name: Build
      run: dotnet build src/RayTracer/RayTracer.csproj --no-restore --configuration Release

    - name: Render smoke test (chess.yaml)
      run: >
        dotnet run --project src/RayTracer/RayTracer.csproj
        --configuration Release --no-build --
        -i scenes/chess.yaml
        -o render-test.png
        -w 1920 -H 1080
        -s 512 -d 50

    - name: Upload render artifact
      uses: actions/upload-artifact@v4
      with:
        name: render-chess
        path: render-test.png
        retention-days: 7
