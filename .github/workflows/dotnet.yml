# CI — eseguito su ogni push e PR verso main.
# 1. Compila il progetto in Release.
# 2. Esegue la suite xUnit (464 test, ~3s).
# 3. Renderizza una scena leggera (chess.yaml, 320×213) per verificare
#    che il binario non crashi a runtime.
# L'immagine prodotta viene caricata come artifact (retention 3 giorni)
# per un'ispezione visiva rapida in caso di regressioni.

name: RayTracer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-render:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/RayTracer/RayTracer.csproj

    - name: Build
      run: dotnet build src/RayTracer/RayTracer.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test src/RayTracer.Tests/RayTracer.Tests.csproj --configuration Release

    - name: Render smoke test (chess.yaml)
      timeout-minutes: 5
      run: >
        dotnet run --project src/RayTracer/RayTracer.csproj
        --configuration Release --no-build --
        -i scenes/chess.yaml
        -o render-test.png
        -w 320 -H 213
        -s 32 -d 4 -S 4

    - name: Upload render artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: render-chess
        path: render-test.png
        retention-days: 3
