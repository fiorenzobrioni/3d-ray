# CI — eseguito su ogni push e PR verso main.
# 1. Compila il progetto in Release.
# 2. Esegue la suite xUnit (~3s).
# 3. Renderizza due scene leggere a 320×213:
#    - chess.yaml — sanity check del path generico (BVH, NEE, BSDF classici).
#    - showcases/sss-randomwalk-03-milk-glass.yaml — sanity check del path
#      SSS Random Walk + MediumInterface + emissive geometry NEE.
# Le immagini sono caricate come artifact (retention 3 giorni) per
# un'ispezione visiva rapida in caso di regressioni.

name: RayTracer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-render:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/RayTracer/RayTracer.csproj

    - name: Build
      run: dotnet build src/RayTracer/RayTracer.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test src/RayTracer.Tests/RayTracer.Tests.csproj --configuration Release

    - name: Render smoke test (chess.yaml)
      timeout-minutes: 5
      run: >
        dotnet run --project src/RayTracer/RayTracer.csproj
        --configuration Release --no-build --
        -i scenes/chess.yaml
        -o render-test.png
        -w 320 -H 213
        -s 32 -d 4 -S 4

    - name: Render SSS smoke test (milk-glass Cornell)
      # Exercises the Random Walk SSS dispatch path end-to-end on every CI
      # run. Catches regressions in the MediumStack plumbing, MediumBoundHittable,
      # random-walk integrator, and quality-preset wiring that the unit tests
      # cannot reach as a single chain.
      timeout-minutes: 5
      run: >
        dotnet run --project src/RayTracer/RayTracer.csproj
        --configuration Release --no-build --
        -i scenes/showcases/sss-randomwalk-03-milk-glass.yaml
        -o render-sss.png
        -w 320 -H 213
        -s 32 -d 6 -S 4

    - name: Upload render artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: render-smoke
        path: |
          render-test.png
          render-sss.png
        retention-days: 3
